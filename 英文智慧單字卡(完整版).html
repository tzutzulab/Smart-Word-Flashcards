            { id: 2589, word: "grid", meaning: "網格", ex_kr: "We located our town using the grid.", ex_zh: "我們利用網格定位了我們的城鎮。" },
            { id: 2590, word: "import", meaning: "進口", ex_kr: "Foods that have been imported are usually more expensive.", ex_zh: "進口食品通常更貴。" },
            { id: 2591, word: "infer", meaning: "推論", ex_kr: "By the position of the sun in the sky, she inferred that it was noon.", ex_zh: "根據太陽在天空中的位置，她推斷現在是中午。" },
            { id: 2592, word: "inflate", meaning: "膨脹", ex_kr: "I helped him inflate the balloons.", ex_zh: "我幫他把氣球吹起來。" },
            { id: 2593, word: "innate", meaning: "先天", ex_kr: "He had the innate desire to please his teachers.", ex_zh: "他天生就渴望取悅老師。" },
            { id: 2594, word: "marble", meaning: "大理石", ex_kr: "The large house had floors made of marble.", ex_zh: "這棟大房子的地板是用大理石鋪成的。" },
            { id: 2595, word: "mast", meaning: "桅杆", ex_kr: "The mast held both sails of the ship upright.", ex_zh: "桅杆支撐著船上的兩個帆，使它們保持垂直狀態。" },
            { id: 2596, word: "nausea", meaning: "噁心", ex_kr: "The doctor said the medicine would help get rid of her nausea.", ex_zh: "醫生說這種藥能幫助她緩解噁心感。" },
            { id: 2597, word: "naval", meaning: "海軍", ex_kr: "The country sent all of its naval forces to protect them.", ex_zh: "該國派出所有海軍力量保護他們。" },
            { id: 2598, word: "pouch", meaning: "小袋", ex_kr: "I keep my money in a small pouch.", ex_zh: "我把錢放在一個小袋子裡。" },
            { id: 2599, word: "saturated", meaning: "飽和", ex_kr: "Leigh’s hair became saturated in the rainstorm.", ex_zh: "暴雨讓莉的頭髮濕透了。" },
            { id: 2600, word: "update", meaning: "更新", ex_kr: "My phone is downloading a software update.", ex_zh: "我的手機正在下載軟體更新。" },
            { id: 2601, word: "attorney", meaning: "律師", ex_kr: "The attorney appeared in front of the judge for me.", ex_zh: "律師代表我出庭了。" },
            { id: 2602, word: "chronic", meaning: "慢性的", ex_kr: "He had chronic pain in his chest and needed to see a doctor.", ex_zh: "他胸部慢性疼痛，需要去看醫生。" },
            { id: 2603, word: "discipline", meaning: "紀律", ex_kr: "One of the teacher’s jobs is to teach her students discipline.", ex_zh: "教師的職責之一是教導學生紀律。" },
            { id: 2604, word: "donor", meaning: "捐贈者", ex_kr: "He was proud to be a blood donor.", ex_zh: "他為自己是一名捐血者而感到自豪。" },
            { id: 2605, word: "fellow", meaning: "同伴", ex_kr: "All of my fellow patients at the hospital have also complained about the food.", ex_zh: "我在醫院的其他病友也都抱怨過食物。" },
            { id: 2606, word: "gossip", meaning: "閒話", ex_kr: "The friends exchanged gossip about the people they knew in school.", ex_zh: "朋友們互相交流學校裡認識的人的八卦。" },
            { id: 2607, word: "graduate", meaning: "畢業", ex_kr: "At the end of the spring, my friends and I will graduate from high school.", ex_zh: "春末時節，我和我的朋友們將高中畢業。" },
            { id: 2608, word: "graffiti", meaning: "塗鴉", ex_kr: "The wall was covered with colorful graffiti.", ex_zh: "牆上佈滿了色彩繽紛的塗鴉。" },
            { id: 2609, word: "guardian", meaning: "監護人", ex_kr: "The librarians are the guardians of the books.", ex_zh: "圖書館員是書籍的守護者。" },
            { id: 2610, word: "implicate", meaning: "牽連", ex_kr: "The man was implicated in the theft at the store.", ex_zh: "該男子涉嫌參與商店竊盜案。" },
            { id: 2611, word: "kin", meaning: "親屬", ex_kr: "His kin were all farmers.", ex_zh: "他的親戚都是農民。" },
            { id: 2612, word: "referee", meaning: "裁判", ex_kr: "The soccer player didn’t agree with the referee.", ex_zh: "這位足球員不同意裁判的判罰。" },
            { id: 2613, word: "sever", meaning: "斷絕", ex_kr: "He severed the string using scissors.", ex_zh: "他用剪刀剪斷了繩子。" },
            { id: 2614, word: "shaft", meaning: "軸", ex_kr: "The golf club had a long wooden shaft that he held in his hands.", ex_zh: "他雙手握著那根長長的木製高爾夫球桿。" },
            { id: 2615, word: "stab", meaning: "刺", ex_kr: "He stabbed the fork into the potato and passed it to his daughter.", ex_zh: "他把叉子插進馬鈴薯裡，然後遞給了女兒。" },
            { id: 2616, word: "stimulus", meaning: "刺激", ex_kr: "Having a lot of money is a stimulus for people to buy more things.", ex_zh: "擁有大量金錢會刺激人們購買更多東西。" },
            { id: 2617, word: "suspicion", meaning: "懷疑", ex_kr: "The police had a suspicion that the driver had stolen the purse.", ex_zh: "警方懷疑是司機偷了錢包。" },
            { id: 2618, word: "terminate", meaning: "終止", ex_kr: "The trip was terminated after the car broke down.", ex_zh: "汽車拋錨後，行程被迫終止。" },
            { id: 2619, word: "theme", meaning: "主題", ex_kr: "The students discussed the book’s theme in class.", ex_zh: "學生們在課堂上討論了這本書的主題。" },
            { id: 2620, word: "tuition", meaning: "學費", ex_kr: "University tuitions have increased by 50 percent in the last five years.", ex_zh: "過去五年裡，大學學費上漲了50%。" },
            { id: 2621, word: "aggressive", meaning: "挑釁的", ex_kr: "Nobody liked to play games with him because he was always too aggressive.", ex_zh: "沒人喜歡跟他玩遊戲，因為他總是太好鬥。" },
            { id: 2622, word: "amnesty", meaning: "大赦", ex_kr: "She was denied amnesty for her involvement in the war.", ex_zh: "她因參與戰爭而被拒絕赦免。" },
            { id: 2623, word: "arena", meaning: "競技場", ex_kr: "The new arena was all set to hold the championship match.", ex_zh: "新場館已準備就緒，將舉辦冠軍賽。" },
            { id: 2624, word: "auditorium", meaning: "禮堂", ex_kr: "People have gathered at the school auditorium to watch the play.", ex_zh: "人們聚集在學校禮堂觀賞表演。" },
            { id: 2625, word: "captive", meaning: "俘虜", ex_kr: "The guards told the captive that there was no way he could escape the prison.", ex_zh: "獄卒告訴囚犯，他不可能逃出監獄。" },
            { id: 2626, word: "combat", meaning: "戰鬥", ex_kr: "The two warriors were locked in combat.", ex_zh: "兩名戰士正在激戰。" },
            { id: 2627, word: "commonplace", meaning: "平凡", ex_kr: "There is nothing commonplace about the way Morris dresses.", ex_zh: "莫里斯的穿著打扮一點也不普通。" },
            { id: 2628, word: "compound", meaning: "化合物", ex_kr: "The workers waited outside the compound for the gates of the factory to open.", ex_zh: "工人在廠區外等候工廠大門打開。" },
            { id: 2629, word: "corps", meaning: "兵團", ex_kr: "The army had a corps of archers who trained apart from the regular soldiers.", ex_zh: "軍隊中有一支弓箭手部隊，他們的訓練與正規軍分開進行。" },
            { id: 2630, word: "distract", meaning: "轉移", ex_kr: "The phone call distracted him so much that he forgot all about his homework.", ex_zh: "電話讓他分了神，以至於他完全忘了作業。" },
            { id: 2631, word: "dumb", meaning: "啞的", ex_kr: "She did not share the secret. She remained as silent as if she were dumb.", ex_zh: "她沒有透露這個秘密。她一言不發，彷彿是個啞巴。" },
            { id: 2632, word: "foe", meaning: "敵人", ex_kr: "It was hard to believe that anyone could be his foe.", ex_zh: "很難相信會有人是他的敵人。" },
            { id: 2633, word: "hack", meaning: "駭客", ex_kr: "My uncle used the ax to hack the tree into many logs.", ex_zh: "我叔叔用斧頭把樹砍成了很多木頭。" },
            { id: 2634, word: "meditate", meaning: "幽思", ex_kr: "She liked to meditate for several hours each day.", ex_zh: "她喜歡每天冥想幾個小時。" },
            { id: 2635, word: "nick", meaning: "缺口", ex_kr: "While cutting the carrots, the cook nicked his finger with the edge of his knife.", ex_zh: "當廚師切胡蘿蔔時，不小心被刀刃劃破了手指。" },
            { id: 2636, word: "provoke", meaning: "惹", ex_kr: "The older boy provoked Paul by calling him mean names.", ex_zh: "年紀較大的男孩用難聽的話激怒了保羅。" },
            { id: 2637, word: "realm", meaning: "領域", ex_kr: "He was not very active in the realm of business.", ex_zh: "他在商業領域並不活躍。" },
            { id: 2638, word: "reign", meaning: "在位", ex_kr: "The emperor’s reign lasted for only two years.", ex_zh: "這位皇帝的統治只持續了兩年。" },
            { id: 2639, word: "rust", meaning: "鏽", ex_kr: "The old metal gate would not swing because the hinges were covered in rust.", ex_zh: "老舊的金屬大門無法轉動，因為鉸鏈上滿是鏽跡。" },
            { id: 2640, word: "sacred", meaning: "神聖", ex_kr: "One religion in India will not harm cows because it believes that they are sacred.", ex_zh: "印度的一種宗教不會傷害牛，因為它認為牛是神聖的。" },
            { id: 2641, word: "aesthetic", meaning: "美學的", ex_kr: "The dresses were noteworthy for their aesthetic design.", ex_zh: "這些裙子因其美觀的設計而引人注目。" },
            { id: 2642, word: "arrogant", meaning: "傲慢的", ex_kr: "He is very arrogant. Even though he’s not the boss, he tells everyone what to do.", ex_zh: "他非常傲慢。雖然他不是老闆，但他卻對所有人發號施令。" },
            { id: 2643, word: "bias", meaning: "偏見", ex_kr: "The mothers had a natural bias for their own child’s picture.", ex_zh: "母親們自然而然地對自己孩子的照片有所偏愛。" },
            { id: 2644, word: "canyon", meaning: "峽谷", ex_kr: "The canyon was so deep that the ground inside was covered in shadow.", ex_zh: "峽谷非常深，裡面的地面都被陰影覆蓋了。" },
            { id: 2645, word: "creek", meaning: "溪", ex_kr: "Only small fish lived in the shallow waters of the creek.", ex_zh: "溪流的淺水中只住著一些小魚。" },
            { id: 2646, word: "drill", meaning: "鑽頭", ex_kr: "The carpenter used the drill to make several holes in the wood.", ex_zh: "木匠用電鑽在木頭上鑽了幾個孔。" },
            { id: 2647, word: "executive", meaning: "管理人員", ex_kr: "After twenty years at the company, he finally became the executive.", ex_zh: "在公司工作二十年後，他終於晉升為高階主管。" },
            { id: 2648, word: "fatigue", meaning: "疲勞", ex_kr: "After three days with little sleep, she was feeling a lot of fatigue.", ex_zh: "三天沒怎麼睡覺，她感到非常疲憊。" },
            { id: 2649, word: "incline", meaning: "傾斜", ex_kr: "This mountain has one of the steepest inclines in the world.", ex_zh: "這座山擁有世界上最陡峭的坡度之一。" },
            { id: 2650, word: "nasty", meaning: "可惡的", ex_kr: "The rotten apple left a nasty taste inside her mouth.", ex_zh: "那顆爛蘋果讓她嘴裡留下了難聞的味道。" },
            { id: 2651, word: "perceive", meaning: "感知", ex_kr: "He was talking loudly, so he did not perceive that the music had stopped.", ex_zh: "他說話聲音很大，所以沒有註意到音樂已經停止了。" },
            { id: 2652, word: "primate", meaning: "靈長類動物", ex_kr: "Primates use their hands for such tasks as swinging from branches.", ex_zh: "靈長類動物用手來完成諸如在樹枝間盪來盪去之類的動作。" },
            { id: 2653, word: "primitive", meaning: "原始", ex_kr: "The computers of the 1980s are primitive compared to those of today.", ex_zh: "與今天的計算機相比，20世紀80年代的計算機非常原始。" },
            { id: 2654, word: "stereotype", meaning: "刻板印象", ex_kr: "There’s a stereotype that pigs are dirty animals. But they are rather clean.", ex_zh: "人們普遍認為豬是骯髒的動物，但實際上它們相當愛乾淨。" },
            { id: 2655, word: "sticky", meaning: "黏", ex_kr: "Place the sticky part of the tape against the paper, so it will cling to the wall.", ex_zh: "將膠帶的黏性面貼在紙上，使其黏附在牆上。" },
            { id: 2656, word: "termite", meaning: "白蟻", ex_kr: "The wood we found was full of termites.", ex_zh: "我們發現的木頭裡全是白蟻。" },
            { id: 2657, word: "thereby", meaning: "從而", ex_kr: "He didn’t score a goal, thereby ending his chance at setting a record.", ex_zh: "他沒能進球，也就失去了創造紀錄的機會。" },
            { id: 2658, word: "trail", meaning: "蹤跡", ex_kr: "A narrow trail cut through the field and over the hills.", ex_zh: "一條狹窄的小路穿過田野，翻過山丘。" },
            { id: 2659, word: "twig", meaning: "枝條", ex_kr: "They started the fire with a handful of dry twigs.", ex_zh: "他們用一把乾樹枝生起了火。" },
            { id: 2660, word: "welfare", meaning: "福利", ex_kr: "Having plenty of clean water is necessary for the welfare of people.", ex_zh: "充足的清潔水源對人們的福祉至關重要。" },
            { id: 2661, word: "behalf", meaning: "代表", ex_kr: "The original speaker was sick, so his son gave the speech on his behalf.", ex_zh: "原演講者生病了，所以他的兒子代替他發表了演講。" },
            { id: 2662, word: "flap", meaning: "瓣膜", ex_kr: "The tiny bird flapped its wings and ate from the flowers.", ex_zh: "小鳥撲扇著翅膀，從花叢中啄食。" },
            { id: 2663, word: "glacier", meaning: "冰河", ex_kr: "The North Pole is covered by a huge glacier.", ex_zh: "北極被巨大的冰川覆蓋。" },
            { id: 2664, word: "globe", meaning: "地球", ex_kr: "Water covers most of the globe.", ex_zh: "地球表面大部分被水覆蓋。" },
            { id: 2665, word: "horizontal", meaning: "水平的", ex_kr: "The Russian fag has three horizontal stripes of white, blue, and red.", ex_zh: "俄羅斯香菸有三條水平條紋，分別為白色、藍色和紅色。" },
            { id: 2666, word: "hum", meaning: "哼", ex_kr: "The man hummed his favorite song.", ex_zh: "那人哼起了他最喜歡的歌。" },
            { id: 2667, word: "inventory", meaning: "存貨", ex_kr: "Gwen was checking the inventory to make sure we had what we needed.", ex_zh: "格溫正在清點庫存，確保我們所需的物品齊全。" },
            { id: 2668, word: "inward", meaning: "向內", ex_kr: "She had an inward feeling of guilt when she lied to her mother.", ex_zh: "她對母親說謊後，內心感到愧疚。" },
            { id: 2669, word: "loaf", meaning: "麵包", ex_kr: "Could you please buy a loaf of bread for sandwiches?", ex_zh: "請問您能幫我買一條麵包做三明治嗎？" },
            { id: 2670, word: "oracle", meaning: "神諭", ex_kr: "The king went to the oracle to ask if going to war was a good idea.", ex_zh: "國王到神諭處詢問發動戰爭是否是個好主意。" },
            { id: 2671, word: "orbit", meaning: "軌道", ex_kr: "The Moon orbits the Earth.", ex_zh: "月球繞地球運行。" },
            { id: 2672, word: "overview", meaning: "概述", ex_kr: "My brother gave me an overview of the important parts of the book.", ex_zh: "我哥哥給我概述了這本書的重要部分。" },
            { id: 2673, word: "preview", meaning: "預覽", ex_kr: "The band played us a preview of their new song.", ex_zh: "樂團為我們播放了他們新歌的片段。" },
            { id: 2674, word: "previous", meaning: "以前的", ex_kr: "He turned back to the previous page to read the paragraph again.", ex_zh: "他翻回上一頁，重新讀了一遍那段話。" },
            { id: 2675, word: "provide", meaning: "提供", ex_kr: "Each student was provided with a test and three sharp pencils.", ex_zh: "每個學生都拿到了一份考捲和三支削好的鉛筆。" },
            { id: 2676, word: "recur", meaning: "復發", ex_kr: "Burglaries seem to recur over and over in our neighborhood.", ex_zh: "我們社區似乎總是發生入室盜竊案。" },
            { id: 2677, word: "relevant", meaning: "相關的", ex_kr: "The 30-year-old book about politics is still relevant to our society today.", ex_zh: "這本出版於30年前的政治著作，對當今社會仍然具有現實意義。" },
            { id: 2678, word: "rite", meaning: "儀式", ex_kr: "Special masks are worn during the rite when a new baby is born.", ex_zh: "在新生兒誕生的儀式上，人們會戴上特殊的面具。" },
            { id: 2679, word: "stall", meaning: "攤位", ex_kr: "If you give the car a push, it won’t stall.", ex_zh: "如果你推一下車，它就不會熄火。" },
            { id: 2680, word: "supernatural", meaning: "超自然", ex_kr: "The dragon had supernatural powers, such as flying and breathing fire.", ex_zh: "這條龍擁有超自然的力量，例如飛行和噴火。" },
            { id: 2681, word: "aquarium", meaning: "水族館", ex_kr: "We took a trip to the aquarium and saw a scary shark.", ex_zh: "我們去水族館參觀，看到了一條可怕的鯊魚。" },
            { id: 2682, word: "arbitrary", meaning: "隨意的", ex_kr: "The classroom had many arbitrary rules that confused me.", ex_zh: "教室裡有很多隨意制定的規矩，這讓我很困惑。" },
            { id: 2683, word: "autobiography", meaning: "自傳", ex_kr: "I read an autobiography about my favorite entertainer.", ex_zh: "我讀了一本我最喜歡的藝人的自傳。" },
            { id: 2684, word: "convention", meaning: "習俗", ex_kr: "In the US, a popular convention is to shake hands when you meet someone.", ex_zh: "在美國，見面時握手是常見的習俗。" },
            { id: 2685, word: "gracious", meaning: "親切", ex_kr: "The operator was gracious enough to help me find the number.", ex_zh: "接線員非常熱心，幫我找到號碼了。" },
            { id: 2686, word: "improve", meaning: "提升", ex_kr: "He studied hard to improve his test scores from the previous year.", ex_zh: "他努力學習，爭取比去年提高考試成績。" },
            { id: 2687, word: "insulate", meaning: "隔離", ex_kr: "People can conserve energy by insulating their houses.", ex_zh: "人們可以透過為房屋做隔熱來節約能源。" },
            { id: 2688, word: "intrigue", meaning: "陰謀", ex_kr: "Her mysterious past intrigued her new friend.", ex_zh: "她神秘的過去引起了新朋友的興趣。" },
            { id: 2689, word: "longevity", meaning: "長壽", ex_kr: "Sea turtles have an amazing longevity.", ex_zh: "海龜的壽命非常長。" },
            { id: 2690, word: "misplace", meaning: "錯放", ex_kr: "I misplaced my wallet, and I didn’t find it until a week later.", ex_zh: "我的錢包丟了，一個禮拜後才找到。" },
            { id: 2691, word: "naughty", meaning: "淘氣", ex_kr: "The boy had to go to his room because he was being naughty.", ex_zh: "男孩因為調皮搗蛋，被罰回房間。" },
            { id: 2692, word: "norm", meaning: "規範", ex_kr: "Wearing a heavy coat all summer is not considered a norm.", ex_zh: "整個夏天都穿著厚外套並不常見。" },
            { id: 2693, word: "orangutan", meaning: "猩猩", ex_kr: "Orangutans use their long arms to swing from trees.", ex_zh: "猩猩利用它們長長的手臂在樹間盪來盪去。" },
            { id: 2694, word: "overload", meaning: "超載", ex_kr: "If you overload the truck, it might crash.", ex_zh: "如果卡車超載，可能會發生事故。" },
            { id: 2695, word: "philanthropy", meaning: "慈善事業", ex_kr: "The wealthy business owner is well known for his acts of philanthropy.", ex_zh: "這位富有的企業主因其慈善行為而聞名。" },
            { id: 2696, word: "probe", meaning: "探測", ex_kr: "The bank probed into his financial history to see if he qualified for a loan.", ex_zh: "銀行調查了他的財務記錄，以確定他是否符合貸款條件。" },
            { id: 2697, word: "recipient", meaning: "接受者", ex_kr: "I was the recipient of four phone calls today.", ex_zh: "今天我接到了四通電話。" },
            { id: 2698, word: "reptile", meaning: "爬蟲", ex_kr: "Lizards are my favorite type of reptile.", ex_zh: "蜥蜴是我最喜歡的爬蟲類。" },
            { id: 2699, word: "thrive", meaning: "蓬勃發展", ex_kr: "He may be an old man, but he continues to thrive.", ex_zh: "他雖然年紀大了，但依然精神矍鑠。" },
            { id: 2700, word: "ultimate", meaning: "最終的", ex_kr: "By trying hard in school, I will reach my ultimate goal of becoming a doctor.", ex_zh: "只要我努力學習，我終將實現成為醫生的最終目標。" },
            { id: 2701, word: "antique", meaning: "古董", ex_kr: "My grandmother’s antique rocking chair is worth a lot of money.", ex_zh: "我祖母的古董搖椅價值連城。" },
            { id: 2702, word: "applicant", meaning: "申請人", ex_kr: "Lots of applicants came into the store when the job position became available.", ex_zh: "職缺出來後，很多求職者來到店裡應徵。" },
            { id: 2703, word: "artifact", meaning: "人工製品", ex_kr: "We studied artifacts from an ancient Chinese settlement.", ex_zh: "我們研究了中國古代遺址出土的文物。" },
            { id: 2704, word: "authentic", meaning: "真正的", ex_kr: "We ate authentic Italian food on our vacation to Rome.", ex_zh: "我們在羅馬度假期間品嚐了正宗的意大利美食。" },
            { id: 2705, word: "chronology", meaning: "時間順序", ex_kr: "We learned the chronology of World War II in history class.", ex_zh: "我們在歷史課上學習了第二次世界大戰的時間線。" },
            { id: 2706, word: "diplomat", meaning: "外交官", ex_kr: "The Spanish diplomat discussed trade issues with officials in Peru.", ex_zh: "這位西班牙外交官與秘魯官員討論了貿易問題。" },
            { id: 2707, word: "epic", meaning: "史詩", ex_kr: "The poet wrote an epic about the great discoveries of the past thousand years.", ex_zh: "這位詩人創作了一部史詩，講述了過去一千年來的偉大發現。" },
            { id: 2708, word: "excerpt", meaning: "摘抄", ex_kr: "I didn’t listen to the entire symphony online, but I did play an excerpt.", ex_zh: "我沒有在線聽完整部交響樂，但我播放了其中的一小段。" },
            { id: 2709, word: "fossil", meaning: "化石", ex_kr: "The expert arranged the fossils to build the skeleton of the dinosaur.", ex_zh: "專家將化石排列起來，拼湊出了恐龍的骨架。" },
            { id: 2710, word: "humiliate", meaning: "羞辱", ex_kr: "I was humiliated when I tripped and fell down in front of the whole school.", ex_zh: "我在全校師生面前絆倒摔跤，感到非常尷尬。" },
            { id: 2711, word: "lyric", meaning: "歌詞", ex_kr: "I enjoy reading and creating my own lyric poetry.", ex_zh: "我喜歡閱讀和創作自己的抒情詩。" },
            { id: 2712, word: "majesty", meaning: "威嚴", ex_kr: "The majesty of the old castle amazed the tourists who came to see it.", ex_zh: "古老城堡的雄偉壯麗令前來參觀的遊客驚嘆不已。" },
            { id: 2713, word: "monarch", meaning: "君主", ex_kr: "The monarch lived in a beautiful palace with a grand gate.", ex_zh: "君主居住在一座擁有宏偉大門的漂亮宮殿裡。" },
            { id: 2714, word: "precede", meaning: "先於", ex_kr: "The hurricane was preceded by a moment of still wind and clear sky.", ex_zh: "颶風來臨之前，曾出現過一陣風平浪靜、晴空萬裡的情況。" },
            { id: 2715, word: "punctual", meaning: "準時", ex_kr: "My mother hates being late. She is the most punctual person I know.", ex_zh: "我媽最討厭遲到。她是我認識的人當中最守時的人。" },
            { id: 2716, word: "recruit", meaning: "招募", ex_kr: "We successfully recruited someone to be the new manager.", ex_zh: "我們成功招募到了一位新經理。" },
            { id: 2717, word: "refund", meaning: "退款", ex_kr: "I asked for a refund because the shoes I bought were too tight.", ex_zh: "我要求退款，因為我買的鞋子太緊了。" },
            { id: 2718, word: "register", meaning: "登記", ex_kr: "At a wedding, there is register for all of the guests to sign.", ex_zh: "婚禮上，會有一份登記簿供所有賓客簽名。" },
            { id: 2719, word: "renown", meaning: "名聲", ex_kr: "Michael is a singer of great renown in New Zealand.", ex_zh: "麥可是紐西蘭一位享有盛譽的歌手。" },
            { id: 2720, word: "tusk", meaning: "象牙", ex_kr: "Sadly, some people hunt elephants and remove their tusks to sell them.", ex_zh: "令人遺憾的是，有些人獵殺大象並取下象牙出售。" },
            { id: 2721, word: "coexist", meaning: "共存", ex_kr: "Our pets coexist in our home with few or no problems.", ex_zh: "我們的寵物和它們在家中相處融洽，幾乎沒有任何問題。" },
            { id: 2722, word: "conceive", meaning: "構想", ex_kr: "The child could not conceive the actual size of the Earth.", ex_zh: "孩子無法想像地球的實際大小。" },
            { id: 2723, word: "dubious", meaning: "可疑", ex_kr: "The police thought that the man’s description of the crime was dubious.", ex_zh: "警方認為該男子對犯罪過程的描述值得懷疑。" },
            { id: 2724, word: "ego", meaning: "自我", ex_kr: "Kelly’s ego made her think that she was some kind of a superhero.", ex_zh: "凱莉的自負讓她覺得自己像個超級英雄。" },
            { id: 2725, word: "elastic", meaning: "鬆緊帶", ex_kr: "He attached the elastic bungee to his legs before he jumped of the platform.", ex_zh: "他跳下平台前，先把彈力繩綁在腿上。" },
            { id: 2726, word: "endeavor", meaning: "努力", ex_kr: "The company’s new advertising endeavor ended in a horrible failure.", ex_zh: "該公司的新廣告嘗試以慘敗告終。" },
            { id: 2727, word: "engrave", meaning: "雕刻", ex_kr: "The couple engraved their names onto the old pine tree.", ex_zh: "這對夫婦將他們的名字刻在了這棵老松樹上。" },
            { id: 2728, word: "excavate", meaning: "挖掘", ex_kr: "The team wishes to excavate the site in hope of finding fossils.", ex_zh: "團隊希望挖掘該遺址，希望能找到化石。" },
            { id: 2729, word: "jagged", meaning: "鋸齒狀", ex_kr: "The swimmer was hurt when he fell on the jagged rocks.", ex_zh: "游泳者不慎跌倒在嶙峋的岩石上受傷。" },
            { id: 2730, word: "locale", meaning: "在地化", ex_kr: "The spa was the perfect locale for my mother to relax and enjoy her vacation.", ex_zh: "水療中心是我母親放鬆身心、享受假期的完美場所。" },
            { id: 2731, word: "magnitude", meaning: "規模", ex_kr: "This was a discovery of great magnitude.", ex_zh: "這是一項意義重大的發現。" },
            { id: 2732, word: "mold", meaning: "模具", ex_kr: "Using a cupcake mold will ensure that they come out just right.", ex_zh: "使用紙杯蛋糕模具可以確保烤出來的蛋糕大小合適。" },
            { id: 2733, word: "outright", meaning: "直接", ex_kr: "Everyone knew that the boy’s story was an outright lie.", ex_zh: "所有人都知道，這男孩說的話完全是謊言。" },
            { id: 2734, word: "periphery", meaning: "週邊", ex_kr: "A beautiful floral pattern is on the periphery of the stationery.", ex_zh: "文具邊緣印有精美的花卉圖案。" },
            { id: 2735, word: "plaster", meaning: "石膏", ex_kr: "He used plaster to fill in the cracks in the old walls.", ex_zh: "他用石膏填補了舊牆上的裂縫。" },
            { id: 2736, word: "shovel", meaning: "鏟", ex_kr: "The boy grabbed his shovel and got all of the snow off of the sidewalk.", ex_zh: "男孩拿起鏟子，把人行道上的積雪全部鏟掉了。" },
            { id: 2737, word: "skeletal", meaning: "骨骼", ex_kr: "We studied the skeletal system in anatomy class.", ex_zh: "我們在解剖課上學習了骨骼系統。" },
            { id: 2738, word: "stumble", meaning: "絆倒", ex_kr: "She stumbles a lot when she is drunk.", ex_zh: "她喝醉後常常跌跌撞撞。" },
            { id: 2739, word: "thigh", meaning: "大腿", ex_kr: "He suffered from a serious thigh injury.", ex_zh: "他大腿嚴重受傷。" },
            { id: 2740, word: "vicious", meaning: "惡毒", ex_kr: "The vicious dog tried to bite the small child.", ex_zh: "那條惡犬試圖咬那個小孩。" },
            { id: 2741, word: "attic", meaning: "閣樓", ex_kr: "There were two windows in their attic.", ex_zh: "他們家的閣樓有兩扇窗戶。" },
            { id: 2742, word: "chunk", meaning: "區塊", ex_kr: "When they broke open the rock, they saw it was filled with chunks of gold.", ex_zh: "當他們敲開岩石時，發現裡面全是金塊。" },
            { id: 2743, word: "civic", meaning: "國民", ex_kr: "Most of the important civic buildings are located downtown.", ex_zh: "大多數重要的市政建築都位於市中心。" },
            { id: 2744, word: "descent", meaning: "下降", ex_kr: "During the space shuttle’s descent, the Earth appeared larger and larger.", ex_zh: "在太空梭下降的過程中，地球看起來越來越大。" },
            { id: 2745, word: "din", meaning: "din", ex_kr: "The din of the rusty machinery made the factory a horrible place to work.", ex_zh: "鏽跡斑斑的機器發出的轟鳴聲，使工廠變成了一個可怕的工作場所。" },
            { id: 2746, word: "dissatisfy", meaning: "不滿足", ex_kr: "He was dissatisfied with his meal.", ex_zh: "他對飯菜很不滿意。" },
            { id: 2747, word: "fuss", meaning: "大驚小怪", ex_kr: "The child made an awful fuss because she didn’t want to go to bed.", ex_zh: "孩子因為不想睡覺而大哭大鬧。" },
            { id: 2748, word: "glamorous", meaning: "魅力四射", ex_kr: "There is nothing glamorous about where we live. It is very ordinary.", ex_zh: "我們住的地方一點也不豪華，非常普通。" },
            { id: 2749, word: "gourmet", meaning: "美食家", ex_kr: "In order to get a gourmet meal, you have to eat at an expensive restaurant.", ex_zh: "想要享用美食，就得去高級餐廳。" },
            { id: 2750, word: "hence", meaning: "因此", ex_kr: "Mary forgot the key. Hence, we couldn’t open the door.", ex_zh: "瑪莉忘了帶鑰匙，所以我們打不開門。" },
            { id: 2751, word: "intrinsic", meaning: "固有的", ex_kr: "Paper money has no intrinsic value. It is useful simply because society says it is.", ex_zh: "紙幣本身沒有內在價值。它之所以有用，只是因為社會賦予了它這種價值。" },
            { id: 2752, word: "kettle", meaning: "壺", ex_kr: "The soup was being cooked in a large kettle.", ex_zh: "湯正在一個大鍋子裡煮。" },
            { id: 2753, word: "ministry", meaning: "部", ex_kr: "The Ministry of Trade is responsible for taxing imports and exports.", ex_zh: "貿易部負責對進出口商品課稅。" },
            { id: 2754, word: "ordeal", meaning: "考驗", ex_kr: "Driving in the snowstorm was an ordeal she’d never forget.", ex_zh: "在暴風雪中駕車是她永遠不會忘記的磨難。" },
            { id: 2755, word: "outspoken", meaning: "直言不諱", ex_kr: "She was an outspoken critic about the new banking laws.", ex_zh: "她曾公開批評新的銀行法。" },
            { id: 2756, word: "overwork", meaning: "過度勞累", ex_kr: "After working for three weeks with only one day of rest, Judy was overworked.", ex_zh: "茱蒂連續工作了三週，只休息了一天，已經過度勞累了。" },
            { id: 2757, word: "particular", meaning: "特別的", ex_kr: "The dress shop didn’t have the particular dress she was looking for.", ex_zh: "這家服飾店沒有她想要的那款裙子。" },
            { id: 2758, word: "snore", meaning: "鼾", ex_kr: "It was impossible to get to sleep because my husband snored.", ex_zh: "因為老公打鼾，我根本無法入睡。" },
            { id: 2759, word: "soundly", meaning: "穩固地", ex_kr: "The nearest opponent was ten meters behind. She won the race soundly.", ex_zh: "她與最近的對手相距十公尺。她輕鬆贏得了比賽。" },
            { id: 2760, word: "superintendent", meaning: "督學", ex_kr: "The superintendent decided to close the schools because of the weather.", ex_zh: "由於天氣原因，校長決定關閉學校。" },
            { id: 2761, word: "congested", meaning: "擁擠", ex_kr: "Tom didn’t get home until after dark because the road was so congested.", ex_zh: "由於道路擁堵，湯姆直到天黑後才到家。" },
            { id: 2762, word: "courier", meaning: "導遊", ex_kr: "Before trains, most couriers used horses to travel.", ex_zh: "在火車出現之前，大多數信差都會使用馬匹出行。" },
            { id: 2763, word: "deform", meaning: "變形", ex_kr: "The computer program deformed the building’s picture into an unreal sight.", ex_zh: "電腦程式將建築物的圖像扭曲成不真實的景象。" },
            { id: 2764, word: "etiquette", meaning: "禮儀", ex_kr: "When in Asian countries, bowing is a form of etiquette.", ex_zh: "在亞洲國家，鞠躬是一種禮儀。" },
            { id: 2765, word: "exclusive", meaning: "獨家的", ex_kr: "The golf course was so exclusive that most people hadn’t even heard of it.", ex_zh: "這個高爾夫球場非常私密，以至於大多數人甚至從未聽說過。" },
            { id: 2766, word: "freight", meaning: "貨運", ex_kr: "Trade ships only carried valuable freight like silk and spices.", ex_zh: "商船隻運送絲綢、香料等貴重貨物。" },
            { id: 2767, word: "garment", meaning: "服裝", ex_kr: "The businessman had all of his garments cleaned before the important meeting.", ex_zh: "這位商人為了參加重要會議，把所有衣服都洗了一遍。" },
            { id: 2768, word: "insomnia", meaning: "失眠", ex_kr: "Nate’s insomnia prevented him from getting enough rest.", ex_zh: "內特的失眠症讓他無法獲得充足的休息。" },
            { id: 2769, word: "intuitive", meaning: "直覺的", ex_kr: "Rhonda had an intuitive feeling that Shane wasn’t coming to school today.", ex_zh: "朗達有一種直覺，覺得肖恩今天不會來上學。" },
            { id: 2770, word: "liable", meaning: "容易", ex_kr: "During the summer months, hikers in the forest are liable to see deer and elk.", ex_zh: "夏季，在森林裡健行的人很有可能會看到鹿和麋鹿。" },
            { id: 2771, word: "obsess", meaning: "纏住", ex_kr: "After watching the Star Wars movies, Ike obsessed about becoming a Jedi.", ex_zh: "看完《星際大戰》電影後，艾克沉迷於成為絕地武士。" },
            { id: 2772, word: "overboard", meaning: "落水", ex_kr: "Tom and Gary slipped on the wet floor and fell overboard.", ex_zh: "湯姆和加里在濕滑的地板上滑倒，掉進了海裡。" },
            { id: 2773, word: "premium", meaning: "優質的", ex_kr: "Tony paid a premium for the gas because it made his car run better.", ex_zh: "托尼願意花高價買汽油，因為這樣能讓他的車跑得更好。" },
            { id: 2774, word: "privilege", meaning: "特權", ex_kr: "Only the best employee had the privilege of parking in that spot.", ex_zh: "只有最優秀的員工才有資格停在那個車位。" },
            { id: 2775, word: "propel", meaning: "推進", ex_kr: "The strong wind propelled the leaf through the air and across the street.", ex_zh: "強風將樹葉吹過空中，越過街道。" },
            { id: 2776, word: "socialize", meaning: "社群", ex_kr: "I like to socialize with my classmates after school.", ex_zh: "放學後我喜歡和同學聚會。" },
            { id: 2777, word: "suppress", meaning: "壓制", ex_kr: "She suppressed her urge to scream because she didn’t want to be noticed.", ex_zh: "她強忍住尖叫的衝動，因為她不想被注意到。" },
            { id: 2778, word: "tram", meaning: "電車", ex_kr: "I took the tram to Eighth Avenue.", ex_zh: "我搭乘電車去了第八大道。" },
            { id: 2779, word: "unsettle", meaning: "不安", ex_kr: "The dark clouds in the sky unsettled Beth.", ex_zh: "天空中的烏雲讓貝絲感到不安。" },
            { id: 2780, word: "warp", meaning: "經", ex_kr: "The woman put the clock above the fireplace, and the heat warped it.", ex_zh: "女人把鐘放在壁爐上方，高溫使鐘變形了。" },
            { id: 2781, word: "accumulate", meaning: "累積", ex_kr: "The mail accumulated in their mailbox while they were on vacation.", ex_zh: "他們度假期間，郵箱裡積攢了不少郵件。" },
            { id: 2782, word: "aerial", meaning: "天線", ex_kr: "The aerial photographer took pictures from the air balloon.", ex_zh: "空中攝影師從熱氣球上拍攝了照片。" },
            { id: 2783, word: "apparatus", meaning: "裝置", ex_kr: "The campers had an apparatus that showed them their exact location.", ex_zh: "露營者使用了一種可以顯示他們確切位置的設備。" },
            { id: 2784, word: "avalanche", meaning: "雪崩", ex_kr: "The avalanche destroyed the mountain village.", ex_zh: "雪崩摧毀了山村。" },
            { id: 2785, word: "consistency", meaning: "一致性", ex_kr: "Her consistency in archery meant that our team had a chance to win.", ex_zh: "她在射箭方面的穩定表現意味著我們隊有機會獲勝。" },
            { id: 2786, word: "discharge", meaning: "釋放", ex_kr: "I was discharged from the hospital after three days.", ex_zh: "三天後我出院了。" },
            { id: 2787, word: "episode", meaning: "插曲", ex_kr: "We watched the final exciting episode of the TV series.", ex_zh: "我們觀看了這部電視劇精彩的最後一集。" },
            { id: 2788, word: "intact", meaning: "完好無損的", ex_kr: "Despite being over 30 years old, my father’s model ship is still intact.", ex_zh: "儘管已經有30多年的歷史，我父親的模型船仍然完好無損。" },
            { id: 2789, word: "mortal", meaning: "凡人", ex_kr: "All people are mortal.", ex_zh: "人皆有死。" },
            { id: 2790, word: "omen", meaning: "預兆", ex_kr: "He thought that seeing a black cat in the street was an omen of bad luck.", ex_zh: "他認為在街上看到黑貓是不祥之兆。" },
            { id: 2791, word: "overcast", meaning: "灰濛濛", ex_kr: "The sky was overcast in the morning, but by noon it was bright again.", ex_zh: "早晨天空陰沉，但到了中午就放晴了。" },
            { id: 2792, word: "poignant", meaning: "令人心酸的", ex_kr: "The girls cried at the end of the poignant movie.", ex_zh: "這部感人至深的電影結束後，女孩們都哭了。" },
            { id: 2793, word: "ranger", meaning: "遊俠", ex_kr: "Peter wanted to be a ranger because he liked spending time outside.", ex_zh: "彼得想當護林員，因為他喜歡待在戶外。" },
            { id: 2794, word: "rubble", meaning: "瓦礫", ex_kr: "There was rubble all over the city after the earthquake.", ex_zh: "地震後，城市裡到處都是瓦礫。" },
            { id: 2795, word: "seclude", meaning: "隔離", ex_kr: "She was secluded on an island for over a year.", ex_zh: "她在島上隱居了一年多。" },
            { id: 2796, word: "sideways", meaning: "側身", ex_kr: "Jim turned sideways in order to slow down and stop his snowboard.", ex_zh: "吉姆側身滑行，以減緩並停止滑雪板。" },
            { id: 2797, word: "sob", meaning: "哭泣", ex_kr: "I sobbed when my youngest daughter got married.", ex_zh: "我小女兒結婚時，我哭了起來。" },
            { id: 2798, word: "sober", meaning: "清醒", ex_kr: "After the funeral, everybody felt very sober.", ex_zh: "葬禮結束後，大家都感到非常清醒。" },
            { id: 2799, word: "speck", meaning: "斑點", ex_kr: "A speck of blood appeared where the mosquito had bit him.", ex_zh: "蚊子叮咬的地方出現了一小點血跡。" },
            { id: 2800, word: "upbringing", meaning: "教養", ex_kr: "He had a strict upbringing and was never allowed to watch television.", ex_zh: "他從小家教很嚴，從來不被允許看電視。" },
            { id: 2801, word: "bliss", meaning: "極樂", ex_kr: "Every time he sees his girlfriend, he feels a sense of bliss.", ex_zh: "每次見到女朋友，他都感到無比幸福。" },
            { id: 2802, word: "butler", meaning: "管家", ex_kr: "Whenever he needed something, he rang a bell, and the butler appeared.", ex_zh: "每當他需要什麼時，他就會搖鈴，管家就會出現。" },
            { id: 2803, word: "cramp", meaning: "抽筋", ex_kr: "After the marathon, Jenny got a terrible cramp in her calf muscle.", ex_zh: "馬拉松結束後，珍妮的小腿肌肉嚴重抽筋。" },
            { id: 2804, word: "decorate", meaning: "裝飾", ex_kr: "Have you decorated the room for Christmas yet?", ex_zh: "你的房間佈置好聖誕節裝飾了嗎？" },
            { id: 2805, word: "dilapidated", meaning: "破舊的", ex_kr: "Paint peeled off of the old dilapidated apartment building.", ex_zh: "老舊破舊的公寓大樓油漆剝落了。" },
            { id: 2806, word: "evoke", meaning: "喚起", ex_kr: "The picture evoked memories of when she was a young girl.", ex_zh: "這張照片喚起了她少女時代的回憶。" },
            { id: 2807, word: "farewell", meaning: "告別", ex_kr: "She got on the plane after we said our farewells.", ex_zh: "我們道別後，她就登上飛機了。" },
            { id: 2808, word: "faucet", meaning: "龍頭", ex_kr: "Turn off the faucet when you are done brushing your teeth.", ex_zh: "刷完牙後請關掉水龍頭。" },
            { id: 2809, word: "filth", meaning: "污穢", ex_kr: "There was tons of filth and trash on the shore of the river.", ex_zh: "河岸邊堆滿了污垢和垃圾。" },
            { id: 2810, word: "flaw", meaning: "缺陷", ex_kr: "We discovered a major flaw in the metal chain.", ex_zh: "我們發現金屬鏈條有重大缺陷。" },
            { id: 2811, word: "grin", meaning: "咧嘴笑", ex_kr: "That joke makes me grin every time I hear it.", ex_zh: "每次聽到這個笑話，我都會忍不住咧嘴笑。" },
            { id: 2812, word: "housekeeping", meaning: "家政", ex_kr: "Housekeeping is not much fun, but it has to be done.", ex_zh: "家務活雖然沒什麼樂趣，但卻不得不做。" },
            { id: 2813, word: "mound", meaning: "塚", ex_kr: "There was a mound of clothes on the teenager’s messy floor.", ex_zh: "少年凌亂的地板上堆著一大堆衣服。" },
            { id: 2814, word: "numb", meaning: "麻木感", ex_kr: "After holding my hand under the icy water, my fingers were numb.", ex_zh: "把手伸到冰冷的水下後，我的手指都麻木了。" },
            { id: 2815, word: "reckless", meaning: "魯莽", ex_kr: "The reckless driver posed a threat to everyone else on the road.", ex_zh: "魯莽駕駛的司機對路上的其他所有人構成了威脅。" },
            { id: 2816, word: "slate", meaning: "石板", ex_kr: "The roof of the church is made of slate.", ex_zh: "教堂的屋頂是用石板鋪成的。" },
            { id: 2817, word: "stool", meaning: "凳子", ex_kr: "I don’t find stools very comfortable to sit on.", ex_zh: "我覺得凳子坐起來不太舒服。" },
            { id: 2818, word: "testament", meaning: "遺囑", ex_kr: "The beautiful performance was a testament to the singer’s natural talents.", ex_zh: "這場精彩的表演充分展現了這位歌手的天賦。" },
            { id: 2819, word: "timber", meaning: "木材", ex_kr: "Trees in this area are grown specifically to be used for timber.", ex_zh: "這一區的樹木都是專門為了生產木材而種植的。" },
            { id: 2820, word: "valve", meaning: "閥門", ex_kr: "The mechanic removed the dirt to clear the engine valve.", ex_zh: "技工清除了污垢，清理了引擎氣門。" },
            { id: 2821, word: "camouflage", meaning: "偽裝", ex_kr: "The green and brown camouflage was best used for hiding in forests and jungles.", ex_zh: "綠色和棕色的迷彩服最適合在森林和叢林中隱藏。" },
            { id: 2822, word: "confront", meaning: "面對", ex_kr: "I confronted him as he left the meeting and told him I thought he was wrong.", ex_zh: "他離開會議時，我當面質問他，並告訴他我認為他錯了。" },
            { id: 2823, word: "contemplate", meaning: "沉思", ex_kr: "Mark took a moment to contemplate the math problem before solving it.", ex_zh: "馬克花了一點時間思考這道數學題，然後才開始解答。" },
            { id: 2824, word: "contend", meaning: "抗衡", ex_kr: "Stacy had to contend with a learning disability throughout high school.", ex_zh: "史泰西在整個高中時期都必須與學習障礙作鬥爭。" },
            { id: 2825, word: "cot", meaning: "嬰兒床", ex_kr: "At the camp, the boys’ cabin was lined with cots.", ex_zh: "營地裡，男孩們的營房裡擺滿了行軍床。" },
            { id: 2826, word: "enlist", meaning: "入伍", ex_kr: "In their final year at school, the students were asked to enlist in the military.", ex_zh: "在學校的最後一年，學生被要求參軍。" },
            { id: 2827, word: "frontier", meaning: "邊境", ex_kr: "A fence was built along the frontier where the river curved.", ex_zh: "在河流彎曲的邊界處建造了一道柵欄。" },
            { id: 2828, word: "guerilla", meaning: "遊擊隊", ex_kr: "Guerilla warfare involves a lot of hit-and-run fighting.", ex_zh: "遊擊戰包含大量的攻擊和撤退作戰。" },
            { id: 2829, word: "handbook", meaning: "手冊", ex_kr: "If you look at the handbook, it will tell you which wires to connect to the TV.", ex_zh: "查閱手冊後，你會知道應該將哪些電線連接到電視機上。" },
            { id: 2830, word: "hesitant", meaning: "猶豫不決", ex_kr: "Although he knew the answer, he was hesitant to say it because he might be wrong.", ex_zh: "雖然他知道答案，但他猶豫著不敢說出來，因為他可能錯了。" },
            { id: 2831, word: "lush", meaning: "鬱鬱蔥蔥", ex_kr: "The lush jungle was filled with plants, trees, and vines.", ex_zh: "茂密的叢林長滿了植物、樹木和藤蔓。" },
            { id: 2832, word: "outfit", meaning: "全套服裝", ex_kr: "Kelly’s new outfit made her look so glamourous.", ex_zh: "凱莉的新裝扮讓她看起來光彩照人。" },
            { id: 2833, word: "paw", meaning: "爪子", ex_kr: "The kitten cleaned its paws with its tongue.", ex_zh: "小貓用舌頭舔乾淨了爪子。" },
            { id: 2834, word: "splendid", meaning: "燦爛", ex_kr: "From his head down to his shoes, his clothes looked splendid.", ex_zh: "從頭到腳，他的衣服看起來都非常考究。" },
            { id: 2835, word: "stray", meaning: "流浪", ex_kr: "He found himself lost because he had strayed from the tour group.", ex_zh: "他迷路了，因為他跟旅行團走散了。" },
            { id: 2836, word: "substantial", meaning: "重大的", ex_kr: "The bank said that he owed it a substantial amount of money.", ex_zh: "銀行稱他欠銀行一大筆錢。" },
            { id: 2837, word: "torch", meaning: "火炬", ex_kr: "He grabbed a piece of wood and stuck it in the fire in order to make a torch.", ex_zh: "他抓起一塊木頭，插進火裡做成火把。" },
            { id: 2838, word: "tract", meaning: "頻道", ex_kr: "On the other side of the mountains, there was a long tract of forest.", ex_zh: "山的另一邊是一片廣闊的森林。" },
            { id: 2839, word: "vigil", meaning: "守夜", ex_kr: "He had a vigil in front of the tomb for three days.", ex_zh: "他在墓前守夜三天。" },
            { id: 2840, word: "weary", meaning: "厭倦", ex_kr: "Jane was weary after a long day of work.", ex_zh: "簡工作了一整天，感到很疲憊。" },
            { id: 2841, word: "amid", meaning: "之中", ex_kr: "The bee was busily flying amid the flowers in the garden.", ex_zh: "蜜蜂在花園的花叢中忙碌地飛來飛去。" },
            { id: 2842, word: "backstage", meaning: "後台", ex_kr: "After the show, the director went backstage and thanked the actors.", ex_zh: "演出結束後，導演走到後台感謝了演員們。" },
            { id: 2843, word: "billionaire", meaning: "億萬富翁", ex_kr: "The sale of his inventions made the inventor a billionaire.", ex_zh: "發明家透過出售自己的發明成為億萬富翁。" },
            { id: 2844, word: "brute", meaning: "蠻力", ex_kr: "My older brother can act like a brute when he doesn’t get his way.", ex_zh: "我哥哥如果不如意，就會變得很粗魯。" },
            { id: 2845, word: "clumsy", meaning: "笨拙", ex_kr: "The businessman was clumsy and dropped his work files.", ex_zh: "這位商人動作笨拙，不小心把工作文件掉在了地上。" },
            { id: 2846, word: "collide", meaning: "碰撞", ex_kr: "The two cars collided with each other because their drivers were not careful.", ex_zh: "兩輛車相撞是因為司機不夠小心。" },
            { id: 2847, word: "culprit", meaning: "罪魁禍首", ex_kr: "The police were still searching for the culprit from the robbery.", ex_zh: "警方仍在追捕搶劫案的罪犯。" },
            { id: 2848, word: "evacuate", meaning: "撤離", ex_kr: "During the flood, many families were evacuated to higher ground.", ex_zh: "洪水期間，許多家庭被疏散到地勢較高的地方。" },
            { id: 2849, word: "flammable", meaning: "易燃", ex_kr: "Be careful with that blanket near the candle. It is extremely flammable.", ex_zh: "注意蠟燭附近的毯子，它極易燃。" },
            { id: 2850, word: "mob", meaning: "暴民", ex_kr: "The copier was destroyed by a mob of angry workers.", ex_zh: "影印機被一群憤怒的工人砸毀了。" },
            { id: 2851, word: "premature", meaning: "過早", ex_kr: "Mark’s celebration was premature because the ball hadn’t fallen in the hole.", ex_zh: "馬克慶祝得太早了，因為球還沒進洞。" },
            { id: 2852, word: "resent", meaning: "怨恨", ex_kr: "He resented the fact that he had never been able to play an instrument.", ex_zh: "他很遺憾自己從未學會演奏樂器。" },
            { id: 2853, word: "satire", meaning: "諷刺", ex_kr: "This book is a satire of what life was like in the army.", ex_zh: "這本書諷刺了軍隊生活。" },
            { id: 2854, word: "scrutiny", meaning: "審查", ex_kr: "A scientist should always practice scrutiny with their work.", ex_zh: "科學家應該始終對自己的工作保持嚴謹的態度。" },
            { id: 2855, word: "segregate", meaning: "分離", ex_kr: "In gym class, the children were segregated into two groups: boys and girls.", ex_zh: "體育課上，孩子分成兩組：男生和女生。" },
            { id: 2856, word: "subject", meaning: "主題", ex_kr: "The officers subjected everyone to a careful search before they left the plane.", ex_zh: "在所有人下飛機之前，警官們對他們進行了仔細搜查。" },
            { id: 2857, word: "testify", meaning: "作證", ex_kr: "The judge listened while the victim testified about the robbery.", ex_zh: "法官認真聆聽了受害者關於搶劫案的證詞。" },
            { id: 2858, word: "tumult", meaning: "騷亂", ex_kr: "She couldn’t hear her friend over the tumult of the other excited guests.", ex_zh: "其他興奮的客人喧鬧聲中，她聽不到朋友的聲音。" },
            { id: 2859, word: "underestimate", meaning: "低估", ex_kr: "We lost the game because we underestimated the other team’s skill.", ex_zh: "我們輸掉比賽是因為我們低估了對方球隊的實力。" },
            { id: 2860, word: "uproar", meaning: "騷動", ex_kr: "The fans made a great uproar when their team lost the game.", ex_zh: "球隊輸球時，球迷一片嘩然。" },
            { id: 2861, word: "accelerate", meaning: "加速", ex_kr: "When he stepped on the gas pedal, the motorcycle accelerated.", ex_zh: "他踩下油門踏板，摩托車就加速了。" },
            { id: 2862, word: "anew", meaning: "重新", ex_kr: "Although he had failed his driving test, he decided to try it anew.", ex_zh: "雖然他第一次駕照考試沒通過，但他決定再試一次。" },
            { id: 2863, word: "defect", meaning: "缺點", ex_kr: "All these bottles have a defect and must be sent back to the warehouse.", ex_zh: "這些瓶子都有缺陷，必須退回倉庫。" },
            { id: 2864, word: "dreary", meaning: "淒涼", ex_kr: "After the fire, this section of forest is rather dreary.", ex_zh: "火災過後，這片森林顯得相當荒涼。" },
            { id: 2865, word: "duplicate", meaning: "複製", ex_kr: "She duplicated her friend’s movements like she was in front of a mirror.", ex_zh: "她模仿朋友的動作，就像對著鏡子一樣。" },
            { id: 2866, word: "electromagnetic", meaning: "電磁", ex_kr: "Different colors of light come from different levels of electromagnetic energy.", ex_zh: "不同顏色的光來自不同強度的電磁能量。" },
            { id: 2867, word: "electron", meaning: "電子", ex_kr: "The number of electrons in an atom determines its charge.", ex_zh: "原子中的電子數決定了它的電荷。" },
            { id: 2868, word: "glide", meaning: "滑行", ex_kr: "When the wind is blowing, birds can glide easily through the sky.", ex_zh: "風吹的時候，鳥兒可以輕鬆地在空中滑翔。" },
            { id: 2869, word: "ingenious", meaning: "巧妙", ex_kr: "Charles was the only person ingenious enough to repair the plane’s engines.", ex_zh: "只有查爾斯有能力修理飛機引擎。" },
            { id: 2870, word: "innovation", meaning: "創新", ex_kr: "Mrs. Johnson made a great innovation to the company’s business plan.", ex_zh: "約翰遜夫人對該公司的商業計劃進行了一項重大創新。" },
            { id: 2871, word: "innovative", meaning: "創新的", ex_kr: "Since Peter was so innovative, he was chosen to lead the science team.", ex_zh: "由於彼得極具創新精神，他被選中領導科學團隊。" },
            { id: 2872, word: "launch", meaning: "發射", ex_kr: "The boat launched from the dock and foated down the river.", ex_zh: "船從碼頭下水，順流而下。" },
            { id: 2873, word: "meteorological", meaning: "氣象", ex_kr: "The thunderstorm was so large that it became a great meteorological event.", ex_zh: "這場雷暴規模巨大，成為了重大的氣象事件。" },
            { id: 2874, word: "meteorology", meaning: "氣象", ex_kr: "In order to understand the weather better, you should study meteorology.", ex_zh: "為了更好地了解天氣，你應該學習氣象學。" },
            { id: 2875, word: "penetrate", meaning: "穿透", ex_kr: "The knife easily penetrated the surface of the orange.", ex_zh: "刀子輕易地刺穿了橘子的表面。" },
            { id: 2876, word: "persistent", meaning: "執著的", ex_kr: "They made persistent attempts to get him to eat.", ex_zh: "他們不斷嘗試讓他吃東西。" },
            { id: 2877, word: "propulsion", meaning: "推進", ex_kr: "The propulsion lifted the rocket into the sky.", ex_zh: "推進力將火箭送入了天空。" },
            { id: 2878, word: "simulate", meaning: "模擬", ex_kr: "The French language teacher could simulate the accent of a French citizen.", ex_zh: "這位法文老師可以模仿法國人的口音。" },
            { id: 2879, word: "spur", meaning: "刺", ex_kr: "The coach’s speech spurred her team into playing the best game of their lives.", ex_zh: "教練的演講激勵她的隊員們打出了她們人生中最精彩的一場比賽。" },
            { id: 2880, word: "stimulate", meaning: "刺激", ex_kr: "Doctors sometimes use electric shock to stimulate a patient’s heartbeat.", ex_zh: "醫生有時會使用電擊來刺激病人的心跳。" },
            { id: 2881, word: "beforehand", meaning: "預先", ex_kr: "He packed his luggage beforehand, so he was able to leave right away.", ex_zh: "他事先收拾好了行李，所以能夠立即出發。" },
            { id: 2882, word: "blurred", meaning: "模糊", ex_kr: "There was blurred photographs of what was supposed to be a flying saucer.", ex_zh: "有一些模糊的照片，照片上似乎是一架飛碟。" },
            { id: 2883, word: "centigrade", meaning: "攝氏度", ex_kr: "During the spring time, the temperature gets as warm as 26 degrees centigrade.", ex_zh: "春季氣溫最高可達攝氏26度。" },
            { id: 2884, word: "chatter", meaning: "喋喋不休", ex_kr: "The children chattered in the back of the classroom.", ex_zh: "孩子們在教室後排嘰嘰喳喳地聊天。" },
            { id: 2885, word: "concerto", meaning: "協奏曲", ex_kr: "The piano concerto has a section in which only the piano plays.", ex_zh: "鋼琴協奏曲中有一個部分只有鋼琴演奏。" },
            { id: 2886, word: "condense", meaning: "凝結", ex_kr: "The cool air made tiny drops of water condense on the tops of the grass.", ex_zh: "涼爽的空氣使草尖凝結成細小的水滴。" },
            { id: 2887, word: "deteriorate", meaning: "惡化", ex_kr: "The nation’s economy continued to deteriorate despite the politicians’ efforts.", ex_zh: "儘管政界人士做出了努力，但國家經濟仍持續惡化。" },
            { id: 2888, word: "degree", meaning: "程度", ex_kr: "The thermometer recorded a temperature of 38 degrees Celsius.", ex_zh: "溫度計顯示溫度為攝氏38度。" },
            { id: 2889, word: "exterior", meaning: "外部的", ex_kr: "The exterior of the nut was hard and woody, but the inside was soft and delicious.", ex_zh: "這種堅果的外皮堅硬如木，但內部卻柔軟美味。" },
            { id: 2890, word: "hearty", meaning: "爽朗", ex_kr: "The grandmother ended her story with a hearty laugh that pleased her grandchild.", ex_zh: "奶奶講完故事後，爽朗地大笑起來，這讓她的孫子很開心。" },
            { id: 2891, word: "hospitable", meaning: "好客", ex_kr: "At dinner, my dad was very hospitable to my friends.", ex_zh: "晚餐時，我爸爸對我的朋友們非常熱情好客。" },
            { id: 2892, word: "humor", meaning: "幽默", ex_kr: "He woke up in an ill humor, angry at everyone.", ex_zh: "他醒來時心情很差，對每個人都很生氣。" },
            { id: 2893, word: "manor", meaning: "莊園", ex_kr: "The manor had over forty rooms and beautiful gardens.", ex_zh: "莊園有四十多個房間和美麗的花園。" },
            { id: 2894, word: "monastery", meaning: "修道院", ex_kr: "The monks at this monastery are famous for their bread and music.", ex_zh: "這家修道院的僧侶以麵包和音樂聞名。" },
            { id: 2895, word: "nursery", meaning: "苗圃", ex_kr: "The children kissed their parents goodnight and went upstairs to the nursery.", ex_zh: "孩子們吻別父母道晚安，然後上樓去了育嬰室。" },
            { id: 2896, word: "outstretched", meaning: "伸展", ex_kr: "The cat stood on its back legs with its front legs outstretched.", ex_zh: "貓用後腿站立，前腿伸直。" },
            { id: 2897, word: "parcel", meaning: "包裹", ex_kr: "The parcel looked like it had been stepped on by someone.", ex_zh: "包裹看起來像是被人踩過。" },
            { id: 2898, word: "profile", meaning: "輪廓", ex_kr: "The drawing of Olivia’s profile came out very well.", ex_zh: "奧莉薇亞的側臉畫像畫得非常好。" },
            { id: 2899, word: "winding", meaning: "繞線", ex_kr: "The winding river turned and looped around the hills.", ex_zh: "蜿蜒的河流繞過群山，形成一個個環形。" },
            { id: 2900, word: "zip", meaning: "拉鍊", ex_kr: "She zipped her backpack closed after putting her books inside it.", ex_zh: "她把書放進背包後，拉上了拉鍊。" },
            { id: 2901, word: "abolish", meaning: "取消", ex_kr: "President Lincoln abolished slavery in the US.", ex_zh: "林肯總統廢除了美國的奴隸制度。" },
            { id: 2902, word: "amend", meaning: "修正", ex_kr: "The countries were in agreement that the treaty needed to be amended.", ex_zh: "各國一致認為需要對該條約進行修訂。" },
            { id: 2903, word: "aspire", meaning: "渴望", ex_kr: "George aspired to be a doctor from a young age.", ex_zh: "喬治從小就立志成為醫生。" },
            { id: 2904, word: "censor", meaning: "審查", ex_kr: "To protect innocent people, the location of the bomb was censored.", ex_zh: "為了保護無辜民眾，炸彈的放置地點被隱去。" },
            { id: 2905, word: "charter", meaning: "憲章", ex_kr: "The company charter explained that all employees had to pay a tax.", ex_zh: "公司章程規定所有員工都必須繳稅。" },
            { id: 2906, word: "constitution", meaning: "憲法", ex_kr: "The country’s constitution said a prime minister could only serve three terms.", ex_zh: "該國憲法規定，總理最多只能連任三屆。" },
            { id: 2907, word: "cosmopolitan", meaning: "國際化", ex_kr: "There are dozens of different types of restaurants in a cosmopolitan city.", ex_zh: "在一個國際大都市裡，有幾十種不同類型的餐廳。" },
            { id: 2908, word: "disseminate", meaning: "傳播", ex_kr: "The organization disseminates information about the dangers of smoking.", ex_zh: "該組織致力於傳播吸煙危害的相關訊息。" },
            { id: 2909, word: "flatter", meaning: "奉承", ex_kr: "He was just flattering me when he said that my new dress looked gorgeous.", ex_zh: "他說我的新裙子很漂亮，那隻是在恭維我而已。" },
            { id: 2910, word: "infamous", meaning: "臭名昭著的", ex_kr: "That news channel is infamous for presenting biased information.", ex_zh: "那個新聞頻道因發布帶有偏見的信息而臭名昭著。" },
            { id: 2911, word: "lame", meaning: "跛", ex_kr: "The terrible accident left many people dead and several others lame.", ex_zh: "這場可怕的意外造成多人死亡，另有多人殘疾。" },
            { id: 2912, word: "limp", meaning: "跛行", ex_kr: "After the injury, the player limped off of the field.", ex_zh: "受傷後，這名球員一瘸一拐地離開了球場。" },
            { id: 2913, word: "outburst", meaning: "爆發", ex_kr: "There was an outburst of cheers when the comedian took the stage.", ex_zh: "喜劇演員登台時，現場爆發出熱烈的歡呼聲。" },
            { id: 2914, word: "pathological", meaning: "病理", ex_kr: "The pathological liar could not even tell the truth about unimportant matters.", ex_zh: "這個病態的說謊者甚至連無關緊要的事情都說不出真話。" },
            { id: 2915, word: "phenomenal", meaning: "非凡的", ex_kr: "The child’s ability to play the piano is nothing short of phenomenal.", ex_zh: "這孩子的鋼琴演奏能力簡直令人驚嘆。" },
            { id: 2916, word: "poll", meaning: "輪詢", ex_kr: "The poll showed that many people support the plan to stop gang violence.", ex_zh: "民調顯示，許多人支持制止幫派暴力的計畫。" },
            { id: 2917, word: "remorse", meaning: "悔恨", ex_kr: "When I realized what I had done, I felt remorse for my actions.", ex_zh: "當我意識到自己做了什麼之後，我為自己的行為感到懊悔。" },
            { id: 2918, word: "secrecy", meaning: "保密", ex_kr: "The secrecy of the big organization made the government nervous.", ex_zh: "這個大組織的保密性讓政府感到不安。" },
            { id: 2919, word: "tackle", meaning: "處理", ex_kr: "Such social problems need to be tackled right away.", ex_zh: "這些社會問題需要立即著手解決。" },
            { id: 2920, word: "trance", meaning: "發呆", ex_kr: "The woman’s powerful eyes often put men in a trance.", ex_zh: "這個女人的眼神充滿力量，常常讓男人著迷。" },
            { id: 2921, word: "coward", meaning: "懦夫", ex_kr: "A firefighter cannot be a coward. They have to be able to act quickly.", ex_zh: "消防員不能是懦夫，他們必須能夠迅速行動。" },
            { id: 2922, word: "delete", meaning: "刪除", ex_kr: "Several lines had been deleted from her speech.", ex_zh: "她的演講稿刪掉了幾行。" },
            { id: 2923, word: "earnest", meaning: "認真", ex_kr: "The child was very earnest when she told her mother how she broke the dish.", ex_zh: "孩子非常認真地告訴媽媽她是怎麼打破盤子的。" },
            { id: 2924, word: "ethnic", meaning: "種族的", ex_kr: "Many sections of the city are home to different ethnic communities.", ex_zh: "城市的許多地區都居住著不同的族裔社區。" },
            { id: 2925, word: "exclude", meaning: "排除", ex_kr: "Carol was excluded from the contest because her friend was a judge.", ex_zh: "卡羅爾被排除在比賽之外，因為她的朋友是評委。" },
            { id: 2926, word: "firsthand", meaning: "第一手", ex_kr: "If you want firsthand knowledge, ask someone who saw it.", ex_zh: "如果你想獲得第一手訊息，就去問親眼見過的人。" },
            { id: 2927, word: "fluent", meaning: "流暢", ex_kr: "She was so fluent in German that you’d have thought she was from Germany.", ex_zh: "她的德語非常流利，你會以為她是德國人。" },
            { id: 2928, word: "imperial", meaning: "帝國", ex_kr: "These old imperial coins were once used in the Roman Empire.", ex_zh: "這些古老的帝國硬幣曾於羅馬帝國時期流通。" },
            { id: 2929, word: "inclusive", meaning: "包容性", ex_kr: "A more inclusive event would have allowed children to attend.", ex_zh: "如果活動更具包容性，孩子們就可以參加了。" },
            { id: 2930, word: "legislature", meaning: "立法機關", ex_kr: "The senator had served ten years in the national legislature.", ex_zh: "這位參議員曾在國民議會任職十年。" },
            { id: 2931, word: "linguistic", meaning: "語言學", ex_kr: "A linguistic way of studying culture focuses on words within that culture.", ex_zh: "語言學方法研究文化著重於該文化中的詞彙。" },
            { id: 2932, word: "monolingual", meaning: "單語", ex_kr: "In today’s global economy, being monolingual limits your opportunities.", ex_zh: "在當今全球經濟中，只會說一種語言會限制你的機會。" },
            { id: 2933, word: "nationality", meaning: "國籍", ex_kr: "His nationality is German, but he speaks French, Spanish, and Korean.", ex_zh: "他是德國國籍，但會說法語、西班牙語和韓語。" },
            { id: 2934, word: "patriot", meaning: "愛國者", ex_kr: "Every year, young patriots join their countries’ militaries.", ex_zh: "每年都有年輕的愛國者加入本國軍隊。" },
            { id: 2935, word: "prosecute", meaning: "起訴", ex_kr: "They were prosecuted for fishing in the river without a permit.", ex_zh: "他們因無證在河裡捕魚而被起訴。" },

            { id: 2999, word: "vice versa", meaning: "反之亦然", ex_kr: "Students learn from their teachers, and vice versa.", ex_zh: "學生從老師那裡學習，反之亦然。" },
            { id: 3000, word: "whereabouts", meaning: "下落", ex_kr: "The police looked for the lost dog, but its whereabouts were still unknown.", ex_zh: "警方一直在尋找這隻走失的狗，但至今仍未找到它的下落。" }

        ];

        let srsData = {};
        try {
            srsData = JSON.parse(localStorage.getItem('topik_srs_v2') || "{}");
        } catch(e) { srsData = {}; }

        let quotaState = {
            lastDate: "", dailyQueue: [], newBatchIds: [], reviewBatchIds: [], 
            sessionDoneIds: [], sessionMistakeIds: [], reappearTimes: {}
        };
        try {
            const savedQuota = localStorage.getItem('topik_quota_v2');
            if (savedQuota) quotaState = Object.assign(quotaState, JSON.parse(savedQuota));
        } catch(e) {}

        let dueWords = [], previewIndex = 0, currentSubTab = 'new';
        let filteredVocab = [];
        let displayCount = 30;
        const BATCH_SIZE = 30;
        let sessionInitialized = false;

        function isNewWord(id) {
            if (!srsData[id] || !srsData[id].firstDiscoveryDate) return true;
            const discovery = new Date(srsData[id].firstDiscoveryDate).toLocaleDateString();
            return discovery === new Date().toLocaleDateString();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function checkAndResetQuota() {
            const today = new Date().toLocaleDateString();
            const now = Date.now();
            
            if (quotaState.lastDate !== today) {
                const unlearned = initialVocab.filter(v => !srsData[v.id]);
                const news = shuffleArray([...unlearned]).slice(0, DAILY_NEW_LIMIT);
                
                news.forEach(v => { 
                    if (!srsData[v.id]) srsData[v.id] = { firstDiscoveryDate: now, nextReview: 0, interval: 0 }; 
                });

                quotaState = { 
                    lastDate: today, 
                    dailyQueue: [], 
                    newBatchIds: news.map(v => v.id), 
                    reviewBatchIds: [], 
                    sessionDoneIds: [], 
                    sessionMistakeIds: [], 
                    reappearTimes: {} 
                };
                sessionInitialized = false;
            }

            if (!sessionInitialized) {
                const allDueReviews = initialVocab.filter(v => 
                    srsData[v.id] && 
                    !isNewWord(v.id) && 
                    srsData[v.id].nextReview <= now
                ).map(v => v.id);

                quotaState.reviewBatchIds = shuffleArray([...allDueReviews]).slice(0, DAILY_REVIEW_LIMIT);
                sessionInitialized = true;
            }

            const activeNewIds = quotaState.newBatchIds.filter(id => !quotaState.sessionDoneIds.includes(id));
            const activeReviews = quotaState.reviewBatchIds.filter(id => !quotaState.sessionDoneIds.includes(id));
            
            quotaState.dailyQueue = shuffleArray([...activeNewIds, ...activeReviews]);

            localStorage.setItem('topik_srs_v2', JSON.stringify(srsData));
            localStorage.setItem('topik_quota_v2', JSON.stringify(quotaState));
        }

        function speak(text, rate = 1.0) {
            if (!text || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = rate;
            window.speechSynthesis.speak(msg);
        }

        function getPreviewCurrentData() {
            const sourceIds = currentSubTab === 'new' ? quotaState.newBatchIds : quotaState.reviewBatchIds;
            if (!sourceIds || sourceIds.length === 0) return null;
            return initialVocab.find(v => v.id === sourceIds[previewIndex]);
        }

        function updatePreviewUI(autoSpeak = true) {
            const cardContainer = document.getElementById('preview-card');
            const cardInner = document.getElementById('preview-card-inner');
            if(!cardContainer || !cardInner) return;

            cardInner.classList.add('no-transition');
            cardContainer.classList.remove('is-flipped');
            void cardInner.offsetWidth; 
            
            const data = getPreviewCurrentData();
            const sourceIds = currentSubTab === 'new' ? quotaState.newBatchIds : quotaState.reviewBatchIds;
            
            if (!sourceIds || sourceIds.length === 0 || !data) {
                document.getElementById('preview-word-kr').innerText = "目前無單字";
                document.getElementById('preview-progress-text').innerText = "0 / 0";
                document.getElementById('preview-back-content').classList.add('hidden');
            } else {
                document.getElementById('preview-back-content').classList.remove('hidden');
                const isDone = quotaState.sessionDoneIds.includes(data.id);
                document.getElementById('preview-word-kr').innerText = data.word;
                document.getElementById('preview-word-kr-back').innerText = data.word;
                document.getElementById('preview-word-zh').innerText = data.meaning;
                document.getElementById('preview-ex-kr').innerText = data.ex_kr;
                document.getElementById('preview-ex-zh').innerText = data.ex_zh;
                document.getElementById('preview-progress-text').innerText = `${previewIndex + 1} / ${sourceIds.length}`;
                cardContainer.style.opacity = isDone ? "0.75" : "1";
                document.getElementById('preview-tag').innerText = isDone ? "COMPLETED" : "PREVIEW";
                
                if (autoSpeak) speak(data.word);
            }

            setTimeout(() => {
                cardInner.classList.remove('no-transition');
            }, 10);
        }

        function handleVote(isSuccess) {
            if (!dueWords[0]) return;
            const id = dueWords[0].id;
            const now = Date.now();
            const isNew = isNewWord(id);
            let message = "";

            if (isSuccess) {
                if (isNew) {
                    srsData[id].interval = 1;
                    srsData[id].nextReview = now + DAY_MS;
                    message = "24小時後複習";
                } else {
                    srsData[id].interval = Math.max(1, (srsData[id].interval || 1) * MULTIPLIER);
                    srsData[id].nextReview = now + (srsData[id].interval * DAY_MS);
                    message = "複習完成";
                }
                
                if (!quotaState.sessionDoneIds.includes(id)) {
                    quotaState.sessionDoneIds.push(id);
                }
                delete quotaState.reappearTimes[id];
                quotaState.dailyQueue = quotaState.dailyQueue.filter(qid => qid !== id);
            } else {
                if (isNew) {
                    if (!quotaState.sessionMistakeIds.includes(id)) quotaState.sessionMistakeIds.push(id);
                    const reappTime = now + HOUR_MS;
                    quotaState.reappearTimes[id] = reappTime;
                    srsData[id].nextReview = reappTime;
                    quotaState.dailyQueue.push(quotaState.dailyQueue.shift());
                    message = "一小時後補考";
                } else {
                    srsData[id].interval = 1;
                    srsData[id].nextReview = now + DAY_MS;
                    message = "24小時後重新複習";
                    quotaState.dailyQueue = quotaState.dailyQueue.filter(qid => qid !== id);
                    if (!quotaState.sessionDoneIds.includes(id)) quotaState.sessionDoneIds.push(id);
                }
            }
            localStorage.setItem('topik_srs_v2', JSON.stringify(srsData));
            localStorage.setItem('topik_quota_v2', JSON.stringify(quotaState));
            renderLearn();
            showToast(message);
        }

        function renderLearn() {
            const now = Date.now();
            const availableQueue = quotaState.dailyQueue.filter(id => {
                const rt = quotaState.reappearTimes[id] || 0;
                return now >= rt;
            });

            const cardContainer = document.getElementById('flashcard');
            const cardInner = document.getElementById('flashcard-inner');
            const limitUI = document.getElementById('limit-reached-ui');
            if(!cardContainer || !cardInner) return;

            cardInner.classList.add('no-transition');
            cardContainer.classList.remove('is-flipped');
            void cardInner.offsetWidth; 

            const remainingReviews = quotaState.dailyQueue.filter(id => quotaState.reviewBatchIds.includes(id)).length;
            const remainingNews = quotaState.dailyQueue.filter(id => quotaState.newBatchIds.includes(id)).length;
            document.getElementById('review-progress').innerText = remainingReviews;
            document.getElementById('new-progress').innerText = remainingNews;

            if (availableQueue.length > 0) {
                cardContainer.classList.remove('hidden');
                limitUI.classList.add('hidden');
                const data = initialVocab.find(v => v.id === availableQueue[0]);
                dueWords = [data];
                document.getElementById('word-kr').innerText = data.word;
                document.getElementById('word-zh').innerText = data.meaning;
                const isNew = isNewWord(data.id);
                document.getElementById('card-tag').innerText = isNew ? 'New' : 'Reviewing';
                document.getElementById('card-tag').className = `absolute top-6 left-6 text-xs font-mono font-bold px-2 py-1 rounded uppercase ${isNew ? 'bg-yellow-100 text-yellow-700' : 'bg-yellow-100 text-yellow-700'}`;
                
                speak(data.word);
            } else {
                cardContainer.classList.add('hidden');
                limitUI.classList.remove('hidden');
                const pTag = document.querySelector('#limit-reached-ui p');
                if (quotaState.dailyQueue.length > 0) {
                    pTag.innerText = "單字冷卻中，請稍後再試。";
                } else {
                    pTag.innerText = "本次會話已完成！";
                }
            }

            setTimeout(() => {
                cardInner.classList.remove('no-transition');
            }, 10);
        }

        function formatTimeDiff(targetMs) {
            const diff = targetMs - Date.now();
            if (diff <= 0) return "Due";
            const days = Math.floor(diff / DAY_MS);
            const hours = Math.floor((diff % DAY_MS) / HOUR_MS);
            if (days > 0) return `${days}d ${hours}hr`;
            const mins = Math.floor((diff % HOUR_MS) / 60000);
            return hours > 0 ? `${hours}hr ${mins}m` : `${mins}m`;
        }

        function renderList(append = false) {
            const container = document.getElementById('vocab-list-container');
            if (!container) return;
            if (!append) {
                container.innerHTML = '';
                displayCount = BATCH_SIZE;
                filteredVocab.sort((a, b) => (srsData[a.id]?.nextReview || Infinity) - (srsData[b.id]?.nextReview || Infinity));
            }
            filteredVocab.slice(append ? displayCount - BATCH_SIZE : 0, displayCount).forEach(v => {
                const srs = srsData[v.id];
                const div = document.createElement('div');
                div.className = 'bg-white p-5 rounded-2xl shadow-sm border border-yellow-50 transition-all cursor-pointer active:bg-yellow-50';
                let srsStatusText = "New", srsColorClass = "text-gray-400 text-xs"; 
                if (srs && srs.nextReview > 0) { 
                    srsStatusText = formatTimeDiff(srs.nextReview); 
                    srsColorClass = srsStatusText === "Due" ? "text-rose-500 font-bold" : "text-yellow-500 font-bold";
                }
                div.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-1">
                                <span class="text-xl font-bold text-gray-800">${v.word}</span>
                                <button class="p-3 text-yellow-300 voice-list-btn voice-btn-z" data-word="${v.word}">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"/></svg>
                                </button>
                            </div>
                            <p class="text-sm text-gray-400 font-medium">${v.meaning}</p>
                        </div>
                        <div class="flex items-center space-x-3">
                            <span class="uppercase tracking-tighter text-[10px] ${srsColorClass}">${srsStatusText}</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-300 rotate-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                        </div>
                    </div>
                    <div class="details-content mt-4 pt-4 border-t border-yellow-50 space-y-3">
                        <div><p class="text-xs text-yellow-400 font-bold mb-1 uppercase tracking-tighter">例句範例</p><p class="text-sm text-gray-700 font-medium leading-relaxed">${v.ex_kr}</p></div>
                        <div><p class="text-xs text-yellow-300 font-bold mb-1 uppercase tracking-tighter">例句翻譯</p><p class="text-xs text-gray-500">${v.ex_zh}</p></div>
                    </div>
                `;
                div.onclick = (e) => e.target.closest('.voice-list-btn') ? (e.stopPropagation(), speak(e.target.closest('.voice-list-btn').dataset.word)) : div.classList.toggle('is-open');
                container.appendChild(div);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        window.onload = () => {
            checkAndResetQuota();
            filteredVocab = [...initialVocab];
            updatePreviewUI(false); 

            const tabs = { today: 'view-today', learn: 'view-learn', list: 'view-list' };
            Object.keys(tabs).forEach(key => {
                const btn = document.getElementById(`tab-${key}-btn`);
                if(!btn) return;
                btn.onclick = function() {
                    Object.values(tabs).forEach(v => document.getElementById(v).classList.add('hidden'));
                    document.getElementById(tabs[key]).classList.remove('hidden');
                    document.querySelectorAll('nav button').forEach(b => b.classList.replace('tab-active', 'text-gray-400'));
                    this.classList.replace('text-gray-400', 'tab-active');
                    
                    if(key === 'learn') {
                        checkAndResetQuota(); 
                        renderLearn();
                    } else if(key === 'list') {
                        renderList();
                    } else if(key === 'today') {
                        checkAndResetQuota();
                        updatePreviewUI(true);
                    }
                };
            });

            document.getElementById('subtab-new-btn').onclick = function() {
                currentSubTab = 'new'; previewIndex = 0;
                this.className = 'flex-1 py-2 text-xs font-bold rounded-lg transition-all subtab-active';
                document.getElementById('subtab-rev-btn').className = 'flex-1 py-2 text-xs font-bold rounded-lg transition-all text-yellow-400';
                updatePreviewUI();
            };
            document.getElementById('subtab-rev-btn').onclick = function() {
                currentSubTab = 'rev'; previewIndex = 0;
                this.className = 'flex-1 py-2 text-xs font-bold rounded-lg transition-all subtab-active';
                document.getElementById('subtab-new-btn').className = 'flex-1 py-2 text-xs font-bold rounded-lg transition-all text-yellow-400';
                updatePreviewUI();
            };

            document.getElementById('vocab-search').oninput = (e) => {
                const val = e.target.value.toLowerCase();
                filteredVocab = initialVocab.filter(v => v.word.toLowerCase().includes(val) || v.meaning.toLowerCase().includes(val));
                renderList();
            };

            const observer = new IntersectionObserver((entries) => { 
                if (entries[0].isIntersecting && displayCount < filteredVocab.length) { 
                    displayCount += BATCH_SIZE; renderList(true); 
                } 
            });
            observer.observe(document.getElementById('list-end-trigger'));

            document.getElementById('preview-next-btn').onclick = () => {
                const sourceIds = currentSubTab === 'new' ? quotaState.newBatchIds : quotaState.reviewBatchIds;
                if (!sourceIds || sourceIds.length === 0) return;
                previewIndex = (previewIndex + 1) % sourceIds.length;
                updatePreviewUI();
            };
            document.getElementById('preview-prev-btn').onclick = () => {
                const sourceIds = currentSubTab === 'new' ? quotaState.newBatchIds : quotaState.reviewBatchIds;
                if (!sourceIds || sourceIds.length === 0) return;
                previewIndex = (previewIndex - 1 + sourceIds.length) % sourceIds.length;
                updatePreviewUI();
            };

            document.getElementById('preview-card').onclick = e => {
                if (e.target.closest('.voice-btn-z')) return;
                const data = getPreviewCurrentData();
                if (!data) return;
                const cardContainer = e.currentTarget;
                const isFlipped = cardContainer.classList.toggle('is-flipped');
                if (isFlipped) { setTimeout(() => speak(data.ex_kr, 1.0), 100); } else { speak(data.word, 1.0); }
            };

            document.getElementById('preview-voice-back-word-10').onclick = e => { e.stopPropagation(); speak(getPreviewCurrentData()?.word, 1.0); };
            document.getElementById('preview-voice-ex-10').onclick = e => { e.stopPropagation(); speak(getPreviewCurrentData()?.ex_kr, 1.0); };
            document.getElementById('preview-voice-ex-06').onclick = e => { e.stopPropagation(); speak(getPreviewCurrentData()?.ex_kr, 0.6); };

            document.getElementById('flashcard').onclick = e => {
                if (e.target.closest('.voice-btn-z') || e.target.closest('button')) return;
                e.currentTarget.classList.toggle('is-flipped');
            };

            document.getElementById('learn-voice-btn-10').onclick = e => { e.stopPropagation(); if (dueWords.length > 0) speak(dueWords[0].word, 1.0); };
            
            document.getElementById('success-btn').onclick = e => { e.stopPropagation(); handleVote(true); };
            document.getElementById('fail-btn').onclick = e => { e.stopPropagation(); handleVote(false); };
            document.getElementById('reset-data-btn').onclick = () => confirm("確定要重置所有紀錄嗎？") && (localStorage.clear() || location.reload());
        };
    </script>
</body>
</html>
