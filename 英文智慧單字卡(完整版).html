<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英文智慧單字卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fefce8; touch-action: manipulation; }
        .card-container { perspective: 1000px; touch-action: none; }
        .card-inner { transition: transform 0.4s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
        .no-transition { transition: none !important; }
        .is-flipped .card-inner { transform: rotateY(180deg); }
        .card-face { backface-visibility: hidden; position: absolute; inset: 0; border: 2px solid #fef08a; border-radius: 1.5rem; background-color: white; }
        .card-back { transform: rotateY(180deg); }
        .soft-blue-shadow { box-shadow: 0 10px 25px -5px rgba(250, 204, 21, 0.1); }
        .tab-active { border-bottom: 2px solid #facc15; color: #facc15; }
        .subtab-active { background-color: #facc15; color: white; }
        .details-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .is-open .details-content { max-height: 200px; }
        .rotate-icon { transition: transform 0.3s; }
        .is-open .rotate-icon { transform: rotate(180deg); }
        .voice-btn-z { z-index: 50; position: relative; }
        html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; }
    </style>
</head>
<body class="flex flex-col items-center">

    <nav class="w-full max-w-md bg-white shadow-sm sticky top-0 z-50 flex justify-around">
        <button id="tab-today-btn" class="flex-1 py-4 text-xs font-bold tab-active">今日概覽</button>
        <button id="tab-learn-btn" class="flex-1 py-4 text-xs font-bold text-gray-400">學習複習</button>
        <button id="tab-list-btn" class="flex-1 py-4 text-xs font-bold text-gray-400">單字全集</button>
    </nav>

    <main class="w-full max-w-md px-4 mt-6 h-[calc(100vh-80px)] overflow-y-auto pb-24">
        <section id="view-today" class="space-y-4">
            <div class="px-2 flex flex-col space-y-3">
                <div class="flex bg-yellow-50 p-1 rounded-xl">
                    <button id="subtab-new-btn" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all subtab-active">今日新單字</button>
                    <button id="subtab-rev-btn" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-yellow-400">今日複習單字</button>
                </div>
            </div>
            
            <div id="preview-card" class="card-container relative w-full h-[480px] cursor-pointer">

                    <div class="card-face soft-blue-shadow flex flex-col items-center justify-center p-8 text-center">
                        <span id="preview-tag" class="absolute top-6 left-6 text-xs font-mono font-bold px-2 py-1 rounded uppercase bg-yellow-100 text-yellow-700">PREVIEW</span>
                        <div class="absolute top-6 right-6 p-3 text-yellow-500 bg-yellow-50 rounded-full">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"/></svg>
                        </div>
                        <h2 id="preview-word-kr" class="text-4xl md:text-6xl font-bold text-gray-800 mb-2 transition-all"></h2>
                        <p id="preview-hint" class="absolute bottom-10 text-xs text-yellow-300 uppercase font-bold">點擊卡片翻面聽例句</p>
                    </div>
                    <div class="card-back card-face soft-blue-shadow flex flex-col p-8">
                        <div id="preview-back-content">
                            <div class="text-center mb-6 border-b border-yellow-50 pb-6 relative">
                                <h3 id="preview-word-kr-back" class="text-2xl md:text-3xl font-bold text-gray-700 mb-2"></h3>
                                <div class="inline-block px-4 py-1 bg-yellow-50 rounded-full">
                                    <p id="preview-word-zh" class="text-lg md:text-xl text-yellow-600 font-bold"></p>
                                </div>
                                <div class="absolute top-0 right-0">
                                    <button id="preview-voice-back-word-10" class="voice-btn-z p-3 text-yellow-500 bg-yellow-50 rounded-full transition-colors flex items-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="flex-1 flex flex-col justify-center space-y-6">
                                <div>
                                    <div class="flex justify-between items-center mb-2">
                                        <p class="text-xs text-yellow-400 font-bold uppercase">英文例句</p>
                                        <div class="flex space-x-2">
                                            <button id="preview-voice-ex-10" class="voice-btn-z p-3 text-yellow-500 bg-yellow-50 rounded-xl hover:bg-yellow-100 transition-colors flex items-center space-x-1">
                                                <span class="text-[10px] font-black">1.0</span>
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"/></svg>
                                            </button>
                                            <button id="preview-voice-ex-06" class="voice-btn-z p-3 text-yellow-500 bg-yellow-50 rounded-xl hover:bg-yellow-100 transition-colors flex items-center space-x-1 border border-yellow-100">
                                                <span class="text-[10px] font-black">0.6</span>
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"/></svg>
                                            </button>
                                        </div>
                                    </div>
                                    <p id="preview-ex-kr" class="text-gray-700 text-base md:text-lg font-medium leading-relaxed"></p>
                                </div>
                                <div>
                                    <p class="text-xs text-yellow-300 font-bold mb-1 uppercase">例句翻譯</p>
                                    <p id="preview-ex-zh" class="text-gray-500 text-xs md:text-sm"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between space-x-4 mt-4">

                </div>

            </div>
        </section>

        <section id="view-learn" class="hidden">
            <div class="flex justify-between items-center mb-4 bg-white p-4 rounded-2xl shadow-sm border border-yellow-100">
                <div class="flex-1">
                    <h2 class="text-sm font-bold text-yellow-400 uppercase tracking-widest mb-2">測驗進度</h2>
                    <div class="flex items-center space-x-4">
                        <div class="flex items-center space-x-2">
                            <span class="w-2 h-2 bg-yellow-300 rounded-full"></span>

                            <span class="text-xs font-bold text-gray-600">新單字: <span id="new-progress">0</span></span>

                    </div>

            <div id="flashcard" class="card-container relative w-full h-[480px] cursor-pointer">

                    <div class="card-face soft-blue-shadow flex flex-col items-center justify-center p-8 text-center">
                        <span id="card-tag" class="absolute top-6 left-6 text-xs font-mono font-bold px-2 py-1 rounded uppercase"></span>
                        <div class="absolute top-6 right-6">

                            </button>

                        <h2 id="word-kr" class="text-4xl md:text-6xl font-bold text-gray-800 mb-2"></h2>

                    </div>
                    <div class="card-back card-face soft-blue-shadow flex flex-col p-8 items-center justify-between">
                        <div class="w-full text-center flex flex-col items-center justify-center flex-1">
                            <div class="mb-12">
                                <p id="word-zh" class="text-3xl md:text-4xl px-6 text-yellow-800 font-bold"></p>
                            </div>
                        </div>
                        <div class="w-full flex space-x-4 mb-4">
                            <button id="fail-btn" class="flex-1 py-6 bg-rose-400 text-white rounded-2xl font-black text-3xl shadow-lg shadow-rose-100 active:scale-95 transition-transform">X</button>
                            <button id="success-btn" class="flex-1 py-6 bg-yellow-400 text-white rounded-2xl font-black text-3xl shadow-lg shadow-yellow-100 active:scale-95 transition-transform">O</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="limit-reached-ui" class="hidden flex flex-col items-center justify-center h-[400px] text-center p-8 bg-yellow-50 rounded-3xl border-2 border-yellow-100 border-dashed">
                <h3 class="text-lg font-bold text-yellow-800">今日任務已完成！</h3>
                <p class="text-sm text-yellow-600 mt-2">複習完畢，點擊下方查看進度。</p>
                <button onclick="document.getElementById('tab-list-btn').click()" class="mt-6 px-6 py-2 bg-yellow-400 text-white rounded-full text-sm font-bold">查看單字庫</button>
            </div>
        </section>

        <section id="view-list" class="hidden space-y-4">
            <div class="sticky top-0 z-40 bg-white/95 backdrop-blur-sm p-3 rounded-2xl shadow-sm border border-yellow-100 space-y-3">

                </div>
                <div class="relative">

                </div>
            </div>
            <div id="vocab-list-container" class="space-y-3 pb-10"></div>
            <div id="list-end-trigger" class="h-10"></div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-10 bg-yellow-900/90 text-white px-6 py-4 rounded-3xl opacity-0 transition-all text-sm z-50 pointer-events-none"></div>

            { id: 803, word: "blame", meaning: "責備", ex_kr: "My mom blamed me for something I didn’t do.", ex_zh: "我媽媽把一件我沒做過的事怪罪到我頭上。" },
            { id: 804, word: "chemistry", meaning: "化學", ex_kr: "In chemistry class, the professor taught us about chemical reactions.", ex_zh: "化學課上，教授給我們講解了化學反應。" },
            { id: 805, word: "despite", meaning: "儘管", ex_kr: "We still played the game despite the cold weather.", ex_zh: "儘管天氣寒冷，我們還是繼續玩遊戲。" },
            { id: 806, word: "dinosaur", meaning: "恐龍", ex_kr: "I like to see the dinosaur bones at the museum.", ex_zh: "我喜歡去博物館看恐龍骨骼。" },
            { id: 807, word: "exhibit", meaning: "展覽", ex_kr: "My painting will be exhibited at the fair.", ex_zh: "我的畫作將在博覽會上展出。" },
            { id: 808, word: "fame", meaning: "名聲", ex_kr: "He had fame and fortune, but he was not happy.", ex_zh: "他擁有名利，但他並不快樂。" },
            { id: 809, word: "forecast", meaning: "預報", ex_kr: "The forecast says that it will rain all week.", ex_zh: "天氣預報說這週都會下雨。" },
            { id: 810, word: "genius", meaning: "天才", ex_kr: "Since she was a genius, she easily passed all of her school exams.", ex_zh: "由於她是個天才，所以輕鬆通過了所有學校考試。" },
            { id: 811, word: "gentle", meaning: "溫和的", ex_kr: "He is very gentle with the baby.", ex_zh: "他對寶寶非常溫柔。" },
            { id: 812, word: "geography", meaning: "地理", ex_kr: "I had to draw a map for geography class.", ex_zh: "我地理課要畫地圖。" },
            { id: 813, word: "interfere", meaning: "幹擾", ex_kr: "My little sister always interferes when I’m trying to study.", ex_zh: "我學習的時候，妹妹總是來搗亂。" },

            { id: 815, word: "principal", meaning: "主要的", ex_kr: "My school’s principal can be very strict with the rules.", ex_zh: "我們學校的校長對校規非常嚴格。" },
            { id: 816, word: "row", meaning: "排", ex_kr: "James put all of his toy soldiers into neat rows.", ex_zh: "詹姆斯把他所有的玩具士兵整齊地排列好。" },
            { id: 817, word: "shelf", meaning: "架子", ex_kr: "I keep my clothes on a shelf in my closet.", ex_zh: "我把衣服放在衣櫃的架子上。" },
            { id: 818, word: "spite", meaning: "儘管如此", ex_kr: "He snuck into his sister’s room and stole her bag out of spite.", ex_zh: "他出於報復，偷偷溜進姊姊的房間，偷走了她的包包。" },
            { id: 819, word: "super", meaning: "極佳的", ex_kr: "My dad said I did a super job cleaning the house.", ex_zh: "我爸爸說我把房子打掃得特別乾淨。" },
            { id: 820, word: "wet", meaning: "濕的", ex_kr: "Since my dog was wet, he tried to shake all the water off his body.", ex_zh: "我的狗全身濕透了，它就試著甩掉身上所有的水。" },
            { id: 821, word: "abuse", meaning: "虐待", ex_kr: "The mean man abused his dog when it barked too loudly.", ex_zh: "這個刻薄的男人因為他的狗叫聲太大而虐待它。" },
            { id: 822, word: "afford", meaning: "買得起", ex_kr: "I’ve been saving my money so I can afford to buy a new bike.", ex_zh: "我一直在存錢，希望能買一輛新自行車。" },
            { id: 823, word: "bake", meaning: "烤", ex_kr: "My sister is a good cook. She bakes delicious cakes.", ex_zh: "我姊姊廚藝很好，她烤的蛋糕特別好吃。" },
            { id: 824, word: "bean", meaning: "豆", ex_kr: "There are many different kinds of beans to eat.", ex_zh: "有很多不同種類的豆子可以食用。" },
            { id: 825, word: "candle", meaning: "蠟燭", ex_kr: "When the lights went out, we lit some candles.", ex_zh: "燈滅後，我們點燃了一些蠟燭。" },

            { id: 827, word: "debt", meaning: "債務", ex_kr: "I have not paid my gas bill. I owe a debt to the gas company.", ex_zh: "我還沒繳瓦斯費，我欠瓦斯公司一筆錢。" },
            { id: 828, word: "decrease", meaning: "減少", ex_kr: "Hiring more police officers has decreased crime in the city.", ex_zh: "增加警力降低了該市的犯罪率。" },
            { id: 829, word: "fault", meaning: "過錯", ex_kr: "It is my fault that the cat ran away. I left the door open.", ex_zh: "都是我的錯，貓咪才跑丟的。我出門的時候門沒關好。" },

            { id: 832, word: "ingredient", meaning: "成分", ex_kr: "The main ingredients in cake are eggs, sugar, and flour.", ex_zh: "蛋糕的主要原料是雞蛋、糖和麵粉。" },
            { id: 833, word: "insist", meaning: "堅持", ex_kr: "I insist that you try some of these cookies.", ex_zh: "我強烈建議你嚐嚐這些餅乾。" },

            { id: 835, word: "metal", meaning: "金屬", ex_kr: "Steel is a common metal that is used to build buildings.", ex_zh: "鋼鐵是一種常見的建築用金屬。" },

            { id: 837, word: "oppose", meaning: "反對", ex_kr: "I want to be a police officer because I oppose crime.", ex_zh: "我想當警察，因為我反對犯罪。" },
            { id: 838, word: "passive", meaning: "被動的", ex_kr: "Marcie is so passive that she never solves her own problems.", ex_zh: "瑪茜個性非常被動，她從來不自己解決問題。" },
            { id: 839, word: "quantity", meaning: "數量", ex_kr: "I have a small quantity of milk in my glass.", ex_zh: "我的杯子裡還有少量牛奶。" },

            { id: 841, word: "adequate", meaning: "足夠的", ex_kr: "This is adequate for my needs.", ex_zh: "這足以滿足我的需求。" },
            { id: 842, word: "anxiety", meaning: "焦慮", ex_kr: "When I have to climb to high places, I’m filled with anxiety.", ex_zh: "當我需要爬到高處時，我會感到非常焦慮。" },

            { id: 846, word: "consult", meaning: "諮詢", ex_kr: "I will consult my accountant to find a way to pay my bills.", ex_zh: "我會諮詢我的會計師，想辦法支付我的帳單。" },

            { id: 848, word: "fortune", meaning: "財富", ex_kr: "I have good fortune when I play cards.", ex_zh: "我打牌運氣很好。" },

            { id: 2184, word: "cabin", meaning: "艙", ex_kr: "The man reached the mountain cabin after a long day of hiking along the river.", ex_zh: "經過一整天沿著河岸健行，這名男子終於到達了山間小屋。" },
            { id: 2185, word: "calendar", meaning: "日曆", ex_kr: "Marco used an online calendar to keep track of his schedule.", ex_zh: "馬可使用線上日曆來記錄他的日程安排。" },
            { id: 2186, word: "calorie", meaning: "卡路里", ex_kr: "My sister is on a low-calorie diet for fitness training.", ex_zh: "我姐姐為了健身訓練正在進行低熱量飲食。" },
            { id: 2187, word: "cave", meaning: "洞穴", ex_kr: "A crystal blue lake could be found in the underground cave.", ex_zh: "在地下洞穴中可以發現一個清澈湛藍的湖泊。" },
            { id: 2188, word: "constantly", meaning: "不斷地", ex_kr: "He was constantly checking his watch to see if he was late.", ex_zh: "他不停地看表，怕自己遲到。" },
            { id: 2189, word: "contingent", meaning: "隊伍", ex_kr: "The movie star stood in front of an entire contingent of photographers.", ex_zh: "這位電影明星站在一大群攝影師面前。" },
            { id: 2190, word: "deadline", meaning: "最後期限", ex_kr: "Marius had a short deadline in which to finish his report.", ex_zh: "馬裡烏斯需要在很短的時間內完成他的報告。" },
            { id: 2191, word: "exert", meaning: "發揮", ex_kr: "You exert a lot of energy when you lift weights.", ex_zh: "舉重時會消耗大量能量。" },
            { id: 2192, word: "flank", meaning: "側翼", ex_kr: "The mayor entered the room flanked by her advisers.", ex_zh: "市長在顧問們的陪同下走進了房間。" },
            { id: 2193, word: "fond", meaning: "喜愛", ex_kr: "The mother cow was very fond of her lovely little calf.", ex_zh: "母牛很愛她可愛的小牛。" },
            { id: 2194, word: "forbid", meaning: "禁止", ex_kr: "After Robert used his crayons on the wall, his mother wanted to forbid him from using them at all!", ex_zh: "羅伯特用蠟筆在牆上亂畫後，他媽媽就想禁止他再用蠟筆了！" },
            { id: 2195, word: "haul", meaning: "運輸", ex_kr: "The porter said he’d haul our suitcases up to our hotel room.", ex_zh: "搬運工說他會把我們的行李箱搬到飯店房間。" },
            { id: 2196, word: "impair", meaning: "妨害", ex_kr: "Regularly eating too much can impair your health.", ex_zh: "經常暴飲暴食會損害健康。" },
            { id: 2197, word: "impatient", meaning: "不耐煩", ex_kr: "The impatient teacher could not control the students in her classroom.", ex_zh: "這位性急的老師無法控制班上的學生。" },
            { id: 2198, word: "mid", meaning: "中", ex_kr: "Cassandra fell asleep mid-movie.", ex_zh: "卡桑德拉在電影看到一半的時候睡著了。" },
            { id: 2199, word: "nutrition", meaning: "營養", ex_kr: "The mother always made sure that her baby had good nutrition.", ex_zh: "這位母親總是確保她的孩子獲得良好的營養。" },
            { id: 2200, word: "optimist", meaning: "樂天派", ex_kr: "Joe was an optimist, so he believed he would get the job that he wanted.", ex_zh: "喬是個樂觀主義者，所以他相信自己能得到想要的工作。" },
            { id: 2201, word: "background", meaning: "背景", ex_kr: "The new teacher had a background in science and math.", ex_zh: "這位新老師擁有科學和數學背景。" },
            { id: 2202, word: "bait", meaning: "餌", ex_kr: "The best bait for catching fish is a big, fat worm.", ex_zh: "釣魚最好的餌料是又大又肥的蚯蚓。" },
            { id: 2203, word: "chronicle", meaning: "編年史", ex_kr: "The daily newspaper chronicles local and world events.", ex_zh: "這份日報記錄了本地和世界各地的大事。" },
            { id: 2204, word: "copper", meaning: "銅", ex_kr: "Ancient hunters melted copper to make knives and spears.", ex_zh: "古代獵人熔化銅來製作刀和矛。" },
            { id: 2205, word: "disease", meaning: "疾病", ex_kr: "He had a disease that caused him to lose his hearing.", ex_zh: "他患有一種導致他失聰的疾病。" },
            { id: 2206, word: "folklore", meaning: "民俗學", ex_kr: "India’s folklore has stories about great warriors written in long poems.", ex_zh: "印度的民間傳說中有許多關於偉大勇士的故事，這些故事是用長詩的形式寫成的。" },
            { id: 2207, word: "infect", meaning: "感染", ex_kr: "The common cold infects hundreds of millions of people each year.", ex_zh: "普通感冒每年感染數億人。" },
            { id: 2208, word: "itch", meaning: "癢", ex_kr: "The rough fabric in his shirt made his neck itch.", ex_zh: "襯衫粗糙的布料讓他的脖子發癢。" },
            { id: 2209, word: "literature", meaning: "文學", ex_kr: "Early American literature covers the poetry and stories from 1500 to 1800.", ex_zh: "早期美國文學涵蓋了 1500 年至 1800 年間的詩歌和故事。" },
            { id: 2210, word: "millennium", meaning: "千禧年", ex_kr: "Stonehenge is believed to have been built about five millennia ago.", ex_zh: "據信巨石陣建於約五千年前。" },
            { id: 2211, word: "myth", meaning: "神話", ex_kr: "In Greece, there was a myth about a woman who had snakes for hair.", ex_zh: "希臘神話中有一個女人，她的頭髮是蛇。" },
            { id: 2212, word: "promote", meaning: "推動", ex_kr: "After two years at the company, she was promoted to manager.", ex_zh: "在公司工作兩年後，她被提拔為經理。" },
            { id: 2213, word: "relate", meaning: "涉及", ex_kr: "A company’s plan usually relates to how much profit it can make.", ex_zh: "公司的計劃通常與它能賺取多少利潤有關。" },
            { id: 2214, word: "religion", meaning: "宗教", ex_kr: "Their religion taught that people should forgive their enemies.", ex_zh: "他們的宗教教導人們應該寬恕敵人。" },
            { id: 2215, word: "sum", meaning: "和", ex_kr: "He calculated the numbers to see what the sum of his bills would be.", ex_zh: "他計算了一下，看看他的帳單總額是多少。" },
            { id: 2216, word: "teller", meaning: "出納員", ex_kr: "The teller at the bank helped Kelly put money into a savings account.", ex_zh: "銀行櫃員幫凱莉把錢存入了儲蓄帳戶。" },
            { id: 2217, word: "trustworthy", meaning: "值得信賴的", ex_kr: "Mary is one of the most trustworthy people I’ve ever met.", ex_zh: "瑪麗是我見過的最值得信賴的人之一。" },
            { id: 2218, word: "update", meaning: "更新", ex_kr: "We need to update the programs on our computers.", ex_zh: "我們需要更新電腦上的程式。" },
            { id: 2219, word: "vein", meaning: "靜脈", ex_kr: "The blue veins in my hand are just under my skin.", ex_zh: "我手上的藍色血管就在皮膚底下。" },
            { id: 2220, word: "venom", meaning: "毒液", ex_kr: "A snake’s venom can be used to cure the illnesses it creates.", ex_zh: "蛇毒可以用來治療它所引起的疾病。" },
            { id: 2221, word: "charity", meaning: "慈善機構", ex_kr: "Thanks to his friends’ charity, he had enough money to pay the rent.", ex_zh: "多虧朋友們的幫助，他才有足夠的錢支付房租。" },
            { id: 2222, word: "commerce", meaning: "商業", ex_kr: "The new shopping mall increased the commerce in that section of town.", ex_zh: "新建的購物中心促進了該地區的商業發展。" },
            { id: 2223, word: "condemn", meaning: "譴責", ex_kr: "The judge condemned the criminal to five years in prison.", ex_zh: "法官判處該罪犯五年有期徒刑。" },
            { id: 2224, word: "cozy", meaning: "舒適", ex_kr: "The thick blanket made the bed very cozy.", ex_zh: "厚厚的毯子讓床變得非常舒適。" },
            { id: 2225, word: "deplete", meaning: "消耗", ex_kr: "All the driving he was doing was depleting his car’s fuel supply.", ex_zh: "他不停地開車，消耗了汽車的燃油。" },
            { id: 2226, word: "economy", meaning: "經濟", ex_kr: "The factory was good for the economy because it brought jobs to the area.", ex_zh: "這家工廠對當地經濟有好處，因為它為當地帶來了就業機會。" },
            { id: 2227, word: "empire", meaning: "帝國", ex_kr: "The emperor built roads to make travel easier throughout the empire.", ex_zh: "皇帝修建道路，使帝國境內的交通更加便利。" },
            { id: 2228, word: "goods", meaning: "商品", ex_kr: "Shoes, hats, dresses, and purses were the goods she wanted to buy.", ex_zh: "她想買的商品有鞋子、帽子、裙子和錢包。" },
            { id: 2229, word: "heed", meaning: "注意", ex_kr: "You should heed the advice on the sign and not drive so fast.", ex_zh: "你應該聽從標誌上的建議，不要開那麼快。" },
            { id: 2230, word: "hitchhike", meaning: "搭便車", ex_kr: "She didn’t have a car, so she hitchhiked several miles to her brother’s home.", ex_zh: "她沒有車，所以搭便車走了好幾英里才到她哥哥家。" },
            { id: 2231, word: "mock", meaning: "嘲笑", ex_kr: "The girls mocked Nancy because she was a new student.", ex_zh: "因為南希是新來的學生，所以女生們嘲笑她。" },
            { id: 2232, word: "neutral", meaning: "中性的", ex_kr: "The girl’s friend remained neutral while the couple was arguing.", ex_zh: "在情侶爭吵時，女孩的朋友保持中立。" },
            { id: 2233, word: "persecute", meaning: "迫害", ex_kr: "Dan felt persecuted because he was smaller than the other boys at school.", ex_zh: "丹因為個子比學校裡的其他男孩矮小而感到受到歧視。" },
            { id: 2234, word: "pity", meaning: "遺憾", ex_kr: "Because she had pity for the lost boy, she helped him find his parents.", ex_zh: "因為她同情這個迷路的男孩，所以她幫助他找到了父母。" },
            { id: 2235, word: "reduce", meaning: "減少", ex_kr: "When the store reduced its prices, people wanted to shop there.", ex_zh: "當商店降價時，人們都想去那裡購物。" },
            { id: 2236, word: "scribe", meaning: "隸", ex_kr: "In ancient Egypt, scribes recorded important events.", ex_zh: "在古埃及，抄寫員記錄重要事件。" },
            { id: 2237, word: "temper", meaning: "脾氣", ex_kr: "She has a temper. Even the slightest mistakes make her angry.", ex_zh: "她脾氣很暴躁，即使是最輕微的錯誤都會讓她生氣。" },
            { id: 2238, word: "throne", meaning: "王座", ex_kr: "Nobody except the king and queen sat in the thrones in the great hall.", ex_zh: "除了國王和王后，沒有人坐在大廳的寶座上。" },
            { id: 2239, word: "unity", meaning: "統一", ex_kr: "The project was finished early thanks to the unity of the workers.", ex_zh: "由於工人們的團結一致，該項目提前完工。" },
            { id: 2240, word: "victor", meaning: "勝利者", ex_kr: "At the end of the game, the blue team were the victors.", ex_zh: "比賽結束時，藍隊獲勝。" },
            { id: 2241, word: "accurate", meaning: "準確的", ex_kr: "The story in the newspaper wasn’t very accurate.", ex_zh: "報紙上的報道不太準確。" },
            { id: 2242, word: "analyze", meaning: "分析", ex_kr: "The scientist will analyze the blood sample.", ex_zh: "科學家將分析血液樣本。" },
            { id: 2243, word: "asteroid", meaning: "小行星", ex_kr: "In 1908, a giant asteroid hit Siberia.", ex_zh: "1908年，一顆巨型小行星撞擊了西伯利亞。" },
            { id: 2244, word: "controversy", meaning: "爭議", ex_kr: "There has been a lot of controversy over the judge’s decision.", ex_zh: "法官的判決引發了很多爭議。" },
            { id: 2245, word: "evolve", meaning: "發展", ex_kr: "Many people think that humans evolved from animals.", ex_zh: "許多人認為人類是由動物演化而來的。" },
            { id: 2246, word: "factor", meaning: "因素", ex_kr: "Smoking is the main factor that causes lung cancer.", ex_zh: "吸菸是導致肺癌的主要因素。" },
            { id: 2247, word: "genetic", meaning: "基因", ex_kr: "The color of one’s eyes is genetic.", ex_zh: "眼睛的顏色是由基因決定的。" },
            { id: 2248, word: "genome", meaning: "基因組", ex_kr: "Understanding the human genome may help cure many diseases.", ex_zh: "了解人類基因組或許有助於治癒許多疾病。" },
            { id: 2249, word: "identical", meaning: "完全相同的", ex_kr: "James and John are identical twins.", ex_zh: "詹姆斯和約翰是同卵雙胞胎。" },
            { id: 2250, word: "intellectual", meaning: "知識分子", ex_kr: "We’ve always considered my Uncle Max to be the intellectual of the family.", ex_zh: "我們一直認為我叔叔馬克斯是家裡的知識分子。" },
            { id: 2251, word: "majority", meaning: "多數", ex_kr: "A majority of the people voted for Tom Smith in the election.", ex_zh: "選舉中，大多數人投票給了湯姆史密斯。" },
            { id: 2252, word: "mammal", meaning: "哺乳動物", ex_kr: "Even though they live in water, whales are actually mammals.", ex_zh: "雖然鯨魚生活在水中，但它們實際上是哺乳動物。" },
            { id: 2253, word: "multiply", meaning: "乘", ex_kr: "In the past year, the number of people at work has multiplied by ten percent.", ex_zh: "過去一年，就業人數增加了百分之十。" },
            { id: 2254, word: "offspring", meaning: "後代", ex_kr: "The dog’s offspring had the same color of fur as she did.", ex_zh: "這隻狗的後代和它的母親有著一樣的毛色。" },
            { id: 2255, word: "pesticide", meaning: "農藥", ex_kr: "The farmer sprayed his crops with a pesticide to keep bugs away.", ex_zh: "為了防止蟲害，農民給農作物噴灑了殺蟲劑。" },
            { id: 2256, word: "regulate", meaning: "調節", ex_kr: "The bank regulates how much money people can borrow.", ex_zh: "銀行會對人們可以藉貸的金額進行監管。" },
            { id: 2257, word: "reinforce", meaning: "加強", ex_kr: "Peter reinforced his opinion with information from a book.", ex_zh: "彼得從一本書中獲得的資訊強化了自己的觀點。" },
            { id: 2258, word: "stricken", meaning: "受打擊", ex_kr: "The pilot landed the stricken airplane with difficulty.", ex_zh: "飛行員艱難地將這架故障飛機安全降落。" },
            { id: 2259, word: "vast", meaning: "廣闊的", ex_kr: "The wealthy man bought a vast amount of land in the countryside.", ex_zh: "這位富翁在鄉下買下了大片土地。" },
            { id: 2260, word: "vegetarian", meaning: "素食", ex_kr: "I became a vegetarian because I don’t like the taste of meat.", ex_zh: "我成為素食主義者是因為我不喜歡肉的味道。" },
            { id: 2261, word: "bowl", meaning: "碗", ex_kr: "I put the fruit in the fruit bowl.", ex_zh: "我把水果放進了水果碗裡。" },
            { id: 2262, word: "cooking", meaning: "烹飪", ex_kr: "I really enjoy cooking, especially Italian food.", ex_zh: "我非常喜歡烹飪，尤其喜歡義大利菜。" },
            { id: 2263, word: "dense", meaning: "稠密", ex_kr: "I easily became lost in the dense forest.", ex_zh: "我很容易就在茂密的森林裡迷路了。" },
            { id: 2264, word: "dignity", meaning: "尊嚴", ex_kr: "When his company went out of business, he faced it with dignity.", ex_zh: "公司倒閉時，他坦然面對。" },
            { id: 2265, word: "dominate", meaning: "支配", ex_kr: "The loud man dominated the conversation.", ex_zh: "那個嗓門很大的人主導了對話。" },
            { id: 2266, word: "earthen", meaning: "土", ex_kr: "The house’s roof was made of earthen tiles.", ex_zh: "房子的屋頂是用瓦片鋪成的。" },
            { id: 2267, word: "hostile", meaning: "敵對的", ex_kr: "We were happy to move away from our hostile neighbor.", ex_zh: "我們很高興能搬離那個充滿敵意的鄰居。" },
            { id: 2268, word: "incorrect", meaning: "錯誤", ex_kr: "Your answer is incorrect. You need to correct it.", ex_zh: "你的答案不正確，需要改正。" },
            { id: 2269, word: "intake", meaning: "攝取量", ex_kr: "The doctor said I needed to increase my intake of fruits and vegetables.", ex_zh: "醫生說我需要增加水果和蔬菜的攝取量。" },
            { id: 2270, word: "likewise", meaning: "同樣地", ex_kr: "If Joe is not going to school so he can go swimming, I want to do likewise.", ex_zh: "如果喬為了去游泳而不上學，我也想這麼做。" },
            { id: 2271, word: "machine", meaning: "機器", ex_kr: "The machine was broken.", ex_zh: "機器壞了。" },
            { id: 2272, word: "medication", meaning: "藥物", ex_kr: "The doctor gave me medication to treat my illness.", ex_zh: "醫生開了藥來治療我的疾病。" },
            { id: 2273, word: "obscure", meaning: "朦朧", ex_kr: "The old man travels the world in search of obscure books.", ex_zh: "這位老人週遊世界，尋找冷門書籍。" },
            { id: 2274, word: "oppress", meaning: "壓迫", ex_kr: "Free speech had been oppressed in his country.", ex_zh: "在他的國家，言論自由一直受到壓制。" },
            { id: 2275, word: "peel", meaning: "果皮", ex_kr: "He peeled the apple before eating it.", ex_zh: "他吃蘋果前先削了皮。" },
            { id: 2276, word: "prescription", meaning: "處方", ex_kr: "The doctor gave me a prescription for my medication.", ex_zh: "醫生開了藥方給我。" },
            { id: 2277, word: "progress", meaning: "進步", ex_kr: "There are clear signs of progress.", ex_zh: "已經出現了明顯的進展跡象。" },
            { id: 2278, word: "sandy", meaning: "沙", ex_kr: "I love walking on a sandy beach.", ex_zh: "我喜歡在沙灘上散步。" },
            { id: 2279, word: "shortage", meaning: "短缺", ex_kr: "During the dry season, there was a shortage of water.", ex_zh: "旱季期間，缺水。" },
            { id: 2280, word: "skillful", meaning: "熟練", ex_kr: "The carpenter is very skillful at building houses.", ex_zh: "這位木匠非常擅長蓋房子。" },
            { id: 2281, word: "aircraft", meaning: "飛機", ex_kr: "At the museum in the airport, you can see a lot of old aircraft.", ex_zh: "在機場的博物館裡，你可以看到很多老式飛機。" },
            { id: 2282, word: "celebrity", meaning: "名人", ex_kr: "It was the highlight of the evening when the celebrities arrived.", ex_zh: "當晚的亮點是明星們的到來。" },
            { id: 2283, word: "concrete", meaning: "具體的", ex_kr: "The man covered the ground with concrete.", ex_zh: "那人用混凝土覆蓋了地面。" },
            { id: 2284, word: "decisive", meaning: "決定性", ex_kr: "Our boss is very decisive, so it did not take long to organize the project.", ex_zh: "我們的老闆做事非常果斷，所以組織這個專案並沒有花太長時間。" },
            { id: 2285, word: "esteemed", meaning: "尊敬的", ex_kr: "An esteemed scientist is coming to the university to talk about his discoveries.", ex_zh: "一位德高望重的科學家將來到大學，並講述他的研究發現。" },
            { id: 2286, word: "ethical", meaning: "倫理道德", ex_kr: "Many people believe that it is ethical to help others in need.", ex_zh: "許多人認為幫助有需要的人是合乎道德的。" },
            { id: 2287, word: "extinct", meaning: "滅絕", ex_kr: "There used to be dinosaurs all over the world, but now they are extinct.", ex_zh: "恐龍曾經遍布世界各地，但現在已經滅絕了。" },
            { id: 2288, word: "hardy", meaning: "耐寒的", ex_kr: "The farmer is a hardy man and doesn’t mind working outside.", ex_zh: "這位農夫身體強壯，不介意在戶外工作。" },
            { id: 2289, word: "institute", meaning: "研究所", ex_kr: "I am going to a lecture about Ancient Rome at the Historical Institute.", ex_zh: "我要去歷史研究所聽一場關於古羅馬的講座。" },
            { id: 2290, word: "jealousy", meaning: "妒忌", ex_kr: "She felt a lot of jealousy when she saw her friend with a new car.", ex_zh: "當她看到朋友開新車時，她感到非常嫉妒。" },
            { id: 2291, word: "migrate", meaning: "遷移", ex_kr: "Many birds migrate to warmer countries in the winter.", ex_zh: "許多鳥類在冬季遷徙到溫暖的國家。" },
            { id: 2292, word: "nurture", meaning: "培育", ex_kr: "Robert nurtured his plants, and that is why they grow so well.", ex_zh: "羅伯特精心照料他的植物，所以它們會長得這麼好。" },
            { id: 2293, word: "overhead", meaning: "開賣", ex_kr: "As we sat on the top of the hill, a plane flew overhead.", ex_zh: "我們坐在山頂上時，一架飛機從頭頂飛過。" },
            { id: 2294, word: "principle", meaning: "原則", ex_kr: "To maintain principles, it’s vital to watch, listen, and speak carefully.", ex_zh: "為了堅守原則，謹慎觀察、認真傾聽、謹慎發言至關重要。" },
            { id: 2295, word: "rural", meaning: "鄉村的", ex_kr: "I want to live in a small house in a rural area.", ex_zh: "我想住在鄉村地區的小房子裡。" },
            { id: 2296, word: "secluded", meaning: "僻", ex_kr: "There was a secluded bench in the park.", ex_zh: "公園裡有一張僻靜的長椅。" },
            { id: 2297, word: "species", meaning: "種", ex_kr: "There are 21 different species of butterfly in this forest.", ex_zh: "這片森林裡有21種不同的蝴蝶。" },
            { id: 2298, word: "swamp", meaning: "沼澤", ex_kr: "There are lots of wild animals living in the swamp.", ex_zh: "沼澤裡生活著許多野生動物。" },
            { id: 2299, word: "traverse", meaning: "橫穿", ex_kr: "The explorer traversed the desert alone on a camel.", ex_zh: "這位探險家獨自騎著駱駝穿越了沙漠。" },
            { id: 2300, word: "zoology", meaning: "動物學", ex_kr: "Helen wants to study zoology because she has always liked animals.", ex_zh: "海倫想學動物學，因為她一直很喜歡動物。" },
            { id: 2301, word: "accordingly", meaning: "因此", ex_kr: "He feels like he did a good job and his boss should pay him accordingly.", ex_zh: "他覺得自己工作做得很好，老闆應該給他相對應的報酬。" },
            { id: 2302, word: "anchor", meaning: "錨", ex_kr: "When the ship reached its destination, the crew dropped the anchor.", ex_zh: "當船到達目的地時，船員們拋錨停泊。" },
            { id: 2303, word: "cause", meaning: "原因", ex_kr: "Tiredness caused the accident.", ex_zh: "疲勞是造成事故的原因。" },
            { id: 2304, word: "context", meaning: "情境", ex_kr: "They studied the context of the battle before giving their presentation.", ex_zh: "在作報告之前，他們研究了這場戰役的背景。" },
            { id: 2305, word: "designate", meaning: "指定", ex_kr: "The famous lighthouse was designated as a historical monument.", ex_zh: "這座著名的燈塔被指定為歷史古蹟。" },
            { id: 2306, word: "distort", meaning: "扭曲", ex_kr: "The man’s lawyer distorted the facts so that he would be set free.", ex_zh: "該男子的律師歪曲事實，以便讓他獲得釋放。" },
            { id: 2307, word: "dock", meaning: "碼頭", ex_kr: "The huge ship pulled into the dock, and the crew unloaded the cargo.", ex_zh: "巨輪駛入碼頭，船員們卸下了貨物。" },
            { id: 2308, word: "energy", meaning: "活力", ex_kr: "If you lack energy, try eating better food.", ex_zh: "如果你感覺精力不足，可以嘗試吃得更健康一些。" },
            { id: 2309, word: "frequent", meaning: "頻繁", ex_kr: "While Dad was sick, the doctor made frequent visits to his house.", ex_zh: "爸爸生病期間，醫生常到他家看病。" },
            { id: 2310, word: "gears", meaning: "齒輪", ex_kr: "My brother has a car with four gears.", ex_zh: "我哥哥有一輛四速擋的車。" },
            { id: 2311, word: "genuine", meaning: "真的", ex_kr: "After the painting was determined to be genuine, it sold for a million dollars.", ex_zh: "經鑑定為真跡後，這幅畫以一百萬美元的價格售出。" },
            { id: 2312, word: "grease", meaning: "潤滑脂", ex_kr: "When I was done working on the car, I had grease all over my hands.", ex_zh: "當我修好車後，我的手上全是油污。" },
            { id: 2313, word: "knowledge", meaning: "知識", ex_kr: "He has trouble putting his knowledge into practice.", ex_zh: "他難以將所學知識付諸實踐。" },
            { id: 2314, word: "omit", meaning: "忽略", ex_kr: "I omitted some important information: he is not coming.", ex_zh: "我漏掉了一個重要訊息：他不會來了。" },
            { id: 2315, word: "offset", meaning: "抵銷", ex_kr: "Increased wages are offset by higher prices for goods.", ex_zh: "薪資上漲被商品價格上漲所抵銷。" },
            { id: 2316, word: "overlap", meaning: "重疊", ex_kr: "The gift on top overlaps the other gift on the bottom.", ex_zh: "上面的禮物蓋住了下面的禮物。" },
            { id: 2317, word: "secondhand", meaning: "二手", ex_kr: "Her secondhand jeans were a bit faded in the front.", ex_zh: "她的二手牛仔褲前面有點褪色。" },
            { id: 2318, word: "skill", meaning: "技能", ex_kr: "She worked with great skill and confidence.", ex_zh: "她工作技巧嫻熟，充滿自信。" },
            { id: 2319, word: "slot", meaning: "投幣口", ex_kr: "To operate the machine, put your coins into the slot.", ex_zh: "要操作機器，請將硬幣投入投幣口。" },
            { id: 2320, word: "tactic", meaning: "戰術", ex_kr: "Sam thought of a good tactic to attract more business.", ex_zh: "山姆想到了一個吸引更多顧客的好策略。" },
            { id: 2321, word: "beneficial", meaning: "有利", ex_kr: "Drinking milk every day is beneficial for your bones.", ex_zh: "每天喝牛奶對骨骼有益。" },
            { id: 2322, word: "birthplace", meaning: "出生地", ex_kr: "China is the birthplace of chopsticks.", ex_zh: "筷子的發源地是中國。" },
            { id: 2323, word: "capacity", meaning: "容量", ex_kr: "The parking lot has reached its full capacity.", ex_zh: "停車場已滿。" },
            { id: 2324, word: "comparative", meaning: "比較", ex_kr: "The money that John has is comparative to that of most other adults.", ex_zh: "約翰擁有的錢與其他大多數成年人相比並不算多。" },
            { id: 2325, word: "comprehensive", meaning: "綜合的", ex_kr: "The teacher gave us a comprehensive review for the exam.", ex_zh: "老師為我們做了全面的考前複習。" },
            { id: 2326, word: "conserve", meaning: "養護", ex_kr: "The group worked to conserve the beauty of Europe’s national parks.", ex_zh: "該組織致力於保護歐洲國家公園的美景。" },
            { id: 2327, word: "crucial", meaning: "至關重要的", ex_kr: "Clean air is crucial to the survival of humans, plants, and animals.", ex_zh: "乾淨的空氣對人類、植物和動物的生存至關重要。" },
            { id: 2328, word: "cumulative", meaning: "累計", ex_kr: "The cumulative snowfall in the area is fifty centimeters per year.", ex_zh: "該地區年累計降雪量為五十公分。" },
            { id: 2329, word: "deposit", meaning: "訂金", ex_kr: "I deposited the money into my bank account.", ex_zh: "我把錢存入了我的銀行帳戶。" },
            { id: 2330, word: "distribute", meaning: "散佈", ex_kr: "The teacher distributed crayons and markers to her students.", ex_zh: "老師分發了蠟筆和馬克筆給學生。" },
            { id: 2331, word: "equator", meaning: "赤道", ex_kr: "The equator crosses the northern part of South America.", ex_zh: "赤道橫穿南美洲北部。" },
            { id: 2332, word: "exotic", meaning: "異國情調", ex_kr: "Rebecca tried many exotic foods on her trip to Africa.", ex_zh: "麗貝卡在非洲旅行期間品嚐了許多異國美食。" },
            { id: 2333, word: "federal", meaning: "聯邦", ex_kr: "Sometimes federal laws are different from state laws.", ex_zh: "有時聯邦法律與州法律有所不同。" },
            { id: 2334, word: "formation", meaning: "形成", ex_kr: "The formation of ice happens when water freezes.", ex_zh: "冰的形成發生在水結冰的時候。" },
            { id: 2335, word: "frequency", meaning: "頻率", ex_kr: "The frequency of rainstorms is very high, especially during the spring.", ex_zh: "暴雨發生的頻率很高，尤其是在春季。" },
            { id: 2336, word: "objective", meaning: "客觀的", ex_kr: "My objective this week is to finish my homework by 7:30 every night.", ex_zh: "我本週的目標是每天晚上7:30前完成作業。" },
            { id: 2337, word: "oxygen", meaning: "氧", ex_kr: "She thinks there is more oxygen in the air in the country than in the city.", ex_zh: "她認為鄉村空氣中的氧氣含量比城市空氣中的氧氣含量更高。" },
            { id: 2338, word: "rainforest", meaning: "熱帶雨林", ex_kr: "The rainforest is home to many animals.", ex_zh: "熱帶雨林是許多動物的家。" },
            { id: 2339, word: "strategy", meaning: "策略", ex_kr: "The team came up with a strategy to win the game.", ex_zh: "球隊制定了贏得比賽的策略。" },
            { id: 2340, word: "wooded", meaning: "樹木繁茂的", ex_kr: "Jim and Ben decided to go hiking in the wooded area by the river.", ex_zh: "吉姆和班決定去河邊的樹林裡健行。" },
            { id: 2341, word: "avail", meaning: "可用", ex_kr: "His studying was to no avail because he failed the test.", ex_zh: "他的努力學習毫無用處，因為他考試不及格。" },
            { id: 2342, word: "define", meaning: "定義", ex_kr: "People define success in many different ways.", ex_zh: "人們對成功的定義各不相同。" },
            { id: 2343, word: "dread", meaning: "恐懼", ex_kr: "I dread the possibility that I will not get into college.", ex_zh: "我害怕自己考不上大學。" },
            { id: 2344, word: "expand", meaning: "擴張", ex_kr: "A balloon will expand as you blow air into it.", ex_zh: "當你向氣球裡吹氣時，氣球會膨脹。" },
            { id: 2345, word: "fundamental", meaning: "基本的", ex_kr: "The fundamental rules of basketball are easy.", ex_zh: "籃球的基本規則很簡單。" },
            { id: 2346, word: "horrifying", meaning: "恐怖的", ex_kr: "There was a horrifying car accident today.", ex_zh: "今天發生了一起駭人的車禍。" },
            { id: 2347, word: "incredulous", meaning: "難以置信", ex_kr: "She was incredulous that monkeys could ever drive a car.", ex_zh: "她難以置信猴子竟然會開車。" },
            { id: 2348, word: "linger", meaning: "縈繞", ex_kr: "The smell of fresh cookies lingered in the bakery.", ex_zh: "麵包店裡瀰漫著新鮮出爐的餅乾香味。" },
            { id: 2349, word: "organism", meaning: "生物", ex_kr: "We studied the organism under the microscope.", ex_zh: "我們用顯微鏡觀察了這種生物。" },
            { id: 2350, word: "paraphrase", meaning: "釋義", ex_kr: "The students were asked to paraphrase the story they had just heard.", ex_zh: "學生被要求用自己的話複述他們剛剛聽到的故事。" },
            { id: 2351, word: "plague", meaning: "瘟疫", ex_kr: "A plague in Europe killed millions of people.", ex_zh: "歐洲的一場瘟疫奪走了數百萬人的生命。" },
            { id: 2352, word: "presently", meaning: "目前", ex_kr: "Presently, our profits are good, but by next year we can do even better.", ex_zh: "目前我們的利潤不錯，但明年我們可以做得更好。" },
            { id: 2353, word: "random", meaning: "隨機的", ex_kr: "Young children often ask random questions.", ex_zh: "幼兒常會問一些莫名其妙的問題。" },
            { id: 2354, word: "riot", meaning: "暴動", ex_kr: "A riot broke out after the candidate lost the election.", ex_zh: "候選人落選後，爆發了騷亂。" },
            { id: 2355, word: "scribble", meaning: "塗", ex_kr: "I scribbled a rough diagram of our plan and gave it to him.", ex_zh: "我潦草地畫了一張計劃草圖，然後交給了他。" },
            { id: 2356, word: "shrine", meaning: "神社", ex_kr: "He prayed at the shrine for an hour.", ex_zh: "他在神龕前祈禱了一個小時。" },
            { id: 2357, word: "solitude", meaning: "孤獨", ex_kr: "John lives a life of solitude because he doesn’t get along well with people.", ex_zh: "約翰過著孤獨的生活，因為他不善於與人相處。" },
            { id: 2358, word: "stark", meaning: "史塔克", ex_kr: "There is a stark contrast between their test scores.", ex_zh: "他們的考試成績形成了鮮明的對比。" },
            { id: 2359, word: "summon", meaning: "召喚", ex_kr: "We summoned the doctor as soon as we noticed she was sick.", ex_zh: "我們一發現她生病就立刻叫了醫生。" },
            { id: 2360, word: "worsen", meaning: "惡化", ex_kr: "The weather suddenly worsened, and we had to stay inside.", ex_zh: "天氣突然惡化，我們只好待在室內。" },
            { id: 2361, word: "automobile", meaning: "汽車", ex_kr: "The first automobiles were very different from the ones that exist today.", ex_zh: "第一代汽車與今天的汽車截然不同。" },
            { id: 2362, word: "candidate", meaning: "候選人", ex_kr: "Alice is the best candidate for the job.", ex_zh: "愛麗絲是這份工作的最佳人選。" },
            { id: 2363, word: "confidential", meaning: "機密的", ex_kr: "The information from the meeting is confidential.", ex_zh: "會議內容屬於機密資訊。" },
            { id: 2364, word: "corporate", meaning: "公司的", ex_kr: "Tom enjoys working in the corporate world.", ex_zh: "湯姆很享受在企業界工作。" },
            { id: 2365, word: "enhance", meaning: "提高", ex_kr: "Amy’s blue shirt really enhances the color of her eyes.", ex_zh: "艾米的藍色襯衫襯得她的眼睛顏色更漂亮了。" },
            { id: 2366, word: "era", meaning: "時代", ex_kr: "During the medieval era, knights wore protective armor.", ex_zh: "中世紀時期，騎士們穿著防護盔甲。" },
            { id: 2367, word: "guideline", meaning: "指引", ex_kr: "Before they began the project, the teacher gave them some guidelines.", ex_zh: "在他們開始專案之前，老師給了他們一些指導方針。" },
            { id: 2368, word: "incorporate", meaning: "包含", ex_kr: "I decided to incorporate a new ingredient into my cake recipe.", ex_zh: "我決定在我的蛋糕配方中加入新的食材。" },
            { id: 2369, word: "interact", meaning: "相互影響", ex_kr: "The kids began to interact when the adults left the room.", ex_zh: "大人離開房間後，孩子們開始互相交流。" },
            { id: 2370, word: "interval", meaning: "間隔", ex_kr: "Tony rested for brief intervals while he worked in the yard.", ex_zh: "當托尼在院子裡工作時，不時休息片刻。" },
            { id: 2371, word: "mobile", meaning: "移動的", ex_kr: "Mobile phones are convenient because you can use them anywhere.", ex_zh: "手機很方便，因為你可以隨時隨地使用。" },
            { id: 2372, word: "modify", meaning: "調整", ex_kr: "I modified my outfit by adding a belt to it.", ex_zh: "我為我的衣服加了一條腰帶，讓它更時尚一些。" },
            { id: 2373, word: "parallel", meaning: "平行線", ex_kr: "There are two yellow parallel lines dividing both sides of traffic.", ex_zh: "兩條黃色平行線將兩側車流分隔開來。" },
            { id: 2374, word: "phenomenon", meaning: "現象", ex_kr: "I thought the lights were a strange phenomenon, but they were just shooting stars.", ex_zh: "我以為那些光點是一種奇特的現象，但它們只是流星而已。" },
            { id: 2375, word: "pollute", meaning: "污染", ex_kr: "The careless factory polluted the river with chemicals.", ex_zh: "這家粗心的工廠用化學物質污染了河流。" },
            { id: 2376, word: "ridicule", meaning: "嘲笑", ex_kr: "The other students ridicule Peter’s foreign accent.", ex_zh: "其他學生嘲笑彼得的外國口音。" },
            { id: 2377, word: "solar", meaning: "太陽的", ex_kr: "Using solar energy is good for the environment.", ex_zh: "利用太陽能對環境有益。" },
            { id: 2378, word: "territory", meaning: "領土", ex_kr: "Gibraltar is a territory of Great Britain.", ex_zh: "直布羅陀是英國的領土。" },
            { id: 2379, word: "tournament", meaning: "比賽", ex_kr: "My dad is playing in a golf tournament tomorrow.", ex_zh: "我爸爸明天要參加高爾夫球錦標賽。" },
            { id: 2380, word: "transportation", meaning: "運輸", ex_kr: "I don’t have a car, so my normal transportation is the train.", ex_zh: "我沒有車，所以我的日常交通工具是火車。" },
            { id: 2381, word: "bill", meaning: "帳單", ex_kr: "I have so many bills that I do not know how to pay them all.", ex_zh: "我欠了太多帳單，不知道該怎麼付清。" },
            { id: 2382, word: "boundary", meaning: "邊界", ex_kr: "This fence shows the boundary between our yard and yours.", ex_zh: "這道柵欄標示了我們院子和你們院子的邊界。" },
            { id: 2383, word: "chaos", meaning: "混亂", ex_kr: "His presentation was in chaos. I couldn’t understand what he meant.", ex_zh: "他的演講一團糟，我完全聽不懂他在說什麼。" },
            { id: 2384, word: "consistent", meaning: "持續的", ex_kr: "Sara comes in every day and is our most consistent worker.", ex_zh: "薩拉每天都來上班，是我們最穩定的員工。" },
            { id: 2385, word: "cyclone", meaning: "氣旋", ex_kr: "Hundreds of homes were damaged by the cyclone.", ex_zh: "颶風造成數百戶房屋受損。" },
            { id: 2386, word: "doomed", meaning: "注定失敗", ex_kr: "Since I spent all my money, my date with Jane is doomed.", ex_zh: "因為我把錢都花光了，所以我和簡的約會注定要泡湯了。" },
            { id: 2387, word: "heir", meaning: "繼承人", ex_kr: "The princess was the heir to the king and queen’s throne.", ex_zh: "公主是國王和王后的王位繼承人。" },
            { id: 2388, word: "martial", meaning: "武術", ex_kr: "Karate is a martial art that began many years ago in Japan.", ex_zh: "空手道是一種起源於日本的武術，已有很長的歷史。" },
            { id: 2389, word: "organic", meaning: "有機的", ex_kr: "The organic carrots are more expensive, but they’re better for you.", ex_zh: "有機胡蘿蔔雖然更貴，但對你的健康更有益。" },
            { id: 2390, word: "poultry", meaning: "家禽", ex_kr: "He raises poultry and sells their meat for extra money.", ex_zh: "他飼養家禽，然後出售禽肉以賺取額外收入。" },
            { id: 2391, word: "scramble", meaning: "爭奪", ex_kr: "The hikers scrambled down the side of the hill.", ex_zh: "登山者們手腳並用地爬下了山坡。" },
            { id: 2392, word: "sergeant", meaning: "軍士", ex_kr: "He was promoted to sergeant after a year in the army.", ex_zh: "他在軍隊服役一年後晉升為中士。" },
            { id: 2393, word: "sheer", meaning: "透明", ex_kr: "I was impressed by her sheer dedication to jogging.", ex_zh: "她對慢跑的執著讓我印象深刻。" },
            { id: 2394, word: "stance", meaning: "姿態", ex_kr: "My stance is that using oil and gas is bad for the environment.", ex_zh: "我的立場是，使用石油和天然氣對環境有害。" },
            { id: 2395, word: "telegraph", meaning: "電報", ex_kr: "In the 1900s, the telegraph was the fastest way to send a message.", ex_zh: "在 20 世紀初，電報是傳遞訊息最快的方式。" },
            { id: 2396, word: "textile", meaning: "紡織品", ex_kr: "The blue textile was going to be used to make blouses.", ex_zh: "這塊藍色布料將用來製作女式襯衫。" },
            { id: 2397, word: "tornado", meaning: "龍捲風", ex_kr: "During a tornado, the safest place to be is underground.", ex_zh: "龍捲風來襲時，最安全的地方是地下。" },
            { id: 2398, word: "typhoon", meaning: "颱風", ex_kr: "Thousands of people lost electricity after a typhoon hit Australia.", ex_zh: "颱風襲擊澳洲後，數千人斷電。" },
            { id: 2399, word: "wail", meaning: "哀號", ex_kr: "The baby wailed because it was hungry.", ex_zh: "嬰兒哭鬧是因為餓了。" },
            { id: 2400, word: "wardrobe", meaning: "衣櫃", ex_kr: "She bought some new clothes to expand her wardrobe.", ex_zh: "她買了一些新衣服來擴充自己的衣櫃。" },
            { id: 2401, word: "adverse", meaning: "不利", ex_kr: "I worry that the tornado will have an adverse effect on the farm.", ex_zh: "我擔心龍捲風會對農場造成不利影響。" },
            { id: 2402, word: "alternate", meaning: "備用", ex_kr: "Taking the bus and driving to work are alternate ways to travel.", ex_zh: "搭乘公車和開車上班都是可行的出行方式。" },
            { id: 2403, word: "biodegradable", meaning: "可生物降解", ex_kr: "I use biodegradable compost to feed my garden.", ex_zh: "我用可生物分解的堆肥來為我的花園施肥。" },
            { id: 2404, word: "boxed", meaning: "盒裝", ex_kr: "Justine brought a boxed gift to the birthday party.", ex_zh: "賈斯汀帶了一份盒裝禮物去參加生日派對。" },
            { id: 2405, word: "choke", meaning: "嗆", ex_kr: "The gum Malinda swallowed made her choke.", ex_zh: "瑪琳達吞下的口香糖讓她噎住了。" },
            { id: 2406, word: "convenient", meaning: "方便的", ex_kr: "Walking through the park is a convenient way to exercise on the way to work.", ex_zh: "步行穿過公園是上班途中運動的便捷方式。" },
            { id: 2407, word: "discard", meaning: "丟棄", ex_kr: "After repairing the window, discard any broken glass.", ex_zh: "修好窗戶後，丟棄所有碎玻璃。" },
            { id: 2408, word: "dolphin", meaning: "海豚", ex_kr: "Intelligent dolphins have learned to communicate with humans.", ex_zh: "聰明的海豚已經學會了與人類溝通。" },
            { id: 2409, word: "ecologically", meaning: "生態學", ex_kr: "We planted our garden according to ecologically correct practices.", ex_zh: "我們按照生態環保的方式種植了我們的花園。" },
            { id: 2410, word: "fatal", meaning: "致命的", ex_kr: "Being shot by the attacker proved fatal to the victim.", ex_zh: "襲擊者開槍射擊導致受害者死亡。" },
            { id: 2411, word: "incidence", meaning: "發生率", ex_kr: "We need to increase the incidence of success in school.", ex_zh: "我們需要提高學生在學校成功的幾率。" },
            { id: 2412, word: "municipal", meaning: "市政", ex_kr: "The municipal parking lot downtown can fit one hundred cars.", ex_zh: "市中心的市政停車場可容納一百輛汽車。" },
            { id: 2413, word: "overuse", meaning: "過度使用", ex_kr: "Rochelle’s overuse of the exercise bike caused the gears to break.", ex_zh: "羅謝爾過度使用健身自行車導致齒輪損壞。" },
            { id: 2414, word: "pond", meaning: "池塘", ex_kr: "I learned to swim at the pond behind the recreation center.", ex_zh: "我是在休閒中心後方的池塘學會游泳的。" },
            { id: 2415, word: "recycle", meaning: "回收", ex_kr: "We recycle our newspapers so that they can be made into packing boxes.", ex_zh: "我們會回收報紙，以便將其製成包裝盒。" },
            { id: 2416, word: "reusable", meaning: "可重複使用的", ex_kr: "Saburo keeps his empty jelly jars because they are reusable for storing sewing supplies.", ex_zh: "三郎保留空的果醬罐，因為它們可以重複利用來存放縫紉用品。" },
            { id: 2417, word: "stuffed", meaning: "填充", ex_kr: "The newspapers were all stuffed into the drawer.", ex_zh: "報紙全都被塞進抽屜裡了。" },
            { id: 2418, word: "tragic", meaning: "悲慘", ex_kr: "The entire community attended the memorial service for the victims of the tragic fire.", ex_zh: "全社區居民都參加了這場悲慘火災罹難者的追悼會。" },
            { id: 2419, word: "utilize", meaning: "利用", ex_kr: "The team can utilize the lab equipment to complete the experiment.", ex_zh: "團隊可以利用實驗室設備完成實驗。" },
            { id: 2420, word: "whale", meaning: "鯨", ex_kr: "We were surprised when a whale surfaced next to our boat.", ex_zh: "一隻鯨魚突然出現在我們船邊，我們都嚇了一跳。" },
            { id: 2421, word: "amateur", meaning: "業餘", ex_kr: "The amateur took pictures just as well as the person who worked for money.", ex_zh: "這位業餘攝影師拍的照片和專業攝影師拍的照片一樣好。" },
            { id: 2422, word: "ambiguous", meaning: "模糊的", ex_kr: "It’s ambiguous as to whether a newborn baby looks like a girl or a boy.", ex_zh: "新生兒的性別很難判斷，很難說是女孩還是男孩。" },
            { id: 2423, word: "anonymous", meaning: "匿名的", ex_kr: "An anonymous donor gave a thousand dollars to the museum.", ex_zh: "一位匿名捐贈者向博物館捐贈了一千美元。" },
            { id: 2424, word: "attain", meaning: "達到", ex_kr: "If you want to attain a healthy body, you must exercise every day.", ex_zh: "想要擁有健康的身體，就必須每天運動。" },
            { id: 2425, word: "autonomy", meaning: "自治", ex_kr: "In the 1800s, the people of India fought for autonomy from Britain.", ex_zh: "19世紀，印度人民為擺脫英國的統治而鬥爭，爭取自治。" },
            { id: 2426, word: "concession", meaning: "讓步", ex_kr: "China gave Hong Kong to Britain as a concession after the war.", ex_zh: "戰後，中國將香港割讓給英國。" },
            { id: 2427, word: "decay", meaning: "衰變", ex_kr: "The decay in the old building was obvious.", ex_zh: "老建築的破敗顯而易見。" },
            { id: 2428, word: "dwell", meaning: "住", ex_kr: "Before he was a successful writer, Mark Twain dwelled in the city of Hannibal, Missouri.", ex_zh: "在成為一名成功的作家之前，馬克吐溫住在密蘇裡州的漢尼拔市。" },
            { id: 2429, word: "enlighten", meaning: "開導", ex_kr: "Greek philosophers wanted to enlighten the people of Athens with their ideas.", ex_zh: "希臘哲學家希望用他們的思想啟迪雅典人民。" },
            { id: 2430, word: "enrich", meaning: "豐富", ex_kr: "Taxes on people’s income can be used to enrich the government.", ex_zh: "對人民收入徵收的稅款可能會使政府中飽私囊。" },
            { id: 2431, word: "flourish", meaning: "繁榮", ex_kr: "The Roman Empire flourished in Europe two thousand years ago.", ex_zh: "兩千年前，羅馬帝國在歐洲蓬勃發展。" },
            { id: 2432, word: "geometry", meaning: "幾何學", ex_kr: "If you want to be able to calculate the area of a circle, you must study geometry.", ex_zh: "如果你想計算圓的面積，就必須學習幾何。" },
            { id: 2433, word: "gleam", meaning: "閃耀", ex_kr: "The waves of the ocean would gleam every night at sunset.", ex_zh: "每天日落時分，海浪都會閃閃發光。" },
            { id: 2434, word: "greed", meaning: "貪婪", ex_kr: "The story of King Midas is a story of greed.", ex_zh: "邁達斯國王的故事是一個關於貪婪的故事。" },
            { id: 2435, word: "harmony", meaning: "和諧", ex_kr: "The United Nations is struggling to bring peace and harmony to the world.", ex_zh: "聯合國正努力為世界帶來和平與和諧。" },
            { id: 2436, word: "indigenous", meaning: "原住民", ex_kr: "The Pueblo people were an indigenous tribe in Arizona who lived in adobe homes.", ex_zh: "普韋布洛人是亞利桑那州的一個原住民部落，他們住在土坯房裡。" },
            { id: 2437, word: "jurisdiction", meaning: "管轄權", ex_kr: "We did not have jurisdiction to bring the criminal to trial.", ex_zh: "我們沒有管轄權將罪犯繩之以法。" },
            { id: 2438, word: "parade", meaning: "遊行", ex_kr: "This parade of elephants is part of an open-air exhibit to honor these majestic animals.", ex_zh: "這場大象遊行是露天展覽的一部分，旨在向這些雄偉的動物致敬。" },
            { id: 2439, word: "statue", meaning: "雕像", ex_kr: "The Venus de Milo is a famous ancient Greek statue.", ex_zh: "米洛的維納斯是一尊著名的古希臘雕像。" },
            { id: 2440, word: "virgin", meaning: "處女", ex_kr: "The virgin goddess of the moon was known as Diana.", ex_zh: "月亮女神，也被稱為狄安娜。" },
            { id: 2441, word: "abnormal", meaning: "異常", ex_kr: "I felt abnormal this morning, like I was sick.", ex_zh: "我今天早上感覺不太對勁，好像生病了。" },
            { id: 2442, word: "absent", meaning: "缺席的", ex_kr: "I was absent from school yesterday because I went on a trip with my father.", ex_zh: "我昨天沒去上學，因為我和爸爸一起去旅行了。" },
            { id: 2443, word: "adjacent", meaning: "鄰近的", ex_kr: "My apartment is adjacent to a lovely park and playground.", ex_zh: "我的公寓毗鄰一個美麗的公園和遊樂場。" },
            { id: 2444, word: "aluminum", meaning: "鋁", ex_kr: "I used the aluminum foil to wrap the food.", ex_zh: "我用鋁箔紙包裹食物。" },
            { id: 2445, word: "applicable", meaning: "適用的", ex_kr: "I discovered that my old password was no longer applicable to the website.", ex_zh: "我發現我之前的密碼已經不能用於該網站了。" },
            { id: 2446, word: "artificial", meaning: "人造的", ex_kr: "The artificial Christmas tree was made of plastic.", ex_zh: "那棵人造聖誕樹是用塑膠做的。" },
            { id: 2447, word: "bicycle", meaning: "自行車", ex_kr: "I rode my bicycle down the mountain road.", ex_zh: "我騎著腳踏車沿著山路下山。" },
            { id: 2448, word: "broker", meaning: "經紀人", ex_kr: "The lawyer will broker our agreement.", ex_zh: "律師將負責斡旋我們的協議。" },
            { id: 2449, word: "bureaucracy", meaning: "官僚", ex_kr: "The members of the bureaucracy were flooded by too many petitions.", ex_zh: "官僚機構成員被大量的請願書淹沒了。" },
            { id: 2450, word: "configure", meaning: "配置", ex_kr: "The engineer helped to configure my new computer.", ex_zh: "工程師幫我配置了新電腦。" },
            { id: 2451, word: "consolidate", meaning: "合併", ex_kr: "When we moved in together, we had to consolidate our belongings.", ex_zh: "我們搬到一起住的時候，不得不把各自的物品集中起來。" },
            { id: 2452, word: "convenience", meaning: "方便", ex_kr: "I love the convenience of having a swimming pool in my back yard.", ex_zh: "我喜歡後院有泳池帶來的便利。" },
            { id: 2453, word: "deduct", meaning: "扣除", ex_kr: "I had to deduct my expenses from my checkbook.", ex_zh: "我必須從支票簿中扣除我的開支。" },
            { id: 2454, word: "deem", meaning: "認為", ex_kr: "I deemed the ice cream to be very delicious.", ex_zh: "我覺得這款冰淇淋非常好吃。" },
            { id: 2455, word: "entrepreneur", meaning: "企業家", ex_kr: "The entrepreneur made a success out of his new business.", ex_zh: "這位企業家的新事業取得了成功。" },
            { id: 2456, word: "evenly", meaning: "均勻地", ex_kr: "Sprinkle the sugar evenly all over the cookies.", ex_zh: "將糖均勻地撒在餅乾表面。" },
            { id: 2457, word: "fiscal", meaning: "財", ex_kr: "Did the company show fiscal growth this year?", ex_zh: "該公司今年是否實現了財務成長？" },
            { id: 2458, word: "franchise", meaning: "特許經營", ex_kr: "The fast food restaurant has a franchise near my home.", ex_zh: "這家快餐店在我家附近有一家加盟店。" },
            { id: 2459, word: "ideological", meaning: "思想", ex_kr: "The citizens of England had ideological differenes about its government.", ex_zh: "英國公民對政府有意識形態上的分歧。" },
            { id: 2460, word: "robot", meaning: "機器人", ex_kr: "I bought a robot that can clean the floor on its own.", ex_zh: "我買了一台可以自動清潔地板的機器人。" },
            { id: 2461, word: "abbey", meaning: "修道院", ex_kr: "When the monk returned to the abbey, he went immediately to his bedroom.", ex_zh: "僧侶回到修道院後，立即回到了自己的臥室。" },
            { id: 2462, word: "abundant", meaning: "豐富", ex_kr: "Cakes, cookies, and candy were so abundant that the child was very happy.", ex_zh: "蛋糕、餅乾和糖果應有盡有，孩子非常開心。" },
            { id: 2463, word: "adjoin", meaning: "毗", ex_kr: "She can listen to her brother’s conversations because her room adjoins his.", ex_zh: "因為她的房間和她哥哥的房間相鄰，所以她可以聽到他們之間的對話。" },
            { id: 2464, word: "ample", meaning: "充足", ex_kr: "There was an ample supply of oats to feed the horses.", ex_zh: "有充足的燕麥來餵馬。" },
            { id: 2465, word: "arid", meaning: "乾旱", ex_kr: "Not many plants grow in the arid desert.", ex_zh: "乾旱的沙漠裡植物生長稀少。" },
            { id: 2466, word: "cathedral", meaning: "大教堂", ex_kr: "The large cathedral is full of people on Sunday mornings.", ex_zh: "星期天早上，這座大教堂擠滿了人。" },
            { id: 2467, word: "crisis", meaning: "危機", ex_kr: "The crisis was over and things returned to normal.", ex_zh: "危機過去了，一切恢復正常。" },
            { id: 2468, word: "deprive", meaning: "剝奪", ex_kr: "Because the child was bad, she was deprived of her dessert after dinner.", ex_zh: "因為孩子表現不好，晚餐後不給她甜點。" },
            { id: 2469, word: "drought", meaning: "乾旱", ex_kr: "After three months of drought, the vegetation and trees started dying.", ex_zh: "經過三個月的乾旱，植被和樹木開始枯萎。" },
            { id: 2470, word: "eligible", meaning: "有資格的", ex_kr: "Only people who bought tickets were eligible to win a prize.", ex_zh: "只有購買彩券的人才有資格中獎。" },
            { id: 2471, word: "fast", meaning: "快速地", ex_kr: "In her religion, they fast for five days and then have a big feast.", ex_zh: "在她的宗教信仰中，他們會齋戒五天，然後舉行盛大的宴會。" },
            { id: 2472, word: "grumble", meaning: "嘰", ex_kr: "He grumbled about having to work late on Friday.", ex_zh: "他抱怨說週五要加班到很晚。" },
            { id: 2473, word: "inland", meaning: "內陸", ex_kr: "The river curved inland near the campground.", ex_zh: "河流在露營地附近向內陸彎曲。" },
            { id: 2474, word: "moisture", meaning: "水分", ex_kr: "If you breathe on a window, moisture from your breath collects on the glass.", ex_zh: "如果你對著窗戶哈氣，呼出的水分就會凝結在玻璃上。" },
            { id: 2475, word: "nonetheless", meaning: "儘管如此", ex_kr: "She tried to keep the dog out of the mud, but it got dirty nonetheless.", ex_zh: "她盡量不讓狗狗掉進泥巴裡，但它還是弄髒了。" },
            { id: 2476, word: "oath", meaning: "誓言", ex_kr: "Judges must take an oath to be fair to everyone in court.", ex_zh: "法官必須宣誓公平對待法庭上的每一個人。" },
            { id: 2477, word: "prairie", meaning: "草原", ex_kr: "The prairie was perfect for a farm because there were hills and trees.", ex_zh: "這片草原非常適合開農場，因為那裡有山丘和樹木。" },
            { id: 2478, word: "rugged", meaning: "崎嶇", ex_kr: "Their car couldn’t make it far along the rugged roads.", ex_zh: "他們的車在崎嶇的道路上行駛不了多遠。" },
            { id: 2479, word: "scarce", meaning: "稀少", ex_kr: "When gasoline was scarce, we rode our bike to school instead of driving.", ex_zh: "汽油短缺的時候，我們騎自行車去上學，而不是開車。" },
            { id: 2480, word: "speculate", meaning: "推測", ex_kr: "My sister looked at the sky and speculated that it would rain tomorrow.", ex_zh: "我姐姐抬頭望天，猜測明天會下雨。" },
            { id: 2481, word: "aquatic", meaning: "水", ex_kr: "The dolphin is an aquatic mammal.", ex_zh: "海豚是水生哺乳動物。" },
            { id: 2482, word: "biosphere", meaning: "生物圈", ex_kr: "Birds, trees, and worms all thrive in the biosphere.", ex_zh: "鳥類、樹木和蠕蟲都在生物圈中繁衍生息。" },
            { id: 2483, word: "bizarre", meaning: "怪異", ex_kr: "My bizarre dreams make no sense to me when I am awake.", ex_zh: "醒來後，我那些離奇的夢境對我來說毫無意義。" },
            { id: 2484, word: "Celsius", meaning: "攝氏度", ex_kr: "Water freezes at zero degrees Celsius.", ex_zh: "水在攝氏零度結冰。" },
            { id: 2485, word: "coarse", meaning: "粗", ex_kr: "The coarse sweater made my skin itch.", ex_zh: "粗糙的毛衣讓我的皮膚發癢。" },
            { id: 2486, word: "companion", meaning: "伴侶", ex_kr: "I always walk to school with my companion Frank.", ex_zh: "我總是和我的夥伴弗蘭克一起步行上學。" },
            { id: 2487, word: "digest", meaning: "消化", ex_kr: "Allow some time for food to be digested before going swimming.", ex_zh: "游泳前要留一些時間讓食物消化。" },
            { id: 2488, word: "duration", meaning: "期間", ex_kr: "The girls watched television for the duration of the evening.", ex_zh: "整個晚上，女孩們都在看電視。" },
            { id: 2489, word: "ecology", meaning: "生態", ex_kr: "We study ecology to learn how to help improve the Earth.", ex_zh: "我們學習生態學是為了了解如何幫助改善地球。" },
            { id: 2490, word: "feat", meaning: "特徵", ex_kr: "The elephant’s standing up on one leg was a feat.", ex_zh: "大象單腳站立是一項壯舉。" },
            { id: 2491, word: "infinite", meaning: "無限", ex_kr: "Many scientists believe that the universe is infinite.", ex_zh: "許多科學家認為宇宙是無限的。" },
            { id: 2492, word: "nucleus", meaning: "核", ex_kr: "The nucleus is made up of many tiny particles.", ex_zh: "原子核由許多微小粒子組成。" },
            { id: 2493, word: "parasite", meaning: "寄生蟲", ex_kr: "The sick dog was covered in parasites.", ex_zh: "那隻生病的狗身上爬滿了寄生蟲。" },
            { id: 2494, word: "prominent", meaning: "著名的", ex_kr: "Queen Victoria was a prominent person in history.", ex_zh: "維多利亞女王是歷史上一位傑出人物。" },
            { id: 2495, word: "repetitive", meaning: "重複", ex_kr: "Working on an assembly line making cars every day is a repetitive job.", ex_zh: "在裝配線上每天製造汽車是一項重複性的工作。" },
            { id: 2496, word: "reproductive", meaning: "生殖", ex_kr: "The reproductive system of a plant is simple.", ex_zh: "植物的繁殖系統很簡單。" },
            { id: 2497, word: "temperate", meaning: "溫帶", ex_kr: "In Peru, the weather is temperate and rarely gets too hot or cold.", ex_zh: "秘魯氣候溫和，很少會太熱或太冷。" },
            { id: 2498, word: "tolerance", meaning: "寬容", ex_kr: "Boxers have a high tolerance for pain.", ex_zh: "拳擊手對疼痛的耐受力很高。" },
            { id: 2499, word: "undergo", meaning: "經歷", ex_kr: "The cancer patient undergoes treatments twice a week.", ex_zh: "這位癌症患者每週接受兩次治療。" },
            { id: 2500, word: "vulnerable", meaning: "易受傷害的", ex_kr: "He felt very vulnerable when he was stranded in the desert.", ex_zh: "被困在沙漠裡時，他感到非常脆弱無助。" },
            { id: 2501, word: "archaic", meaning: "古老的", ex_kr: "To be competitive, we must update our archaic equipment.", ex_zh: "為了保持競爭力，我們必須更新老舊的設備。" },
            { id: 2502, word: "brass", meaning: "黃銅", ex_kr: "Brass is used to make musical instruments like trumpets.", ex_zh: "黃銅常用於製作小號等樂器。" },
            { id: 2503, word: "capitalism", meaning: "資本主義", ex_kr: "Most economies in the world today are based on capitalism.", ex_zh: "當今世界大多數經濟體都以資本主義為基礎。" },
            { id: 2504, word: "component", meaning: "成分", ex_kr: "Computers have many different components, so they are complicated to build.", ex_zh: "計算機由許多不同的組件構成，因此組裝起來很複雜。" },
            { id: 2505, word: "dependence", meaning: "依賴性", ex_kr: "Young children have a dependence on their parents.", ex_zh: "幼童對父母有依賴性。" },
            { id: 2506, word: "diminish", meaning: "減少", ex_kr: "As the economy got worse, my savings diminished.", ex_zh: "隨著經濟狀況惡化，我的積蓄也減少了。" },
            { id: 2507, word: "drawback", meaning: "退稅", ex_kr: "The drawback of having a car is that it is very expensive to maintain.", ex_zh: "擁有汽車的缺點是維護成本非常高。" },
            { id: 2508, word: "impose", meaning: "強加", ex_kr: "He imposes on his wife every morning by expecting her to make his breakfast.", ex_zh: "他每天早上都要求妻子為他做早餐，這簡直是刁難她。" },
            { id: 2509, word: "industry", meaning: "產業", ex_kr: "The tourist industry is doing well all around the world.", ex_zh: "世界各地的旅遊業都發展良好。" },
            { id: 2510, word: "managerial", meaning: "管理", ex_kr: "Nancy has a managerial position at the bank.", ex_zh: "南希在銀行擔任管理職。" },
            { id: 2511, word: "medieval", meaning: "中世紀", ex_kr: "We visited a castle that was built during medieval times.", ex_zh: "我們參觀了一座建於中世紀的城堡。" },
            { id: 2512, word: "obsolete", meaning: "過時的", ex_kr: "Since computers became inexpensive, typewriters have become obsolete.", ex_zh: "由於電腦價格低廉，打字機已經過時了。" },
            { id: 2513, word: "oriented", meaning: "定向", ex_kr: "He is living a money-oriented lifestyle.", ex_zh: "他過著一種以金錢為中心的生活方式。" },
            { id: 2514, word: "peninsula", meaning: "半島", ex_kr: "The state of Florida is an example of a peninsula.", ex_zh: "佛羅裡達州就是一個半島的例子。" },
            { id: 2515, word: "prestige", meaning: "聲望", ex_kr: "The young actress gained much prestige after she won an award.", ex_zh: "這位年輕女演員獲獎後聲名鵲起。" },
            { id: 2516, word: "proportion", meaning: "部分", ex_kr: "Only a small proportion of the people in this town actually work here.", ex_zh: "這個鎮上只有一小部分人在這裡工作。" },
            { id: 2517, word: "radical", meaning: "激進的", ex_kr: "The president is planning to make some radical changes to the law.", ex_zh: "總統計劃對法律進行一些重大修改。" },
            { id: 2518, word: "refute", meaning: "反駁", ex_kr: "The bank manager has refuted the claims that he lied to his customers.", ex_zh: "銀行經理否認了有關他向客戶撒謊的指控。" },
            { id: 2519, word: "spectacular", meaning: "壯觀", ex_kr: "There was a spectacular fireworks display in the park at New Year.", ex_zh: "新年期間，公園裡舉行了一場壯觀的煙火秀。" },
            { id: 2520, word: "weave", meaning: "編織", ex_kr: "We saw a woman weave a blanket on our vacation to South America.", ex_zh: "我們在南美洲度假時，看到一位婦女在織毛毯。" },
            { id: 2521, word: "accountant", meaning: "會計", ex_kr: "The accountant helped us keep track of our spending.", ex_zh: "會計幫助我們記錄開支。" },
            { id: 2522, word: "capitalist", meaning: "資本家", ex_kr: "The capitalist invested in a factory that made wheat into cereal.", ex_zh: "這位資本家投資了一家將小麥加工成穀物的工廠。" },
            { id: 2523, word: "contempt", meaning: "鄙視", ex_kr: "The judge had contempt for the wicked criminal.", ex_zh: "法官對這個邪惡的罪犯充滿了蔑視。" },
            { id: 2524, word: "crop", meaning: "莊稼", ex_kr: "I had a good crop of onions this year.", ex_zh: "今年我的洋蔥大豐收。" },
            { id: 2525, word: "dedicate", meaning: "奉獻", ex_kr: "The nun dedicated herself to helping people in need.", ex_zh: "這位修女畢生致力於幫助有需要的人。" },
            { id: 2526, word: "ditch", meaning: "溝", ex_kr: "When the car slid off of the road, it fell into the ditch.", ex_zh: "汽車滑出路面後，掉進了路邊的溝裡。" },
            { id: 2527, word: "enterprise", meaning: "企業", ex_kr: "My father owns an advertising enterprise.", ex_zh: "我父親擁有一家廣告公司。" },
            { id: 2528, word: "finance", meaning: "金融", ex_kr: "The government financed the scientist’s experiments with new weapons.", ex_zh: "政府資助了這位科學家進行新型武器實驗。" },
            { id: 2529, word: "indifferent", meaning: "冷漠", ex_kr: "Lisa is indifferent toward school. She doesn’t care what her final grades are.", ex_zh: "麗莎對學校漠不關心。她不在乎自己的最終成績。" },
            { id: 2530, word: "irrigate", meaning: "灌溉", ex_kr: "In dry climates, it is important to irrigate fields of crops.", ex_zh: "在乾旱氣候下，灌溉農田非常重要。" },
            { id: 2531, word: "maximize", meaning: "最大化", ex_kr: "You should exercise regularly to maximize a healthy lifestyle.", ex_zh: "為了擁有健康的生活方式，你應該定期運動。" },
            { id: 2532, word: "monetary", meaning: "貨幣", ex_kr: "A strong monetary policy is important for a country to be successful.", ex_zh: "強而有力的貨幣政策對一個國家的成功至關重要。" },
            { id: 2533, word: "precaution", meaning: "預防", ex_kr: "As a precaution, you should put on a heavy coat before going out in cold weather.", ex_zh: "為了安全起見，在寒冷天氣外出前，你應該穿上厚外套。" },
            { id: 2534, word: "preliminary", meaning: "初步的", ex_kr: "The runners must do well in the preliminary races to qualify for the final race.", ex_zh: "參賽選手必須在預賽中取得好成績才能獲得決賽資格。" },
            { id: 2535, word: "saturate", meaning: "飽和", ex_kr: "The sponge was saturated with soapy water and dripped all over the floor.", ex_zh: "海綿被肥皂水浸透了，肥皂水滴得到處都是。" },
            { id: 2536, word: "simplicity", meaning: "簡單", ex_kr: "We were able to find the house thanks to the simplicity of the directions.", ex_zh: "多虧了簡單明了的指示，我們才找到了房子。" },
            { id: 2537, word: "sow", meaning: "母豬", ex_kr: "He always sows his garden seeds in the springtime.", ex_zh: "他總是在春天播種花園裡的種子。" },
            { id: 2538, word: "spade", meaning: "鏟", ex_kr: "The gardener used her spade to make a hole for the new plant.", ex_zh: "園丁用鏟子挖了個洞，準備種下這棵新植物。" },
            { id: 2539, word: "tomato", meaning: "番茄", ex_kr: "I like tomato sandwiches.", ex_zh: "我喜歡番茄三明治。" },
            { id: 2540, word: "upcoming", meaning: "即將到來的", ex_kr: "The kids were worried about their upcoming exam.", ex_zh: "孩子們很擔心即將到來的考試。" },
            { id: 2541, word: "anthropology", meaning: "人類學", ex_kr: "In anthropology class, I learned about simple tools that ancient cultures used.", ex_zh: "在人類學課上，我學習了古代文化使用的簡單工具。" },
            { id: 2542, word: "applaud", meaning: "掌聲", ex_kr: "Everyone cheered and applauded Manny’s efforts.", ex_zh: "大家為曼尼的努力歡呼鼓掌。" },
            { id: 2543, word: "appoint", meaning: "委", ex_kr: "Two students were appointed to help the scientists with their research.", ex_zh: "兩名學生被指派協助科學家進行研究。" },
            { id: 2544, word: "compatible", meaning: "相容的", ex_kr: "Jan and Fred are too different. They will never be compatible.", ex_zh: "簡和弗雷德個性太不一樣了，他們永遠不可能合得來。" },
            { id: 2545, word: "competence", meaning: "權限", ex_kr: "The job was easy because the group had enough competence to do it well.", ex_zh: "這項工作很簡單，因為團隊成員都具備足夠的勝任能力，能夠出色地完成任務。" },
            { id: 2546, word: "confer", meaning: "授予", ex_kr: "I will have to confer with my wife before I can purchase a new car.", ex_zh: "我得先跟妻子商量一下才能買新車。" },
            { id: 2547, word: "consecutive", meaning: "連續的", ex_kr: "The king ruled for ten consecutive years.", ex_zh: "國王統治了整整十年。" },
            { id: 2548, word: "crude", meaning: "原油", ex_kr: "She drew crude hearts on the ground to show how much she loved him.", ex_zh: "她在地上畫了粗糙的心形圖案，以表達她對他的愛。" },
            { id: 2549, word: "cube", meaning: "立方體", ex_kr: "Please get me some ice cubes to put in my soda.", ex_zh: "請給我一些冰塊，我要放進汽水裡。" },
            { id: 2550, word: "feedback", meaning: "回饋", ex_kr: "I asked my boss for feedback on my work.", ex_zh: "我向老闆徵求了對我工作的回饋。" },
            { id: 2551, word: "ignorance", meaning: "無知", ex_kr: "When he failed the test, his ignorance of math was obvious.", ex_zh: "他考試不及格，暴露出他對數學一竅不通。" },
            { id: 2552, word: "masculine", meaning: "男性", ex_kr: "American football is usually considered a masculine sport.", ex_zh: "美式足球通常被認為是一項男性運動。" },
            { id: 2553, word: "monument", meaning: "紀念碑", ex_kr: "A large monument was built to honor the brave soldiers.", ex_zh: "為了紀念這些勇敢的士兵，人們修建了一座大型紀念碑。" },
            { id: 2554, word: "muscular", meaning: "肌肉發達的", ex_kr: "He exercised regularly so that his body could become muscular.", ex_zh: "他經常鍛煉，使身體變得肌肉發達。" },
            { id: 2555, word: "posture", meaning: "姿勢", ex_kr: "Your back will feel better if you improve your posture.", ex_zh: "改善姿勢，你的背部會感覺更舒服。" },
            { id: 2556, word: "situate", meaning: "位於", ex_kr: "The road was situated between the forest and the lake.", ex_zh: "這條路位於森林和湖泊之間。" },
            { id: 2557, word: "supervise", meaning: "監督", ex_kr: "Allen supervised the construction workers to ensure everyone’s safety.", ex_zh: "艾倫負責監督建築工人，以確保所有人的安全。" },
            { id: 2558, word: "symmetry", meaning: "對稱", ex_kr: "The artist made sure to use perfect symmetry when painting the butterfly.", ex_zh: "這位藝術家在繪製蝴蝶時，特意運用了完美的對稱性。" },
            { id: 2559, word: "tattoo", meaning: "刺青", ex_kr: "The surfer had tattoos on both his arms.", ex_zh: "這位衝浪者的雙臂上都有刺青。" },
            { id: 2560, word: "undergraduate", meaning: "大學部", ex_kr: "She was excited to finish high school and enroll as an undergraduate in the fall.", ex_zh: "她很興奮能高中畢業，並在秋季入學讀大學本科。" },
            { id: 2561, word: "cater", meaning: "迎合", ex_kr: "Bill was too sick to get out of bed, so his nurse catered to his needs.", ex_zh: "比爾病得太重，無法下床，所以他的護士照顧他的一切需求。" },
            { id: 2562, word: "considerate", meaning: "周到", ex_kr: "The considerate boy gave his girlfriend a present to cheer her up when she was sad.", ex_zh: "體貼的男孩在女友難過的時候送了她一份禮物，讓她開心起來。" },
            { id: 2563, word: "consumption", meaning: "消耗", ex_kr: "These apples are too rotten for consumption.", ex_zh: "這些蘋果爛得太厲害，不能吃了。" },
            { id: 2564, word: "criteria", meaning: "標準", ex_kr: "Before she got the job, she had to meet all the necessary criteria.", ex_zh: "在獲得這份工作之前，她必須滿足所有必要的條件。" },
            { id: 2565, word: "crust", meaning: "地殼", ex_kr: "The little boy never ate the crust of his pizza.", ex_zh: "小男孩從來不吃披薩的餅皮。" },
            { id: 2566, word: "entitle", meaning: "標題", ex_kr: "His golden ticket entitled him to sit in the front row at the concert.", ex_zh: "他的金票讓他可以坐在音樂會的前排。" },
            { id: 2567, word: "escort", meaning: "護送", ex_kr: "Her bodyguards escorted her to the movie theater.", ex_zh: "她的保鑣護送她去了電影院。" },
            { id: 2568, word: "external", meaning: "外部的", ex_kr: "It is warm inside my house, but the external temperature is freezing.", ex_zh: "我家裡面很暖和，但外面氣溫很低。" },
            { id: 2569, word: "facility", meaning: "設施", ex_kr: "There are many educational facilities in big cities.", ex_zh: "大城市裡有很多教育機構。" },
            { id: 2570, word: "faculty", meaning: "學院", ex_kr: "The boy’s mental faculties impressed all of his teachers.", ex_zh: "男孩的智力給所有老師都留下了深刻的印象。" },
            { id: 2571, word: "heap", meaning: "堆疊", ex_kr: "After the building was torn down, all that was left was a heap of bricks.", ex_zh: "建築物拆除後，只剩下一堆磚塊。" },
            { id: 2572, word: "hemisphere", meaning: "半球", ex_kr: "In the northern hemisphere, the weather is usually warmest in July and August.", ex_zh: "北半球7月和8月通常是最溫暖的月份。" },
            { id: 2573, word: "hound", meaning: "獵犬", ex_kr: "The men took their hounds with them when they went on the hunting trip.", ex_zh: "男人們去打獵時帶了他們的獵犬。" },
            { id: 2574, word: "impersonal", meaning: "不具個人色彩", ex_kr: "The boy felt scared on his first day at the big, impersonal high school.", ex_zh: "男孩第一天到這所規模龐大、冷漠的高中上學，感到很害怕。" },
            { id: 2575, word: "lick", meaning: "舔", ex_kr: "He licked his ice cream before it melted.", ex_zh: "他趁冰淇淋還沒融化就舔了一口。" },
            { id: 2576, word: "ornament", meaning: "裝飾品", ex_kr: "The woman kept some colorful ornaments on the shelves.", ex_zh: "女人在架子上擺放了一些色彩鮮豔的裝飾品。" },
            { id: 2577, word: "pedestrian", meaning: "行人", ex_kr: "Drivers should be careful when pedestrians are walking around.", ex_zh: "司機在行人行走時應格外小心。" },
            { id: 2578, word: "sanctuary", meaning: "避難所", ex_kr: "The church was made into a sanctuary for homeless people in the winter.", ex_zh: "冬天，教堂被改造成無家可歸者的避難所。" },
            { id: 2579, word: "spectator", meaning: "旁觀者", ex_kr: "There were thousands of spectators at the big game.", ex_zh: "這場大賽吸引了數千名觀眾。" },
            { id: 2580, word: "yell", meaning: "叫喊", ex_kr: "Someone yelled out his name.", ex_zh: "有人喊了他的名字。" },
            { id: 2581, word: "accessory", meaning: "配件", ex_kr: "The store sold colorful accessories like bags, sunglasses, and makeup.", ex_zh: "這家商店出售色彩鮮豔的配件，例如包包、太陽眼鏡和化妝品。" },
            { id: 2582, word: "acquisition", meaning: "獲得", ex_kr: "Marty was happy with his new acquisition: a very fast bicycle.", ex_zh: "馬蒂對他的新裝備——一輛速度很快的自行車——非常滿意。" },
            { id: 2583, word: "cardboard", meaning: "紙板", ex_kr: "We packed our things into cardboard boxes and moved to our new home.", ex_zh: "我們把東西裝進紙箱，搬到新家了。" },
            { id: 2584, word: "dilemma", meaning: "困境", ex_kr: "Choosing either the tastier or healthier drink proved to be quite a dilemma.", ex_zh: "在美味飲品和健康飲品之間做出選擇，著實令人糾結。" },
            { id: 2585, word: "elaborate", meaning: "精心製作的", ex_kr: "She gave the teacher an elaborate explanation of her project.", ex_zh: "她向老師詳細解釋了她的專案。" },
            { id: 2586, word: "exact", meaning: "精確的", ex_kr: "I know the exact location of the restaurant you mentioned before.", ex_zh: "我知道你之前提到的那家餐廳的確切地點。" },
            { id: 2587, word: "facilitate", meaning: "促進", ex_kr: "To facilitate the meeting, Melissa used a simple computer program.", ex_zh: "為了方便會議進行，梅麗莎使用了一個簡單的電腦程式。" },
            { id: 2588, word: "fleet", meaning: "艦隊", ex_kr: "The fleet of ships spent a few days at the dock.", ex_zh: "這支船隊在碼頭停留了幾天。" },
