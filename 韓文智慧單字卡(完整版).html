            { id: 4081, word: "동영상", meaning: "影片", ex_kr: "유튜브에서 재미있는 동영상을 봤다.", ex_zh: "我在YouTube上看了一個搞笑影片。" },
            { id: 4082, word: "특집", meaning: "特別版", ex_kr: "설날 특집 방송을 봤다.", ex_zh: "我看了農曆新年特別節目。" },
            { id: 4083, word: "여기다", meaning: "考慮、視", ex_kr: "그는 나를 가족처럼 여긴다.", ex_zh: "他待我如家人一般。" },
            { id: 4084, word: "난방", meaning: "加熱", ex_kr: "겨울에는 난방비가 많이 든다.", ex_zh: "冬季取暖費用很高。" },
            { id: 4085, word: "예정일", meaning: "到期日", ex_kr: "출산 예정일이 언제인가요?", ex_zh: "截止日期是什麼時候？" },
            { id: 4086, word: "망치다", meaning: "破壞、毀掉、搞砸", ex_kr: "실수로 시험을 망쳤다.", ex_zh: "我不小心把考試搞砸了。" },
            { id: 4087, word: "어기다", meaning: "打破、違反", ex_kr: "약속을 어겨서 미안해.", ex_zh: "我很抱歉違背了我的承諾。" },
            { id: 4088, word: "이끌다", meaning: "領導、引導", ex_kr: "리더는 팀을 성공으로 이끌었다.", ex_zh: "這位領導者帶領團隊取得了成功。" },
            { id: 4089, word: "의젓하다", meaning: "成熟、有尊嚴", ex_kr: "아이가 나이에 비해 의젓하다.", ex_zh: "這孩子比同齡人成熟。" },
            { id: 4090, word: "정화", meaning: "純化", ex_kr: "공기 정화 식물을 샀다.", ex_zh: "我買了一盆空氣淨化植物。" },
            { id: 4091, word: "정밀", meaning: "詳細、精確、準確", ex_kr: "정밀 검사가 필요합니다.", ex_zh: "需要徹底檢查。" },
            { id: 4092, word: "착수하다", meaning: "首先、啟動", ex_kr: "경찰이 수사에 착수했다.", ex_zh: "警方已展開調查。" },
            { id: 4093, word: "이주하다", meaning: "遷移、遷徙", ex_kr: "철새들이 남쪽으로 이주한다.", ex_zh: "候鳥向南遷移。" },
            { id: 4094, word: "뱉다", meaning: "吐出來", ex_kr: "껌을 길에 뱉지 마세요.", ex_zh: "請勿在街上吐口香糖。" },
            { id: 4095, word: "구석구석", meaning: "每個角落", ex_kr: "집안 구석구석을 청소했다.", ex_zh: "我把房子的每個角落都打掃乾淨了。" },
            { id: 4096, word: "이력", meaning: "背景、個人經歷、記錄", ex_kr: "이력서에 경력을 자세히 쓰세요.", ex_zh: "請在履歷中詳細描述您的工作經驗。" },
            { id: 4097, word: "애매하다", meaning: "含糊不清、晦澀難懂、不確定；被冤枉", ex_kr: "태도가 애매하다.", ex_zh: "這種態度模稜兩可。" },
            { id: 4098, word: "합의", meaning: "協議、同意；協商", ex_kr: "양측이 원만하게 합의했다.", ex_zh: "雙方達成友好協議。" },
            { id: 4099, word: "평평하다", meaning: "平坦、甚至", ex_kr: "바닥이 평평하다.", ex_zh: "地面平坦。" },
            { id: 4100, word: "따갑다", meaning: "刺痛、灼燒、刺激", ex_kr: "햇볕이 따갑다.", ex_zh: "太陽刺骨。" },
            { id: 4101, word: "멎다", meaning: "停止", ex_kr: "비가 곧 멎을 것이다.", ex_zh: "雨很快就會停。" },
            { id: 4102, word: "콘센트", meaning: "插座、電源插口", ex_kr: "콘센트에 플러그를 꽂으세요.", ex_zh: "將插頭插入插座。" },
            { id: 4103, word: "자재", meaning: "材料", ex_kr: "건축 자재 값이 올랐다.", ex_zh: "建築材料價格上漲了。" },
            { id: 4104, word: "죄목", meaning: "罪名、犯罪名稱", ex_kr: "그의 죄목은 절도이다.", ex_zh: "他的罪行是盜竊。" },
            { id: 4105, word: "청춘", meaning: "青年", ex_kr: "청춘을 바쳐 일했다.", ex_zh: "我將青春奉獻給了工作。" },
            { id: 4106, word: "냉정하다", meaning: "冷靜、客觀、冷酷無情", ex_kr: "그는 일할 때 매우 냉정하다.", ex_zh: "他工作時非常冷靜沉著。" },
            { id: 4107, word: "굴뚝", meaning: "煙囪", ex_kr: "굴뚝에서 연기가 난다.", ex_zh: "煙囪裡冒煙了。" },
            { id: 4108, word: "백과사전", meaning: "百科全書", ex_kr: "모르는 단어는 백과사전에서 찾아본다.", ex_zh: "我會在百科全書中找出不認識的單字。" },
            { id: 4109, word: "여신", meaning: "女神", ex_kr: "그녀는 여신처럼 아름답다.", ex_zh: "她美得像女神一樣。" },
            { id: 4110, word: "문화재", meaning: "文化資產", ex_kr: "소중한 문화재를 보호합시다.", ex_zh: "讓我們共同保護珍貴的文化遺產。" },
            { id: 4111, word: "인하", meaning: "減少、削減", ex_kr: "가격 인하를 결정했다.", ex_zh: "決定降低價格。" },
            { id: 4112, word: "놓아두다", meaning: "離開(原樣)", ex_kr: "책은 책상 위에 놓아두세요.", ex_zh: "請把書放在桌上。" },
            { id: 4113, word: "건국", meaning: "建立國家", ex_kr: "건국 신화를 공부했다.", ex_zh: "我研究了建國神話。" },
            { id: 4114, word: "기막히다", meaning: "驚訝得說不出話、震驚不已；完美無瑕、令人驚嘆", ex_kr: "기막힌 우연이네요.", ex_zh: "真是不可思議的巧合。" },
            { id: 4115, word: "동참하다", meaning: "加入、參與", ex_kr: "환경 보호 운동에 동참합시다.", ex_zh: "讓我們加入環境保護運動。" },
            { id: 4116, word: "음반", meaning: "唱片、專輯", ex_kr: "새 음반이 발매되었다.", ex_zh: "新專輯已發行。" },
            { id: 4117, word: "등불", meaning: "燈、燈光", ex_kr: "어두운 길을 등불로 비췄다.", ex_zh: "我用燈籠照亮了漆黑的道路。" },
            { id: 4118, word: "피신하다", meaning: "逃跑、躲藏", ex_kr: "주민들이 안전한 곳으로 피신했다.", ex_zh: "居民撤離到安全地點。" },
            { id: 4119, word: "종영", meaning: "結束", ex_kr: "그 드라마는 인기리에 종영되었다.", ex_zh: "這部劇播出後廣受歡迎。" },
            { id: 4120, word: "대우하다", meaning: "治療", ex_kr: "손님을 정중하게 대우했다.", ex_zh: "他待客人很有禮貌。" },
            { id: 4121, word: "설득하다", meaning: "說服", ex_kr: "친구를 설득해서 같이 여행 갔다.", ex_zh: "我說服了我的朋友和我一起去旅行。" },
            { id: 4122, word: "접수", meaning: "收據、接待", ex_kr: "원서 접수가 마감되었다.", ex_zh: "申請已截止。" },
            { id: 4123, word: "대상", meaning: "目標物；大獎", ex_kr: "이 책은 어린이를 대상으로 한다.", ex_zh: "這本書是為兒童寫的。" },
            { id: 4124, word: "도심지", meaning: "市中心", ex_kr: "도심지는 항상 붐빈다.", ex_zh: "市中心總是人山人海。" },
            { id: 4125, word: "지휘하다", meaning: "指揮、領導、指導", ex_kr: "장군이 군대를 지휘했다.", ex_zh: "將軍統領軍隊。" },
            { id: 4126, word: "경청하다", meaning: "認真傾聽", ex_kr: "남의 말을 경청하는 습관을 기르세요.", ex_zh: "養成傾聽他人的習慣。" },
            { id: 4127, word: "용감하다", meaning: "勇敢、大膽、無畏", ex_kr: "소방관들은 매우 용감했다.", ex_zh: "消防員們非常勇敢。" },
            { id: 4128, word: "단둘", meaning: "單獨、私下", ex_kr: "단둘이 이야기하고 싶어요.", ex_zh: "我想單獨和你談談。" },
            { id: 4129, word: "금실", meaning: "夫妻關係", ex_kr: "그 부부는 금실이 좋다.", ex_zh: "這對夫婦關係很好。" },
            { id: 4130, word: "물품", meaning: "物品、商品；貨物", ex_kr: "기부 물품을 정리했다.", ex_zh: "我整理了捐贈物品。" },
            { id: 4131, word: "화살표", meaning: "箭", ex_kr: "화살표 방향으로 가세요.", ex_zh: "按照箭頭方向前進。" },
            { id: 4132, word: "간주하다", meaning: "考慮、視", ex_kr: "침묵은 동의로 간주하겠다.", ex_zh: "沉默將被視為同意。" },
            { id: 4133, word: "첨부하다", meaning: "連接", ex_kr: "이메일에 파일을 첨부했습니다.", ex_zh: "我在郵件中附上了一個文件。" },
            { id: 4134, word: "발행", meaning: "出版品、期", ex_kr: "잡지가 매달 발행된다.", ex_zh: "該雜誌每月出版一期。" },
            { id: 4135, word: "퇴직", meaning: "退休", ex_kr: "아버지는 정년 퇴직하셨다.", ex_zh: "我父親退休了。" },
            { id: 4136, word: "수속", meaning: "程式", ex_kr: "입국 수속을 밟았다.", ex_zh: "我辦理了移民手續。" },
            { id: 4137, word: "예능", meaning: "藝術才能", ex_kr: "그는 예능 프로그램에 자주 나온다.", ex_zh: "他經常出現在綜藝節目中。" },
            { id: 4138, word: "실종", meaning: "消失", ex_kr: "실종 아동을 찾고 있습니다.", ex_zh: "我們正在尋找一名失蹤兒童。" },
            { id: 4139, word: "수거하다", meaning: "收集、領取", ex_kr: "쓰레기를 수거해 갔다.", ex_zh: "垃圾已被清理。" },
            { id: 4140, word: "뻗다", meaning: "伸展、伸展、散開", ex_kr: "다리를 쭉 뻗으세요.", ex_zh: "伸直雙腿。" },
            { id: 4141, word: "주저하다", meaning: "猶豫", ex_kr: "주저하지 말고 도전하세요.", ex_zh: "不要猶豫，接受挑戰。" },
            { id: 4142, word: "생생하다", meaning: "生動", ex_kr: "기억이 아직도 생생하다.", ex_zh: "那段記憶至今依然鮮明。" },
            { id: 4143, word: "소장", meaning: "經理、主管；書面投訴、請願書", ex_kr: "연구소 소장님이 말씀하셨다.", ex_zh: "該研究所所長說。" },
            { id: 4144, word: "안락하다", meaning: "感到舒適", ex_kr: "안락한 의자에 앉아 쉬었다.", ex_zh: "我坐在舒適的椅子上休息了一會兒。" },
            { id: 4145, word: "충성", meaning: "忠誠、奉獻", ex_kr: "군인은 국가에 충성한다.", ex_zh: "士兵忠於國家。" },
            { id: 4146, word: "외양", meaning: "外貌、樣貌", ex_kr: "사람을 외양만 보고 판단하지 마라.", ex_zh: "不要以貌取人。" },
            { id: 4147, word: "피로", meaning: "疲勞", ex_kr: "피로가 쌓여서 쉬고 싶다.", ex_zh: "我累了，想休息。" },
            { id: 4148, word: "주동자", meaning: "領導者", ex_kr: "시위 주동자가 체포되었다.", ex_zh: "抗議活動的組織者已被逮捕。" },
            { id: 4149, word: "사양", meaning: "規格；拒絕、下降", ex_kr: "정중히 사양하겠습니다.", ex_zh: "我恕不接受。" },
            { id: 4150, word: "숟갈", meaning: "一匙", ex_kr: "밥 한 숟갈만 더 먹어.", ex_zh: "再吃一匙米飯吧。" },
            { id: 4151, word: "미화하다", meaning: "美化、美化、浪漫化", ex_kr: "과거를 미화하지 마라.", ex_zh: "不要美化過去。" },
            { id: 4152, word: "기약", meaning: "承諾", ex_kr: "기약 없이 기다렸다.", ex_zh: "我無限期地等待著。" },
            { id: 4153, word: "오냐오냐하다", meaning: "過度放縱、放任孩子一切", ex_kr: "아이를 너무 오냐오냐하며 키웠다.", ex_zh: "我把孩子養得太嬌慣了。" },
            { id: 4154, word: "미모", meaning: "外貌姣好、臉蛋漂亮。", ex_kr: "그녀는 빼어난 미모를 자랑한다.", ex_zh: "她擁有出眾的美貌。" },
            { id: 4155, word: "당사자", meaning: "直接相關人員", ex_kr: "당사자끼리 해결하세요.", ex_zh: "請相關各方自行解決此事。" },
            { id: 4156, word: "기어이", meaning: "無論如何、毫無例外", ex_kr: "기어이 해내고 말았다.", ex_zh: "我終於做到了。" },
            { id: 4157, word: "엎드리다", meaning: "伏地", ex_kr: "책상에 엎드려 잤다.", ex_zh: "我睡覺時頭枕在桌上。" },
            { id: 4158, word: "독신", meaning: "獨身", ex_kr: "그는 독신으로 살고 있다.", ex_zh: "他過著單身生活。" },
            { id: 4159, word: "주선하다", meaning: "安排、設立", ex_kr: "친구가 소개팅을 주선해 줬다.", ex_zh: "朋友幫我安排了一次相親。" },
            { id: 4160, word: "납득하다", meaning: "接受", ex_kr: "그 설명을 납득하기 어렵다.", ex_zh: "這種解釋很難讓人接受。" },
            { id: 4161, word: "주름", meaning: "皺紋、褶皺", ex_kr: "이마에 주름이 생겼다.", ex_zh: "我的額頭上長皺紋了。" },
            { id: 4162, word: "솟다", meaning: "上升；湧出、流出", ex_kr: "힘이 솟는다.", ex_zh: "我體內湧起一股力量。" },
            { id: 4163, word: "겸비하다", meaning: "要兩者兼得、請結合使用", ex_kr: "그는 지덕체를 겸비했다.", ex_zh: "他兼具智慧、美德和強健的體魄。" },
            { id: 4164, word: "울보", meaning: "愛哭鬼", ex_kr: "어렸을 때 나는 울보였다.", ex_zh: "我小時候是個愛哭鬼。" },
            { id: 4165, word: "최대한", meaning: "最多、最多", ex_kr: "최대한 빨리 오세요.", ex_zh: "請盡快過來。" },
            { id: 4166, word: "맞히다", meaning: "要擊中目標、就要猜對。", ex_kr: "정답을 맞혔다.", ex_zh: "我答對了。" },
            { id: 4167, word: "뚫다", meaning: "鑽孔、挖掘、刺穿", ex_kr: "벽에 구멍을 뚫었다.", ex_zh: "我在牆上打了個洞。" },
            { id: 4168, word: "동호회", meaning: "俱樂部、社團", ex_kr: "등산 동호회에 가입했다.", ex_zh: "我加入了一個健行俱樂部。" },
            { id: 4169, word: "낭비하다", meaning: "浪費", ex_kr: "시간을 낭비하지 마세요.", ex_zh: "不要浪費時間。" },
            { id: 4170, word: "쟁반", meaning: "托盤", ex_kr: "쟁반에 과일을 담아 오세요.", ex_zh: "請用托盤端來水果。" },
            { id: 4171, word: "데다", meaning: "被燒傷、被燙傷、燙傷自己", ex_kr: "뜨거운 물에 손을 데었다.", ex_zh: "我不小心把手燙傷了，燙傷了。" },
            { id: 4172, word: "뒤지다", meaning: "仔細查看、通讀、尋找、翻找；落後", ex_kr: "가방을 뒤져서 지갑을 찾았다.", ex_zh: "我在包包裡翻找了一番，找到了錢包。" },
            { id: 4173, word: "공감하다", meaning: "同情、聯繫", ex_kr: "그 이야기에 깊이 공감했다.", ex_zh: "我非常同情這個故事。" },
            { id: 4174, word: "적중하다", meaning: "擊中目標、成真", ex_kr: "예상이 적중했다.", ex_zh: "預測是正確的。" },
            { id: 4175, word: "건축", meaning: "建築、施工", ex_kr: "한국의 전통 건축은 아름답다.", ex_zh: "韓國傳統建築很漂亮。" },
            { id: 4176, word: "거칠다", meaning: "粗糙的、粗獷的", ex_kr: "피부가 거칠어졌다.", ex_zh: "我的皮膚變得粗糙。" },
            { id: 4177, word: "체조", meaning: "體操", ex_kr: "아침마다 체조를 한다.", ex_zh: "我每天早上都會做體操。" },
            { id: 4178, word: "간섭하다", meaning: "干涉、插手", ex_kr: "내 인생에 간섭하지 마.", ex_zh: "不要干涉我的生活。" },
            { id: 4179, word: "풍선", meaning: "氣球", ex_kr: "아이들이 풍선을 가지고 논다.", ex_zh: "孩子們正在玩氣球。" },
            { id: 4180, word: "원한", meaning: "怨恨", ex_kr: "누구에게도 원한을 사지 마라.", ex_zh: "不要對任何人懷恨在心。" },
            { id: 4181, word: "무덤", meaning: "墳墓、陵墓", ex_kr: "조상님의 무덤을 찾았다.", ex_zh: "我找到了祖先的墳墓。" },
            { id: 4182, word: "헌", meaning: "老舊、破舊、二手", ex_kr: "헌 옷을 수거함에 넣었다.", ex_zh: "我把舊衣服放進了回收箱。" },
            { id: 4183, word: "줄곧", meaning: "一直、持續不斷地", ex_kr: "아침부터 줄곧 비가 왔다.", ex_zh: "從早上開始就一直在下雨。" },
            { id: 4184, word: "납기일", meaning: "發薪日、付款日期", ex_kr: "납기일을 꼭 지켜주세요.", ex_zh: "請務必在截止日期前完成交貨。" },
            { id: 4185, word: "어림없다", meaning: "荒謬至極、遠非如此", ex_kr: "그건 어림없는 소리다.", ex_zh: "那純屬胡說。" },
            { id: 4186, word: "유부남", meaning: "已婚男士", ex_kr: "그는 유부남이다.", ex_zh: "他已婚。" },
            { id: 4187, word: "재방송", meaning: "重新運行、重複", ex_kr: "드라마 재방송을 봤다.", ex_zh: "我看了這部劇的重播。" },
            { id: 4188, word: "굴", meaning: "洞穴；牡蠣", ex_kr: "굴 속에서 곰이 나왔다.", ex_zh: "一隻熊從山洞裡走了出來。" },
            { id: 4189, word: "체험", meaning: "經驗", ex_kr: "다양한 문화를 체험했다.", ex_zh: "我體驗過多種文化。" },
            { id: 4190, word: "과식하다", meaning: "暴飲暴食", ex_kr: "저녁을 과식해서 배가 아프다.", ex_zh: "我晚餐吃多了，肚子痛。" },
            { id: 4191, word: "국어", meaning: "國語；母語", ex_kr: "국어 수업 시간이다.", ex_zh: "現在是韓語課時間。" },
            { id: 4192, word: "체결하다", meaning: "訂立、簽署", ex_kr: "계약을 체결했다.", ex_zh: "已簽訂合約。" },
            { id: 4193, word: "남미", meaning: "南美洲", ex_kr: "남미 여행을 계획 중이다.", ex_zh: "我計劃去南美洲旅行。" },
            { id: 4194, word: "거문고", meaning: "韓國豎琴", ex_kr: "거문고 연주를 들었다.", ex_zh: "我聽了geomungo的表演。" },
            { id: 4195, word: "빈방", meaning: "空房間", ex_kr: "호텔에 빈방이 있나요?", ex_zh: "請問飯店還有空房嗎？" },
            { id: 4196, word: "초조하다", meaning: "焦慮、煩躁、不耐煩", ex_kr: "합격자 발표를 기다리며 초조해했다.", ex_zh: "等待公佈入選名單時，我一直很焦慮。" },
            { id: 4197, word: "건축물", meaning: "建築物、結構", ex_kr: "이 도시는 독특한 건축물로 유명하다.", ex_zh: "這座城市以其獨特的建築風格而聞名。" },
            { id: 4198, word: "은혜", meaning: "恩惠、善意、好處", ex_kr: "스승의 은혜에 감사합니다.", ex_zh: "感謝老師的關照。" },
            { id: 4199, word: "영웅", meaning: "英雄、女英雄", ex_kr: "그는 난세의 영웅이다.", ex_zh: "他是動盪時代的英雄。" },
            { id: 4200, word: "복장", meaning: "服裝、衣著", ex_kr: "단정한 복장으로 오세요.", ex_zh: "請著整潔的服裝前來。" },
            { id: 4201, word: "넉넉하다", meaning: "足夠、充足", ex_kr: "시간이 넉넉하다.", ex_zh: "時間很充裕。" },
            { id: 4202, word: "수돗물", meaning: "自來水", ex_kr: "수돗물을 마셔도 되나요?", ex_zh: "可以喝自來水嗎？" },
            { id: 4203, word: "합창", meaning: "合唱團、樂團", ex_kr: "합창 대회가 열렸다.", ex_zh: "舉辦了一場合唱比賽。" },
            { id: 4204, word: "깃", meaning: "領子；羽毛", ex_kr: "옷 깃을 세웠다.", ex_zh: "他豎起了衣領。" },
            { id: 4205, word: "큰어머니", meaning: "父親的哥哥的妻子", ex_kr: "큰어머니가 용돈을 주셨다.", ex_zh: "我姑姑給了我零用錢。" },
            { id: 4206, word: "큰아버지", meaning: "父親的哥哥", ex_kr: "큰아버지는 서울에 사신다.", ex_zh: "我叔叔住在首爾。" },
            { id: 4207, word: "사원", meaning: "員工、工作人員；寺廟、清真寺", ex_kr: "신입 사원을 채용했다.", ex_zh: "我們僱用了一名新員工。" },
            { id: 4208, word: "마약", meaning: "毒品、麻醉藥品", ex_kr: "마약은 절대 하면 안 된다.", ex_zh: "你絕對不能碰毒品。" },
            { id: 4209, word: "쿨", meaning: "涼爽的", ex_kr: "그는 성격이 쿨하다.", ex_zh: "他性格很酷。" },
            { id: 4210, word: "조그마하다", meaning: "小的、微小的", ex_kr: "조그마한 선물을 준비했다.", ex_zh: "我準備了一份小禮物。" },
            { id: 4211, word: "소설가", meaning: "小說家", ex_kr: "그녀의 꿈은 소설가이다.", ex_zh: "她的夢想是成為小說家。" },
            { id: 4212, word: "멕시코", meaning: "墨西哥", ex_kr: "멕시코 음식을 좋아한다.", ex_zh: "我喜歡墨西哥菜。" },
            { id: 4213, word: "당당하다", meaning: "威嚴的、威嚴的、自信的、莊嚴的", ex_kr: "그녀는 언제나 당당하다.", ex_zh: "她總是充滿自信。" },
            { id: 4214, word: "업소", meaning: "商業機構", ex_kr: "유흥 업소 출입을 단속했다.", ex_zh: "他們嚴厲打擊了進入娛樂場所的行為。" },
            { id: 4215, word: "면세점", meaning: "免稅店", ex_kr: "공항 면세점에서 화장품을 샀다.", ex_zh: "我在機場免稅店買了化妝品。" },
            { id: 4216, word: "소형", meaning: "小件物品、小尺寸", ex_kr: "소형 차를 샀다.", ex_zh: "我買了一輛小型車。" },
            { id: 4217, word: "브라질", meaning: "巴西", ex_kr: "브라질은 축구로 유명하다.", ex_zh: "巴西以足球聞名。" },
            { id: 4218, word: "반성", meaning: "自我反思、自我審視", ex_kr: "자신의 잘못을 깊이 반성했다.", ex_zh: "他深刻反思了自己的錯誤。" },
            { id: 4219, word: "서먹하다", meaning: "感到尷尬、不自在", ex_kr: "오랜만에 만나서 좀 서먹했다.", ex_zh: "時隔這麼久再次見面，感覺有點尷尬。" },
            { id: 4220, word: "점퍼", meaning: "夾克、防風衣", ex_kr: "날씨가 추워서 점퍼를 입었다.", ex_zh: "因為天氣冷，所以我穿了一件套頭衫。" },
            { id: 4221, word: "전화비", meaning: "電話費帳單", ex_kr: "이번 달 전화비가 많이 나왔다.", ex_zh: "我這個月的電話費很高。" },
            { id: 4222, word: "외숙모", meaning: "舅舅的妻子", ex_kr: "외숙모가 요리를 잘하신다.", ex_zh: "我姑姑廚藝很好。" },
            { id: 4223, word: "가두다", meaning: "封閉、上鎖", ex_kr: "개를 우리에 가두었다.", ex_zh: "我把狗鎖進籠子裡了。" },
            { id: 4224, word: "보고서", meaning: "報告、論文", ex_kr: "보고서를 작성해서 제출했다.", ex_zh: "我撰寫並提交了一份報告。" },
            { id: 4225, word: "아랍", meaning: "阿拉伯", ex_kr: "아랍 문화를 배우고 싶다.", ex_zh: "我想了解阿拉伯文化。" },
            { id: 4226, word: "베트남", meaning: "越南", ex_kr: "베트남 쌀국수를 먹었다.", ex_zh: "我吃了越南河粉。" },
            { id: 4227, word: "로션", meaning: "洗劑", ex_kr: "세수하고 로션을 발랐다.", ex_zh: "我洗了臉，塗了潤膚露。" },
            { id: 4228, word: "경력", meaning: "職業生涯、工作經驗", ex_kr: "경력 3년 이상을 모집합니다.", ex_zh: "我們正在招募具有三年或以上工作經驗的人員。" },
            { id: 4229, word: "베이징", meaning: "北京", ex_kr: "베이징 올림픽을 기억한다.", ex_zh: "我還記得北京奧運。" },
            { id: 4230, word: "소년원", meaning: "青少年拘留中心", ex_kr: "그는 소년원에 다녀왔다.", ex_zh: "他被送進了少年拘留中心。" },
            { id: 4231, word: "탤런트", meaning: "電視演員、電視明星", ex_kr: "유명한 탤런트를 직접 봤다.", ex_zh: "我親眼見到了一位著名藝人。" },
            { id: 4232, word: "닫히다", meaning: "關閉、關閉", ex_kr: "문이 저절로 닫혔다.", ex_zh: "門自動關上了。" },
            { id: 4233, word: "담그다", meaning: "浸泡、浸入", ex_kr: "김치를 담갔다.", ex_zh: "我做了泡菜。" },
            { id: 4234, word: "벚꽃", meaning: "櫻花", ex_kr: "봄에는 벚꽃 구경을 간다.", ex_zh: "春天的時候，我會去看櫻花。" },
            { id: 4235, word: "발라드", meaning: "民謠", ex_kr: "나는 슬픈 발라드를 좋아한다.", ex_zh: "我喜歡悲傷的情歌。" },
            { id: 4236, word: "추리소설", meaning: "懸疑小說", ex_kr: "여름에는 추리소설이 재미있다.", ex_zh: "夏天讀懸疑小說很有趣。" },
            { id: 4237, word: "선비", meaning: "古典學者", ex_kr: "그는 옛날 선비 같다.", ex_zh: "他就像一位老派學者。" },
            { id: 4238, word: "후원", meaning: "支持、贊助、扶持", ex_kr: "기업의 후원을 받았다.", ex_zh: "它獲得了企業贊助。" },
            { id: 4239, word: "몽골", meaning: "蒙古", ex_kr: "몽골 초원을 달리고 싶다.", ex_zh: "我想奔跑在蒙古草原上。" },
            { id: 4240, word: "듯하다", meaning: "看起來像、似乎、看起來像", ex_kr: "비가 올 듯하다.", ex_zh: "看起來要下雨了。" },
            { id: 4241, word: "준비물", meaning: "準備材料、用品", ex_kr: "학교 갈 때 준비물을 챙겨라.", ex_zh: "上學時請帶好學習用品。" },
            { id: 4242, word: "작은어머니", meaning: "父親弟弟的妻子", ex_kr: "작은어머니가 옷을 사주셨다.", ex_zh: "我姑姑買了衣服給我。" },
            { id: 4243, word: "연봉", meaning: "年薪", ex_kr: "연봉 협상을 했다.", ex_zh: "我的薪水是我自己協商的。" },
            { id: 4244, word: "새침하다", meaning: "矜持、拘謹", ex_kr: "그녀는 새침하게 굴었다.", ex_zh: "她裝作害羞的樣子。" },
            { id: 4245, word: "지성", meaning: "腦力、智力；真誠、奉獻", ex_kr: "지성과 미모를 갖췄다.", ex_zh: "她既有智慧又有美貌。" },
            { id: 4246, word: "작은아버지", meaning: "父親的弟弟", ex_kr: "작은아버지는 아직 미혼이시다.", ex_zh: "我叔叔至今未婚。" },
            { id: 4247, word: "보육원", meaning: "孤兒院", ex_kr: "보육원에서 봉사활동을 했다.", ex_zh: "我曾在孤兒院做過義工。" },
            { id: 4248, word: "호의", meaning: "善意、友善", ex_kr: "그의 호의를 거절했다.", ex_zh: "我拒絕了他的提議。" },
            { id: 4249, word: "실물", meaning: "真實生活", ex_kr: "사진보다 실물이 훨씬 낫다.", ex_zh: "實物比照片好看多了。" },
            { id: 4250, word: "사직하다", meaning: "辭職、下台", ex_kr: "건강상의 이유로 사직했다.", ex_zh: "我因健康因素辭職。" },
            { id: 4251, word: "비결", meaning: "秘密、關鍵", ex_kr: "성공의 비결이 무엇입니까?", ex_zh: "成功的秘訣是什麼？" },
            { id: 4252, word: "무관심하다", meaning: "漠不關心、無動於衷", ex_kr: "그는 정치에 무관심하다.", ex_zh: "他對政治漠不關心。" },
            { id: 4253, word: "올려놓다", meaning: "把東西放在某個地方", ex_kr: "가방을 선반 위에 올려놓았다.", ex_zh: "我把包包放在了架子上。" },
            { id: 4254, word: "조조", meaning: "清晨", ex_kr: "조조 영화를 보러 갔다.", ex_zh: "我去看了場早場電影。" },
            { id: 4255, word: "준수하다", meaning: "遵守、服從、遵從；長相好看", ex_kr: "교통 법규를 준수합시다.", ex_zh: "讓我們遵守交通規則。" },
            { id: 4256, word: "여유", meaning: "有空閒的時間/金錢、沉著冷靜", ex_kr: "마음에 여유가 없다.", ex_zh: "我心神不寧。" },
            { id: 4257, word: "왜곡하다", meaning: "扭曲、變形", ex_kr: "사실을 왜곡하지 마세요.", ex_zh: "不要歪曲事實。" },
            { id: 4258, word: "필독", meaning: "必讀資料", ex_kr: "이 책은 대학생 필독서이다.", ex_zh: "這本書是大學生必讀書目。" },
            { id: 4259, word: "출소하다", meaning: "即將出獄", ex_kr: "그는 형을 마치고 출소했다.", ex_zh: "他服刑期滿後被釋放。" },
            { id: 4260, word: "방대하다", meaning: "巨大、廣闊、龐大", ex_kr: "자료의 양이 방대하다.", ex_zh: "數據量非常龐大。" },
            { id: 4261, word: "괴짜", meaning: "古怪的人", ex_kr: "그는 학교에서 유명한 괴짜다.", ex_zh: "他在學校裡是個出了名的怪人。" },
            { id: 4262, word: "강요", meaning: "強制執行、脅迫", ex_kr: "억지로 강요하지 마세요.", ex_zh: "請不要強迫他。" },
            { id: 4263, word: "비축하다", meaning: "預訂、囤貨", ex_kr: "식량을 비축해 두었다.", ex_zh: "我們儲備了食物。" },
            { id: 4264, word: "얄밉다", meaning: "刻薄、惡劣、挑釁", ex_kr: "동생이 얄밉게 군다.", ex_zh: "我弟弟很壞。" },
            { id: 4265, word: "이내", meaning: "在……之內、少於；很快、立即", ex_kr: "10분 이내에 도착합니다.", ex_zh: "我們將在10分鐘內到達。" },
            { id: 4266, word: "민주주의", meaning: "民主", ex_kr: "우리는 민주주의 국가에 산다.", ex_zh: "我們生活在一個民主國家。" },
            { id: 4267, word: "무기", meaning: "武器、武器", ex_kr: "무기를 버리고 투항하라.", ex_zh: "放下武器，投降吧。" },
            { id: 4268, word: "우유부단하다", meaning: "優柔寡斷", ex_kr: "그는 성격이 우유부단하다.", ex_zh: "他優柔寡斷。" },
            { id: 4269, word: "변경", meaning: "變化、改變", ex_kr: "계획에 변경이 생겼다.", ex_zh: "計劃有變。" },
            { id: 4270, word: "눈보라", meaning: "暴風雪", ex_kr: "눈보라가 몰아쳤다.", ex_zh: "暴風雪肆虐。" },
            { id: 4271, word: "충동", meaning: "衝動、慾望", ex_kr: "충동 구매를 후회했다.", ex_zh: "我後悔衝動購物了。" },
            { id: 4272, word: "배반", meaning: "背叛", ex_kr: "믿었던 친구의 배반에 충격을 받았다.", ex_zh: "我被信任的朋友的背叛震驚了。" },
            { id: 4273, word: "자음", meaning: "輔音", ex_kr: "한글은 자음과 모음으로 이루어져 있다.", ex_zh: "韓文由輔音和元音組成。" },
            { id: 4274, word: "감미롭다", meaning: "甜美、柔和", ex_kr: "목소리가 감미롭다.", ex_zh: "聲音很甜美。" },
            { id: 4275, word: "세끼", meaning: "三餐", ex_kr: "하루 세끼를 꼬박꼬박 먹는다.", ex_zh: "我每天三餐都風雨無阻地吃。" },
            { id: 4276, word: "방귀", meaning: "屁", ex_kr: "방귀 뀐 놈이 성낸다.", ex_zh: "放屁的人反而會生氣。" },
            { id: 4277, word: "독자", meaning: "讀者、訂閱者", ex_kr: "이 잡지는 독자가 많다.", ex_zh: "這本雜誌有很多讀者。" },
            { id: 4278, word: "농장", meaning: "農場、牧場", ex_kr: "주말에는 농장에서 일한다.", ex_zh: "我周末在農場工作。" },
            { id: 4279, word: "인증", meaning: "認證、確認", ex_kr: "본인 인증이 필요합니다.", ex_zh: "需要進行身份驗證。" },
            { id: 4280, word: "경쟁자", meaning: "競爭對手", ex_kr: "강력한 경쟁자가 나타났다.", ex_zh: "出現了一位強勁的競爭對手。" },
            { id: 4281, word: "걷히다", meaning: "清理、舉起", ex_kr: "안개가 걷혔다.", ex_zh: "霧散了。" },
            { id: 4282, word: "사또", meaning: "地區行政長官", ex_kr: "사또가 판결을 내렸다.", ex_zh: "法官宣判了判決。" },
            { id: 4283, word: "용모", meaning: "外貌、容貌、臉", ex_kr: "용모가 단정한 사람을 뽑는다.", ex_zh: "我們挑選外表整潔的人。" },
            { id: 4284, word: "동그랗다", meaning: "圓的", ex_kr: "얼굴이 동그랗다.", ex_zh: "臉是圓的。" },
            { id: 4285, word: "사이좋게", meaning: "關係良好、友好和諧", ex_kr: "형제끼리 사이좋게 지내라.", ex_zh: "和你的兄弟們好好相處。" },
            { id: 4286, word: "삐치다", meaning: "生悶氣", ex_kr: "친구가 사소한 일로 삐쳤다.", ex_zh: "我的朋友因為一件小事生氣了。" },
            { id: 4287, word: "죄짓다", meaning: "犯罪過、做罪惡的事", ex_kr: "죄짓고는 못 산다.", ex_zh: "你不能帶著罪孽活著。" },
            { id: 4288, word: "긍정적", meaning: "正面的、肯定的", ex_kr: "긍정적인 사고방식을 갖자.", ex_zh: "讓我們保持積極的心態。" },
            { id: 4289, word: "정체", meaning: "身份、真實性格；不動", ex_kr: "너의 정체가 뭐냐?", ex_zh: "你的真實身份是什麼？" },
            { id: 4290, word: "망원경", meaning: "望遠鏡", ex_kr: "망원경으로 별을 관찰했다.", ex_zh: "我用望遠鏡觀測了星星。" },
            { id: 4291, word: "면", meaning: "側面、臉；棉花；麵條", ex_kr: "라면 면이 불었다.", ex_zh: "拉麵都泡軟了。" },
            { id: 4292, word: "새장", meaning: "鳥籠", ex_kr: "새가 새장을 탈출했다.", ex_zh: "鳥兒從籠子裡逃出來了。" },
            { id: 4293, word: "드러나다", meaning: "暴露、出現、出來", ex_kr: "진실이 드러났다.", ex_zh: "真相大白了。" },
            { id: 4294, word: "소망", meaning: "願望、希望、渴望", ex_kr: "새해 소망을 빌었다.", ex_zh: "我許了一個新年願望。" },
            { id: 4295, word: "심지어", meaning: "甚至", ex_kr: "심지어 이름조차 모른다.", ex_zh: "我甚至不知道它的名字。" },
            { id: 4296, word: "소속사", meaning: "代理機構、管理公司", ex_kr: "소속사와 계약을 맺었다.", ex_zh: "我與一家經紀公司簽訂了合約。" },
            { id: 4297, word: "유령", meaning: "鬼", ex_kr: "유령이 나온다는 소문이 있다.", ex_zh: "有傳言說這裡有鬼出沒。" },
            { id: 4298, word: "섬세하다", meaning: "精緻、細膩", ex_kr: "그녀의 손길은 섬세하다.", ex_zh: "她的觸碰很輕柔。" },
            { id: 4299, word: "민생", meaning: "公共福利、人民生活", ex_kr: "정부는 민생 안정에 힘쓰고 있다.", ex_zh: "政府正努力穩定民生。" },
            { id: 4300, word: "반나절", meaning: "六小時、半天", ex_kr: "반나절 동안 청소만 했다.", ex_zh: "我花了半天打掃。" },
            { id: 4301, word: "난민", meaning: "難民", ex_kr: "전쟁으로 난민이 발생했다.", ex_zh: "戰爭造成了難民問題。" },
            { id: 4302, word: "선입견", meaning: "偏見、先入為主的觀念", ex_kr: "선입견을 버리고 사람을 대하자.", ex_zh: "讓我們摒棄偏見，以誠待人。" },
            { id: 4303, word: "간직하다", meaning: "珍惜、珍藏、保留", ex_kr: "추억을 가슴에 간직했다.", ex_zh: "我將這些回憶珍藏在心底。" },
            { id: 4304, word: "식량", meaning: "食物供應", ex_kr: "식량 부족 문제가 심각하다.", ex_zh: "糧食短缺問題十分嚴重。" },
            { id: 4305, word: "금붕어", meaning: "金魚", ex_kr: "어항에 금붕어를 키운다.", ex_zh: "我在魚缸裡養金魚。" },
            { id: 4306, word: "악취", meaning: "難聞的氣味、臭味", ex_kr: "쓰레기장에서 악취가 난다.", ex_zh: "垃圾場裡散發著惡臭。" },
            { id: 4307, word: "주먹밥", meaning: "飯糰", ex_kr: "소풍 점심으로 주먹밥을 쌌다.", ex_zh: "我帶了飯糰去野餐。" },
            { id: 4308, word: "교제", meaning: "交往、約會", ex_kr: "이성 교제를 반대하시다.", ex_zh: "他反對約會。" },
            { id: 4309, word: "목청껏", meaning: "大聲喊叫", ex_kr: "목청껏 노래를 불렀다.", ex_zh: "我放聲高歌。" },
            { id: 4310, word: "친부모", meaning: "親生父母", ex_kr: "입양아가 친부모를 찾았다.", ex_zh: "一名被收養的孩子找到了自己的親生父母。" },
            { id: 4311, word: "전날", meaning: "前一天、之前", ex_kr: "시험 전날에는 일찍 잤다.", ex_zh: "考試前一天我早早就睡了。" },
            { id: 4312, word: "떠가다", meaning: "漂浮、漂流", ex_kr: "구름이 하늘을 떠간다.", ex_zh: "雲朵在天空中飄蕩。" },
            { id: 4313, word: "시점", meaning: "時間點；觀點", ex_kr: "지금 시점에서는 알 수 없다.", ex_zh: "目前還無法得知。" },
            { id: 4314, word: "게시판", meaning: "公告板、留言板", ex_kr: "게시판에 공지사항을 붙였다.", ex_zh: "我在公告欄上貼了一張通知。" },
            { id: 4315, word: "목격자", meaning: "目擊者", ex_kr: "사고 목격자를 찾습니다.", ex_zh: "我們正在尋找事故目擊證人。" },
            { id: 4316, word: "상반기", meaning: "上半年", ex_kr: "상반기 매출이 증가했다.", ex_zh: "上半年銷售額有所成長。" },
            { id: 4317, word: "게시물", meaning: "發布", ex_kr: "인터넷에 게시물을 올렸다.", ex_zh: "我在網路上發了些東西。" },
            { id: 4318, word: "연설하다", meaning: "發表演講", ex_kr: "대통령이 국회에서 연설했다.", ex_zh: "總統在國民議會發表了演說。" },
            { id: 4319, word: "총점", meaning: "總分", ex_kr: "총점 100점으로 합격했다.", ex_zh: "我以總分100分通過了考試。" },
            { id: 4320, word: "동행하다", meaning: "伴隨", ex_kr: "부모님과 동행했다.", ex_zh: "我和父母一起去的。" },
            { id: 4321, word: "게재하다", meaning: "印刷、出版", ex_kr: "신문에 광고를 게재했다.", ex_zh: "我們在報紙上刊登了廣告。" },
            { id: 4322, word: "제왕", meaning: "國王、皇帝", ex_kr: "그는 제왕처럼 군림했다.", ex_zh: "他統治得像個國王。" },
            { id: 4323, word: "수사", meaning: "調查；數字", ex_kr: "검찰이 수사를 진행 중이다.", ex_zh: "檢方正在進行調查。" },
            { id: 4324, word: "서리", meaning: "霜", ex_kr: "지붕에 하얗게 서리가 내렸다.", ex_zh: "屋頂上結了一層白霜。" },
            { id: 4325, word: "측", meaning: "邊", ex_kr: "회사 측의 입장을 들었다.", ex_zh: "我聽到了公司的立場。" },
            { id: 4326, word: "차원", meaning: "水平、維度", ex_kr: "차원이 다른 문제다.", ex_zh: "這是一個完全不同層面的問題。" },
            { id: 4327, word: "따로따로", meaning: "單獨地、單獨地", ex_kr: "계산은 따로따로 합시다.", ex_zh: "我們分別計算一下。" },
            { id: 4328, word: "상인", meaning: "商人、經銷商", ex_kr: "시장 상인들이 물건을 판다.", ex_zh: "市場上的商販出售商品。" },
            { id: 4329, word: "과시하다", meaning: "炫耀、遊行", ex_kr: "그는 부를 과시했다.", ex_zh: "他炫耀了自己的財富。" },
            { id: 4330, word: "유부녀", meaning: "已婚婦女", ex_kr: "그녀는 유부녀이다.", ex_zh: "她已婚。" },
            { id: 4331, word: "묘", meaning: "墳墓、陵墓", ex_kr: "할아버지 묘에 성묘를 갔다.", ex_zh: "我去祭拜了祖父的墳墓。" },
            { id: 4332, word: "멍청하다", meaning: "愚蠢、笨", ex_kr: "그런 짓을 하다니 멍청하다.", ex_zh: "你這樣做真是愚蠢。" },
            { id: 4333, word: "왕자", meaning: "王子", ex_kr: "왕자와 공주는 행복하게 살았다.", ex_zh: "王子和公主從此過上了幸福的生活。" },
            { id: 4334, word: "패배하다", meaning: "戰敗、失敗", ex_kr: "경기에서 아쉽게 패배했다.", ex_zh: "很遺憾，我們輸掉了比賽。" },
            { id: 4335, word: "배신자", meaning: "背叛者、叛徒", ex_kr: "배신자는 용서할 수 없다.", ex_zh: "叛徒不可饒恕。" },
            { id: 4336, word: "사치스럽다", meaning: "奢華的、鋪張的", ex_kr: "생활이 너무 사치스럽다.", ex_zh: "生活太奢侈了。" },
            { id: 4337, word: "접하다", meaning: "學習、聆聽", ex_kr: "새로운 문화를 접했다.", ex_zh: "我接觸了一種新的文化。" },
            { id: 4338, word: "사슴", meaning: "鹿", ex_kr: "숲에서 사슴을 봤다.", ex_zh: "我在森林裡看到了一隻鹿。" },
            { id: 4339, word: "미신", meaning: "迷信", ex_kr: "그는 미신을 잘 믿는다.", ex_zh: "他是個迷信的人。" },
            { id: 4340, word: "창가", meaning: "窗戶附近的區域", ex_kr: "창가 자리에 앉았다.", ex_zh: "我坐在窗邊。" },
            { id: 4341, word: "괴담", meaning: "鬼故事", ex_kr: "학교 괴담을 들었다.", ex_zh: "我聽過一個關於學校鬼故事的故事。" },
            { id: 4342, word: "띄우다", meaning: "使某物飛起來或漂浮；發送", ex_kr: "강에 배를 띄웠다.", ex_zh: "我在河上放了一艘船。" },
            { id: 4343, word: "홍수", meaning: "洪水", ex_kr: "홍수로 집이 잠겼다.", ex_zh: "房子被洪水淹沒了。" },
            { id: 4344, word: "보안", meaning: "安全", ex_kr: "보안 시스템을 강화했다.", ex_zh: "安全系統得到了加強。" },
            { id: 4345, word: "질병", meaning: "疾病", ex_kr: "질병 예방이 중요하다.", ex_zh: "疾病預防至關重要。" },
            { id: 4346, word: "벼", meaning: "白飯", ex_kr: "가을 들판에 벼가 익어간다.", ex_zh: "秋田裡的稻穀正在成熟。" },
            { id: 4347, word: "하마", meaning: "河馬", ex_kr: "하마가 입을 크게 벌렸다.", ex_zh: "河馬張大了嘴巴。" },
            { id: 4348, word: "하여튼", meaning: "總之、無論如何、總之", ex_kr: "하여튼 고맙다.", ex_zh: "總之，謝謝。" },
            { id: 4349, word: "애정", meaning: "愛、感情", ex_kr: "아이에게 애정을 쏟았다.", ex_zh: "我把所有的愛都傾注在孩子身上了。" },
            { id: 4350, word: "야식", meaning: "深夜小吃", ex_kr: "밤에 야식으로 라면을 먹었다.", ex_zh: "我深夜吃了拉麵當宵夜。" },
            { id: 4351, word: "야외", meaning: "戶外、露天", ex_kr: "날씨가 좋아서 야외로 나갔다.", ex_zh: "天氣很好，所以我出去了。" },
            { id: 4352, word: "속담", meaning: "諺語、格言", ex_kr: "가는 말이 고와야 오는 말이 곱다.", ex_zh: "如果你說話友善，別人也會以友善的態度回應你。" },
            { id: 4353, word: "사냥하다", meaning: "狩獵", ex_kr: "사자가 먹이를 사냥한다.", ex_zh: "獅子捕獵獵物。" },
            { id: 4354, word: "까먹다", meaning: "忘記；剝皮食用；用完", ex_kr: "약속 시간을 깜빡 까먹었다.", ex_zh: "我完全忘記了預約時間。" },
            { id: 4355, word: "접촉", meaning: "接觸、觸摸", ex_kr: "환자와의 접촉을 피하세요.", ex_zh: "避免與患者接觸。" },
            { id: 4356, word: "사돈", meaning: "姻親、姻親", ex_kr: "사돈 어른을 뵈었다.", ex_zh: "我見到了我的岳父岳母。" },
            { id: 4357, word: "직진하다", meaning: "直行", ex_kr: "사거리에서 직진하세요.", ex_zh: "在十字路口直行。" },
            { id: 4358, word: "닷새", meaning: "五天", ex_kr: "여행을 닷새 동안 다녀왔다.", ex_zh: "我外出旅行了五天。" },
            { id: 4359, word: "당첨되다", meaning: "贏得獎項", ex_kr: "복권에 당첨되었다.", ex_zh: "我中了樂透。" },
            { id: 4360, word: "호두", meaning: "核桃", ex_kr: "호두는 뇌 건강에 좋다.", ex_zh: "核桃有益大腦健康。" },
            { id: 4361, word: "명단", meaning: "姓名列表", ex_kr: "합격자 명단에 내 이름이 있다.", ex_zh: "我的名字在入選名單上。" },
            { id: 4362, word: "액운", meaning: "厄運、不幸", ex_kr: "액운을 막아준다고 믿는다.", ex_zh: "人們認為它可以辟邪。" },
            { id: 4363, word: "어학연수", meaning: "出國語言學習", ex_kr: "미국으로 어학연수를 떠났다.", ex_zh: "我去美國接受語言訓練。" },
            { id: 4364, word: "과수원", meaning: "果園、果園", ex_kr: "과수원에서 사과를 땄다.", ex_zh: "我在果園裡摘了蘋果。" },
            { id: 4365, word: "웨이터", meaning: "服務生", ex_kr: "웨이터에게 메뉴판을 달라고 했다.", ex_zh: "我向服務生要了菜單。" },
            { id: 4366, word: "학제", meaning: "學制", ex_kr: "학제 개편 논의가 있다.", ex_zh: "關於教育系統重組的討論正在進行中。" },
            { id: 4367, word: "뇌", meaning: "腦", ex_kr: "인간의 뇌는 복잡하다.", ex_zh: "人腦結構複雜。" },
            { id: 4368, word: "햄", meaning: "火腿", ex_kr: "샌드위치에 햄을 넣었다.", ex_zh: "我在三明治裡放了火腿。" },
            { id: 4369, word: "동구", meaning: "村莊入口", ex_kr: "동구 밖까지 배웅을 나갔다.", ex_zh: "我出去送他到村子邊緣。" },
            { id: 4370, word: "베이지색", meaning: "淺褐色的", ex_kr: "베이지색 코트를 입었다.", ex_zh: "我穿了一件米色外套。" },
            { id: 4371, word: "성실하다", meaning: "真誠、可靠、勤奮", ex_kr: "그는 매우 성실한 직원이다.", ex_zh: "他是一位非常勤奮的員工。" },
            { id: 4372, word: "연차", meaning: "年度的", ex_kr: "내일 연차를 냈다.", ex_zh: "我明天休息一天。" },
            { id: 4373, word: "선곡", meaning: "音樂選擇", ex_kr: "오늘 라디오 선곡이 좋다.", ex_zh: "今天的電台播放清單不錯。" },
            { id: 4374, word: "입장", meaning: "位置、情況；入學", ex_kr: "곤란한 입장에 처했다.", ex_zh: "我發現自己陷入了困境。" },
            { id: 4375, word: "책자", meaning: "小冊子、宣傳冊", ex_kr: "관광 안내 책자를 받았다.", ex_zh: "我收到了一本旅遊指南手冊。" },
            { id: 4376, word: "마무리하다", meaning: "完成、最終確定、完結", ex_kr: "하루 일과를 마무리했다.", ex_zh: "我完成了今天的工作。" },
            { id: 4377, word: "수화기", meaning: "電話聽筒", ex_kr: "수화기를 들고 전화를 받았다.", ex_zh: "我拿起聽筒接了電話。" },
            { id: 4378, word: "욕설", meaning: "侮辱、辱罵性語言", ex_kr: "욕설을 사용하지 맙시다.", ex_zh: "請不要說髒話。" },
            { id: 4379, word: "거르다", meaning: "跳過、錯過；過濾", ex_kr: "아침 식사를 거르지 마세요.", ex_zh: "不要不吃早餐。" },
            { id: 4380, word: "끼니", meaning: "一頓飯", ex_kr: "끼니를 제때 챙겨 드세요.", ex_zh: "請務必按時用餐。" },
            { id: 4381, word: "이력서", meaning: "履歷、CV", ex_kr: "이력서를 회사에 제출했다.", ex_zh: "我已將簡歷提交給該公司。" },
            { id: 4382, word: "거래", meaning: "交易、往來、貿易", ex_kr: "거래가 성사되었다.", ex_zh: "交易已完成。" },
            { id: 4383, word: "검사관", meaning: "檢查員、考官", ex_kr: "검사관이 서류를 확인했다.", ex_zh: "檢查員檢查了文件。" },
            { id: 4384, word: "개학하다", meaning: "開學", ex_kr: "다음 주에 학교가 개학한다.", ex_zh: "下週開學。" },
            { id: 4385, word: "월차", meaning: "每月休假", ex_kr: "월차를 쓰고 쉬었다.", ex_zh: "我休了一個月的假，好好休息了一下。" },
            { id: 4386, word: "긴장감", meaning: "緊張、懸疑", ex_kr: "경기장에 긴장감이 감돌았다.", ex_zh: "體育場內氣氛緊張。" },
            { id: 4387, word: "협상", meaning: "談判、會談", ex_kr: "연봉 협상이 결렬되었다.", ex_zh: "薪資談判破裂了。" },
            { id: 4388, word: "돌아서다", meaning: "轉身", ex_kr: "화가 나서 등을 돌아서다.", ex_zh: "我憤怒地轉身離去。" },
            { id: 4389, word: "아득하다", meaning: "遠離、在遠處", ex_kr: "갈 길이 아득하다.", ex_zh: "前路漫漫。" },
            { id: 4390, word: "정감", meaning: "感覺、情緒、情感", ex_kr: "옛 물건에서 정감이 느껴진다.", ex_zh: "老物件能喚起人們的溫暖感。" },
            { id: 4391, word: "익명", meaning: "匿名", ex_kr: "익명으로 기부했다.", ex_zh: "匿名捐贈。" },
            { id: 4392, word: "오그라들다", meaning: "收縮、萎縮", ex_kr: "손발이 오그라드는 대사다.", ex_zh: "這是一句令人尷尬的台詞。" },
            { id: 4393, word: "일꾼", meaning: "勞工", ex_kr: "그는 부지런한 일꾼이다.", ex_zh: "他工作勤奮。" },
            { id: 4394, word: "어설프다", meaning: "不完美、不充分、馬虎", ex_kr: "한국어 발음이 아직 어설프다.", ex_zh: "我的韓文發音還是不太好。" },
            { id: 4395, word: "선박", meaning: "大船", ex_kr: "항구에 선박이 정박해 있다.", ex_zh: "一艘船停靠在港口。" },
            { id: 4396, word: "다소", meaning: "或多或少、在某種程度上", ex_kr: "결과가 다소 실망스럽다.", ex_zh: "結果有些令人失望。" },
            { id: 4397, word: "매출", meaning: "銷售量", ex_kr: "이번 달 매출이 올랐다.", ex_zh: "本月銷售額有所成長。" },
            { id: 4398, word: "기일", meaning: "逝世週年紀念日；固定日期、指定日期", ex_kr: "오늘은 아버지의 기일이다.", ex_zh: "今天是父親的忌日。" },
            { id: 4399, word: "손발", meaning: "手和腳", ex_kr: "추워서 손발이 시리다.", ex_zh: "天氣太冷了，我的手腳都凍僵了。" },
            { id: 4400, word: "접대", meaning: "娛樂、接待、款待", ex_kr: "거래처 직원을 접대했다.", ex_zh: "我招待了客戶的員工。" },
            { id: 4401, word: "산뜻하다", meaning: "清新、令人神清氣爽", ex_kr: "기분이 산뜻하다.", ex_zh: "我覺得神清氣爽。" },
            { id: 4402, word: "음모", meaning: "陰謀、詭計", ex_kr: "음모가 밝혀졌다.", ex_zh: "陰謀敗露了。" },
            { id: 4403, word: "무난하다", meaning: "簡單、安全、易於接受", ex_kr: "그 옷은 무난해서 입기 좋다.", ex_zh: "那套衣服既得體又容易穿著。" },
            { id: 4404, word: "상무", meaning: "導演", ex_kr: "김 상무님이 결재하셨다.", ex_zh: "金總經理批准了。" },
            { id: 4405, word: "쓰러지다", meaning: "倒下、墜落、坍塌", ex_kr: "너무 피곤해서 침대에 쓰러졌다.", ex_zh: "我太累了，癱倒在床上。" },
            { id: 4406, word: "내쉬다", meaning: "呼氣、呼出", ex_kr: "한숨을 길게 내쉬었다.", ex_zh: "他長嘆一聲。" },
            { id: 4407, word: "차분하다", meaning: "保持冷靜、沉著", ex_kr: "그녀는 성격이 차분하다.", ex_zh: "她性格沉穩。" },
            { id: 4408, word: "예민하다", meaning: "敏銳、精明、敏銳、敏感", ex_kr: "그는 소리에 예민하다.", ex_zh: "他對聲音很敏感。" },
            { id: 4409, word: "정수기", meaning: "淨水器", ex_kr: "정수기 물을 마신다.", ex_zh: "我喝的是淨水器裡的水。" },
            { id: 4410, word: "자취", meaning: "痕跡、蹤跡", ex_kr: "범인은 자취를 감췄다.", ex_zh: "罪犯消失得無影無蹤。" },
            { id: 4411, word: "공손하다", meaning: "禮貌、謙恭", ex_kr: "어른께 공손하게 인사해라.", ex_zh: "要禮貌地向長輩問好。" },
            { id: 4412, word: "대결", meaning: "競爭、對抗、搏鬥", ex_kr: "세기의 대결이 펼쳐진다.", ex_zh: "世紀之戰拉開序幕。" },
            { id: 4413, word: "문득", meaning: "突然", ex_kr: "문득 옛 생각이 났다.", ex_zh: "突然，往事湧上心頭。" },
            { id: 4414, word: "무의식적", meaning: "無意識的、非自願的", ex_kr: "무의식적인 습관이 있다.", ex_zh: "存在一些無意識的習慣。" },
            { id: 4415, word: "소송", meaning: "訴訟", ex_kr: "소송에서 승소했다.", ex_zh: "我打贏了官司。" },
            { id: 4416, word: "출세하다", meaning: "在生活中取得巨大成功", ex_kr: "그는 사업으로 출세했다.", ex_zh: "他靠經商致富。" },
            { id: 4417, word: "변태", meaning: "變態", ex_kr: "지하철에서 변태를 만났다.", ex_zh: "我在地鐵上遇到一個變態。" },
            { id: 4418, word: "어미", meaning: "結尾；母親", ex_kr: "문장 어미를 공손하게 써라.", ex_zh: "使用禮貌的句末結尾。" },
            { id: 4419, word: "봉변", meaning: "羞辱、意外", ex_kr: "길에서 봉변을 당할 뻔했다.", ex_zh: "我差點在街上惹麻煩。" },
            { id: 4420, word: "헐다", meaning: "拆除、夷為平地", ex_kr: "낡은 건물을 헐었다.", ex_zh: "舊樓被拆除了。" },
            { id: 4421, word: "멍들다", meaning: "弄得身上有瘀青", ex_kr: "부딪혀서 팔에 멍들었다.", ex_zh: "我不小心撞到了什麼東西，手臂上青了一塊。" },
            { id: 4422, word: "생방송", meaning: "直播", ex_kr: "뉴스는 생방송으로 진행된다.", ex_zh: "新聞正在現場直播。" },
            { id: 4423, word: "의욕", meaning: "意志、驅動", ex_kr: "공부할 의욕이 없다.", ex_zh: "我沒有學習的動力。" },
            { id: 4424, word: "계략", meaning: "陰謀、詭計、詭計", ex_kr: "적의 계략에 빠졌다.", ex_zh: "我落入了敵人的陷阱。" },
            { id: 4425, word: "또박또박", meaning: "清晰、整齊", ex_kr: "글씨를 또박또박 써라.", ex_zh: "字跡要清晰。" },
            { id: 4426, word: "하락", meaning: "下降、減少", ex_kr: "주가가 급격히 하락했다.", ex_zh: "股價大幅下跌。" },
            { id: 4427, word: "시범", meaning: "以身作則、示範", ex_kr: "조교가 시범을 보였다.", ex_zh: "助理進行了示範。" },
            { id: 4428, word: "명찰", meaning: "姓名標籤", ex_kr: "교복에 명찰을 달았다.", ex_zh: "我在校服上別了個姓名牌。" },
            { id: 4429, word: "묘미", meaning: "魅力、美貌", ex_kr: "여행의 묘미는 음식이다.", ex_zh: "旅行真正的魅力在於美食。" },
            { id: 4430, word: "깃털", meaning: "羽毛", ex_kr: "새의 깃털이 부드럽다.", ex_zh: "這隻鳥的羽毛很柔軟。" },
            { id: 4431, word: "식상하다", meaning: "感到厭倦、厭煩和疲憊", ex_kr: "매일 같은 밥은 식상하다.", ex_zh: "每天吃同樣的飯菜很無聊。" },
            { id: 4432, word: "중독성", meaning: "成癮性；毒性", ex_kr: "이 게임은 중독성이 강하다.", ex_zh: "這款遊戲非常容易讓人上癮。" },
            { id: 4433, word: "상금", meaning: "獎金、獎勵", ex_kr: "우승 상금을 받았다.", ex_zh: "我收到了獎金。" },
            { id: 4434, word: "명곡", meaning: "經典音樂傑作", ex_kr: "이 노래는 영원한 명곡이다.", ex_zh: "這首歌是永恆的傑作。" },
            { id: 4435, word: "마귀할멈", meaning: "巫婆", ex_kr: "동화 속에 마귀할멈이 나온다.", ex_zh: "童話故事裡出現了一個邪惡的女巫。" },
            { id: 4436, word: "계산대", meaning: "櫃檯、收銀台", ex_kr: "계산대에서 돈을 지불했다.", ex_zh: "我在收銀台付款了。" },
            { id: 4437, word: "유출되다", meaning: "溢出、洩漏", ex_kr: "개인 정보가 유출되었다.", ex_zh: "個人資訊已洩露。" },
            { id: 4438, word: "분주하다", meaning: "忙碌", ex_kr: "연말이라 거리가 분주하다.", ex_zh: "因為臨近年末，街上人潮湧動。" },
            { id: 4439, word: "여사", meaning: "夫人、女士", ex_kr: "김 여사님이 방문하셨다.", ex_zh: "金太太來訪了。" },
            { id: 4440, word: "넘치다", meaning: "溢出、超過", ex_kr: "컵에 물이 넘친다.", ex_zh: "水從杯子溢出來了。" },
            { id: 4441, word: "회의실", meaning: "會議室", ex_kr: "회의실에서 미팅이 있다.", ex_zh: "會議室裡正在開會。" },
            { id: 4442, word: "물어내다", meaning: "支付、補償", ex_kr: "깨진 유리창 값을 물어내라.", ex_zh: "賠償破損的車窗。" },
            { id: 4443, word: "독서실", meaning: "閱覽室", ex_kr: "시험 기간이라 독서실에 갔다.", ex_zh: "因為正值考試季，所以我去了自習室。" },
            { id: 4444, word: "수정", meaning: "修改；校正；受精", ex_kr: "계획을 수정해야 한다.", ex_zh: "該計劃需要修改。" },
            { id: 4445, word: "동아줄", meaning: "繩索", ex_kr: "썩은 동아줄을 잡았다.", ex_zh: "我抓起一條破繩子。" },
            { id: 4446, word: "별명", meaning: "暱稱", ex_kr: "내 별명은 땅콩이다.", ex_zh: "我的暱稱是花生。" },
            { id: 4447, word: "눈길", meaning: "積雪覆蓋的道路；眼睛、視線", ex_kr: "미끄러운 눈길을 조심하세요.", ex_zh: "注意防滑雪。" },
            { id: 4448, word: "꽃잎", meaning: "花瓣", ex_kr: "바람에 꽃잎이 날린다.", ex_zh: "花瓣在風中飄舞。" },
            { id: 4449, word: "비틀다", meaning: "扭曲", ex_kr: "몸을 비틀어 빠져나왔다.", ex_zh: "我扭動身體才得以脫身。" },
            { id: 4450, word: "국회", meaning: "國民議會", ex_kr: "국회의사당을 방문했다.", ex_zh: "我參觀了國民議會。" },
            { id: 4451, word: "흩날리다", meaning: "散落、飄動、吹散", ex_kr: "벚꽃이 흩날린다.", ex_zh: "櫻花飄落。" },
            { id: 4452, word: "주거", meaning: "住所、住宅", ex_kr: "주거 환경을 개선해야 한다.", ex_zh: "必須改善生活環境。" },
            { id: 4453, word: "충치", meaning: "齲齒、蛀牙", ex_kr: "충치가 생겨서 치과에 갔다.", ex_zh: "我去看牙醫是因為我有蛀牙。" },
            { id: 4454, word: "청와대", meaning: "韓國總統府青瓦台", ex_kr: "청와대가 개방되었다.", ex_zh: "青瓦台已經開放。" },
            { id: 4455, word: "사극", meaning: "歷史劇", ex_kr: "나는 사극 보는 것을 좋아한다.", ex_zh: "我喜歡看歷史劇。" },
            { id: 4456, word: "수락", meaning: "接受、同意", ex_kr: "초대를 수락했다.", ex_zh: "我接受了邀請。" },
            { id: 4457, word: "강제", meaning: "強迫、以武力", ex_kr: "강제로 문을 열었다.", ex_zh: "我強行打開了門。" },
            { id: 4458, word: "중복", meaning: "重疊、重複", ex_kr: "중복 투표는 불가능하다.", ex_zh: "不允許重複投票。" },
            { id: 4459, word: "노년기", meaning: "晚年", ex_kr: "행복한 노년기를 보내고 있다.", ex_zh: "我正在享受幸福的晚年生活。" },
            { id: 4460, word: "범위", meaning: "範圍、界限、程度、限制", ex_kr: "시험 범위가 어디까지인가요?", ex_zh: "考試範圍是什麼？" },
            { id: 4461, word: "등급", meaning: "班級、年級、排名", ex_kr: "고기 등급이 높다.", ex_zh: "肉的等級很高。" },
            { id: 4462, word: "반기다", meaning: "問候、歡迎", ex_kr: "강아지가 꼬리를 흔들며 반긴다.", ex_zh: "小狗搖著尾巴打招呼。" },
            { id: 4463, word: "분장하다", meaning: "化妝、打扮", ex_kr: "귀신으로 분장했다.", ex_zh: "我裝扮成了鬼魂。" },
            { id: 4464, word: "시댁", meaning: "丈夫的家(家庭)", ex_kr: "명절에 시댁에 갔다.", ex_zh: "假期我去了岳父岳母家。" },
            { id: 4465, word: "황색", meaning: "黃色的", ex_kr: "신호등이 황색으로 바뀌었다.", ex_zh: "交通號誌變成了黃燈。" },
            { id: 4466, word: "꾸준히", meaning: "穩步地、持續地", ex_kr: "꾸준히 운동하면 건강해진다.", ex_zh: "如果你堅持鍛煉，你就會變得健康。" },
            { id: 4467, word: "학문", meaning: "學習、研究", ex_kr: "평생 학문에 정진했다.", ex_zh: "他一生致力於學術研究。" },
            { id: 4468, word: "중순", meaning: "一個月的中間十天", ex_kr: "10월 중순에 여행을 간다.", ex_zh: "我十月中旬要去旅行。" },
            { id: 4469, word: "미남", meaning: "英俊的男人", ex_kr: "그는 소문난 미남이다.", ex_zh: "他是一位英俊瀟灑、名聲在外的男士。" },
            { id: 4470, word: "귀국하다", meaning: "返回祖國", ex_kr: "유학을 마치고 귀국했다.", ex_zh: "結束海外學業後，我回到了家鄉。" },
            { id: 4471, word: "바구니", meaning: "柳條籃", ex_kr: "바구니에 사과를 담았다.", ex_zh: "我把蘋果放進籃子裡了。" },
            { id: 4472, word: "흔들리다", meaning: "搖晃、搖擺、震動", ex_kr: "바람에 나무가 흔들린다.", ex_zh: "樹木在風中搖曳。" },
            { id: 4473, word: "왕비", meaning: "女王、皇后", ex_kr: "왕비가 왕자를 낳았다.", ex_zh: "女王生下了一位王子。" },
            { id: 4474, word: "발휘하다", meaning: "演示、展示", ex_kr: "실력을 발휘할 기회다.", ex_zh: "這是一個展現你技能的機會。" },
            { id: 4475, word: "벌리다", meaning: "打開、擴大、伸展", ex_kr: "입을 크게 벌리세요.", ex_zh: "張大嘴巴。" },
            { id: 4476, word: "소나무", meaning: "松樹", ex_kr: "소나무는 사계절 푸르다.", ex_zh: "松樹一年四季都是綠色的。" },
            { id: 4477, word: "기러기", meaning: "野鵝", ex_kr: "가을 하늘에 기러기가 날아간다.", ex_zh: "秋日的天空中，野鵝飛舞。" },
            { id: 4478, word: "잔인하다", meaning: "殘忍、野蠻", ex_kr: "전쟁은 잔인하다.", ex_zh: "戰爭是殘酷的。" },
            { id: 4479, word: "외가", meaning: "母親父母的家", ex_kr: "방학 때 외가에 놀러 갔다.", ex_zh: "學校放假期間，我到外公外婆家探望了他們。" },
            { id: 4480, word: "도토리", meaning: "橡子", ex_kr: "다람쥐가 도토리를 먹는다.", ex_zh: "松鼠吃橡子。" },
            { id: 4481, word: "투수", meaning: "投手", ex_kr: "투수가 공을 던졌다.", ex_zh: "投手投出了球。" },
            { id: 4482, word: "외래어", meaning: "借詞", ex_kr: "한국어에는 외래어가 많다.", ex_zh: "韓語有很多外來語。" },
            { id: 4483, word: "까치", meaning: "鵲", ex_kr: "까치는 반가운 손님을 상징한다.", ex_zh: "喜鵲象徵受歡迎的客人。" },
            { id: 4484, word: "미녀", meaning: "美麗的女人", ex_kr: "야수는 미녀를 사랑했다.", ex_zh: "野獸愛上了美女。" },
            { id: 4485, word: "지장", meaning: "阻礙、障礙、危害；指紋", ex_kr: "업무에 지장이 없도록 하세요.", ex_zh: "請確保您的工作不會受到干擾。" },
            { id: 4486, word: "비자", meaning: "簽證", ex_kr: "여행 비자를 발급받았다.", ex_zh: "我獲得了旅行簽證。" },
            { id: 4487, word: "어구", meaning: "短語；漁具", ex_kr: "난해한 어구가 많다.", ex_zh: "有很多難懂的短語。" },
            { id: 4488, word: "재작년", meaning: "兩年前", ex_kr: "재작년에 결혼했다.", ex_zh: "我前年結婚的。" },
            { id: 4489, word: "곧잘", meaning: "很好、經常", ex_kr: "그는 노래를 곧잘 부른다.", ex_zh: "他唱歌很好聽。" },
            { id: 4490, word: "생강", meaning: "薑", ex_kr: "생강차는 감기에 좋다.", ex_zh: "薑茶對感冒有好處。" },
            { id: 4491, word: "신작", meaning: "新作品", ex_kr: "작가의 신작이 발표되었다.", ex_zh: "作者的新作已經出版。" },
            { id: 4492, word: "쪽지", meaning: "注意、留言", ex_kr: "냉장고에 쪽지를 남겼다.", ex_zh: "我在冰箱上留了張紙條。" },
            { id: 4493, word: "장님", meaning: "盲人", ex_kr: "그는 장님 행세를 했다.", ex_zh: "他假裝失明。" },
            { id: 4494, word: "펄럭펄럭", meaning: "撲騰著、拍打著", ex_kr: "깃발이 펄럭펄럭 날린다.", ex_zh: "旗幟在風中飄揚。" },
            { id: 4495, word: "실명", meaning: "一個人的真名；失明", ex_kr: "인터넷 실명제가 논란이다.", ex_zh: "網路實名制系統存在爭議。" },
            { id: 4496, word: "일시", meaning: "日期和時間；一段時間", ex_kr: "모임 일시를 알려주세요.", ex_zh: "請告知會議的日期和時間。" },
            { id: 4497, word: "저고리", meaning: "韓式傳統外套", ex_kr: "한복 저고리가 예쁘다.", ex_zh: "韓服上衣很漂亮。" },
            { id: 4498, word: "안내원", meaning: "指導", ex_kr: "안내원이 길을 설명해 주었다.", ex_zh: "導遊給路人講解了路線。" },
            { id: 4499, word: "늪", meaning: "沼澤、濕地、泥潭", ex_kr: "늪에 빠지지 않도록 조심해.", ex_zh: "小心別掉進沼澤裡。" },
            { id: 4500, word: "폐", meaning: "肺部；麻煩", ex_kr: "담배는 폐에 해롭다.", ex_zh: "煙草對肺部有害。" },
            { id: 4501, word: "강사", meaning: "演講者、講師、指導員", ex_kr: "유명한 강사를 초빙했다.", ex_zh: "我們邀請了一位著名講師。" },
            { id: 4502, word: "궤도", meaning: "跟踪、軌道", ex_kr: "위성이 궤도에 진입했다.", ex_zh: "衛星進入軌道。" },
            { id: 4503, word: "입장료", meaning: "入場費", ex_kr: "박물관 입장료는 무료다.", ex_zh: "博物館免費入場。" },

            { id: 4603, word: "수족관", meaning: "水族館", ex_kr: "수족관에서 상어를 봤다.", ex_zh: "我在水族館看到了一條鯊魚。" },
            { id: 4604, word: "수단", meaning: "意思是、方式", ex_kr: "목적을 위해 수단을 가리지 않는다.", ex_zh: "他們為了達到目的不擇手段。" },
            { id: 4605, word: "새기다", meaning: "雕刻、刻", ex_kr: "반지에 이름을 새겼다.", ex_zh: "我在戒指上刻了一個名字。" },
            { id: 4606, word: "망가지다", meaning: "損壞、崩潰", ex_kr: "장난감이 망가졌다.", ex_zh: "玩具壞了。" },
            { id: 4607, word: "무역항", meaning: "貿易港", ex_kr: "부산항은 한국 최대의 무역항이다.", ex_zh: "釜山港是韓國最大的貿易港口。" },
            { id: 4608, word: "쌈밥", meaning: "米飯裹上蔬菜", ex_kr: "점심에 쌈밥을 먹었다.", ex_zh: "我午餐吃了雙拼飯。" },
            { id: 4609, word: "행인", meaning: "路人、行人", ex_kr: "지나가는 행인에게 길을 물었다.", ex_zh: "我向一位路人問路。" },
            { id: 4610, word: "썰매", meaning: "雪橇、雪橇車", ex_kr: "겨울에 눈썰매를 탔다.", ex_zh: "冬天的時候我坐雪橇。" },
            { id: 4611, word: "전봇대", meaning: "電話桿", ex_kr: "전봇대에 전단지가 붙어 있다.", ex_zh: "電線桿上貼著一張傳單。" },
            { id: 4612, word: "휴양지", meaning: "休息區、度假村、度假村", ex_kr: "여름 휴가로 휴양지에 갔다.", ex_zh: "我暑假去了度假村。" },
            { id: 4613, word: "측면", meaning: "側面、方面", ex_kr: "긍정적인 측면을 봐야 한다.", ex_zh: "我們需要專注於正面的方面。" },
            { id: 4614, word: "새끼손가락", meaning: "小指", ex_kr: "새끼손가락을 걸고 약속했다.", ex_zh: "我們勾著小指許下了承諾。" },
            { id: 4615, word: "친목", meaning: "友誼", ex_kr: "친목 도모를 위해 모임을 가졌다.", ex_zh: "我們舉行了增進友誼的聚會。" },
            { id: 4616, word: "길가", meaning: "路邊", ex_kr: "길가에 꽃이 피었다.", ex_zh: "路邊花朵盛開。" },
            { id: 4617, word: "복종하다", meaning: "服從", ex_kr: "명령에 복종해야 한다.", ex_zh: "你必須服從命令。" },
            { id: 4618, word: "열매", meaning: "水果、堅果、莓果", ex_kr: "나무에 열매가 주렁주렁 열렸다.", ex_zh: "樹上結滿了成簇的果實。" },
            { id: 4619, word: "사당", meaning: "神社", ex_kr: "사당에 제사를 지냈다.", ex_zh: "我在神社舉行了儀式。" },
            { id: 4620, word: "도구", meaning: "工具、儀器", ex_kr: "인간은 도구를 사용한다.", ex_zh: "人類使用工具。" },
            { id: 4621, word: "국자", meaning: "湯匙", ex_kr: "국자로 국을 떴다.", ex_zh: "我用湯匙把湯舀了出來。" },
            { id: 4622, word: "진행자", meaning: "主持人、司儀、司儀", ex_kr: "진행자가 쇼를 이끌었다.", ex_zh: "主持人主導了整個節目。" },
            { id: 4623, word: "물속", meaning: "水下", ex_kr: "물속에서 숨을 참았다.", ex_zh: "我屏住呼吸潛入水下。" },
            { id: 4624, word: "앞뒤", meaning: "前後、前後", ex_kr: "앞뒤가 다른 사람이다.", ex_zh: "他是個兩面派。" },
            { id: 4625, word: "식물원", meaning: "植物園", ex_kr: "식물원에 희귀한 꽃이 많다.", ex_zh: "植物園裡有很多珍稀花卉。" },
            { id: 4626, word: "의무", meaning: "義務、責任", ex_kr: "국방의 의무를 다했다.", ex_zh: "我已履行了我的兵役義務。" },
            { id: 4627, word: "고사", meaning: "考試", ex_kr: "임용 고사에 합격했다.", ex_zh: "我通過了教師資格考試。" },
            { id: 4628, word: "대리", meaning: "代理人", ex_kr: "김 대리가 승진했다.", ex_zh: "助理經理金升職了。" },
            { id: 4629, word: "메모지", meaning: "便條本、記事本", ex_kr: "메모지에 전화번호를 적었다.", ex_zh: "我把電話號碼寫在便簽本上了。" },
            { id: 4630, word: "김장", meaning: "冬季準備的泡菜", ex_kr: "겨울을 앞두고 김장을 했다.", ex_zh: "我提前做了泡菜過冬。" },
            { id: 4631, word: "골", meaning: "目標；山谷；大腦", ex_kr: "축구 경기에서 골을 넣었다.", ex_zh: "我在足球比賽中進了一個球。" },
            { id: 4632, word: "부서", meaning: "部門、科室", ex_kr: "마케팅 부서로 옮겼다.", ex_zh: "我調到了行銷部。" },
            { id: 4633, word: "환갑", meaning: "六十歲生日", ex_kr: "아버지의 환갑 잔치를 했다.", ex_zh: "我們為我父親舉辦了60歲生日派對。" },
            { id: 4634, word: "기껏", meaning: "盡其所能", ex_kr: "기껏해야 10분 늦었다.", ex_zh: "我最多遲到了10分鐘。" },
            { id: 4635, word: "비기다", meaning: "以平手告終", ex_kr: "경기가 1대 1로 비겼다.", ex_zh: "比賽最終以1比1平手結束。" },
            { id: 4636, word: "대청소", meaning: "一般清潔", ex_kr: "봄맞이 대청소를 했다.", ex_zh: "我做了一次春季大掃除。" },
            { id: 4637, word: "짠돌이", meaning: "吝嗇的人", ex_kr: "그는 돈을 안 쓰는 짠돌이다.", ex_zh: "他是個守財奴，不怎麼花錢。" },
            { id: 4638, word: "법학", meaning: "法律", ex_kr: "그는 대학에서 법학을 전공했다.", ex_zh: "他大學主修法律。" },
            { id: 4639, word: "기획", meaning: "規劃", ex_kr: "새로운 상품을 기획했다.", ex_zh: "我們計劃推出一款新產品。" },
            { id: 4640, word: "오류", meaning: "錯誤、失誤", ex_kr: "컴퓨터 시스템에 오류가 발생했다.", ex_zh: "計算機系統發生錯誤。" },
            { id: 4641, word: "지폐", meaning: "紙幣", ex_kr: "동전 대신 지폐를 냈다.", ex_zh: "我用紙幣而不是硬幣支付了款項。" },
            { id: 4642, word: "확장하다", meaning: "擴展、延伸", ex_kr: "사업을 해외로 확장했다.", ex_zh: "我們把業務拓展到了海外。" },
            { id: 4643, word: "대조하다", meaning: "對比、比較", ex_kr: "두 문서를 대조해 보았다.", ex_zh: "我對比了這兩份文件。" },
            { id: 4644, word: "기본형", meaning: "基本形式", ex_kr: "동사의 기본형을 외웠다.", ex_zh: "我記住了動詞的基本形式。" },
            { id: 4645, word: "체계", meaning: "系統", ex_kr: "교육 체계를 개편해야 한다.", ex_zh: "教育體制必須改革。" },
            { id: 4646, word: "의뢰인", meaning: "客戶", ex_kr: "변호사가 의뢰인을 만났다.", ex_zh: "律師會見了客戶。" },
            { id: 4647, word: "적응하다", meaning: "適應、調整", ex_kr: "새로운 환경에 빨리 적응했다.", ex_zh: "我很快就適應了新環境。" },
            { id: 4648, word: "체력", meaning: "體力", ex_kr: "체력을 기르기 위해 운동한다.", ex_zh: "我運動是為了增強體質。" },
            { id: 4649, word: "초청하다", meaning: "邀請", ex_kr: "해외 귀빈을 초청했다.", ex_zh: "我們邀請了海外政要。" },
            { id: 4650, word: "제시간", meaning: "預定時間、適當時間", ex_kr: "제시간에 도착했다.", ex_zh: "準時到達。" },
            { id: 4651, word: "하키", meaning: "曲棍球", ex_kr: "아이스 하키 경기를 봤다.", ex_zh: "我看了一場冰球比賽。" },
            { id: 4652, word: "기다", meaning: "爬行", ex_kr: "아기가 방을 기어 다닌다.", ex_zh: "嬰兒在房間裡爬來爬去。" },
            { id: 4653, word: "관리자", meaning: "經理、管理員", ex_kr: "사이트 관리자에게 연락했다.", ex_zh: "我聯絡了網站管理員。" },
            { id: 4654, word: "이용자", meaning: "使用者", ex_kr: "인터넷 이용자가 늘었다.", ex_zh: "網路使用者數量增加。" },
            { id: 4655, word: "판사", meaning: "法官", ex_kr: "판사가 판결문을 읽었다.", ex_zh: "法官宣讀了判決結果。" },
            { id: 4656, word: "여부", meaning: "或不", ex_kr: "참석 여부를 알려주세요.", ex_zh: "請告知您是否會出席。" },
            { id: 4657, word: "입양하다", meaning: "收養孩子", ex_kr: "강아지를 보호소에서 입양했다.", ex_zh: "我從收容所領養了一隻小狗。" },
            { id: 4658, word: "문의하다", meaning: "詢問", ex_kr: "고객센터에 문의하세요.", ex_zh: "請聯絡客服中心。" },
            { id: 4659, word: "무능력하다", meaning: "無能、不勝任", ex_kr: "그는 업무에 무능력하다.", ex_zh: "他工作能力很差。" },
            { id: 4660, word: "긋다", meaning: "畫一條線", ex_kr: "중요한 부분에 밑줄을 그었다.", ex_zh: "我把重點部分劃線了。" },
            { id: 4661, word: "상승하다", meaning: "上升、攀升、增加", ex_kr: "기온이 급격히 상승했다.", ex_zh: "氣溫迅速上升。" },
            { id: 4662, word: "인용", meaning: "引文、引用", ex_kr: "논문에 유명한 문구를 인용했다.", ex_zh: "我在報紙上引用了一句名言。" },
            { id: 4663, word: "어지르다", meaning: "弄得一團糟", ex_kr: "아이들이 방을 어질렀다.", ex_zh: "孩子們把房間弄得一團糟。" },
            { id: 4664, word: "새엄마", meaning: "後媽", ex_kr: "새엄마와 친해지려고 노력했다.", ex_zh: "我試著接近我的繼母。" },
            { id: 4665, word: "이빨", meaning: "齒", ex_kr: "사자가 날카로운 이빨을 드러냈다.", ex_zh: "獅子露出了尖銳的牙齒。" },
            { id: 4666, word: "분리하다", meaning: "分開", ex_kr: "노른자와 흰자를 분리했다.", ex_zh: "我把蛋黃和蛋白分開了。" },
            { id: 4667, word: "개편", meaning: "重組、改革", ex_kr: "조직 개편이 있었다.", ex_zh: "組織結構進行了重組。" },
            { id: 4668, word: "정면", meaning: "正面、立面", ex_kr: "문제를 정면으로 돌파했다.", ex_zh: "他迎難而上，著手解決問題。" },
            { id: 4669, word: "만족도", meaning: "滿意度", ex_kr: "고객 만족도가 높다.", ex_zh: "客戶滿意度高。" },
            { id: 4670, word: "초점", meaning: "重點", ex_kr: "카메라 초점이 안 맞다.", ex_zh: "相機失焦了。" },
            { id: 4671, word: "비닐", meaning: "塑膠、乙烯基", ex_kr: "비닐 봉투를 줄입시다.", ex_zh: "讓我們減少塑膠袋的使用。" },
            { id: 4672, word: "단독", meaning: "單身、獨行、獨立", ex_kr: "그 뉴스는 우리 방송사가 단독 보도했다.", ex_zh: "本台獨家報道了這則新聞。" },
            { id: 4673, word: "손주", meaning: "孫輩", ex_kr: "할머니는 손주를 사랑하신다.", ex_zh: "祖母很愛她的孫子/孫女。" },
            { id: 4674, word: "액체", meaning: "液體", ex_kr: "물은 액체 상태이다.", ex_zh: "水是液態的。" },
            { id: 4675, word: "가면", meaning: "面具", ex_kr: "가면 무도회에 참석했다.", ex_zh: "我參加了一場化裝舞會。" },
            { id: 4676, word: "채무", meaning: "債務", ex_kr: "채무를 모두 갚았다.", ex_zh: "我已經還清了所有債務。" },
            { id: 4677, word: "고유하다", meaning: "獨特、鮮明、與生俱來", ex_kr: "한국의 고유한 문화를 알렸다.", ex_zh: "它介紹了韓國獨特的文化。" },
            { id: 4678, word: "원상복구", meaning: "恢復到原始狀態", ex_kr: "퇴실 시 원상복구를 해야 한다.", ex_zh: "退房時，您必須將房間恢復原狀。" },
            { id: 4679, word: "채권자", meaning: "債權人", ex_kr: "채권자가 빚 독촉을 했다.", ex_zh: "債權人要求償還債務。" },
            { id: 4680, word: "동의어", meaning: "代名詞", ex_kr: "이 단어의 동의어는 무엇인가요?", ex_zh: "這個字的同義詞有哪些？" },
            { id: 4681, word: "대출", meaning: "貸款、借貸", ex_kr: "은행에서 대출을 받았다.", ex_zh: "我從銀行貸了款。" },
            { id: 4682, word: "출력하다", meaning: "列印出來", ex_kr: "문서를 프린터로 출력했다.", ex_zh: "我用印表機列印了這份文件。" },
            { id: 4683, word: "조직", meaning: "團體、組織", ex_kr: "범죄 조직을 소탕했다.", ex_zh: "我們徹底鏟除了這個犯罪組織。" },
            { id: 4684, word: "상업", meaning: "商業、商務", ex_kr: "이 도시는 상업이 발달했다.", ex_zh: "商業在這個城市發展起來。" },
            { id: 4685, word: "경비", meaning: "費用；保安、安保", ex_kr: "여행 경비가 부족하다.", ex_zh: "我沒有足夠的錢去旅行。" },
            { id: 4686, word: "구성원", meaning: "成員", ex_kr: "사회의 구성원으로서 책임을 다하자.", ex_zh: "讓我們履行作為社會成員的責任。" },
            { id: 4687, word: "은퇴하다", meaning: "退休", ex_kr: "그는 선수 생활을 은퇴했다.", ex_zh: "他結束了自己的球員生涯。" },
            { id: 4688, word: "학점", meaning: "學分、成績", ex_kr: "이번 학기 학점이 잘 나왔다.", ex_zh: "我這學期的成績不錯。" },
            { id: 4689, word: "앞일", meaning: "未來", ex_kr: "사람 앞일은 아무도 모른다.", ex_zh: "誰也不知道未來會怎樣。" },
            { id: 4690, word: "금하다", meaning: "禁止、禁止、禁令", ex_kr: "실내 흡연을 금한다.", ex_zh: "室內禁止吸煙。" },
            { id: 4691, word: "관리비", meaning: "管理費用、維護成本", ex_kr: "아파트 관리비를 냈다.", ex_zh: "我支付了公寓維護費。" },
            { id: 4692, word: "단서", meaning: "線索、引導；條件", ex_kr: "범행의 단서를 찾았다.", ex_zh: "找到了破案線索。" },
            { id: 4693, word: "불륜", meaning: "婚外情、通姦", ex_kr: "불륜 소재의 드라마가 많다.", ex_zh: "有很多電視劇都以婚外情為主題。" },
            { id: 4694, word: "유형", meaning: "類型、類別", ex_kr: "문제 유형을 파악했다.", ex_zh: "我確定了問題的類型。" },
            { id: 4695, word: "우두머리", meaning: "領導、領導、老闆", ex_kr: "늑대 무리의 우두머리가 나타났다.", ex_zh: "狼群首領出現了。" },
            { id: 4696, word: "분리수거하다", meaning: "垃圾分類", ex_kr: "쓰레기를 철저히 분리수거한다.", ex_zh: "嚴格分類並回收垃圾。" },
            { id: 4697, word: "추첨하다", meaning: "抽籤", ex_kr: "경품을 추첨했다.", ex_zh: "獎品已抽出。" },
            { id: 4698, word: "올케", meaning: "女孩哥哥的妻子", ex_kr: "올케와 쇼핑을 갔다.", ex_zh: "我和我嫂子一起去購物了。" },
            { id: 4699, word: "악마", meaning: "魔鬼", ex_kr: "악마의 유혹에 빠졌다.", ex_zh: "我落入了魔鬼的誘惑。" },
            { id: 4700, word: "한도", meaning: "上限", ex_kr: "인내심에 한도를 느꼈다.", ex_zh: "我的耐心已經到了極限。" },
            { id: 4701, word: "탈진하다", meaning: "精疲力竭、筋疲力盡", ex_kr: "마라톤 완주 후 탈진했다.", ex_zh: "跑完馬拉松後，我筋疲力盡。" },
            { id: 4702, word: "철학", meaning: "哲學", ex_kr: "그는 철학 박사다.", ex_zh: "他是哲學博士。" },
            { id: 4703, word: "매형", meaning: "姐夫", ex_kr: "매형과 술 한잔했다.", ex_zh: "我和我姐夫喝了杯酒。" },
            { id: 4704, word: "밤낮", meaning: "日夜", ex_kr: "밤낮으로 일했다.", ex_zh: "我日夜不停地工作。" },
            { id: 4705, word: "망상", meaning: "錯覺", ex_kr: "피해 망상에 시달리고 있다.", ex_zh: "我患有妄想症。" },
