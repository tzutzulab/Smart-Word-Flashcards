            { id: 5013, word: "또라이", meaning: "怪人", ex_kr: "그는 가끔 또라이처럼 행동해요.", ex_zh: "他有時行為舉止像個瘋子。" },
            { id: 5014, word: "표명하다", meaning: "表達、狀態", ex_kr: "그는 사퇴 의사를 표명했습니다.", ex_zh: "他表達了辭職意願。" },
            { id: 5015, word: "노려보다", meaning: "怒目而視、皺眉", ex_kr: "그가 나를 무섭게 노려봤어요.", ex_zh: "他惡狠狠地瞪著我。" },
            { id: 5016, word: "우아하다", meaning: "優雅、儀態", ex_kr: "그녀는 드레스를 입고 우아하게 걸었어요.", ex_zh: "她穿著連身裙，優雅地走來。" },
            { id: 5017, word: "담요", meaning: "毯子", ex_kr: "무릎에 담요를 덮으세요.", ex_zh: "用毯子蓋住膝蓋。" },
            { id: 5018, word: "가불하다", meaning: "提前付款", ex_kr: "월급을 미리 가불했어요.", ex_zh: "我預支了一部分薪水。" },
            { id: 5019, word: "압도적으로", meaning: "壓倒性的", ex_kr: "우리 팀이 압도적으로 이겼어요.", ex_zh: "我們隊取得了壓倒性勝利。" },
            { id: 5020, word: "보관하다", meaning: "保管、儲存、負責", ex_kr: "귀중품은 카운터에 보관하세요.", ex_zh: "請將貴重物品放在櫃檯上。" },
            { id: 5021, word: "사항", meaning: "事項、項目、細節", ex_kr: "주의 사항을 잘 읽어 보세요.", ex_zh: "請仔細閱讀注意事項。" },
            { id: 5022, word: "숙지하다", meaning: "要徹底了解、要完全意識到", ex_kr: "내용을 충분히 숙지했습니다.", ex_zh: "我已完全理解內容。" },
            { id: 5023, word: "진료", meaning: "身體檢查和治療", ex_kr: "의사에게 진료를 받았어요.", ex_zh: "我接受了醫生的治療。" },
            { id: 5024, word: "채점하다", meaning: "評分、標記", ex_kr: "선생님이 시험지를 채점하고 계세요.", ex_zh: "老師正在批改試卷。" },
            { id: 5025, word: "범죄", meaning: "犯罪", ex_kr: "범죄 없는 세상을 만들고 싶어요.", ex_zh: "我想創造一個沒有犯罪的世界。" },
            { id: 5026, word: "시위", meaning: "示威、抗議；字串", ex_kr: "광장에서 시위가 벌어졌어요.", ex_zh: "廣場上發生了抗議活動。" },
            { id: 5027, word: "유일하다", meaning: "成為唯一一個", ex_kr: "이것이 유일한 해결책이에요.", ex_zh: "這是唯一的解決辦法。" },
            { id: 5028, word: "문제집", meaning: "工作簿", ex_kr: "서점에서 수학 문제집을 샀어요.", ex_zh: "我在書店買了一本數學練習本。" },
            { id: 5029, word: "램프", meaning: "燈", ex_kr: "책상 위에 램프를 켰어요.", ex_zh: "我打開了桌上的檯燈。" },
            { id: 5030, word: "공통점", meaning: "共同點", ex_kr: "우리는 공통점이 많아요.", ex_zh: "我們有很多共同點。" },
            { id: 5031, word: "취급하다", meaning: "處理、處置、處理、洽談", ex_kr: "이 가게에서는 술을 취급하지 않습니다.", ex_zh: "本店不提供酒類飲品。" },
            { id: 5032, word: "실크", meaning: "絲綢", ex_kr: "이 스카프는 실크로 만들어졌어요.", ex_zh: "這條圍巾是絲綢做的。" },
            { id: 5033, word: "초보", meaning: "第一步、開始", ex_kr: "저는 운전 초보예요.", ex_zh: "我是新手司機。" },
            { id: 5034, word: "인쇄하다", meaning: "列印", ex_kr: "보고서를 인쇄해 주세요.", ex_zh: "請列印這份報告。" },
            { id: 5035, word: "바위", meaning: "岩石", ex_kr: "바위 위에 앉아서 쉬었어요.", ex_zh: "我坐在石頭上休息。" },
            { id: 5036, word: "학창", meaning: "學校", ex_kr: "학창 시절이 그리워요.", ex_zh: "我想念我的學生時代。" },
            { id: 5037, word: "클럽", meaning: "俱樂部", ex_kr: "주말에 친구들과 클럽에 갔어요.", ex_zh: "週末我和朋友們去了夜店。" },
            { id: 5038, word: "헛소리", meaning: "胡言亂語、愚蠢的談話", ex_kr: "술 취해서 헛소리하지 마세요.", ex_zh: "喝醉的時候不要胡說八道。" },
            { id: 5039, word: "환절기", meaning: "季節更替", ex_kr: "환절기에는 감기에 조심해야 해요.", ex_zh: "換季時節要小心，別感冒了。" },
            { id: 5040, word: "자켓", meaning: "夾克", ex_kr: "날씨가 추워서 자켓을 입었어요.", ex_zh: "因為天氣冷，所以我穿了外套。" },
            { id: 5041, word: "대형", meaning: "大號", ex_kr: "대형 마트에서 장을 봤어요.", ex_zh: "我在一家大型超市買了些食品雜貨。" },
            { id: 5042, word: "교류", meaning: "交換、互換", ex_kr: "두 학교 간의 교류가 활발해요.", ex_zh: "兩校之間有著正面的交流。" },
            { id: 5043, word: "전자레인지", meaning: "微波爐", ex_kr: "음식을 전자레인지에 데우세요.", ex_zh: "用微波爐加熱食物。" },
            { id: 5044, word: "섞이다", meaning: "混合、攪拌", ex_kr: "물과 기름은 섞이지 않아요.", ex_zh: "水和油不相容。" },
            { id: 5045, word: "앞머리", meaning: "瀏海、前額頭髮；額頭", ex_kr: "미용실에서 앞머리를 잘랐어요.", ex_zh: "我在理髮店剪了瀏海。" },
            { id: 5046, word: "장수", meaning: "賣家、商人；長壽、長壽", ex_kr: "그 과일 장수는 친절해요.", ex_zh: "賣水果的人很和善。" },
            { id: 5047, word: "부처", meaning: "佛", ex_kr: "부처님의 가르침을 따릅니다.", ex_zh: "我遵循佛陀的教義。" },
            { id: 5048, word: "은", meaning: "銀", ex_kr: "2등을 해서 은메달을 땄어요.", ex_zh: "我獲得了第二名，贏得了銀牌。" },
            { id: 5049, word: "비판하다", meaning: "批評、評判", ex_kr: "남을 함부로 비판하면 안 돼요.", ex_zh: "你不應該隨意批評別人。" },
            { id: 5050, word: "심리", meaning: "心態；法庭聽證會、審判", ex_kr: "범인의 심리를 분석하고 있어요.", ex_zh: "我正在分析罪犯的心理。" },
            { id: 5051, word: "천", meaning: "布料、織物", ex_kr: "부드러운 천으로 닦아주세요.", ex_zh: "請用軟布擦拭。" },
            { id: 5052, word: "대문", meaning: "大門、前門", ex_kr: "대문이 잠겨 있어요.", ex_zh: "前門鎖著。" },
            { id: 5053, word: "권하다", meaning: "建議、推薦、提供", ex_kr: "친구가 이 책을 권했어요.", ex_zh: "朋友推薦了這本書。" },
            { id: 5054, word: "배달원", meaning: "送貨員", ex_kr: "배달원이 피자를 가져왔어요.", ex_zh: "送餐員把披薩送來了。" },
            { id: 5055, word: "끝내", meaning: "直到最後、直到結束", ex_kr: "그는 끝내 나타나지 않았어요.", ex_zh: "他始終沒有出現。" },
            { id: 5056, word: "정직하다", meaning: "坦白說、直截了當", ex_kr: "그는 항상 정직하게 말해요.", ex_zh: "他總是實話實說。" },
            { id: 5057, word: "적용하다", meaning: "應用(規則、變更等)", ex_kr: "이 규칙은 모든 사람에게 적용됩니다.", ex_zh: "這條規則適用於所有人。" },
            { id: 5058, word: "프린터", meaning: "印表機", ex_kr: "프린터에 종이가 걸렸어요.", ex_zh: "印表機卡紙了。" },
            { id: 5059, word: "그다지", meaning: "不太、沒那麼、不怎麼", ex_kr: "영화는 그다지 재미있지 않았어요.", ex_zh: "這部電影沒什麼意義。" },
            { id: 5060, word: "확실히", meaning: "當然、肯定", ex_kr: "그 문제는 확실히 해결되었습니다.", ex_zh: "這個問題肯定已經解決了。" },
            { id: 5061, word: "쿵", meaning: "砰的一聲、啪的一聲。", ex_kr: "쿵 소리가 나서 깜짝 놀랐어요.", ex_zh: "一聲巨響把我嚇了一跳。" },
            { id: 5062, word: "점치다", meaning: "占卜、預言", ex_kr: "결과를 미리 점치기는 어려워요.", ex_zh: "很難提前預測結果。" },
            { id: 5063, word: "인상착의", meaning: "外貌、個人儀容", ex_kr: "범인의 인상착의를 기억하나요?", ex_zh: "你還記得嫌疑人的外表嗎？" },
            { id: 5064, word: "상세하다", meaning: "詳細、完整", ex_kr: "내용을 상세하게 설명해 주세요.", ex_zh: "請詳細解釋一下內容。" },
            { id: 5065, word: "원목", meaning: "硬木", ex_kr: "이 가구는 원목으로 만들어졌어요.", ex_zh: "這件家具由實木製成。" },
            { id: 5066, word: "야유회", meaning: "野餐", ex_kr: "회사에서 야유회를 가기로 했어요.", ex_zh: "我們決定組織一次公司郊遊。" },
            { id: 5067, word: "장식하다", meaning: "裝飾、修飾、點綴", ex_kr: "크리스마스 트리로 방을 장식했어요.", ex_zh: "我用一棵聖誕樹裝飾了房間。" },
            { id: 5068, word: "작업실", meaning: "工作室", ex_kr: "화가는 작업실에서 그림을 그려요.", ex_zh: "畫家在畫室裡作畫。" },
            { id: 5069, word: "차량", meaning: "汽車、車輛", ex_kr: "이 도로는 차량 통행이 금지되어 있습니다.", ex_zh: "本路禁止車輛通行。" },
            { id: 5070, word: "토하다", meaning: "嘔吐", ex_kr: "속이 안 좋아서 토했어요.", ex_zh: "我因為感到噁心而嘔吐了。" },
            { id: 5071, word: "여유롭다", meaning: "悠閒自在", ex_kr: "주말 오후를 여유롭게 보냈어요.", ex_zh: "我度過了一個輕鬆愉快的週末下午。" },
            { id: 5072, word: "수산시장", meaning: "魚市", ex_kr: "수산시장에서 회를 샀어요.", ex_zh: "我在魚市買了生魚片。" },
            { id: 5073, word: "재래시장", meaning: "傳統市場", ex_kr: "재래시장은 인심이 좋아요.", ex_zh: "傳統市場非常熱情好客。" },
            { id: 5074, word: "미아", meaning: "失蹤兒童、走失兒童", ex_kr: "놀이공원에서 미아 보호소를 찾았어요.", ex_zh: "我在遊樂園裡發現了一個走失兒童救援中心。" },
            { id: 5075, word: "귀금속", meaning: "珠寶、貴金屬", ex_kr: "그녀는 귀금속 가게를 운영해요.", ex_zh: "她經營一家珠寶店。" },
            { id: 5076, word: "떫다", meaning: "苦澀、酸澀", ex_kr: "이 감은 아직 떫어요.", ex_zh: "這柿子還有澀味。" },
            { id: 5077, word: "획득하다", meaning: "獲得、取得、贏得", ex_kr: "금메달을 획득했어요.", ex_zh: "我獲得了金牌。" },
            { id: 5078, word: "돌잡이", meaning: "抓周", ex_kr: "돌잔치에서 돌잡이를 했어요.", ex_zh: "我的寶寶在週歲宴上抓週了" },
            { id: 5079, word: "색다르다", meaning: "與眾不同、不落俗套、不尋常", ex_kr: "매일 먹는 밥 말고 색다른 음식을 먹고 싶어요.", ex_zh: "我想吃點和每天吃的米飯不一樣的東西。" },
            { id: 5080, word: "완공되다", meaning: "待完成、完全建成", ex_kr: "다리가 드디어 완공되었어요.", ex_zh: "這座橋終於完工了。" },
            { id: 5081, word: "길거리", meaning: "街道、道路", ex_kr: "길거리에 사람들이 많아요.", ex_zh: "街上人很多。" },
            { id: 5082, word: "대인", meaning: "成年、高尚的男子；個人", ex_kr: "대인 관계가 원만해요.", ex_zh: "我人際關係良好。" },
            { id: 5083, word: "주목", meaning: "注意、請注意", ex_kr: "여러분, 여기를 주목해 주세요.", ex_zh: "請大家注意。" },
            { id: 5084, word: "장래", meaning: "未來", ex_kr: "장래 희망이 무엇인가요?", ex_zh: "你未來的抱負是什麼？" },
            { id: 5085, word: "굴욕", meaning: "羞辱、屈辱", ex_kr: "경기에서 져서 굴욕을 느꼈어요.", ex_zh: "因為輸了比賽，我感到很屈辱。" },
            { id: 5086, word: "작정하다", meaning: "決定、解決", ex_kr: "살을 빼기로 작정했어요.", ex_zh: "我決定減肥。" },
            { id: 5087, word: "청진기", meaning: "聽診器", ex_kr: "의사가 청진기를 가슴에 댔어요.", ex_zh: "醫生將聽診器放在胸口。" },
            { id: 5088, word: "벼룩시장", meaning: "跳蚤市場", ex_kr: "벼룩시장에서 중고 옷을 샀어요.", ex_zh: "我在跳蚤市場買了二手衣服。" },
            { id: 5089, word: "엉금엉금", meaning: "爬行、匍匐", ex_kr: "거북이가 엉금엉금 기어가요.", ex_zh: "烏龜緩慢地爬行。" },
            { id: 5090, word: "보물", meaning: "寶藏", ex_kr: "이 상자 안에는 보물이 들어 있어요.", ex_zh: "這個盒子裡藏著寶貝。" },
            { id: 5091, word: "머뭇거리다", meaning: "猶豫、退縮", ex_kr: "대답을 못 하고 머뭇거렸어요.", ex_zh: "我答不上來，猶豫了一下。" },
            { id: 5092, word: "건달", meaning: "一無是處", ex_kr: "그는 동네 건달들과 어울려 다녀요.", ex_zh: "他跟街區裡的流氓混在一起。" },
            { id: 5093, word: "탐색하다", meaning: "探索、調查", ex_kr: "새로운 시장을 탐색하고 있어요.", ex_zh: "我正在開拓新市場。" },
            { id: 5094, word: "간지럽다", meaning: "怕癢、感到癢", ex_kr: "모기에 물려서 등이 간지러워요.", ex_zh: "我背癢，因為被蚊子咬了。" },
            { id: 5095, word: "요리책", meaning: "食譜", ex_kr: "요리책을 보고 김치찌개를 만들었어요.", ex_zh: "我按照食譜做了泡菜燉菜。" },
            { id: 5096, word: "건반", meaning: "鍵盤、按鍵", ex_kr: "피아노 건반을 닦았어요.", ex_zh: "我擦拭了鋼琴鍵。" },
            { id: 5097, word: "군것질", meaning: "兩餐之間吃東西", ex_kr: "밥 먹기 전에 군것질하지 마세요.", ex_zh: "正餐前不要吃零食。" },
            { id: 5098, word: "부엌용품", meaning: "廚房電器", ex_kr: "마트에서 부엌용품을 샀어요.", ex_zh: "我在超市買了廚具。" },
            { id: 5099, word: "평온하다", meaning: "保持平靜、安寧、祥和", ex_kr: "호수가 평온해 보여요.", ex_zh: "湖面看起來很平靜。" },
            { id: 5100, word: "단정하다", meaning: "整潔、整齊、得體；總而言之、判斷", ex_kr: "옷차림이 매우 단정해요.", ex_zh: "你的穿著非常整潔。" },
            { id: 5101, word: "중단하다", meaning: "暫停、中止、中斷", ex_kr: "공사가 일시적으로 중단되었어요.", ex_zh: "施工已暫時停止。" },
            { id: 5102, word: "가업", meaning: "家族企業", ex_kr: "아들이 아버지의 가업을 이었어요.", ex_zh: "兒子接手了父親的生意。" },
            { id: 5103, word: "클릭하다", meaning: "點選", ex_kr: "마우스로 아이콘을 클릭하세요.", ex_zh: "用滑鼠點擊圖示。" },
            { id: 5104, word: "배웅하다", meaning: "送某人出門、送某人離開", ex_kr: "공항까지 친구를 배웅했어요.", ex_zh: "我送朋友去機場。" },
            { id: 5105, word: "출판사", meaning: "出版公司", ex_kr: "원고를 출판사에 보냈어요.", ex_zh: "我已將稿件寄給出版社。" },
            { id: 5106, word: "개강", meaning: "學期開始", ex_kr: "다음 주에 학교가 개강해요.", ex_zh: "下週開學。" },
            { id: 5107, word: "사물함", meaning: "置物櫃", ex_kr: "책을 사물함에 넣었어요.", ex_zh: "我把書放進了儲物櫃。" },
            { id: 5108, word: "허탈하다", meaning: "沮喪、灰心喪志", ex_kr: "시험에 떨어져서 허탈해요.", ex_zh: "我考試不及格，感到非常沮喪。" },
            { id: 5109, word: "검토하다", meaning: "檢查、審查、研究", ex_kr: "서류를 꼼꼼히 검토해 주세요.", ex_zh: "請仔細審閱文件。" },
            { id: 5110, word: "해내다", meaning: "完成、實現、做", ex_kr: "결국 그 어려운 일을 해냈어요.", ex_zh: "最終，我完成了這項艱鉅的任務。" },
            { id: 5111, word: "배터리", meaning: "電池", ex_kr: "핸드폰 배터리가 다 됐어요.", ex_zh: "我的手機電池沒電了。" },
            { id: 5112, word: "쾌감", meaning: "愉悅的感覺、快樂", ex_kr: "골을 넣었을 때 짜릿한 쾌감을 느꼈어요.", ex_zh: "進球時，我感到無比激動。" },
            { id: 5113, word: "벌칙", meaning: "懲罰", ex_kr: "게임에서 져서 벌칙을 받았어요.", ex_zh: "我輸掉了比賽，並被判罰。" },
            { id: 5114, word: "대접하다", meaning: "款待、款待、招待", ex_kr: "손님에게 차를 대접했어요.", ex_zh: "我給客人倒了茶。" },
            { id: 5115, word: "잠복", meaning: "埋伏、躲藏和等待", ex_kr: "형사들이 범인을 잡으려고 잠복 근무를 해요.", ex_zh: "偵探們正在埋伏，準備抓捕罪犯。" },
            { id: 5116, word: "진수성찬", meaning: "盛宴、很多食物", ex_kr: "생일상으로 진수성찬을 받았어요.", ex_zh: "我生日那天辦了一場盛宴。" },
            { id: 5117, word: "도착지", meaning: "目的地", ex_kr: "도착지까지 얼마나 걸리나요?", ex_zh: "到達目的地需要多長時間？" },
            { id: 5118, word: "버겁다", meaning: "超出自身能力或資源範圍", ex_kr: "혼자서 이 일을 하기엔 버거워요.", ex_zh: "這項工作一個人做太難了。" },
            { id: 5119, word: "완수하다", meaning: "執行、完成", ex_kr: "임무를 무사히 완수했어요.", ex_zh: "我已成功完成任務。" },
            { id: 5120, word: "코뿔소", meaning: "犀牛", ex_kr: "동물원에서 코뿔소를 봤어요.", ex_zh: "我在動物園看到了犀牛。" },
            { id: 5121, word: "대로", meaning: "主街、主路", ex_kr: "차들이 대로를 달리고 있어요.", ex_zh: "汽車正在主路上行駛。" },
            { id: 5122, word: "까불다", meaning: "胡鬧、不守規矩", ex_kr: "수업 시간에 까불지 마세요.", ex_zh: "上課期間不要胡鬧。" },
            { id: 5123, word: "협찬하다", meaning: "贊助、支持", ex_kr: "이 프로그램은 여러 기업이 협찬합니다.", ex_zh: "該計畫由多家公司贊助。" },
            { id: 5124, word: "업히다", meaning: "被背在某人背上", ex_kr: "아이가 엄마 등에 업혔어요.", ex_zh: "孩子被母親背在背上。" },
            { id: 5125, word: "성질", meaning: "性格、脾氣", ex_kr: "그는 성질이 급해요.", ex_zh: "他脾氣很急躁。" },
            { id: 5126, word: "뭉치다", meaning: "聚集、捆紮、揉成一團", ex_kr: "눈을 뭉쳐서 눈싸움을 했어요.", ex_zh: "我們堆了雪球，然後打了一場雪仗。" },
            { id: 5127, word: "골인하다", meaning: "進球；到達終點線", ex_kr: "공이 골대로 골인했어요.", ex_zh: "球進門了。" },
            { id: 5128, word: "시각", meaning: "時間；視野；視力", ex_kr: "사고 발생 시각은 오후 3시입니다.", ex_zh: "事故發生時間為下午3點。" },
            { id: 5129, word: "팀장", meaning: "隊長", ex_kr: "팀장이 회의를 소집했어요.", ex_zh: "團隊領導召集了會議。" },
            { id: 5130, word: "개조하다", meaning: "改建、改造", ex_kr: "창고를 방으로 개조했어요.", ex_zh: "我把倉庫改造成了一個房間。" },
            { id: 5131, word: "검거하다", meaning: "抓捕、逮捕、圍捕", ex_kr: "경찰이 범인을 검거했어요.", ex_zh: "警方逮捕了罪犯。" },
            { id: 5132, word: "달인", meaning: "專家、大師", ex_kr: "그는 생활의 달인이에요.", ex_zh: "他是人生大師。" },
            { id: 5133, word: "꼼짝 못하다", meaning: "完全無法動彈", ex_kr: "너무 놀라서 꼼짝 못했어요.", ex_zh: "我當時震驚得動彈不得。" },
            { id: 5134, word: "승패", meaning: "勝利和/或失敗", ex_kr: "경기의 승패는 중요하지 않아요.", ex_zh: "比賽結果並不重要。" },
            { id: 5135, word: "제외하다", meaning: "排除、省略", ex_kr: "주말을 제외하고 매일 문을 엽니다.", ex_zh: "除了週末，我們每天都營業。" },
            { id: 5136, word: "꼴찌", meaning: "最後一個、底部", ex_kr: "달리기에서 꼴찌를 했어요.", ex_zh: "我在比賽中墊底。" },
            { id: 5137, word: "환호하다", meaning: "歡呼", ex_kr: "관중들이 환호했습니다.", ex_zh: "人群歡呼起來。" },
            { id: 5138, word: "누이", meaning: "姊姊", ex_kr: "누이가 시집을 갔어요.", ex_zh: "我姐姐結婚了。" },
            { id: 5139, word: "소유하다", meaning: "擁有、有", ex_kr: "그는 많은 땅을 소유하고 있어요.", ex_zh: "他擁有大片土地。" },
            { id: 5140, word: "즐비하다", meaning: "緊密地站在一起、排成一列", ex_kr: "거리에 상점들이 즐비해요.", ex_zh: "街道兩旁都是商店。" },
            { id: 5141, word: "이적하다", meaning: "轉移、移動", ex_kr: "그 선수는 다른 팀으로 이적했어요.", ex_zh: "那名球員轉學到了另一支球隊。" },
            { id: 5142, word: "본격적", meaning: "認真、全面、常規", ex_kr: "본격적인 여름이 시작되었어요.", ex_zh: "夏天正式開始了。" },
            { id: 5143, word: "모함", meaning: "陷害、誹謗、誣告", ex_kr: "동료의 모함으로 곤란을 겪었어요.", ex_zh: "我因為同事的陷害而過得很艱難。" },
            { id: 5144, word: "겹치다", meaning: "重疊", ex_kr: "일정이 겹쳐서 갈 수 없어요.", ex_zh: "我去不了，因為時間衝突。" },
            { id: 5145, word: "씁쓸하다", meaning: "感到痛苦、失望", ex_kr: "커피 맛이 씁쓸해요.", ex_zh: "咖啡味道很苦。" },
            { id: 5146, word: "다급하다", meaning: "緊急", ex_kr: "목소리가 매우 다급해 보였어요.", ex_zh: "聲音聽起來非常急切。" },
            { id: 5147, word: "귀가하다", meaning: "回家、回家", ex_kr: "늦은 시간에 귀가했어요.", ex_zh: "我到家很晚。" },
            { id: 5148, word: "쿠폰", meaning: "優惠券", ex_kr: "할인 쿠폰을 사용해서 싸게 샀어요.", ex_zh: "我用優惠券低價買到了它。" },
            { id: 5149, word: "실험하다", meaning: "進行實驗", ex_kr: "과학실에서 실험을 했어요.", ex_zh: "我在科學實驗室做了一個實驗。" },
            { id: 5150, word: "빛깔", meaning: "顏色、色調", ex_kr: "단풍 빛깔이 고와요.", ex_zh: "秋天的樹葉真美。" },
            { id: 5151, word: "별말씀", meaning: "出乎意料、荒謬或非同尋常的言論", ex_kr: "별말씀을 다 하십니다.", ex_zh: "你說的太多了。" },
            { id: 5152, word: "현수막", meaning: "橫幅", ex_kr: "학교 정문에 환영 현수막이 걸렸어요.", ex_zh: "學校大門上懸掛著歡迎橫幅。" },
            { id: 5153, word: "난동", meaning: "擾動；異常溫暖的冬季", ex_kr: "술을 마시고 난동을 부리면 안 돼요.", ex_zh: "飲酒後不得擾亂公共秩序。" },
            { id: 5154, word: "돋보기", meaning: "放大鏡、老花眼鏡", ex_kr: "작은 글씨는 돋보기로 보세요.", ex_zh: "請用放大鏡查看小字。" },
            { id: 5155, word: "행방", meaning: "某人的行踪", ex_kr: "실종자의 행방을 찾고 있어요.", ex_zh: "我們正在尋找失蹤者的下落。" },
            { id: 5156, word: "숨바꼭질", meaning: "捉迷藏", ex_kr: "친구들과 숨바꼭질을 했어요.", ex_zh: "我和朋友玩了捉迷藏。" },
            { id: 5157, word: "장만하다", meaning: "準備、購買、獲取", ex_kr: "겨울 코트를 새로 장만했어요.", ex_zh: "我買了一件新的冬季外套。" },
            { id: 5158, word: "완패", meaning: "徹底的失敗、慘敗", ex_kr: "우리 팀은 경기에서 완패했어요.", ex_zh: "我們的球隊在這場比賽中遭遇慘敗。" },
            { id: 5159, word: "꿀꺽", meaning: "咕嚕", ex_kr: "물을 꿀꺽 마셨어요.", ex_zh: "我咕咚咕咚喝了幾口水。" },
            { id: 5160, word: "만석", meaning: "滿員、全部入住", ex_kr: "비행기가 만석이라 표를 못 구했어요.", ex_zh: "因為飛機滿員，我沒買到票。" },
            { id: 5161, word: "연", meaning: "年；風箏；蓮花", ex_kr: "하늘 높이 연을 날렸어요.", ex_zh: "我放飛了一隻風箏，讓它飛上了高空。" },
            { id: 5162, word: "벚꽃놀이", meaning: "櫻花樹下的野餐", ex_kr: "봄에 친구들과 벚꽃놀이를 갔어요.", ex_zh: "春天的時候，我和朋友一起去看櫻花。" },
            { id: 5163, word: "수포", meaning: "氣泡；水泡", ex_kr: "화상을 입어서 피부에 수포가 생겼어요.", ex_zh: "我被燙傷了，皮膚上起了水泡。" },
            { id: 5164, word: "거북하다", meaning: "感到不舒服", ex_kr: "속이 거북해서 밥을 못 먹겠어요.", ex_zh: "我胃不舒服，吃不下東西。" },
            { id: 5165, word: "빼앗기다", meaning: "被帶走、被搶劫；著迷", ex_kr: "강도에게 지갑을 빼앗겼어요.", ex_zh: "我的錢包被搶劫犯偷走了。" },
            { id: 5166, word: "포스터", meaning: "海報", ex_kr: "벽에 영화 포스터를 붙였어요.", ex_zh: "我把一張電影海報貼在牆上了。" },
            { id: 5167, word: "보람 있다", meaning: "有價值、有成效", ex_kr: "봉사 활동은 정말 보람 있어요.", ex_zh: "當志工真的很有意義。" },
            { id: 5168, word: "대보다", meaning: "進行比較", ex_kr: "키를 서로 대보자.", ex_zh: "我們來比較一下密鑰。" },
            { id: 5169, word: "애칭", meaning: "暱稱、愛稱", ex_kr: "우리는 서로를 애칭으로 불러요.", ex_zh: "我們彼此都用暱稱稱呼。" },
            { id: 5170, word: "처제", meaning: "妻子的妹妹", ex_kr: "처제와 아내가 쇼핑을 갔어요.", ex_zh: "我嫂子和我妻子去購物了。" },
            { id: 5171, word: "다물다", meaning: "閉上嘴", ex_kr: "입을 꾹 다물었어요.", ex_zh: "我緊緊閉著嘴。" },
            { id: 5172, word: "얽히다", meaning: "糾纏不清、牽涉其中", ex_kr: "줄이 복잡하게 얽혀 있어요.", ex_zh: "繩子纏繞在一起，結構十分複雜。" },
            { id: 5173, word: "품절되다", meaning: "缺貨", ex_kr: "죄송하지만 그 상품은 품절되었습니다.", ex_zh: "抱歉，該商品已售罄。" },
            { id: 5174, word: "동맹", meaning: "聯盟、夥伴關係", ex_kr: "두 나라는 동맹을 맺었어요.", ex_zh: "兩國結盟。" },
            { id: 5175, word: "전략", meaning: "戰略、戰術", ex_kr: "승리하기 위해서는 좋은 전략이 필요해요.", ex_zh: "你需要好的策略才能獲勝。" },
            { id: 5176, word: "날카롭다", meaning: "尖銳的、尖的", ex_kr: "칼날이 매우 날카로워요.", ex_zh: "刀刃非常鋒利。" },
            { id: 5177, word: "일화", meaning: "軼事", ex_kr: "그에 대한 재미있는 일화가 많아요.", ex_zh: "關於他有很多有趣的軼事。" },
            { id: 5178, word: "더군다나", meaning: "此外、而且、進一步", ex_kr: "비가 오는데 더군다나 우산도 없어요.", ex_zh: "下雨了，更糟的是，我沒有傘。" },
            { id: 5179, word: "항공편", meaning: "航班", ex_kr: "서울행 항공편을 예약했어요.", ex_zh: "我訂了飛往首爾的機票。" },
            { id: 5180, word: "돗자리", meaning: "墊", ex_kr: "잔디밭에 돗자리를 펴고 앉았어요.", ex_zh: "我在草地上鋪開墊子，坐了下來。" },
            { id: 5181, word: "완료하다", meaning: "完成", ex_kr: "등록 절차를 완료했습니다.", ex_zh: "註冊流程已完成。" },
            { id: 5182, word: "모욕하다", meaning: "侮辱", ex_kr: "남을 모욕하는 말을 하지 마세요.", ex_zh: "不要用侮辱性的語言對待他人。" },
            { id: 5183, word: "지지리", meaning: "極其、糟糕、可怕", ex_kr: "지지리도 복이 없네요.", ex_zh: "我真是倒楣透了。" },
            { id: 5184, word: "언뜻", meaning: "瞬間、一閃而過；偶然、意外", ex_kr: "언뜻 봐서는 잘 모르겠어요.", ex_zh: "乍看之下不出來。" },
            { id: 5185, word: "소질", meaning: "資質、天賦", ex_kr: "저는 음악에 소질이 없어요.", ex_zh: "我沒有音樂天份。" },
            { id: 5186, word: "추천서", meaning: "推薦信", ex_kr: "교수님께 추천서를 부탁드렸어요.", ex_zh: "我請教授寫一封推薦信給我。" },
            { id: 5187, word: "주장", meaning: "堅持、斷言；隊長、領導者", ex_kr: "그의 주장은 설득력이 있어요.", ex_zh: "他的論點很有說服力。" },
            { id: 5188, word: "뜯다", meaning: "撕、挑、摘、拿走", ex_kr: "편지 봉투를 뜯었어요.", ex_zh: "我撕開了信封。" },
            { id: 5189, word: "습기", meaning: "濕度", ex_kr: "장마철이라 습기가 많아요.", ex_zh: "現在是雨季，所以非常潮濕。" },
            { id: 5190, word: "정성껏", meaning: "發自內心地、全心全意地", ex_kr: "정성껏 선물을 포장했어요.", ex_zh: "我非常仔細地包裝了禮物。" },
            { id: 5191, word: "진리", meaning: "真相", ex_kr: "영원히 변하지 않는 진리를 찾고 싶어요.", ex_zh: "我想找一個永恆不變的真理。" },
            { id: 5192, word: "널다", meaning: "懸掛", ex_kr: "빨래를 햇볕에 널었어요.", ex_zh: "我把衣服晾在陽光下。" },
            { id: 5193, word: "감탄하다", meaning: "欽佩、敬畏", ex_kr: "아름다운 풍경에 감탄했어요.", ex_zh: "美麗的景色讓我驚嘆不已。" },
            { id: 5194, word: "걸레", meaning: "抹布、拖把；蕩婦", ex_kr: "걸레로 바닥을 닦았어요.", ex_zh: "我用拖把擦了地板。" },
            { id: 5195, word: "효율적", meaning: "高效率的", ex_kr: "시간을 효율적으로 사용해야 해요.", ex_zh: "你需要有效率地利用時間。" },
            { id: 5196, word: "아군", meaning: "我們的部隊、盟友", ex_kr: "아군이 적군을 물리쳤어요.", ex_zh: "我軍擊敗了敵人。" },
            { id: 5197, word: "생수", meaning: "礦泉水", ex_kr: "편의점에서 생수를 샀어요.", ex_zh: "我在便利商店買了瓶裝水。" },
            { id: 5198, word: "추리하다", meaning: "推斷、推理", ex_kr: "탐정이 사건을 추리했어요.", ex_zh: "偵探破案了。" },
            { id: 5199, word: "최강", meaning: "最強", ex_kr: "우리 팀은 세계 최강이에요.", ex_zh: "我們的團隊是世界上最強的。" },
            { id: 5200, word: "저축하다", meaning: "為了儲蓄、存款", ex_kr: "돈을 은행에 저축해요.", ex_zh: "把錢存到銀行。" },
            { id: 5201, word: "빡빡하다", meaning: "緊繃的、僵硬的、缺乏彈性的", ex_kr: "일정이 너무 빡빡해요.", ex_zh: "日程安排太緊迫了。" },
            { id: 5202, word: "인원", meaning: "人數", ex_kr: "참가 인원이 몇 명입니까?", ex_zh: "有多少人參加？" },
            { id: 5203, word: "최상", meaning: "最好的、最高的", ex_kr: "이 호텔의 서비스는 최상이에요.", ex_zh: "這家酒店的服務是最好的。" },
            { id: 5204, word: "지령", meaning: "命令、指示、指令", ex_kr: "본부에서 비밀 지령이 내려왔어요.", ex_zh: "總部下達了一項秘密命令。" },
            { id: 5205, word: "유쾌하다", meaning: "愉快、令人愉悅", ex_kr: "그는 정말 유쾌한 사람이에요.", ex_zh: "他真是個很和善的人。" },
            { id: 5206, word: "사례", meaning: "案例、實例、例子；獎勵、補償", ex_kr: "성공적인 사례를 연구하고 있어요.", ex_zh: "我正在研究成功的案例。" },
            { id: 5207, word: "홀수", meaning: "奇數", ex_kr: "1, 3, 5는 홀수입니다.", ex_zh: "1、3 和 5 都是奇數。" },
            { id: 5208, word: "북경", meaning: "北京", ex_kr: "북경 오리 구이가 유명해요.", ex_zh: "北京烤鴨很有名。" },
            { id: 5209, word: "소나기", meaning: "淋浴", ex_kr: "갑자기 소나기가 내렸어요.", ex_zh: "突然下起了雨。" },
            { id: 5210, word: "믿음직하다", meaning: "可靠、值得信賴", ex_kr: "그는 정말 믿음직한 친구예요.", ex_zh: "他真是個可靠的朋友。" },
            { id: 5211, word: "꿈속", meaning: "在夢裡", ex_kr: "꿈속에서 돌아가신 할머니를 만났어요.", ex_zh: "我在夢裡見到了我已故的祖母。" },
            { id: 5212, word: "기색", meaning: "眼神、表情、手勢", ex_kr: "그는 당황한 기색이 역력했어요.", ex_zh: "他看起來明顯慌亂起來。" },
            { id: 5213, word: "갈매기", meaning: "海鷗", ex_kr: "바닷가에서 갈매기를 봤어요.", ex_zh: "我在海邊看到了一隻海鷗。" },
            { id: 5214, word: "필기하다", meaning: "記筆記", ex_kr: "선생님의 말씀을 공책에 필기했어요.", ex_zh: "我把老師講的內容記在筆記本上了。" },
            { id: 5215, word: "인질", meaning: "人質", ex_kr: "범인이 인질을 잡고 있어요.", ex_zh: "罪犯劫持了人質。" },
            { id: 5216, word: "내성적", meaning: "內向、矜持", ex_kr: "성격이 내성적이라 말을 잘 안 해요.", ex_zh: "我個性內向，所以不怎麼說話。" },
            { id: 5217, word: "보따리", meaning: "捆", ex_kr: "짐을 보따리에 쌌어요.", ex_zh: "我把行李打包成一捆。" },
            { id: 5218, word: "메뚜기", meaning: "蚱蜢", ex_kr: "들판에서 메뚜기를 잡았어요.", ex_zh: "我在田裡抓到了一隻蚱蜢。" },
            { id: 5219, word: "배즙", meaning: "梨汁", ex_kr: "감기에 걸려서 배즙을 마셨어요.", ex_zh: "我感冒了，所以喝了梨汁。" },
            { id: 5220, word: "예리하다", meaning: "敏銳、精明", ex_kr: "칼끝이 매우 예리해요.", ex_zh: "刀尖非常鋒利。" },
            { id: 5221, word: "지배하다", meaning: "統治、控制、支配", ex_kr: "왕이 나라를 지배했어요.", ex_zh: "國王統治著這個國家。" },
            { id: 5222, word: "바가지", meaning: "沾醬；敲詐", ex_kr: "관광지에서 바가지를 썼어요.", ex_zh: "我在一個旅遊景點被宰了。" },
            { id: 5223, word: "봐주다", meaning: "放過某人、對某事睜一隻眼閉一隻眼、忽略", ex_kr: "이번 한 번만 봐주세요.", ex_zh: "就這一次，饒了我吧。" },
            { id: 5224, word: "조개", meaning: "貝殼、蚌、蛤蜊", ex_kr: "바닷가에서 조개를 주웠어요.", ex_zh: "我在海灘上撿了一些貝殼。" },
            { id: 5225, word: "구별하다", meaning: "區分、辨別", ex_kr: "쌍둥이를 구별하기 힘들어요.", ex_zh: "很難區分這對雙胞胎。" },
            { id: 5226, word: "휴가철", meaning: "假期", ex_kr: "휴가철이라 비행기 표가 비싸요.", ex_zh: "因為是旅遊旺季，所以機票很貴。" },
            { id: 5227, word: "지난날", meaning: "逝去的日子、過去", ex_kr: "지난날의 실수를 반성해요.", ex_zh: "我反思自己過去的錯誤。" },
            { id: 5228, word: "자신감", meaning: "信心", ex_kr: "자신감을 가지고 도전하세요.", ex_zh: "自信地迎接挑戰。" },
            { id: 5229, word: "법정", meaning: "法院", ex_kr: "증인이 법정에 섰어요.", ex_zh: "證人出庭作證。" },
            { id: 5230, word: "단원", meaning: "單位；成員", ex_kr: "교과서 1단원을 공부했어요.", ex_zh: "我學習了課本的第一單元。" },
            { id: 5231, word: "작별", meaning: "告別、離別", ex_kr: "친구와 아쉬운 작별을 했어요.", ex_zh: "我和朋友依依惜別。" },
            { id: 5232, word: "식히다", meaning: "冷卻、使某物冷卻", ex_kr: "뜨거운 국을 식혀서 드세요.", ex_zh: "請讓熱湯冷卻後再食用。" },
            { id: 5233, word: "덤벙거리다", meaning: "粗心大意", ex_kr: "덤벙거리다가 지갑을 잃어버렸어요.", ex_zh: "我當時太笨手笨腳了，把錢包弄丟了。" },
            { id: 5234, word: "수료하다", meaning: "完成、結束", ex_kr: "한국어 과정을 무사히 수료했어요.", ex_zh: "我順利完成了韓語課程。" },
            { id: 5235, word: "쫓기다", meaning: "被追逐", ex_kr: "시간에 쫓겨서 바빠요.", ex_zh: "我忙是因為時間緊迫。" },
            { id: 5236, word: "설계하다", meaning: "設計、規劃、規劃", ex_kr: "건축가가 건물을 설계했어요.", ex_zh: "這棟建築是由建築師設計的。" },
            { id: 5237, word: "둔감하다", meaning: "麻木不仁、遲鈍、無動於衷", ex_kr: "그는 고통에 둔감해요.", ex_zh: "他對疼痛沒有感覺。" },
            { id: 5238, word: "연합", meaning: "聯盟、聯合體", ex_kr: "여러 나라가 연합하여 문제를 해결했어요.", ex_zh: "多個國家聯合起來解決這個問題。" },
            { id: 5239, word: "지리", meaning: "地理", ex_kr: "저는 한국 지리를 잘 몰라요.", ex_zh: "我對韓國地理不太了解。" },
            { id: 5240, word: "무전기", meaning: "對講機、無線電", ex_kr: "경찰이 무전기로 연락해요.", ex_zh: "警方之間透過無線電進行聯繫。" },
            { id: 5241, word: "장구", meaning: "韓國雙面鼓", ex_kr: "국악 시간에 장구를 쳤어요.", ex_zh: "我在韓國傳統音樂課上演奏了長鼓。" },
            { id: 5242, word: "확률", meaning: "機率、機會", ex_kr: "복권에 당첨될 확률은 아주 낮아요.", ex_zh: "中樂透的機率非常低。" },
            { id: 5243, word: "엉성하다", meaning: "貧窮、鬆散", ex_kr: "계획이 너무 엉성해요.", ex_zh: "這個計劃太隨意了。" },
            { id: 5244, word: "진로", meaning: "路線、方向、路徑", ex_kr: "졸업 후 진로를 고민하고 있어요.", ex_zh: "我正在考慮畢業後的職涯發展方向。" },
            { id: 5245, word: "경제적", meaning: "金融、經濟", ex_kr: "이 차는 연비가 좋아서 경제적이에요.", ex_zh: "這款車很經濟，因為它燃油效率高。" },
            { id: 5246, word: "미련", meaning: "揮之不去的依戀", ex_kr: "지나간 일에 미련을 갖지 마세요.", ex_zh: "不要沉湎於過去。" },
            { id: 5247, word: "주꾸미", meaning: "短臂章魚", ex_kr: "매운 주꾸미 볶음을 먹었어요.", ex_zh: "我吃了辣炒章魚。" },
            { id: 5248, word: "만점", meaning: "完美得分", ex_kr: "시험에서 만점을 받았어요.", ex_zh: "我考試得了滿分。" },
            { id: 5249, word: "불빛", meaning: "光、發光", ex_kr: "멀리서 불빛이 보여요.", ex_zh: "我看到遠處有燈光。" },
            { id: 5250, word: "벗기다", meaning: "脫掉、脫衣服、剝掉", ex_kr: "아이의 옷을 벗겼어요.", ex_zh: "我脫掉了孩子的衣服。" },
            { id: 5251, word: "이해심", meaning: "理解、同理心", ex_kr: "그녀는 이해심이 깊어요.", ex_zh: "她非常善解人意。" },
            { id: 5252, word: "담당하다", meaning: "承擔、負責", ex_kr: "제가 이번 프로젝트를 담당하게 되었습니다.", ex_zh: "我被任命負責這個專案。" },
            { id: 5253, word: "출국하다", meaning: "離開該國", ex_kr: "내일 아침 일찍 출국해요.", ex_zh: "我明天一早就要離開。" },
            { id: 5254, word: "정비사", meaning: "機械", ex_kr: "자동차 정비사가 차를 고치고 있어요.", ex_zh: "一名汽車修理工正在修理汽車。" },
            { id: 5255, word: "해석하다", meaning: "解釋", ex_kr: "이 문장을 어떻게 해석해야 하나요?", ex_zh: "我該如何理解這句話？" },
            { id: 5256, word: "자영업", meaning: "自己的企業、自僱", ex_kr: "그는 자영업을 하고 있어요.", ex_zh: "他是自由工作者。" },
            { id: 5257, word: "건기", meaning: "旱季", ex_kr: "건기에는 비가 거의 오지 않아요.", ex_zh: "旱季幾乎不下雨。" },
            { id: 5258, word: "출전하다", meaning: "參與、競爭", ex_kr: "올림픽에 국가 대표로 출전했어요.", ex_zh: "我曾經以國家代表身分參加奧運。" },
            { id: 5259, word: "새싹", meaning: "嫩芽、花蕾", ex_kr: "봄이 되니 새싹이 돋아나요.", ex_zh: "春天來了，新的嫩芽破土而出。" },
            { id: 5260, word: "박람회", meaning: "展覽會、博覽會", ex_kr: "취업 박람회에 다녀왔어요.", ex_zh: "我去參加招聘會了。" },
            { id: 5261, word: "설문", meaning: "問題", ex_kr: "설문 조사에 참여해 주세요.", ex_zh: "請參與本次調查。" },
            { id: 5262, word: "돌풍", meaning: "一陣風", ex_kr: "돌풍이 불어서 간판이 떨어졌어요.", ex_zh: "一陣狂風吹過，招牌倒了下來。" },
            { id: 5263, word: "우편물", meaning: "郵件", ex_kr: "우편함에 우편물이 있어요.", ex_zh: "信箱裡有郵件。" },
            { id: 5264, word: "뚝", meaning: "啪的一聲；突然", ex_kr: "울음을 뚝 그치세요.", ex_zh: "立刻停止哭泣。" },
            { id: 5265, word: "공식적", meaning: "正式的、正式的", ex_kr: "공식적인 입장은 아직 없습니다.", ex_zh: "目前尚無官方立場。" },
            { id: 5266, word: "밤사이", meaning: "夜間", ex_kr: "밤사이에 눈이 많이 왔어요.", ex_zh: "昨晚下了很大的雪。" },
            { id: 5267, word: "마음가짐", meaning: "心態", ex_kr: "새로운 마음가짐으로 시작해 봅시다.", ex_zh: "讓我們以全新的心態開始。" },
            { id: 5268, word: "포털", meaning: "入口網站", ex_kr: "포털 사이트에서 뉴스를 검색했어요.", ex_zh: "我在一個門戶網站上搜尋新聞。" },
            { id: 5269, word: "취업하다", meaning: "找到一份工作", ex_kr: "드디어 원하던 회사에 취업했어요.", ex_zh: "我終於在心儀的公司找到工作了。" },
            { id: 5270, word: "헤매다", meaning: "四處閒逛、四處走走", ex_kr: "길을 잃고 숲속을 헤맸어요.", ex_zh: "我迷路了，在森林裡漫無目的地遊蕩。" },
            { id: 5271, word: "등록금", meaning: "學費", ex_kr: "등록금이 너무 비싸요.", ex_zh: "學費太貴了。" },
            { id: 5272, word: "창업하다", meaning: "建立、創辦、創立", ex_kr: "친구와 함께 카페를 창업했어요.", ex_zh: "我和朋友一起開了一家咖啡館。" },
            { id: 5273, word: "초원", meaning: "草地、草甸", ex_kr: "양들이 초원에서 풀을 뜯고 있어요.", ex_zh: "羊群正在草地上吃草。" },
            { id: 5274, word: "유망하다", meaning: "很有前途", ex_kr: "그는 장래가 유망한 청년이에요.", ex_zh: "他是一位前途無量的年輕人。" },
            { id: 5275, word: "후텁지근하다", meaning: "悶熱潮濕", ex_kr: "날씨가 습하고 후텁지근해요.", ex_zh: "天氣潮濕悶熱。" },
            { id: 5276, word: "나들이", meaning: "旅行、外出", ex_kr: "가족들과 공원으로 나들이를 갔어요.", ex_zh: "我和家人一起去公園遊玩了。" },
            { id: 5277, word: "수강", meaning: "參加課程", ex_kr: "수강 신청을 하러 PC방에 갔어요.", ex_zh: "我去了網咖報名上課。" },
            { id: 5278, word: "개최하다", meaning: "舉辦、招待", ex_kr: "서울에서 올림픽을 개최했어요.", ex_zh: "首爾曾舉辦奧運。" },
            { id: 5279, word: "유한하다", meaning: "有限的、受限的", ex_kr: "자원은 유한하니 아껴 써야 해요.", ex_zh: "資源是有限的，所以我們必須節約使用。" },
            { id: 5280, word: "축의금", meaning: "現金贈與", ex_kr: "결혼식 축의금을 준비했어요.", ex_zh: "我準備了一份結婚禮物。" },
            { id: 5281, word: "싹", meaning: "完全地、徹底地；芽、嫩芽", ex_kr: "고민이 싹 사라졌어요.", ex_zh: "我的擔憂完全消失了。" },
            { id: 5282, word: "아이돌", meaning: "偶像歌手", ex_kr: "요즘 아이돌 가수가 인기예요.", ex_zh: "偶像歌手如今很受歡迎。" },
            { id: 5283, word: "끼우다", meaning: "插入之間", ex_kr: "책갈피를 책 사이에 끼웠어요.", ex_zh: "我在書頁間夾了一張書籤。" },
            { id: 5284, word: "경쾌하다", meaning: "歡快的、有節奏的", ex_kr: "음악이 경쾌해서 춤을 췄어요.", ex_zh: "音樂節奏歡快，所以我跳了起來。" },
            { id: 5285, word: "신입생", meaning: "大一新生", ex_kr: "3월에는 신입생 환영회가 있어요.", ex_zh: "三月會舉辦新生歡迎會。" },
            { id: 5286, word: "벼락", meaning: "閃電", ex_kr: "마른하늘에 벼락이 쳤어요.", ex_zh: "晴空萬裡，一道閃電劃破夜空。" },
            { id: 5287, word: "무지개", meaning: "彩虹", ex_kr: "비가 그치고 무지개가 떴어요.", ex_zh: "雨停了，出現了一道彩虹。" },
            { id: 5288, word: "탑승하다", meaning: "登船", ex_kr: "비행기에 탑승해 주세요.", ex_zh: "請登機。" },
            { id: 5289, word: "간편하다", meaning: "為了方便、容易", ex_kr: "이 요리는 조리법이 간편해요.", ex_zh: "這道菜的做法很簡單。" },
            { id: 5290, word: "터뜨리다", meaning: "爆裂、爆發、引爆", ex_kr: "풍선을 터뜨렸어요.", ex_zh: "我把氣球戳破了。" },
            { id: 5291, word: "화환", meaning: "花圈", ex_kr: "개업 축하 화환을 보냈어요.", ex_zh: "我送了花圈以示祝賀。" },
            { id: 5292, word: "선불", meaning: "預付款", ex_kr: "요금은 선불입니다.", ex_zh: "款項需預先支付。" },
            { id: 5293, word: "송금하다", meaning: "匯款、寄錢", ex_kr: "부모님께 용돈을 송금했어요.", ex_zh: "我寄了零用錢給父母。" },
            { id: 5294, word: "어버이", meaning: "父母", ex_kr: "어버이 은혜에 감사합니다.", ex_zh: "感謝你父母的關愛。" },

            { id: 5296, word: "게양하다", meaning: "吊起、抬升", ex_kr: "국경일에 국기를 게양합시다.", ex_zh: "讓我們在國慶日昇起國旗。" },
            { id: 5297, word: "반품하다", meaning: "返回", ex_kr: "사이즈가 안 맞아서 옷을 반품했어요.", ex_zh: "我退貨了，因為尺寸不合適。" },
            { id: 5298, word: "납부하다", meaning: "支付", ex_kr: "공과금을 납부했어요.", ex_zh: "我付了水電費。" },
            { id: 5299, word: "푸짐하다", meaning: "慷慨大方、富足豐盛", ex_kr: "음식이 정말 푸짐하네요.", ex_zh: "食物非常充足。" },
            { id: 5300, word: "집세", meaning: "租", ex_kr: "이번 달 집세를 냈어요.", ex_zh: "這個月我交了房租。" },
            { id: 5301, word: "종종", meaning: "有時、偶爾、經常", ex_kr: "그와 종종 연락해요.", ex_zh: "我經常和他保持聯絡。" },
            { id: 5302, word: "국회의원", meaning: "國民議會議員", ex_kr: "국회의원 선거가 다가오고 있어요.", ex_zh: "國民議會選舉即將到來。" },
            { id: 5303, word: "연령", meaning: "年齡", ex_kr: "이 영화는 관람 연령 제한이 있어요.", ex_zh: "本片有年齡限制。" },
            { id: 5304, word: "외동딸", meaning: "獨生女、獨生子", ex_kr: "그녀는 귀하게 자란 외동딸이에요.", ex_zh: "她是家裡的獨生女，從小備受呵護。" },
            { id: 5305, word: "때우다", meaning: "填補、修補；焊接", ex_kr: "점심을 빵으로 대충 때웠어요.", ex_zh: "我午餐只吃了麵包。" },
            { id: 5306, word: "재충전하다", meaning: "充電", ex_kr: "주말 동안 휴식을 취하며 재충전했어요.", ex_zh: "我利用週末時間休息充電。" },
            { id: 5307, word: "창립", meaning: "成立、基金會", ex_kr: "내일은 회사 창립 기념일입니다.", ex_zh: "明天是公司成立紀念日。" },
            { id: 5308, word: "한동안", meaning: "有一段時間、相當長一段時間。", ex_kr: "한동안 소식이 없었어요.", ex_zh: "一段時間內沒有任何消息。" },
            { id: 5309, word: "카네이션", meaning: "康乃馨", ex_kr: "어버이날에 부모님께 카네이션을 드렸어요.", ex_zh: "父母節那天，我送了父母康乃馨。" },
            { id: 5310, word: "평", meaning: "評論、評述", ex_kr: "영화에 대한 평이 좋아요.", ex_zh: "這部電影的評價很好。" },
            { id: 5311, word: "수면제", meaning: "安眠藥", ex_kr: "잠이 안 와서 수면제를 먹었어요.", ex_zh: "我睡不著，所以吃了安眠藥。" },
            { id: 5312, word: "안정", meaning: "穩定；平靜、休息", ex_kr: "물가가 안정을 찾았어요.", ex_zh: "價格已趨於穩定。" },
            { id: 5313, word: "프러포즈", meaning: "求婚", ex_kr: "남자친구에게 프러포즈를 받았어요.", ex_zh: "我男友向我求婚了。" },
            { id: 5314, word: "계발하다", meaning: "發展", ex_kr: "자기 계발을 위해 공부하고 있어요.", ex_zh: "我正在學習以提升自我。" },
            { id: 5315, word: "꾸중", meaning: "責罵", ex_kr: "숙제를 안 해서 선생님께 꾸중을 들었어요.", ex_zh: "我因為沒做作業被老師訓了一頓。" },
            { id: 5316, word: "처지다", meaning: "懸掛、下垂、沉沒、被遺棄", ex_kr: "기분이 축 처져요.", ex_zh: "我覺得很沮喪。" },
            { id: 5317, word: "해소", meaning: "解決方案、救濟、和解", ex_kr: "스트레스 해소에는 운동이 최고예요.", ex_zh: "運動是緩解壓力的最佳方式。" },
            { id: 5318, word: "말다툼", meaning: "爭吵、爭論", ex_kr: "사소한 일로 말다툼을 했어요.", ex_zh: "我們為一件小事發生了爭吵。" },
            { id: 5319, word: "활력", meaning: "能量、活力", ex_kr: "운동은 삶의 활력을 줍니다.", ex_zh: "運動使生命充滿活力。" },
            { id: 5320, word: "실화", meaning: "真實故事、真實人生", ex_kr: "이 영화는 실화를 바탕으로 했습니다.", ex_zh: "這部電影是根據真實故事改編的。" },
            { id: 5321, word: "터놓다", meaning: "打開", ex_kr: "고민을 친구에게 터놓고 이야기했어요.", ex_zh: "我向朋友傾訴了我的擔憂。" },
            { id: 5322, word: "보수", meaning: "支付、工資；修理", ex_kr: "보수가 좋은 일을 찾고 있어요.", ex_zh: "我正在尋找一份高薪工作。" },
            { id: 5323, word: "들통이 나다", meaning: "被檢測、被揭示", ex_kr: "거짓말이 들통이 났어요.", ex_zh: "謊言被揭穿了。" },
            { id: 5324, word: "여가", meaning: "休閒時間", ex_kr: "여가 시간에 주로 무엇을 하세요?", ex_zh: "你空閒時間通常會做什麼？" },
            { id: 5325, word: "비율", meaning: "比率、比例", ex_kr: "남녀 비율이 비슷해요.", ex_zh: "男女比例相近。" },
            { id: 5326, word: "핸드볼", meaning: "手球", ex_kr: "체육 시간에 핸드볼을 했어요.", ex_zh: "體育課我打了手球。" },
            { id: 5327, word: "복어", meaning: "河豚", ex_kr: "복어 요리는 전문가가 해야 해요.", ex_zh: "河豚菜餚必須由專家烹調。" },
            { id: 5328, word: "위축되다", meaning: "枯萎、萎縮", ex_kr: "경기가 불황이라 소비 심리가 위축되었어요.", ex_zh: "由於經濟衰退，消費者信心受到打擊。" },
            { id: 5329, word: "흥미진진하다", meaning: "令人興奮、引人入勝", ex_kr: "경기가 아주 흥미진진했어요.", ex_zh: "比賽非常精彩。" },
            { id: 5330, word: "거래처", meaning: "客戶、帳戶", ex_kr: "거래처 직원과 미팅이 있어요.", ex_zh: "我要和客戶開會。" },
            { id: 5331, word: "윙크하다", meaning: "眨眼", ex_kr: "그녀가 나에게 윙크했어요.", ex_zh: "她朝我眨了眨眼。" },
            { id: 5332, word: "물병", meaning: "水瓶、水壺", ex_kr: "물병에 물을 채웠어요.", ex_zh: "我把水瓶裝滿了水。" },
            { id: 5333, word: "악필", meaning: "字跡潦草", ex_kr: "저는 글씨를 못 쓰는 악필이에요.", ex_zh: "我的字寫得很醜。" },
            { id: 5334, word: "효도하다", meaning: "做一個孝順的兒子/女兒、孝敬父母", ex_kr: "부모님께 효도하고 싶어요.", ex_zh: "我想當父母的孝順子女。" },
            { id: 5335, word: "주사위", meaning: "骰子", ex_kr: "주사위를 던지세요.", ex_zh: "擲骰子。" },
            { id: 5336, word: "이야깃거리", meaning: "主題、話題", ex_kr: "그 사건은 좋은 이야깃거리예요.", ex_zh: "那件事可以寫成一個好故事。" },
            { id: 5337, word: "콧노래", meaning: "哼唱", ex_kr: "기분이 좋아서 콧노래가 나왔어요.", ex_zh: "我當時心情特別好，就開始哼歌了。" },
            { id: 5338, word: "줄넘기하다", meaning: "跳繩", ex_kr: "매일 아침 줄넘기를 해요.", ex_zh: "我每天早上都會跳繩。" },
            { id: 5339, word: "매너", meaning: "禮儀", ex_kr: "식사 매너를 지켜주세요.", ex_zh: "請注意用餐禮儀。" },
            { id: 5340, word: "버터", meaning: "奶油", ex_kr: "빵에 버터를 발라 먹었어요.", ex_zh: "我在麵包上抹了奶油，然後吃了。" },
            { id: 5341, word: "실감하다", meaning: "感受、意識到", ex_kr: "그의 인기를 실감했어요.", ex_zh: "我意識到他很受歡迎。" },
            { id: 5342, word: "회상하다", meaning: "回憶、想起", ex_kr: "어린 시절을 회상했어요.", ex_zh: "我回憶起我的童年。" },
            { id: 5343, word: "보행자", meaning: "行人", ex_kr: "횡단보도에서는 보행자가 우선입니다.", ex_zh: "行人在行人穿越道上擁有優先通行權。" },
            { id: 5344, word: "앞치마", meaning: "圍裙", ex_kr: "요리할 때 앞치마를 입으세요.", ex_zh: "煮飯時請穿圍裙。" },
            { id: 5345, word: "트이다", meaning: "獲得許可、變得更好", ex_kr: "앞이 탁 트인 전망이 좋아요.", ex_zh: "視野開闊，真不錯。" },
            { id: 5346, word: "좌절하다", meaning: "感到沮喪、氣餒", ex_kr: "실패에 좌절하지 말고 다시 도전하세요.", ex_zh: "不要因為失敗而氣餒，再試一次。" },
            { id: 5347, word: "강연", meaning: "講座、演講", ex_kr: "유명한 작가의 강연을 들었어요.", ex_zh: "我聽了一位著名作家的講座。" },
            { id: 5348, word: "뭉클하다", meaning: "觸碰", ex_kr: "영화를 보고 가슴이 뭉클했어요.", ex_zh: "看完這部電影後，我深受感動。" },
            { id: 5349, word: "빗나가다", meaning: "錯過、走失", ex_kr: "예상이 완전히 빗나갔어요.", ex_zh: "我的預測完全錯誤。" },
            { id: 5350, word: "빨대", meaning: "稻草", ex_kr: "커피를 빨대로 마셔요.", ex_zh: "我用吸管喝咖啡。" },
            { id: 5351, word: "볼거리", meaning: "奇觀、景點", ex_kr: "이 축제는 볼거리가 많아요.", ex_zh: "這個節日有很多值得一看的東西。" },
            { id: 5352, word: "늦추다", meaning: "推遲、放鬆、緩和", ex_kr: "출발 시간을 조금 늦췄어요.", ex_zh: "我稍微延後了出發時間。" },
            { id: 5353, word: "위인", meaning: "偉人；天性、性情", ex_kr: "세종대왕은 한국의 위인입니다.", ex_zh: "世宗大王是韓國歷史上的偉大人物。" },
            { id: 5354, word: "돌고래", meaning: "海豚", ex_kr: "돌고래 쇼를 봤어요.", ex_zh: "我看了海豚表演。" },
            { id: 5355, word: "바비큐", meaning: "燒烤", ex_kr: "캠핑장에서 바비큐를 해 먹었어요.", ex_zh: "我們在露營地舉行了燒烤。" },
            { id: 5356, word: "새까맣다", meaning: "深黑色", ex_kr: "얼굴이 새까맣게 탔어요.", ex_zh: "我的臉變得漆黑一片。" },
            { id: 5357, word: "유모차", meaning: "嬰兒車", ex_kr: "아기를 유모차에 태우고 산책했어요.", ex_zh: "我推著嬰兒車帶寶寶出去散步。" },
            { id: 5358, word: "동화", meaning: "童話、兒童故事；同化", ex_kr: "아이에게 동화책을 읽어 주었어요.", ex_zh: "我給孩子讀了一本故事書。" },
            { id: 5359, word: "시연", meaning: "示範、排練", ex_kr: "신제품 시연 행사가 있어요.", ex_zh: "有一場新產品展示活動。" },
            { id: 5360, word: "솜사탕", meaning: "棉花糖", ex_kr: "아이가 솜사탕을 좋아해요.", ex_zh: "我的孩子喜歡棉花糖。" },
            { id: 5361, word: "반찬거리", meaning: "雜貨、製作配菜的材料", ex_kr: "시장에 반찬거리를 사러 갔어요.", ex_zh: "我去市場買配菜。" },
            { id: 5362, word: "항복하다", meaning: "投降", ex_kr: "적군이 결국 항복했어요.", ex_zh: "敵人最終投降了。" },
            { id: 5363, word: "손실", meaning: "損失", ex_kr: "주식 투자로 큰 손실을 봤어요.", ex_zh: "我在股票投資中損失慘重。" },
            { id: 5364, word: "한국인", meaning: "韓國人", ex_kr: "저는 한국인입니다.", ex_zh: "我是韓國人。" },
            { id: 5365, word: "새콤하다", meaning: "酸的、酸性的", ex_kr: "레몬 맛이 아주 새콤해요.", ex_zh: "檸檬味很酸。" },
            { id: 5366, word: "아우", meaning: "弟弟、妹妹", ex_kr: "형이 아우를 잘 돌봐줍니다.", ex_zh: "哥哥很照顧弟弟。" },
            { id: 5367, word: "쓸다", meaning: "掃", ex_kr: "빗자루로 마당을 쓸었어요.", ex_zh: "我用掃帚打掃了院子。" },
            { id: 5368, word: "기저귀", meaning: "尿布", ex_kr: "아기 기저귀를 갈아줬어요.", ex_zh: "我幫寶寶換了尿布。" },
            { id: 5369, word: "성묘하다", meaning: "去祭拜祖先的墳墓", ex_kr: "추석에 조상님 산소에 성묘했어요.", ex_zh: "中秋節期間，我去祭拜了祖先的墳墓。" },
            { id: 5370, word: "앞두다", meaning: "有所準備", ex_kr: "결혼을 앞두고 바빠요.", ex_zh: "我婚禮前忙得不可開交。" },
            { id: 5371, word: "면목", meaning: "面子、榮譽", ex_kr: "부모님 뵐 면목이 없어요.", ex_zh: "我連張臉都看不到，沒辦法給父母看。" },
            { id: 5372, word: "사나이", meaning: "男人", ex_kr: "그는 진짜 사나이예요.", ex_zh: "他是個真男人。" },
            { id: 5373, word: "흐뭇하다", meaning: "感到高興、滿足、欣喜", ex_kr: "아이가 자는 모습을 보니 흐뭇해요.", ex_zh: "看到孩子睡覺，我感到很開心。" },
            { id: 5374, word: "착용하다", meaning: "穿", ex_kr: "안전벨트를 착용해 주세요.", ex_zh: "請係好安全帶。" },
            { id: 5375, word: "양해", meaning: "理解、同意", ex_kr: "잠시 양해를 구하겠습니다.", ex_zh: "請各位稍等片刻。" },
            { id: 5376, word: "방과", meaning: "放學", ex_kr: "방과 후 수업을 들어요.", ex_zh: "我放學後會參加補習班。" },
            { id: 5377, word: "등교하다", meaning: "去上學", ex_kr: "학생들은 8시 30분까지 등교해야 합니다.", ex_zh: "學生必須在8:30前到達學校。" },
            { id: 5378, word: "음원", meaning: "音源、線上音樂", ex_kr: "신곡 음원이 공개되었어요.", ex_zh: "新歌已經發布了。" },
            { id: 5379, word: "신청자", meaning: "申請人", ex_kr: "참가 신청자가 많아요.", ex_zh: "申請人很多。" },
            { id: 5380, word: "빗자루", meaning: "掃帚", ex_kr: "빗자루와 쓰레받기를 가져오세요.", ex_zh: "請帶上掃帚和簸箕。" },
            { id: 5381, word: "어묵", meaning: "魚餅", ex_kr: "겨울에는 따뜻한 어묵 국물이 최고예요.", ex_zh: "冬天喝熱呼呼的魚餅湯最棒了。" },
            { id: 5382, word: "반숙하다", meaning: "半熟、半成熟", ex_kr: "계란을 반숙으로 삶아 주세요.", ex_zh: "請將雞蛋煮至半熟。" },
            { id: 5383, word: "본색", meaning: "一個人的真面目", ex_kr: "드디어 본색을 드러냈군요.", ex_zh: "你終於露出真面目了。" },
            { id: 5384, word: "웃어른", meaning: "老年人、長者", ex_kr: "웃어른을 공경해야 합니다.", ex_zh: "你必須尊重長輩。" },
            { id: 5385, word: "일과", meaning: "日常任務", ex_kr: "하루 일과를 마치고 퇴근해요.", ex_zh: "我結束了一天的工作，離開了工作場所。" },
            { id: 5386, word: "대걸레", meaning: "拖把", ex_kr: "대걸레로 복도를 청소했어요.", ex_zh: "我用拖把打掃了走廊。" },
            { id: 5387, word: "고춧가루", meaning: "紅辣椒醬", ex_kr: "김치에 고춧가루를 넣어요.", ex_zh: "在泡菜中加入辣椒粉。" },
            { id: 5388, word: "수다스럽다", meaning: "健談", ex_kr: "제 친구는 좀 수다스러워요.", ex_zh: "我的朋友有點話多。" },
            { id: 5389, word: "발레", meaning: "芭蕾舞", ex_kr: "그녀는 어릴 때부터 발레를 배웠어요.", ex_zh: "她從小就開始學習芭蕾舞。" },
            { id: 5390, word: "딱밤", meaning: "手指輕彈", ex_kr: "내기에서 져서 딱밤을 맞았어요.", ex_zh: "我打賭輸了，結果被人彈了一下額頭。" },
            { id: 5391, word: "드럼", meaning: "鼓", ex_kr: "그는 밴드에서 드럼을 연주해요.", ex_zh: "他在樂隊裡打鼓。" },
            { id: 5392, word: "염려", meaning: "擔憂、恐懼", ex_kr: "부모님께 염려를 끼쳐 드려 죄송해요.", ex_zh: "對不起，讓父母擔心了。" },
            { id: 5393, word: "제자", meaning: "學生、門徒", ex_kr: "스승과 제자가 만났어요.", ex_zh: "老師和學生見面了。" },
            { id: 5394, word: "공연장", meaning: "音樂廳、場地", ex_kr: "공연장에 사람들이 가득 찼어요.", ex_zh: "演出廳裡擠滿了人。" },
            { id: 5395, word: "출간하다", meaning: "發布", ex_kr: "소설을 출간했어요.", ex_zh: "我出版了一部小說。" },
