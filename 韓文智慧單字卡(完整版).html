            { id: 3096, word: "축제", meaning: "節慶", ex_kr: "학교 축제에 참가했어요.", ex_zh: "我參加了學校的文化節。" },
            { id: 3097, word: "쓸모있다", meaning: "有用", ex_kr: "이 기계는 아주 쓸모있어요.", ex_zh: "這台機器非常實用。" },
            { id: 3098, word: "동거하다", meaning: "共同生活", ex_kr: "결혼 전에 동거하는 커플이 늘고 있어요.", ex_zh: "婚前同居的情侶數量正在增加。" },
            { id: 3099, word: "운명", meaning: "命運、天命", ex_kr: "우리는 운명처럼 만났어요.", ex_zh: "我們彷彿命中註定般相遇。" },
            { id: 3100, word: "꽂다", meaning: "放入、插入", ex_kr: "꽃병에 꽃을 꽂았어요.", ex_zh: "我把花插在花瓶裡。" },
            { id: 3101, word: "수레", meaning: "馬車、手推車", ex_kr: "수레에 짐을 실었어요.", ex_zh: "我把貨物裝上推車了。" },
            { id: 3102, word: "내부", meaning: "內部、內部部分", ex_kr: "건물 내부를 구경했어요.", ex_zh: "我環顧了建築物內部。" },
            { id: 3103, word: "와인", meaning: "葡萄酒", ex_kr: "저녁 식사와 함께 와인을 마셨어요.", ex_zh: "我晚餐時喝了葡萄酒。" },
            { id: 3104, word: "참고하다", meaning: "參考、查閱、記錄", ex_kr: "이 책을 참고하세요.", ex_zh: "請參考這本書。" },
            { id: 3105, word: "신제품", meaning: "新產品", ex_kr: "신제품 출시 발표회가 열렸어요.", ex_zh: "舉辦了一場新產品發表會。" },
            { id: 3106, word: "불국사", meaning: "布爾古克寺", ex_kr: "경주에 가서 불국사를 구경했어요.", ex_zh: "我去了慶州，參觀了佛國寺。" },
            { id: 3107, word: "찬성하다", meaning: "同意、批准", ex_kr: "그 의견에 찬성합니다.", ex_zh: "我同意這種觀點。" },
            { id: 3108, word: "도리어", meaning: "相反、", ex_kr: "도와주려다가 도리어 방해가 되었어요.", ex_zh: "我本來想幫忙，結果卻反而礙事了。" },
            { id: 3109, word: "지독하다", meaning: "極度惡毒；極度可怕、恐怖、嚴厲", ex_kr: "감기가 지독하게 걸렸어요.", ex_zh: "我得了重感冒。" },
            { id: 3110, word: "의리", meaning: "忠誠", ex_kr: "친구 사이에는 의리가 중요해요.", ex_zh: "朋友之間忠誠很重要。" },
            { id: 3111, word: "변명", meaning: "藉口、理由", ex_kr: "구차한 변명은 하지 마세요.", ex_zh: "別找蹩腳的藉口。" },
            { id: 3112, word: "밀치다", meaning: "推、擠", ex_kr: "사람들을 밀치고 앞으로 나갔어요.", ex_zh: "我推開周圍的人，繼續往前走。" },
            { id: 3113, word: "목격하다", meaning: "目睹、觀察", ex_kr: "사고 현장을 목격했어요.", ex_zh: "我目睹了事故現場。" },
            { id: 3114, word: "사소하다", meaning: "微不足道、無關緊要", ex_kr: "사소한 일로 싸우지 마세요.", ex_zh: "不要為瑣事爭吵。" },
            { id: 3115, word: "시달리다", meaning: "遭受", ex_kr: "악몽에 시달렸어요.", ex_zh: "我飽受惡夢困擾。" },
            { id: 3116, word: "소원", meaning: "願望、渴望", ex_kr: "소원을 빌어보세요.", ex_zh: "許個願。" },
            { id: 3117, word: "촌스럽다", meaning: "質樸、俗氣、過時", ex_kr: "이 옷은 좀 촌스러워 보여요.", ex_zh: "這身打扮看起來有點俗氣。" },
            { id: 3118, word: "수신자", meaning: "接受者", ex_kr: "수신자 부담 전화입니다.", ex_zh: "這是對方付費電話。" },
            { id: 3119, word: "금융", meaning: "金融", ex_kr: "그는 금융 기관에서 일해요.", ex_zh: "他在金融機構工作。" },
            { id: 3120, word: "요란하다", meaning: "吵鬧、大聲喧嘩", ex_kr: "밖이 너무 요란해요.", ex_zh: "外面太吵了。" },
            { id: 3121, word: "외부", meaning: "外部、外表", ex_kr: "외부인의 출입을 금지합니다.", ex_zh: "禁止外人入內。" },
            { id: 3122, word: "참치", meaning: "鮪魚", ex_kr: "참치 김밥을 좋아해요.", ex_zh: "我喜歡鮪魚紫菜包飯。" },
            { id: 3123, word: "딛다", meaning: "踩", ex_kr: "발을 헛디뎠어요.", ex_zh: "我絆倒了。" },
            { id: 3124, word: "재우다", meaning: "讓某人睡覺", ex_kr: "아기를 재우고 있어요.", ex_zh: "我正在哄寶寶睡覺。" },
            { id: 3125, word: "늦잠", meaning: "早上睡懶覺、睡過頭", ex_kr: "주말에는 늦잠을 자요.", ex_zh: "我周末會睡懶覺。" },
            { id: 3126, word: "이상야릇하다", meaning: "古怪的、滑稽的、奇特的", ex_kr: "기분이 이상야릇해요.", ex_zh: "我覺得很奇怪。" },
            { id: 3127, word: "두려워하다", meaning: "害怕、畏懼", ex_kr: "실패를 두려워하지 마세요.", ex_zh: "不要害怕失敗。" },
            { id: 3128, word: "재판", meaning: "審判", ex_kr: "재판 결과가 나왔어요.", ex_zh: "試驗結果出來了。" },
            { id: 3129, word: "심사하다", meaning: "篩選、評估、判斷", ex_kr: "서류를 꼼꼼히 심사했습니다.", ex_zh: "我們仔細審查了這些文件。" },
            { id: 3130, word: "바람둥이", meaning: "花花公子、花花公子", ex_kr: "그는 소문난 바람둥이예요.", ex_zh: "他是個臭名昭著的花花公子。" },
            { id: 3131, word: "제국", meaning: "帝國", ex_kr: "로마 제국은 매우 거대했어요.", ex_zh: "羅馬帝國幅員遼闊。" },
            { id: 3132, word: "부리다", meaning: "管理、處理；培養、創造、展示、擁有", ex_kr: "고집을 부리지 마세요.", ex_zh: "不要固執。" },
            { id: 3133, word: "남김없이", meaning: "完全沒有例外", ex_kr: "음식을 남김없이 다 먹었어요.", ex_zh: "我把所有食物都吃光了，一點也沒剩。" },
            { id: 3134, word: "노래자랑", meaning: "歌唱比賽", ex_kr: "전국 노래자랑에 나갔어요.", ex_zh: "我參加了全國歌唱比賽。" },
            { id: 3135, word: "애쓰다", meaning: "努力、費心思", ex_kr: "문제를 해결하려고 애썼어요.", ex_zh: "我盡力嘗試解決這個問題。" },
            { id: 3136, word: "확정하다", meaning: "確定、決定、解決、修復", ex_kr: "여행 날짜를 확정했어요.", ex_zh: "我已確認出行日期。" },
            { id: 3137, word: "스타킹", meaning: "長襪", ex_kr: "스타킹 올이 나갔어요.", ex_zh: "我的絲襪破了一個洞。" },
            { id: 3138, word: "연하", meaning: "年輕的、初級的", ex_kr: "제 남자 친구는 저보다 연하예요.", ex_zh: "我男友比我小。" },
            { id: 3139, word: "겸손하다", meaning: "謙虛、溫順", ex_kr: "그는 항상 겸손해요.", ex_zh: "他一向謙遜。" },
            { id: 3140, word: "본체만체하다", meaning: "忽略、假裝沒看見", ex_kr: "그는 나를 보고도 본체만체했어요.", ex_zh: "即使看到我，他也無視我。" },
            { id: 3141, word: "존중하다", meaning: "欣賞、尊重", ex_kr: "서로의 의견을 존중합시다.", ex_zh: "讓我們互相尊重彼此的意見。" },
            { id: 3142, word: "화해하다", meaning: "和解、和好", ex_kr: "친구와 화해했어요.", ex_zh: "我和朋友和好了。" },
            { id: 3143, word: "잔디", meaning: "草坪", ex_kr: "잔디밭에 들어가지 마세요.", ex_zh: "不要踏上草坪。" },
            { id: 3144, word: "보상", meaning: "補償；獎勵", ex_kr: "피해에 대한 보상을 받았어요.", ex_zh: "我收到了損失賠償。" },
            { id: 3145, word: "이만", meaning: "僅此而已、到此為止、達到這個程度", ex_kr: "오늘은 이만 퇴근하겠습니다.", ex_zh: "我現在要下班了。" },
            { id: 3146, word: "바탕", meaning: "基礎、根基", ex_kr: "사실을 바탕으로 이야기하세요.", ex_zh: "請以事實為依據發言。" },
            { id: 3147, word: "산보하다", meaning: "散步、漫步", ex_kr: "공원을 산보했어요.", ex_zh: "我在公園裡散步了。" },
            { id: 3148, word: "영리하다", meaning: "聰明、機智、有才華", ex_kr: "우리 강아지는 정말 영리해요.", ex_zh: "我的狗非常聰明。" },
            { id: 3149, word: "녹음실", meaning: "錄音室", ex_kr: "가수가 녹음실에 들어갔어요.", ex_zh: "歌手走進了錄音室。" },
            { id: 3150, word: "미혼", meaning: "單身、未婚", ex_kr: "그녀는 아직 미혼입니다.", ex_zh: "她目前仍然單身。" },
            { id: 3151, word: "진단", meaning: "診斷", ex_kr: "의사에게 진단을 받았어요.", ex_zh: "我經醫生診斷後確診。" },
            { id: 3152, word: "지문", meaning: "指紋", ex_kr: "컵에 지문이 묻었어요.", ex_zh: "杯子上有指紋。" },
            { id: 3153, word: "노출하다", meaning: "暴露", ex_kr: "피부를 과도하게 노출하지 마세요.", ex_zh: "不要讓皮膚過度暴露在外。" },
            { id: 3154, word: "소화", meaning: "消化", ex_kr: "음식이 소화가 잘 안 돼요.", ex_zh: "我消化不良。" },
            { id: 3155, word: "침묵", meaning: "沉默", ex_kr: "침묵은 금이다.", ex_zh: "沉默是金。" },
            { id: 3156, word: "엉망", meaning: "殘骸、混亂、糟糕狀態", ex_kr: "방이 엉망이에요.", ex_zh: "房間很亂。" },
            { id: 3157, word: "하필", meaning: "為什麼偏偏是", ex_kr: "하필이면 오늘 비가 오네요.", ex_zh: "偏偏今天下雨了。" },
            { id: 3158, word: "감싸다", meaning: "覆蓋、包裹、庇護", ex_kr: "엄마가 아이를 감싸 안았어요.", ex_zh: "媽媽將孩子摟在懷裡。" },
            { id: 3159, word: "우습다", meaning: "有趣、令人愉悅", ex_kr: "그 이야기는 정말 우스워요.", ex_zh: "那個故事真好笑。" },
            { id: 3160, word: "환불하다", meaning: "退款、獲得退款", ex_kr: "옷이 작아서 환불했어요.", ex_zh: "我把衣服退了，因為它們太小了。" },
            { id: 3161, word: "미루다", meaning: "推遲、延期", ex_kr: "약속을 다음으로 미뤘어요.", ex_zh: "我把預約推遲到下次了。" },
            { id: 3162, word: "깔끔하다", meaning: "整潔、整齊", ex_kr: "방이 아주 깔끔하네요.", ex_zh: "房間很乾淨。" },
            { id: 3163, word: "교복", meaning: "校服", ex_kr: "학생들이 교복을 입고 있어요.", ex_zh: "學生們都穿著校服。" },
            { id: 3164, word: "살아가다", meaning: "繼續生活、與人相處、繼續活下去", ex_kr: "열심히 살아가고 있습니다.", ex_zh: "我正在盡情享受生活。" },
            { id: 3165, word: "빠뜨리다", meaning: "丟棄、投入；省略、排除；誘惑", ex_kr: "중요한 내용을 빠뜨렸어요.", ex_zh: "我遺漏了一些重要細節。" },
            { id: 3166, word: "진주", meaning: "珍珠", ex_kr: "진주 목걸이가 예뻐요.", ex_zh: "這條珍珠項鍊很漂亮。" },
            { id: 3167, word: "신분", meaning: "社會地位", ex_kr: "신분증을 보여주세요.", ex_zh: "請出示您的身分證明。" },
            { id: 3168, word: "교무실", meaning: "教師休息室", ex_kr: "선생님을 만나러 교무실에 갔어요.", ex_zh: "我去教師辦公室見了老師。" },
            { id: 3169, word: "호응", meaning: "反應", ex_kr: "관객들의 호응이 좋았어요.", ex_zh: "觀眾反應很好。" },
            { id: 3170, word: "계급", meaning: "社會階層", ex_kr: "군대에는 계급이 있어요.", ex_zh: "軍隊裡有軍階。" },
            { id: 3171, word: "차표", meaning: "火車/巴士票", ex_kr: "부산행 차표를 예매했어요.", ex_zh: "我訂了去釜山的機票。" },
            { id: 3172, word: "거치다", meaning: "穿過、經過", ex_kr: "여러 단계를 거쳐야 해요.", ex_zh: "你需要完成幾個步驟。" },
            { id: 3173, word: "빈자리", meaning: "空位、空地", ex_kr: "버스에 빈자리가 없어요.", ex_zh: "車上沒有空位了。" },
            { id: 3174, word: "만원", meaning: "已滿", ex_kr: "지하철이 만원이에요.", ex_zh: "地鐵裡人很多。" },
            { id: 3175, word: "맞이하다", meaning: "歡迎、迎接、接待", ex_kr: "새해를 맞이했어요.", ex_zh: "我迎接了新年。" },
            { id: 3176, word: "검찰", meaning: "檢方", ex_kr: "검찰 조사를 받고 있어요.", ex_zh: "我正在接受檢方調查。" },
            { id: 3177, word: "망하다", meaning: "走向毀滅、破產、滅亡", ex_kr: "이번 시험은 망했어요.", ex_zh: "我這次考試不及格。" },
            { id: 3178, word: "파마하다", meaning: "燙髮", ex_kr: "미용실에서 파마했어요.", ex_zh: "我在美髮沙龍燙了頭髮。" },
            { id: 3179, word: "인류", meaning: "人類、人類", ex_kr: "인류의 평화를 기원합니다.", ex_zh: "我祈禱人類和平。" },
            { id: 3180, word: "조절하다", meaning: "控制、調整、調節", ex_kr: "불 세기를 조절하세요.", ex_zh: "調整加熱檔位。" },
            { id: 3181, word: "차별하다", meaning: "歧視", ex_kr: "사람을 차별하면 안 돼요.", ex_zh: "你不應該歧視他人。" },
            { id: 3182, word: "부주의", meaning: "疏忽", ex_kr: "사고는 부주의로 인해 발생했어요.", ex_zh: "事故是由於粗心大意造成的。" },
            { id: 3183, word: "희미하다", meaning: "昏暗的、微弱的、模糊的", ex_kr: "기억이 희미해요.", ex_zh: "我的記憶有點模糊。" },
            { id: 3184, word: "위선", meaning: "虛偽", ex_kr: "그의 행동은 위선적이에요.", ex_zh: "他的行為很虛偽。" },
            { id: 3185, word: "욕먹다", meaning: "被責備、被批評、被譴責", ex_kr: "지각해서 욕먹었어요.", ex_zh: "我因為遲到被斥責了。" },
            { id: 3186, word: "면도하다", meaning: "刮鬍", ex_kr: "아침마다 면도해요.", ex_zh: "我每天早上都刮鬍子。" },
            { id: 3187, word: "나아가다", meaning: "要繼續前進、請繼續", ex_kr: "앞으로 나아가세요.", ex_zh: "繼續前進。" },
            { id: 3188, word: "뼈", meaning: "骨", ex_kr: "생선 뼈를 발라냈어요.", ex_zh: "我把魚刺挑出來了。" },
            { id: 3189, word: "취침", meaning: "上床睡覺、就寢", ex_kr: "취침 시간은 10시입니다.", ex_zh: "晚上十點是睡覺時間。" },
            { id: 3190, word: "우정", meaning: "友誼", ex_kr: "그들의 우정은 변치 않았어요.", ex_zh: "他們的友誼沒有改變。" },
            { id: 3191, word: "텐트", meaning: "帳篷", ex_kr: "강가에 텐트를 쳤어요.", ex_zh: "我在河邊搭了帳篷。" },
            { id: 3192, word: "필수", meaning: "必要的、必需的", ex_kr: "비타민 섭취는 필수입니다.", ex_zh: "攝取維生素至關重要。" },
            { id: 3193, word: "집착", meaning: "迷戀", ex_kr: "과거에 너무 집착하지 마세요.", ex_zh: "不要過多沉湎於過去。" },
            { id: 3194, word: "남매", meaning: "兄妹", ex_kr: "그들은 사이좋은 남매예요.", ex_zh: "他們是關係親密的兄妹。" },
            { id: 3195, word: "주식", meaning: "股票、股份；主要飲食項目", ex_kr: "주식 시장이 폭락했어요.", ex_zh: "股市崩盤了。" },
            { id: 3196, word: "쐬다", meaning: "呼吸新鮮空氣、曬太陽", ex_kr: "바람 좀 쐬고 올게요.", ex_zh: "我要出去透透氣。" },
            { id: 3197, word: "강도", meaning: "強盜、搶劫；力量、強度", ex_kr: "은행에 강도가 들었어요.", ex_zh: "銀行發生了搶劫案。" },
            { id: 3198, word: "콤비", meaning: "組合", ex_kr: "두 사람은 환상의 콤비예요.", ex_zh: "他們兩個真是絕佳搭檔。" },
            { id: 3199, word: "통과하다", meaning: "通過、順利通過", ex_kr: "터널을 통과했어요.", ex_zh: "我穿過了隧道。" },
            { id: 3200, word: "넘어뜨리다", meaning: "丟下、傾倒、向下推", ex_kr: "아이가 자전거를 넘어뜨렸어요.", ex_zh: "孩子把腳踏車碰倒了。" },
            { id: 3201, word: "다름없다", meaning: "不有所不同", ex_kr: "이것은 기적이나 다름없어요.", ex_zh: "這簡直就是個奇蹟。" },
            { id: 3202, word: "지켜보다", meaning: "觀看、觀察", ex_kr: "상황을 좀 더 지켜봅시다.", ex_zh: "讓我們拭目以待，看看事情會如何發展。" },
            { id: 3203, word: "나뉘다", meaning: "被分割、分離", ex_kr: "의견이 둘로 나뉘었어요.", ex_zh: "人們的意見不一。" },
            { id: 3204, word: "제약", meaning: "限制、約束；藥品生產", ex_kr: "시간의 제약을 받습니다.", ex_zh: "受時間限制。" },
            { id: 3205, word: "귀띔", meaning: "提示、小貼士", ex_kr: "미리 귀띔 좀 해주지 그랬어.", ex_zh: "你應該事先通知我一下。" },
            { id: 3206, word: "해안", meaning: "海岸、海邊", ex_kr: "해안 도로를 따라 드라이브했어요.", ex_zh: "我沿著海岸公路行駛。" },
            { id: 3207, word: "부적절하다", meaning: "不恰當", ex_kr: "그 발언은 부적절했어요.", ex_zh: "那句話很不恰當。" },
            { id: 3208, word: "성취하다", meaning: "實現、完成", ex_kr: "목표를 성취했습니다.", ex_zh: "目標達成。" },
            { id: 3209, word: "설레다", meaning: "顫動、振動", ex_kr: "여행 갈 생각에 가슴이 설레요.", ex_zh: "想到要去旅行，我的心怦怦直跳。" },
            { id: 3210, word: "홀랑", meaning: "完全地", ex_kr: "돈을 홀랑 다 써버렸어요.", ex_zh: "我把錢都花光了。" },
            { id: 3211, word: "부당하다", meaning: "不公平、不公正", ex_kr: "그 처우는 부당해요.", ex_zh: "這種待遇是不公平的。" },
            { id: 3212, word: "비만", meaning: "肥胖、臃腫", ex_kr: "비만은 건강에 좋지 않아요.", ex_zh: "肥胖對健康有害。" },
            { id: 3213, word: "권투", meaning: "拳擊", ex_kr: "텔레비전에서 권투 경기를 봤어요.", ex_zh: "我在電視上看了一場拳擊比賽。" },
            { id: 3214, word: "부대", meaning: "單位、部隊；袋子、麻袋", ex_kr: "그는 특수 부대 출신이에요.", ex_zh: "他是特種部隊成員。" },
            { id: 3215, word: "호적", meaning: "家譜", ex_kr: "호적 등본을 떼러 갔어요.", ex_zh: "我去拿了一份家譜副本。" },
            { id: 3216, word: "통역하다", meaning: "口譯", ex_kr: "영어를 한국어로 통역했어요.", ex_zh: "我將英文翻譯成韓文。" },
            { id: 3217, word: "시상식", meaning: "頒獎典禮", ex_kr: "연말 시상식을 시청했어요.", ex_zh: "我看了年終頒獎典禮。" },
            { id: 3218, word: "논리적", meaning: "邏輯", ex_kr: "논리적으로 설명해 보세요.", ex_zh: "請用邏輯方式解釋。" },
            { id: 3219, word: "까다", meaning: "剝皮；孵化", ex_kr: "귤을 까 먹었어요.", ex_zh: "我剝開橘子吃了。" },
            { id: 3220, word: "상징", meaning: "象徵", ex_kr: "비둘기는 평화의 상징이에요.", ex_zh: "鴿子是和平的象徵。" },
            { id: 3221, word: "빼앗다", meaning: "奪走、搶劫；使著迷、吸引", ex_kr: "아이의 장난감을 빼앗지 마세요.", ex_zh: "不要沒收孩子的玩具。" },
            { id: 3222, word: "건드리다", meaning: "觸碰、干涉、挑釁", ex_kr: "제 물건을 건드리지 마세요.", ex_zh: "不要碰我的東西。" },
            { id: 3223, word: "속삭이다", meaning: "低聲說", ex_kr: "귓가에 사랑을 속삭였어요.", ex_zh: "我輕聲在你耳邊訴說愛意。" },
            { id: 3224, word: "번쩍", meaning: "輕易地；高；突然地", ex_kr: "번개가 번쩍 쳤어요.", ex_zh: "閃電劃破夜空。" },
            { id: 3225, word: "명예", meaning: "榮譽、殊榮、名望", ex_kr: "군인은 명예를 중요하게 생각해요.", ex_zh: "士兵重視榮譽。" },
            { id: 3226, word: "인내심", meaning: "耐心、毅力", ex_kr: "인내심을 가지고 기다리세요.", ex_zh: "請耐心等待。" },
            { id: 3227, word: "구분하다", meaning: "劃分、分類", ex_kr: "쓰레기를 종류별로 구분하세요.", ex_zh: "將垃圾依類型分類。" },
            { id: 3228, word: "취득하다", meaning: "獲取、取得", ex_kr: "자격증을 취득했어요.", ex_zh: "我獲得了證書。" },
            { id: 3229, word: "일체", meaning: "全部、整體；完全地、絕對地", ex_kr: "안주 일체를 주문했어요.", ex_zh: "我點了一大盤點心。" },
            { id: 3230, word: "양다리", meaning: "兩面三刀(作弊)", ex_kr: "그는 양다리를 걸치다가 들켰어요.", ex_zh: "他腳踏兩隻船被抓住了。" },
            { id: 3231, word: "위협", meaning: "威脅、恐嚇", ex_kr: "위협을 느꼈어요.", ex_zh: "我感到受到了威脅。" },
            { id: 3232, word: "살살", meaning: "輕輕地、柔和地", ex_kr: "아기니까 살살 다뤄주세요.", ex_zh: "它還是個嬰兒，請輕拿輕放。" },
            { id: 3233, word: "과로하다", meaning: "工作過度", ex_kr: "과로해서 병이 났어요.", ex_zh: "我因為過度勞累而生病了。" },
            { id: 3234, word: "대낮", meaning: "中午", ex_kr: "대낮부터 술을 마셨어요.", ex_zh: "我光天化日之下喝酒了。" },
            { id: 3235, word: "돌보다", meaning: "照顧、照料", ex_kr: "아픈 강아지를 돌보았어요.", ex_zh: "我照顧了一隻生病的小狗。" },
            { id: 3236, word: "지시하다", meaning: "指導、指示", ex_kr: "상사가 업무를 지시했어요.", ex_zh: "老闆幫我安排了工作。" },
            { id: 3237, word: "야단치다", meaning: "責罵、斥責", ex_kr: "엄마가 아이를 야단쳤어요.", ex_zh: "媽媽斥責了孩子。" },
            { id: 3238, word: "예의", meaning: "良好的禮儀、禮貌", ex_kr: "예의를 지키세요.", ex_zh: "請講禮貌。" },
            { id: 3239, word: "각설하다", meaning: "轉移話題", ex_kr: "각설하고 본론으로 들어갑시다.", ex_zh: "總之，我們直奔主題吧。" },
            { id: 3240, word: "언덕", meaning: "山丘；斜坡", ex_kr: "언덕 위에 집이 있어요.", ex_zh: "山坡上有一座房子。" },
            { id: 3241, word: "찢다", meaning: "撕裂、撕碎", ex_kr: "종이를 찢어서 버렸어요.", ex_zh: "我把紙撕碎丟掉了。" },
            { id: 3242, word: "울적하다", meaning: "沮喪、憂鬱、無精打采", ex_kr: "비가 오니 기분이 울적해요.", ex_zh: "因為下雨，我心情很低落。" },
            { id: 3243, word: "초인종", meaning: "門鈴", ex_kr: "초인종을 눌러도 대답이 없어요.", ex_zh: "我按了門鈴，但沒人應門。" },
            { id: 3244, word: "순번", meaning: "轉身、走", ex_kr: "순번을 기다리고 있어요.", ex_zh: "我正在等待輪到我。" },
            { id: 3245, word: "추측하다", meaning: "猜測一下、假設", ex_kr: "결과를 추측하기 어려워요.", ex_zh: "結果難以預測。" },
            { id: 3246, word: "빈대떡", meaning: "綠豆煎餅", ex_kr: "비 오는 날에는 빈대떡이 생각나요.", ex_zh: "下雨天我會想起bindaetteok。" },
            { id: 3247, word: "언제든지", meaning: "隨時", ex_kr: "언제든지 연락하세요.", ex_zh: "歡迎隨時與我聯絡。" },
            { id: 3248, word: "채널", meaning: "頻道", ex_kr: "채널을 돌리지 마세요.", ex_zh: "請勿換台。" },
            { id: 3249, word: "의논하다", meaning: "討論(與)、諮詢", ex_kr: "가족과 의논해 볼게요.", ex_zh: "我會和家人商量一下。" },
            { id: 3250, word: "상사", meaning: "老闆、上級", ex_kr: "상사에게 보고서를 제출했어요.", ex_zh: "我向老闆提交了一份報告。" },
            { id: 3251, word: "부러지다", meaning: "被打破、斷裂", ex_kr: "다리가 부러졌어요.", ex_zh: "我的腿骨折了。" },
            { id: 3252, word: "베개", meaning: "枕頭", ex_kr: "베개를 베고 누웠어요.", ex_zh: "我躺下，頭枕在枕頭上。" },
            { id: 3253, word: "벌떡", meaning: "突然地、急促地", ex_kr: "자다가 벌떡 일어났어요.", ex_zh: "我突然從睡夢中醒來。" },
            { id: 3254, word: "영양", meaning: "營養、滋養", ex_kr: "영양이 풍부한 음식을 드세요.", ex_zh: "吃營養豐富的食物。" },
            { id: 3255, word: "형식", meaning: "形式、正式性", ex_kr: "형식이 중요한 것은 아니에요.", ex_zh: "形式並不重要。" },
            { id: 3256, word: "전통적", meaning: "傳統的、常規的", ex_kr: "이것은 한국의 전통적인 가옥입니다.", ex_zh: "這是一棟傳統的韓式房屋。" },
            { id: 3257, word: "의문", meaning: "問題、疑問", ex_kr: "그 사건에는 의문점이 많아요.", ex_zh: "關於這起案件，還有許多未解之謎。" },
            { id: 3258, word: "중요시하다", meaning: "重視、視為重要", ex_kr: "저는 예절을 중요시해요.", ex_zh: "我重視禮儀。" },
            { id: 3259, word: "멀어지다", meaning: "漸行漸遠、漸行漸遠", ex_kr: "친구와 사이가 멀어졌어요.", ex_zh: "我和朋友的關係疏遠了。" },
            { id: 3260, word: "닥치다", meaning: "靠近、靠近；關閉", ex_kr: "큰 시련이 닥쳤어요.", ex_zh: "一場巨大的考驗降臨了。" },
            { id: 3261, word: "클래식", meaning: "經典的", ex_kr: "저는 클래식 음악을 좋아해요.", ex_zh: "我喜歡古典音樂。" },
            { id: 3262, word: "감당하다", meaning: "能夠履行職責；處理、管理、應對", ex_kr: "그 일을 감당할 수 있겠어요?", ex_zh: "你能勝任這份工作嗎？" },
            { id: 3263, word: "가물가물하다", meaning: "模糊不清、模糊的", ex_kr: "기억이 가물가물해요.", ex_zh: "我的記憶有點模糊。" },
            { id: 3264, word: "당번", meaning: "責任", ex_kr: "오늘은 제가 청소 당번이에요.", ex_zh: "我今天值清潔班。" },
            { id: 3265, word: "참여하다", meaning: "參與", ex_kr: "행사에 적극적으로 참여했어요.", ex_zh: "我積極參與了這項活動。" },
            { id: 3266, word: "물냉면", meaning: "水拌冷麵", ex_kr: "여름에는 시원한 물냉면이 최고예요.", ex_zh: "夏天吃冰涼的麵條最棒了。" },
            { id: 3267, word: "현실적", meaning: "現實的、實用的", ex_kr: "현실적인 계획을 세우세요.", ex_zh: "制定切實可行的計劃。" },
            { id: 3268, word: "이민", meaning: "移民；移居", ex_kr: "미국으로 이민을 갔어요.", ex_zh: "我移民到了美國。" },
            { id: 3269, word: "닳다", meaning: "磨損", ex_kr: "구두 굽이 다 닳았어요.", ex_zh: "我的鞋跟完全磨損了。" },
            { id: 3270, word: "마사지", meaning: "按摩", ex_kr: "어깨가 아파서 마사지를 받았어요.", ex_zh: "我肩膀疼，所以去做了按摩。" },
            { id: 3271, word: "지도하다", meaning: "指導、引領、輔導", ex_kr: "선생님이 학생들을 지도해요.", ex_zh: "老師指導學生。" },
            { id: 3272, word: "졸업식", meaning: "畢業典禮", ex_kr: "내일이 졸업식이에요.", ex_zh: "明天就是畢業典禮了。" },
            { id: 3273, word: "조끼", meaning: "背心", ex_kr: "날씨가 추워서 조끼를 입었어요.", ex_zh: "因為天氣冷，所以我穿了一件背心。" },
            { id: 3274, word: "탈", meaning: "面具、偽裝；疾病", ex_kr: "탈을 쓰고 춤을 췄어요.", ex_zh: "我戴著面具跳舞。" },
            { id: 3275, word: "슬리퍼", meaning: "拖鞋", ex_kr: "실내에서는 슬리퍼를 신으세요.", ex_zh: "請在室內穿拖鞋。" },
            { id: 3276, word: "안동", meaning: "安東", ex_kr: "안동 하회마을에 다녀왔어요.", ex_zh: "我參觀了安東河回村。" },
            { id: 3277, word: "인상적", meaning: "感人的", ex_kr: "그 영화는 정말 인상적이었어요.", ex_zh: "那部電影真是令人印象深刻。" },
            { id: 3278, word: "빨개지다", meaning: "變紅", ex_kr: "얼굴이 빨개졌어요.", ex_zh: "我的臉漲得通紅。" },
            { id: 3279, word: "현상", meaning: "現象；現狀", ex_kr: "기이한 현상이 일어났어요.", ex_zh: "發生了一件奇怪的事。" },
            { id: 3280, word: "양보하다", meaning: "讓步、讓步、讓步", ex_kr: "노약자에게 자리를 양보했어요.", ex_zh: "我把座位讓給了老人和體弱者。" },
            { id: 3281, word: "홈페이지", meaning: "網站首頁", ex_kr: "홈페이지를 방문해 보세요.", ex_zh: "請訪問主頁。" },
            { id: 3282, word: "정해지다", meaning: "待設定、安排、確定", ex_kr: "일정이 정해졌어요.", ex_zh: "日程已經確定。" },
            { id: 3283, word: "자가용", meaning: "自己的車", ex_kr: "자가용으로 출근해요.", ex_zh: "我開車上下班。" },
            { id: 3284, word: "되돌리다", meaning: "恢復、放回、歸還", ex_kr: "시간을 되돌릴 수는 없어요.", ex_zh: "時光無法倒流。" },
            { id: 3285, word: "백수", meaning: "失業、無業；各種動物", ex_kr: "그는 1년째 백수로 지내고 있어요.", ex_zh: "他已經失業一年了。" },
            { id: 3286, word: "재즈", meaning: "爵士樂", ex_kr: "재즈 카페에 갔어요.", ex_zh: "我去了一家爵士咖啡館。" },
            { id: 3287, word: "띄다", meaning: "要引人注目、脫穎而出", ex_kr: "눈에 띄는 옷을 입었어요.", ex_zh: "我穿了引人注目的衣服。" },
            { id: 3288, word: "사적", meaning: "私人的、個人的；歷史遺址", ex_kr: "사적인 질문은 하지 마세요.", ex_zh: "請不要問私人問題。" },
            { id: 3289, word: "본업", meaning: "主要職業", ex_kr: "그의 본업은 의사입니다.", ex_zh: "他的主要職業是醫生。" },
            { id: 3290, word: "채", meaning: "棟", ex_kr: "집 한 채를 샀어요.", ex_zh: "我買了一棟房子。" },
            { id: 3291, word: "떠오르다", meaning: "突然想到；浮現出來", ex_kr: "좋은 아이디어가 떠올랐어요.", ex_zh: "我想到一個好主意。" },
            { id: 3292, word: "우연", meaning: "巧合、偶然", ex_kr: "우연히 친구를 만났어요.", ex_zh: "我偶然結識了一位朋友。" },
            { id: 3293, word: "왕관", meaning: "王冠", ex_kr: "왕이 왕관을 쓰고 있어요.", ex_zh: "國王頭戴王冠。" },
            { id: 3294, word: "정차하다", meaning: "停止、停車(指車輛)", ex_kr: "버스가 정류장에 정차했어요.", ex_zh: "公車在公車站停了下來。" },
            { id: 3295, word: "책임지다", meaning: "承擔責任", ex_kr: "제가 이 일을 책임지겠습니다.", ex_zh: "我會承擔責任。" },
            { id: 3296, word: "설사", meaning: "腹瀉；即使", ex_kr: "상한 음식을 먹고 설사를 했어요.", ex_zh: "我吃了變質的食物，結果拉肚子了。" },
            { id: 3297, word: "묵다", meaning: "留宿(過夜)；變老", ex_kr: "호텔에서 하룻밤 묵었어요.", ex_zh: "我在飯店住了一晚。" },
            { id: 3298, word: "멀미", meaning: "噁心、暈動病", ex_kr: "차 멀미가 심해요.", ex_zh: "我暈車暈得非常厲害。" },

            { id: 3330, word: "도전", meaning: "挑戰", ex_kr: "새로운 일에 도전해 보세요.", ex_zh: "嘗試接受新的挑戰。" },

            { id: 3332, word: "상대", meaning: "商學院；對應方", ex_kr: "대화 상대를 찾고 있어요.", ex_zh: "我想找個人聊聊天。" },

            { id: 3335, word: "수집하다", meaning: "收集、聚集", ex_kr: "우표를 수집하는 것이 취미예요.", ex_zh: "我的興趣是集郵。" },

            { id: 3338, word: "기념품", meaning: "紀念品", ex_kr: "여행지에서 기념품을 샀어요.", ex_zh: "我在旅遊目的地買了一件紀念品。" },

            { id: 3342, word: "삭제하다", meaning: "刪除、移除", ex_kr: "파일을 실수로 삭제했어요.", ex_zh: "我不小心把文件刪掉了。" },
            { id: 3343, word: "핸드백", meaning: "手提包", ex_kr: "새 핸드백을 샀어요.", ex_zh: "我買了一個新手提包。" },
