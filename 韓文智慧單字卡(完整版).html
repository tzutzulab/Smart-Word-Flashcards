            { id: 5491, word: "베풀다", meaning: "慷慨地給予", ex_kr: "남에게 친절을 베푸세요.", ex_zh: "善待他人。" },
            { id: 5492, word: "공룡", meaning: "恐龍", ex_kr: "공룡은 아주 오래전에 멸종했어요.", ex_zh: "恐龍很久以前就滅絕了。" },
            { id: 5493, word: "저금통", meaning: "存錢罐", ex_kr: "돼지 저금통에 동전을 모았어요.", ex_zh: "我把硬幣收集到存錢筒裡。" },
            { id: 5494, word: "화단", meaning: "花壇；藝術界", ex_kr: "화단에 꽃을 심었어요.", ex_zh: "我在花壇裡種了花。" },
            { id: 5495, word: "기특하다", meaning: "令人欽佩的、值得稱讚的", ex_kr: "심부름을 하다니 정말 기특하구나.", ex_zh: "你跑腿辦事真是太值得稱讚了。" },
            { id: 5496, word: "꽃무늬", meaning: "花卉設計", ex_kr: "꽃무늬 원피스가 예뻐요.", ex_zh: "這條碎花裙很漂亮。" },
            { id: 5497, word: "마녀", meaning: "巫婆", ex_kr: "동화 속에 나쁜 마녀가 나와요.", ex_zh: "童話故事裡出現了一個邪惡的女巫。" },
            { id: 5498, word: "씨름", meaning: "摔角", ex_kr: "명절에는 TV에서 씨름 경기를 해요.", ex_zh: "他們在假期期間會在電視上進行摔角比賽。" },
            { id: 5499, word: "감기다", meaning: "滾動、纏繞；閉上眼睛；洗頭", ex_kr: "눈이 스르르 감겼어요.", ex_zh: "我的眼睛緩緩閉上。" },
            { id: 5500, word: "뛰어다니다", meaning: "四處奔跑", ex_kr: "아이들이 운동장을 뛰어다녀요.", ex_zh: "孩子們在操場上奔跑玩耍。" },
            { id: 5501, word: "일기장", meaning: "日記", ex_kr: "일기장에 비밀을 적었어요.", ex_zh: "我在日記裡寫下了一個秘密。" },
            { id: 5502, word: "세뱃돈", meaning: "新年現金禮物", ex_kr: "설날에 할아버지께 세뱃돈을 받았어요.", ex_zh: "農曆新年那天，我收到了爺爺給我的年金。" },
            { id: 5503, word: "알아내다", meaning: "去發現、去弄清楚", ex_kr: "비밀번호를 드디어 알아냈어요.", ex_zh: "我終於破解了密碼。" },
            { id: 5504, word: "리본", meaning: "絲帶", ex_kr: "선물 상자에 리본을 달았어요.", ex_zh: "我在禮盒上繫了一條絲帶。" },
            { id: 5505, word: "넓히다", meaning: "擴大、擴張", ex_kr: "도로를 넓히는 공사를 하고 있어요.", ex_zh: "我們正在進行道路拓寬工程。" },
            { id: 5506, word: "이자", meaning: "興趣", ex_kr: "은행 이자가 너무 낮아요.", ex_zh: "銀行利率太低了。" },
            { id: 5507, word: "얹다", meaning: "穿上、放置", ex_kr: "밥 위에 반찬을 얹어 먹었어요.", ex_zh: "我把配菜放在飯上吃了。" },
            { id: 5508, word: "등산화", meaning: "登山靴", ex_kr: "산에 갈 때는 등산화를 신으세요.", ex_zh: "去山區時要穿登山靴。" },
            { id: 5509, word: "색종이", meaning: "彩色紙", ex_kr: "색종이로 학을 접었어요.", ex_zh: "我用彩紙折了一隻鶴。" },
            { id: 5510, word: "덤비다", meaning: "來襲、攻擊", ex_kr: "무모하게 덤비지 마세요.", ex_zh: "不要魯莽行事。" },
            { id: 5511, word: "진동하다", meaning: "振動", ex_kr: "핸드폰이 진동하고 있어요.", ex_zh: "我的手機在震動。" },
            { id: 5512, word: "벗겨지다", meaning: "脫落、掉落、移除", ex_kr: "페인트가 벗겨졌어요.", ex_zh: "油漆剝落了。" },
            { id: 5513, word: "현지", meaning: "實際地點、確切位置", ex_kr: "현지 날씨는 어떤가요?", ex_zh: "當地天氣如何？" },
            { id: 5514, word: "병아리", meaning: "小雞", ex_kr: "노란 병아리가 귀여워요.", ex_zh: "這隻黃色小雞真可愛。" },
            { id: 5515, word: "향기롭다", meaning: "芬芳的、芳香的", ex_kr: "꽃 냄새가 정말 향기로워요.", ex_zh: "這些花的香味真好聞。" },
            { id: 5516, word: "배식하다", meaning: "分發食物", ex_kr: "급식실에서 밥을 배식했어요.", ex_zh: "我在食堂負責分送食物。" },
            { id: 5517, word: "털실", meaning: "毛線", ex_kr: "털실로 목도리를 짰어요.", ex_zh: "我用毛線織了一條圍巾。" },
            { id: 5518, word: "조르다", meaning: "糾纏、嘮叨；收緊", ex_kr: "아이가 장난감을 사달라고 졸라요.", ex_zh: "孩子一直央求我買玩具給他。" },
            { id: 5519, word: "질기다", meaning: "堅韌、耐用、堅持不懈、頑強", ex_kr: "고기가 너무 질겨서 씹기 힘들어요.", ex_zh: "肉太硬，嚼不動。" },
            { id: 5520, word: "대추", meaning: "棗(棗)", ex_kr: "삼계탕에 대추를 넣었어요.", ex_zh: "我在參雞湯裡加了紅棗。" },
            { id: 5521, word: "고립", meaning: "隔離", ex_kr: "폭설로 마을이 고립되었어요.", ex_zh: "由於大雪，該村莊與外界隔絕。" },
            { id: 5522, word: "연약하다", meaning: "虛弱的、嬌弱的、易碎的", ex_kr: "그녀는 몸이 연약해요.", ex_zh: "她身體虛弱。" },
            { id: 5523, word: "말랑말랑하다", meaning: "柔軟、嫩滑", ex_kr: "떡이 말랑말랑해서 맛있어요.", ex_zh: "這款年糕口感軟糯，味道鮮美。" },
            { id: 5524, word: "자극하다", meaning: "刺激、喚起", ex_kr: "식욕을 자극하는 냄새가 나요.", ex_zh: "聞起來很誘人。" },
            { id: 5525, word: "뚜껑", meaning: "蓋子", ex_kr: "냄비 뚜껑을 닫으세요.", ex_zh: "蓋上鍋蓋。" },
            { id: 5526, word: "구슬", meaning: "珠子、大理石", ex_kr: "구슬치기를 하고 놀았어요.", ex_zh: "我玩彈珠。" },
            { id: 5527, word: "안전띠", meaning: "安全帶", ex_kr: "차에 타면 안전띠를 매세요.", ex_zh: "上車後請繫上安全帶。" },
            { id: 5528, word: "헬멧", meaning: "頭盔", ex_kr: "오토바이를 탈 때는 헬멧을 쓰세요.", ex_zh: "騎摩托車時要戴安全帽。" },
            { id: 5529, word: "소형차", meaning: "小型車", ex_kr: "주차가 편해서 소형차를 샀어요.", ex_zh: "我買了一輛小型車，因為它停車方便。" },
            { id: 5530, word: "징그럽다", meaning: "令人作嘔、噁心、毛骨悚然", ex_kr: "벌레는 너무 징그러워요.", ex_zh: "蟲子真噁心。" },
            { id: 5531, word: "운전기사", meaning: "司機", ex_kr: "택시 운전기사가 길을 잘 알아요.", ex_zh: "計程車司機很熟悉路線。" },
            { id: 5532, word: "귓속말", meaning: "耳語", ex_kr: "친구에게 귓속말을 했어요.", ex_zh: "我悄聲對朋友說。" },
            { id: 5533, word: "내버리다", meaning: "丟掉、不在乎", ex_kr: "고장 난 라디오를 내버렸어요.", ex_zh: "我把壞掉的收音機丟掉了。" },
            { id: 5534, word: "송아지", meaning: "小牛", ex_kr: "얼룩소 송아지가 태어났어요.", ex_zh: "一頭身上有斑點的小母牛出生了。" },
            { id: 5535, word: "마음씨", meaning: "性格、脾氣", ex_kr: "그녀는 마음씨가 고워요.", ex_zh: "她心地善良。" },
            { id: 5536, word: "자금", meaning: "資金、資本", ex_kr: "사업 자금이 부족해요.", ex_zh: "我的業務資金短缺。" },
            { id: 5537, word: "차례차례", meaning: "逐個", ex_kr: "차례차례 줄을 서세요.", ex_zh: "請依序排隊。" },
            { id: 5538, word: "양치기", meaning: "牧羊人", ex_kr: "양치기 소년 이야기를 아세요?", ex_zh: "你知道「狼來了」的故事嗎？" },
            { id: 5539, word: "선발하다", meaning: "選擇、挑選", ex_kr: "대표 선수를 선발했어요.", ex_zh: "我們挑選了一些代表性的球員。" },
            { id: 5540, word: "흥", meaning: "樂趣、喜悅", ex_kr: "흥이 많은 민족이에요.", ex_zh: "我們是一群充滿活力的人。" },
            { id: 5541, word: "우르르", meaning: "總而言之、到處", ex_kr: "학생들이 교실 밖으로 우르르 몰려나갔어요.", ex_zh: "學生們湧出了教室。" },
            { id: 5542, word: "정승", meaning: "部長", ex_kr: "옛날에 정승이 살던 집이에요.", ex_zh: "這是以前一位高級官員住的房子。" },
            { id: 5543, word: "효녀", meaning: "孝順的女兒", ex_kr: "심청이는 소문난 효녀였어요.", ex_zh: "沈清是一位著名的孝順女兒。" },
            { id: 5544, word: "비비다", meaning: "摩擦；混合", ex_kr: "눈을 비비지 마세요.", ex_zh: "不要揉眼睛。" },
            { id: 5545, word: "시외버스", meaning: "城際巴士", ex_kr: "시외버스를 타고 고향에 갔어요.", ex_zh: "我搭乘城際巴士回了家鄉。" },
            { id: 5546, word: "정성", meaning: "真誠、奉獻", ex_kr: "엄마의 정성이 담긴 음식이에요.", ex_zh: "這是媽媽用心烹調的食物。" },
            { id: 5547, word: "재활용품", meaning: "可回收材料", ex_kr: "재활용품 수거일은 내일입니다.", ex_zh: "明天是回收日。" },
            { id: 5548, word: "샐러드", meaning: "沙拉", ex_kr: "다이어트 중이라 샐러드를 먹어요.", ex_zh: "我在節食，所以只吃沙拉。" },
            { id: 5549, word: "삼키다", meaning: "吞嚥", ex_kr: "알약을 물과 함께 삼키세요.", ex_zh: "用水送服藥片。" },
            { id: 5550, word: "걸레질", meaning: "拖地、擦拭", ex_kr: "바닥 걸레질 좀 해 줄래?", ex_zh: "你能拖一下地板嗎？" },
            { id: 5551, word: "낙서하다", meaning: "塗鴉、塗鴉", ex_kr: "벽에 낙서하지 마세요.", ex_zh: "請勿在牆上塗鴉。" },
            { id: 5552, word: "씨앗", meaning: "種子", ex_kr: "화분에 꽃 씨앗을 심었어요.", ex_zh: "我在花盆裡種下了花籽。" },
            { id: 5553, word: "복사기", meaning: "影印機", ex_kr: "복사기에 종이가 없어요.", ex_zh: "影印機裡沒有紙。" },
            { id: 5554, word: "초가집", meaning: "茅草屋頂的房子", ex_kr: "민속촌에서 초가집을 봤어요.", ex_zh: "我在民俗村看到了一棟茅草屋。" },
            { id: 5555, word: "그런대로", meaning: "就是這樣", ex_kr: "맛이 그런대로 괜찮네요.", ex_zh: "味道還不錯。" },
            { id: 5556, word: "누렇다", meaning: "是黃色的", ex_kr: "벼가 익어서 들판이 누렇습니다.", ex_zh: "稻穀成熟了，田地一片金黃。" },
            { id: 5557, word: "녹이다", meaning: "融化、溶解", ex_kr: "언 손을 입김으로 녹였어요.", ex_zh: "我用呼吸溫暖了凍僵的雙手。" },
            { id: 5558, word: "세미나", meaning: "研討會", ex_kr: "내일 세미나에 참석해야 해요.", ex_zh: "我明天要去參加研討會。" },
            { id: 5559, word: "진출하다", meaning: "進入", ex_kr: "해외 시장에 진출했어요.", ex_zh: "我們已進入海外市場。" },
            { id: 5560, word: "불우하다", meaning: "處於弱勢地位、處於不利地位", ex_kr: "불우한 어린 시절을 보냈어요.", ex_zh: "我的童年很不幸。" },
            { id: 5561, word: "시냇가", meaning: "溪岸邊", ex_kr: "시냇가에서 발을 담그고 놀았어요.", ex_zh: "我把腳伸進溪水裡玩耍。" },
            { id: 5562, word: "기와집", meaning: "瓦頂房屋", ex_kr: "기와집은 한국의 전통 가옥입니다.", ex_zh: "瓦頂房屋是韓國的傳統房屋。" },
            { id: 5563, word: "재수하다", meaning: "臨時抱佛腳準備重考高考", ex_kr: "대학에 가려고 재수하고 있어요.", ex_zh: "我正在重考高考，希望能考上大學。" },
            { id: 5564, word: "재활용", meaning: "回收利用", ex_kr: "쓰레기 분리수거와 재활용을 실천해요.", ex_zh: "讓我們一起實踐垃圾分類和回收。" },
            { id: 5565, word: "정치적", meaning: "政治的", ex_kr: "정치적인 발언은 삼가주세요.", ex_zh: "請勿發表政治言論。" },
            { id: 5566, word: "아무렇지도 않다", meaning: "漠不關心；安全無虞。", ex_kr: "그는 넘어졌는데 아무렇지도 않아 보였어요.", ex_zh: "他摔倒了，但他看起來一點也不在意。" },
            { id: 5567, word: "틀", meaning: "框架、鑄造", ex_kr: "고정관념의 틀을 깨세요.", ex_zh: "打破刻板印象。" },
            { id: 5568, word: "맞서다", meaning: "站在某人對面、反對、阻撓", ex_kr: "어려움에 당당히 맞서세요.", ex_zh: "自信地面對困難。" },
            { id: 5569, word: "우물", meaning: "出色地", ex_kr: "우물에서 물을 길었어요.", ex_zh: "我從井裡打水。" },
            { id: 5570, word: "오늘날", meaning: "今天、現在", ex_kr: "오늘날의 사회는 빠르게 변화하고 있어요.", ex_zh: "當今社會正在快速變化。" },
            { id: 5571, word: "이튿날", meaning: "第二天", ex_kr: "이튿날 아침 일찍 출발했어요.", ex_zh: "第二天一大早我們就離開了。" },
            { id: 5572, word: "굶주리다", meaning: "挨餓、飢餓", ex_kr: "굶주린 배를 채웠어요.", ex_zh: "我填飽了肚子。" },
            { id: 5573, word: "도중에", meaning: "途中", ex_kr: "집에 가는 도중에 비가 왔어요.", ex_zh: "回家的路上下雨了。" },
            { id: 5574, word: "다수", meaning: "數量眾多、大多數", ex_kr: "다수의 의견을 따르기로 했어요.", ex_zh: "我決定聽從大多數人的意見。" },
            { id: 5575, word: "날달걀", meaning: "生雞蛋", ex_kr: "목소리를 위해 날달걀을 먹었어요.", ex_zh: "為了保護嗓子，我生吃了個雞蛋。" },
            { id: 5576, word: "엉뚱하다", meaning: "荒謬的、不合理的、不相關的", ex_kr: "그는 가끔 엉뚱한 질문을 해요.", ex_zh: "他有時會問一些奇怪的問題。" },
            { id: 5577, word: "성금", meaning: "捐贈、捐款", ex_kr: "불우 이웃 돕기 성금을 냈어요.", ex_zh: "我捐了錢來幫助貧困的鄰居。" },
            { id: 5578, word: "달라붙다", meaning: "黏著、緊緊抓住", ex_kr: "껌이 신발에 달라붙었어요.", ex_zh: "我的鞋子上黏了口香糖。" },
            { id: 5579, word: "참기름", meaning: "香油", ex_kr: "비빔밥에 참기름을 넣으면 맛있어요.", ex_zh: "拌飯加芝麻油味道更好。" },
            { id: 5580, word: "연도", meaning: "年", ex_kr: "제작 연도가 오래된 영화예요.", ex_zh: "這是一部老電影。" },
            { id: 5581, word: "몰려오다", meaning: "成群結隊地來、蜂擁而至", ex_kr: "먹구름이 몰려오고 있어요.", ex_zh: "烏雲正在聚集。" },
            { id: 5582, word: "시행착오", meaning: "反覆試驗", ex_kr: "여러 번의 시행착오 끝에 성공했어요.", ex_zh: "經過多次嘗試和失敗，我終於成功了。" },
            { id: 5583, word: "적당히", meaning: "適當地、恰當地、適度地", ex_kr: "술은 적당히 마시는 게 좋아요.", ex_zh: "飲酒最好適量。" },
            { id: 5584, word: "담임", meaning: "班主任", ex_kr: "우리 반 담임 선생님은 친절하세요.", ex_zh: "我們的班主任很和藹。" },
            { id: 5585, word: "날아오다", meaning: "飛行", ex_kr: "공이 나에게 날아왔어요.", ex_zh: "球朝我飛了過來。" },
            { id: 5586, word: "훈장", meaning: "獎章、徽章；(傳統意義上的)教師", ex_kr: "나라를 위해 일한 공로로 훈장을 받았어요.", ex_zh: "我因對國家的貢獻而獲得一枚獎章。" },
            { id: 5587, word: "피시", meaning: "PC(個人電腦)", ex_kr: "피시방에서 게임을 했어요.", ex_zh: "我在網咖玩遊戲。" },
            { id: 5588, word: "회초리", meaning: "甘蔗", ex_kr: "잘못해서 회초리를 맞았어요.", ex_zh: "我做錯事被打了屁股。" },
            { id: 5589, word: "각국", meaning: "各國", ex_kr: "세계 각국의 대표들이 모였어요.", ex_zh: "來自世界各地的代表齊聚一堂。" },
            { id: 5590, word: "큐브", meaning: "魔術方塊", ex_kr: "큐브를 맞추는 건 어려워요.", ex_zh: "解魔術方塊很難。" },
            { id: 5591, word: "푸른색", meaning: "藍色、綠色", ex_kr: "하늘이 푸른색이에요.", ex_zh: "天空是藍色的。" },
            { id: 5592, word: "단무지", meaning: "醃蘿蔔", ex_kr: "자장면에는 단무지가 어울려요.", ex_zh: "醃蘿蔔和炸醬麵很搭。" },
            { id: 5593, word: "재물", meaning: "財富、富足", ex_kr: "재물에 너무 욕심내지 마세요.", ex_zh: "不要過於貪心財富。" },
            { id: 5594, word: "흘러나오다", meaning: "流出", ex_kr: "라디오에서 음악이 흘러나오고 있어요.", ex_zh: "收音機裡正在播放音樂。" },
            { id: 5595, word: "조각", meaning: "片、切片；雕塑", ex_kr: "케이크 한 조각을 먹었어요.", ex_zh: "我吃了一塊蛋糕。" },
            { id: 5596, word: "무시무시하다", meaning: "糟糕透了、可怕", ex_kr: "무시무시한 소문이 들려요.", ex_zh: "我聽到了一些可怕的傳聞。" },
            { id: 5597, word: "스님", meaning: "僧侶、牧師", ex_kr: "절에서 스님을 만났어요.", ex_zh: "我在寺廟裡遇到了一位僧侶。" },
            { id: 5598, word: "전화위복", meaning: "塞翁失馬、焉知非福", ex_kr: "이번 실패가 전화위복의 계기가 될 거예요.", ex_zh: "這次失敗將是化逆境為優勢的機會。" },
            { id: 5599, word: "오래오래", meaning: "長久以來、永遠", ex_kr: "두 분이 오래오래 행복하게 사셨으면 좋겠어요.", ex_zh: "我希望你們兩個能幸福地生活在一起，長久地相伴。" },
            { id: 5600, word: "지점", meaning: "地點、地點、場所；分公司", ex_kr: "전국에 많은 지점을 가지고 있어요.", ex_zh: "我們在全國各地設有許多分公司。" },
            { id: 5601, word: "요가", meaning: "瑜珈", ex_kr: "건강을 위해 요가를 배우고 있어요.", ex_zh: "我學習瑜珈是為了強身健體。" },
            { id: 5602, word: "흘러가다", meaning: "流動、奔跑", ex_kr: "세월이 참 빨리 흘러가네요.", ex_zh: "時間過得真快。" },
            { id: 5603, word: "다양성", meaning: "多樣性", ex_kr: "문화적 다양성을 존중해야 합니다.", ex_zh: "我們必須尊重文化多樣性。" },
            { id: 5604, word: "논의하다", meaning: "討論、辯論", ex_kr: "문제 해결 방안을 논의했어요.", ex_zh: "我們討論了解決問題的方案。" },
            { id: 5605, word: "내려다보다", meaning: "向下看、俯視", ex_kr: "산 정상에서 도시를 내려다봤어요.", ex_zh: "我從山頂俯瞰這座城市。" },
            { id: 5606, word: "붉은색", meaning: "紅色的", ex_kr: "단풍이 붉은색으로 물들었어요.", ex_zh: "秋葉變紅了。" },
            { id: 5607, word: "조심스럽다", meaning: "小心謹慎", ex_kr: "깨지기 쉬우니 조심스럽게 다루세요.", ex_zh: "它很易碎，請小心輕放。" },
            { id: 5608, word: "양념", meaning: "香料和調味品", ex_kr: "불고기 양념이 잘 배었어요.", ex_zh: "烤肉醬已經充分入味了。" },
            { id: 5609, word: "약혼자", meaning: "未婚夫、未婚妻", ex_kr: "그녀는 나의 약혼자입니다.", ex_zh: "她是我的未婚妻。" },
            { id: 5610, word: "모니터", meaning: "監視器", ex_kr: "컴퓨터 모니터가 너무 작아요.", ex_zh: "電腦顯示器太小了。" },
            { id: 5611, word: "꼭대기", meaning: "頂部", ex_kr: "산 꼭대기까지 올라갔어요.", ex_zh: "我一路爬到了山頂。" },
            { id: 5612, word: "당황스럽다", meaning: "感到尷尬、窘迫、慌亂", ex_kr: "갑작스러운 질문에 당황스러웠어요.", ex_zh: "這突如其來的問題讓我有些慌張。" },
            { id: 5613, word: "사용자", meaning: "用戶、消費者", ex_kr: "이 프로그램은 사용자 편의성이 높아요.", ex_zh: "該程式具有很高的用戶便利性。" },
            { id: 5614, word: "무관하다", meaning: "無關的、不相關的", ex_kr: "이 사건은 저와 무관합니다.", ex_zh: "這件事與我無關。" },
            { id: 5615, word: "내려놓다", meaning: "放下、取下", ex_kr: "무거운 짐을 잠시 내려놓으세요.", ex_zh: "請您暫時放下手中的重物。" },
            { id: 5616, word: "기부하다", meaning: "捐款", ex_kr: "옷을 자선 단체에 기부했어요.", ex_zh: "我向慈善機構捐贈了衣物。" },
            { id: 5617, word: "온돌", meaning: "韓國地暖系統", ex_kr: "한국의 온돌 문화는 과학적이에요.", ex_zh: "韓國的地暖文化是科學的。" },
            { id: 5618, word: "무식하다", meaning: "無知", ex_kr: "무식한 소리 좀 하지 마세요.", ex_zh: "別胡說八道了。" },
            { id: 5619, word: "곧바로", meaning: "立刻、直奔", ex_kr: "퇴근 후 곧바로 집으로 갔어요.", ex_zh: "我下班後直接回家了。" },
            { id: 5620, word: "뺨", meaning: "臉頰", ex_kr: "추워서 뺨이 빨개졌어요.", ex_zh: "因為冷，我的臉頰都紅了。" },
            { id: 5621, word: "오가다", meaning: "來來往往", ex_kr: "사람들이 바쁘게 오가고 있어요.", ex_zh: "人們來來往往，熙熙攘攘。" },
            { id: 5622, word: "형부", meaning: "女孩姊姊的丈夫", ex_kr: "언니의 남편을 형부라고 불러요.", ex_zh: "我稱呼我姊姊的丈夫為我的姐夫。" },
            { id: 5623, word: "심경", meaning: "思想、情感", ex_kr: "복잡한 심경을 감출 수가 없네요.", ex_zh: "我無法掩飾自己複雜的情感。" },
            { id: 5624, word: "쇼", meaning: "展示", ex_kr: "마술 쇼를 관람했어요.", ex_zh: "我看了一場魔術表演。" },
            { id: 5625, word: "넓어지다", meaning: "擴大", ex_kr: "도로가 확장되어 길이 넓어졌어요.", ex_zh: "道路已經擴建，路面也變得更寬了。" },
            { id: 5626, word: "콩나물", meaning: "豆芽", ex_kr: "콩나물 국이 시원해요.", ex_zh: "豆芽湯很清爽。" },
            { id: 5627, word: "밤늦다", meaning: "深夜", ex_kr: "밤늦게까지 공부했어요.", ex_zh: "我學習到深夜。" },
            { id: 5628, word: "나뭇잎", meaning: "葉子", ex_kr: "가을이 되니 나뭇잎이 떨어져요.", ex_zh: "秋天來了，樹葉開始飄落。" },
            { id: 5629, word: "활기", meaning: "能量、活動", ex_kr: "시장은 항상 활기가 넘쳐요.", ex_zh: "市場總是充滿活力。" },
            { id: 5630, word: "어쩐지", meaning: "不知何故", ex_kr: "어쩐지 오늘 기분이 좋더라니.", ex_zh: "難怪我今天心情這麼好。" },
            { id: 5631, word: "식성", meaning: "口味、偏好", ex_kr: "우리는 식성이 비슷해요.", ex_zh: "我們口味很相似。" },
            { id: 5632, word: "깨뜨리다", meaning: "打破、砸碎、違反", ex_kr: "실수로 접시를 깨뜨렸어요.", ex_zh: "我不小心打碎了一個盤子。" },
            { id: 5633, word: "반칙", meaning: "犯規、違規", ex_kr: "경기 중에 반칙을 하면 경고를 받아요.", ex_zh: "比賽中犯規將受到警告。" },
            { id: 5634, word: "여름철", meaning: "夏令", ex_kr: "여름철에는 음식이 상하기 쉬워요.", ex_zh: "夏天食物容易變質。" },
            { id: 5635, word: "카운터", meaning: "收銀機、櫃檯", ex_kr: "계산은 카운터에서 도와드리겠습니다.", ex_zh: "我會在櫃檯協助您付款。" },
            { id: 5636, word: "미팅", meaning: "盲約", ex_kr: "오늘 오후에 중요한 미팅이 있어요.", ex_zh: "我今天下午有個重要的會議。" },
            { id: 5637, word: "운전자", meaning: "司機", ex_kr: "운전자는 교통신호를 지켜야 합니다.", ex_zh: "駕駛員必須遵守交通號誌。" },
            { id: 5638, word: "귀하다", meaning: "高貴、稀有、珍貴", ex_kr: "물은 생명에게 아주 귀한 것입니다.", ex_zh: "水對生命至關重要。" },
            { id: 5639, word: "신문사", meaning: "報社", ex_kr: "그는 신문사 기자로 일해요.", ex_zh: "他是一名報社記者。" },
            { id: 5640, word: "가이드", meaning: "導遊、導覽手冊", ex_kr: "여행 가이드가 설명을 잘 해줬어요.", ex_zh: "導遊講解得很好。" },
            { id: 5641, word: "보석", meaning: "珠寶；保釋", ex_kr: "그녀의 눈은 보석처럼 빛나요.", ex_zh: "她的眼睛像寶石一樣閃閃發光。" },
            { id: 5642, word: "시무룩하다", meaning: "悶悶不樂、不高興", ex_kr: "혼나서 얼굴이 시무룩해요.", ex_zh: "他看起來很悶悶不樂，因為他被訓斥了。" },
            { id: 5643, word: "챔피언", meaning: "冠軍", ex_kr: "그가 이번 대회의 챔피언입니다.", ex_zh: "他是本次比賽的冠軍。" },
            { id: 5644, word: "거짓", meaning: "虛假的、謊言、捏造的", ex_kr: "거짓 증언을 하면 안 됩니다.", ex_zh: "你不可作偽證。" },
            { id: 5645, word: "앞길", meaning: "前路展望", ex_kr: "당신의 앞길에 축복이 있기를 바랍니다.", ex_zh: "祝福你未來的道路一帆風順。" },
            { id: 5646, word: "자라나다", meaning: "成長", ex_kr: "아이들이 건강하게 자라나고 있어요.", ex_zh: "孩子們健康成長。" },
            { id: 5647, word: "신문지", meaning: "報紙", ex_kr: "유리창을 신문지로 닦으면 깨끗해요.", ex_zh: "用報紙擦拭窗戶，窗戶就會乾淨。" },
            { id: 5648, word: "골프장", meaning: "高爾夫球場", ex_kr: "주말에 골프장에 갈 거예요.", ex_zh: "我這週末要去高爾夫球場。" },
            { id: 5649, word: "부러워하다", meaning: "嫉妒、感到嫉妒", ex_kr: "남의 성공을 부러워하지 마세요.", ex_zh: "不要嫉妒他人的成功。" },
            { id: 5650, word: "이웃집", meaning: "隔壁的房子", ex_kr: "이웃집에서 떡을 가져왔어요.", ex_zh: "我從鄰居家帶了年糕。" },
            { id: 5651, word: "술잔", meaning: "葡萄酒杯、烈酒杯", ex_kr: "친구와 술잔을 기울였어요.", ex_zh: "我和朋友一起喝了一杯。" },
            { id: 5652, word: "구실", meaning: "職責、義務；藉口、藉口", ex_kr: "아파서 못 간다는 건 핑계고 구실일 뿐이에요.", ex_zh: "說自己生病不能去只是藉口。" },
            { id: 5653, word: "마음껏", meaning: "隨心所欲", ex_kr: "음식을 마음껏 드세요.", ex_zh: "請盡情享用。" },
            { id: 5654, word: "보리", meaning: "大麥", ex_kr: "보리차를 끓였어요.", ex_zh: "我泡了大麥茶。" },
            { id: 5655, word: "가져다주다", meaning: "帶來、交付", ex_kr: "물 좀 가져다주세요.", ex_zh: "請給我拿些水來。" },
            { id: 5656, word: "이것저것", meaning: "這個和那個", ex_kr: "이것저것 따지지 말고 그냥 하세요.", ex_zh: "不要想太多，去做就對了。" },
            { id: 5657, word: "부끄러움", meaning: "害羞、靦腆、羞恥", ex_kr: "그는 부끄러움을 많이 타요.", ex_zh: "他很害羞。" },
            { id: 5658, word: "뒷산", meaning: "後面的山", ex_kr: "아침마다 뒷산에 올라요.", ex_zh: "我每天早上都會爬我家後面的山。" },
            { id: 5659, word: "월드컵", meaning: "世界盃", ex_kr: "월드컵 경기를 응원했어요.", ex_zh: "我為世界盃比賽加油。" },
            { id: 5660, word: "사무", meaning: "辦公室工作", ex_kr: "사무실에서 사무를 보고 있어요.", ex_zh: "我在做辦公室工作。" },
            { id: 5661, word: "기력", meaning: "活力", ex_kr: "기력이 없어서 누워만 있었어요.", ex_zh: "我渾身無力，所以就躺下來了。" },
            { id: 5662, word: "잘살다", meaning: "要富有、就要過富裕的生活。", ex_kr: "부부가 행복하게 잘살고 있어요.", ex_zh: "這對夫婦生活幸福美滿。" },
            { id: 5663, word: "개나리", meaning: "連翹", ex_kr: "봄이 되면 노란 개나리가 피어요.", ex_zh: "春天來臨，黃色的連翹花盛開。" },
            { id: 5664, word: "사랑스럽다", meaning: "可愛、迷人", ex_kr: "아기가 정말 사랑스러워요.", ex_zh: "這個寶寶真可愛。" },
            { id: 5665, word: "왼발", meaning: "左腳", ex_kr: "왼발로 공을 찼어요.", ex_zh: "我用左腳踢球。" },
            { id: 5666, word: "겨울철", meaning: "冬天", ex_kr: "겨울철에는 난방비가 많이 들어요.", ex_zh: "冬天取暖費用很高。" },
            { id: 5667, word: "필름", meaning: "電影", ex_kr: "카메라에 필름을 넣었어요.", ex_zh: "我把膠卷裝進相機了。" },
            { id: 5668, word: "달빛", meaning: "月光", ex_kr: "달빛이 참 밝네요.", ex_zh: "月光真亮。" },
            { id: 5669, word: "술자리", meaning: "飲酒聚會", ex_kr: "잦은 술자리는 건강에 해로워요.", ex_zh: "經常飲酒有害健康。" },
            { id: 5670, word: "차남", meaning: "次子", ex_kr: "그는 그 집안의 차남이에요.", ex_zh: "他是家裡的次子。" },
            { id: 5671, word: "졸업생", meaning: "畢業", ex_kr: "우리 학교 졸업생들이 모였어요.", ex_zh: "我們學校的畢業生們齊聚一堂。" },
            { id: 5672, word: "받침", meaning: "支撐、支撐物、尾輔音", ex_kr: "컵 받침을 사용하세요.", ex_zh: "請使用杯墊。" },
            { id: 5673, word: "산속", meaning: "在山深處", ex_kr: "산속 깊은 곳에 절이 있어요.", ex_zh: "山深處有一座寺廟。" },
            { id: 5674, word: "먹히다", meaning: "被吃掉、被吞嚥", ex_kr: "그 제안은 사장님께 잘 먹히지 않았어요.", ex_zh: "老闆並不接受這個提議。" },
            { id: 5675, word: "오른발", meaning: "右腳", ex_kr: "오른발을 다쳤어요.", ex_zh: "我的右腳受傷了。" },
            { id: 5676, word: "볼일", meaning: "商業、待辦事項", ex_kr: "볼일이 있어서 시내에 나갔다 왔어요.", ex_zh: "我去市中心辦點事。" },
            { id: 5677, word: "다녀가다", meaning: "順道拜訪", ex_kr: "손님이 집에 다녀가셨어요.", ex_zh: "一位客人來訪。" },
            { id: 5678, word: "일회용", meaning: "一次性的", ex_kr: "일회용품 사용을 줄입시다.", ex_zh: "讓我們減少一次性用品的使用。" },
            { id: 5679, word: "골목길", meaning: "胡同", ex_kr: "좁은 골목길을 걸었어요.", ex_zh: "我沿著一條狹窄的小巷走去。" },
            { id: 5680, word: "한국적", meaning: "韓國人", ex_kr: "가장 한국적인 것이 가장 세계적인 것이다.", ex_zh: "最韓國的事物往往也是最全球化的事物。" },
            { id: 5681, word: "낭만적", meaning: "浪漫的", ex_kr: "파리의 밤은 정말 낭만적이에요.", ex_zh: "巴黎的夜晚真的很浪漫。" },
            { id: 5682, word: "수행하다", meaning: "執行、做", ex_kr: "임무를 성실히 수행했습니다.", ex_zh: "我忠實地完成了任務。" },
            { id: 5683, word: "버튼", meaning: "按鈕", ex_kr: "엘리베이터 버튼을 눌러주세요.", ex_zh: "請按電梯按鈕。" },
            { id: 5684, word: "술병", meaning: "酒瓶", ex_kr: "빈 술병을 치웠어요.", ex_zh: "我把空酒瓶都清理乾淨了。" },
            { id: 5685, word: "무더위", meaning: "天氣非常炎熱潮濕", ex_kr: "여름철 무더위가 기승을 부려요.", ex_zh: "酷暑正盛。" },
            { id: 5686, word: "팬티", meaning: "女式內褲、三角褲", ex_kr: "속옷 가게에서 팬티를 샀어요.", ex_zh: "我在內衣店買了內褲。" },
            { id: 5687, word: "택하다", meaning: "選擇、選擇", ex_kr: "두 가지 중에서 하나를 택하세요.", ex_zh: "選擇其中之一。" },
            { id: 5688, word: "소용없다", meaning: "無用", ex_kr: "이제 후회해도 소용없어요.", ex_zh: "現在後悔也沒用了。" },
            { id: 5689, word: "약탈하다", meaning: "掠奪、劫掠、洗劫", ex_kr: "전쟁 중에 문화재를 약탈당했어요.", ex_zh: "戰爭期間，文化文物遭到掠奪。" },
            { id: 5690, word: "적어지다", meaning: "減少、下降", ex_kr: "학생 수가 점점 적어지고 있어요.", ex_zh: "學生人數正在逐漸減少。" },
            { id: 5691, word: "발등", meaning: "腳背", ex_kr: "발등이 부었어요.", ex_zh: "我的腳背腫了。" },
            { id: 5692, word: "책가방", meaning: "學生背包", ex_kr: "무거운 책가방을 멨어요.", ex_zh: "我背著一個很重的書包。" },
            { id: 5693, word: "짜릿하다", meaning: "令人興奮、激動人心", ex_kr: "롤러코스터를 타니 정말 짜릿해요.", ex_zh: "坐過山車真是太刺激了。" },
            { id: 5694, word: "부활하다", meaning: "復活、使復生、從死裡復活", ex_kr: "그 제도는 10년 만에 부활했습니다.", ex_zh: "該系統在停用10年後重新啟動。" },
            { id: 5695, word: "네거리", meaning: "四岔路口", ex_kr: "네거리에서 좌회전하세요.", ex_zh: "在十字路口左轉。" },
            { id: 5696, word: "읽히다", meaning: "被閱讀；讓某人閱讀", ex_kr: "이 책은 아이들에게 많이 읽혀요.", ex_zh: "這本書深受兒童喜愛。" },
            { id: 5697, word: "박스", meaning: "盒子", ex_kr: "이사 짐을 박스에 담았어요.", ex_zh: "我打包好了搬家紙箱。" },
            { id: 5698, word: "묻히다", meaning: "被掩埋、被隱藏；塗抹", ex_kr: "옷에 흙을 묻혔어요.", ex_zh: "我的衣服上沾了泥土。" },
            { id: 5699, word: "가로", meaning: "寬度", ex_kr: "가로와 세로의 길이를 재세요.", ex_zh: "測量寬度和高度的長度。" },
            { id: 5700, word: "손뼉", meaning: "棕櫚", ex_kr: "손뼉을 치며 좋아했어요.", ex_zh: "我高興地拍手。" },
            { id: 5701, word: "섭씨", meaning: "攝氏度", ex_kr: "오늘 기온은 섭씨 30도입니다.", ex_zh: "今天氣溫是攝氏30度。" },
            { id: 5702, word: "밤중에", meaning: "半夜", ex_kr: "한밤중에 전화가 왔어요.", ex_zh: "我半夜接到一個電話。" },
            { id: 5703, word: "캐다", meaning: "挖出來", ex_kr: "산에서 나물을 캤어요.", ex_zh: "我在山上採了野生野菜。" },
            { id: 5704, word: "초청장", meaning: "邀請", ex_kr: "결혼식 초청장을 받았어요.", ex_zh: "我收到了一份婚禮邀請函。" },
            { id: 5705, word: "시아버지", meaning: "岳父", ex_kr: "시아버지께서 용돈을 주셨어요.", ex_zh: "我岳父給了我一些零用錢。" },
            { id: 5706, word: "테스트", meaning: "測試", ex_kr: "신제품 성능 테스트를 했어요.", ex_zh: "我們對新產品進行了性能測試。" },
            { id: 5707, word: "양배추", meaning: "高麗菜", ex_kr: "양배추를 썰어서 샐러드를 만들었어요.", ex_zh: "我切了一些高麗菜，做成了沙拉。" },
            { id: 5708, word: "부잣집", meaning: "宅門", ex_kr: "그는 부잣집 아들이에요.", ex_zh: "他出身富裕家庭。" },
            { id: 5709, word: "깜빡", meaning: "閃光燈", ex_kr: "깜빡 잊고 숙제를 안 가져왔어요.", ex_zh: "我完全忘記帶作業了。" },
            { id: 5710, word: "책임감", meaning: "責任感", ex_kr: "그는 책임감이 강한 사람이에요.", ex_zh: "他是一個責任感很強的人。" },
            { id: 5711, word: "용도", meaning: "用途", ex_kr: "이 물건의 용도가 무엇인가요?", ex_zh: "這個物品的用途是什麼？" },
            { id: 5712, word: "큰절", meaning: "深弓", ex_kr: "설날에 할아버지께 큰절을 올렸어요.", ex_zh: "農曆新年那天，我深深向祖父鞠躬。" },
            { id: 5713, word: "선하다", meaning: "生動鮮活；友善", ex_kr: "그는 인상이 참 선해 보여요.", ex_zh: "他看起來很和善。" },
            { id: 5714, word: "부쩍", meaning: "非常、顯著地", ex_kr: "키가 부쩍 컸네요.", ex_zh: "你長高了很多。" },
            { id: 5715, word: "세로", meaning: "長度(垂直)", ex_kr: "줄을 세로로 서세요.", ex_zh: "請排成一列。" },
            { id: 5716, word: "시부모", meaning: "丈夫的父母", ex_kr: "며느리가 시부모님을 모시고 살아요.", ex_zh: "媳婦和公婆住在一起。" },
            { id: 5717, word: "동굴", meaning: "洞穴", ex_kr: "동굴 안은 어둡고 시원해요.", ex_zh: "洞穴內部黑暗而涼爽。" },
            { id: 5718, word: "허무", meaning: "徒勞、空虛", ex_kr: "인생의 허무를 느꼈어요.", ex_zh: "我感受到了人生的虛無。" },
            { id: 5719, word: "강렬하다", meaning: "強壯、強烈", ex_kr: "태양 빛이 너무 강렬해요.", ex_zh: "陽光太強烈了。" },
            { id: 5720, word: "개입하다", meaning: "幹預、干涉", ex_kr: "경찰이 사건에 개입했어요.", ex_zh: "警方介入了此案。" },
            { id: 5721, word: "종이컵", meaning: "紙杯", ex_kr: "종이컵 대신 머그잔을 씁시다.", ex_zh: "我們用馬克杯代替紙杯吧。" },
            { id: 5722, word: "속셈", meaning: "秘密計劃、隱藏意圖", ex_kr: "그의 속셈을 도무지 알 수가 없어요.", ex_zh: "我實在想不明白他真正的動機是什麼。" },
            { id: 5723, word: "말레이시아", meaning: "馬來西亞", ex_kr: "이번 휴가 때 말레이시아에 갈 거예요.", ex_zh: "我要去馬來西亞度假。" },
            { id: 5724, word: "살찌다", meaning: "增重", ex_kr: "요즘 너무 많이 먹어서 살쪘어요.", ex_zh: "我最近吃太多，所以體重增加了。" },
            { id: 5725, word: "강점", meaning: "優勢；職業", ex_kr: "나의 강점을 살려서 취업하고 싶어요.", ex_zh: "我想發揮自身優勢找到工作。" },
            { id: 5726, word: "독일어", meaning: "德文", ex_kr: "제 2외국어로 독일어를 배웠어요.", ex_zh: "我學習德語作為第二外語。" },
            { id: 5727, word: "살금살금", meaning: "悄悄地、安靜地", ex_kr: "고양이가 살금살금 다가왔어요.", ex_zh: "貓悄悄地靠近了。" },
            { id: 5728, word: "일교차", meaning: "日溫度範圍", ex_kr: "환절기에는 일교차가 커요.", ex_zh: "季節交替時，日溫差較大。" },
            { id: 5729, word: "살림", meaning: "家事服務", ex_kr: "그녀는 살림 솜씨가 좋아요.", ex_zh: "她很擅長家事。" },
            { id: 5730, word: "우편함", meaning: "信箱", ex_kr: "우편함을 확인해 보세요.", ex_zh: "請查看您的郵箱。" },
            { id: 5731, word: "분노", meaning: "憤怒、狂怒", ex_kr: "억울한 일을 당해서 분노가 치밀었어요.", ex_zh: "我當時非常憤怒，因為我受到了不公平的對待。" },
            { id: 5732, word: "찜질하다", meaning: "使用熱敷", ex_kr: "허리가 아파서 찜질했어요.", ex_zh: "我有背痛，所以敷了熱敷。" },
            { id: 5733, word: "함성", meaning: "喊叫、大喊", ex_kr: "경기장이 함성으로 가득 찼어요.", ex_zh: "體育場內充滿了歡呼聲。" },
            { id: 5734, word: "개그", meaning: "笑話、幽默", ex_kr: "그의 개그는 정말 웃겨요.", ex_zh: "他的笑話真的很好笑。" },
            { id: 5735, word: "무능", meaning: "無能", ex_kr: "정부의 무능을 비판했어요.", ex_zh: "我批評了政府的無能。" },
            { id: 5736, word: "향", meaning: "香味", ex_kr: "커피 향이 참 좋네요.", ex_zh: "咖啡聞起來真香。" },
            { id: 5737, word: "제거하다", meaning: "移除、消除、擺脫", ex_kr: "잡초를 제거했어요.", ex_zh: "我把雜草除掉了。" },
            { id: 5738, word: "명당", meaning: "理想位置", ex_kr: "여기가 배산임수의 명당입니다.", ex_zh: "這是一個吉利的地方，背後是山，前面是水。" },
            { id: 5739, word: "소속되다", meaning: "屬於、隸屬於", ex_kr: "저는 영업팀에 소속되어 있습니다.", ex_zh: "我隸屬於銷售團隊。" },
            { id: 5740, word: "도박하다", meaning: "賭博", ex_kr: "돈을 걸고 도박하면 안 돼요.", ex_zh: "你不應該拿錢去賭博。" },
            { id: 5741, word: "덩어리", meaning: "塊、塊狀物", ex_kr: "고기 덩어리를 썰었어요.", ex_zh: "我把肉塊切片。" },
            { id: 5742, word: "소득", meaning: "收入、利潤", ex_kr: "소득이 높은 직업을 원해요.", ex_zh: "我想要一份高薪工作。" },
            { id: 5743, word: "매달리다", meaning: "懸掛、緊緊抓住", ex_kr: "아이가 엄마 팔에 매달려요.", ex_zh: "孩子緊緊地抱著媽媽的手臂。" },
            { id: 5744, word: "동기", meaning: "動機；同時加入；兄弟姊妹", ex_kr: "범행 동기가 무엇입니까?", ex_zh: "犯罪動機是什麼？" },
            { id: 5745, word: "입시", meaning: "入學考試", ex_kr: "고3 학생들은 입시 준비로 바빠요.", ex_zh: "高中畢業班學生正忙著準備大學入學考試。" },
            { id: 5746, word: "승낙하다", meaning: "同意、認可、批准", ex_kr: "부모님이 결혼을 승낙하셨어요.", ex_zh: "我的父母同意這樁婚事。" },
            { id: 5747, word: "노선", meaning: "路線、線路", ex_kr: "버스 노선을 확인하세요.", ex_zh: "請查看公車路線。" },
            { id: 5748, word: "손대다", meaning: "觸摸", ex_kr: "전시품에 손대지 마세요.", ex_zh: "請勿觸摸展品。" },
            { id: 5749, word: "짐승", meaning: "動物、野獸", ex_kr: "사람을 짐승만도 못하게 대우하면 안 돼요.", ex_zh: "你絕不能像對待動物一樣對待人。" },
            { id: 5750, word: "소화제", meaning: "消化醫學", ex_kr: "체한 것 같아서 소화제를 먹었어요.", ex_zh: "我覺得自己消化不良，所以吃了一些助消化的藥。" },
            { id: 5751, word: "숙박하다", meaning: "留宿一晚", ex_kr: "호텔에서 하룻밤 숙박했어요.", ex_zh: "我在飯店住了一晚。" },
            { id: 5752, word: "손잡다", meaning: "牽手", ex_kr: "친구와 손잡고 걸었어요.", ex_zh: "我和朋友手牽手走著。" },
            { id: 5753, word: "다루다", meaning: "處理、治療", ex_kr: "이 기계는 조심해서 다뤄야 해요.", ex_zh: "你必須小心操作這台機器。" },
            { id: 5754, word: "본인", meaning: "當事人、即本人。", ex_kr: "본인 확인을 위해 신분증을 보여주세요.", ex_zh: "請出示您的身分證明文件以核實身分。" },
            { id: 5755, word: "향상되다", meaning: "為了改進", ex_kr: "실력이 많이 향상되었어요.", ex_zh: "我的技能有了很大的提升。" },
            { id: 5756, word: "저하", meaning: "衰落、衰敗；殿下", ex_kr: "체력 저하로 힘들어요.", ex_zh: "由於體力下降，我覺得很吃力。" },
            { id: 5757, word: "하숙비", meaning: "寄宿費用", ex_kr: "하숙비가 올라서 부담스러워요.", ex_zh: "住宿費上漲了，這給我們造成了負擔。" },
            { id: 5758, word: "인적", meaning: "人類", ex_kr: "산속이라 인적이 드물어요.", ex_zh: "它位於深山之中，所以周圍人煙稀少。" },
            { id: 5759, word: "묵묵히", meaning: "他默默地、一言不發。", ex_kr: "그는 묵묵히 자신의 일을 했어요.", ex_zh: "他默默地做著活。" },
            { id: 5760, word: "정기", meaning: "固定間隔、週期；精神、能量", ex_kr: "정기 검진을 받으러 병원에 갔어요.", ex_zh: "我去醫院做例行體檢。" },
            { id: 5761, word: "막상", meaning: "實際上", ex_kr: "막상 해보니 생각보다 쉬웠어요.", ex_zh: "實際嘗試之後，發現比我想像的還要容易。" },
            { id: 5762, word: "부위", meaning: "部分、區域", ex_kr: "아픈 부위를 말해 보세요.", ex_zh: "請告訴我哪裡會痛。" },
            { id: 5763, word: "엄숙하다", meaning: "莊嚴肅穆", ex_kr: "장례식장 분위기가 엄숙해요.", ex_zh: "殯儀館裡的氣氛十分肅穆。" },
            { id: 5764, word: "낯익다", meaning: "熟悉", ex_kr: "저 사람 얼굴이 낯익어요.", ex_zh: "這個人的臉看起來很眼熟。" },
            { id: 5765, word: "우발적", meaning: "偶然", ex_kr: "계획된 범죄가 아니라 우발적인 사고였어요.", ex_zh: "這不是一起預謀犯罪，而是一起意外事件。" },
            { id: 5766, word: "무인도", meaning: "荒島", ex_kr: "무인도에 표류되었어요.", ex_zh: "我遭遇海難，被困在一個荒島上。" },
            { id: 5767, word: "맨발", meaning: "赤腳", ex_kr: "아이들이 맨발로 뛰어놀아요.", ex_zh: "孩子們光著腳到處跑。" },
            { id: 5768, word: "사색하다", meaning: "沉思、冥想", ex_kr: "공원을 걸으며 사색에 잠겼어요.", ex_zh: "我漫步在公園裡，陷入了沉思。" },
            { id: 5769, word: "치유하다", meaning: "治愈、治愈", ex_kr: "음악으로 마음의 상처를 치유해요.", ex_zh: "用音樂療癒你的情感創傷。" },
            { id: 5770, word: "개운하다", meaning: "簡單、清爽、令人神清氣爽", ex_kr: "목욕을 하니 몸이 개운해요.", ex_zh: "洗完澡後，我覺得神清氣爽。" },
            { id: 5771, word: "막막하다", meaning: "廣闊無垠", ex_kr: "앞날이 막막해요.", ex_zh: "未來一片黯淡。" },
            { id: 5772, word: "주년", meaning: "週年紀念日", ex_kr: "결혼 10주년 기념일이에요.", ex_zh: "今天是我們的結婚十週年紀念日。" },
            { id: 5773, word: "경계", meaning: "邊界；守衛、謹慎", ex_kr: "국경 경계가 삼엄해요.", ex_zh: "邊境安保非常嚴格。" },
            { id: 5774, word: "너구리", meaning: "浣熊", ex_kr: "산에서 야생 너구리를 봤어요.", ex_zh: "我在山上看到了一隻野生浣熊。" },
            { id: 5775, word: "지혈하다", meaning: "止血", ex_kr: "상처 부위를 눌러서 지혈했어요.", ex_zh: "我按壓傷口止血。" },
            { id: 5776, word: "헤엄치다", meaning: "游泳", ex_kr: "강에서 개가 헤엄치고 있어요.", ex_zh: "一隻狗在河裡游泳。" },
            { id: 5777, word: "모금", meaning: "籌款；啜飲", ex_kr: "불우 이웃 돕기 모금 운동을 해요.", ex_zh: "我們正在進行籌款活動，以幫助貧困的鄰居。" },
            { id: 5778, word: "엽기적", meaning: "怪異", ex_kr: "그 사건은 정말 엽기적이었어요.", ex_zh: "那件事真是太離奇了。" },
            { id: 5779, word: "중심지", meaning: "中心、首都", ex_kr: "명동은 서울의 중심지입니다.", ex_zh: "明洞是首爾的中心。" },
            { id: 5780, word: "유도하다", meaning: "誘導、引導、領導", ex_kr: "안전한 곳으로 사람들을 유도했어요.", ex_zh: "我引導人們到安全的地方。" },
            { id: 5781, word: "깨물다", meaning: "咬", ex_kr: "사과를 한 입 깨물었어요.", ex_zh: "我咬了一口蘋果。" },
            { id: 5782, word: "감쪽같다", meaning: "要像以前一樣完美", ex_kr: "수리한 흔적이 없이 감쪽같네요.", ex_zh: "看起來完全自然，沒有任何修補痕跡。" },
            { id: 5783, word: "채용하다", meaning: "僱用、收養", ex_kr: "신입 사원을 채용했어요.", ex_zh: "我們僱用了一名新員工。" },
            { id: 5784, word: "근원", meaning: "根、源", ex_kr: "문제의 근원을 찾아 해결해야 해요.", ex_zh: "我們需要找到問題的根源並解決問題。" },
            { id: 5785, word: "초행", meaning: "第一次旅行、第一次訪問", ex_kr: "이곳은 초행이라 길을 잘 몰라요.", ex_zh: "這是我第一次來這裡，所以不太熟悉路。" },
            { id: 5786, word: "하염없이", meaning: "心不在焉地、沒完沒了地", ex_kr: "창밖을 하염없이 바라봤어요.", ex_zh: "我呆呆地望著窗外，久久無法回頭。" },
            { id: 5787, word: "따지다", meaning: "質疑、挑剔、計算", ex_kr: "잘잘못을 따져 봅시다.", ex_zh: "讓我們來判定誰對誰錯。" },
            { id: 5788, word: "과감하다", meaning: "要大膽、無畏", ex_kr: "그는 결단력이 있고 과감해요.", ex_zh: "他果斷而大膽。" },
            { id: 5789, word: "내장", meaning: "內臟器官；室內裝飾", ex_kr: "생선의 내장을 제거하고 요리하세요.", ex_zh: "去除魚的內臟，然後煮熟。" },
            { id: 5790, word: "어업", meaning: "漁業", ex_kr: "이 마을 사람들은 주로 어업에 종사해요.", ex_zh: "這個村莊的村民主要以捕魚為生。" },
            { id: 5791, word: "꼬집다", meaning: "捏、精確定位", ex_kr: "친구 볼을 장난으로 꼬집었어요.", ex_zh: "我開玩笑地捏了捏朋友的臉頰。" },
            { id: 5792, word: "폭죽", meaning: "鞭炮", ex_kr: "밤하늘에 폭죽을 터뜨렸어요.", ex_zh: "我們在夜空中燃放煙火。" },
            { id: 5793, word: "변신", meaning: "轉型", ex_kr: "그녀의 화려한 변신이 기대됩니다.", ex_zh: "我期待她驚豔的蛻變。" },
            { id: 5794, word: "순대", meaning: "韓香腸", ex_kr: "떡볶이와 순대를 먹었어요.", ex_zh: "我吃了炒年糕和聖代。" },
            { id: 5795, word: "대피하다", meaning: "撤離、尋找掩體", ex_kr: "지진이 나서 안전한 곳으로 대피했어요.", ex_zh: "發生了地震，所以我撤離到了安全的地方。" },
            { id: 5796, word: "야시장", meaning: "夜市", ex_kr: "여행 가서 야시장을 구경했어요.", ex_zh: "我出去旅行，順便逛了夜市。" },
            { id: 5797, word: "갈대", meaning: "蘆葦", ex_kr: "여자의 마음은 갈대와 같아요.", ex_zh: "女人的心就像蘆葦。" },
            { id: 5798, word: "강인하다", meaning: "堅韌、強壯、頑強", ex_kr: "그는 정신력이 강인한 사람입니다.", ex_zh: "他心理素質很強。" },
            { id: 5799, word: "구경꾼", meaning: "旁觀者、圍觀者", ex_kr: "싸움 구경꾼들이 모여들었어요.", ex_zh: "觀眾聚集在一起觀看比賽。" },
            { id: 5800, word: "팝콘", meaning: "爆米花", ex_kr: "영화 볼 때는 팝콘을 먹어야죠.", ex_zh: "看電影的時候一定要吃爆米花。" },
            { id: 5801, word: "느슨하다", meaning: "鬆散", ex_kr: "신발 끈이 느슨해졌어요.", ex_zh: "我的鞋帶鬆了。" },
            { id: 5802, word: "근심", meaning: "擔憂、顧慮", ex_kr: "얼굴에 근심이 가득해요.", ex_zh: "你臉上滿是憂慮。" },
            { id: 5803, word: "간간이", meaning: "偶爾", ex_kr: "소식이 간간이 들려와요.", ex_zh: "我偶爾會聽到一些消息。" },
            { id: 5804, word: "소설책", meaning: "小說", ex_kr: "재미있는 소설책을 추천해 주세요.", ex_zh: "請推荐一本有趣的小說。" },
            { id: 5805, word: "틈틈이", meaning: "在每個間隙、在空閒時刻", ex_kr: "쉬는 시간에 틈틈이 공부했어요.", ex_zh: "我利用課間休息的零碎時間學習。" },
            { id: 5806, word: "조퇴하다", meaning: "提前離開(學校或工作地點)", ex_kr: "몸이 안 좋아서 조퇴했어요.", ex_zh: "我因為身體不舒服，所以提早下班了。" },
            { id: 5807, word: "출동하다", meaning: "採取行動", ex_kr: "경찰이 현장에 출동했어요.", ex_zh: "警方已趕赴現場。" },
            { id: 5808, word: "야영", meaning: "露營", ex_kr: "계곡 근처에서 야영을 했어요.", ex_zh: "我在山谷附近露營。" },
            { id: 5809, word: "광업", meaning: "礦業", ex_kr: "강원도는 과거에 광업이 발달했었어요.", ex_zh: "江原道過去曾擁有發達的採礦業。" },
            { id: 5810, word: "물체", meaning: "目的", ex_kr: "정체불명의 물체가 발견되었어요.", ex_zh: "發現了一個不明物體。" },
            { id: 5811, word: "조", meaning: "集團；兆", ex_kr: "4인 1조로 팀을 짰어요.", ex_zh: "我們組成了四人小組。" },
            { id: 5812, word: "설", meaning: "農曆新年；理論", ex_kr: "설 연휴에 고향에 갑니다.", ex_zh: "我要回老家過農曆新年。" },
            { id: 5813, word: "체온", meaning: "體溫", ex_kr: "체온을 재보니 열이 있어요.", ex_zh: "我量了體溫，發現自己發燒了。" },
            { id: 5814, word: "기원", meaning: "起源；祈禱、願望", ex_kr: "인류의 기원을 연구해요.", ex_zh: "我研究人類的起源。" },
            { id: 5815, word: "발명", meaning: "發明", ex_kr: "에디슨은 전구를 발명했습니다.", ex_zh: "愛迪生發明了電燈泡。" },
            { id: 5816, word: "헌책", meaning: "二手書", ex_kr: "헌책방에서 귀한 책을 구했어요.", ex_zh: "我在一家二手書店找到了一本稀有書籍。" },
            { id: 5817, word: "본받다", meaning: "模仿", ex_kr: "훌륭한 점은 본받아야 해요.", ex_zh: "我們應該學習其優秀之處。" },
            { id: 5818, word: "쫓아다니다", meaning: "跟隨、追逐", ex_kr: "강아지가 졸졸 쫓아다녀요.", ex_zh: "小狗一直跟著我。" },
            { id: 5819, word: "사회자", meaning: "主持人、版主", ex_kr: "사회자가 행사를 진행합니다.", ex_zh: "主持人主持活動。" },
            { id: 5820, word: "간", meaning: "鹹味；肝臟", ex_kr: "국이 간이 안 맞아요.", ex_zh: "這湯沒放對調味料。" },
            { id: 5821, word: "증권", meaning: "股票、債券、證券", ex_kr: "증권 시장이 폭락했어요.", ex_zh: "股市崩盤了。" },
            { id: 5822, word: "동문", meaning: "校友；東門", ex_kr: "대학 동문 모임에 나갔어요.", ex_zh: "我去參加了一次大學校友聚會。" },
            { id: 5823, word: "서양인", meaning: "西方人", ex_kr: "이태원에 서양인 관광객이 많아요.", ex_zh: "梨泰院有很多西方遊客。" },
            { id: 5824, word: "정가", meaning: "正常價格、原價", ex_kr: "이 제품은 정가 판매만 합니다.", ex_zh: "本產品僅以原價出售。" },
            { id: 5825, word: "장기", meaning: "專業技能、才能；長期；內臟器官", ex_kr: "장기 자랑을 했어요.", ex_zh: "我參加了一場才藝表演。" },
            { id: 5826, word: "민폐", meaning: "麻煩、不便", ex_kr: "공공장소에서 떠드는 건 민폐예요.", ex_zh: "在公共場所大聲喧嘩是一種擾民行為。" },
            { id: 5827, word: "조종사", meaning: "飛行員", ex_kr: "비행기 조종사가 되는 것이 꿈이에요.", ex_zh: "我的夢想是成為一名飛機駕駛員。" },
            { id: 5828, word: "식당가", meaning: "美食街", ex_kr: "백화점 식당가에서 밥을 먹었어요.", ex_zh: "我在百貨公司的美食廣場吃了飯。" },
            { id: 5829, word: "하숙방", meaning: "租來的房間", ex_kr: "학교 근처에 하숙방을 구했어요.", ex_zh: "我在學校附近找到了一間寄宿房間。" },
            { id: 5830, word: "마루", meaning: "地面", ex_kr: "마루에 앉아서 쉬었어요.", ex_zh: "我坐在地板上休息。" },
            { id: 5831, word: "광경", meaning: "場景、景象", ex_kr: "눈앞에 믿기 힘든 광경이 펼쳐졌어요.", ex_zh: "一幕令人難以置信的景象展現在我眼前。" },
            { id: 5832, word: "찢어지다", meaning: "被撕裂、被撕碎", ex_kr: "옷이 못에 걸려 찢어졌어요.", ex_zh: "我的衣服被釘子勾住了，撕破了。" },
            { id: 5833, word: "회담", meaning: "會談、會議", ex_kr: "남북 정상 회담이 열렸습니다.", ex_zh: "朝韓首腦會晤舉行。" },
            { id: 5834, word: "잡화", meaning: "雜項", ex_kr: "잡화점에서 필요한 물건을 샀어요.", ex_zh: "我在雜貨店買了我需要的東西。" },
            { id: 5835, word: "여성적", meaning: "女性", ex_kr: "그녀의 옷차림은 매우 여성적이에요.", ex_zh: "她的穿著打扮很有女人味。" },
            { id: 5836, word: "합승하다", meaning: "共乘或計程車", ex_kr: "택시에 모르는 사람과 합승했어요.", ex_zh: "我和陌生人共乘。" },
            { id: 5837, word: "주류", meaning: "主流；酒類", ex_kr: "미성년자에게는 주류를 판매하지 않습니다.", ex_zh: "我們不向未成年人出售酒精飲品。" },
            { id: 5838, word: "캥거루", meaning: "袋鼠", ex_kr: "호주에는 캥거루가 많아요.", ex_zh: "澳洲有很多袋鼠。" },
            { id: 5839, word: "항공료", meaning: "機票", ex_kr: "성수기라 항공료가 비싸요.", ex_zh: "現在是旅遊旺季，所以機票很貴。" },
            { id: 5840, word: "피로연", meaning: "接待", ex_kr: "결혼식 후에 피로연이 있어요.", ex_zh: "婚禮後有招待會。" },
            { id: 5841, word: "매장", meaning: "商店；墓地", ex_kr: "전국에 매장이 100개나 있어요.", ex_zh: "全國共有多達100家門市。" },
            { id: 5842, word: "자질", meaning: "才華、品質", ex_kr: "지도자로서의 자질을 갖췄어요.", ex_zh: "他具備領導者的特質。" },
            { id: 5843, word: "덜다", meaning: "減輕、變輕", ex_kr: "밥을 그릇에 덜어서 먹었어요.", ex_zh: "我盛了一些米飯到碗裡吃了。" },
            { id: 5844, word: "더러워지다", meaning: "變髒、弄髒", ex_kr: "비 때문에 신발이 더러워졌어요.", ex_zh: "因為下雨，我的鞋子弄髒了。" },
            { id: 5845, word: "구수하다", meaning: "聞起來或嘗起來很香或很美味", ex_kr: "된장찌개 냄새가 구수해요.", ex_zh: "大醬燉菜聞起來很香。" },
            { id: 5846, word: "개업식", meaning: "開幕式", ex_kr: "친구 가게 개업식에 갔어요.", ex_zh: "我去參加了朋友的店鋪開幕典禮。" },
            { id: 5847, word: "발효되다", meaning: "生效；發酵", ex_kr: "김치가 잘 발효되었어요.", ex_zh: "泡菜發酵得很好。" },
            { id: 5848, word: "뒤풀이", meaning: "派對後的娛樂活動", ex_kr: "공연이 끝나고 뒤풀이를 갔어요.", ex_zh: "表演結束後，我去參加了慶功派對。" },
            { id: 5849, word: "서재", meaning: "學習、圖書館", ex_kr: "아버지는 서재에서 책을 읽고 계세요.", ex_zh: "父親正在書房看書。" },
            { id: 5850, word: "한약", meaning: "草藥", ex_kr: "몸이 허해서 한약을 지어 먹었어요.", ex_zh: "我當時感覺身體虛弱，所以就讓人配製了一些草藥服用。" },
            { id: 5851, word: "승강장", meaning: "平台", ex_kr: "승강장에서 지하철을 기다려요.", ex_zh: "我正在月台上等地鐵。" },
            { id: 5852, word: "해저", meaning: "海底", ex_kr: "해저 터널을 통과했어요.", ex_zh: "我穿過了一條水下隧道。" },
            { id: 5853, word: "화상", meaning: "燃燒；圖片、圖像", ex_kr: "뜨거운 물에 화상을 입었어요.", ex_zh: "我被熱水燙傷了。" },
            { id: 5854, word: "최연소", meaning: "最年輕的", ex_kr: "최연소 합격자가 나왔어요.", ex_zh: "最年輕的成功候選人已經公佈。" },
            { id: 5855, word: "오케스트라", meaning: "樂團", ex_kr: "오케스트라 연주가 웅장해요.", ex_zh: "樂團的演奏精彩絕倫。" },
            { id: 5856, word: "반창고", meaning: "OK繃", ex_kr: "상처에 반창고를 붙였어요.", ex_zh: "我給傷口貼上了繃帶。" },
            { id: 5857, word: "보석상", meaning: "珠寶商", ex_kr: "보석상에서 다이아몬드 반지를 샀어요.", ex_zh: "我在珠寶店買了一枚鑽戒。" },
            { id: 5858, word: "반상회", meaning: "鄰裡會議", ex_kr: "오늘 저녁에 아파트 반상회가 있어요.", ex_zh: "今晚將召開公寓住戶會議。" },
            { id: 5859, word: "흥얼거리다", meaning: "哼唱", ex_kr: "노래를 흥얼거리며 청소했어요.", ex_zh: "我一邊哼著歌一邊打掃。" },
            { id: 5860, word: "역무실", meaning: "車站辦公室", ex_kr: "분실물 신고를 하러 역무실에 갔어요.", ex_zh: "我去車站辦公室報案遺失物品。" },
            { id: 5861, word: "구간", meaning: "部分", ex_kr: "이 구간은 상습 정체 구역입니다.", ex_zh: "該區域長期交通擁堵。" },
            { id: 5862, word: "이용료", meaning: "費用", ex_kr: "수영장 이용료는 얼마인가요?", ex_zh: "游泳池使用費是多少？" },
            { id: 5863, word: "예물", meaning: "結婚禮物", ex_kr: "결혼 예물을 교환했어요.", ex_zh: "我們交換了結婚禮物。" },
            { id: 5864, word: "전용", meaning: "專屬使用", ex_kr: "버스 전용 차로를 이용하세요.", ex_zh: "請使用公車專用道。" },
            { id: 5865, word: "위생", meaning: "衛生、清潔", ex_kr: "식당은 위생 관리가 중요합니다.", ex_zh: "衛生管理對餐廳來說至關重要。" },
            { id: 5866, word: "올여름", meaning: "今年夏天", ex_kr: "올여름은 유난히 덥네요.", ex_zh: "今年夏天異常炎熱。" },
            { id: 5867, word: "보조", meaning: "協助", ex_kr: "정부 보조를 받아 사업을 시작했어요.", ex_zh: "我利用政府補貼創辦了一家企業。" },
            { id: 5868, word: "반대쪽", meaning: "另一邊", ex_kr: "길 건너 반대쪽으로 가세요.", ex_zh: "請到街對面去。" },
            { id: 5869, word: "통역사", meaning: "翻譯", ex_kr: "통역사가 회의 내용을 번역해 줬어요.", ex_zh: "翻譯人員翻譯了會議內容。" },

            { id: 5882, word: "체격", meaning: "建造、框架", ex_kr: "그는 체격이 아주 좋아요.", ex_zh: "他體格非常好。" },

            { id: 5897, word: "비법", meaning: "秘密", ex_kr: "요리의 맛있는 비법을 알려주세요.", ex_zh: "請分享一下美味佳餚的秘訣。" },

            { id: 5902, word: "통화", meaning: "貨幣", ex_kr: "지금 통화 가능하세요?", ex_zh: "您現在方便通話嗎？" },
            { id: 5903, word: "탄산음료", meaning: "蘇打", ex_kr: "탄산음료를 너무 많이 마시지 마세요.", ex_zh: "不要喝太多碳酸飲料。" },
            { id: 5904, word: "완치되다", meaning: "完全康復", ex_kr: "병이 완전히 완치되었어요.", ex_zh: "病情已完全治癒。" },
            { id: 5905, word: "일치하다", meaning: "同意、表示同意", ex_kr: "두 사람의 의견이 일치했어요.", ex_zh: "兩人達成了一致。" },
            { id: 5906, word: "육식", meaning: "肉食", ex_kr: "사자는 육식 동물입니다.", ex_zh: "獅子是食肉動物。" },

            { id: 5908, word: "패", meaning: "損失；群體", ex_kr: "이번 경기는 우리 팀의 패입니다.", ex_zh: "這場比賽我們隊輸了。" },
            { id: 5909, word: "통행", meaning: "經過", ex_kr: "이곳은 차량 통행이 금지된 곳입니다.", ex_zh: "這裡禁止車輛通行。" },
            { id: 5910, word: "면역", meaning: "免疫", ex_kr: "운동을 하면 면역력이 높아져요.", ex_zh: "運動可以增強免疫力。" },
            { id: 5911, word: "엄격하다", meaning: "嚴格、僵硬", ex_kr: "우리 회사는 규율이 엄격해요.", ex_zh: "我們公司紀律嚴明。" },
            { id: 5912, word: "콜록콜록", meaning: "咳嗽", ex_kr: "감기에 걸려서 콜록콜록 기침을 해요.", ex_zh: "我感冒了，一直在咳嗽。" },

            { id: 5914, word: "권장하다", meaning: "鼓勵、推薦", ex_kr: "의사는 금연을 권장합니다.", ex_zh: "醫生建議戒菸。" },

            { id: 5950, word: "유서", meaning: "遺囑、遺書；歷史", ex_kr: "그는 유서를 남기고 떠났어요.", ex_zh: "他留下一封遺書後就離開了。" },

            { id: 5960, word: "치르다", meaning: "支付、結算、體驗", ex_kr: "큰 시험을 치르느라 고생했어요.", ex_zh: "你為了這次重要的考試付出了很多努力。" },

            { id: 5989, word: "익히다", meaning: "掌握；烹飪、發酵", ex_kr: "고기를 잘 익혀 드세요.", ex_zh: "請將肉徹底煮熟後再食用。" },
            { id: 5990, word: "명문", meaning: "出身名門、就讀名校；文筆優美。", ex_kr: "그는 명문 대학을 졸업했어요.", ex_zh: "他畢業於一所著名大學。" },

            { id: 5998, word: "효과적", meaning: "有效的", ex_kr: "감기에 효과적인 민간요법이 있나요?", ex_zh: "有沒有什麼有效的民間偏方可以治療感冒？" },
            { id: 5999, word: "한때", meaning: "一次、短暫地", ex_kr: "한때 이곳은 매우 번화했어요.", ex_zh: "這裡以前非常熱鬧。" },

            { id: 6057, word: "이의", meaning: "異議", ex_kr: "이의가 있습니까?", ex_zh: "您有任何異議嗎？" },
            { id: 6058, word: "깨어나다", meaning: "醒來、恢復意識", ex_kr: "긴 잠에서 깨어났어요.", ex_zh: "我從一場漫長的睡眠中醒來。" },

            { id: 6060, word: "전염되다", meaning: "傳播、擴散", ex_kr: "감기는 쉽게 전염됩니다.", ex_zh: "感冒很容易傳染。" },

            { id: 6062, word: "중환자실", meaning: "重症監護室", ex_kr: "환자가 중환자실로 옮겨졌어요.", ex_zh: "患者已被轉入加護病房。" },
            { id: 6063, word: "병신", meaning: "笨蛋", ex_kr: "저런 병신 같은 짓을 하다니.", ex_zh: "真沒想到他們會做出這麼愚蠢的事。" },
            { id: 6064, word: "자초지종", meaning: "始末", ex_kr: "자초지종을 설명해 주세요.", ex_zh: "請解釋一下整個情況。" },
            { id: 6065, word: "추리다", meaning: "要選擇、請選擇", ex_kr: "중요한 내용만 추리세요.", ex_zh: "只提取要點。" },
            { id: 6066, word: "왕따", meaning: "被排斥、欺凌", ex_kr: "왕따를 시키면 안 돼요.", ex_zh: "你不應該欺凌弱小。" },
            { id: 6067, word: "쫓겨나다", meaning: "被開除、被趕出去", ex_kr: "집에서 쫓겨났어요.", ex_zh: "我被趕出了家門。" },
            { id: 6068, word: "오기", meaning: "固執、傲慢", ex_kr: "오기로 버텼어요.", ex_zh: "我純粹是出於固執才忍受下來的。" },
            { id: 6069, word: "열기", meaning: "炎熱、興奮", ex_kr: "경기장의 열기가 뜨거워요.", ex_zh: "體育場內的氣氛十分緊張。" },
            { id: 6070, word: "세입자", meaning: "租戶", ex_kr: "세입자가 월세를 냈어요.", ex_zh: "租戶按時支付了每月租金。" },
            { id: 6071, word: "소일하다", meaning: "消磨時間", ex_kr: "독서로 소일하고 있어요.", ex_zh: "我喜歡花時間閱讀。" },
            { id: 6072, word: "폭탄", meaning: "炸彈、爆炸物", ex_kr: "폭탄이 터졌어요.", ex_zh: "炸彈爆炸了。" },
            { id: 6073, word: "상담원", meaning: "顧問、諮商師", ex_kr: "상담원과 통화하고 싶어요.", ex_zh: "我想和客服代表談談。" },
            { id: 6074, word: "뒹굴다", meaning: "翻身、翻滾", ex_kr: "주말 내내 방에서 뒹굴었어요.", ex_zh: "整個週末我都待在房間裡。" },
            { id: 6075, word: "저승", meaning: "來世", ex_kr: "저승사자가 나타났어요.", ex_zh: "死神出現了。" },
            { id: 6076, word: "속죄하다", meaning: "為了贖罪", ex_kr: "죄를 속죄하고 싶어요.", ex_zh: "我想贖罪。" },
            { id: 6077, word: "총각", meaning: "學士", ex_kr: "그는 아직 총각이에요.", ex_zh: "他仍然是單身。" },
            { id: 6078, word: "망신", meaning: "恥辱、丟臉", ex_kr: "사람들 앞에서 망신을 당했어요.", ex_zh: "我當眾出醜了。" },
            { id: 6079, word: "조마조마하다", meaning: "感到緊張不安", ex_kr: "결과가 나올까 봐 조마조마해요.", ex_zh: "我對結果感到緊張。" },
            { id: 6080, word: "외박하다", meaning: "要在外過夜、或睡在別處。", ex_kr: "어제 친구 집에서 외박했어요.", ex_zh: "我昨天晚上在朋友家過夜。" },
            { id: 6081, word: "빨가벗다", meaning: "脫光衣服、脫衣服", ex_kr: "아이가 빨가벗고 뛰어다녀요.", ex_zh: "孩子光著身子到處跑。" },
            { id: 6082, word: "바이러스", meaning: "病毒", ex_kr: "컴퓨터가 바이러스에 감염되었어요.", ex_zh: "我的電腦感染了病毒。" },
            { id: 6083, word: "리포터", meaning: "記者", ex_kr: "리포터가 현장 소식을 전합니다.", ex_zh: "記者從現場發回報。" },
            { id: 6084, word: "지긋지긋하다", meaning: "感到厭倦", ex_kr: "가난이 지긋지긋해요.", ex_zh: "我厭倦了貧窮。" },
            { id: 6085, word: "대기", meaning: "氣氛", ex_kr: "대기 오염이 심각해요.", ex_zh: "空氣污染很嚴重。" },
            { id: 6086, word: "이변", meaning: "意外(不尋常)事件", ex_kr: "이번 경기에서 이변이 일어났어요.", ex_zh: "這場比賽爆出了冷門。" },
            { id: 6087, word: "때로", meaning: "有時", ex_kr: "때로는 혼자 있고 싶어요.", ex_zh: "有時候我只想一個人待著。" },
            { id: 6088, word: "주관적", meaning: "主觀", ex_kr: "그것은 주관적인 생각입니다.", ex_zh: "那是一種主觀意見。" },
            { id: 6089, word: "생글생글", meaning: "帶著微笑", ex_kr: "아기가 생글생글 웃어요.", ex_zh: "寶寶笑容燦爛。" },
            { id: 6090, word: "뺑소니", meaning: "肇事逃逸；逃", ex_kr: "뺑소니 사고를 목격했어요.", ex_zh: "我目睹了一起肇事逃逸事故。" },
            { id: 6091, word: "속물", meaning: "物質主義者、勢利眼", ex_kr: "그는 돈만 아는 속물이에요.", ex_zh: "他是個勢利眼，眼裡只有錢。" },
            { id: 6092, word: "해임되다", meaning: "被解僱、解除職務", ex_kr: "그는 이사직에서 해임되었어요.", ex_zh: "他被免去了主任職務。" },
            { id: 6093, word: "물려받다", meaning: "繼承、接管", ex_kr: "아버지에게 사업을 물려받았어요.", ex_zh: "我從父親那裡繼承了這家公司。" },
            { id: 6094, word: "단수", meaning: "停止供水；單數", ex_kr: "오늘 단수가 될 예정입니다.", ex_zh: "今天會停水。" },
            { id: 6095, word: "부수다", meaning: "打破、砸碎、拆除", ex_kr: "문을 부수고 들어갔어요.", ex_zh: "我破門而入。" },
            { id: 6096, word: "보름", meaning: "半個月", ex_kr: "보름달이 떴어요.", ex_zh: "滿月已升起。" },
            { id: 6097, word: "역경", meaning: "逆境、睏苦", ex_kr: "역경을 이겨내고 성공했어요.", ex_zh: "我克服了逆境並取得了成功。" },
            { id: 6098, word: "휴업하다", meaning: "暫時關閉", ex_kr: "그 가게는 임시 휴업 중이에요.", ex_zh: "本店暫時關閉。" },
            { id: 6099, word: "당", meaning: "糖；政黨", ex_kr: "과일에는 당이 많이 들어있어요.", ex_zh: "水果含有大量糖分。" },
            { id: 6100, word: "불명", meaning: "默默無聞、默默無聞、乏味", ex_kr: "행방 불명 상태입니다.", ex_zh: "下落不明。" },
            { id: 6101, word: "사퇴하다", meaning: "辭職、下台", ex_kr: "후보가 사퇴했습니다.", ex_zh: "該候選人辭職了。" },
            { id: 6102, word: "사태", meaning: "情況、狀態；雪崩", ex_kr: "사태가 심각해지고 있어요.", ex_zh: "情況變得嚴峻了。" },
            { id: 6103, word: "타격", meaning: "打擊、傷害", ex_kr: "경제적 타격을 입었어요.", ex_zh: "我遭受了經濟打擊。" },
            { id: 6104, word: "쳐들어가다", meaning: "入侵、攻擊", ex_kr: "적들이 성으로 쳐들어왔어요.", ex_zh: "敵人攻入了城堡。" },
            { id: 6105, word: "압수하다", meaning: "沒收", ex_kr: "경찰이 물건을 압수했어요.", ex_zh: "警方沒收了這些物品。" },
            { id: 6106, word: "조화", meaning: "和諧、平衡；慰問花", ex_kr: "색의 조화가 아름다워요.", ex_zh: "色彩搭配很美。" },
            { id: 6107, word: "견인하다", meaning: "拖曳", ex_kr: "불법 주차 차량을 견인했어요.", ex_zh: "我拖走了那輛違停的車輛。" },
            { id: 6108, word: "반짝이다", meaning: "閃閃發光、閃爍", ex_kr: "밤하늘에 별이 반짝여요.", ex_zh: "夜空中繁星閃爍。" },
            { id: 6109, word: "족발", meaning: "豬蹄", ex_kr: "야식으로 족발을 먹었어요.", ex_zh: "我深夜吃了豬蹄當宵夜。" },
            { id: 6110, word: "고등어", meaning: "鯖魚", ex_kr: "저녁 반찬은 고등어 조림이에요.", ex_zh: "晚餐的配菜是紅燒鯖魚。" },
            { id: 6111, word: "뒤흔들다", meaning: "搖一搖", ex_kr: "사건이 사회를 뒤흔들었어요.", ex_zh: "這起事件震驚了社會。" },
            { id: 6112, word: "다이아몬드", meaning: "鑽石", ex_kr: "다이아몬드 반지를 선물 받았어요.", ex_zh: "我收到了一枚鑽戒作為禮物。" },
            { id: 6113, word: "생명체", meaning: "生命、生物體", ex_kr: "화성에 생명체가 있을까요?", ex_zh: "火星上有生命嗎？" },
            { id: 6114, word: "너그럽다", meaning: "慷慨大方、寬容大度", ex_kr: "그는 마음이 너그러운 사람이에요.", ex_zh: "他是個慷慨的人。" },
            { id: 6115, word: "생략하다", meaning: "跳過、省略", ex_kr: "자세한 설명은 생략하겠습니다.", ex_zh: "我將省略詳細解釋。" },
            { id: 6116, word: "장모님", meaning: "岳母", ex_kr: "장모님께서 김치를 보내주셨어요.", ex_zh: "我婆婆寄了泡菜給我。" },
            { id: 6117, word: "합류하다", meaning: "加入", ex_kr: "나중에 일행에 합류할게요.", ex_zh: "我稍後會加入群組。" },
            { id: 6118, word: "컬러", meaning: "顏色", ex_kr: "이 옷은 컬러가 다양해요.", ex_zh: "這款服裝有多種顏色可供選擇。" },
            { id: 6119, word: "벤치", meaning: "長椅", ex_kr: "공원 벤치에 앉아 쉬었어요.", ex_zh: "我坐在公園長椅上休息。" },
            { id: 6120, word: "들어앉다", meaning: "請坐下、待在室內", ex_kr: "하루 종일 방에 들어앉아 있었어요.", ex_zh: "我整天都待在房間裡。" },
            { id: 6121, word: "패기", meaning: "精神、活力", ex_kr: "젊은이의 패기가 넘쳐요.", ex_zh: "它充滿了青春活力。" },
            { id: 6122, word: "연체료", meaning: "滯納金", ex_kr: "책을 늦게 반납해서 연체료를 냈어요.", ex_zh: "我逾期歸還了書籍，並支付了滯納金。" },
            { id: 6123, word: "수도꼭지", meaning: "龍頭", ex_kr: "수도꼭지가 고장 났어요.", ex_zh: "水龍頭壞了。" },
            { id: 6124, word: "자원봉사자", meaning: "志工", ex_kr: "자원봉사자들이 청소를 돕고 있어요.", ex_zh: "志工們正在幫忙清理。" },
            { id: 6125, word: "소멸되다", meaning: "消亡、失效、滅絕", ex_kr: "태풍이 소멸되었습니다.", ex_zh: "颱風已經消散。" },
            { id: 6126, word: "기어가다", meaning: "爬行", ex_kr: "아기가 기어가고 있어요.", ex_zh: "寶寶會爬了。" },
            { id: 6127, word: "매수하다", meaning: "購買、賄賂", ex_kr: "주식을 싼값에 매수했어요.", ex_zh: "我以低價買入了股票。" },
            { id: 6128, word: "누명", meaning: "虛假指控", ex_kr: "억울하게 누명을 썼어요.", ex_zh: "我被冤枉了。" },
            { id: 6129, word: "헛다리", meaning: "猜錯了", ex_kr: "헛다리를 짚었어요.", ex_zh: "我草率地得出了錯誤的結論。" },
            { id: 6130, word: "관여하다", meaning: "參與、投入", ex_kr: "정치에 관여하고 싶지 않아요.", ex_zh: "我不想涉足政治。" },
            { id: 6131, word: "뽑히다", meaning: "被拉出來、被挑選出來", ex_kr: "대표로 뽑혔어요.", ex_zh: "我被選為代表。" },
            { id: 6132, word: "명칭", meaning: "姓名", ex_kr: "공식 명칭이 무엇입니까?", ex_zh: "它的正式名稱是什麼？" },
            { id: 6133, word: "두루", meaning: "每個人、周圍", ex_kr: "두루두루 잘 지내세요.", ex_zh: "希望你們都身體健康。" },
            { id: 6134, word: "열람실", meaning: "閱覽室", ex_kr: "열람실에서는 조용히 해야 해요.", ex_zh: "在閱覽室請保持安靜。" },
            { id: 6135, word: "내주다", meaning: "給予、提供", ex_kr: "자리를 노인에게 내주었어요.", ex_zh: "我把座位讓給了老人。" },
            { id: 6136, word: "오버하다", meaning: "做得太過火、反應過度、做得太多", ex_kr: "너무 오버하지 마세요.", ex_zh: "不要過度。" },
            { id: 6137, word: "가혹하다", meaning: "嚴厲、殘酷", ex_kr: "운명이 너무 가혹해요.", ex_zh: "命運太殘酷了。" },
            { id: 6138, word: "시급하다", meaning: "緊急", ex_kr: "문제 해결이 시급합니다.", ex_zh: "這個問題需要盡快解決。" },
            { id: 6139, word: "후하다", meaning: "慷慨大方、自由", ex_kr: "인심이 후한 식당이에요.", ex_zh: "這是一家客人熱情周到的餐廳。" },
            { id: 6140, word: "증명서", meaning: "證書", ex_kr: "졸업 증명서를 발급받았어요.", ex_zh: "我收到了畢業證書。" },
            { id: 6141, word: "노을", meaning: "日落、紅霞滿天", ex_kr: "저녁 노을이 붉게 물들었어요.", ex_zh: "傍晚的夕陽染成了紅色。" },
            { id: 6142, word: "소홀하다", meaning: "疏忽、冷漠", ex_kr: "건강 관리에 소홀했어요.", ex_zh: "我忽視了自己的健康。" },
            { id: 6143, word: "사유", meaning: "理由、依據；私有財產", ex_kr: "결석 사유를 적어 내세요.", ex_zh: "請寫下您缺席的原因。" },
            { id: 6144, word: "당부하다", meaning: "問、請求", ex_kr: "선생님께서 당부하신 말씀이 있어요.", ex_zh: "老師要我轉告你一件事。" },
            { id: 6145, word: "결합하다", meaning: "合併、聯合", ex_kr: "두 회사가 결합했어요.", ex_zh: "兩家公司合併了。" },
            { id: 6146, word: "시비", meaning: "爭論、爭吵", ex_kr: "길에서 시비가 붙었어요.", ex_zh: "我在街上和人發生了爭執。" },
            { id: 6147, word: "이런저런", meaning: "這個和那個", ex_kr: "이런저런 이야기를 나누었어요.", ex_zh: "我們聊了很多。" },
            { id: 6148, word: "자료실", meaning: "參考室", ex_kr: "도서관 자료실에서 책을 찾았어요.", ex_zh: "我在圖書館的參考閱覽室找到了一本書。" },
            { id: 6149, word: "식중독", meaning: "食物中毒", ex_kr: "상한 음식을 먹고 식중독에 걸렸어요.", ex_zh: "我吃了變質的食物，食物中毒了。" },
            { id: 6150, word: "재학", meaning: "上學", ex_kr: "그는 대학교에 재학 중입니다.", ex_zh: "他目前正在上大學。" },
            { id: 6151, word: "공과금", meaning: "水電費帳單", ex_kr: "공과금을 은행에서 납부했어요.", ex_zh: "我在銀行繳了水電煤氣費帳單。" },
            { id: 6152, word: "배편", meaning: "搭船", ex_kr: "배편으로 짐을 보냈어요.", ex_zh: "我透過海運運送了行李。" },
            { id: 6153, word: "번호표", meaning: "數位", ex_kr: "번호표를 뽑고 기다리세요.", ex_zh: "請取號等候。" },
            { id: 6154, word: "어간", meaning: "幹", ex_kr: "동사의 어간이 변하지 않아요.", ex_zh: "動詞詞幹不變。" },
            { id: 6155, word: "양옆", meaning: "雙方", ex_kr: "길 양옆에 나무가 있어요.", ex_zh: "道路兩旁都有樹木。" },
            { id: 6156, word: "일반인", meaning: "常人", ex_kr: "일반인은 출입 금지입니다.", ex_zh: "一般民眾禁止入內。" },
            { id: 6157, word: "단축하다", meaning: "縮短、減少", ex_kr: "거리를 단축하는 지름길이에요.", ex_zh: "這是縮短距離的捷徑。" },
            { id: 6158, word: "충혈되다", meaning: "充血", ex_kr: "눈이 심하게 충혈되었어요.", ex_zh: "我的眼睛嚴重充血。" },
            { id: 6159, word: "들어주다", meaning: "授予、遵守", ex_kr: "제 부탁을 들어주세요.", ex_zh: "請批准我的請求。" },
            { id: 6160, word: "직위", meaning: "位置", ex_kr: "직위 해제되었습니다.", ex_zh: "你已被解除職務。" },
            { id: 6161, word: "초대권", meaning: "免費門票/邀請函", ex_kr: "공연 초대권을 얻었어요.", ex_zh: "我收到了演出邀約。" },
            { id: 6162, word: "폭포", meaning: "瀑布", ex_kr: "시원한 폭포 소리가 들려요.", ex_zh: "我聽到瀑布潺潺的流水聲，令人心曠神怡。" },
            { id: 6163, word: "해물", meaning: "海鮮", ex_kr: "해물 파전을 주문했어요.", ex_zh: "我點了一份海鮮煎餅。" },

            { id: 6500, word: "수면", meaning: "表示、陳述、作證", ex_kr: "수면 부족은 건강을 해칩니다.", ex_zh: "睡眠不足會損害你的健康。" }

        let srsData = {};
        try {
            srsData = JSON.parse(localStorage.getItem('topik_srs_v2') || "{}");
        } catch(e) { srsData = {}; }

        let quotaState = {
            lastDate: "", dailyQueue: [], newBatchIds: [], reviewBatchIds: [], 
            sessionDoneIds: [], sessionMistakeIds: [], reappearTimes: {}
        };
        try {
            const savedQuota = localStorage.getItem('topik_quota_v2');
            if (savedQuota) quotaState = Object.assign(quotaState, JSON.parse(savedQuota));
        } catch(e) {}

        let dueWords = [], previewIndex = 0, currentSubTab = 'new';
        let filteredVocab = [];
        let displayCount = 30;
        const BATCH_SIZE = 30;
        let sessionInitialized = false;

        function isNewWord(id) {
            if (!srsData[id] || !srsData[id].firstDiscoveryDate) return true;
            const discovery = new Date(srsData[id].firstDiscoveryDate).toLocaleDateString();
            return discovery === new Date().toLocaleDateString();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function checkAndResetQuota() {
            const today = new Date().toLocaleDateString();
            const now = Date.now();
            
            if (quotaState.lastDate !== today) {
                const unlearned = initialVocab.filter(v => !srsData[v.id]);
                const news = shuffleArray([...unlearned]).slice(0, DAILY_NEW_LIMIT);
                
                news.forEach(v => { 
                    if (!srsData[v.id]) srsData[v.id] = { firstDiscoveryDate: now, nextReview: 0, interval: 0 }; 
                });

                quotaState = { 
                    lastDate: today, 
                    dailyQueue: [], 
                    newBatchIds: news.map(v => v.id), 
                    reviewBatchIds: [], 
                    sessionDoneIds: [], 
                    sessionMistakeIds: [], 
                    reappearTimes: {} 
                };
                sessionInitialized = false;
            }

            if (!sessionInitialized) {
                const allDueReviews = initialVocab.filter(v => 
                    srsData[v.id] && 
                    !isNewWord(v.id) && 
                    srsData[v.id].nextReview <= now
                ).map(v => v.id);

                quotaState.reviewBatchIds = shuffleArray([...allDueReviews]).slice(0, DAILY_REVIEW_LIMIT);
                sessionInitialized = true;
            }

            const activeNewIds = quotaState.newBatchIds.filter(id => !quotaState.sessionDoneIds.includes(id));
            const activeReviews = quotaState.reviewBatchIds.filter(id => !quotaState.sessionDoneIds.includes(id));
            
            quotaState.dailyQueue = shuffleArray([...activeNewIds, ...activeReviews]);

            localStorage.setItem('topik_srs_v2', JSON.stringify(srsData));
            localStorage.setItem('topik_quota_v2', JSON.stringify(quotaState));
        }

        function speak(text, rate = 1.0) {
            if (!text || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ko-KR';
            msg.rate = rate;
            window.speechSynthesis.speak(msg);
        }

        function getPreviewCurrentData() {
            const sourceIds = currentSubTab === 'new' ? quotaState.newBatchIds : quotaState.reviewBatchIds;
            if (!sourceIds || sourceIds.length === 0) return null;
            return initialVocab.find(v => v.id === sourceIds[previewIndex]);
        }

        function updatePreviewUI(autoSpeak = true) {
            const cardContainer = document.getElementById('preview-card');
            const cardInner = document.getElementById('preview-card-inner');
            if(!cardContainer || !cardInner) return;

            cardInner.classList.add('no-transition');
            cardContainer.classList.remove('is-flipped');
            void cardInner.offsetWidth; 
            
            const data = getPreviewCurrentData();
            const sourceIds = currentSubTab === 'new' ? quotaState.newBatchIds : quotaState.reviewBatchIds;
            
            if (!sourceIds || sourceIds.length === 0 || !data) {
                document.getElementById('preview-word-kr').innerText = "目前無單字";
                document.getElementById('preview-progress-text').innerText = "0 / 0";
                document.getElementById('preview-back-content').classList.add('hidden');
            } else {
                document.getElementById('preview-back-content').classList.remove('hidden');
                const isDone = quotaState.sessionDoneIds.includes(data.id);
                document.getElementById('preview-word-kr').innerText = data.word;
                document.getElementById('preview-word-kr-back').innerText = data.word;
                document.getElementById('preview-word-zh').innerText = data.meaning;
                document.getElementById('preview-ex-kr').innerText = data.ex_kr;
                document.getElementById('preview-ex-zh').innerText = data.ex_zh;
                document.getElementById('preview-progress-text').innerText = `${previewIndex + 1} / ${sourceIds.length}`;
                cardContainer.style.opacity = isDone ? "0.75" : "1";
                document.getElementById('preview-tag').innerText = isDone ? "COMPLETED" : "PREVIEW";
                
                if (autoSpeak) speak(data.word);
            }

            setTimeout(() => {
                cardInner.classList.remove('no-transition');
            }, 10);
        }

        function handleVote(isSuccess) {
            if (!dueWords[0]) return;
            const id = dueWords[0].id;
            const now = Date.now();
            const isNew = isNewWord(id);
            let message = "";

            if (isSuccess) {
                if (isNew) {
                    srsData[id].interval = 1;
                    srsData[id].nextReview = now + DAY_MS;
                    message = "24小時後複習";
                } else {
                    srsData[id].interval = Math.max(1, (srsData[id].interval || 1) * MULTIPLIER);
                    srsData[id].nextReview = now + (srsData[id].interval * DAY_MS);
                    message = "複習完成";
                }
                
                if (!quotaState.sessionDoneIds.includes(id)) {
                    quotaState.sessionDoneIds.push(id);
                }
                delete quotaState.reappearTimes[id];
                quotaState.dailyQueue = quotaState.dailyQueue.filter(qid => qid !== id);
            } else {
                if (isNew) {
                    if (!quotaState.sessionMistakeIds.includes(id)) quotaState.sessionMistakeIds.push(id);
                    const reappTime = now + HOUR_MS;
                    quotaState.reappearTimes[id] = reappTime;
                    srsData[id].nextReview = reappTime;
                    quotaState.dailyQueue.push(quotaState.dailyQueue.shift());
                    message = "一小時後補考";
                } else {
                    srsData[id].interval = 1;
                    srsData[id].nextReview = now + DAY_MS;
                    message = "24小時後重新複習";
                    quotaState.dailyQueue = quotaState.dailyQueue.filter(qid => qid !== id);
                    if (!quotaState.sessionDoneIds.includes(id)) quotaState.sessionDoneIds.push(id);
                }
            }
            localStorage.setItem('topik_srs_v2', JSON.stringify(srsData));
            localStorage.setItem('topik_quota_v2', JSON.stringify(quotaState));
            renderLearn();
            showToast(message);
        }

        function renderLearn() {
            const now = Date.now();
            const availableQueue = quotaState.dailyQueue.filter(id => {
                const rt = quotaState.reappearTimes[id] || 0;
                return now >= rt;
            });

            const cardContainer = document.getElementById('flashcard');
            const cardInner = document.getElementById('flashcard-inner');
            const limitUI = document.getElementById('limit-reached-ui');
            if(!cardContainer || !cardInner) return;

            cardInner.classList.add('no-transition');
            cardContainer.classList.remove('is-flipped');
            void cardInner.offsetWidth; 

            const remainingReviews = quotaState.dailyQueue.filter(id => quotaState.reviewBatchIds.includes(id)).length;
            const remainingNews = quotaState.dailyQueue.filter(id => quotaState.newBatchIds.includes(id)).length;
            document.getElementById('review-progress').innerText = remainingReviews;
            document.getElementById('new-progress').innerText = remainingNews;

            if (availableQueue.length > 0) {
                cardContainer.classList.remove('hidden');
                limitUI.classList.add('hidden');
                const data = initialVocab.find(v => v.id === availableQueue[0]);
                dueWords = [data];
                document.getElementById('word-kr').innerText = data.word;
                document.getElementById('word-zh').innerText = data.meaning;
                const isNew = isNewWord(data.id);
                document.getElementById('card-tag').innerText = isNew ? 'New' : 'Reviewing';
                document.getElementById('card-tag').className = `absolute top-6 left-6 text-xs font-mono font-bold px-2 py-1 rounded uppercase ${isNew ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700'}`;
                
                speak(data.word);
            } else {
                cardContainer.classList.add('hidden');
                limitUI.classList.remove('hidden');
                const pTag = document.querySelector('#limit-reached-ui p');
                if (quotaState.dailyQueue.length > 0) {
                    pTag.innerText = "單字冷卻中，請稍後再試。";
                } else {
                    pTag.innerText = "本次會話已完成！";
                }
            }

            setTimeout(() => {
                cardInner.classList.remove('no-transition');
            }, 10);
        }

        function formatTimeDiff(targetMs) {
            const diff = targetMs - Date.now();
            if (diff <= 0) return "Due";
            const days = Math.floor(diff / DAY_MS);
            const hours = Math.floor((diff % DAY_MS) / HOUR_MS);
            if (days > 0) return `${days}d ${hours}hr`;
            const mins = Math.floor((diff % HOUR_MS) / 60000);
            return hours > 0 ? `${hours}hr ${mins}m` : `${mins}m`;
        }

        function renderList(append = false) {
            const container = document.getElementById('vocab-list-container');
            if (!container) return;
            if (!append) {
                container.innerHTML = '';
                displayCount = BATCH_SIZE;
                filteredVocab.sort((a, b) => (srsData[a.id]?.nextReview || Infinity) - (srsData[b.id]?.nextReview || Infinity));
            }
            filteredVocab.slice(append ? displayCount - BATCH_SIZE : 0, displayCount).forEach(v => {
                const srs = srsData[v.id];
                const div = document.createElement('div');
                div.className = 'bg-white p-5 rounded-2xl shadow-sm border border-sky-50 transition-all cursor-pointer active:bg-sky-50';
                let srsStatusText = "New", srsColorClass = "text-gray-400 text-xs"; 
                if (srs && srs.nextReview > 0) { 
                    srsStatusText = formatTimeDiff(srs.nextReview); 
                    srsColorClass = srsStatusText === "Due" ? "text-rose-500 font-bold" : "text-sky-500 font-bold";
                }
                div.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-1">
                                <span class="text-xl font-bold text-gray-800">${v.word}</span>
                                <button class="p-3 text-sky-300 voice-list-btn voice-btn-z" data-word="${v.word}">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"/></svg>
                                </button>
                            </div>
                            <p class="text-sm text-gray-400 font-medium">${v.meaning}</p>
                        </div>
                        <div class="flex items-center space-x-3">
                            <span class="uppercase tracking-tighter text-[10px] ${srsColorClass}">${srsStatusText}</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-300 rotate-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                        </div>
                    </div>
                    <div class="details-content mt-4 pt-4 border-t border-sky-50 space-y-3">
                        <div><p class="text-xs text-sky-400 font-bold mb-1 uppercase tracking-tighter">例句範例</p><p class="text-sm text-gray-700 font-medium leading-relaxed">${v.ex_kr}</p></div>
                        <div><p class="text-xs text-sky-300 font-bold mb-1 uppercase tracking-tighter">例句翻譯</p><p class="text-xs text-gray-500">${v.ex_zh}</p></div>
                    </div>
                `;
                div.onclick = (e) => e.target.closest('.voice-list-btn') ? (e.stopPropagation(), speak(e.target.closest('.voice-list-btn').dataset.word)) : div.classList.toggle('is-open');
                container.appendChild(div);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        window.onload = () => {
            checkAndResetQuota();
            filteredVocab = [...initialVocab];
            updatePreviewUI(false); 

            const tabs = { today: 'view-today', learn: 'view-learn', list: 'view-list' };
            Object.keys(tabs).forEach(key => {
                const btn = document.getElementById(`tab-${key}-btn`);
                if(!btn) return;
                btn.onclick = function() {
                    Object.values(tabs).forEach(v => document.getElementById(v).classList.add('hidden'));
                    document.getElementById(tabs[key]).classList.remove('hidden');
                    document.querySelectorAll('nav button').forEach(b => b.classList.replace('tab-active', 'text-gray-400'));
                    this.classList.replace('text-gray-400', 'tab-active');
                    
                    if(key === 'learn') {
                        checkAndResetQuota(); 
                        renderLearn();
                    } else if(key === 'list') {
                        renderList();
                    } else if(key === 'today') {
                        checkAndResetQuota();
                        updatePreviewUI(true);
                    }
                };
            });

            document.getElementById('subtab-new-btn').onclick = function() {
                currentSubTab = 'new'; previewIndex = 0;
                this.className = 'flex-1 py-2 text-xs font-bold rounded-lg transition-all subtab-active';
                document.getElementById('subtab-rev-btn').className = 'flex-1 py-2 text-xs font-bold rounded-lg transition-all text-sky-400';
                updatePreviewUI();
            };
            document.getElementById('subtab-rev-btn').onclick = function() {
                currentSubTab = 'rev'; previewIndex = 0;
                this.className = 'flex-1 py-2 text-xs font-bold rounded-lg transition-all subtab-active';
                document.getElementById('subtab-new-btn').className = 'flex-1 py-2 text-xs font-bold rounded-lg transition-all text-sky-400';
                updatePreviewUI();
            };

            document.getElementById('vocab-search').oninput = (e) => {
                const val = e.target.value.toLowerCase();
                filteredVocab = initialVocab.filter(v => v.word.toLowerCase().includes(val) || v.meaning.toLowerCase().includes(val));
                renderList();
            };

            const observer = new IntersectionObserver((entries) => { 
                if (entries[0].isIntersecting && displayCount < filteredVocab.length) { 
                    displayCount += BATCH_SIZE; renderList(true); 
                } 
            });
            observer.observe(document.getElementById('list-end-trigger'));

            document.getElementById('preview-next-btn').onclick = () => {
                const sourceIds = currentSubTab === 'new' ? quotaState.newBatchIds : quotaState.reviewBatchIds;
                if (!sourceIds || sourceIds.length === 0) return;
                previewIndex = (previewIndex + 1) % sourceIds.length;
                updatePreviewUI();
            };
            document.getElementById('preview-prev-btn').onclick = () => {
                const sourceIds = currentSubTab === 'new' ? quotaState.newBatchIds : quotaState.reviewBatchIds;
                if (!sourceIds || sourceIds.length === 0) return;
                previewIndex = (previewIndex - 1 + sourceIds.length) % sourceIds.length;
                updatePreviewUI();
            };

            document.getElementById('preview-card').onclick = e => {
                if (e.target.closest('.voice-btn-z')) return;
                const data = getPreviewCurrentData();
                if (!data) return;
                const cardContainer = e.currentTarget;
                const isFlipped = cardContainer.classList.toggle('is-flipped');
                if (isFlipped) { setTimeout(() => speak(data.ex_kr, 1.0), 100); } else { speak(data.word, 1.0); }
            };

            document.getElementById('preview-voice-back-word-10').onclick = e => { e.stopPropagation(); speak(getPreviewCurrentData()?.word, 1.0); };
            document.getElementById('preview-voice-ex-10').onclick = e => { e.stopPropagation(); speak(getPreviewCurrentData()?.ex_kr, 1.0); };
            document.getElementById('preview-voice-ex-06').onclick = e => { e.stopPropagation(); speak(getPreviewCurrentData()?.ex_kr, 0.6); };

            document.getElementById('flashcard').onclick = e => {
                if (e.target.closest('.voice-btn-z') || e.target.closest('button')) return;
                e.currentTarget.classList.toggle('is-flipped');
            };

            document.getElementById('learn-voice-btn-10').onclick = e => { e.stopPropagation(); if (dueWords.length > 0) speak(dueWords[0].word, 1.0); };
            
            document.getElementById('success-btn').onclick = e => { e.stopPropagation(); handleVote(true); };
            document.getElementById('fail-btn').onclick = e => { e.stopPropagation(); handleVote(false); };
            document.getElementById('reset-data-btn').onclick = () => confirm("確定要重置所有紀錄嗎？") && (localStorage.clear() || location.reload());
        };
    </script>
</body>
</html>
