            { id: 1263, word: "특별하다", meaning: "特別的、非凡的", ex_kr: "오늘은 제 생일이라서 특별한 날이에요.", ex_zh: "今天是個特別的日子，因為今天是我的生日。" },
            { id: 1264, word: "옷걸이", meaning: "衣架", ex_kr: "코트를 옷걸이에 거세요.", ex_zh: "把外套掛在衣架上。" },
            { id: 1265, word: "포기하다", meaning: "放棄", ex_kr: "어려워도 포기하지 마세요.", ex_zh: "即使困難也不要放棄。" },
            { id: 1266, word: "반드시", meaning: "當然、肯定", ex_kr: "내일까지 반드시 이 일을 끝내야 해요.", ex_zh: "我必須在明天之前完成這項工作。" },
            { id: 1267, word: "희망", meaning: "希望", ex_kr: "저는 희망을 잃지 않을 거예요.", ex_zh: "我不會失去希望。" },
            { id: 1268, word: "도움", meaning: "幫助、援助", ex_kr: "도움이 필요하면 언제든지 말하세요.", ex_zh: "如果您需要幫助，請告訴我。" },
            { id: 1269, word: "능력", meaning: "能力", ex_kr: "그는 뛰어난 능력을 가지고 있어요.", ex_zh: "他能力出眾。" },
            { id: 1270, word: "대회", meaning: "大型集會、大會；比賽、錦標賽", ex_kr: "말하기 대회에서 1등을 했어요.", ex_zh: "我在演講比賽中獲得了第一名。" },
            { id: 1271, word: "멈추다", meaning: "停止、止", ex_kr: "비가 멈췄어요.", ex_zh: "雨停了。" },
            { id: 1272, word: "고장", meaning: "缺陷、故障；區域、城鎮", ex_kr: "텔레비전이 고장 났어요.", ex_zh: "電視機壞了。" },
            { id: 1273, word: "비키다", meaning: "讓開", ex_kr: "죄송하지만, 잠시만 비켜주시겠어요?", ex_zh: "打擾一下，請您暫時讓開一下好嗎？" },
            { id: 1274, word: "여보", meaning: "親愛的", ex_kr: "여보, 오늘 저녁 뭐 먹을까요?", ex_zh: "親愛的，我們今晚吃什麼？" },
            { id: 1275, word: "대표", meaning: "代表", ex_kr: "그는 우리 회사를 대표해서 회의에 참석했어요.", ex_zh: "他代表我們公司出席了會議。" },
            { id: 1276, word: "인천", meaning: "仁川", ex_kr: "인천 국제공항은 한국의 관문입니다.", ex_zh: "仁川國際機場是韓國的門戶。" },
            { id: 1277, word: "지각하다", meaning: "遲到；察覺、感知、意識到", ex_kr: "늦잠을 자서 학교에 지각했어요.", ex_zh: "我睡過頭了，上學遲到了。" },
            { id: 1278, word: "미소", meaning: "微笑", ex_kr: "그녀의 미소는 정말 아름다워요.", ex_zh: "她的笑容真美。" },
            { id: 1279, word: "예술", meaning: "藝術", ex_kr: "저는 예술 작품을 감상하는 것을 좋아해요.", ex_zh: "我喜歡欣賞藝術作品。" },
            { id: 1280, word: "커피숍", meaning: "咖啡廳", ex_kr: "친구와 커피숍에서 만나기로 했어요.", ex_zh: "我決定和朋友在咖啡館見面。" },
            { id: 1281, word: "약하다", meaning: "軟弱", ex_kr: "저는 몸이 약해서 자주 아파요.", ex_zh: "我體質虛弱，所以常常生病。" },
            { id: 1282, word: "간단하다", meaning: "簡單來說、容易", ex_kr: "아침 식사는 간단하게 빵으로 했어요.", ex_zh: "我早餐只吃了麵包，很簡單。" },
            { id: 1283, word: "막내", meaning: "家中最小的孩子", ex_kr: "저는 우리 집 막내예요.", ex_zh: "我是家裡最小的孩子。" },
            { id: 1284, word: "빠지다", meaning: "跌倒、輟學、失踪", ex_kr: "강에 빠지지 않도록 조심하세요.", ex_zh: "小心別掉進河裡。" },
            { id: 1285, word: "주황색", meaning: "橘子", ex_kr: "당근은 주황색이에요.", ex_zh: "胡蘿蔔是橘色的。" },
            { id: 1286, word: "등산", meaning: "健行、登山", ex_kr: "주말에 친구들과 등산을 갔어요.", ex_zh: "週末我和朋友們一起去健行了。" },
            { id: 1287, word: "밀다", meaning: "推、擠", ex_kr: "문을 밀어서 여세요.", ex_zh: "推門打開它。" },
            { id: 1288, word: "모자라다", meaning: "不足", ex_kr: "시간이 모자라서 시험을 다 못 풀었어요.", ex_zh: "我沒能完成考試，因為時間不夠了。" },
            { id: 1289, word: "비다", meaning: "空的、空的", ex_kr: "이 좌석은 비어 있어요.", ex_zh: "這個座位是空的。" },
            { id: 1290, word: "다하다", meaning: "耗盡、用完、筋疲力盡", ex_kr: "최선을 다했지만, 실패했어요.", ex_zh: "我盡力了，但還是失敗了。" },
            { id: 1291, word: "변화하다", meaning: "改變、修改", ex_kr: "세상은 빠르게 변화하고 있어요.", ex_zh: "世界正在快速變化。" },
            { id: 1292, word: "끌다", meaning: "拉、拽", ex_kr: "무거운 짐을 끌고 갔어요.", ex_zh: "我拖著沉重的貨物。" },
            { id: 1293, word: "제품", meaning: "產品、製成品", ex_kr: "이 회사의 제품은 품질이 좋아요.", ex_zh: "這家公司的產品品質很好。" },
            { id: 1294, word: "편안하다", meaning: "感到舒適、放鬆、平靜", ex_kr: "우리 집이 제일 편안해요.", ex_zh: "我家是最舒適的。" },
            { id: 1295, word: "바깥", meaning: "外部", ex_kr: "바깥 날씨가 추우니 옷을 따뜻하게 입으세요.", ex_zh: "外面天氣寒冷，請注意保暖。" },
            { id: 1296, word: "무릎", meaning: "膝蓋；股溝", ex_kr: "넘어져서 무릎을 다쳤어요.", ex_zh: "我摔倒了，膝蓋受傷了。" },
            { id: 1297, word: "방향", meaning: "方向", ex_kr: "길을 잃어서 방향을 모르겠어요.", ex_zh: "我迷路了，不知道該往哪裡走。" },
            { id: 1298, word: "지붕", meaning: "屋頂", ex_kr: "태풍 때문에 지붕이 날아갔어요.", ex_zh: "颱風把屋頂掀翻了。" },
            { id: 1299, word: "쌓이다", meaning: "堆積、被堆疊", ex_kr: "책상 위에 책이 많이 쌓여 있어요.", ex_zh: "桌子上堆著很多書。" },
            { id: 1300, word: "경주", meaning: "慶州；賽跑", ex_kr: "경주는 역사적인 도시입니다.", ex_zh: "慶州是個歷史悠久的城市。" },
            { id: 1301, word: "자꾸", meaning: "不斷地、反覆地", ex_kr: "자꾸 전화해서 미안해요.", ex_zh: "很抱歉我頻繁地打電話給您。" },
            { id: 1302, word: "선수", meaning: "運動員", ex_kr: "손흥민은 유명한 축구 선수입니다.", ex_zh: "孫興慜是一位著名的足球員。" },
            { id: 1303, word: "휴지통", meaning: "垃圾桶、廢紙簍", ex_kr: "쓰레기를 휴지통에 버리세요.", ex_zh: "請把垃圾丟進垃圾桶。" },
            { id: 1304, word: "주변", meaning: "周圍環境", ex_kr: "학교 주변에 식당이 많아요.", ex_zh: "學校周圍有很多餐廳。" },
            { id: 1305, word: "스트레스", meaning: "壓力", ex_kr: "요즘 스트레스가 너무 많아요.", ex_zh: "最近壓力好大。" },
            { id: 1306, word: "쥐", meaning: "小鼠；大鼠", ex_kr: "고양이가 쥐를 잡았어요.", ex_zh: "貓抓住了老鼠。" },
            { id: 1307, word: "시민", meaning: "國民", ex_kr: "서울 시민들은 한강 공원에서 휴식을 즐겨요.", ex_zh: "首爾市民喜歡在漢江公園休閒放鬆。" },
            { id: 1308, word: "칫솔", meaning: "牙刷", ex_kr: "식사 후에 칫솔로 이를 닦아요.", ex_zh: "飯後用牙刷刷牙。" },
            { id: 1309, word: "참외", meaning: "東方甜瓜", ex_kr: "여름 과일인 참외는 달고 시원해요.", ex_zh: "韓國甜瓜是夏季水果，口感香甜清爽。" },
            { id: 1310, word: "놓치다", meaning: "錯過、溜走、沒能抓住", ex_kr: "늦잠을 자서 버스를 놓쳤어요.", ex_zh: "我睡過頭了，錯過了公車。" },
            { id: 1311, word: "정원", meaning: "花園、庭院；容量、限制", ex_kr: "집에 예쁜 정원이 있어요.", ex_zh: "我家有個很漂亮的花園。" },
            { id: 1312, word: "주부", meaning: "家庭主婦", ex_kr: "제 어머니는 주부이십니다.", ex_zh: "我母親是家庭主婦。" },
            { id: 1313, word: "바라보다", meaning: "觀看、注視", ex_kr: "창밖을 바라보며 생각에 잠겼어요.", ex_zh: "我凝視著窗外，陷入沉思。" },
            { id: 1314, word: "나타내다", meaning: "表達；展示、顯示", ex_kr: "말로 감정을 나타내기 어려웠어요.", ex_zh: "很難用語言表達我的感受。" },
            { id: 1315, word: "긴장하다", meaning: "感到緊張、感到焦慮", ex_kr: "면접을 볼 때 너무 긴장했어요.", ex_zh: "面試的時候我非常緊張。" },
            { id: 1316, word: "한식집", meaning: "韓國餐廳", ex_kr: "점심은 근처 한식집에서 먹었어요.", ex_zh: "我在附近一家韓國餐廳吃了午餐。" },
            { id: 1317, word: "담다", meaning: "放入", ex_kr: "그릇에 음식을 예쁘게 담아 주세요.", ex_zh: "請將食物整齊地擺放在碗裡。" },
            { id: 1318, word: "알려지다", meaning: "成為知名人士", ex_kr: "그 가수는 전 세계에 알려졌어요.", ex_zh: "那位歌手因此名揚世界。" },
            { id: 1319, word: "비교하다", meaning: "與……相比", ex_kr: "두 제품의 가격을 비교해 보세요.", ex_zh: "比較兩種產品的價格。" },
            { id: 1320, word: "반대하다", meaning: "反對、反對", ex_kr: "저는 그 계획에 반대합니다.", ex_zh: "我反對這項計劃。" },
            { id: 1321, word: "공간", meaning: "空間、房間", ex_kr: "이 방은 쉴 수 있는 공간이 필요해요.", ex_zh: "這個房間需要一個休息的空間。" },
            { id: 1322, word: "지우개", meaning: "橡皮擦、橡膠", ex_kr: "연필로 쓴 글씨를 지우개로 지웠어요.", ex_zh: "我用橡皮擦擦掉了鉛筆寫的字。" },
            { id: 1323, word: "싱겁다", meaning: "味道寡淡、不夠鹹。", ex_kr: "국이 좀 싱거워요.", ex_zh: "這湯味道有點淡。" },
            { id: 1324, word: "크기", meaning: "尺寸、體積", ex_kr: "이 신발 크기가 어떻게 돼요?", ex_zh: "這雙鞋是什麼尺寸的？" },
            { id: 1325, word: "차례", meaning: "順序、順序；時間、輪次；祖先追悼會", ex_kr: "차례를 지켜서 들어오세요.", ex_zh: "請按順序輸入。" },
            { id: 1326, word: "기름", meaning: "油；脂肪", ex_kr: "자동차에 기름을 넣어야 해요.", ex_zh: "我需要給車加油。" },
            { id: 1327, word: "태국", meaning: "泰國", ex_kr: "태국 음식은 맵고 맛있어요.", ex_zh: "泰國菜辛辣可口。" },
            { id: 1328, word: "점점", meaning: "逐漸地、一點一點地、越來越", ex_kr: "날씨가 점점 추워지고 있어요.", ex_zh: "天氣越來越冷了。" },
            { id: 1329, word: "종류", meaning: "種類、類型、排序", ex_kr: "이 가게에는 여러 종류의 빵이 있어요.", ex_zh: "這家店裡有各種各樣的麵包。" },
            { id: 1330, word: "떠들다", meaning: "發出聲音、大聲說話", ex_kr: "수업 시간에 떠들지 마세요.", ex_zh: "上課期間請勿交談。" },
            { id: 1331, word: "갈아입다", meaning: "換衣服", ex_kr: "운동이 끝나고 옷을 갈아입었어요.", ex_zh: "運動結束後，我換了衣服。" },
            { id: 1332, word: "멀리", meaning: "遙遠的地方", ex_kr: "멀리 가지 마세요.", ex_zh: "不要走遠。" },
            { id: 1333, word: "육교", meaning: "行人天橋", ex_kr: "육교를 건너서 가세요.", ex_zh: "請過人行天橋。" },
            { id: 1334, word: "이웃", meaning: "鄰居", ex_kr: "이웃과 사이좋게 지내야 해요.", ex_zh: "你應該和鄰居們相處融洽。" },
            { id: 1335, word: "보라색", meaning: "紫羅蘭色、紫色", ex_kr: "저는 보라색을 좋아해요.", ex_zh: "我喜歡紫色。" },
            { id: 1336, word: "늘", meaning: "總是、一直", ex_kr: "그는 늘 같은 시간에 일어나요.", ex_zh: "他總是準時醒來。" },
            { id: 1337, word: "안내하다", meaning: "引導、帶路", ex_kr: "제가 길을 안내해 드릴게요.", ex_zh: "我會指導你。" },
            { id: 1338, word: "이모", meaning: "姑姑", ex_kr: "이모가 맛있는 저녁을 사 주셨어요.", ex_zh: "我姑姑請我吃了一頓美味的晚餐。" },
            { id: 1339, word: "설날", meaning: "元旦", ex_kr: "설날 아침에는 떡국을 먹어요.", ex_zh: "我們農曆新年早上吃年糕湯。" },
            { id: 1340, word: "꽃병", meaning: "花瓶", ex_kr: "꽃병에 예쁜 꽃을 꽂았어요.", ex_zh: "我把漂亮的花插在花瓶裡。" },
            { id: 1341, word: "아픔", meaning: "痛苦、疼痛；悲傷、哀慟", ex_kr: "이별의 아픔을 겪고 있어요.", ex_zh: "我正在經歷分手之痛。" },
            { id: 1342, word: "남산", meaning: "南山", ex_kr: "서울 남산에 올라가면 도시 전체가 보여요.", ex_zh: "如果你登上首爾的南山，就可以俯瞰整個城市。" },
            { id: 1343, word: "공장", meaning: "工廠", ex_kr: "아버지는 자동차 공장에서 일하세요.", ex_zh: "我父親在一家汽車工廠工作。" },
            { id: 1344, word: "책장", meaning: "書架、書櫃；書頁", ex_kr: "책을 다 읽고 책장에 꽂았어요.", ex_zh: "我讀完了這本書，然後把它放回了書架上。" },
            { id: 1345, word: "얼음", meaning: "冰", ex_kr: "더워서 음료수에 얼음을 넣었어요.", ex_zh: "天氣很熱，所以我往飲料裡加了冰塊。" },
            { id: 1346, word: "몰래", meaning: "偷偷", ex_kr: "엄마 몰래 과자를 먹었어요.", ex_zh: "我偷偷地吃了零食，沒讓媽媽發現。" },
            { id: 1347, word: "갈아타다", meaning: "更換車輛、轉移", ex_kr: "서울역에서 1호선으로 갈아타야 해요.", ex_zh: "您需要在首爾站換乘1號線。" },
            { id: 1348, word: "시설", meaning: "機構、設施", ex_kr: "이 호텔은 시설이 아주 좋아요.", ex_zh: "這家酒店設施非常好。" },
            { id: 1349, word: "가져가다", meaning: "帶上、攜帶", ex_kr: "비가 올 것 같으니 우산을 가져가세요.", ex_zh: "看起來要下雨了，請帶上雨傘。" },
            { id: 1350, word: "창피하다", meaning: "感到羞愧、尷尬", ex_kr: "사람들 앞에서 넘어져서 창피했어요.", ex_zh: "我當著眾人的面跌倒了，我覺得很尷尬。" },
            { id: 1351, word: "아무리", meaning: "然而、無論如何", ex_kr: "아무리 바빠도 식사는 꼭 하세요.", ex_zh: "無論多忙，都要記得吃飯。" },
            { id: 1352, word: "참가하다", meaning: "要參與、請加入", ex_kr: "저는 이번 대회에 참가할 거예요.", ex_zh: "我將參加這次比賽。" },
            { id: 1353, word: "금방", meaning: "很快、不久、迅速地", ex_kr: "금방 갈게요. 조금만 기다려 주세요.", ex_zh: "我馬上就到，請稍等片刻。" },
            { id: 1354, word: "쌀", meaning: "生米", ex_kr: "한국 사람들은 밥을 짓기 위해 쌀을 사용해요.", ex_zh: "韓國人用米煮飯。" },
            { id: 1355, word: "과장님", meaning: "部門主管、負責人", ex_kr: "김 과장님, 잠깐 시간 있으세요?", ex_zh: "金經理，您現在有空嗎？" },
            { id: 1356, word: "맞추다", meaning: "設定、調整", ex_kr: "시계 알람을 7시에 맞췄어요.", ex_zh: "我把鬧鐘設在了7點。" },
            { id: 1357, word: "도로", meaning: "路、街道；返回、再次", ex_kr: "도로에 차가 많아서 막혀요.", ex_zh: "道路上擠滿了車輛。" },
            { id: 1358, word: "섭섭하다", meaning: "感到遺憾、失望、後悔", ex_kr: "친구가 약속을 잊어버려서 섭섭했어요.", ex_zh: "我很失望，因為我的朋友忘記了我們的約會。" },
            { id: 1359, word: "삼촌", meaning: "叔叔", ex_kr: "삼촌이 장난감을 사 주셨어요.", ex_zh: "我叔叔買了個玩具給我。" },
            { id: 1360, word: "만두", meaning: "餃子", ex_kr: "점심으로 만둣국을 먹었어요.", ex_zh: "我午餐吃了餃子湯。" },
            { id: 1361, word: "문자", meaning: "字母、字母表；簡訊", ex_kr: "친구에게 문자 메시지를 보냈어요.", ex_zh: "我傳了一封簡訊給朋友。" },
            { id: 1362, word: "태도", meaning: "態度、舉止", ex_kr: "그는 항상 긍정적인 태도를 가지고 있어요.", ex_zh: "他總是保持積極的態度。" },
            { id: 1363, word: "형제", meaning: "兄弟姊妹", ex_kr: "저희는 3형제입니다.", ex_zh: "我們是三兄弟。" },
            { id: 1364, word: "화분", meaning: "花盆", ex_kr: "창가에 작은 화분을 놓았어요.", ex_zh: "我在窗邊放了一盆小植物。" },
            { id: 1365, word: "데려오다", meaning: "帶來、去取、接某人", ex_kr: "친구를 집에 데려왔어요.", ex_zh: "我帶了個朋友回家。" },
            { id: 1366, word: "유럽", meaning: "歐洲", ex_kr: "저는 유럽 여러 나라를 여행했어요.", ex_zh: "我去過幾個歐洲國家。" },
            { id: 1367, word: "나누다", meaning: "分割、分開；分享", ex_kr: "피자를 친구들과 나누어 먹었어요.", ex_zh: "我和朋友們一起分享了披薩。" },
            { id: 1368, word: "고객", meaning: "客戶", ex_kr: "저희는 고객 만족을 위해 최선을 다합니다.", ex_zh: "我們竭盡全力確保客戶滿意。" },
            { id: 1369, word: "고민", meaning: "擔憂、煩惱", ex_kr: "요즘 취업 문제 때문에 고민이 많아요.", ex_zh: "最近我因為工作問題有很多煩惱。" },
            { id: 1370, word: "정리하다", meaning: "安排、整理", ex_kr: "자기 전에 책상을 정리해요.", ex_zh: "我睡前會整理一下書桌。" },
            { id: 1371, word: "세다", meaning: "強壯；數數", ex_kr: "바람이 너무 세게 불어요.", ex_zh: "風刮得太大了。" },
            { id: 1372, word: "옮기다", meaning: "移動、轉移", ex_kr: "무거운 짐을 다른 방으로 옮겼어요.", ex_zh: "我把沉重的行李搬到了另一個房間。" },
            { id: 1373, word: "전문", meaning: "專業", ex_kr: "그는 컴퓨터 전문가입니다.", ex_zh: "他是一位電腦專家。" },
            { id: 1374, word: "남성", meaning: "男性；男性", ex_kr: "이 화장품은 남성들에게 인기가 많아요.", ex_zh: "這款化妝品在男性中非常受歡迎。" },
            { id: 1375, word: "발목", meaning: "踝", ex_kr: "축구를 하다가 발목을 다쳤어요.", ex_zh: "我踢足球時扭傷了腳踝。" },
            { id: 1376, word: "재료", meaning: "材料、成分", ex_kr: "요리를 하기 전에 재료를 준비해야 해요.", ex_zh: "烹飪前需要準備食材。" },
            { id: 1377, word: "이틀", meaning: "兩天", ex_kr: "이틀 동안 아무것도 못 먹었어요.", ex_zh: "我已經兩天沒吃東西了。" },
            { id: 1378, word: "원피스", meaning: "裙子", ex_kr: "그녀는 예쁜 원피스를 입고 있었어요.", ex_zh: "她穿著一件漂亮的裙子。" },
            { id: 1379, word: "자유", meaning: "自由、解放", ex_kr: "자유롭게 의견을 말해주세요.", ex_zh: "歡迎分享您的意見。" },
            { id: 1380, word: "스키", meaning: "滑雪、滑雪板", ex_kr: "겨울에 친구들과 스키를 타러 갈 거예요.", ex_zh: "冬天我要和朋友一起去滑雪。" },
            { id: 1381, word: "포장", meaning: "包裝、包裹", ex_kr: "선물을 예쁘게 포장해 주세요.", ex_zh: "請把禮物包裝好。" },
            { id: 1382, word: "무언가", meaning: "某物", ex_kr: "가방 안에 무언가 들어있어요.", ex_zh: "袋子裡有東西。" },
            { id: 1383, word: "실패하다", meaning: "失敗、出錯", ex_kr: "여러 번 실패했지만 포기하지 않았어요.", ex_zh: "我失敗了很多次，但我沒有放棄。" },
            { id: 1384, word: "해결하다", meaning: "解決問題", ex_kr: "어려운 문제를 드디어 해결했어요.", ex_zh: "我終於解決了這個難題。" },
            { id: 1385, word: "푹", meaning: "深深地、徹底地、仔細地", ex_kr: "어젯밤에 푹 잤어요.", ex_zh: "我昨晚睡得很香。" },
            { id: 1386, word: "맡다", meaning: "負責、承擔；聞、嗅、嗅聞", ex_kr: "이 일은 제가 맡겠습니다.", ex_zh: "我將負責這項任務。" },
            { id: 1387, word: "과목", meaning: "科目、課程", ex_kr: "저는 여러 과목 중에서 수학을 제일 좋아해요.", ex_zh: "在所有科目中，我最喜歡數學。" },
            { id: 1388, word: "지르다", meaning: "大喊、吶喊、尖叫", ex_kr: "무서워서 소리를 질렀어요.", ex_zh: "我尖叫是因為我害怕。" },
            { id: 1389, word: "신혼여행", meaning: "蜜月", ex_kr: "두 사람은 하와이로 신혼여행을 갔어요.", ex_zh: "兩人去夏威夷度蜜月。" },
            { id: 1390, word: "자라다", meaning: "長大成人、被撫養長大", ex_kr: "저는 서울에서 태어나고 자랐어요.", ex_zh: "我出生在首爾，也在那裡長大。" },
            { id: 1391, word: "크리스마스", meaning: "聖誕節", ex_kr: "크리스마스에 눈이 왔으면 좋겠어요.", ex_zh: "我希望聖誕節那天會下雪。" },
            { id: 1392, word: "자세히", meaning: "仔細地、詳細地", ex_kr: "자세히 설명해 주세요.", ex_zh: "請詳細解釋。" },
            { id: 1393, word: "시골", meaning: "鄉村、農村地區", ex_kr: "저는 조용한 시골에서 살고 싶어요.", ex_zh: "我想住在安靜的鄉村。" },
            { id: 1394, word: "정문", meaning: "前門、主入口", ex_kr: "학교 정문 앞에서 만나요.", ex_zh: "我們在學校大門前見面。" },
            { id: 1395, word: "바뀌다", meaning: "被改變、被轉化", ex_kr: "신호등이 초록불로 바뀌었어요.", ex_zh: "交通號誌變成綠燈了。" },
            { id: 1396, word: "낳다", meaning: "分娩", ex_kr: "고양이가 새끼를 낳았어요.", ex_zh: "這隻母貓生了小貓。" },
            { id: 1397, word: "쌓다", meaning: "堆積；積累", ex_kr: "경험을 쌓기 위해 노력하고 있어요.", ex_zh: "我正在努力累積經驗。" },

            { id: 1399, word: "돌리다", meaning: "轉動、旋轉", ex_kr: "핸들을 오른쪽으로 돌리세요.", ex_zh: "向右轉動方向盤。" },
            { id: 1400, word: "끓이다", meaning: "煮沸、加熱、烹飪", ex_kr: "라면을 끓여 먹었어요.", ex_zh: "我煮了拉麵，然後吃了。" },
            { id: 1401, word: "불쌍하다", meaning: "可憐的、悲慘的、窮的", ex_kr: "비에 젖은 강아지가 불쌍해 보여요.", ex_zh: "這隻全身濕透的小狗看起來很可憐。" },
            { id: 1402, word: "특별히", meaning: "尤其、特別", ex_kr: "오늘은 특별히 할 일이 없어요.", ex_zh: "我今天沒什麼特別的事要做。" },

            { id: 1405, word: "관광", meaning: "旅遊", ex_kr: "서울은 유명한 관광 도시입니다.", ex_zh: "首爾是著名的旅遊城市。" },
            { id: 1406, word: "절대", meaning: "當然、絕對的", ex_kr: "저는 절대 거짓말을 하지 않아요.", ex_zh: "我從不說謊。" },
            { id: 1407, word: "동물원", meaning: "動物園", ex_kr: "주말에 아이들과 동물원에 갔어요.", ex_zh: "週末我和孩子們去了動物園。" },
            { id: 1408, word: "전철", meaning: "地鐵", ex_kr: "저는 매일 전철로 출퇴근해요.", ex_zh: "我每天都搭地鐵上下班。" },
            { id: 1409, word: "전자의", meaning: "電子的", ex_kr: "요즘은 전자책을 많이 읽어요.", ex_zh: "最近我讀了很多電子書。" },
            { id: 1410, word: "고백하다", meaning: "坦白、承認", ex_kr: "그는 그녀에게 사랑을 고백했어요.", ex_zh: "他向她表白了。" },
            { id: 1411, word: "기온", meaning: "溫度", ex_kr: "오늘 낮 최고 기온은 30도입니다.", ex_zh: "今天最高氣溫30度。" },
            { id: 1412, word: "상관없다", meaning: "無關緊要、不在乎；與…無關", ex_kr: "저는 아무거나 상관없어요.", ex_zh: "我什麼都不在乎。" },
            { id: 1413, word: "늘다", meaning: "增加、成長、上升", ex_kr: "한국어 실력이 많이 늘었어요.", ex_zh: "我的韓語程度進步了很多。" },
            { id: 1414, word: "일기", meaning: "日記、手帳", ex_kr: "저는 매일 밤에 일기를 써요.", ex_zh: "我每天晚上都寫日記。" },
            { id: 1415, word: "땅", meaning: "地面；土地", ex_kr: "비가 와서 땅이 젖었어요.", ex_zh: "因為下雨，地面是濕的。" },
            { id: 1416, word: "실력", meaning: "技能、能力", ex_kr: "그는 축구 실력이 아주 뛰어나요.", ex_zh: "他足球踢得很好。" },
            { id: 1417, word: "정거장", meaning: "車站、停靠站", ex_kr: "다음 정거장에서 내리세요.", ex_zh: "請在下一站下車。" },
            { id: 1418, word: "자격", meaning: "資格", ex_kr: "이 일은 특별한 자격이 필요 없어요.", ex_zh: "這份工作不需要特殊資格。" },
            { id: 1419, word: "치과", meaning: "牙醫", ex_kr: "이가 아파서 치과에 갔어요.", ex_zh: "我牙疼，所以去看牙醫了。" },
            { id: 1420, word: "마치다", meaning: "完成", ex_kr: "오늘 일을 모두 마쳤어요.", ex_zh: "我今天完成了所有工作。" },
            { id: 1421, word: "차다", meaning: "踢；感到冷；充滿", ex_kr: "바람이 차가우니 옷을 따뜻하게 입으세요.", ex_zh: "風很冷，請注意保暖。" },
            { id: 1422, word: "호", meaning: "一個數字；問題；弧", ex_kr: "저는 101호에 살아요.", ex_zh: "我住在101號公寓。" },
            { id: 1423, word: "행사", meaning: "事件", ex_kr: "이번 주말에 특별한 행사가 있어요.", ex_zh: "本週末有一場特別活動。" },
            { id: 1424, word: "검정", meaning: "黑色的", ex_kr: "그녀는 검정색 원피스를 입고 있었어요.", ex_zh: "她穿著一件黑色洋裝。" },
            { id: 1425, word: "공기", meaning: "空氣；碗", ex_kr: "산은 공기가 맑아요.", ex_zh: "山裡的空氣很清新。" },
            { id: 1426, word: "사오다", meaning: "去買東西並帶過來", ex_kr: "오는 길에 우유 좀 사오세요.", ex_zh: "請在回程的路上買些牛奶。" },
            { id: 1427, word: "모이다", meaning: "聚集、集合、聚會", ex_kr: "회의를 위해 사람들이 모였어요.", ex_zh: "人們聚集在一起開會。" },
            { id: 1428, word: "돌려주다", meaning: "歸還、歸還某物", ex_kr: "빌린 책을 친구에게 돌려줬어요.", ex_zh: "我把借來的書還給了朋友。" },
            { id: 1429, word: "누르다", meaning: "向下按壓、抑制", ex_kr: "엘리베이터 버튼을 눌러 주세요.", ex_zh: "請按電梯按鈕。" },
            { id: 1430, word: "예정", meaning: "行程", ex_kr: "저는 다음 달에 이사할 예정입니다.", ex_zh: "我計劃下個月搬家。" },
            { id: 1431, word: "합격하다", meaning: "通過考試", ex_kr: "열심히 공부해서 시험에 합격했어요.", ex_zh: "我努力學習，通過了考試。" },
            { id: 1432, word: "꽃집", meaning: "花店", ex_kr: "여자친구에게 줄 꽃을 사러 꽃집에 갔어요.", ex_zh: "我去花店買花給女朋友。" },
            { id: 1433, word: "연휴", meaning: "長假、連休", ex_kr: "이번 추석 연휴는 아주 길어요.", ex_zh: "今年的中秋節假期很長。" },
            { id: 1434, word: "발표", meaning: "公告、演示", ex_kr: "내일 수업 시간에 발표를 해야 해요.", ex_zh: "我明天要在課堂上做個報告。" },
            { id: 1435, word: "깨다", meaning: "打破；喚醒", ex_kr: "아침 7시에 잠에서 깼어요.", ex_zh: "我早上7點醒了。" },
            { id: 1436, word: "동시에", meaning: "同時", ex_kr: "텔레비전을 보면서 동시에 밥을 먹었어요.", ex_zh: "我邊看電視邊吃東西。" },
            { id: 1437, word: "대학원", meaning: "研究所", ex_kr: "저는 대학교를 졸업하고 대학원에 갈 거예요.", ex_zh: "大學畢業後，我打算繼續讀研究所。" },
            { id: 1438, word: "계약", meaning: "合約", ex_kr: "집을 사기 위해 계약을 했어요.", ex_zh: "我簽了購屋合約。" },
            { id: 1439, word: "위치", meaning: "位置、地點、站點", ex_kr: "그 건물의 위치가 어디예요?", ex_zh: "那棟大樓位於哪裡？" },
            { id: 1440, word: "흔들다", meaning: "搖晃、揮動、擺動", ex_kr: "친구가 저를 보고 손을 흔들었어요.", ex_zh: "我的朋友看到我，向我揮了揮手。" },
            { id: 1441, word: "빛", meaning: "光、光線、光芒", ex_kr: "어두운 방에 빛이 들어왔어요.", ex_zh: "光線照進了黑暗的房間。" },
            { id: 1442, word: "속옷", meaning: "內衣", ex_kr: "여행 가방에 속옷을 챙겼어요.", ex_zh: "我把內衣褲放在旅行袋裡了。" },
            { id: 1443, word: "고생하다", meaning: "受苦、遭遇困境、遇到麻煩", ex_kr: "그동안 고생 많으셨습니다.", ex_zh: "感謝你的辛勤付出。" },
            { id: 1444, word: "이미지", meaning: "影像", ex_kr: "그 배우는 좋은 이미지를 가지고 있어요.", ex_zh: "那位演員形像很好。" },

            { id: 1447, word: "대중", meaning: "大眾", ex_kr: "이 노래는 대중에게 큰 인기를 얻었어요.", ex_zh: "這首歌在公眾中廣受歡迎。" },
            { id: 1448, word: "전기", meaning: "電力；傳記", ex_kr: "정전이 돼서 전기가 나갔어요.", ex_zh: "由於停電，電力中斷了。" },
            { id: 1449, word: "그룹", meaning: "團體", ex_kr: "저는 BTS라는 그룹을 좋아해요.", ex_zh: "我喜歡防彈少年團(BTS)。" },
            { id: 1450, word: "깜빡하다", meaning: "忘記、一時疏忽", ex_kr: "숙제하는 것을 깜빡했어요.", ex_zh: "我忘了做作業。" },
            { id: 1451, word: "답답하다", meaning: "感到沮喪；感到拘束", ex_kr: "창문을 닫으니까 방이 답답해요.", ex_zh: "因為窗戶關著，房間裡感覺很悶。" },
            { id: 1452, word: "혀", meaning: "舌頭", ex_kr: "뜨거운 것을 먹어서 혀를 데었어요.", ex_zh: "我吃了很燙的東西，燙傷了舌頭。" },
            { id: 1453, word: "기르다", meaning: "養育、照顧；生長", ex_kr: "저는 머리를 길게 기르고 싶어요.", ex_zh: "我想留長頭髮。" },
            { id: 1454, word: "전통", meaning: "傳統", ex_kr: "한복은 한국의 전통 의상입니다.", ex_zh: "韓服是韓國的傳統服飾。" },
            { id: 1455, word: "음악가", meaning: "音樂家", ex_kr: "베토벤은 위대한 음악가입니다.", ex_zh: "貝多芬是一位偉大的音樂家。" },
            { id: 1456, word: "상자", meaning: "盒子", ex_kr: "상자 안에 뭐가 들어 있어요?", ex_zh: "盒子裡裝的是什麼？" },
            { id: 1457, word: "취하다", meaning: "喝醉、醉酒；選擇、挑選、拿取", ex_kr: "어제 술을 너무 많이 마셔서 취했어요.", ex_zh: "我昨天喝多了，喝醉了。" },
            { id: 1458, word: "신청하다", meaning: "申請、請求", ex_kr: "수업을 듣기 위해 수강 신청을 했어요.", ex_zh: "我報名參加了這門課。" },
            { id: 1459, word: "떨다", meaning: "顫抖、搖晃、震動", ex_kr: "너무 추워서 몸을 떨었어요.", ex_zh: "天氣太冷了，我冷得直哆嗦。" },
            { id: 1460, word: "장점", meaning: "優勢、實力、強項", ex_kr: "이 제품의 장점은 가격이 싸다는 것입니다.", ex_zh: "這款產品的優點是價格便宜。" },
            { id: 1461, word: "줄이다", meaning: "減少、降低", ex_kr: "건강을 위해 술을 줄여야 해요.", ex_zh: "為了你的健康，你需要減少飲酒量。" },
            { id: 1462, word: "새로", meaning: "新", ex_kr: "새로 이사 온 집이 마음에 들어요.", ex_zh: "我喜歡我的新房子。" },
            { id: 1463, word: "덕분에", meaning: "由於", ex_kr: "선생님 덕분에 시험에 합격했어요.", ex_zh: "多虧了您，老師，我才通過了考試。" },
            { id: 1464, word: "성인", meaning: "成年人；聖徒", ex_kr: "성인이 되면 술을 마실 수 있어요.", ex_zh: "成年後就可以飲酒了。" },
            { id: 1465, word: "버릇", meaning: "習慣；禮儀", ex_kr: "손톱을 물어뜯는 나쁜 버릇이 있어요.", ex_zh: "我有個壞習慣，就是咬指甲。" },
            { id: 1466, word: "부족하다", meaning: "不足、不夠", ex_kr: "시간이 부족해서 시험을 다 못 봤어요.", ex_zh: "我沒能完成考試，因為時間不夠。" },

            { id: 1468, word: "때때로", meaning: "偶爾", ex_kr: "저는 때때로 혼자 여행을 가요.", ex_zh: "我有時會獨自旅行。" },
            { id: 1469, word: "기대하다", meaning: "期待、展望", ex_kr: "이번 여행이 정말 기대돼요.", ex_zh: "我非常期待這次旅行。" },
            { id: 1470, word: "짜증", meaning: "煩躁、惱怒", ex_kr: "일이 잘 안 풀려서 짜증이 나요.", ex_zh: "我很煩躁，因為事情進展得不太順利。" },
            { id: 1471, word: "달라지다", meaning: "改變、變更、變化", ex_kr: "10년 만에 만난 친구는 많이 달라졌어요.", ex_zh: "十年後我遇到的這位朋友變化很大。" },
            { id: 1472, word: "인삼", meaning: "參", ex_kr: "인삼은 건강에 좋아요.", ex_zh: "人參對健康有益。" },
            { id: 1473, word: "보호하다", meaning: "為了保護", ex_kr: "우리는 환경을 보호해야 합니다.", ex_zh: "我們必須保護環境。" },
            { id: 1474, word: "수저", meaning: "湯匙和筷子", ex_kr: "식사하기 전에 수저를 놓으세요.", ex_zh: "請放下餐具後用餐。" },
            { id: 1475, word: "모임", meaning: "會議、聚會", ex_kr: "이번 주말에 동창회 모임이 있어요.", ex_zh: "我這週末要參加校友聚會。" },
            { id: 1476, word: "회장", meaning: "主席、董事長；大廳、場地", ex_kr: "그는 우리 회사의 회장입니다.", ex_zh: "他是我們公司的董事長。" },
            { id: 1477, word: "훌륭하다", meaning: "優秀、極佳、卓越、精湛", ex_kr: "그는 훌륭한 지도자입니다.", ex_zh: "他是一位傑出的領導者。" },
            { id: 1478, word: "웃음", meaning: "笑聲、微笑", ex_kr: "그녀의 웃음소리는 정말 듣기 좋아요.", ex_zh: "她的笑聲聽起來真好聽。" },

            { id: 1480, word: "못생기다", meaning: "醜陋、沒有吸引力", ex_kr: "저는 제 자신이 못생겼다고 생각하지 않아요.", ex_zh: "我不覺得自己醜。" },
            { id: 1481, word: "드레스", meaning: "裙子", ex_kr: "결혼식에서 신부는 하얀 드레스를 입어요.", ex_zh: "婚禮上，新娘穿著白色婚紗。" },
            { id: 1482, word: "칭찬하다", meaning: "讚揚、恭維", ex_kr: "선생님께서 제 숙제를 칭찬해 주셨어요.", ex_zh: "老師稱讚了我的作業。" },
            { id: 1483, word: "신호등", meaning: "紅綠燈", ex_kr: "신호등이 빨간불일 때는 건너면 안 돼요.", ex_zh: "紅燈時你不應該過馬路。" },
            { id: 1484, word: "그치다", meaning: "停止做某事、停止", ex_kr: "오후가 되자 비가 그쳤어요.", ex_zh: "下午雨停了。" },
            { id: 1485, word: "실내", meaning: "室內", ex_kr: "실내에서는 신발을 벗어야 해요.", ex_zh: "進入室內必須脫鞋。" },

            { id: 1487, word: "매년", meaning: "每年", ex_kr: "우리 가족은 매년 여름에 바다로 휴가를 가요.", ex_zh: "我們家每年夏天都會去海邊度假。" },
            { id: 1488, word: "회식", meaning: "同事之間一起用餐", ex_kr: "오늘 저녁에 회사 회식이 있어요.", ex_zh: "我今晚有個公司晚宴。" },
            { id: 1489, word: "푸르다", meaning: "是藍色、綠色", ex_kr: "봄의 산은 푸르다.", ex_zh: "春天的山巒一片翠綠。" },
            { id: 1490, word: "소포", meaning: "包裹", ex_kr: "고향에 계신 부모님께 소포를 보냈어요.", ex_zh: "我寄了個包裹給家裡的父母。" },
            { id: 1491, word: "하숙집", meaning: "寄宿公寓", ex_kr: "저는 대학교 근처 하숙집에서 살아요.", ex_zh: "我住在大學附近的一間寄宿公寓。" },
            { id: 1492, word: "알아듣다", meaning: "理解、捕捉、觀看", ex_kr: "선생님 말씀을 잘 알아들을 수 없었어요.", ex_zh: "我沒怎麼聽懂老師在講什麼。" },
            { id: 1493, word: "낡다", meaning: "老舊、破損", ex_kr: "이 신발은 너무 낡았어요.", ex_zh: "這雙鞋太舊了。" },
            { id: 1494, word: "서두르다", meaning: "快點、加快", ex_kr: "늦었으니 서둘러 주세요.", ex_zh: "時間不早了，請快點。" },
            { id: 1495, word: "비용", meaning: "費用、成本", ex_kr: "이번 여행에 비용이 얼마나 들었어요?", ex_zh: "這次旅行花了多少錢？" },
            { id: 1496, word: "코피", meaning: "鼻血", ex_kr: "피곤해서 코피가 났어요.", ex_zh: "我因為太累而流鼻血了。" },
            { id: 1497, word: "음료수", meaning: "飲料、飲品", ex_kr: "시원한 음료수 한 잔 주세요.", ex_zh: "請給我一杯冷飲。" },
            { id: 1498, word: "키우다", meaning: "飼養、養育、繁殖", ex_kr: "저는 집에서 강아지를 키워요.", ex_zh: "我家養了一隻狗。" },
            { id: 1499, word: "이불", meaning: "毯子", ex_kr: "추워서 이불을 덮었어요.", ex_zh: "因為冷，我用毯子把自己包了起來。" },
            { id: 1500, word: "썰다", meaning: "切碎、剁碎、切片", ex_kr: "김치를 작게 썰어 주세요.", ex_zh: "請將泡菜切成小塊。" },
            { id: 1501, word: "늘어나다", meaning: "變長；增加", ex_kr: "인구가 계속 늘어나고 있어요.", ex_zh: "人口持續成長。" },
            { id: 1502, word: "명절", meaning: "傳統節慶", ex_kr: "추석은 한국의 가장 큰 명절 중 하나입니다.", ex_zh: "中秋節是韓國最重要的節日之一。" },
            { id: 1503, word: "이르다", meaning: "到達、抵達；早到、過早；告訴、說", ex_kr: "아침에 너무 이른 시간에 도착했어요.", ex_zh: "我早上到得太早了。" },
            { id: 1504, word: "변호사", meaning: "律師", ex_kr: "제 꿈은 훌륭한 변호사가 되는 것입니다.", ex_zh: "我的夢想是成為一名偉大的律師。" },
            { id: 1505, word: "무", meaning: "蘿蔔", ex_kr: "무로 시원한 국을 끓였어요.", ex_zh: "我用蘿蔔做了一道清爽的湯。" },
            { id: 1506, word: "하늘색", meaning: "天藍色", ex_kr: "오늘 하늘은 맑은 하늘색이에요.", ex_zh: "今天天空湛藍。" },
            { id: 1507, word: "티셔츠", meaning: "T恤", ex_kr: "여름에는 티셔츠를 자주 입어요.", ex_zh: "夏天我常穿T卹。" },
            { id: 1508, word: "목표", meaning: "目標、目的", ex_kr: "올해 제 목표는 책 100권을 읽는 것입니다.", ex_zh: "我今年的目標是讀100本書。" },
            { id: 1509, word: "잡채", meaning: "炒蔬菜麵條", ex_kr: "생일잔치 음식으로 잡채를 만들었어요.", ex_zh: "我為生日派對做了雜菜。" },
            { id: 1510, word: "고구마", meaning: "甘藷", ex_kr: "겨울에 먹는 군고구마는 정말 맛있어요.", ex_zh: "冬天吃烤地瓜真的很好吃。" },
            { id: 1511, word: "익숙해지다", meaning: "習慣", ex_kr: "이제 새로운 환경에 익숙해졌어요.", ex_zh: "我現在已經適應了新環境。" },
            { id: 1512, word: "오른손", meaning: "右手", ex_kr: "저는 오른손으로 글씨를 써요.", ex_zh: "我用右手寫字。" },
            { id: 1513, word: "한강", meaning: "漢江", ex_kr: "한강에서 자전거를 탔어요.", ex_zh: "我在漢江上騎腳踏車。" },
            { id: 1514, word: "늙다", meaning: "變老、成為老人", ex_kr: "사람은 누구나 늙어요.", ex_zh: "人都會變老。" },
            { id: 1515, word: "그립다", meaning: "被思念、即被愛；思念、即渴望", ex_kr: "고향에 계신 부모님이 그리워요.", ex_zh: "我想念家裡的父母。" },
            { id: 1516, word: "어젯밤", meaning: "昨晚", ex_kr: "어젯밤에 잠을 잘 못 잤어요.", ex_zh: "我昨晚沒睡好。" },
            { id: 1517, word: "마음대로", meaning: "隨心所欲、在方便的時候", ex_kr: "마음대로 하세요.", ex_zh: "隨你便。" },
            { id: 1518, word: "상추", meaning: "萵苣", ex_kr: "고기를 상추에 싸서 먹어요.", ex_zh: "我用生菜把肉包起來吃。" },
            { id: 1519, word: "수술", meaning: "手術", ex_kr: "아버지가 오늘 병원에서 수술을 받으셨어요.", ex_zh: "我父親今天在醫院做了手術。" },
            { id: 1520, word: "박수", meaning: "鼓掌、掌聲", ex_kr: "공연이 끝나자 관객들이 박수를 쳤어요.", ex_zh: "演出結束後，觀眾鼓掌。" },
            { id: 1521, word: "무역", meaning: "貿易、商業", ex_kr: "그는 무역 회사에서 일해요.", ex_zh: "他在貿易公司工作。" },
            { id: 1522, word: "들르다", meaning: "順道去看看", ex_kr: "집에 가는 길에 서점에 잠깐 들렀어요.", ex_zh: "回家途中，我順道去了趟書店。" },
            { id: 1523, word: "방문하다", meaning: "參觀", ex_kr: "이번 주말에 친구 집을 방문할 거예요.", ex_zh: "我這週末要去朋友家。" },
            { id: 1524, word: "잔치", meaning: "聚會、盛宴", ex_kr: "이번 주말에 할머니 생신 잔치를 해요.", ex_zh: "我們這個週末要為奶奶辦生日派對。" },
            { id: 1525, word: "스케이트", meaning: "冰鞋", ex_kr: "겨울에 아이스링크에서 스케이트를 탔어요.", ex_zh: "冬天的時候我在溜冰場溜冰。" },
            { id: 1526, word: "손바닥", meaning: "手掌", ex_kr: "손바닥을 펴 보세요.", ex_zh: "試著張開你的手掌。" },
            { id: 1527, word: "단점", meaning: "弱點、缺陷、不足", ex_kr: "이 제품의 단점은 가격이 비싸다는 것입니다.", ex_zh: "這款產品的缺點是價格昂貴。" },
            { id: 1528, word: "콘서트", meaning: "音樂會", ex_kr: "주말에 좋아하는 가수의 콘서트에 갔어요.", ex_zh: "週末我去看了我最喜歡的歌手的演唱會。" },
            { id: 1529, word: "옳다", meaning: "正確、恰當、合適", ex_kr: "당신의 생각이 옳아요.", ex_zh: "你是對的。" },
            { id: 1530, word: "물음", meaning: "問題", ex_kr: "제 물음에 답해주세요.", ex_zh: "請回答我的問題。" },
            { id: 1531, word: "충분하다", meaning: "足夠、就足夠了", ex_kr: "시간이 충분하니 천천히 하세요.", ex_zh: "時間很充裕，所以慢慢來。" },
            { id: 1532, word: "주머니", meaning: "口袋、包包、小袋", ex_kr: "주머니에 손을 넣지 마세요.", ex_zh: "不要把手插進口袋。" },
            { id: 1533, word: "각자", meaning: "每一個、每一個", ex_kr: "각자 자기 자리에 앉으세요.", ex_zh: "請各位入座。" },
            { id: 1534, word: "금연", meaning: "禁止吸煙", ex_kr: "이 건물은 금연입니다.", ex_zh: "本樓內禁止吸煙。" },
            { id: 1535, word: "여행사", meaning: "旅行社", ex_kr: "여행사를 통해 비행기 표를 예약했어요.", ex_zh: "我透過旅行社預訂了機票。" },
            { id: 1536, word: "독서하다", meaning: "讀書", ex_kr: "저는 조용한 곳에서 독서하는 것을 좋아해요.", ex_zh: "我喜歡在安靜的地方看書。" },
            { id: 1537, word: "넘어지다", meaning: "跌倒", ex_kr: "길이 미끄러워서 넘어졌어요.", ex_zh: "我跌倒了，因為路面太滑。" },
            { id: 1538, word: "쳐다보다", meaning: "看(某物)、凝視(某物)", ex_kr: "왜 저를 그렇게 쳐다보세요?", ex_zh: "為什麼你要那樣看著我？" },
            { id: 1539, word: "곰", meaning: "熊", ex_kr: "동물원에서 큰 곰을 봤어요.", ex_zh: "我在動物園看到了一隻大熊。" },
            { id: 1540, word: "심하다", meaning: "沉重的、嚴厲的、苛刻的", ex_kr: "감기가 심해서 학교에 못 갔어요.", ex_zh: "我得了重感冒，所以沒能去上學。" },
            { id: 1541, word: "볶다", meaning: "煎炸、烤製", ex_kr: "양파를 기름에 볶아 주세요.", ex_zh: "請用油炒香洋蔥。" },
            { id: 1542, word: "영화관", meaning: "電影院", ex_kr: "주말에는 영화관에 사람이 많아요.", ex_zh: "週末電影院裡人很多。" },
            { id: 1543, word: "주위", meaning: "週長、週邊；周圍環境", ex_kr: "학교 주위에 맛있는 식당이 많아요.", ex_zh: "學校附近有很多美味的餐廳。" },
            { id: 1544, word: "연기", meaning: "表演、演出；煙", ex_kr: "그 배우는 연기를 정말 잘해요.", ex_zh: "那位演員演技真的很好。" },
            { id: 1545, word: "놓이다", meaning: "被安置；感到寬慰", ex_kr: "책상 위에 책이 놓여 있어요.", ex_zh: "桌上有一本書。" },
            { id: 1546, word: "온도", meaning: "溫度", ex_kr: "오늘 온도가 몇 도예요?", ex_zh: "今天氣溫是多少？" },
            { id: 1547, word: "선풍기", meaning: "電扇", ex_kr: "더워서 선풍기를 켰어요.", ex_zh: "因為天氣熱，所以我打開了風扇。" },
            { id: 1548, word: "걸음", meaning: "步", ex_kr: "그는 걸음이 아주 빨라요.", ex_zh: "他走路很快。" },
            { id: 1549, word: "이리", meaning: "來、這邊；狼", ex_kr: "이리 와서 앉으세요.", ex_zh: "過來坐這裡。" },
            { id: 1550, word: "방송국", meaning: "電台", ex_kr: "저는 방송국에서 일하고 싶어요.", ex_zh: "我想在廣播電台工作。" },
            { id: 1551, word: "주인공", meaning: "主角、主要角色", ex_kr: "이 소설의 주인공은 누구인가요?", ex_zh: "這部小說的主角是誰？" },
            { id: 1552, word: "밤색", meaning: "棕色、栗色", ex_kr: "저는 밤색 코트를 샀어요.", ex_zh: "我買了一件棕色外套。" },
            { id: 1553, word: "참석하다", meaning: "務必出席。", ex_kr: "내일 회의에 꼭 참석해 주세요.", ex_zh: "請務必參加明天的會議。" },
            { id: 1554, word: "신부", meaning: "新娘；天主教神父", ex_kr: "오늘 결혼식의 신부가 정말 아름다워요.", ex_zh: "今天婚禮上的新娘真漂亮。" },
            { id: 1555, word: "콩", meaning: "豆", ex_kr: "저는 콩으로 만든 두부를 좋아해요.", ex_zh: "我喜歡用大豆製成的豆腐。" },
            { id: 1556, word: "찬물", meaning: "冷水", ex_kr: "더울 때는 찬물로 샤워하는 것이 좋아요.", ex_zh: "天氣熱的時候洗個冷水澡很舒服。" },
            { id: 1557, word: "글씨", meaning: "字母、字跡", ex_kr: "글씨를 예쁘게 써 주세요.", ex_zh: "請字跡工整。" },
            { id: 1558, word: "서양", meaning: "西方", ex_kr: "서양 문화에 대해 배우고 싶어요.", ex_zh: "我想了解西方文化。" },
            { id: 1559, word: "길이", meaning: "長度", ex_kr: "이 바지는 길이가 너무 길어요.", ex_zh: "這條褲子太長了。" },
            { id: 1560, word: "밥솥", meaning: "電鍋", ex_kr: "밥솥에 밥이 다 되었어요.", ex_zh: "電飯煲裡的米飯煮好了。" },
            { id: 1561, word: "나머지", meaning: "其餘部分、剩餘部分", ex_kr: "나머지 숙제는 내일까지 하세요.", ex_zh: "請在明天之前完成剩下的作業。" },
            { id: 1562, word: "젊은이", meaning: "青年人、年輕人", ex_kr: "요즘 젊은이들은 생각이 자유로워요.", ex_zh: "現在的年輕人思想都很自由。" },
            { id: 1563, word: "높이다", meaning: "提高、使更高", ex_kr: "목소리를 좀 더 높여 주세요.", ex_zh: "請再提高音量。" },
            { id: 1564, word: "글자", meaning: "字母、字符", ex_kr: "이 글자가 무슨 뜻이에요?", ex_zh: "這個字元是什麼意思？" },
            { id: 1565, word: "똑바로", meaning: "直截了當、直接；老實說、坦白說", ex_kr: "똑바로 걸으세요.", ex_zh: "徑直走。" },
            { id: 1566, word: "안전하다", meaning: "為了安全、可靠", ex_kr: "안전벨트를 매는 것이 안전해요.", ex_zh: "係安全帶是安全的。" },
            { id: 1567, word: "할인", meaning: "折扣", ex_kr: "이 가게는 지금 할인 행사를 하고 있어요.", ex_zh: "這家商店目前正在進行折扣促銷。" },
            { id: 1568, word: "통화하다", meaning: "透過電話交談", ex_kr: "친구와 1시간 동안 통화했어요.", ex_zh: "我和朋友聊了一個小時。" },
            { id: 1569, word: "마침", meaning: "巧合的是、", ex_kr: "마침 잘 오셨어요.", ex_zh: "你來得正是時候。" },
            { id: 1570, word: "통장", meaning: "存摺、銀行帳戶", ex_kr: "은행에서 통장을 만들었어요.", ex_zh: "我開了一個銀行帳戶。" },
            { id: 1571, word: "고추", meaning: "辣椒", ex_kr: "한국 음식에는 고추가 많이 들어가요.", ex_zh: "韓國料理大量使用辣椒。" },
            { id: 1572, word: "가늘다", meaning: "纖細苗條", ex_kr: "그녀는 허리가 아주 가늘어요.", ex_zh: "她的腰很細。" },
            { id: 1573, word: "화내다", meaning: "生氣、發洩怒氣", ex_kr: "작은 일에 화내지 마세요.", ex_zh: "不要為小事生氣。" },
            { id: 1574, word: "심다", meaning: "種植", ex_kr: "마당에 나무를 심었어요.", ex_zh: "我在院子裡種了一棵樹。" },
            { id: 1575, word: "알맞다", meaning: "合適的、恰當的", ex_kr: "빈칸에 알맞은 단어를 쓰세요.", ex_zh: "請在空白處填寫適當的字詞。" },
            { id: 1576, word: "몸살", meaning: "身體疼痛", ex_kr: "어제 무리해서 몸살이 났어요.", ex_zh: "我昨天過度勞累，渾身酸痛。" },
            { id: 1577, word: "전화번호", meaning: "電話號碼", ex_kr: "전화번호 좀 알려주시겠어요?", ex_zh: "請問你能給我你的電話號碼嗎？" },
            { id: 1578, word: "교육", meaning: "教育", ex_kr: "모든 아이들은 교육을 받을 권리가 있어요.", ex_zh: "所有兒童都享有受教育的權利。" },
            { id: 1579, word: "교사", meaning: "指導員、教師", ex_kr: "제 꿈은 좋은 교사가 되는 것입니다.", ex_zh: "我的夢想是成為一名優秀的教師。" },
            { id: 1580, word: "부자", meaning: "富人；父子", ex_kr: "그는 열심히 일해서 큰 부자가 되었어요.", ex_zh: "他努力工作，變得非常富有。" },
            { id: 1581, word: "찾아보다", meaning: "尋找、搜尋；訪問", ex_kr: "인터넷에서 정보를 찾아봤어요.", ex_zh: "我在網路上找了相關資訊。" },
            { id: 1582, word: "이전", meaning: "先前的、以前、以前；搬遷、搬家", ex_kr: "이전보다 훨씬 좋아졌어요.", ex_zh: "比以前好多了。" },
            { id: 1583, word: "뱀", meaning: "蛇", ex_kr: "저는 뱀을 무서워해요.", ex_zh: "我怕蛇。" },
            { id: 1584, word: "낮잠", meaning: "午睡", ex_kr: "점심을 먹고 잠깐 낮잠을 잤어요.", ex_zh: "我吃了午飯，然後小睡了一會兒。" },
            { id: 1585, word: "껌", meaning: "口香糖", ex_kr: "졸릴 때 껌을 씹으면 도움이 돼요.", ex_zh: "嚼口香糖有助於緩解嗜睡。" },
            { id: 1586, word: "진하다", meaning: "深色的；濃稠的、厚實的、豐富的", ex_kr: "저는 진한 커피를 좋아해요.", ex_zh: "我喜歡濃咖啡。" },
            { id: 1587, word: "너희", meaning: "你們", ex_kr: "너희들, 조용히 해.", ex_zh: "你們都安靜點。" },
            { id: 1588, word: "양식", meaning: "西式食物；風格、模式；常識；文化、養殖(魚類)", ex_kr: "오늘 저녁은 양식을 먹고 싶어요.", ex_zh: "我今晚想吃西餐。" },
            { id: 1589, word: "부장", meaning: "部門主管", ex_kr: "김 부장님은 우리 부서의 책임자입니다.", ex_zh: "金經理是我們部門的負責人。" },
            { id: 1590, word: "예절", meaning: "禮儀、禮節", ex_kr: "식사 예절을 잘 지켜야 해요.", ex_zh: "您必須遵守正確的餐桌禮儀。" },
            { id: 1591, word: "토끼", meaning: "兔子", ex_kr: "토끼는 귀가 길어요.", ex_zh: "兔子有長長的耳朵。" },
            { id: 1592, word: "끼다", meaning: "繫緊、穿戴；陷入、捲入；陰雲密布、霧濛濛的", ex_kr: "추워서 장갑을 꼈어요.", ex_zh: "因為冷，所以我戴了手套。" },
            { id: 1593, word: "박사", meaning: "醫生、專家", ex_kr: "그는 경제학 박사 학위를 가지고 있어요.", ex_zh: "他擁有經濟學博士學位。" },
            { id: 1594, word: "가리키다", meaning: "指向", ex_kr: "손가락으로 저 사람을 가리켰어요.", ex_zh: "我用手指著那個人。" },
            { id: 1595, word: "만남", meaning: "會議", ex_kr: "우리의 첫 만남을 잊을 수 없어요.", ex_zh: "我永遠不會忘記我們的初次見面。" },
            { id: 1596, word: "오징어", meaning: "魷魚、墨魚", ex_kr: "마른오징어를 안주로 맥주를 마셨어요.", ex_zh: "我喝啤酒，就著魷魚乾當點心吃。" },
            { id: 1597, word: "직원", meaning: "員工、職員", ex_kr: "그 회사에는 직원이 100명 있습니다.", ex_zh: "該公司有100名員工。" },
            { id: 1598, word: "연두색", meaning: "淺綠色", ex_kr: "봄에는 새싹들이 연두색으로 돋아나요.", ex_zh: "春天，嫩芽破土而出，呈淺綠色。" },
            { id: 1599, word: "목욕탕", meaning: "浴室、澡堂", ex_kr: "주말에 목욕탕에 가서 피로를 풀었어요.", ex_zh: "週末我去澡堂緩解疲勞。" },
            { id: 1600, word: "퇴원하다", meaning: "即將出院", ex_kr: "건강이 좋아져서 내일 퇴원해요.", ex_zh: "我的健康狀況已經好轉，明天就可以出院了。" },
            { id: 1601, word: "추억", meaning: "回憶、記憶", ex_kr: "어린 시절의 좋은 추억이 많아요.", ex_zh: "我的童年有很多美好的回憶。" },
            { id: 1602, word: "손수건", meaning: "手帕", ex_kr: "땀을 닦기 위해 손수건을 사용했어요.", ex_zh: "我用手帕擦了擦汗。" },
            { id: 1603, word: "교포", meaning: "居住在海外的韓裔人士", ex_kr: "저는 미국에서 태어난 교포 2세입니다.", ex_zh: "我是在美國出生的第二代韓裔美國人。" },
            { id: 1604, word: "붙이다", meaning: "貼、附著", ex_kr: "벽에 포스터를 붙였어요.", ex_zh: "我在牆上貼了一張海報。" },
            { id: 1605, word: "고속버스", meaning: "快車", ex_kr: "고속버스를 타고 부산에 갔어요.", ex_zh: "我搭乘長途巴士去了釜山。" },
            { id: 1606, word: "모시다", meaning: "陪伴、帶走；款待；服事", ex_kr: "부모님을 모시고 병원에 갔어요.", ex_zh: "我送父母去了醫院。" },
            { id: 1607, word: "늘리다", meaning: "增加、添加；擴展", ex_kr: "단어 실력을 늘리기 위해 매일 공부해요.", ex_zh: "我每天都學習以增加詞彙量。" },
            { id: 1608, word: "한쪽", meaning: "單側、單向", ex_kr: "한쪽 눈이 잘 안 보여요.", ex_zh: "我一隻眼睛視力很差。" },
            { id: 1609, word: "깜짝", meaning: "令人震驚", ex_kr: "친구가 갑자기 나타나서 깜짝 놀랐어요.", ex_zh: "朋友突然出現，我感到很驚訝。" },
            { id: 1610, word: "양", meaning: "數量、數額；綿羊、羔羊", ex_kr: "음식 양이 너무 많아요.", ex_zh: "食物量太多了。" },
            { id: 1611, word: "뽑다", meaning: "挑選、抽取、拔出", ex_kr: "아픈 이를 뽑았어요.", ex_zh: "我拔掉了一顆很痛的牙齒。" },
            { id: 1612, word: "커지다", meaning: "長大、擴張；變得嚴肅", ex_kr: "문제가 점점 커지고 있어요.", ex_zh: "問題越來越嚴重了。" },
            { id: 1613, word: "어려움", meaning: "困難、艱辛", ex_kr: "어려움이 있어도 포기하지 마세요.", ex_zh: "即使遇到困難也不要放棄。" },
            { id: 1614, word: "잘되다", meaning: "進展順利、結果良好", ex_kr: "모든 일이 잘되기를 바랍니다.", ex_zh: "希望一切順利。" },
            { id: 1615, word: "전부", meaning: "全部、全部", ex_kr: "제가 가진 돈은 이게 전부예요.", ex_zh: "這就是我所有的錢了。" },
            { id: 1616, word: "최선", meaning: "最好的", ex_kr: "최선을 다했지만, 결과가 좋지 않았어요.", ex_zh: "我盡力了，但結果並不理想。" },
            { id: 1617, word: "도시락", meaning: "(打包)午餐", ex_kr: "엄마가 싸 주신 도시락을 먹었어요.", ex_zh: "我吃了媽媽為我準備的午餐盒飯。" },
            { id: 1618, word: "오랫동안", meaning: "許久", ex_kr: "오랫동안 당신을 기다렸어요.", ex_zh: "我等你很久了。" },
            { id: 1619, word: "곁", meaning: "旁邊", ex_kr: "항상 제 곁에 있어 주세요.", ex_zh: "請永遠留在我身邊。" },
            { id: 1620, word: "후회하다", meaning: "後悔", ex_kr: "그때 그렇게 말한 것을 후회해요.", ex_zh: "我後悔當時說了那些話。" },
            { id: 1621, word: "담기다", meaning: "放入、包含在", ex_kr: "그의 말에는 진심이 담겨 있었어요.", ex_zh: "他的話語中充滿了真誠。" },
            { id: 1622, word: "일식", meaning: "日式料理；日食", ex_kr: "저는 일식 중에서 초밥을 가장 좋아해요.", ex_zh: "在所有日本料理中，我最喜歡壽司。" },
            { id: 1623, word: "잡히다", meaning: "被抓住、被攫住", ex_kr: "도둑이 경찰에게 잡혔어요.", ex_zh: "小偷被警察抓住了。" },
            { id: 1624, word: "줍다", meaning: "撿起來、收集起來", ex_kr: "길에서 돈을 주웠어요.", ex_zh: "我在街上撿到了錢。" },
            { id: 1625, word: "입학하다", meaning: "進入學校、被學校錄取", ex_kr: "내년에 대학교에 입학해요.", ex_zh: "我明年就要上大學了。" },
            { id: 1626, word: "서류", meaning: "文件、紙張", ex_kr: "회사에 제출할 서류를 준비했어요.", ex_zh: "我已準備好提交給公司的文件。" },
            { id: 1627, word: "맨날", meaning: "總是、每天(非正式)", ex_kr: "그는 맨날 늦어요.", ex_zh: "他總是遲到。" },
            { id: 1628, word: "치료", meaning: "治療、治愈", ex_kr: "의사에게 치료를 받고 있어요.", ex_zh: "我正在接受醫生的治療。" },
            { id: 1629, word: "차리다", meaning: "做好準備；振作起來", ex_kr: "손님을 위해 저녁 식사를 차렸어요.", ex_zh: "我為客人準備了晚餐。" },
            { id: 1630, word: "얼다", meaning: "冷凍、被冷凍", ex_kr: "겨울에는 강물이 얼어요.", ex_zh: "冬天河水會結冰。" },
            { id: 1631, word: "과학자", meaning: "科學家", ex_kr: "아인슈타인은 위대한 과학자입니다.", ex_zh: "愛因斯坦是一位偉大的科學家。" },
            { id: 1632, word: "바르다", meaning: "穿戴", ex_kr: "빵에 잼을 발라 먹었어요.", ex_zh: "我在麵包上抹了果醬，然後吃了。" },
            { id: 1633, word: "깊이", meaning: "深度；深深地", ex_kr: "그 문제에 대해 깊이 생각해 봤어요.", ex_zh: "我認真思考了這個問題。" },
            { id: 1634, word: "서비스", meaning: "服務；免費贈送東西", ex_kr: "이 식당은 서비스가 아주 좋아요.", ex_zh: "這家餐廳的服務非常好。" },
            { id: 1635, word: "왼손", meaning: "左手", ex_kr: "저는 왼손잡이입니다.", ex_zh: "我是左撇子。" },
            { id: 1636, word: "상하다", meaning: "變質、腐爛；受傷", ex_kr: "날씨가 더워서 음식이 쉽게 상해요.", ex_zh: "天氣炎熱，食物容易變質。" },
            { id: 1637, word: "이루다", meaning: "實現、完成；製作、形成", ex_kr: "드디어 꿈을 이루었어요.", ex_zh: "我終於實現了我的夢想。" },
            { id: 1638, word: "그만두다", meaning: "放棄(工作、學業等)；戒除(喝酒等)", ex_kr: "너무 힘들어서 회사를 그만뒀어요.", ex_zh: "我辭職了，因為工作太難了。" },
            { id: 1639, word: "성공", meaning: "成功", ex_kr: "그는 사업에 크게 성공했어요.", ex_zh: "他在商業上非常成功。" },
            { id: 1640, word: "날아가다", meaning: "飛走", ex_kr: "새가 하늘로 날아갔어요.", ex_zh: "鳥兒飛向天空。" },
            { id: 1641, word: "겨우", meaning: "僅僅", ex_kr: "겨우 기차 시간에 맞춰 도착했어요.", ex_zh: "我差點就趕不上火車了。" },
            { id: 1642, word: "회원", meaning: "會員、會員資格", ex_kr: "헬스클럽 회원으로 가입했어요.", ex_zh: "我辦了健身會員卡。" },
            { id: 1643, word: "꾸다", meaning: "做夢；借", ex_kr: "어젯밤에 좋은 꿈을 꿨어요.", ex_zh: "我昨晚做了個美夢。" },
            { id: 1644, word: "젓다", meaning: "攪拌、鞭打；划船；做手勢", ex_kr: "커피에 설탕을 넣고 잘 저어 주세요.", ex_zh: "在咖啡中加入糖並攪拌均勻。" },
            { id: 1645, word: "식빵", meaning: "麵包", ex_kr: "아침으로 토스트용 식빵을 샀어요.", ex_zh: "我買了切片麵包，準備早餐烤成吐司。" },
            { id: 1646, word: "금지하다", meaning: "禁止、禁令", ex_kr: "이곳에서는 사진 촬영을 금지합니다.", ex_zh: "這裡禁止拍照。" },
            { id: 1647, word: "씹다", meaning: "咀嚼", ex_kr: "음식을 잘 씹어서 먹어야 해요.", ex_zh: "你需要充分咀嚼食物。" },
            { id: 1648, word: "세탁소", meaning: "洗衣店、乾洗店", ex_kr: "와이셔츠를 세탁소에 맡겼어요.", ex_zh: "我把襯衫送去乾洗了。" },
            { id: 1649, word: "청소년", meaning: "青少年、青年、少年", ex_kr: "이 영화는 청소년이 볼 수 없어요.", ex_zh: "這部電影不適合青少年觀看。" },
            { id: 1650, word: "환전하다", meaning: "兌換貨幣", ex_kr: "공항에서 달러를 원으로 환전했어요.", ex_zh: "我在機場把美元換成了韓元。" },
            { id: 1651, word: "손자", meaning: "孫子", ex_kr: "할아버지께서 손자를 아주 예뻐하세요.", ex_zh: "爺爺非常疼愛他的孫子。" },
            { id: 1652, word: "한두", meaning: "一兩個", ex_kr: "한두 시간 후에 다시 올게요.", ex_zh: "我一兩個小時後就回來。" },
            { id: 1653, word: "싣다", meaning: "裝載", ex_kr: "트럭에 짐을 싣고 있어요.", ex_zh: "我正在往卡車上裝貨物。" },
            { id: 1654, word: "허락하다", meaning: "允許、準許", ex_kr: "부모님께서 유학을 허락해 주셨어요.", ex_zh: "我的父母允許我出國留學。" },
            { id: 1655, word: "신선하다", meaning: "保持新鮮", ex_kr: "이 야채는 아주 신선해요.", ex_zh: "這種蔬菜非常新鮮。" },
            { id: 1656, word: "연결하다", meaning: "連接、聯絡、附著", ex_kr: "인터넷에 컴퓨터를 연결했어요.", ex_zh: "我把電腦連接到網路了。" },
            { id: 1657, word: "복도", meaning: "門廳", ex_kr: "복도에서 뛰지 마세요.", ex_zh: "不要在走廊上奔跑。" },
            { id: 1658, word: "밀가루", meaning: "麵粉", ex_kr: "빵은 밀가루로 만들어요.", ex_zh: "麵包是用麵粉做的。" },
            { id: 1659, word: "후배", meaning: "下屬", ex_kr: "회사 후배에게 일을 가르쳐 줬어요.", ex_zh: "我教會了公司一位資歷較淺的同事這項工作。" },
            { id: 1660, word: "살펴보다", meaning: "環顧四周、注意觀察", ex_kr: "주위를 잘 살펴보세요.", ex_zh: "仔細觀察周圍環境。" },
            { id: 1661, word: "친척", meaning: "親屬", ex_kr: "명절에는 친척들이 모두 모여요.", ex_zh: "假日期間，所有親戚都會聚在一起。" },
            { id: 1662, word: "된장", meaning: "大豆醬", ex_kr: "된장으로 맛있는 찌개를 끓였어요.", ex_zh: "我用大醬做了一道美味的燉菜。" },
            { id: 1663, word: "누구나", meaning: "任何人", ex_kr: "이 문제는 누구나 풀 수 있어요.", ex_zh: "任何人都能解決這個問題。" },
            { id: 1664, word: "미술", meaning: "藝術", ex_kr: "저는 미술관에 가는 것을 좋아해요.", ex_zh: "我喜歡去美術館。" },
            { id: 1665, word: "정하다", meaning: "決定、確定、選擇", ex_kr: "여행 날짜를 정했어요.", ex_zh: "我確定了出行日期。" },
            { id: 1666, word: "부치다", meaning: "郵寄、運輸；煎炸", ex_kr: "우체국에 가서 편지를 부쳤어요.", ex_zh: "我去郵局寄了一封信。" },
            { id: 1667, word: "피다", meaning: "盛開、綻放；燃燒", ex_kr: "봄이 되니 꽃이 예쁘게 폈어요.", ex_zh: "春天來了，百花盛開，美不勝收。" },
            { id: 1668, word: "신랑", meaning: "新郎", ex_kr: "오늘 결혼하는 신랑이 참 멋지네요.", ex_zh: "今天結婚的新郎真的很帥。" },
            { id: 1669, word: "교환하다", meaning: "交換、交易", ex_kr: "사이즈가 안 맞아서 옷을 교환했어요.", ex_zh: "我把衣服換了，因為尺寸不合適。" },
            { id: 1670, word: "만일", meaning: "萬一、萬一、假設", ex_kr: "만일 비가 온다면, 약속을 취소해야 해요.", ex_zh: "如果下雨，我們就得取消預約。" },
            { id: 1671, word: "속상하다", meaning: "感到不安、痛苦；令人不安、痛苦", ex_kr: "시험에 떨어져서 너무 속상해요.", ex_zh: "我考試沒過，非常難過。" },
            { id: 1672, word: "선선하다", meaning: "涼爽、令人神清氣爽", ex_kr: "가을에는 날씨가 선선해서 좋아요.", ex_zh: "我喜歡秋天的天氣，因為涼爽。" },
            { id: 1673, word: "기타", meaning: "吉他等。", ex_kr: "저는 기타를 연주하는 것을 좋아해요.", ex_zh: "我喜歡彈吉他。" },
            { id: 1674, word: "김", meaning: "乾海藻；蒸汽", ex_kr: "밥을 김에 싸서 먹어요.", ex_zh: "我用海苔包著米飯吃。" },
            { id: 1675, word: "공중전화", meaning: "公用電話", ex_kr: "요즘은 공중전화를 보기 힘들어요.", ex_zh: "如今很難找到公用電話。" },
            { id: 1676, word: "얇다", meaning: "薄弱、易碎", ex_kr: "여름에는 얇은 옷을 입어요.", ex_zh: "夏天我穿薄衣服。" },
            { id: 1677, word: "적당하다", meaning: "恰當的、適當的、適度的、恰當的", ex_kr: "운동은 건강에 적당히 해야 좋아요.", ex_zh: "適度運動有益健康。" },
            { id: 1678, word: "냄비", meaning: "鍋、平底鍋", ex_kr: "냄비에 물을 끓여 주세요.", ex_zh: "請用鍋子燒開水。" },
            { id: 1679, word: "손녀", meaning: "孫女", ex_kr: "할머니는 손녀를 볼 때마다 웃으세요.", ex_zh: "奶奶每次見到孫女都會微笑。" },
            { id: 1680, word: "속도", meaning: "速度、節奏", ex_kr: "자동차 속도를 줄여 주세요.", ex_zh: "請減速慢行。" },
            { id: 1681, word: "트럭", meaning: "卡車", ex_kr: "큰 트럭이 짐을 싣고 가고 있어요.", ex_zh: "一輛大型卡車正在運送貨物。" },
            { id: 1682, word: "빌딩", meaning: "大樓", ex_kr: "저 높은 빌딩이 우리 회사 건물이에요.", ex_zh: "那棟高樓是我們公司的辦公大樓。" },
            { id: 1683, word: "관객", meaning: "觀眾、旁觀者", ex_kr: "공연장에 관객이 가득 찼어요.", ex_zh: "劇院裡座無虛席。" },
            { id: 1684, word: "음식점", meaning: "餐廳", ex_kr: "이 근처에 맛있는 음식점이 있나요?", ex_zh: "附近有什麼好的餐廳嗎？" },
            { id: 1685, word: "편찮다", meaning: "生病、不舒服", ex_kr: "할머니께서 몸이 편찮으세요.", ex_zh: "我奶奶身體不舒服。" },
            { id: 1686, word: "화려하다", meaning: "華麗、耀眼", ex_kr: "그녀의 드레스는 매우 화려했어요.", ex_zh: "她的裙子非常華麗。" },
            { id: 1687, word: "스스로", meaning: "自己", ex_kr: "스스로 자신의 문제를 해결해야 해요.", ex_zh: "你必須自己解決自己的問題。" },
            { id: 1688, word: "블라우스", meaning: "女式襯衫", ex_kr: "그녀는 하얀 블라우스를 입고 있었어요.", ex_zh: "她穿著一件白色襯衫。" },
            { id: 1689, word: "낚시", meaning: "釣魚", ex_kr: "주말에 아버지와 함께 낚시를 하러 갔어요.", ex_zh: "週末我和父親一起去釣魚了。" },
            { id: 1690, word: "소", meaning: "乳牛", ex_kr: "소는 풀을 먹고 살아요.", ex_zh: "牛以吃草為生。" },
            { id: 1691, word: "지하도", meaning: "地下通道", ex_kr: "지하도를 통해 길을 건넜어요.", ex_zh: "我穿過地下通道過了馬路。" },
            { id: 1692, word: "맡기다", meaning: "把某物託付給某人、委託、存放", ex_kr: "가방을 여기에 맡겨도 될까요?", ex_zh: "我可以把包包放在這裡嗎？" },
            { id: 1693, word: "쏟다", meaning: "傾倒、傾倒", ex_kr: "실수로 커피를 쏟았어요.", ex_zh: "我不小心把咖啡灑了。" },
            { id: 1694, word: "끓다", meaning: "煮沸、慢燉", ex_kr: "물이 끓고 있어요.", ex_zh: "水沸騰了。" },
            { id: 1695, word: "배탈나다", meaning: "胃痛", ex_kr: "찬 음식을 너무 많이 먹어서 배탈났어요.", ex_zh: "我吃了太多冷食，胃不舒服。" },
            { id: 1696, word: "예매하다", meaning: "提前預訂、預約、購買；提前售票", ex_kr: "인기 있는 공연은 미리 예매해야 해요.", ex_zh: "熱門演出需要提前訂票。" },
            { id: 1697, word: "흘리다", meaning: "灑出、流出", ex_kr: "컵을 떨어뜨려서 물을 흘렸어요.", ex_zh: "我把杯子掉地上了，水灑了出來。" },
            { id: 1698, word: "매달", meaning: "每月", ex_kr: "저는 매달 부모님께 용돈을 받아요.", ex_zh: "我每個月都會收到父母發放的生活費。" },
            { id: 1699, word: "장보다", meaning: "去市場、去買菜", ex_kr: "저녁을 만들기 위해 시장에 가서 장을 봤어요.", ex_zh: "我去市場買食材準備做晚餐。" },
            { id: 1700, word: "매다", meaning: "捆綁、束縛", ex_kr: "신발 끈을 꽉 매세요.", ex_zh: "把鞋帶繫緊。" },
            { id: 1701, word: "동아리", meaning: "俱樂部、社團、團體", ex_kr: "저는 대학교에서 춤 동아리에 가입했어요.", ex_zh: "我在大學加入了舞蹈社。" },
            { id: 1702, word: "머리카락", meaning: "頭髮", ex_kr: "바닥에 머리카락이 떨어져 있어요.", ex_zh: "地板上有頭髮。" },
            { id: 1703, word: "붓다", meaning: "傾倒；膨脹", ex_kr: "컵에 물을 부어 주세요.", ex_zh: "請往杯子裡倒水。" },
            { id: 1704, word: "입구", meaning: "入口、大門", ex_kr: "건물 입구에서 만나요.", ex_zh: "我們在大樓入口處見面。" },
            { id: 1705, word: "동양", meaning: "東方", ex_kr: "한국은 동양에 위치한 나라입니다.", ex_zh: "韓國是位於東方的國家。" },
            { id: 1706, word: "배드민턴", meaning: "羽毛球", ex_kr: "공원에서 친구와 배드민턴을 쳤어요.", ex_zh: "我和朋友在公園打羽毛球。" },
            { id: 1707, word: "매표소", meaning: "售票亭", ex_kr: "영화관 매표소에서 표를 샀어요.", ex_zh: "我在電影院售票處買了票。" },
            { id: 1708, word: "운전사", meaning: "司機、專職司機", ex_kr: "버스 운전사가 안전하게 운전해요.", ex_zh: "公車司機安全駕駛。" },
            { id: 1709, word: "굵다", meaning: "厚", ex_kr: "그는 목소리가 굵어요.", ex_zh: "他嗓音低沉。" },
            { id: 1710, word: "건너가다", meaning: "穿過、走過", ex_kr: "다리를 건너갔어요.", ex_zh: "我過了橋。" },
            { id: 1711, word: "집들이", meaning: "喬遷派對", ex_kr: "새로 이사한 친구 집에서 집들이를 했어요.", ex_zh: "我在朋友的新家舉辦了喬遷派對。" },
            { id: 1712, word: "붉다", meaning: "變成紅色、深紅色", ex_kr: "저녁노을이 붉게 물들었어요.", ex_zh: "傍晚的天空變成了紅色。" },
            { id: 1713, word: "붙다", meaning: "堅持、遵守", ex_kr: "벽에 포스터가 붙어 있어요.", ex_zh: "牆上貼著一張海報。" },
            { id: 1714, word: "요금", meaning: "費用", ex_kr: "버스 요금이 얼마예요?", ex_zh: "公車票價是多少？" },
            { id: 1715, word: "보여주다", meaning: "顯示、展示", ex_kr: "사진 좀 보여주세요.", ex_zh: "請把照片給我看。" },
            { id: 1716, word: "시어머니", meaning: "婆婆", ex_kr: "시어머니께서 맛있는 음식을 만들어 주셨어요.", ex_zh: "我婆婆做的飯菜很好吃。" },
            { id: 1717, word: "시다", meaning: "感到酸澀", ex_kr: "레몬은 너무 셔요.", ex_zh: "檸檬太酸了。" },
            { id: 1718, word: "유치원", meaning: "幼稚園", ex_kr: "제 동생은 유치원에 다녀요.", ex_zh: "我的弟弟/妹妹上幼稚園。" },
            { id: 1719, word: "게으르다", meaning: "懶散、懶惰", ex_kr: "그는 게을러서 아무것도 하지 않아요.", ex_zh: "他很懶，所以什麼事都不做。" },
            { id: 1720, word: "역사적", meaning: "歷史", ex_kr: "경주는 역사적인 장소가 많은 도시입니다.", ex_zh: "慶州是個擁有許多歷史遺跡的城市。" },
            { id: 1721, word: "미용실", meaning: "美容院、美髮店", ex_kr: "미용실에 가서 머리를 잘랐어요.", ex_zh: "我去理髮店剪了頭髮。" },
            { id: 1722, word: "서랍", meaning: "抽屜", ex_kr: "서랍 안에 열쇠가 있어요.", ex_zh: "抽屜裡有一把鑰匙。" },
            { id: 1723, word: "연락처", meaning: "聯絡資訊", ex_kr: "연락처 좀 알려주시겠어요?", ex_zh: "請問您能提供一下您的聯絡方式嗎？" },
            { id: 1724, word: "콧물", meaning: "鼻涕、鼻粘液", ex_kr: "감기에 걸려서 콧물이 나요.", ex_zh: "我流鼻涕是因為我感冒了。" },
            { id: 1725, word: "깨끗이", meaning: "乾淨整潔", ex_kr: "방을 깨끗이 청소했어요.", ex_zh: "我徹底打掃了房間。" },
            { id: 1726, word: "떨리다", meaning: "顫抖、發抖、發抖", ex_kr: "너무 긴장해서 손이 떨려요.", ex_zh: "我緊張得雙手都在發抖。" },
            { id: 1727, word: "외출하다", meaning: "出去", ex_kr: "오늘은 날씨가 좋아서 외출하고 싶어요.", ex_zh: "今天天氣很好，所以我想出去走走。" },
            { id: 1728, word: "순서", meaning: "順序、步驟、程序", ex_kr: "순서대로 줄을 서세요.", ex_zh: "請按順序排隊。" },
            { id: 1729, word: "이하", meaning: "低於", ex_kr: "18세 이하 청소년은 이 영화를 볼 수 없습니다.", ex_zh: "未滿18歲的青少年不能觀看這部電影。" },
            { id: 1730, word: "점수", meaning: "分數、標記、等級", ex_kr: "이번 시험에서 좋은 점수를 받았어요.", ex_zh: "我這次考試考得不錯。" },
            { id: 1731, word: "밟다", meaning: "踩上去；尾隨", ex_kr: "다른 사람의 발을 밟지 않도록 조심하세요.", ex_zh: "注意不要踩到別人的腳。" },
            { id: 1732, word: "돌", meaning: "石頭、岩石；一歲", ex_kr: "길에 큰 돌이 있었어요.", ex_zh: "路上有一塊大石頭。" },
            { id: 1733, word: "팔리다", meaning: "待售、有需求", ex_kr: "이 책은 요즘 아주 잘 팔려요.", ex_zh: "這本書最近賣得很好。" },
            { id: 1734, word: "똑같이", meaning: "相等地、平均地", ex_kr: "케이크를 네 조각으로 똑같이 나눴어요.", ex_zh: "我把蛋糕分成了四等份。" },
            { id: 1735, word: "영수증", meaning: "收據", ex_kr: "물건을 사고 영수증을 받았어요.", ex_zh: "我買了一件商品，並收到了收據。" },
            { id: 1736, word: "삼계탕", meaning: "人參雞湯", ex_kr: "여름에 더울 때 삼계탕을 먹으면 힘이 나요.", ex_zh: "夏天天氣炎熱時，吃參雞湯能補充能量。" },
            { id: 1737, word: "센터", meaning: "中心", ex_kr: "저는 스포츠 센터에서 운동해요.", ex_zh: "我在運動中心運動。" },
            { id: 1738, word: "주사", meaning: "注射、針劑", ex_kr: "아파서 병원에 가서 주사를 맞았어요.", ex_zh: "我生病了，所以我去了醫院打了一針。" },
            { id: 1739, word: "단순하다", meaning: "簡單來說", ex_kr: "이 문제는 생각보다 단순해요.", ex_zh: "這個問題比你想像的簡單。" },
            { id: 1740, word: "저금하다", meaning: "為了省錢、請存款", ex_kr: "저는 매달 월급의 일부를 저금해요.", ex_zh: "我每個月都會存下一部分薪水。" },
            { id: 1741, word: "대전", meaning: "大田；大戰；國事儀式", ex_kr: "저는 대전역에서 기차를 탔어요.", ex_zh: "我從大田車站搭火車出發。" },
            { id: 1742, word: "나빠지다", meaning: "情況惡化", ex_kr: "건강이 나빠지지 않도록 조심하세요.", ex_zh: "請注意不要讓自己的健康狀況惡化。" },
            { id: 1743, word: "파도", meaning: "波浪", ex_kr: "바다에 파도가 높게 쳐요.", ex_zh: "海浪很高。" },
            { id: 1744, word: "살짝", meaning: "輕輕地、緩和地；秘密地、偷偷地", ex_kr: "문에 살짝 부딪혔어요.", ex_zh: "我輕輕撞到門了。" },
            { id: 1745, word: "가스", meaning: "氣體", ex_kr: "요리를 하려면 가스레인지를 켜야 해요.", ex_zh: "煮飯時需要打開瓦斯爐。" },
            { id: 1746, word: "목도리", meaning: "圍巾", ex_kr: "추워서 목도리를 했어요.", ex_zh: "因為冷，所以我圍了條圍巾。" },
            { id: 1747, word: "소중하다", meaning: "有價值、重要、珍貴", ex_kr: "가족은 저에게 아주 소중해요.", ex_zh: "我的家人對我來說非常珍貴。" },
            { id: 1748, word: "감다", meaning: "捲起、滾動；清洗；閉上眼睛", ex_kr: "매일 아침에 머리를 감아요.", ex_zh: "我每天早上都會洗頭。" },
            { id: 1749, word: "동료", meaning: "同事、同工", ex_kr: "회사 동료들과 사이좋게 지내요.", ex_zh: "與同事相處融洽。" },
            { id: 1750, word: "촬영", meaning: "拍攝、錄影", ex_kr: "지금 영화 촬영 중입니다.", ex_zh: "我目前正在拍攝一部電影。" },
            { id: 1751, word: "빵집", meaning: "麵包店", ex_kr: "빵집에서 맛있는 빵을 샀어요.", ex_zh: "我在麵包店買了一些好吃的麵包。" },
            { id: 1752, word: "다이어트", meaning: "飲食", ex_kr: "저는 요즘 다이어트를 하고 있어요.", ex_zh: "我最近在節食。" },
            { id: 1753, word: "보고하다", meaning: "報告、通知", ex_kr: "회의 결과를 사장님께 보고했어요.", ex_zh: "我已向老闆報告了會議結果。" },
            { id: 1754, word: "오해하다", meaning: "誤解", ex_kr: "미안해요, 제가 오해했어요.", ex_zh: "對不起，我誤會了。" },
            { id: 1755, word: "무서워하다", meaning: "害怕、恐懼", ex_kr: "제 동생은 어두운 것을 무서워해요.", ex_zh: "我的弟弟妹妹怕黑。" },
            { id: 1756, word: "자유롭다", meaning: "自由", ex_kr: "저는 자유롭게 여행하는 것을 좋아해요.", ex_zh: "我喜歡自由旅行。" },
            { id: 1757, word: "답장", meaning: "回覆、答覆(書面)", ex_kr: "친구의 편지에 답장을 썼어요.", ex_zh: "我給朋友的來信回了信。" },
            { id: 1758, word: "횡단보도", meaning: "行人穿越道", ex_kr: "길을 건널 때는 횡단보도를 이용하세요.", ex_zh: "過馬路時請使用行人穿越道。" },
            { id: 1759, word: "한가하다", meaning: "擁有自由、休閒和空閒時間", ex_kr: "오늘은 일이 없어서 한가해요.", ex_zh: "我今天沒工作，所以空閒。" },
            { id: 1760, word: "디자인", meaning: "設計", ex_kr: "이 옷은 디자인이 아주 독특해요.", ex_zh: "這套服裝的設計非常獨特。" },
            { id: 1761, word: "섞다", meaning: "混合、攪拌", ex_kr: "두 가지 색을 섞어서 새로운 색을 만들었어요.", ex_zh: "我將兩種顏色混合，創造出一種新顏色。" },
            { id: 1762, word: "집안일", meaning: "家務、家事；家庭事務", ex_kr: "주말에는 밀린 집안일을 해야 해요.", ex_zh: "我得利用周末時間把一直拖延的家事做完。" },
            { id: 1763, word: "예습", meaning: "準備、排練", ex_kr: "수업 전에 미리 예습을 하는 것이 좋아요.", ex_zh: "課前做好準備是個好主意。" },
            { id: 1764, word: "익다", meaning: "成熟、熟透、煮熟；熟練、有經驗、熟悉", ex_kr: "고기가 다 익었어요.", ex_zh: "肉已經完全煮熟了。" },
            { id: 1765, word: "우표", meaning: "郵票", ex_kr: "편지를 부치려면 우표가 필요해요.", ex_zh: "寄信需要郵票。" },
            { id: 1766, word: "약사", meaning: "藥師", ex_kr: "약국에서 약사에게 약을 샀어요.", ex_zh: "我在藥房從藥劑師那裡買了藥。" },
            { id: 1767, word: "즐겁게", meaning: "愉快", ex_kr: "어제 친구들과 즐겁게 놀았어요.", ex_zh: "昨天和朋友們玩得很開心。" },
            { id: 1768, word: "꺼지다", meaning: "熄滅、消失", ex_kr: "촛불이 바람에 꺼졌어요.", ex_zh: "蠟燭被風吹熄了。" },
            { id: 1769, word: "풍경", meaning: "風景、景色", ex_kr: "시골의 풍경은 정말 아름다워요.", ex_zh: "鄉村景色真美。" },
            { id: 1770, word: "장난감", meaning: "玩具", ex_kr: "아이가 장난감을 가지고 놀고 있어요.", ex_zh: "孩子正在玩玩具。" },
            { id: 1771, word: "광주", meaning: "光州", ex_kr: "광주는 예술의 도시로 유명해요.", ex_zh: "光州以藝術之都而聞名。" },
            { id: 1772, word: "사이다", meaning: "檸檬青檸汽水", ex_kr: "목이 말라서 시원한 사이다를 마셨어요.", ex_zh: "我當時口渴了，就喝了點冰鎮蘋果酒。" },
            { id: 1773, word: "자동판매기", meaning: "自動販賣機", ex_kr: "자동판매기에서 음료수를 뽑아 마셨어요.", ex_zh: "我從自動販賣機買了一瓶飲料，然後喝了下去。" },
            { id: 1774, word: "중국집", meaning: "中餐館", ex_kr: "오늘 점심은 중국집에서 자장면을 시켜 먹었어요.", ex_zh: "今天中午我在一家中國餐館點了炸醬麵。" },
            { id: 1775, word: "영상", meaning: "圖片、影像、影片；溫度高於冰點", ex_kr: "오늘 낮 기온은 영상 10도입니다.", ex_zh: "今天白天的氣溫是零上10度。" },
            { id: 1776, word: "일어서다", meaning: "站起來", ex_kr: "자리에서 일어서 주세요.", ex_zh: "請站起來。" },
            { id: 1777, word: "무척", meaning: "非常", ex_kr: "오늘 날씨가 무척 덥네요.", ex_zh: "今天天氣很熱。" },
            { id: 1778, word: "아나운서", meaning: "播音員、新聞主播", ex_kr: "그녀는 유명한 뉴스 아나운서입니다.", ex_zh: "她是一位著名的新聞播音員。" },
            { id: 1779, word: "출입", meaning: "入口；進出", ex_kr: "이곳은 관계자 외 출입을 금지합니다.", ex_zh: "只有授權人員才能進入此區域。" },
            { id: 1780, word: "무료", meaning: "免費", ex_kr: "이 공연은 무료로 관람할 수 있습니다.", ex_zh: "您可以免費觀賞這場演出。" },
            { id: 1781, word: "코끼리", meaning: "大象", ex_kr: "코끼리는 코가 길어요.", ex_zh: "大像有很長的鼻子。" },
            { id: 1782, word: "큰소리", meaning: "大聲說話；吹噓", ex_kr: "도서관에서 큰소리로 떠들면 안 돼요.", ex_zh: "在圖書館裡不應該大聲說話。" },
            { id: 1783, word: "새우", meaning: "蝦、對蝦", ex_kr: "저는 새우튀김을 좋아해요.", ex_zh: "我喜歡炸蝦。" },
            { id: 1784, word: "연극", meaning: "戲劇、舞台表演", ex_kr: "대학로에 가서 재미있는 연극을 봤어요.", ex_zh: "我去了大學路，看了有趣的話劇。" },
            { id: 1785, word: "국적", meaning: "國籍、公民身份", ex_kr: "국적이 어디세요?", ex_zh: "你的國籍是什麼？" },
            { id: 1786, word: "초대장", meaning: "(書面)邀請", ex_kr: "친구에게서 결혼식 초대장을 받았어요.", ex_zh: "我收到朋友寄來的婚禮邀請卡。" },
            { id: 1787, word: "스웨터", meaning: "毛衣", ex_kr: "추워서 두꺼운 스웨터를 입었어요.", ex_zh: "因為天氣冷，所以我穿了一件厚毛衣。" },
            { id: 1788, word: "짝", meaning: "一組中的一位、夥伴", ex_kr: "양말 한 짝을 잃어버렸어요.", ex_zh: "我丟了一隻襪子。" },
            { id: 1789, word: "더욱", meaning: "越來越、越來越多的", ex_kr: "날씨가 더욱 추워지고 있어요.", ex_zh: "天氣越來越冷了。" },
            { id: 1790, word: "또는", meaning: "或者", ex_kr: "버스 또는 지하철을 타고 갈 수 있어요.", ex_zh: "你可以搭公車或地鐵到達那裡。" },
            { id: 1791, word: "동대문", meaning: "東大門", ex_kr: "동대문 시장에 쇼핑하러 갔어요.", ex_zh: "我去東大門市場購物了。" },
            { id: 1792, word: "위층", meaning: "樓上", ex_kr: "위층에서 시끄러운 소리가 들려요.", ex_zh: "我聽到樓上傳來很大的噪音。" },
            { id: 1793, word: "노트북", meaning: "筆記型電腦", ex_kr: "카페에서 노트북으로 일을 하고 있어요.", ex_zh: "我在咖啡館裡用筆記型電腦工作。" },
            { id: 1794, word: "스카프", meaning: "圍巾", ex_kr: "봄에 예쁜 스카프를 하고 싶어요.", ex_zh: "春天我想戴一條漂亮的圍巾。" },
            { id: 1795, word: "빨다", meaning: "洗(衣服)；吸", ex_kr: "더러워진 옷을 빨아야 해요.", ex_zh: "我得洗髒衣服。" },
            { id: 1796, word: "한턱내다", meaning: "請客吃飯或喝酒", ex_kr: "월급날이니까 제가 한턱낼게요.", ex_zh: "今天是發薪日，我請你吃飯。" },
            { id: 1797, word: "항공권", meaning: "機票", ex_kr: "여행을 가기 위해 항공권을 예매했어요.", ex_zh: "我訂了一張機票準備去旅行。" },
            { id: 1798, word: "쌀쌀하다", meaning: "感到寒冷", ex_kr: "아침저녁으로 날씨가 쌀쌀해요.", ex_zh: "早晚天氣較冷。" },
            { id: 1799, word: "회", meaning: "時間、輪次(計數)；酸橙；生魚", ex_kr: "저는 신선한 회를 좋아해요.", ex_zh: "我喜歡新鮮的生魚片。" },
            { id: 1800, word: "윷놀이", meaning: "擲柶遊戲(韓國遊戲)", ex_kr: "설날에 가족들과 함께 윷놀이를 했어요.", ex_zh: "我和家人在農曆新年那天玩了擲柶遊戲。" },
            { id: 1801, word: "내과", meaning: "內科", ex_kr: "배가 아파서 내과에 갔어요.", ex_zh: "我肚子疼，所以去了內科門診。" },
            { id: 1802, word: "고추장", meaning: "紅辣椒醬", ex_kr: "떡볶이를 만들 때 고추장이 필요해요.", ex_zh: "製作炒年糕需要辣椒醬。" },
            { id: 1803, word: "연세", meaning: "年齡", ex_kr: "할머니 연세가 어떻게 되세요?", ex_zh: "你奶奶多大了？" },
            { id: 1804, word: "관리", meaning: "行政管理；政府官員", ex_kr: "건강 관리를 잘해야 해요.", ex_zh: "你需要好好照顧自己的身體。" },
            { id: 1805, word: "올림픽", meaning: "奧運", ex_kr: "4년마다 올림픽이 열려요.", ex_zh: "奧運每四年舉辦一次。" },
            { id: 1806, word: "볶음밥", meaning: "炒飯", ex_kr: "점심으로 김치볶음밥을 만들었어요.", ex_zh: "我午餐做了泡菜炒飯。" },
            { id: 1807, word: "항공", meaning: "航空、飛行", ex_kr: "저는 항공 회사에서 일하고 싶어요.", ex_zh: "我想在航空公司工作。" },
            { id: 1808, word: "체육관", meaning: "健身房", ex_kr: "학생들이 체육관에서 농구를 하고 있어요.", ex_zh: "學生們正在體育館打籃球。" },
            { id: 1809, word: "수리하다", meaning: "修理、修復；接受、接收", ex_kr: "고장 난 컴퓨터를 수리했어요.", ex_zh: "我修好了壞掉的電腦。" },
            { id: 1810, word: "안방", meaning: "主臥室", ex_kr: "안방은 부모님께서 사용하세요.", ex_zh: "父母請使用主臥。" },
            { id: 1811, word: "화가", meaning: "畫家、藝術家", ex_kr: "피카소는 유명한 화가입니다.", ex_zh: "畢卡索是一位著名畫家。" },
            { id: 1812, word: "하얀색", meaning: "白色的", ex_kr: "저는 하얀색 옷을 좋아해요.", ex_zh: "我喜歡白色衣服。" },
            { id: 1813, word: "어린아이", meaning: "孩子", ex_kr: "어린아이들이 놀이터에서 놀고 있어요.", ex_zh: "孩子們在操場上玩耍。" },
            { id: 1814, word: "애들", meaning: "孩子們", ex_kr: "애들이 밖에서 시끄럽게 놀고 있어요.", ex_zh: "孩子們在外面大聲玩耍。" },
            { id: 1815, word: "탁구", meaning: "乒乓球", ex_kr: "저는 친구와 탁구 치는 것을 좋아해요.", ex_zh: "我喜歡和朋友們一起打乒乓球。" },
            { id: 1816, word: "접다", meaning: "折疊", ex_kr: "종이를 반으로 접으세요.", ex_zh: "將紙對折。" },
            { id: 1817, word: "와이셔츠", meaning: "襯衫", ex_kr: "정장을 입을 때 와이셔츠를 입어요.", ex_zh: "我穿西裝時會搭配襯衫。" },
            { id: 1818, word: "외삼촌", meaning: "舅", ex_kr: "외삼촌은 저에게 아주 잘해주셔요.", ex_zh: "我叔叔對我很好。" },
            { id: 1819, word: "출퇴근하다", meaning: "通勤", ex_kr: "저는 매일 지하철로 출퇴근해요.", ex_zh: "我每天都搭地鐵上下班。" },
            { id: 1820, word: "결심하다", meaning: "決定", ex_kr: "새해에는 담배를 끊기로 결심했어요.", ex_zh: "我決定在新的一年戒菸。" },
            { id: 1821, word: "킬로그램", meaning: "公斤", ex_kr: "제 몸무게는 60킬로그램입니다.", ex_zh: "我的體重是60公斤。" },
            { id: 1822, word: "스키장", meaning: "滑雪度假村", ex_kr: "겨울에 스키장에 가서 스키를 탔어요.", ex_zh: "冬天我去滑雪勝地滑雪了。" },
            { id: 1823, word: "터미널", meaning: "終端", ex_kr: "고속버스 터미널에서 버스를 탔어요.", ex_zh: "我在長途汽車站搭乘巴士。" },
            { id: 1824, word: "탕수육", meaning: "咕嚕肉", ex_kr: "중국집에서 자장면과 탕수육을 시켰어요.", ex_zh: "我在一家中國餐館點了炸醬麵和糖醋肉。" },
            { id: 1825, word: "뛰어가다", meaning: "跑、衝刺", ex_kr: "늦어서 학교까지 뛰어갔어요.", ex_zh: "我遲到了，所以就跑去學校。" },
            { id: 1826, word: "안개", meaning: "霧、薄霧", ex_kr: "아침에 안개가 짙게 꼈어요.", ex_zh: "今天早上有霧。" },
            { id: 1827, word: "짬뽕", meaning: "中式辣麵湯", ex_kr: "저는 자장면보다 짬뽕을 더 좋아해요.", ex_zh: "我喜歡海鮮麵而不是炸醬麵。" },
            { id: 1828, word: "헬스클럽", meaning: "健身俱樂部、健身房", ex_kr: "건강을 위해 헬스클럽에 다녀요.", ex_zh: "我去健身房是為了健康。" },
            { id: 1829, word: "된장찌개", meaning: "大醬燉菜", ex_kr: "저는 한식 중에서 된장찌개를 가장 좋아해요.", ex_zh: "在所有韓國料理中，我最喜歡大醬湯。" },
            { id: 1830, word: "숙소", meaning: "住宿、招待所", ex_kr: "여행을 가기 전에 숙소를 예약했어요.", ex_zh: "我在旅行前就預訂了住宿。" },
            { id: 1831, word: "태극기", meaning: "韓國國旗", ex_kr: "올림픽에서 태극기가 올라갔어요.", ex_zh: "韓國國旗在奧運會上升起。" },
            { id: 1832, word: "물고기", meaning: "魚", ex_kr: "강에 물고기가 많이 살아요.", ex_zh: "河裡生活著許多魚類。" },
            { id: 1833, word: "카레", meaning: "咖哩", ex_kr: "오늘 저녁 메뉴는 카레라이스입니다.", ex_zh: "今晚的晚餐是咖哩飯。" },
            { id: 1834, word: "뜨다", meaning: "漂浮；上升；睜開", ex_kr: "아침에 눈을 뜨기 힘들었어요.", ex_zh: "早上睜開眼都很困難。" },
            { id: 1835, word: "귀여워하다", meaning: "親切地對待", ex_kr: "할머니는 저를 아주 귀여워하세요.", ex_zh: "我奶奶非常疼愛我。" },
            { id: 1836, word: "갚다", meaning: "償還、償還", ex_kr: "친구에게 빌린 돈을 갚았어요.", ex_zh: "我已經把向朋友借的錢還清了。" },
            { id: 1837, word: "설렁탕", meaning: "牛肉麵湯", ex_kr: "추운 날에는 따뜻한 설렁탕이 생각나요.", ex_zh: "在寒冷的日子裡，我特別想喝熱呼呼的雪濃湯。" },
            { id: 1838, word: "성적", meaning: "等級、分數、結果；性", ex_kr: "이번 학기 성적이 잘 나왔어요.", ex_zh: "我這學期的成績不錯。" },
            { id: 1839, word: "올리다", meaning: "舉起、抬起；提供", ex_kr: "무거운 짐을 선반 위로 올렸어요.", ex_zh: "我把重物放在架子上了。" },
            { id: 1840, word: "두부", meaning: "豆腐", ex_kr: "두부는 콩으로 만들어요.", ex_zh: "豆腐是由大豆製成的。" },
            { id: 1841, word: "여쭤보다", meaning: "問", ex_kr: "궁금한 것이 있으면 선생님께 여쭤보세요.", ex_zh: "如有任何疑問，請向老師提問。" },
            { id: 1842, word: "시간표", meaning: "日程安排、時間表", ex_kr: "이번 학기 시간표가 나왔어요.", ex_zh: "本學期課程表已公佈。" },
            { id: 1843, word: "생신", meaning: "生日", ex_kr: "할머니 생신을 축하드려요.", ex_zh: "奶奶，生日快樂。" },
            { id: 1844, word: "울음", meaning: "哭泣", ex_kr: "아기의 울음소리가 들렸어요.", ex_zh: "我聽到了嬰兒的哭聲。" },
            { id: 1845, word: "필통", meaning: "鉛筆盒", ex_kr: "필통 안에 연필과 지우개가 있어요.", ex_zh: "鉛筆盒裡有一支鉛筆和一塊橡皮擦。" },
            { id: 1846, word: "돌아가시다", meaning: "去世、逝世", ex_kr: "할아버지께서 작년에 돌아가셨어요.", ex_zh: "我祖父去年去世了。" },
            { id: 1847, word: "세배", meaning: "新年鞠躬", ex_kr: "설날에 어른들께 세배를 드렸어요.", ex_zh: "農曆新年那天，我向長輩鞠躬。" },
            { id: 1848, word: "연예인", meaning: "藝人、名人", ex_kr: "저는 좋아하는 연예인이 있어요.", ex_zh: "我有一個最喜歡的名人。" },
            { id: 1849, word: "틀다", meaning: "扭轉、轉動；打開", ex_kr: "음악을 좀 틀어 주세요.", ex_zh: "請播放一些音樂。" },
            { id: 1850, word: "태풍", meaning: "颱風", ex_kr: "태풍 때문에 비바람이 몰아쳤어요.", ex_zh: "颱風帶來狂風暴雨。" },
            { id: 1851, word: "귀찮다", meaning: "麻煩的、煩人的、惱人的", ex_kr: "밖에 나가기 귀찮아서 그냥 집에 있었어요.", ex_zh: "我懶得出門，所以就待在家裡。" },
            { id: 1852, word: "활발하다", meaning: "活潑、活躍", ex_kr: "제 친구는 성격이 아주 활발해요.", ex_zh: "我的朋友個性非常活潑開朗。" },
            { id: 1853, word: "찌다", meaning: "增重；悶熱；用蒸氣烹飪", ex_kr: "요즘 살이 쪄서 걱정이에요.", ex_zh: "我最近體重增加了，這讓我很擔心。" },
            { id: 1854, word: "단풍", meaning: "秋色斑斕的落葉", ex_kr: "가을에는 설악산 단풍이 아주 아름다워요.", ex_zh: "雪嶽山的秋葉非常美麗。" },
            { id: 1855, word: "메다", meaning: "扛在肩上；哽咽", ex_kr: "가방을 어깨에 멨어요.", ex_zh: "我把包包挎在肩上。" },
            { id: 1856, word: "일식집", meaning: "日本餐廳", ex_kr: "친구와 일식집에 가서 초밥을 먹었어요.", ex_zh: "我和朋友去了一家日本餐廳，吃了壽司。" },
            { id: 1857, word: "관광객", meaning: "遊客", ex_kr: "명동에는 외국인 관광객이 많아요.", ex_zh: "明洞有很多外國遊客。" },
            { id: 1858, word: "쓰레기통", meaning: "垃圾桶、廢紙簍", ex_kr: "쓰레기는 쓰레기통에 버려 주세요.", ex_zh: "請把垃圾丟進垃圾桶。" },
            { id: 1859, word: "청년", meaning: "年輕人、年輕人", ex_kr: "요즘 많은 청년들이 취업을 걱정하고 있어요.", ex_zh: "如今，許多年輕人都在為找不到工作而擔憂。" },
            { id: 1860, word: "택배", meaning: "包裹遞送服務", ex_kr: "인터넷으로 주문한 물건이 택배로 도착했어요.", ex_zh: "我在網路上訂購的商品已透過快遞送達。" },
            { id: 1861, word: "밤새", meaning: "整夜", ex_kr: "시험공부 때문에 밤새 잠을 못 잤어요.", ex_zh: "因為要複習考試，我整夜都沒睡著。" },

            { id: 2070, word: "기업", meaning: "企業、商業", ex_kr: "그는 큰 기업을 운영하고 있어요.", ex_zh: "他經營著一家大公司。" },

            { id: 2078, word: "발전", meaning: "發展、成長", ex_kr: "한국 경제는 빠르게 발전했어요.", ex_zh: "韓國經濟發展迅速。" },
            { id: 2079, word: "생명", meaning: "生活", ex_kr: "물은 생명 유지에 필수적입니다.", ex_zh: "水是維持生命所必需的。" },
            { id: 2080, word: "아쉽다", meaning: "感到遺憾、悲傷", ex_kr: "벌써 헤어져야 한다니 아쉽네요.", ex_zh: "真可惜，我們這麼快就要分道揚鑣了。" },
            { id: 2081, word: "금년", meaning: "今年", ex_kr: "금년 목표는 무엇인가요?", ex_zh: "今年的目標是什麼？" },
            { id: 2082, word: "기술", meaning: "技能、技巧；描述", ex_kr: "최신 기술을 배웠어요.", ex_zh: "我學習了最新技術。" },
            { id: 2083, word: "심각하다", meaning: "嚴重的、嚴肅的、嚴厲的", ex_kr: "상황이 생각보다 심각해요.", ex_zh: "情況比預想的嚴重。" },

            { id: 2088, word: "가능성", meaning: "可能性、機率；潛力", ex_kr: "성공할 가능성이 높아요.", ex_zh: "成功的可能性很高。" },

            { id: 2091, word: "웃기다", meaning: "逗樂、搞笑", ex_kr: "그 코미디언은 정말 웃겨요.", ex_zh: "那位喜劇演員真的很搞笑。" },
            { id: 2092, word: "세기", meaning: "世紀", ex_kr: "21세기는 기술의 시대입니다.", ex_zh: "21世紀是科技時代。" },

            { id: 2101, word: "마찬가지", meaning: "相同、一致、相等", ex_kr: "저도 마찬가지로 생각해요.", ex_zh: "我也是這麼想的。" },

            { id: 2112, word: "음악회", meaning: "音樂會", ex_kr: "어제 저녁에 음악회에 다녀왔어요.", ex_zh: "我昨晚去看了一場音樂會。" },

            { id: 2133, word: "한편", meaning: "一邊、一隻手；同時", ex_kr: "한편, 다른 곳에서는 축제가 열리고 있었다.", ex_zh: "同時，別處正在舉行一個節日。" },

            { id: 2146, word: "벌", meaning: "懲罰、處罰；蜜蜂", ex_kr: "숙제를 안 해서 벌을 섰어요.", ex_zh: "我因為沒做作業而被罰站著。" },
            { id: 2147, word: "일반", meaning: "一般的、常見的", ex_kr: "일반 쓰레기는 여기에 버려주세요.", ex_zh: "請在此處丟棄一般垃圾。" },
            { id: 2148, word: "믿음", meaning: "信念、信任", ex_kr: "서로에 대한 믿음이 중요해요.", ex_zh: "彼此信任很重要。" },
            { id: 2149, word: "지구", meaning: "地球、球體；區域、地帶", ex_kr: "지구는 둥급니다.", ex_zh: "地球是圓的。" },
            { id: 2150, word: "떨어뜨리다", meaning: "掉落(某物)", ex_kr: "실수로 핸드폰을 떨어뜨렸어요.", ex_zh: "我不小心把手機摔了。" },
            { id: 2151, word: "골프", meaning: "高爾夫球", ex_kr: "주말에 골프를 치러 갔어요.", ex_zh: "我周末去打了高爾夫。" },
            { id: 2152, word: "더하다", meaning: "加起來、總結；變得更糟、更難", ex_kr: "2에 3을 더하면 5가 됩니다.", ex_zh: "2加3等於5。" },
            { id: 2153, word: "주장하다", meaning: "斷言、爭辯、堅持", ex_kr: "그는 자신의 무죄를 주장했어요.", ex_zh: "他聲稱自己無罪。" },
            { id: 2154, word: "환경", meaning: "環境", ex_kr: "환경을 보호합시다.", ex_zh: "讓我們一起保護環境。" },
            { id: 2155, word: "인정하다", meaning: "承認", ex_kr: "그는 자신의 실수를 인정했어요.", ex_zh: "他承認了自己的錯誤。" },
            { id: 2156, word: "뜻하다", meaning: "意味著、象徵；打算、計劃、目標", ex_kr: "이 단어가 무엇을 뜻하는지 아세요?", ex_zh: "你知道這個字的意思嗎？" },
            { id: 2157, word: "진행하다", meaning: "要繼續前進、請繼續", ex_kr: "회의를 계속 진행하겠습니다.", ex_zh: "我將繼續主持會議。" },
            { id: 2158, word: "최대", meaning: "最大的、最大的", ex_kr: "이 버스는 최대 40명까지 탈 수 있어요.", ex_zh: "這輛巴士最多可搭載 40 人。" },
            { id: 2159, word: "한라산", meaning: "漢拿山", ex_kr: "제주도에 있는 한라산에 올라갔어요.", ex_zh: "我攀登了濟州島的漢拿山。" },
            { id: 2160, word: "한숨", meaning: "嘆息；休息、暫停", ex_kr: "그는 깊은 한숨을 내쉬었어요.", ex_zh: "他深深地嘆了口氣。" },
            { id: 2161, word: "오토바이", meaning: "摩托車", ex_kr: "오토바이를 탈 때는 헬멧을 써야 해요.", ex_zh: "騎摩托車時必須配戴安全帽。" },
            { id: 2162, word: "질리다", meaning: "感到疲倦、厭倦", ex_kr: "매일 같은 음식을 먹어서 질렸어요.", ex_zh: "我厭倦了每天吃同樣的食物。" },
            { id: 2163, word: "사정", meaning: "原因；情況、環境", ex_kr: "피치 못할 사정으로 결석했습니다.", ex_zh: "我因不可避免的情況而缺席。" },
            { id: 2164, word: "좌회전하다", meaning: "左轉", ex_kr: "다음 사거리에서 좌회전하세요.", ex_zh: "在下一個路口左轉。" },
            { id: 2165, word: "대본", meaning: "劇本", ex_kr: "배우들이 대본을 외우고 있어요.", ex_zh: "演員們正在背台詞。" },
            { id: 2166, word: "요새", meaning: "如今、目前；堡壘", ex_kr: "요새 어떻게 지내세요?", ex_zh: "你最近過得怎麼樣？" },
            { id: 2167, word: "그대", meaning: "親愛的", ex_kr: "그대 없이는 살 수 없어요.", ex_zh: "沒有你我活不下去。" },
            { id: 2168, word: "복", meaning: "福氣、好運", ex_kr: "새해 복 많이 받으세요.", ex_zh: "新年快樂" },
            { id: 2169, word: "문구", meaning: "文具；片語、句子", ex_kr: "학교 앞 문구점에서 공책을 샀어요.", ex_zh: "我在學校前面的文具店買了一本筆記本。" },
            { id: 2170, word: "국가", meaning: "國家、民族", ex_kr: "국가를 위해 봉사하고 싶어요.", ex_zh: "我想為國家效力。" },
            { id: 2171, word: "팬", meaning: "粉絲", ex_kr: "저는 그 가수의 열렬한 팬이에요.", ex_zh: "我是那位歌手的鐵粉。" },
            { id: 2172, word: "마음속", meaning: "人的思想、人的內心", ex_kr: "그녀는 마음속으로 기도했어요.", ex_zh: "她在心中祈禱。" },
            { id: 2173, word: "빗", meaning: "梳子", ex_kr: "빗으로 머리를 빗었어요.", ex_zh: "我用梳子梳了頭髮。" },
            { id: 2174, word: "소비자", meaning: "消費者", ex_kr: "소비자의 권리를 보호해야 합니다.", ex_zh: "消費者權益必須受到保護。" },
            { id: 2175, word: "남색", meaning: "靛藍色、深藍色", ex_kr: "그는 남색 정장을 입고 있었어요.", ex_zh: "他身穿一套海軍藍西裝。" },
            { id: 2176, word: "정부", meaning: "政府", ex_kr: "정부는 새로운 정책을 발표했어요.", ex_zh: "政府宣布了一項新政策。" },
            { id: 2177, word: "햇살", meaning: "陽光、陽光", ex_kr: "따스한 햇살이 창가로 들어와요.", ex_zh: "溫暖的陽光透過窗戶灑進來。" },
            { id: 2178, word: "큰일", meaning: "嚴重事件", ex_kr: "지갑을 잃어버려서 큰일이에요.", ex_zh: "我的錢包丟了，這真是個大問題。" },
            { id: 2179, word: "과정", meaning: "過程；課程", ex_kr: "결과보다 과정이 중요할 때도 있어요.", ex_zh: "有時過程比結果更重要。" },
            { id: 2180, word: "옥수수", meaning: "玉米", ex_kr: "삶은 옥수수가 맛있어요.", ex_zh: "水煮玉米很好吃。" },
            { id: 2181, word: "일부러", meaning: "故意地、蓄意地", ex_kr: "일부러 그런 것은 아니에요.", ex_zh: "我不是故意的。" },
            { id: 2182, word: "과제", meaning: "任務、作業", ex_kr: "교수님이 과제를 내주셨어요.", ex_zh: "教授給我們安排了一項作業。" },
            { id: 2183, word: "각종", meaning: "各種各樣的", ex_kr: "마트에는 각종 과일이 진열되어 있어요.", ex_zh: "超市裡陳列著各種各樣的水果。" },
            { id: 2184, word: "잇다", meaning: "要連接、請加入", ex_kr: "두 점을 선으로 이으세요.", ex_zh: "用直線連接這兩點。" },
            { id: 2185, word: "수염", meaning: "鬍鬚、小鬍子、鬢角", ex_kr: "아버지는 수염을 기르셨어요.", ex_zh: "我父親留起了鬍子。" },
            { id: 2186, word: "계산서", meaning: "支票、帳單", ex_kr: "여기 계산서 좀 주세요.", ex_zh: "請把帳單給我。" },
            { id: 2187, word: "삶", meaning: "生活", ex_kr: "행복한 삶을 살고 싶어요.", ex_zh: "我想過幸福的生活。" },
            { id: 2188, word: "직행", meaning: "直行、直接", ex_kr: "서울로 가는 직행버스를 탔어요.", ex_zh: "我搭乘直達巴士前往首爾。" },
            { id: 2189, word: "나서다", meaning: "幹預", ex_kr: "어려운 일에 먼저 나서는 사람이 되세요.", ex_zh: "在困難情況下，要第一個挺身而出。" },
            { id: 2190, word: "감동하다", meaning: "感動、被觸動", ex_kr: "그 영화를 보고 감동했어요.", ex_zh: "看完那部電影後，我深受感動。" },
            { id: 2191, word: "특징", meaning: "顯著特徵、特徵", ex_kr: "이 제품의 가장 큰 특징은 가벼움입니다.", ex_zh: "這款產品最大的特色就是輕巧。" },
            { id: 2192, word: "쌍둥이", meaning: "雙胞胎", ex_kr: "그들은 얼굴이 똑같은 쌍둥이예요.", ex_zh: "他們是同卵雙胞胎。" },
            { id: 2193, word: "발견하다", meaning: "發現、找到", ex_kr: "과학자가 새로운 별을 발견했어요.", ex_zh: "一位科學家發現了一顆新恆星。" },
            { id: 2194, word: "오히려", meaning: "更確切地說、最好", ex_kr: "약보다 오히려 운동이 건강에 좋아요.", ex_zh: "實際上，運動比藥物更有益於健康。" },
            { id: 2195, word: "우회전하다", meaning: "向右轉", ex_kr: "교차로에서 우회전하세요.", ex_zh: "在十字路口右轉。" },
            { id: 2196, word: "상태", meaning: "狀況、狀態", ex_kr: "환자의 상태가 많이 좋아졌어요.", ex_zh: "患者病情已大為改善。" },
            { id: 2197, word: "녹음하다", meaning: "錄製", ex_kr: "수업 내용을 녹음했어요.", ex_zh: "我錄製了課堂內容。" },
            { id: 2198, word: "완전하다", meaning: "完美、完整", ex_kr: "이 기계는 완전히 고장 났어요.", ex_zh: "這台機器徹底壞了。" },
            { id: 2199, word: "기초", meaning: "基礎、根基、基地", ex_kr: "이 책은 한국어 기초를 다지기에 좋아요.", ex_zh: "這本書很適合用來打好韓語基礎。" },
            { id: 2200, word: "연예", meaning: "娛樂", ex_kr: "그는 연예 기획사에 들어갔어요.", ex_zh: "他加入了一家娛樂經紀公司。" },
            { id: 2201, word: "금속", meaning: "金屬", ex_kr: "이 제품은 금속으로 만들어졌어요.", ex_zh: "本產品由金屬製成。" },
            { id: 2202, word: "왠지", meaning: "不知何故、出於某種原因", ex_kr: "오늘은 왠지 기분이 좋아요.", ex_zh: "不知為何，我今天感覺很好。" },
            { id: 2203, word: "기본", meaning: "基礎、根基、基本", ex_kr: "기본이 튼튼해야 실력이 늘어요.", ex_zh: "你需要紮實的基礎才能提陞技能。" },
            { id: 2204, word: "뒷문", meaning: "後門", ex_kr: "뒷문으로 나가주세요.", ex_zh: "請從後門離開。" },
            { id: 2205, word: "감정", meaning: "感覺、情緒；怨恨、敵意；評價、估價", ex_kr: "자신의 감정을 솔직하게 표현하세요.", ex_zh: "坦誠地表達你的感受。" },
            { id: 2206, word: "경쟁", meaning: "競賽", ex_kr: "기업 간의 경쟁이 치열해요.", ex_zh: "企業間的競爭非常激烈。" },
            { id: 2207, word: "내밀다", meaning: "突出、延伸", ex_kr: "악수를 하려고 손을 내밀었어요.", ex_zh: "我伸出手去握手。" },
            { id: 2208, word: "흙", meaning: "泥土、土壤、污垢", ex_kr: "화분에 흙을 채웠어요.", ex_zh: "我把花盆裝滿了土。" },
            { id: 2209, word: "마련하다", meaning: "準備、安排", ex_kr: "내 집 마련을 위해 저축하고 있어요.", ex_zh: "我正在存錢買自己的房子。" },
            { id: 2210, word: "막", meaning: "剛剛；嚴重地、粗心地；窗簾", ex_kr: "지금 막 도착했어요.", ex_zh: "我剛到。" },
            { id: 2211, word: "검", meaning: "劍", ex_kr: "무사가 검을 휘둘렀어요.", ex_zh: "戰士揮舞著劍而出。" },
            { id: 2212, word: "물다", meaning: "咬", ex_kr: "모기가 팔을 물었어요.", ex_zh: "一隻蚊子咬了我的手臂。" },
            { id: 2213, word: "금발", meaning: "金髮", ex_kr: "그녀는 금발 머리가 잘 어울려요.", ex_zh: "金髮很適合她。" },
            { id: 2214, word: "태양", meaning: "太陽", ex_kr: "태양이 붉게 타오르고 있어요.", ex_zh: "太陽紅得像火燒一樣。" },
            { id: 2215, word: "현실", meaning: "現實、現實", ex_kr: "꿈과 현실은 다를 수 있어요.", ex_zh: "夢想與現實可能有所不同。" },
            { id: 2216, word: "안주", meaning: "佐酒小食；安於現狀、自滿", ex_kr: "맥주 안주로 치킨을 시켰어요.", ex_zh: "我點了炸雞當小吃，配上啤酒。" },
            { id: 2217, word: "학습", meaning: "學習", ex_kr: "반복 학습이 중요해요.", ex_zh: "重複學習很重要。" },
            { id: 2218, word: "주먹", meaning: "拳頭", ex_kr: "그는 주먹을 꽉 쥐었어요.", ex_zh: "他緊緊握住了拳頭。" },
            { id: 2219, word: "수입", meaning: "收入；進口", ex_kr: "그는 수입의 일부를 저축해요.", ex_zh: "他會把收入的一部分存起來。" },
            { id: 2220, word: "터", meaning: "場地、地面", ex_kr: "여기가 예전에 궁궐이 있던 터예요.", ex_zh: "這裡曾是宮殿的所在地。" },
            { id: 2221, word: "마침내", meaning: "最終、終於、最後", ex_kr: "마침내 그들이 결혼했어요.", ex_zh: "最後，他們結婚了。" },
            { id: 2222, word: "가만히", meaning: "靜止不動", ex_kr: "가만히 있지 말고 뭐라도 해보세요.", ex_zh: "不要只是坐著不動，試著做點什麼。" },
            { id: 2223, word: "산업", meaning: "產業", ex_kr: "한국의 IT 산업은 세계적입니다.", ex_zh: "韓國的IT產業處於世界級水準。" },
            { id: 2224, word: "욕조", meaning: "浴缸", ex_kr: "욕조에 따뜻한 물을 받았어요.", ex_zh: "我往浴缸裡放滿了溫水。" },
            { id: 2225, word: "시도하다", meaning: "嘗試、嘗試", ex_kr: "새로운 방법을 시도해 봤어요.", ex_zh: "我嘗試了一種新方法。" },
            { id: 2226, word: "목장", meaning: "農場、牧場", ex_kr: "목장에서 양들이 풀을 뜯고 있어요.", ex_zh: "羊群正在牧場裡吃草。" },
            { id: 2227, word: "노약자", meaning: "年老體弱者", ex_kr: "버스에는 노약자석이 따로 있어요.", ex_zh: "公車上設有優先座位。" },
            { id: 2228, word: "하양", meaning: "白色、白色", ex_kr: "하양 셔츠는 깔끔해 보여요.", ex_zh: "白襯衫看起來很整齊。" },
            { id: 2229, word: "도둑", meaning: "賊", ex_kr: "집에 도둑이 들었어요.", ex_zh: "一名竊賊闖入了房子。" },
            { id: 2230, word: "막다", meaning: "阻止、關閉", ex_kr: "경찰이 길을 막고 있어요.", ex_zh: "警方封鎖了道路。" },
            { id: 2231, word: "여우", meaning: "狐狸", ex_kr: "여우는 꾀가 많은 동물이에요.", ex_zh: "狐狸是一種聰明的動物。" },
            { id: 2232, word: "및", meaning: "以及", ex_kr: "학생 및 교직원은 강당으로 모이세요.", ex_zh: "學生和教職員請在禮堂集合。" },
            { id: 2233, word: "신사", meaning: "紳士", ex_kr: "그는 매너가 좋은 신사예요.", ex_zh: "他是一位舉止得體的紳士。" },
            { id: 2234, word: "죽음", meaning: "死亡", ex_kr: "그의 갑작스러운 죽음은 충격이었어요.", ex_zh: "他的突然離世令人震驚。" },
            { id: 2235, word: "풀", meaning: "草；膠水", ex_kr: "정원에 풀이 많이 자랐어요.", ex_zh: "花園裡長出了很多草。" },
            { id: 2236, word: "의심", meaning: "懷疑、猜疑", ex_kr: "그는 의심 받을 행동을 하지 않았어요.", ex_zh: "他沒有做任何會引起懷疑的事。" },
            { id: 2237, word: "전문가", meaning: "專家、專業人士", ex_kr: "이 문제에 대해서는 전문가와 상의하세요.", ex_zh: "請就此問題諮詢專家。" },
            { id: 2238, word: "즉시", meaning: "立即、馬上、毫不遲疑", ex_kr: "문제가 생기면 즉시 보고하세요.", ex_zh: "如果出現問題，請立即回報。" },
            { id: 2239, word: "큰형", meaning: "男孩的大哥", ex_kr: "큰형은 벌써 결혼했어요.", ex_zh: "我大哥已經結婚了。" },
            { id: 2240, word: "장남", meaning: "長子", ex_kr: "그는 우리 집안의 장남이에요.", ex_zh: "他是我們家的長子。" },
            { id: 2241, word: "형태", meaning: "形式、形狀", ex_kr: "구름이 재미있는 형태를 하고 있어요.", ex_zh: "這些雲的形狀很有趣。" },
            { id: 2242, word: "이상형", meaning: "理想類型", ex_kr: "제 이상형은 친절한 사람이에요.", ex_zh: "我理想型的人是善良的。" },
            { id: 2243, word: "남방", meaning: "襯衫；南方", ex_kr: "편안한 체크무늬 남방을 입었어요.", ex_zh: "我穿了一件舒適的格子襯衫。" },
            { id: 2244, word: "평화", meaning: "和平", ex_kr: "세계 평화를 기원합니다.", ex_zh: "我祈禱世界和平。" },
            { id: 2245, word: "주요", meaning: "主要、首要、主要", ex_kr: "신문의 주요 기사를 읽었어요.", ex_zh: "我閱讀了報紙上的主要文章。" },
            { id: 2246, word: "욕심", meaning: "貪婪", ex_kr: "너무 욕심을 부리지 마세요.", ex_zh: "不要太貪婪。" },
            { id: 2247, word: "명함", meaning: "名片", ex_kr: "처음 만난 사람과 명함을 교환했어요.", ex_zh: "我和一位初次見面的人交換了名片。" },
            { id: 2248, word: "신체", meaning: "身體", ex_kr: "정기적으로 신체 검사를 받아요.", ex_zh: "我定期進行體檢。" },
            { id: 2249, word: "완벽하다", meaning: "完美無瑕", ex_kr: "그의 연기는 완벽했어요.", ex_zh: "他的演技堪稱完美。" },
            { id: 2250, word: "명령", meaning: "命令、指揮", ex_kr: "군인은 상관의 명령에 따라야 해요.", ex_zh: "士兵必須服從上級命令。" },
            { id: 2251, word: "엊그제", meaning: "幾天前", ex_kr: "엊그제 친구를 만났어요.", ex_zh: "前天我見了一位朋友。" },
            { id: 2252, word: "개다", meaning: "折疊起來；清理乾淨", ex_kr: "빨래를 개서 서랍에 넣었어요.", ex_zh: "我把衣服疊好放進抽屜裡了。" },
            { id: 2253, word: "느껴지다", meaning: "感覺；印象深刻、感動", ex_kr: "가을 분위기가 느껴져요.", ex_zh: "我能感受到秋天的氣息。" },
            { id: 2254, word: "제공하다", meaning: "提供", ex_kr: "이 호텔은 아침 식사를 무료로 제공해요.", ex_zh: "這家飯店提供免費早餐。" },
            { id: 2255, word: "기념", meaning: "紀念", ex_kr: "결혼 10주년 기념 파티를 했어요.", ex_zh: "我們舉辦了派對慶祝結婚十週年。" },
            { id: 2256, word: "흔히", meaning: "通常、經常、一般", ex_kr: "이런 실수는 흔히 발생해요.", ex_zh: "這種錯誤經常發生。" },
            { id: 2257, word: "내놓다", meaning: "拿出來、取出；展示、呈現", ex_kr: "가게 앞에 물건을 내놓았어요.", ex_zh: "我把東西擺在店門口了。" },
            { id: 2258, word: "구입하다", meaning: "購買", ex_kr: "새 차를 구입하려고 해요.", ex_zh: "我打算買輛新車。" },
            { id: 2259, word: "기준", meaning: "標準、準則", ex_kr: "합격 기준이 무엇인가요?", ex_zh: "及格標準是什麼？" },
            { id: 2260, word: "판단하다", meaning: "判斷、決定、做出判斷", ex_kr: "상황을 잘 판단해서 결정하세요.", ex_zh: "請仔細評估情況後再做決定。" },
            { id: 2261, word: "배경", meaning: "背景", ex_kr: "사진의 배경이 아주 멋지네요.", ex_zh: "照片的背景真酷。" },
            { id: 2262, word: "세금", meaning: "稅", ex_kr: "물건 값에는 세금이 포함되어 있어요.", ex_zh: "商品價格已含稅。" },
            { id: 2263, word: "무용", meaning: "舞蹈", ex_kr: "그녀는 대학에서 무용을 전공했어요.", ex_zh: "她大學主修舞蹈。" },
            { id: 2264, word: "무시하다", meaning: "忽略、無視", ex_kr: "남의 의견을 무시하지 마세요.", ex_zh: "不要忽視他人的意見。" },
            { id: 2265, word: "기관", meaning: "引擎；機構、組織；器官", ex_kr: "공공 기관의 업무 시간이 끝났어요.", ex_zh: "該公共機構的辦公時間已結束。" },
            { id: 2266, word: "평생", meaning: "一生、一個人的全部人生", ex_kr: "그들은 평생을 함께 살았어요.", ex_zh: "他們相伴一生。" },
            { id: 2267, word: "통하다", meaning: "經過、流動；流通；被理解", ex_kr: "말이 잘 통하는 친구가 좋아요.", ex_zh: "我喜歡能和我溝通順暢的朋友。" },
            { id: 2268, word: "위로하다", meaning: "安慰、撫慰", ex_kr: "슬퍼하는 친구를 위로해 주었어요.", ex_zh: "我安慰了我難過的朋友。" },
            { id: 2269, word: "방식", meaning: "方法、方式、途徑", ex_kr: "자신만의 방식으로 문제를 해결했어요.", ex_zh: "他用自己的方式解決了這個問題。" },
            { id: 2270, word: "손잡이", meaning: "把手、旋鈕", ex_kr: "버스 손잡이를 꽉 잡으세요.", ex_zh: "抓緊公車扶手。" },
            { id: 2271, word: "충격", meaning: "震驚", ex_kr: "그 소식은 큰 충격이었어요.", ex_zh: "這個消息令人震驚。" },
            { id: 2272, word: "달려오다", meaning: "跑過來", ex_kr: "개가 꼬리를 흔들며 달려왔어요.", ex_zh: "狗搖著尾巴跑了過來。" },
            { id: 2273, word: "과음하다", meaning: "飲酒過量", ex_kr: "어제 회식에서 과음해서 머리가 아파요.", ex_zh: "我頭疼，因為昨天在公司晚宴上喝太多了。" },
            { id: 2274, word: "다가오다", meaning: "靠近、走近", ex_kr: "시험 날짜가 다가오고 있어요.", ex_zh: "考試日期將近。" },
            { id: 2275, word: "낙엽", meaning: "落葉", ex_kr: "가을이 되어 거리에 낙엽이 쌓였어요.", ex_zh: "秋天來了，街道上堆滿了落葉。" },
            { id: 2276, word: "나비", meaning: "蝴蝶", ex_kr: "꽃밭에 나비가 날아다녀요.", ex_zh: "蝴蝶在花園裡飛來飛去。" },
            { id: 2277, word: "가짜", meaning: "仿製品、假貨", ex_kr: "이 가방은 진짜가 아니라 가짜예요.", ex_zh: "這個包不是真的，是假的。" },
            { id: 2278, word: "영향", meaning: "影響、效果", ex_kr: "부모의 행동은 아이에게 큰 영향을 줍니다.", ex_zh: "父母的行為對子女有重大影響。" },
            { id: 2279, word: "강남", meaning: "江南", ex_kr: "강남역에서 친구를 만나기로 했어요.", ex_zh: "我決定在江南站和朋友見面。" },
            { id: 2280, word: "거미", meaning: "蜘蛛", ex_kr: "거미가 거미줄을 치고 있어요.", ex_zh: "蜘蛛正在織網。" },
            { id: 2281, word: "입장하다", meaning: "進入、取得准入", ex_kr: "공연 10분 전까지 입장해 주세요.", ex_zh: "請於演出開始前10分鐘入場。" },
            { id: 2282, word: "편도", meaning: "單程旅行", ex_kr: "편도 티켓만 끊었어요.", ex_zh: "我只買了一張單程票。" },
