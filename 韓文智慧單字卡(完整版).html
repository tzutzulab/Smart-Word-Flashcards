<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>韓文智慧單字卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f7ff; touch-action: manipulation; }
        .card-container { perspective: 1000px; touch-action: none; }
        .card-inner { transition: transform 0.4s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
        .no-transition { transition: none !important; }
        .is-flipped .card-inner { transform: rotateY(180deg); }
        .card-face { backface-visibility: hidden; position: absolute; inset: 0; border: 2px solid #bae6fd; border-radius: 1.5rem; background-color: white; }
        .card-back { transform: rotateY(180deg); }
        .soft-blue-shadow { box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.1); }
        .tab-active { border-bottom: 2px solid #0ea5e9; color: #0ea5e9; }
        .subtab-active { background-color: #0ea5e9; color: white; }
        .details-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .is-open .details-content { max-height: 200px; }
        .rotate-icon { transition: transform 0.3s; }
        .is-open .rotate-icon { transform: rotate(180deg); }
        .voice-btn-z { z-index: 50; position: relative; }
        html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; }
    </style>
</head>
<body class="flex flex-col items-center">

    <nav class="w-full max-w-md bg-white shadow-sm sticky top-0 z-50 flex justify-around">
        <button id="tab-today-btn" class="flex-1 py-4 text-xs font-bold tab-active">今日概覽</button>
        <button id="tab-learn-btn" class="flex-1 py-4 text-xs font-bold text-gray-400">學習複習</button>
        <button id="tab-list-btn" class="flex-1 py-4 text-xs font-bold text-gray-400">單字全集</button>
    </nav>

    <main class="w-full max-w-md px-4 mt-6 h-[calc(100vh-80px)] overflow-y-auto pb-24">
        <!-- 今日概覽視窗 -->
        <section id="view-today" class="space-y-4">
            <div class="px-2 flex flex-col space-y-3">
                <div class="flex bg-sky-50 p-1 rounded-xl">
                    <button id="subtab-new-btn" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all subtab-active">今日新單字</button>
                    <button id="subtab-rev-btn" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-sky-400">今日複習單字</button>
                </div>
            </div>
            
            <div id="preview-card" class="card-container relative w-full h-[480px] cursor-pointer">

                    <div class="card-face soft-blue-shadow flex flex-col items-center justify-center p-8 text-center">
                        <span id="preview-tag" class="absolute top-6 left-6 text-xs font-mono font-bold px-2 py-1 rounded uppercase bg-sky-100 text-sky-700">PREVIEW</span>
                        <div class="absolute top-6 right-6 p-3 text-sky-500 bg-sky-50 rounded-full">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"/></svg>
                        </div>
                        <h2 id="preview-word-kr" class="text-4xl md:text-6xl font-bold text-gray-800 mb-2 transition-all"></h2>
                        <p id="preview-hint" class="absolute bottom-10 text-xs text-sky-300 uppercase font-bold">點擊卡片翻面聽例句</p>
                    </div>
                    <div class="card-back card-face soft-blue-shadow flex flex-col p-8">
                        <div id="preview-back-content">
                            <div class="text-center mb-6 border-b border-sky-50 pb-6 relative">
                                <h3 id="preview-word-kr-back" class="text-2xl md:text-3xl font-bold text-gray-700 mb-2"></h3>
                                <div class="inline-block px-4 py-1 bg-sky-50 rounded-full">
                                    <p id="preview-word-zh" class="text-lg md:text-xl text-sky-600 font-bold"></p>
                                </div>
                                <div class="absolute top-0 right-0">
                                    <button id="preview-voice-back-word-10" class="voice-btn-z p-3 text-sky-500 bg-sky-50 rounded-full transition-colors flex items-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="flex-1 flex flex-col justify-center space-y-6">
                                <div>
                                    <div class="flex justify-between items-center mb-2">
                                        <p class="text-xs text-sky-400 font-bold uppercase">韓文例句</p>
                                        <div class="flex space-x-2">
                                            <button id="preview-voice-ex-10" class="voice-btn-z p-3 text-sky-500 bg-sky-50 rounded-xl hover:bg-sky-100 transition-colors flex items-center space-x-1">
                                                <span class="text-[10px] font-black">1.0</span>
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"/></svg>
                                            </button>
                                            <button id="preview-voice-ex-06" class="voice-btn-z p-3 text-sky-500 bg-sky-50 rounded-xl hover:bg-sky-100 transition-colors flex items-center space-x-1 border border-sky-100">
                                                <span class="text-[10px] font-black">0.6</span>
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"/></svg>
                                            </button>
                                        </div>
                                    </div>
                                    <p id="preview-ex-kr" class="text-gray-700 text-base md:text-lg font-medium leading-relaxed"></p>
                                </div>
                                <div>
                                    <p class="text-xs text-sky-300 font-bold mb-1 uppercase">例句翻譯</p>
                                    <p id="preview-ex-zh" class="text-gray-500 text-xs md:text-sm"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between space-x-4 mt-4">

                </div>
                <button id="preview-next-btn" class="flex-1 py-4 bg-sky-500 text-white rounded-2xl font-bold text-sm shadow-lg shadow-sky-100 active:scale-95 transition-transform">下一個</button>
            </div>
        </section>

        <!-- 學習複習視窗 -->
        <section id="view-learn" class="hidden">
            <div class="flex justify-between items-center mb-4 bg-white p-4 rounded-2xl shadow-sm border border-sky-100">
                <div class="flex-1">
                    <h2 class="text-sm font-bold text-sky-400 uppercase tracking-widest mb-2">測驗進度</h2>
                    <div class="flex items-center space-x-4">

                        </div>
                        <div class="flex items-center space-x-2 border-l border-sky-50 pl-4">
                            <span class="w-2 h-2 bg-blue-300 rounded-full"></span>
                            <span class="text-xs font-bold text-gray-600">新單字: <span id="new-progress">0</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="flashcard" class="card-container relative w-full h-[480px] cursor-pointer">
                <div id="flashcard-inner" class="card-inner">
                    <div class="card-face soft-blue-shadow flex flex-col items-center justify-center p-8 text-center">
                        <span id="card-tag" class="absolute top-6 left-6 text-xs font-mono font-bold px-2 py-1 rounded uppercase"></span>
                        <div class="absolute top-6 right-6">
                            <button id="learn-voice-btn-10" class="voice-btn-z p-3 text-sky-500 bg-sky-50 rounded-full hover:bg-sky-100 flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"/></svg>

                    </div>
                    <div class="card-back card-face soft-blue-shadow flex flex-col p-8 items-center justify-between">
                        <div class="w-full text-center flex flex-col items-center justify-center flex-1">
                            <div class="mb-12">
                                <p id="word-zh" class="text-3xl md:text-4xl px-6 text-sky-800 font-bold"></p>
                            </div>
                        </div>
                        <div class="w-full flex space-x-4 mb-4">

                        </div>
                    </div>
                </div>
            </div>

            <div id="limit-reached-ui" class="hidden flex flex-col items-center justify-center h-[400px] text-center p-8 bg-sky-50 rounded-3xl border-2 border-sky-100 border-dashed">
                <h3 class="text-lg font-bold text-sky-800">今日任務已完成！</h3>
                <p class="text-sm text-sky-600 mt-2">複習完畢，點擊下方查看進度。</p>
                <button onclick="document.getElementById('tab-list-btn').click()" class="mt-6 px-6 py-2 bg-sky-500 text-white rounded-full text-sm font-bold">查看單字庫</button>
            </div>
        </section>

        <!-- 單字列表視窗 -->

                </div>
                <div class="relative">

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 top-2.5 text-sky-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
            </div>
            <div id="vocab-list-container" class="space-y-3 pb-10"></div>
            <div id="list-end-trigger" class="h-10"></div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-10 bg-sky-900/90 text-white px-6 py-4 rounded-3xl opacity-0 transition-all text-sm z-50 pointer-events-none"></div>

            { id: 608, word: "몸", meaning: "身體、人物", ex_kr: "운동을 해서 몸이 건강해졌어요.", ex_zh: "我透過運動變得健康了。" },
            { id: 609, word: "운동장", meaning: "操場、體育場；運動場", ex_kr: "아이들이 운동장에서 놀고 있어요.", ex_zh: "孩子們正在操場上玩耍。" },
            { id: 610, word: "과학", meaning: "科學", ex_kr: "저는 과학 과목을 좋아해요.", ex_zh: "我喜歡科學。" },
            { id: 611, word: "문학", meaning: "文學", ex_kr: "저는 한국 문학에 관심이 많아요.", ex_zh: "我對韓國文學非常感興趣。" },
            { id: 612, word: "더럽다", meaning: "骯髒", ex_kr: "방이 너무 더러워서 청소해야 해요.", ex_zh: "房間太髒了，我得打掃一下。" },
            { id: 613, word: "마리", meaning: "隻", ex_kr: "고양이 세 마리를 키워요.", ex_zh: "我養了三隻貓。" },
            { id: 614, word: "비밀", meaning: "秘密", ex_kr: "이건 비밀이니까 아무에게도 말하지 마세요.", ex_zh: "這是秘密，千萬別告訴任何人。" },
            { id: 615, word: "바다", meaning: "海洋", ex_kr: "여름에 바다에 가고 싶어요.", ex_zh: "夏天我想去海邊。" },
            { id: 616, word: "다치다", meaning: "受傷", ex_kr: "넘어져서 다리를 다쳤어요.", ex_zh: "我摔倒了，腿受傷了。" },
            { id: 617, word: "강", meaning: "河", ex_kr: "한강에서 유람선을 탔어요.", ex_zh: "我搭乘遊輪遊覽了漢江。" },
            { id: 618, word: "콜라", meaning: "可口可樂", ex_kr: "피자하고 콜라를 같이 먹었어요.", ex_zh: "我把披薩和可樂一起吃了。" },
            { id: 619, word: "스포츠", meaning: "運動的", ex_kr: "어떤 스포츠를 좋아하세요?", ex_zh: "你喜歡什麼運動？" },
            { id: 620, word: "역사", meaning: "歷史", ex_kr: "저는 한국 역사에 관심이 많아요.", ex_zh: "我對韓國歷史非常感興趣。" },
            { id: 621, word: "다리", meaning: "腿；橋", ex_kr: "다리가 아파서 걷기 힘들어요.", ex_zh: "我腿疼，走路很困難。" },
            { id: 622, word: "내년", meaning: "明年", ex_kr: "내년에 대학교를 졸업해요.", ex_zh: "我明年就要大學畢業了。" },
            { id: 623, word: "기분", meaning: "情緒、感覺", ex_kr: "오늘 기분이 어때요?", ex_zh: "你今天感覺怎麼樣？" },
            { id: 624, word: "직장", meaning: "工作場所、工作", ex_kr: "새 직장을 구하고 있어요.", ex_zh: "我正在尋找新工作。" },
            { id: 625, word: "강하다", meaning: "強大、有力", ex_kr: "그는 힘이 아주 강해요.", ex_zh: "他力氣很大。" },
            { id: 626, word: "갑자기", meaning: "突然", ex_kr: "갑자기 비가 오기 시작했어요.", ex_zh: "突然下起了雨。" },
            { id: 627, word: "잘못되다", meaning: "出錯", ex_kr: "계획이 뭔가 잘못된 것 같아요.", ex_zh: "我覺得計畫出了點問題。" },
            { id: 628, word: "자리", meaning: "房間、空間、地方；墊子", ex_kr: "제 자리는 어디예요?", ex_zh: "我的座位在哪裡？" },
            { id: 629, word: "연락하다", meaning: "聯繫、保持聯繫", ex_kr: "나중에 연락할게요.", ex_zh: "我稍後會聯絡你。" },
            { id: 630, word: "실례하다", meaning: "被原諒", ex_kr: "실례합니다만, 지금 몇 시예요?", ex_zh: "請問現在幾點了？" },
            { id: 631, word: "지나다", meaning: "經過、走過", ex_kr: "시간이 빨리 지나가요.", ex_zh: "時間過得真快。" },
            { id: 632, word: "파랗다", meaning: "感到憂鬱", ex_kr: "하늘이 아주 파래요.", ex_zh: "天空非常藍。" },
            { id: 633, word: "교수", meaning: "教授；教學、指導", ex_kr: "저희 아버지는 대학교 교수님입니다.", ex_zh: "我父親是大學教授。" },
            { id: 634, word: "사이", meaning: "關係；距離", ex_kr: "저는 동생과 사이가 좋아요.", ex_zh: "我和弟弟關係很好。" },
            { id: 635, word: "부탁하다", meaning: "請求、請幫忙", ex_kr: "부탁 하나만 들어주세요.", ex_zh: "請幫我一個忙。" },
            { id: 636, word: "졸업하다", meaning: "畢業", ex_kr: "저는 내년에 대학교를 졸업해요.", ex_zh: "我明年就要大學畢業了。" },
            { id: 637, word: "그렇게", meaning: "所以、就是這樣。", ex_kr: "그렇게 하지 마세요.", ex_zh: "別那樣做。" },
            { id: 638, word: "궁금하다", meaning: "保持好奇心、心存疑惑", ex_kr: "결과가 어떻게 될지 궁금해요.", ex_zh: "我很想知道結果會如何。" },
            { id: 639, word: "반바지", meaning: "短褲", ex_kr: "여름에는 반바지를 자주 입어요.", ex_zh: "夏天我常穿短褲。" },
            { id: 640, word: "오르다", meaning: "上升、向上", ex_kr: "물가가 많이 올랐어요.", ex_zh: "價格上漲了很多。" },
            { id: 641, word: "건강하다", meaning: "保持健康", ex_kr: "항상 건강하세요.", ex_zh: "保持健康。" },
            { id: 642, word: "교과서", meaning: "教科書", ex_kr: "교과서 50페이지를 보세요.", ex_zh: "請參考課本第50頁。" },
            { id: 643, word: "시원하다", meaning: "涼爽、令人神清氣爽", ex_kr: "바람이 불어서 시원해요.", ex_zh: "因為有風，所以感覺很涼爽。" },
            { id: 644, word: "느낌", meaning: "感覺、知覺", ex_kr: "이 그림은 따뜻한 느낌을 줘요.", ex_zh: "這張照片給人一種溫暖的感覺。" },
            { id: 645, word: "섬", meaning: "島", ex_kr: "제주도는 한국에서 가장 큰 섬이에요.", ex_zh: "濟州島是韓國最大的島嶼。" },
            { id: 646, word: "꼭", meaning: "當然、肯定", ex_kr: "내일 꼭 오세요.", ex_zh: "請務必明天來。" },
            { id: 647, word: "시끄럽다", meaning: "吵鬧", ex_kr: "밖이 너무 시끄러워서 잠을 잘 수 없어요.", ex_zh: "外面太吵了，我睡不著。" },
            { id: 648, word: "소파", meaning: "沙發", ex_kr: "거실 소파에 앉아서 TV를 봐요.", ex_zh: "我坐在客廳的沙發上看電視。" },
            { id: 649, word: "냄새", meaning: "氣味、香味", ex_kr: "부엌에서 맛있는 냄새가 나요.", ex_zh: "廚房裡飄來陣陣香味。" },
            { id: 650, word: "오랜만에", meaning: "過了很久", ex_kr: "오랜만에 친구를 만났어요.", ex_zh: "我很久以來第一次見到了一位朋友。" },
            { id: 651, word: "코", meaning: "鼻子", ex_kr: "감기에 걸려서 코가 막혔어요.", ex_zh: "我感冒了，所以鼻子堵塞。" },
            { id: 652, word: "신경", meaning: "神經", ex_kr: "너무 신경 쓰지 마세요.", ex_zh: "別太擔心。" },
            { id: 653, word: "위험", meaning: "危險、風險", ex_kr: "밤에 혼자 다니는 것은 위험해요.", ex_zh: "夜間獨自出行很危險。" },
            { id: 654, word: "대화", meaning: "對話", ex_kr: "친구와 즐거운 대화를 나눴어요.", ex_zh: "我和朋友進行了一次愉快的談話。" },
            { id: 655, word: "손님", meaning: "客人；顧客", ex_kr: "식당에 손님이 많아요.", ex_zh: "餐廳裡有很多顧客。" },
            { id: 656, word: "어리다", meaning: "年輕的時候、小", ex_kr: "제 동생은 저보다 세 살 어려요.", ex_zh: "我的弟弟比我小三歲。" },
            { id: 657, word: "바람", meaning: "風、微風；願望、渴望", ex_kr: "오늘은 바람이 많이 불어요.", ex_zh: "今天風很大。" },
            { id: 658, word: "비행기", meaning: "飛機", ex_kr: "비행기를 타고 제주도에 갔어요.", ex_zh: "我搭飛機去了濟州島。" },
            { id: 659, word: "닦다", meaning: "擦拭；拋光", ex_kr: "식사 후에 이를 닦으세요.", ex_zh: "飯後要刷牙。" },
            { id: 660, word: "넓다", meaning: "寬闊、寬敞", ex_kr: "새로 이사한 집은 아주 넓어요.", ex_zh: "我搬進的新房子非常寬敞。" },
            { id: 661, word: "유학", meaning: "留學；儒家思想", ex_kr: "저는 미국으로 유학을 갈 거예요.", ex_zh: "我打算去美國留學。" },
            { id: 662, word: "입", meaning: "嘴", ex_kr: "입을 크게 벌리세요.", ex_zh: "張大嘴巴。" },
            { id: 663, word: "우체국", meaning: "郵局", ex_kr: "우체국에 가서 편지를 부쳤어요.", ex_zh: "我去郵局寄了一封信。" },
            { id: 664, word: "이제", meaning: "現在(在某事之後)", ex_kr: "이제 집에 가야 해요.", ex_zh: "我現在得回家了。" },
            { id: 665, word: "유행", meaning: "時尚", ex_kr: "요즘은 짧은 치마가 유행이에요.", ex_zh: "短裙現在很流行。" },
            { id: 666, word: "믿다", meaning: "相信、信任", ex_kr: "저는 당신을 믿어요.", ex_zh: "我相信你。" },
            { id: 667, word: "부산", meaning: "屍速列車", ex_kr: "부산은 아름다운 항구 도시입니다.", ex_zh: "釜山是個美麗的港口城市。" },
            { id: 668, word: "약국", meaning: "藥局", ex_kr: "약국에 가서 감기약을 샀어요.", ex_zh: "我去藥局買了感冒藥。" },
            { id: 669, word: "날씬하다", meaning: "身材苗條纖細", ex_kr: "그녀는 키가 크고 날씬해요.", ex_zh: "她身材高挑苗條。" },
            { id: 670, word: "초록색", meaning: "綠色的", ex_kr: "봄이 되면 산이 초록색으로 변해요.", ex_zh: "春天來臨，群山披上了綠色服裝。" },
            { id: 671, word: "즐기다", meaning: "盡情享受", ex_kr: "저는 제 취미 생활을 즐겨요.", ex_zh: "我喜歡我的嗜好。" },
            { id: 672, word: "계획", meaning: "計劃、項目", ex_kr: "이번 주말에 특별한 계획 있어요?", ex_zh: "這個週末有什麼特別的計畫嗎？" },
            { id: 673, word: "꿈", meaning: "夢", ex_kr: "어젯밤에 좋은 꿈을 꿨어요.", ex_zh: "我昨晚做了個美夢。" },
            { id: 674, word: "안다", meaning: "擁抱、握", ex_kr: "엄마가 아기를 안고 있어요.", ex_zh: "媽媽抱著寶寶。" },
            { id: 675, word: "당근", meaning: "紅蘿蔔", ex_kr: "토끼는 당근을 좋아해요.", ex_zh: "兔子喜歡胡蘿蔔。" },
            { id: 676, word: "피우다", meaning: "冒煙；開花；生火", ex_kr: "여기서 담배를 피우지 마세요.", ex_zh: "請不要在這裡抽煙。" },
            { id: 677, word: "목욕", meaning: "洗澡", ex_kr: "자기 전에 목욕을 했어요.", ex_zh: "我睡前洗了個澡。" },
            { id: 678, word: "야구", meaning: "棒球", ex_kr: "주말에 야구 경기를 보러 갈 거예요.", ex_zh: "我打算這週末去看一場棒球比賽。" },
            { id: 679, word: "그때", meaning: "那時", ex_kr: "그때는 제가 어렸어요.", ex_zh: "我那時還年輕。" },
            { id: 680, word: "사실은", meaning: "實際上", ex_kr: "사실은, 저 그 사람 별로 안 좋아해요.", ex_zh: "其實，我並不喜歡那個人。" },
            { id: 681, word: "비누", meaning: "肥皂", ex_kr: "비누로 손을 깨끗이 씻으세요.", ex_zh: "用肥皂徹底洗手。" },
            { id: 682, word: "지키다", meaning: "防禦、保護", ex_kr: "약속을 꼭 지켜 주세요.", ex_zh: "請務必信守承諾。" },
            { id: 683, word: "복잡하다", meaning: "擁擠；複雜", ex_kr: "출근 시간에는 지하철이 아주 복잡해요.", ex_zh: "尖峰時段地鐵非常擁擠。" },
            { id: 684, word: "불고기", meaning: "醃牛肉", ex_kr: "외국인 친구들이 불고기를 좋아해요.", ex_zh: "我的外國朋友喜歡烤肉。" },
            { id: 685, word: "경기", meaning: "比賽；經濟、商業", ex_kr: "어제 축구 경기를 봤어요.", ex_zh: "我昨天看了一場足球比賽。" },
            { id: 686, word: "젓가락", meaning: "筷子", ex_kr: "저는 젓가락을 잘 사용해요.", ex_zh: "我用筷子很熟練。" },
            { id: 687, word: "해", meaning: "太陽；年；傷害", ex_kr: "해가 뜨거워요.", ex_zh: "太陽很熱。" },
            { id: 688, word: "내려오다", meaning: "下來、下車", ex_kr: "산에서 조심해서 내려오세요.", ex_zh: "下山時請務必小心。" },
            { id: 689, word: "가구", meaning: "家具；家居用品", ex_kr: "새집에 들여놓을 가구를 샀어요.", ex_zh: "我為新家買了家具。" },
            { id: 690, word: "근처", meaning: "附近", ex_kr: "집 근처에 공원이 있어요.", ex_zh: "我家附近有個公園。" },
            { id: 691, word: "아가씨", meaning: "小姐、年輕的女士", ex_kr: "아가씨, 이 근처에 은행이 어디 있어요?", ex_zh: "小姐，請問這附近哪裡有銀行？" },
            { id: 692, word: "변하다", meaning: "改變", ex_kr: "세상이 많이 변했어요.", ex_zh: "世界已經發生了很大的變化。" },
            { id: 693, word: "낮", meaning: "白天", ex_kr: "낮에는 일하고 밤에는 쉬어요.", ex_zh: "我白天工作，晚上休息。" },
            { id: 694, word: "켜다", meaning: "打開、打開", ex_kr: "더워서 에어컨을 켰어요.", ex_zh: "因為天氣太熱，我打開了空調。" },
            { id: 695, word: "계단", meaning: "樓梯", ex_kr: "계단을 조심해서 내려가세요.", ex_zh: "下樓梯時請小心。" },
            { id: 696, word: "드라마", meaning: "電視劇", ex_kr: "요즘 재미있는 드라마가 많아요.", ex_zh: "如今有很多精彩的電視劇。" },
            { id: 697, word: "닭", meaning: "雞", ex_kr: "시골에서 닭을 키워요.", ex_zh: "我在鄉下養雞。" },
            { id: 698, word: "주무시다", meaning: "睡覺", ex_kr: "아버지께서 주무시고 계세요.", ex_zh: "父親睡著了。" },
            { id: 699, word: "친절하다", meaning: "友善、體貼", ex_kr: "그 식당 직원들은 매우 친절해요.", ex_zh: "餐廳員工非常友好。" },
            { id: 700, word: "낫다", meaning: "變得更好；康復、痊癒", ex_kr: "감기가 다 나았어요.", ex_zh: "我現在完全康復了。" },
            { id: 701, word: "못", meaning: "不；釘", ex_kr: "저는 노래를 못 불러요.", ex_zh: "我不會唱歌。" },
            { id: 702, word: "글쎄", meaning: "嗯、讓我看看", ex_kr: "글쎄, 잘 모르겠는데요.", ex_zh: "嗯，我不太確定。" },
            { id: 703, word: "달리다", meaning: "運轉；懸掛；依賴", ex_kr: "아침마다 공원을 달려요.", ex_zh: "我每天早上都在公園跑步。" },
            { id: 704, word: "그쪽", meaning: "那樣、那樣；你", ex_kr: "그쪽으로 가시면 안 돼요.", ex_zh: "你不應該走那條路。" },
            { id: 705, word: "기억나다", meaning: "記住、回憶", ex_kr: "그 사람의 이름이 기억나지 않아요.", ex_zh: "我記不起那個人的名字了。" },
            { id: 706, word: "잃다", meaning: "失去(某物)", ex_kr: "지갑을 잃어버려서 돈을 다 잃었어요.", ex_zh: "我的錢包丟了，所有的錢也都丟了。" },
            { id: 707, word: "어른", meaning: "成年人；老人", ex_kr: "어른들 말씀을 잘 들어야 해요.", ex_zh: "你必須聽長輩的話。" },
            { id: 708, word: "기자", meaning: "記者", ex_kr: "그는 신문사 기자로 일하고 있어요.", ex_zh: "他是一名報社記者。" },
            { id: 709, word: "주인", meaning: "所有者、雇主", ex_kr: "이 집 주인은 누구세요?", ex_zh: "這棟房子的主人是誰？" },
            { id: 710, word: "세탁", meaning: "洗滌", ex_kr: "이 옷은 세탁이 필요해요.", ex_zh: "這件衣服需要洗了。" },
            { id: 711, word: "아무나", meaning: "任何人", ex_kr: "아무나 들어올 수 없어요.", ex_zh: "並非任何人都能參加。" },
            { id: 712, word: "이따가", meaning: "稍後", ex_kr: "이따가 다시 전화할게.", ex_zh: "我稍後會回電給你。" },
            { id: 713, word: "그릇", meaning: "碗、容器", ex_kr: "그릇에 밥을 담아 주세요.", ex_zh: "請把米飯盛到碗裡。" },
            { id: 714, word: "하얗다", meaning: "成為白人", ex_kr: "겨울에는 눈이 와서 세상이 하얘요.", ex_zh: "冬天，會下雪，所以世界一片雪白。" },
            { id: 715, word: "밝히다", meaning: "使明亮、使清晰；使澄清、使顯露", ex_kr: "진실을 밝혀야 합니다.", ex_zh: "我們必須揭露真相。" },
            { id: 716, word: "침실", meaning: "臥室", ex_kr: "침실에서 잠을 자요.", ex_zh: "我睡在臥室裡。" },
            { id: 717, word: "벗다", meaning: "脫掉(衣服)", ex_kr: "실내에서는 모자를 벗어 주세요.", ex_zh: "請在室內摘下帽子。" },
            { id: 718, word: "재미있게", meaning: "有趣的是", ex_kr: "어제 친구들과 재미있게 놀았어요.", ex_zh: "昨天和朋友們玩得很開心。" },
            { id: 719, word: "사탕", meaning: "糖果", ex_kr: "아이들이 사탕을 좋아해요.", ex_zh: "孩子們喜歡糖果。" },
            { id: 720, word: "닭고기", meaning: "雞肉", ex_kr: "저녁 메뉴는 닭고기 요리입니다.", ex_zh: "晚餐菜單以雞肉料理為主。" },
            { id: 721, word: "북쪽", meaning: "北", ex_kr: "서울은 한국의 북쪽에 있어요.", ex_zh: "首爾位於韓國北部。" },
            { id: 722, word: "지난달", meaning: "上個月", ex_kr: "지난달에 월급을 받았어요.", ex_zh: "我上個月收到了工資。" },
            { id: 723, word: "소식", meaning: "消息", ex_kr: "오랜만에 친구 소식을 들었어요.", ex_zh: "很久以來，我第一次聽到一位朋友的消息。" },
            { id: 724, word: "어떻다", meaning: "做某事的方式", ex_kr: "오늘 날씨가 어때요?", ex_zh: "今天的天氣如何？" },
            { id: 725, word: "귀", meaning: "耳朵", ex_kr: "음악을 너무 크게 들어서 귀가 아파요.", ex_zh: "音樂聲音太大，耳朵痛。" },
            { id: 726, word: "아무도", meaning: "沒有人、沒人", ex_kr: "교실에 아무도 없어요.", ex_zh: "教室裡一個人也沒有。" },
            { id: 727, word: "밑", meaning: "底部、下方", ex_kr: "책상 밑에 가방이 있어요.", ex_zh: "桌子底下有個包包。" },
            { id: 728, word: "목소리", meaning: "嗓音", ex_kr: "그녀는 목소리가 아주 예뻐요.", ex_zh: "她的聲音非常悅耳動聽。" },
            { id: 729, word: "불안하다", meaning: "焦慮不安", ex_kr: "시험 결과가 아직 안 나와서 불안해요.", ex_zh: "我很焦慮，因為檢測結果還沒出來。" },
            { id: 730, word: "교회", meaning: "教會", ex_kr: "일요일에 교회에 가요.", ex_zh: "我星期天去教會。" },
            { id: 731, word: "흐리다", meaning: "陰天", ex_kr: "오늘은 날씨가 흐려요.", ex_zh: "今天天氣陰天。" },
            { id: 732, word: "구름", meaning: "雲", ex_kr: "하늘에 구름이 많이 꼈어요.", ex_zh: "天空有很多雲。" },
            { id: 733, word: "펴다", meaning: "打開、展開、散開", ex_kr: "책을 펴세요.", ex_zh: "打開這本書。" },
            { id: 734, word: "간호사", meaning: "護士", ex_kr: "제 꿈은 간호사가 되는 것이에요.", ex_zh: "我的夢想是成為一名護士。" },
            { id: 735, word: "숟가락", meaning: "湯匙", ex_kr: "한국에서는 숟가락과 젓가락을 사용해요.", ex_zh: "在韓國，我們使用湯匙和筷子。" },
            { id: 736, word: "장갑", meaning: "手套", ex_kr: "추워서 장갑을 꼈어요.", ex_zh: "因為冷，所以我戴了手套。" },
            { id: 737, word: "훨씬", meaning: "遠遠超過很多", ex_kr: "어제보다 오늘이 훨씬 더워요.", ex_zh: "今天比昨天熱很多。" },
            { id: 738, word: "접시", meaning: "盤子、碟子", ex_kr: "접시를 깨끗이 닦으세요.", ex_zh: "將碗碟徹底清洗乾淨。" },
            { id: 739, word: "샤워하다", meaning: "去淋浴", ex_kr: "아침에 일어나서 샤워해요.", ex_zh: "我早上醒來後會洗個澡。" },
            { id: 740, word: "경제", meaning: "經濟", ex_kr: "요즘 경제가 좋지 않아요.", ex_zh: "最近經濟情勢不好。" },
            { id: 741, word: "거의", meaning: "幾乎", ex_kr: "숙제를 거의 다 했어요.", ex_zh: "我的作業快做完了。" },
            { id: 742, word: "만지다", meaning: "觸摸", ex_kr: "뜨거우니 만지지 마세요.", ex_zh: "很燙，別碰。" },
            { id: 743, word: "출발하다", meaning: "離開", ex_kr: "기차는 10시에 출발합니다.", ex_zh: "火車10點出發。" },
            { id: 744, word: "복습하다", meaning: "待審查", ex_kr: "수업이 끝난 후에 복습해야 해요.", ex_zh: "課後要複習。" },
            { id: 745, word: "달다", meaning: "甜美；豎立、附著；稱重、測量", ex_kr: "이 포도는 아주 달아요.", ex_zh: "這些葡萄非常甜。" },
            { id: 746, word: "모레", meaning: "後天", ex_kr: "내일 말고 모레 만나요.", ex_zh: "我們後天見面吧，不是明天。" },
            { id: 747, word: "시내", meaning: "城市、市中心；小溪", ex_kr: "주말에 시내에 가서 쇼핑했어요.", ex_zh: "週末我去市中心購物了。" },
            { id: 748, word: "정도", meaning: "程度、範圍", ex_kr: "어느 정도 동의합니다.", ex_zh: "我部分同意。" },
            { id: 749, word: "곧", meaning: "很快", ex_kr: "곧 도착할 거예요.", ex_zh: "它很快就會到了。" },
            { id: 750, word: "새벽", meaning: "黎明", ex_kr: "저는 새벽에 일찍 일어나요.", ex_zh: "我每天早上很早就起床了。" },
            { id: 751, word: "초대하다", meaning: "邀請", ex_kr: "생일 파티에 친구들을 초대했어요.", ex_zh: "我邀請朋友們來參加我的生日派對。" },
            { id: 752, word: "달력", meaning: "日曆", ex_kr: "달력을 보고 약속 날짜를 확인했어요.", ex_zh: "我查看了日曆，確認了預約日期。" },
            { id: 753, word: "배달", meaning: "送貨", ex_kr: "피자를 배달시켰어요.", ex_zh: "我叫了披薩外送。" },
            { id: 754, word: "회의", meaning: "會議、大會", ex_kr: "오후에 중요한 회의가 있어요.", ex_zh: "我今天下午有個重要的會議。" },
            { id: 755, word: "호텔", meaning: "飯店", ex_kr: "여행 가서 호텔에 묵었어요.", ex_zh: "我出差旅行，住在飯店。" },
            { id: 756, word: "그러나", meaning: "但是、儘管、然而", ex_kr: "그는 열심히 노력했다. 그러나 실패했다.", ex_zh: "他盡力了，但還是失敗了。" },
            { id: 757, word: "끄다", meaning: "熄滅、關掉", ex_kr: "자기 전에 불을 끄세요.", ex_zh: "睡前請關燈。" },
            { id: 758, word: "문장", meaning: "句子", ex_kr: "이 문장의 의미를 모르겠어요.", ex_zh: "我不明白這句話的意思。" },
            { id: 759, word: "부탁", meaning: "要求", ex_kr: "부탁이 하나 있어요.", ex_zh: "我有個忙想請你幫忙。" },
            { id: 760, word: "까만색", meaning: "黑色的", ex_kr: "밤하늘은 까만색이에요.", ex_zh: "夜空漆黑一片。" },
            { id: 761, word: "개월", meaning: "月(計數)", ex_kr: "한국에 온 지 6개월 됐어요.", ex_zh: "我來韓國已經6個月了。" },
            { id: 762, word: "줄", meaning: "繩索", ex_kr: "줄을 서서 기다리세요.", ex_zh: "請排隊等候。" },
            { id: 763, word: "야채", meaning: "蔬菜", ex_kr: "건강을 위해 야채를 많이 먹어야 해요.", ex_zh: "為了你的健康，你需要多吃蔬菜。" },
            { id: 764, word: "가위", meaning: "剪刀", ex_kr: "가위로 종이를 잘라요.", ex_zh: "用剪刀剪紙。" },
            { id: 765, word: "잘생기다", meaning: "英俊", ex_kr: "그 배우는 정말 잘생겼어요.", ex_zh: "那個演員真的很帥。" },
            { id: 766, word: "사거리", meaning: "交叉路口、十字路口", ex_kr: "사거리에서 신호를 기다려요.", ex_zh: "我正在等十字路口的號誌燈。" },
            { id: 767, word: "덮다", meaning: "覆蓋、關閉、關閉", ex_kr: "추우니까 이불을 덮으세요.", ex_zh: "天氣冷，請蓋上毯子。" },
            { id: 768, word: "허리", meaning: "腰部", ex_kr: "무거운 것을 들어서 허리가 아파요.", ex_zh: "搬重物後背痛。" },
            { id: 769, word: "헤어지다", meaning: "分開、分離", ex_kr: "어제 여자친구와 헤어졌어요.", ex_zh: "我昨天和女朋友分手了。" },
            { id: 770, word: "마르다", meaning: "變得乾燥；變瘦", ex_kr: "목이 말라요. 물 좀 주세요.", ex_zh: "我渴了，請給我些水。" },
            { id: 771, word: "자신", meaning: "自我；自信", ex_kr: "저는 제 자신을 믿어요.", ex_zh: "我相信自己。" },
            { id: 772, word: "아까", meaning: "不久前", ex_kr: "아까 전화했어요?", ex_zh: "你之前打過電話嗎？" },
            { id: 773, word: "갈비", meaning: "烤排骨", ex_kr: "오늘 저녁은 갈비를 먹을 거예요.", ex_zh: "我今晚打算吃烤排骨。" },
            { id: 774, word: "점", meaning: "點、點；觀點；算命", ex_kr: "시험에서 100점을 받았어요.", ex_zh: "我考試得了100分。" },
            { id: 775, word: "편하다", meaning: "方便、舒適", ex_kr: "이 신발은 정말 편해요.", ex_zh: "這雙鞋真的很舒服。" },
            { id: 776, word: "착하다", meaning: "和善(性情溫和)", ex_kr: "제 친구는 마음이 아주 착해요.", ex_zh: "我的朋友心地非常善良。" },
            { id: 777, word: "가운데", meaning: "中心", ex_kr: "사진 가운데에 있는 사람이 저예요.", ex_zh: "照片中間的人是我。" },
            { id: 778, word: "학원", meaning: "教育機構、學院", ex_kr: "방과 후에 수학 학원에 가요.", ex_zh: "放學後我去數學補習班。" },
            { id: 779, word: "보기", meaning: "例子", ex_kr: "보기를 보고 문제를 푸세요.", ex_zh: "考慮各種方案並解決問題。" },
            { id: 780, word: "알아보다", meaning: "查明、檢查、調查；識別", ex_kr: "인터넷으로 맛집을 알아봤어요.", ex_zh: "我在網路上搜尋了一些不錯的餐廳。" },
            { id: 781, word: "기침", meaning: "咳嗽", ex_kr: "감기에 걸려서 기침이 나요.", ex_zh: "我感冒了，一直在咳嗽。" },
            { id: 782, word: "짜다", meaning: "鹹的；製造、建造、組織；擠壓", ex_kr: "국이 너무 짜요.", ex_zh: "這湯太鹹了。" },
            { id: 783, word: "다녀오다", meaning: "去一趟、然後回來、就回來了", ex_kr: "학교 다녀오겠습니다.", ex_zh: "我要去上學。" },
            { id: 784, word: "물론", meaning: "當然", ex_kr: "물론이죠, 도와드릴게요.", ex_zh: "當然，我會幫你的。" },
            { id: 785, word: "욕실", meaning: "浴室", ex_kr: "욕실에서 샤워를 했어요.", ex_zh: "我在浴室裡洗了個澡。" },
            { id: 786, word: "신호", meaning: "訊號", ex_kr: "빨간 불 신호에 멈춰야 해요.", ex_zh: "紅燈時必須停車。" },
            { id: 787, word: "돌아가다", meaning: "返回、返回；工作、操作", ex_kr: "이제 집으로 돌아갈 시간이에요.", ex_zh: "現在該回家了。" },
            { id: 788, word: "호수", meaning: "湖泊；房號", ex_kr: "공원에 아름다운 호수가 있어요.", ex_zh: "公園裡有一個美麗的湖泊。" },
            { id: 789, word: "국", meaning: "湯水", ex_kr: "오늘 저녁은 미역국이에요.", ex_zh: "今晚的晚餐是海帶湯。" },
            { id: 790, word: "장소", meaning: "地點", ex_kr: "약속 장소가 어디예요?", ex_zh: "會議地點在哪裡？" },
            { id: 791, word: "종업원", meaning: "男服務員、女服務員", ex_kr: "종업원에게 물을 달라고 했어요.", ex_zh: "我向服務生要了杯水。" },
            { id: 792, word: "달러", meaning: "美元", ex_kr: "이 가방은 100달러입니다.", ex_zh: "這個包售價100美元。" },
            { id: 793, word: "이사하다", meaning: "搬家", ex_kr: "다음 달에 서울로 이사해요.", ex_zh: "我下個月要搬去首爾。" },
            { id: 794, word: "가슴", meaning: "胸部", ex_kr: "너무 긴장해서 가슴이 두근거려요.", ex_zh: "我緊張得心跳加速。" },
            { id: 795, word: "살", meaning: "年齡；肌肉", ex_kr: "저는 스무 살입니다.", ex_zh: "我今年二十歲。" },
            { id: 796, word: "하늘", meaning: "天空", ex_kr: "오늘 하늘이 아주 맑아요.", ex_zh: "今天天空非常晴朗。" },
            { id: 797, word: "카페", meaning: "咖啡店", ex_kr: "친구와 카페에서 커피를 마셨어요.", ex_zh: "我和朋友在咖啡館喝了咖啡。" },
            { id: 798, word: "딸기", meaning: "草莓", ex_kr: "저는 과일 중에 딸기를 가장 좋아해요.", ex_zh: "在所有水果中，我最喜歡草莓。" },
            { id: 799, word: "케이크", meaning: "蛋糕", ex_kr: "생일 축하 케이크를 샀어요.", ex_zh: "我買了一個生日蛋糕。" },
            { id: 800, word: "문화", meaning: "文化", ex_kr: "저는 한국 문화에 관심이 많아요.", ex_zh: "我對韓國文化非常感興趣。" },
            { id: 801, word: "굉장히", meaning: "非常、極度、非常", ex_kr: "오늘 날씨가 굉장히 덥네요.", ex_zh: "今天天氣很熱。" },
            { id: 802, word: "짓다", meaning: "製造、建造、構築", ex_kr: "새 집을 짓고 있어요.", ex_zh: "我正在蓋新房子。" },
            { id: 803, word: "불다", meaning: "吹", ex_kr: "바람이 세게 불어요.", ex_zh: "風刮得很大。" },
            { id: 804, word: "어린이", meaning: "小孩、孩子", ex_kr: "오늘은 어린이날입니다.", ex_zh: "今天是兒童節。" },
            { id: 805, word: "장", meaning: "張；腸", ex_kr: "종이 한 장만 주세요.", ex_zh: "請給我一張紙。" },
            { id: 806, word: "소풍", meaning: "野餐", ex_kr: "봄에 공원으로 소풍을 갔어요.", ex_zh: "春天的時候我去公園野餐。" },
            { id: 807, word: "넣다", meaning: "插入", ex_kr: "가방에 책을 넣으세요.", ex_zh: "把書放進包包裡。" },
            { id: 808, word: "고르다", meaning: "選擇、挑選；保持規律、甚至", ex_kr: "선물로 무엇을 살지 골라 주세요.", ex_zh: "請選擇您想購買的禮物。" },
            { id: 809, word: "건물", meaning: "大樓", ex_kr: "저 높은 건물이 우리 회사예요.", ex_zh: "那棟高樓就是我們公司。" },
            { id: 810, word: "오래간만", meaning: "好久沒這樣了", ex_kr: "오래간만이에요. 잘 지냈어요?", ex_zh: "好久不見，你最近怎麼樣？" },
            { id: 811, word: "참", meaning: "非常、真的", ex_kr: "오늘 날씨 참 좋네요.", ex_zh: "今天天氣真好。" },
            { id: 812, word: "단어", meaning: "詞彙", ex_kr: "매일 새로운 단어를 10개씩 외워요.", ex_zh: "我每天記住10個新單字。" },
            { id: 813, word: "떨어지다", meaning: "跌倒、墜落；短缺、耗盡；筋疲力盡", ex_kr: "나무에서 사과가 떨어졌어요.", ex_zh: "一個蘋果從樹上掉了下來。" },
            { id: 814, word: "혹시", meaning: "或許有可能；", ex_kr: "혹시 김민준 씨 아세요?", ex_zh: "你認識金敏俊先生嗎？" },
            { id: 815, word: "냉면", meaning: "涼麵", ex_kr: "여름에는 시원한 냉면이 인기가 많아요.", ex_zh: "涼面在夏天非常受歡迎。" },
            { id: 816, word: "녹색", meaning: "綠色的", ex_kr: "신호등이 녹색으로 바뀌었어요.", ex_zh: "交通號誌變成綠燈了。" },
            { id: 817, word: "돌다", meaning: "轉動、旋轉、迴轉", ex_kr: "오른쪽으로 도세요.", ex_zh: "向右轉。" },
            { id: 818, word: "무섭다", meaning: "可怕的、令人恐懼的；害怕", ex_kr: "저는 무서운 영화를 잘 못 봐요.", ex_zh: "我不太能看恐怖電影。" },
            { id: 819, word: "발", meaning: "腳", ex_kr: "축구를 하다가 발을 다쳤어요.", ex_zh: "我踢足球時傷了腳。" },
            { id: 820, word: "묻다", meaning: "詢問；堅持；沾染污漬；埋葬", ex_kr: "모르는 것이 있으면 선생님께 물어보세요.", ex_zh: "如果你有什麼不懂的地方，請問老師。" },
            { id: 821, word: "이유", meaning: "原因、起因", ex_kr: "학교에 늦은 이유가 뭐예요?", ex_zh: "你上學遲到的原因是什麼？" },
            { id: 822, word: "신다", meaning: "穿上、穿鞋", ex_kr: "밖에 나갈 때는 신발을 신으세요.", ex_zh: "外出時請穿鞋。" },
            { id: 823, word: "따라하다", meaning: "模仿、重複", ex_kr: "선생님을 따라서 읽어 보세요.", ex_zh: "請跟著老師一起讀。" },
            { id: 824, word: "이미", meaning: "已經、然而；以前", ex_kr: "제가 도착했을 때 영화는 이미 시작했어요.", ex_zh: "我到的時候電影已經開始了。" },
            { id: 825, word: "스파게티", meaning: "義大利細麵條", ex_kr: "오늘 점심으로 토마토 스파게티를 만들었어요.", ex_zh: "我今天午餐做了番茄義面。" },
            { id: 826, word: "기차", meaning: "火車", ex_kr: "기차를 타고 부산에 갔어요.", ex_zh: "我搭火車去了釜山。" },
            { id: 827, word: "노력하다", meaning: "努力、盡力", ex_kr: "성공하기 위해 열심히 노력해야 해요.", ex_zh: "想要成功就必須努力奮鬥。" },
            { id: 828, word: "어깨", meaning: "肩膀", ex_kr: "가방이 무거워서 어깨가 아파요.", ex_zh: "因為包包太重，我的肩膀痛。" },
            { id: 829, word: "뚱뚱하다", meaning: "肥胖", ex_kr: "저는 조금 뚱뚱해서 다이어트를 하고 있어요.", ex_zh: "我有點超重，所以正在節食。" },
            { id: 830, word: "이기다", meaning: "獲勝", ex_kr: "우리 팀이 축구 경기에서 이겼어요.", ex_zh: "我們隊贏得了足球比賽。" },
            { id: 831, word: "아르바이트", meaning: "兼職工作", ex_kr: "저는 카페에서 아르바이트를 해요.", ex_zh: "我在咖啡館做兼職。" },
            { id: 832, word: "어울리다", meaning: "匹配、合適、與…交往、相處融洽", ex_kr: "이 옷은 당신에게 잘 어울려요.", ex_zh: "這身衣服很適合你。" },
            { id: 833, word: "사장", meaning: "公司總裁", ex_kr: "우리 회사 사장님은 아주 좋으신 분이에요.", ex_zh: "我們公司的總裁是個非常好的人。" },
            { id: 834, word: "끊다", meaning: "切斷、折斷", ex_kr: "이제 담배를 끊어야 해요.", ex_zh: "我必須馬上戒菸。" },
            { id: 835, word: "강아지", meaning: "小狗", ex_kr: "저는 귀여운 강아지를 키우고 있어요.", ex_zh: "我正在養一隻可愛的小狗。" },
            { id: 836, word: "표", meaning: "票；桌子、圖表；標記、標誌", ex_kr: "영화 표 두 장 주세요.", ex_zh: "請給我兩張電影票。" },
            { id: 837, word: "직접", meaning: "直接、親自地", ex_kr: "제가 직접 만들었어요.", ex_zh: "我自己做的。" },
            { id: 838, word: "건너다", meaning: "穿過", ex_kr: "길을 건널 때는 조심해야 해요.", ex_zh: "過馬路時一定要小心。" },
            { id: 839, word: "쓰레기", meaning: "垃圾、廢品", ex_kr: "쓰레기는 쓰레기통에 버려 주세요.", ex_zh: "請把垃圾丟進垃圾桶。" },
            { id: 840, word: "제주도", meaning: "濟州島", ex_kr: "이번 휴가에 제주도에 갈 거예요.", ex_zh: "我要去濟州島度假。" },
            { id: 841, word: "전화기", meaning: "電話(裝置)", ex_kr: "사무실에 새 전화기를 설치했어요.", ex_zh: "我在辦公室安裝了一部新電話。" },
            { id: 842, word: "봉투", meaning: "信封、袋子", ex_kr: "이 편지를 봉투에 넣어 주세요.", ex_zh: "請把這封信裝進信封裡。" },
            { id: 843, word: "간장", meaning: "醬油", ex_kr: "만두를 간장에 찍어 먹어요.", ex_zh: "我把餃子沾著醬油吃。" },
            { id: 844, word: "설거지", meaning: "洗碗", ex_kr: "식사 후에 설거지를 했어요.", ex_zh: "飯後我洗了碗。" },
            { id: 845, word: "맑다", meaning: "清晰、乾淨", ex_kr: "오늘은 하늘이 아주 맑아요.", ex_zh: "今天天空非常晴朗。" },
            { id: 846, word: "눈물", meaning: "撕", ex_kr: "슬픈 영화를 보고 눈물이 났어요.", ex_zh: "看完一部悲傷的電影後，我哭了。" },
            { id: 847, word: "경찰", meaning: "警察、警官", ex_kr: "도둑을 잡기 위해 경찰에 신고했어요.", ex_zh: "我已向警方報案，請他們抓小偷。" },
            { id: 848, word: "추석", meaning: "韓國豐收節", ex_kr: "추석은 한국의 큰 명절 중 하나입니다.", ex_zh: "中秋節是韓國最重要的節日之一。" },
            { id: 849, word: "내려가다", meaning: "向下", ex_kr: "엘리베이터를 타고 1층으로 내려갔어요.", ex_zh: "我搭電梯下到一樓。" },
            { id: 850, word: "게임", meaning: "遊戲", ex_kr: "저는 컴퓨터 게임하는 것을 좋아해요.", ex_zh: "我喜歡玩電腦遊戲。" },
            { id: 851, word: "노래방", meaning: "卡拉OK酒吧", ex_kr: "친구들과 노래방에 가서 노래를 불렀어요.", ex_zh: "我和朋友們去了卡拉OK酒吧唱歌。" },
            { id: 852, word: "휴게실", meaning: "休息室、休息室", ex_kr: "피곤해서 휴게실에서 잠시 쉬었어요.", ex_zh: "我當時很累，所以在休息室休息了一會兒。" },
            { id: 853, word: "자르다", meaning: "切、切片", ex_kr: "미용실에서 머리를 잘랐어요.", ex_zh: "我在理髮店剪了頭髮。" },
            { id: 854, word: "갔다오다", meaning: "去、然後再回來", ex_kr: "가게에 잠깐 갔다올게요.", ex_zh: "我馬上從商店回來。" },
            { id: 855, word: "어서", meaning: "請、快點。", ex_kr: "어서 오세요.", ex_zh: "歡迎。" },
            { id: 856, word: "남녀", meaning: "男女", ex_kr: "이 화장실은 남녀 공용입니다.", ex_zh: "這個洗手間是男女通用的。" },
            { id: 857, word: "최고", meaning: "最好的、最高的、頂尖的", ex_kr: "이 식당 음식이 최고예요.", ex_zh: "這家餐廳的食物是最好的。" },
            { id: 858, word: "뉴스", meaning: "訊息", ex_kr: "매일 아침에 뉴스를 봐요.", ex_zh: "我每天早上都看新聞。" },
            { id: 859, word: "부부", meaning: "已婚夫婦", ex_kr: "두 사람은 행복한 부부예요.", ex_zh: "他們是一對幸福的夫妻。" },
            { id: 860, word: "손가락", meaning: "手指", ex_kr: "종이에 손가락을 베었어요.", ex_zh: "我的手指被紙割傷了。" },
            { id: 861, word: "불편하다", meaning: "不方便、不舒服", ex_kr: "다리가 아파서 걷기가 불편해요.", ex_zh: "我腿疼，走路很困難。" },
            { id: 862, word: "해보다", meaning: "嘗試；體驗", ex_kr: "이 음식을 한번 먹어 보세요.", ex_zh: "嚐嚐這道菜。" },
            { id: 863, word: "걸다", meaning: "懸掛、暫停；與…交談、致電", ex_kr: "벽에 그림을 걸었어요.", ex_zh: "我在牆上掛了一幅畫。" },
            { id: 864, word: "나타나다", meaning: "出現、現身；被揭示", ex_kr: "그는 약속 장소에 나타나지 않았어요.", ex_zh: "他沒有出現在約定的地點。" },
            { id: 865, word: "팀", meaning: "團隊", ex_kr: "우리 팀이 경기에서 이겼어요.", ex_zh: "我們隊贏了比賽。" },
            { id: 866, word: "지하", meaning: "地下、地下室", ex_kr: "지하 주차장에 차를 세웠어요.", ex_zh: "我把車停在地下停車場了。" },
            { id: 867, word: "공연", meaning: "公開演出", ex_kr: "어제 케이팝 공연을 보러 갔어요.", ex_zh: "我昨天去看了一場韓國流行音樂演唱會。" },
            { id: 868, word: "자연", meaning: "自然", ex_kr: "저는 자연 경치를 보는 것을 좋아해요.", ex_zh: "我喜歡欣賞自然風光。" },
            { id: 869, word: "초등학교", meaning: "小學", ex_kr: "제 동생은 초등학교에 다녀요.", ex_zh: "我的弟弟/妹妹還在上小學。" },
            { id: 870, word: "칼", meaning: "刀；劍", ex_kr: "칼을 사용할 때는 조심하세요.", ex_zh: "使用刀具時要小心。" },
            { id: 871, word: "돌아오다", meaning: "返回", ex_kr: "아버지가 회사에서 돌아오셨어요.", ex_zh: "我父親下班回家了。" },
            { id: 872, word: "옛날", meaning: "過去、往事", ex_kr: "옛날 이야기를 들려주세요.", ex_zh: "請給我講個老故事。" },
            { id: 873, word: "까맣다", meaning: "成為黑人", ex_kr: "밤하늘이 까맣다.", ex_zh: "夜空漆黑一片。" },
            { id: 874, word: "반찬", meaning: "小菜", ex_kr: "한국 식당에서는 여러 가지 반찬이 나와요.", ex_zh: "韓國餐廳提供各種各樣的小菜。" },
            { id: 875, word: "한글", meaning: "韓文字母", ex_kr: "한글은 세종대왕이 만들었어요.", ex_zh: "世宗大王創造了韓文。" },
            { id: 876, word: "깎다", meaning: "去皮、修剪、切割；折扣", ex_kr: "과일 껍질을 깎아 주세요.", ex_zh: "請削去水果的皮。" },
            { id: 877, word: "교통", meaning: "交通", ex_kr: "출퇴근 시간에는 교통이 복잡해요.", ex_zh: "尖峰時段交通擁擠。" },
            { id: 878, word: "특히", meaning: "尤其、特別", ex_kr: "저는 과일을 좋아하는데, 특히 딸기를 좋아해요.", ex_zh: "我喜歡水果，尤其喜歡草莓。" },
            { id: 879, word: "갖다", meaning: "擁有、持有", ex_kr: "펜 좀 갖고 있어요?", ex_zh: "你有筆嗎？" },
            { id: 880, word: "외국인", meaning: "外國人", ex_kr: "한국에는 외국인이 많이 살아요.", ex_zh: "韓國居住著許多外國人。" },
            { id: 881, word: "공사", meaning: "建造", ex_kr: "집 앞 도로가 공사 중이에요.", ex_zh: "我家門前的路正在施工。" },
            { id: 882, word: "수영장", meaning: "游泳池", ex_kr: "여름에는 수영장에 사람이 많아요.", ex_zh: "夏天游泳池裡人很多。" },
            { id: 883, word: "조건", meaning: "條件、術語", ex_kr: "이 계약의 조건은 무엇입니까?", ex_zh: "這份合約的具體條款是什麼？" },
            { id: 884, word: "예", meaning: "例如；是的", ex_kr: "예를 들어 설명해 주세요.", ex_zh: "請舉例說明。" },
            { id: 885, word: "모습", meaning: "形狀、特徵", ex_kr: "그녀의 웃는 모습이 아름다워요.", ex_zh: "她的笑容很美。" },
            { id: 886, word: "피부", meaning: "皮膚", ex_kr: "겨울에는 피부가 건조해져요.", ex_zh: "冬天我的皮膚會變得乾燥。" },
            { id: 887, word: "날다", meaning: "飛行", ex_kr: "새가 하늘을 날고 있어요.", ex_zh: "一隻鳥在天空中飛翔。" },
            { id: 888, word: "당신", meaning: "你(特定用法)", ex_kr: "당신은 누구십니까?", ex_zh: "你是誰？" },
            { id: 889, word: "실수", meaning: "錯誤、失誤", ex_kr: "제가 실수했어요. 죄송합니다.", ex_zh: "我犯了個錯誤，對不起。" },
            { id: 890, word: "남쪽", meaning: "南", ex_kr: "부산은 한국의 남쪽에 있어요.", ex_zh: "釜山位於韓國南部。" },
            { id: 891, word: "세상", meaning: "世界、社會", ex_kr: "세상에는 다양한 사람들이 살고 있어요.", ex_zh: "世界上生活著各種各樣的人。" },
            { id: 892, word: "소주", meaning: "韓國烈酒", ex_kr: "친구와 함께 소주를 마셨어요.", ex_zh: "我和朋友一起喝了燒酒。" },
            { id: 893, word: "시청", meaning: "市政廳；觀看", ex_kr: "시청에 가서 서류를 발급받았어요.", ex_zh: "我去市政廳辦理了相關手續。" },
            { id: 894, word: "산책하다", meaning: "散步", ex_kr: "저녁을 먹고 공원을 산책했어요.", ex_zh: "我吃了晚飯，然後去公園散步。" },
            { id: 895, word: "올라가다", meaning: "向上", ex_kr: "계단을 통해 위로 올라가세요.", ex_zh: "上樓。" },
            { id: 896, word: "희다", meaning: "成為白人", ex_kr: "그녀의 피부는 눈처럼 희다.", ex_zh: "她的皮膚像雪一樣白。" },
            { id: 897, word: "막히다", meaning: "被阻止、被停止", ex_kr: "차가 많아서 길이 막혀요.", ex_zh: "由於車輛過多，道路被堵塞了。" },
            { id: 898, word: "한복", meaning: "韓國傳統服飾", ex_kr: "설날에 한복을 입었어요.", ex_zh: "我過農曆新年時穿了韓服。" },
            { id: 899, word: "과거", meaning: "過去", ex_kr: "과거를 잊고 현재에 집중하세요.", ex_zh: "忘記過去，專注於現在。" },
            { id: 900, word: "첫째", meaning: "首先、最重要的", ex_kr: "첫째, 건강이 가장 중요합니다.", ex_zh: "首先，健康是最重要的。" },
            { id: 901, word: "꺼내다", meaning: "拉、取出；開始說話", ex_kr: "가방에서 책을 꺼내세요.", ex_zh: "從包包裡拿出那本書。" },
            { id: 902, word: "언어", meaning: "語言", ex_kr: "저는 새로운 언어를 배우는 것을 좋아해요.", ex_zh: "我喜歡學習新語言。" },
            { id: 903, word: "말씀하시다", meaning: "說話、談話", ex_kr: "사장님께서 지금 말씀하고 계십니다.", ex_zh: "老闆正在說話。" },
            { id: 904, word: "인터뷰", meaning: "面試", ex_kr: "내일 회사 면접 인터뷰가 있어요.", ex_zh: "我明天有個面試。" },
            { id: 905, word: "참다", meaning: "忍受、承受", ex_kr: "아프면 참지 말고 말하세요.", ex_zh: "如果感到痛苦，不要憋在心裡；要說出來。" },
            { id: 906, word: "왕", meaning: "國王", ex_kr: "세종대왕은 조선의 네 번째 왕이었습니다.", ex_zh: "世宗大王是朝鮮王朝的第四位君主。" },
            { id: 907, word: "맞은편", meaning: "對面", ex_kr: "은행은 약국 맞은편에 있어요.", ex_zh: "銀行就在藥局對面。" },
            { id: 908, word: "발음", meaning: "發音", ex_kr: "이 단어의 발음이 어려워요.", ex_zh: "這個字的發音很難。" },
            { id: 909, word: "첫날", meaning: "第一天", ex_kr: "한국에 온 첫날, 모든 것이 신기했어요.", ex_zh: "我到韓國的第一天，一切都讓我感到驚奇。" },
            { id: 910, word: "미터", meaning: "儀表", ex_kr: "우리 집에서 학교까지는 500미터 정도 돼요.", ex_zh: "我家到學校大約500公尺。" },
            { id: 911, word: "중학교", meaning: "國中", ex_kr: "저는 중학교 때 친구들을 아직도 만나요.", ex_zh: "我仍然會和我的國中朋友們聚會。" },
            { id: 912, word: "외롭다", meaning: "感到孤獨", ex_kr: "혼자 있으면 가끔 외로워요.", ex_zh: "我獨處時有時會感到孤單。" },
            { id: 913, word: "요리사", meaning: "廚師", ex_kr: "제 꿈은 유명한 요리사가 되는 거예요.", ex_zh: "我的夢想是成為一名著名廚師。" },
            { id: 914, word: "경찰서", meaning: "警察局", ex_kr: "지갑을 잃어버려서 경찰서에 갔어요.", ex_zh: "我去警察局是因為我丟了錢包。" },
            { id: 915, word: "휴지", meaning: "衛生紙、紙巾；停頓", ex_kr: "휴지 좀 갖다 주세요.", ex_zh: "請給我一些紙巾。" },
            { id: 916, word: "멋있다", meaning: "要有吸引力、時尚、酷", ex_kr: "그 배우는 정말 멋있어요.", ex_zh: "那位演員真酷。" },
            { id: 917, word: "피아노", meaning: "鋼琴", ex_kr: "저는 어렸을 때 피아노를 배웠어요.", ex_zh: "我小時候學過鋼琴。" },
            { id: 918, word: "떠나다", meaning: "離開、離去", ex_kr: "저는 내일 한국을 떠나요.", ex_zh: "我明天就要離開韓國了。" },
            { id: 919, word: "과자", meaning: "餅乾、零食", ex_kr: "저는 단 과자를 좋아해요.", ex_zh: "我喜歡甜食。" },
            { id: 920, word: "전하다", meaning: "傳達、溝通、傳遞", ex_kr: "안부 좀 전해 주세요.", ex_zh: "請代我問候。" },
            { id: 921, word: "과", meaning: "系；課程、章節", ex_kr: "저는 대학교에서 경영학과를 다녀요.", ex_zh: "我在大學主修工商管理。" },
            { id: 922, word: "생활", meaning: "生活、生存、生計", ex_kr: "한국 생활은 어때요?", ex_zh: "韓國的生活怎麼樣？" },
            { id: 923, word: "학기", meaning: "學期", ex_kr: "이번 학기 성적이 잘 나왔어요.", ex_zh: "我這學期的成績不錯。" },
            { id: 924, word: "에어컨", meaning: "空調", ex_kr: "너무 더워서 에어컨을 켰어요.", ex_zh: "天氣太熱了，我打開了空調。" },
            { id: 925, word: "규칙", meaning: "規則、條例", ex_kr: "규칙을 잘 지켜야 해요.", ex_zh: "你必須遵守規則。" },
            { id: 926, word: "서쪽", meaning: "西部", ex_kr: "해는 서쪽으로 져요.", ex_zh: "太陽從西邊落下。" },
            { id: 927, word: "최근", meaning: "最近、尤其是最近", ex_kr: "최근에 재미있는 영화를 봤어요.", ex_zh: "最近看了一部很有趣的電影。" },
            { id: 928, word: "느끼다", meaning: "感受、體驗", ex_kr: "저는 행복함을 느껴요.", ex_zh: "我感到很開心。" },
            { id: 929, word: "걸어가다", meaning: "步行", ex_kr: "저는 매일 학교에 걸어가요.", ex_zh: "我每天步行上學。" },
            { id: 930, word: "시키다", meaning: "命令、強迫某人", ex_kr: "음식을 시켜 먹을까요?", ex_zh: "我們點些吃的吧？" },
            { id: 931, word: "계절", meaning: "季節", ex_kr: "한국은 사계절이 뚜렷해요.", ex_zh: "韓國有四季之分。" },
            { id: 932, word: "소고기", meaning: "牛肉", ex_kr: "저녁으로 소고기를 먹었어요.", ex_zh: "我晚餐吃了牛肉。" },
            { id: 933, word: "친하다", meaning: "與…親近、友善、親密", ex_kr: "저는 그와 아주 친해요.", ex_zh: "我和他關係非常親密。" },
            { id: 934, word: "잎", meaning: "葉子", ex_kr: "가을에는 나뭇잎 색깔이 변해요.", ex_zh: "秋天，樹葉的顏色會改變。" },
            { id: 935, word: "메시지", meaning: "訊息", ex_kr: "친구에게 메시지를 보냈어요.", ex_zh: "我傳了封訊息給朋友。" },
            { id: 936, word: "당연하다", meaning: "合情合理、自然", ex_kr: "도움을 받았으면 고마워하는 것이 당연해요.", ex_zh: "對所得到的幫助心存感激是人之常情。" },
            { id: 937, word: "성", meaning: "姓氏；城堡；性別", ex_kr: "제 성은 김입니다.", ex_zh: "我姓金。" },
            { id: 938, word: "현재", meaning: "現在", ex_kr: "현재 시각은 3시입니다.", ex_zh: "現在時間是3點。" },
            { id: 939, word: "눕다", meaning: "躺下", ex_kr: "피곤해서 침대에 누웠어요.", ex_zh: "我當時很累，就躺到床上。" },
            { id: 940, word: "박물관", meaning: "博物館", ex_kr: "주말에 국립중앙박물관에 갔어요.", ex_zh: "我周末去了韓國國立中央博物館。" },
            { id: 941, word: "얻다", meaning: "獲得、取得", ex_kr: "좋은 정보를 얻었어요.", ex_zh: "我獲得了有用的信息。" },
            { id: 942, word: "편리하다", meaning: "方便、實用", ex_kr: "지하철은 아주 편리해요.", ex_zh: "地鐵非常方便。" },
            { id: 943, word: "정신", meaning: "心靈、精神、靈魂", ex_kr: "너무 피곤해서 정신이 없어요.", ex_zh: "我太累了，腦子一片混亂。" },
            { id: 944, word: "배추", meaning: "白菜", ex_kr: "배추로 김치를 만들어요.", ex_zh: "我用大白菜做泡菜。" },
            { id: 945, word: "아파트", meaning: "公寓大樓", ex_kr: "저는 아파트에 살아요.", ex_zh: "我住在公寓裡。" },
            { id: 946, word: "내용", meaning: "內容物", ex_kr: "이 책의 내용이 아주 흥미로워요.", ex_zh: "這本書的內容非常有趣。" },
            { id: 947, word: "카드", meaning: "卡片", ex_kr: "카드로 계산해도 돼요?", ex_zh: "我可以用信用卡付款嗎？" },
            { id: 948, word: "일부", meaning: "部分、章節、部分", ex_kr: "이 책의 일부만 읽었어요.", ex_zh: "我只讀了這本書的一部分。" },
            { id: 949, word: "중간", meaning: "中間", ex_kr: "수업 중간에 쉬는 시간이 있어요.", ex_zh: "課間有休息時間。" },
            { id: 950, word: "분위기", meaning: "氛圍、情緒", ex_kr: "이 카페는 분위기가 아주 좋아요.", ex_zh: "這家咖啡館氛圍真好。" },
            { id: 951, word: "의미", meaning: "意義、意義", ex_kr: "이 단어의 의미가 뭐예요?", ex_zh: "這個詞是什麼意思？" },
            { id: 952, word: "수건", meaning: "毛巾", ex_kr: "샤워 후에 수건으로 몸을 닦았어요.", ex_zh: "洗完澡後，我用毛巾擦乾了身體。" },
            { id: 953, word: "갖다주다", meaning: "帶過來", ex_kr: "물 좀 갖다주세요.", ex_zh: "請給我拿些水來。" },
            { id: 954, word: "심심하다", meaning: "感到無聊", ex_kr: "주말에 할 일이 없어서 심심해요.", ex_zh: "我周末沒事做，覺得很無聊。" },
            { id: 955, word: "메뉴", meaning: "選單", ex_kr: "메뉴 좀 보여주세요.", ex_zh: "請給我看看菜單。" },
            { id: 956, word: "세우다", meaning: "使某物站立、豎立；停止、停放；設立", ex_kr: "길가에 차를 세웠어요.", ex_zh: "我把車停在路邊了。" },
            { id: 957, word: "외식하다", meaning: "外出用餐", ex_kr: "오늘은 밖에서 외식할까요?", ex_zh: "我們今天出去吃嗎？" },
            { id: 958, word: "고등학교", meaning: "中學", ex_kr: "저는 고등학교 때 친구들을 자주 만나요.", ex_zh: "我經常和我的高中朋友們聚會。" },
            { id: 959, word: "정보", meaning: "資訊", ex_kr: "인터넷에서 유용한 정보를 찾았어요.", ex_zh: "我在網路上找到了一些有用的信息。" },
            { id: 960, word: "부분", meaning: "部分", ex_kr: "이 부분이 제일 중요해요.", ex_zh: "這部分最為重要。" },
            { id: 961, word: "다행이다", meaning: "幸運、好運", ex_kr: "사고가 났지만 아무도 안 다쳐서 다행이에요.", ex_zh: "令人欣慰的是，雖然發生了事故，但沒有人受傷。" },
            { id: 962, word: "별", meaning: "星星", ex_kr: "밤하늘에 별이 많아요.", ex_zh: "夜空中有很多星星。" },
            { id: 963, word: "홍차", meaning: "紅茶", ex_kr: "저는 커피보다 홍차를 더 좋아해요.", ex_zh: "比起咖啡，我更喜歡紅茶。" },
            { id: 964, word: "튼튼하다", meaning: "強壯、穩固、健康", ex_kr: "운동을 해서 몸이 튼튼해졌어요.", ex_zh: "我堅持鍛煉，身體變得強壯了。" },
            { id: 965, word: "돼지", meaning: "豬", ex_kr: "저는 돼지고기를 좋아해요.", ex_zh: "我喜歡豬肉。" },
            { id: 966, word: "자장면", meaning: "炸醬麵", ex_kr: "점심으로 자장면을 먹었어요.", ex_zh: "我午餐吃了炸醬麵。" },
            { id: 967, word: "미래", meaning: "未來", ex_kr: "미래에 무엇이 되고 싶어요?", ex_zh: "你未來想成為什麼樣的人？" },
            { id: 968, word: "고치다", meaning: "修理、修復", ex_kr: "컴퓨터가 고장 나서 고쳤어요.", ex_zh: "電腦壞了，所以我把它修好了。" },
            { id: 969, word: "소설", meaning: "小說", ex_kr: "저는 해리포터 소설을 좋아해요.", ex_zh: "我喜歡哈利波特系列小說。" },
            { id: 970, word: "가지", meaning: "種類；樹枝；茄子", ex_kr: "여러 가지 과일을 샀어요.", ex_zh: "我買了各種各樣的水果。" },
            { id: 971, word: "초", meaning: "秒；蠟燭", ex_kr: "1분은 60초입니다.", ex_zh: "一分鐘等於60秒。" },
            { id: 972, word: "관계", meaning: "關係、聯繫", ex_kr: "그 사람과 저는 아무 관계 아니에요.", ex_zh: "我和那個人沒有任何關係。" },
            { id: 973, word: "이용하다", meaning: "利用、發揮優勢", ex_kr: "대중교통을 이용하면 편리해요.", ex_zh: "搭乘大眾運輸工具很方便。" },
            { id: 974, word: "사회", meaning: "社會、社區", ex_kr: "우리는 더 좋은 사회를 만들어야 합니다.", ex_zh: "我們必須創造一個更美好的社會。" },
            { id: 975, word: "거울", meaning: "鏡子", ex_kr: "아침마다 거울을 봐요.", ex_zh: "我每天早上都會照鏡子。" },
            { id: 976, word: "잃어버리다", meaning: "完全失去某物", ex_kr: "지하철에서 우산을 잃어버렸어요.", ex_zh: "我的傘在地鐵上丟了。" },
            { id: 977, word: "사업", meaning: "企業、商業", ex_kr: "아버지는 작은 사업을 하세요.", ex_zh: "我父親經營一家小公司。" },
            { id: 978, word: "비디오", meaning: "影片", ex_kr: "옛날에는 비디오를 빌려 봤어요.", ex_zh: "我以前常租錄影帶。" },
            { id: 979, word: "버섯", meaning: "菇", ex_kr: "저는 버섯 요리를 좋아해요.", ex_zh: "我喜歡蘑菇菜。" },
            { id: 980, word: "가까이", meaning: "靠近、接近；幾乎", ex_kr: "제 옆으로 더 가까이 오세요.", ex_zh: "靠近我一點。" },
            { id: 981, word: "문법", meaning: "文法", ex_kr: "한국어 문법은 조금 어려워요.", ex_zh: "韓文文法有點難。" },
            { id: 982, word: "동물", meaning: "動物", ex_kr: "어떤 동물을 가장 좋아해요?", ex_zh: "你最喜歡哪一種動物？" },
            { id: 983, word: "주차장", meaning: "停車場", ex_kr: "주차장에 자리가 없어요.", ex_zh: "停車場沒有空位了。" },
            { id: 984, word: "밉다", meaning: "令人憎惡的、令人厭惡的；醜陋的", ex_kr: "거짓말하는 사람은 정말 미워요.", ex_zh: "我非常討厭說謊的人。" },
            { id: 985, word: "넥타이", meaning: "領帶", ex_kr: "아버지는 회사에 갈 때 넥타이를 매요.", ex_zh: "我父親上班時會繫領帶。" },
            { id: 986, word: "휴일", meaning: "國定假日", ex_kr: "이번 주 월요일은 휴일이에요.", ex_zh: "本週一是假日。" },
            { id: 987, word: "술집", meaning: "酒吧、酒館", ex_kr: "금요일 밤에는 술집에 사람이 많아요.", ex_zh: "週五晚上酒吧裡人很多。" },
            { id: 988, word: "아무데나", meaning: "任何地方", ex_kr: "아무데나 앉으세요.", ex_zh: "請隨意入座。" },
            { id: 989, word: "사귀다", meaning: "約會、出去；交朋友、陪伴", ex_kr: "저는 좋은 친구들을 많이 사귀고 싶어요.", ex_zh: "我想交很多好朋友。" },
            { id: 990, word: "그저께", meaning: "前天", ex_kr: "그저께 친구를 만났어요.", ex_zh: "前天我見了一位朋友。" },
            { id: 991, word: "지우다", meaning: "擦掉、劃掉；洗掉", ex_kr: "틀린 글씨를 지우개로 지웠어요.", ex_zh: "我用橡皮擦擦掉了錯誤的字跡。" },
            { id: 992, word: "복사하다", meaning: "複製、拷貝", ex_kr: "이 서류 좀 복사해 주세요.", ex_zh: "請複印此文件。" },
            { id: 993, word: "급하다", meaning: "匆忙、急迫", ex_kr: "급한 일이 생겨서 먼저 가봐야 해요.", ex_zh: "臨時有急事，我得先走了。" },
            { id: 994, word: "장미", meaning: "玫瑰", ex_kr: "그녀는 장미꽃을 좋아해요.", ex_zh: "她喜歡玫瑰。" },
            { id: 995, word: "매우", meaning: "非常、非常", ex_kr: "오늘 날씨가 매우 춥습니다.", ex_zh: "今天天氣很冷。" },
            { id: 996, word: "남기다", meaning: "離開、放下", ex_kr: "음식을 남기지 마세요.", ex_zh: "請不要留下任何食物。" },
            { id: 997, word: "새롭다", meaning: "嶄新、新鮮", ex_kr: "새로운 친구를 사귀고 싶어요.", ex_zh: "我想結交新朋友。" },
            { id: 998, word: "입술", meaning: "嘴唇", ex_kr: "추워서 입술이 파래졌어요.", ex_zh: "因為太冷，我的嘴唇都凍紫了。" },
            { id: 999, word: "계란", meaning: "蛋", ex_kr: "아침 식사로 계란을 먹었어요.", ex_zh: "我早餐吃了雞蛋。" },
            { id: 1000, word: "태권도", meaning: "跆拳道", ex_kr: "저는 어렸을 때 태권도를 배웠어요.", ex_zh: "我小時候學過跆拳道。" },
            { id: 1001, word: "대단하다", meaning: "偉大、卓越；精彩", ex_kr: "그의 연기는 정말 대단했어요.", ex_zh: "他的演技真的很棒。" },
            { id: 1002, word: "지나가다", meaning: "通過、經過", ex_kr: "우리 집 앞을 버스가 지나가요.", ex_zh: "一輛公車從我家門前經過。" },
            { id: 1003, word: "칠판", meaning: "黑板", ex_kr: "선생님께서 칠판에 글씨를 쓰셨어요.", ex_zh: "老師在黑板上寫字。" },
            { id: 1004, word: "목걸이", meaning: "項鍊", ex_kr: "생일 선물로 예쁜 목걸이를 받았어요.", ex_zh: "我收到了一條漂亮的項鍊作為生日禮物。" },
            { id: 1005, word: "졸리다", meaning: "感到困倦", ex_kr: "점심을 먹고 나니 졸려요.", ex_zh: "午飯後我覺得很睏。" },
            { id: 1006, word: "잡수시다", meaning: "吃", ex_kr: "할머니, 진지 잡수세요.", ex_zh: "奶奶，請用餐。" },
            { id: 1007, word: "사라지다", meaning: "消失", ex_kr: "그는 갑자기 사라졌어요.", ex_zh: "他突然消失了。" },
            { id: 1008, word: "부럽다", meaning: "嫉妒、羨慕", ex_kr: "노래를 잘하는 사람이 부러워요.", ex_zh: "我羨慕那些擅長唱歌的人。" },
            { id: 1009, word: "조용히", meaning: "靜靜地、悄無聲息地", ex_kr: "조용히 해 주세요.", ex_zh: "請安靜。" },
            { id: 1010, word: "성격", meaning: "性格、個性", ex_kr: "제 친구는 성격이 아주 밝아요.", ex_zh: "我的朋友個性非常開朗。" },
            { id: 1011, word: "슈퍼마켓", meaning: "超市場", ex_kr: "슈퍼마켓에 가서 우유를 샀어요.", ex_zh: "我去超市買了牛奶。" },
            { id: 1012, word: "목적", meaning: "目的、宗旨、目標", ex_kr: "이번 여행의 목적은 무엇입니까?", ex_zh: "這次旅行的目的是什麼？" },
            { id: 1013, word: "편", meaning: "邊", ex_kr: "저는 당신 편이에요.", ex_zh: "我站在你這邊。" },
            { id: 1014, word: "평소에", meaning: "通常、一般", ex_kr: "평소에 아침을 먹어요?", ex_zh: "你通常吃早餐嗎？" },
            { id: 1015, word: "풀다", meaning: "解開；解開", ex_kr: "수학 문제를 풀었어요.", ex_zh: "我解決了一道數學題。" },
            { id: 1016, word: "입원하다", meaning: "住院治療", ex_kr: "할머니께서 아프셔서 입원하셨어요.", ex_zh: "我奶奶因為生病住院了。" },
            { id: 1017, word: "경우", meaning: "案例、情況、場景", ex_kr: "그런 경우에는 어떻게 해야 해요?", ex_zh: "這種情況我該怎麼辦？" },
            { id: 1018, word: "가격", meaning: "價格", ex_kr: "이 물건의 가격이 얼마예요?", ex_zh: "這個商品多少錢？" },
            { id: 1019, word: "성함", meaning: "姓名", ex_kr: "성함이 어떻게 되세요?", ex_zh: "你叫什麼名字？" },
            { id: 1020, word: "부드럽다", meaning: "柔軟、光滑", ex_kr: "이 빵은 아주 부드러워요.", ex_zh: "這款麵包非常鬆軟。" },
            { id: 1021, word: "채소", meaning: "蔬菜", ex_kr: "건강에 좋은 채소를 많이 드세요.", ex_zh: "多吃健康蔬菜。" },
            { id: 1022, word: "똑같다", meaning: "完全相同", ex_kr: "두 사람은 얼굴이 똑같이 생겼어요.", ex_zh: "這兩個人長得一模一樣。" },
            { id: 1023, word: "굽다", meaning: "烘烤、烤製、烤麵包；彎曲、歪斜", ex_kr: "저녁으로 고기를 구워 먹었어요.", ex_zh: "我烤了肉當晚餐。" },
            { id: 1024, word: "결정하다", meaning: "決定", ex_kr: "아직 어디로 갈지 결정하지 못했어요.", ex_zh: "我還沒決定要去哪裡。" },
            { id: 1025, word: "운동화", meaning: "運動鞋", ex_kr: "운동할 때 운동화를 신어요.", ex_zh: "我運動時穿運動鞋。" },
            { id: 1026, word: "대하다", meaning: "面對、對抗；對待", ex_kr: "저는 환경 문제에 대해 관심이 많아요.", ex_zh: "我對環境議題非常感興趣。" },
            { id: 1027, word: "약간", meaning: "稍微、略", ex_kr: "약간 피곤해요.", ex_zh: "我有點累了。" },
            { id: 1028, word: "유리", meaning: "玻璃", ex_kr: "유리컵이 깨졌어요.", ex_zh: "玻璃杯碎了。" },
            { id: 1029, word: "던지다", meaning: "丟", ex_kr: "공을 멀리 던졌어요.", ex_zh: "我把球丟得很遠。" },
            { id: 1030, word: "아주머니", meaning: "中年婦女；阿姨", ex_kr: "아주머니, 사과 얼마예요?", ex_zh: "夫人，這些蘋果多少錢？" },
            { id: 1031, word: "장마", meaning: "雨季、雨季", ex_kr: "여름에는 장마 때문에 비가 많이 와요.", ex_zh: "夏季是雨季，所以降雨量很大。" },
            { id: 1032, word: "따라가다", meaning: "跟隨、追隨、跟上", ex_kr: "친구를 따라서 시장에 갔어요.", ex_zh: "我和朋友一起去了市場。" },
            { id: 1033, word: "숫자", meaning: "數位", ex_kr: "1부터 10까지 숫자를 세어 보세요.", ex_zh: "數一數從1到10的數字。" },
            { id: 1034, word: "웬일", meaning: "什麼重要、什麼原因", ex_kr: "여기는 웬일이세요?", ex_zh: "你來這裡做什麼？" },
            { id: 1035, word: "대학", meaning: "大學", ex_kr: "저는 서울대학교에 다니고 싶어요.", ex_zh: "我想就讀首爾大學。" },
            { id: 1036, word: "간식", meaning: "小吃", ex_kr: "오후에 간식으로 과자를 먹었어요.", ex_zh: "我下午吃了一些餅乾當零食。" },
            { id: 1037, word: "애인", meaning: "愛人、甜心", ex_kr: "저는 아직 애인이 없어요.", ex_zh: "我目前還沒有男友/女友。" },
            { id: 1038, word: "집중하다", meaning: "集中", ex_kr: "공부할 때는 집중해야 해요.", ex_zh: "學習時需要集中註意力。" },
            { id: 1039, word: "두다", meaning: "放置；留下", ex_kr: "책을 책상 위에 두세요.", ex_zh: "請把書放在桌上。" },
            { id: 1040, word: "진심으로", meaning: "發自內心的", ex_kr: "진심으로 축하드립니다.", ex_zh: "由衷祝賀。" },
            { id: 1041, word: "센티미터", meaning: "公分", ex_kr: "제 키는 170센티미터입니다.", ex_zh: "我的身高是170公分。" },
            { id: 1042, word: "귤", meaning: "橘子、柑橘", ex_kr: "겨울에는 귤이 맛있어요.", ex_zh: "冬天吃橘子很美味。" },
            { id: 1043, word: "죽", meaning: "粥、稀粥；一排", ex_kr: "아플 때는 죽을 먹는 것이 좋아요.", ex_zh: "生病的時候吃粥比較好。" },
            { id: 1044, word: "꽤", meaning: "實質上、相當", ex_kr: "오늘 날씨가 꽤 춥네요.", ex_zh: "今天天氣很冷。" },
            { id: 1045, word: "한잔하다", meaning: "喝一杯", ex_kr: "오늘 저녁에 같이 한잔할까요?", ex_zh: "我們今晚一起喝一杯好嗎？" },
            { id: 1046, word: "부인", meaning: "妻子；女人、女士；否定、不贊成", ex_kr: "사장님 부인께서 오셨습니다.", ex_zh: "老闆娘來了。" },
            { id: 1047, word: "이마", meaning: "前額", ex_kr: "넘어져서 이마를 다쳤어요.", ex_zh: "我跌倒了，額頭受傷了。" },
            { id: 1048, word: "인생", meaning: "生命", ex_kr: "인생은 짧고 예술은 길다.", ex_zh: "生命短暫，藝術永恆。" },
            { id: 1049, word: "결국", meaning: "畢竟、最終、到最後", ex_kr: "열심히 노력했지만 결국 실패했어요.", ex_zh: "我盡了全力，但最終還是失敗了。" },
            { id: 1050, word: "정류장", meaning: "車站", ex_kr: "버스 정류장에서 버스를 기다려요.", ex_zh: "我正在公車站等車。" },
            { id: 1051, word: "가난하다", meaning: "貧窮", ex_kr: "그는 어렸을 때 아주 가난했어요.", ex_zh: "他小時候很窮。" },
            { id: 1052, word: "찾아가다", meaning: "參觀", ex_kr: "이번 주말에 할머니 댁을 찾아갈 거예요.", ex_zh: "我這週末要去奶奶家。" },
            { id: 1053, word: "화장품", meaning: "化妝品", ex_kr: "이 가게는 다양한 화장품을 팔아요.", ex_zh: "這家商店出售各種化妝品。" },
            { id: 1054, word: "동네", meaning: "社區、村莊", ex_kr: "우리 동네에는 공원이 있어요.", ex_zh: "我們社區裡有個公園。" },
            { id: 1055, word: "취직하다", meaning: "找到工作", ex_kr: "대학교를 졸업하고 좋은 회사에 취직하고 싶어요.", ex_zh: "我想大學畢業後進入好公司工作。" },
            { id: 1056, word: "알리다", meaning: "通知、告知、通報", ex_kr: "중요한 소식을 친구들에게 알렸어요.", ex_zh: "我和朋友們分享了一些重要消息。" },
            { id: 1057, word: "도와주다", meaning: "幫忙、協助", ex_kr: "가방이 무거운데 좀 도와주세요.", ex_zh: "我的包包很重，請幫幫我。" },
            { id: 1058, word: "둘이", meaning: "兩個人", ex_kr: "둘이 같이 영화 보러 갈까요?", ex_zh: "我們一起去看電影好嗎？" },
            { id: 1059, word: "가능하다", meaning: "有可能", ex_kr: "내일까지 이 일을 끝내는 것이 가능할까요?", ex_zh: "明天之前有可能完成這項工作嗎？" },
            { id: 1060, word: "덜", meaning: "較少的", ex_kr: "어제보다 덜 추워요.", ex_zh: "今天比昨天暖和些。" },
            { id: 1061, word: "위험하다", meaning: "危險的、有風險的", ex_kr: "밤에 혼자 다니는 것은 위험해요.", ex_zh: "夜間獨自出行很危險。" },
            { id: 1062, word: "인형", meaning: "玩偶、木偶", ex_kr: "어린이들이 인형을 가지고 놀고 있어요.", ex_zh: "孩子們在玩娃娃。" },
            { id: 1063, word: "월급", meaning: "月薪", ex_kr: "저는 매달 25일에 월급을 받아요.", ex_zh: "我每個月25號領薪水。" },
            { id: 1064, word: "용돈", meaning: "零用錢、零用錢", ex_kr: "부모님께 한 달에 용돈을 10만 원 받아요.", ex_zh: "我每個月從父母那裡拿到10萬韓元的零用錢。" },
            { id: 1065, word: "좁다", meaning: "狹窄", ex_kr: "이 길은 너무 좁아요.", ex_zh: "這條路太窄了。" },
            { id: 1066, word: "순간", meaning: "瞬間", ex_kr: "그 순간을 잊을 수 없어요.", ex_zh: "我永遠也忘不了那一刻。" },
            { id: 1067, word: "기사", meaning: "新聞文章；司機；司機；工程師", ex_kr: "택시 기사 아저씨가 친절했어요.", ex_zh: "計程車司機很和善。" },
            { id: 1068, word: "지다", meaning: "失敗、戰敗；有義務；跌倒、墜落", ex_kr: "어제 축구 경기에서 우리 팀이 졌어요.", ex_zh: "我們隊昨天輸了足球比賽。" },
            { id: 1069, word: "종일", meaning: "整天", ex_kr: "오늘은 종일 비가 왔어요.", ex_zh: "今天下了一整天的雨。" },
            { id: 1070, word: "좌석", meaning: "座位", ex_kr: "제 좌석은 어디인가요?", ex_zh: "我的座位在哪裡？" },
            { id: 1071, word: "선배", meaning: "資深人士", ex_kr: "회사 선배에게 많은 것을 배웠어요.", ex_zh: "我從一位資深同事身上學到了很多。" },
            { id: 1072, word: "원하다", meaning: "想要、希望", ex_kr: "저는 평화로운 삶을 원해요.", ex_zh: "我想要平靜的生活。" },
            { id: 1073, word: "식구", meaning: "家人、家庭成員", ex_kr: "우리 식구는 모두 네 명이에요.", ex_zh: "我家有四口人。" },
            { id: 1074, word: "젖다", meaning: "弄濕、浸透、濕潤", ex_kr: "갑자기 비가 와서 옷이 다 젖었어요.", ex_zh: "突然下起了雨，我的衣服全濕透了。" },
            { id: 1075, word: "피", meaning: "血", ex_kr: "손가락에서 피가 나요.", ex_zh: "我的手指流血了。" },
            { id: 1076, word: "확인하다", meaning: "確認、核實、檢查", ex_kr: "예약 내용을 다시 확인해 주세요.", ex_zh: "請仔細核對您的預訂資訊。" },
            { id: 1077, word: "양복", meaning: "套裝", ex_kr: "그는 중요한 회의에 양복을 입고 갔어요.", ex_zh: "他穿著西裝去參加一個重要會議。" },
            { id: 1078, word: "잊어버리다", meaning: "徹底忘記", ex_kr: "친구 생일을 잊어버렸어요.", ex_zh: "我忘了朋友的生日。" },
            { id: 1079, word: "차이", meaning: "不同之處", ex_kr: "두 제품은 큰 차이가 없어요.", ex_zh: "這兩款產品之間並沒有太大差異。" },
            { id: 1080, word: "숲", meaning: "森林", ex_kr: "숲 속을 걸으면 기분이 좋아져요.", ex_zh: "在森林裡散步讓我感覺很好。" },
            { id: 1081, word: "귀걸이", meaning: "耳環", ex_kr: "생일 선물로 예쁜 귀걸이를 받았어요.", ex_zh: "我收到了一副漂亮的耳環作為生日禮物。" },
            { id: 1082, word: "닮다", meaning: "相似、像", ex_kr: "저는 아버지를 닮았어요.", ex_zh: "我長得像我父親。" },
            { id: 1083, word: "열리다", meaning: "開放、展開；結果", ex_kr: "문이 자동으로 열려요.", ex_zh: "門會自動打開。" },
            { id: 1084, word: "바보", meaning: "傻瓜、笨蛋", ex_kr: "그런 실수를 하다니, 저는 바보예요.", ex_zh: "我真是個傻瓜，竟然犯了這樣的錯誤。" },
            { id: 1085, word: "관심", meaning: "興趣、關注", ex_kr: "저는 한국 역사에 관심이 많아요.", ex_zh: "我對韓國歷史非常感興趣。" },
            { id: 1086, word: "원래", meaning: "原本、就本性而言、總是", ex_kr: "저는 원래 아침을 잘 안 먹어요.", ex_zh: "我通常不吃早餐。" },
            { id: 1087, word: "결과", meaning: "結果", ex_kr: "시험 결과가 나왔어요.", ex_zh: "測試結果出來了。" },
            { id: 1088, word: "미리", meaning: "提早", ex_kr: "약속 시간보다 미리 도착했어요.", ex_zh: "我比預定時間提早到達了。" },
            { id: 1089, word: "휴대전화", meaning: "智慧型手機", ex_kr: "휴대전화 배터리가 없어요.", ex_zh: "我的手機電池沒電了。" },
            { id: 1090, word: "숨다", meaning: "隱藏、消失", ex_kr: "아이가 침대 밑에 숨었어요.", ex_zh: "孩子躲到了床底下。" },
            { id: 1091, word: "배부르다", meaning: "吃飽", ex_kr: "점심을 너무 많이 먹어서 배불러요.", ex_zh: "我午餐吃太多了，所以現在很飽。" },
            { id: 1092, word: "상처", meaning: "受傷、傷口、瘀傷", ex_kr: "넘어져서 무릎에 상처가 났어요.", ex_zh: "我摔倒了，膝蓋擦破了。" },
            { id: 1093, word: "출장", meaning: "商務旅行", ex_kr: "다음 주에 부산으로 출장을 가요.", ex_zh: "我下週要去釜山出差。" },
            { id: 1094, word: "그대로", meaning: "原樣、完好無損", ex_kr: "움직이지 말고 그대로 있으세요.", ex_zh: "不要動，就待在原地。" },
            { id: 1095, word: "동쪽", meaning: "東部", ex_kr: "해는 동쪽에서 떠요.", ex_zh: "太陽從東方升起。" },
            { id: 1096, word: "절대로", meaning: "絕不；絕對、完全", ex_kr: "저는 절대로 포기하지 않을 거예요.", ex_zh: "我永不放棄。" },
            { id: 1097, word: "중심", meaning: "中心、核心、平衡", ex_kr: "이 도시의 중심은 시청입니다.", ex_zh: "這座城市的中心是市政廳。" },
            { id: 1098, word: "부지런하다", meaning: "勤奮努力", ex_kr: "그 학생은 아주 부지런해요.", ex_zh: "那個學生非常勤奮。" },
            { id: 1099, word: "인상", meaning: "印象；特徵、外觀；增加", ex_kr: "그 사람의 첫인상이 아주 좋았어요.", ex_zh: "我對那個人的第一印象非常好。" },
            { id: 1100, word: "방송하다", meaning: "廣播", ex_kr: "이 프로그램은 매주 금요일에 방송됩니다.", ex_zh: "該節目每週五播出。" },
            { id: 1101, word: "세탁기", meaning: "洗衣機", ex_kr: "세탁기로 빨래를 했어요.", ex_zh: "我用洗衣機洗了衣服。" },
            { id: 1102, word: "실례", meaning: "沒禮貌、粗魯", ex_kr: "실례지만, 말씀 좀 묻겠습니다.", ex_zh: "打擾一下，請容許我問您一個問題。" },
            { id: 1103, word: "댁", meaning: "眾議院", ex_kr: "선생님 댁은 어디세요?", ex_zh: "老師，您住在哪裡？" },
            { id: 1104, word: "환자", meaning: "病人(醫療)", ex_kr: "의사가 환자를 진찰하고 있어요.", ex_zh: "醫生正在幫病人檢查。" },
            { id: 1105, word: "대사관", meaning: "大使館", ex_kr: "비자를 받으러 미국 대사관에 갔어요.", ex_zh: "我去美國大使館辦理簽證。" },
            { id: 1106, word: "깨지다", meaning: "破碎、被打破", ex_kr: "조심하세요, 컵이 깨졌어요.", ex_zh: "小心，杯子碎了。" },
            { id: 1107, word: "한자", meaning: "漢字", ex_kr: "한국어에는 한자어가 많아요.", ex_zh: "有很多漢字和韓語詞彙。" },
            { id: 1108, word: "바닥", meaning: "地板、底部", ex_kr: "바닥이 미끄러우니 조심하세요.", ex_zh: "地板很滑，請小心。" },
            { id: 1109, word: "왜냐하면", meaning: "因為、由於", ex_kr: "저는 집에 일찍 갔어요. 왜냐하면 피곤했기 때문이에요.", ex_zh: "我提前回家了，因為我累了。" },
            { id: 1110, word: "뛰다", meaning: "跳躍；奔跑、衝刺", ex_kr: "아이들이 운동장에서 뛰고 있어요.", ex_zh: "孩子們在操場上奔跑。" },
            { id: 1111, word: "아시아", meaning: "亞洲", ex_kr: "한국은 아시아에 있는 나라입니다.", ex_zh: "韓國是亞洲的一個國家。" },
            { id: 1112, word: "역시", meaning: "也一樣；正如預期的那樣；仍然", ex_kr: "역시 당신이 최고예요.", ex_zh: "你果然是最棒的。" },
            { id: 1113, word: "뵙다", meaning: "見到、會見", ex_kr: "내일 다시 뵙겠습니다.", ex_zh: "我明天還會再見到你。" },
            { id: 1114, word: "호랑이", meaning: "老虎", ex_kr: "호랑이는 용감한 동물입니다.", ex_zh: "老虎是一種勇敢的動物。" },
            { id: 1115, word: "식탁", meaning: "餐桌", ex_kr: "식탁 위에 음식이 많이 차려져 있어요.", ex_zh: "桌上擺滿了食物。" },
            { id: 1116, word: "반대", meaning: "相反、對立", ex_kr: "저는 그 의견에 반대해요.", ex_zh: "我不同意這種觀點。" },
            { id: 1117, word: "대학생", meaning: "大學生", ex_kr: "저는 대학생입니다.", ex_zh: "我是一名大學生。" },
            { id: 1118, word: "갈색", meaning: "淺棕色", ex_kr: "저는 갈색 가방을 가지고 있어요.", ex_zh: "我有一個棕色的袋子。" },
            { id: 1119, word: "경치", meaning: "場景、風景", ex_kr: "설악산의 경치가 정말 아름다워요.", ex_zh: "雪嶽山的景色真是太美了。" },
            { id: 1120, word: "구하다", meaning: "尋找、搜尋；營救、拯救", ex_kr: "새 집을 구하고 있어요.", ex_zh: "我正在尋找新房子。" },
            { id: 1121, word: "건너편", meaning: "另一邊", ex_kr: "은행은 길 건너편에 있어요.", ex_zh: "銀行就在街對面。" },
            { id: 1122, word: "지방", meaning: "當地區域、地區；脂肪", ex_kr: "저는 이번 휴가에 지방으로 여행을 갈 거예요.", ex_zh: "我打算去鄉下度假。" },
            { id: 1123, word: "젊다", meaning: "年輕、青春", ex_kr: "할머니는 마음이 항상 젊으세요.", ex_zh: "奶奶永遠有一顆年輕的心。" },
            { id: 1124, word: "군인", meaning: "軍人、士兵", ex_kr: "제 남자친구는 군인이에요.", ex_zh: "我男友是名軍人。" },
            { id: 1125, word: "여권", meaning: "護照", ex_kr: "해외여행을 가려면 여권이 필요해요.", ex_zh: "出國旅行需要護照。" },
            { id: 1126, word: "광고", meaning: "廣告", ex_kr: "텔레비전에서 재미있는 광고를 봤어요.", ex_zh: "我在電視上看到一個很有趣的廣告。" },
            { id: 1127, word: "위하다", meaning: "為了……的緣故、代表……去做", ex_kr: "가족을 위해 열심히 일해요.", ex_zh: "我努力工作是為了我的家人。" },
            { id: 1128, word: "습관", meaning: "習慣", ex_kr: "아침에 일찍 일어나는 습관을 들이고 싶어요.", ex_zh: "我想養成早起的習慣。" },
            { id: 1129, word: "생각나다", meaning: "浮現在腦海中、想起、記得", ex_kr: "갑자기 좋은 생각이 났어요.", ex_zh: "我突然想到一個好主意。" },
            { id: 1130, word: "남학생", meaning: "男學生", ex_kr: "우리 반에는 남학생이 15명 있어요.", ex_zh: "我們班有15個男生。" },
            { id: 1131, word: "군대", meaning: "軍隊、部隊", ex_kr: "한국 남자들은 군대에 가야 해요.", ex_zh: "韓國男性必須服兵役。" },
            { id: 1132, word: "두껍다", meaning: "厚重的", ex_kr: "겨울에는 두꺼운 옷을 입어요.", ex_zh: "冬天我穿厚衣服。" },
            { id: 1133, word: "모래", meaning: "沙", ex_kr: "해변에서 모래성을 쌓았어요.", ex_zh: "我在沙灘上堆了一座沙堡。" },
            { id: 1134, word: "노트", meaning: "記筆記；筆記本", ex_kr: "수업 내용을 노트에 필기했어요.", ex_zh: "我寫下了課堂內容筆記。" },
            { id: 1135, word: "테니스", meaning: "網球", ex_kr: "저는 테니스를 치는 것을 좋아해요.", ex_zh: "我喜歡打網球。" },
            { id: 1136, word: "제목", meaning: "職稱、姓名", ex_kr: "이 책의 제목이 뭐예요?", ex_zh: "這本書的書名是什麼？" },
            { id: 1137, word: "이상", meaning: "超過、高於；異常；理想", ex_kr: "19세 이상만 이 영화를 볼 수 있어요.", ex_zh: "只有19歲及以上的人才能觀看這部電影。" },
            { id: 1138, word: "샌드위치", meaning: "三明治", ex_kr: "아침으로 간단하게 샌드위치를 먹었어요.", ex_zh: "我早餐吃了一個簡單的三明治。" },
            { id: 1139, word: "아래층", meaning: "樓下", ex_kr: "아래층에 사는 사람을 만났어요.", ex_zh: "我遇到了住在樓下的人。" },
            { id: 1140, word: "활동", meaning: "活動", ex_kr: "그는 다양한 사회 활동에 참여해요.", ex_zh: "他積極參與各種社會活動。" },
            { id: 1141, word: "찌개", meaning: "燉", ex_kr: "저는 김치찌개를 제일 좋아해요.", ex_zh: "我最喜歡泡菜湯。" },
            { id: 1142, word: "따로", meaning: "分別地；此外", ex_kr: "같이 계산할까요, 따로 계산할까요?", ex_zh: "我們應該一起付還是分開付？" },
            { id: 1143, word: "여학생", meaning: "女學生", ex_kr: "우리 반에는 여학생이 더 많아요.", ex_zh: "我們班女生比較多。" },
            { id: 1144, word: "비밀번호", meaning: "密碼、PIN碼", ex_kr: "비밀번호를 잊어버렸어요.", ex_zh: "我忘了密碼。" },
            { id: 1145, word: "경찰관", meaning: "警官", ex_kr: "경찰관 아저씨가 길을 알려주셨어요.", ex_zh: "警察給我指路。" },
            { id: 1146, word: "정답", meaning: "正確答案", ex_kr: "정답을 아는 사람 있어요?", ex_zh: "有人知道答案嗎？" },
            { id: 1147, word: "걸어오다", meaning: "步行前來", ex_kr: "저는 집에서 학교까지 걸어와요.", ex_zh: "我步行上學。" },
            { id: 1148, word: "움직이다", meaning: "移動", ex_kr: "너무 많이 먹어서 움직이기 힘들어요.", ex_zh: "我吃太多了，所以動彈不得。" },
            { id: 1149, word: "치약", meaning: "牙膏", ex_kr: "치약으로 이를 닦아요.", ex_zh: "用牙膏刷牙。" },
            { id: 1150, word: "바닷가", meaning: "海灘、海邊", ex_kr: "여름휴가 때 바닷가에 놀러 갔어요.", ex_zh: "暑假期間我去了海邊。" },
            { id: 1151, word: "회색", meaning: "灰色的", ex_kr: "저는 회색 코트를 샀어요.", ex_zh: "我買了一件灰色外套。" },
            { id: 1152, word: "데리고가다", meaning: "把某人帶到某個地方", ex_kr: "아이를 학교에 데리고 갔어요.", ex_zh: "我送孩子去上學了。" },
            { id: 1153, word: "부끄럽다", meaning: "感到羞恥、丟臉、難為情；害羞", ex_kr: "사람들 앞에서 말하기가 부끄러워요.", ex_zh: "我不好意思在人面前說話。" },
            { id: 1154, word: "쉽게", meaning: "容易地", ex_kr: "이 문제는 쉽게 풀 수 있어요.", ex_zh: "這個問題很容易解決。" },
            { id: 1155, word: "수첩", meaning: "筆記本、個人記事本", ex_kr: "중요한 약속은 수첩에 적어 둬요.", ex_zh: "把重要的約會記在筆記本上。" },
            { id: 1156, word: "모델", meaning: "模型", ex_kr: "제 친구는 패션 모델이에요.", ex_zh: "我的朋友是一名時裝模特兒。" },
            { id: 1157, word: "결혼식", meaning: "婚禮", ex_kr: "이번 주말에 친구 결혼식에 가요.", ex_zh: "我這週末要去參加朋友的婚禮。" },
            { id: 1158, word: "선택하다", meaning: "選擇、選擇", ex_kr: "두 가지 중에서 하나를 선택하세요.", ex_zh: "請從兩者中選擇其一。" },
            { id: 1159, word: "상품", meaning: "產品、商品；獎品", ex_kr: "이 상품은 품질이 아주 좋아요.", ex_zh: "這款產品品質非常好。" },
            { id: 1160, word: "수영복", meaning: "泳裝", ex_kr: "수영장에 가려면 수영복이 필요해요.", ex_zh: "去游泳池需要泳衣。" },
            { id: 1161, word: "공짜", meaning: "免費", ex_kr: "이 음료수는 공짜예요.", ex_zh: "這杯飲料免費。" },
            { id: 1162, word: "출구", meaning: "出口", ex_kr: "지하철역 3번 출구로 나오세요.", ex_zh: "請從地鐵站3號出口離開。" },
            { id: 1163, word: "번역", meaning: "翻譯", ex_kr: "이 책을 한국어로 번역하고 싶어요.", ex_zh: "我想把這本書翻譯成韓文。" },
            { id: 1164, word: "당장", meaning: "當場、立即", ex_kr: "지금 당장 와 주세요.", ex_zh: "請立即過來。" },
            { id: 1165, word: "주로", meaning: "主要、主要", ex_kr: "저는 주말에 주로 집에서 쉬어요.", ex_zh: "我週末通常都在家休息。" },
            { id: 1166, word: "해외", meaning: "外國、海外", ex_kr: "저는 해외에서 살아보고 싶어요.", ex_zh: "我想去國外生活。" },
            { id: 1167, word: "얼른", meaning: "立即、馬上、迅速地", ex_kr: "늦었으니까 얼른 가세요.", ex_zh: "時間不早了，請快點離開。" },
            { id: 1168, word: "땀", meaning: "汗水", ex_kr: "운동을 해서 땀이 많이 났어요.", ex_zh: "我運動後出了很多汗。" },
            { id: 1169, word: "사촌", meaning: "表哥", ex_kr: "저는 사촌 동생과 사이가 좋아요.", ex_zh: "我和我的表弟相處得很好。" },
            { id: 1170, word: "들리다", meaning: "被聽見、被聆聽；被舉起、被提升", ex_kr: "밖에서 이상한 소리가 들려요.", ex_zh: "我聽到外面傳來奇怪的聲音。" },
            { id: 1171, word: "고개", meaning: "頭部、頸部；山丘", ex_kr: "알겠다는 뜻으로 고개를 끄덕였어요.", ex_zh: "我點頭表示明白。" },
            { id: 1172, word: "세계", meaning: "世界", ex_kr: "저는 세계 여러 나라를 여행하고 싶어요.", ex_zh: "我想去世界各地旅行。" },
            { id: 1173, word: "가요", meaning: "歌曲", ex_kr: "저는 최신 가요를 즐겨 들어요.", ex_zh: "我喜歡聽最新的流行歌曲。" },
            { id: 1174, word: "추워지다", meaning: "變冷", ex_kr: "가을이 되면 날씨가 추워져요.", ex_zh: "秋天來了，天氣變冷了。" },
            { id: 1175, word: "모으다", meaning: "收集、聚集", ex_kr: "저는 취미로 우표를 모아요.", ex_zh: "我以集郵為嗜好。" },
            { id: 1176, word: "떡", meaning: "韓國年糕", ex_kr: "한국에서는 명절에 떡을 먹어요.", ex_zh: "在韓國，我們會在節日期間吃年糕。" },
            { id: 1177, word: "다행히", meaning: "幸運的是", ex_kr: "다행히 기차를 놓치지 않았어요.", ex_zh: "幸好我沒有錯過火車。" },
            { id: 1178, word: "경험하다", meaning: "體驗", ex_kr: "저는 다양한 문화를 경험하고 싶어요.", ex_zh: "我想體驗不同的文化。" },
            { id: 1179, word: "계산하다", meaning: "計算；支付", ex_kr: "제가 계산할게요.", ex_zh: "我來付錢。" },
            { id: 1180, word: "손목", meaning: "手腕", ex_kr: "손목시계가 고장 났어요.", ex_zh: "我的手錶壞了。" },
            { id: 1181, word: "공휴일", meaning: "法定假日、銀行假日", ex_kr: "내일은 공휴일이라서 회사에 안 가요.", ex_zh: "我明天不去上班，因為是國定假日。" },
            { id: 1182, word: "저번", meaning: "上次、就是前幾天", ex_kr: "저번 주에 만났던 사람 기억나요?", ex_zh: "你還記得上週遇到的那個人嗎？" },
            { id: 1183, word: "넘다", meaning: "超過；攀升", ex_kr: "강을 헤엄쳐서 넘었어요.", ex_zh: "我遊過了河。" },
            { id: 1184, word: "별일", meaning: "特殊事件、不尋常的事件", ex_kr: "별일 없으시죠?", ex_zh: "你一切都好，對吧？" },
            { id: 1185, word: "분홍색", meaning: "粉紅色的", ex_kr: "저는 분홍색을 좋아해요.", ex_zh: "我喜歡粉紅色。" },
            { id: 1186, word: "신나다", meaning: "感到興奮", ex_kr: "소풍 갈 생각에 신나요.", ex_zh: "我很興奮能去野餐。" },
            { id: 1187, word: "라디오", meaning: "收音機", ex_kr: "운전하면서 라디오를 들어요.", ex_zh: "我開車時會聽廣播。" },
            { id: 1188, word: "원숭이", meaning: "猴", ex_kr: "동물원에서 원숭이를 봤어요.", ex_zh: "我在動物園看到了一隻猴子。" },
            { id: 1189, word: "공무원", meaning: "公務員、政府僱員", ex_kr: "제 친구는 시청에서 일하는 공무원입니다.", ex_zh: "我的朋友是市政廳的公務員。" },
            { id: 1190, word: "자랑하다", meaning: "引以為豪、吹噓", ex_kr: "그는 자기 아들을 항상 자랑해요.", ex_zh: "他總是炫耀他的兒子。" },
            { id: 1191, word: "올라오다", meaning: "即將到來", ex_kr: "산 정상까지 올라왔어요.", ex_zh: "我一路爬到了山頂。" },
            { id: 1192, word: "러시아", meaning: "俄羅斯", ex_kr: "러시아는 세계에서 가장 큰 나라입니다.", ex_zh: "俄羅斯是世界上最大的國家。" },
            { id: 1193, word: "조사", meaning: "調查、勘察；職位", ex_kr: "경찰이 사고 원인을 조사하고 있어요.", ex_zh: "警方正在調查事故原因。" },
            { id: 1194, word: "정확하다", meaning: "準確、正確、精確", ex_kr: "정확한 시간을 알려주세요.", ex_zh: "請告訴我確切時間。" },
            { id: 1195, word: "자식", meaning: "自己的孩子", ex_kr: "부모님은 자식을 사랑해요.", ex_zh: "父母愛自己的孩子。" },
            { id: 1196, word: "표정", meaning: "表情", ex_kr: "그는 표정이 별로 좋지 않아요.", ex_zh: "他看起來不太好。" },
            { id: 1197, word: "취소하다", meaning: "取消、撤回", ex_kr: "비행기 표를 취소했어요.", ex_zh: "我取消了機票。" },
            { id: 1198, word: "높이", meaning: "高度；高、高度", ex_kr: "비행기가 하늘 높이 날고 있어요.", ex_zh: "飛機正在高空飛行。" },
            { id: 1199, word: "드디어", meaning: "終於", ex_kr: "드디어 시험이 끝났어요.", ex_zh: "考試終於結束了。" },
            { id: 1200, word: "사계절", meaning: "四季", ex_kr: "한국은 사계절이 뚜렷해요.", ex_zh: "韓國有四季之分。" },
            { id: 1201, word: "국수", meaning: "粉麵", ex_kr: "점심으로 잔치국수를 먹었어요.", ex_zh: "我午餐吃了Janchi-guksu。" },
            { id: 1202, word: "전체", meaning: "全部、整個", ex_kr: "전체 학생 중에서 그가 1등을 했어요.", ex_zh: "他在所有學生中名列第一。" },
            { id: 1203, word: "전공하다", meaning: "主修、專攻", ex_kr: "저는 대학교에서 경제학을 전공했어요.", ex_zh: "我大學主修經濟學。" },
            { id: 1204, word: "국제", meaning: "國際的", ex_kr: "국제 회의가 서울에서 열렸어요.", ex_zh: "國際會議在首爾舉行。" },
            { id: 1205, word: "바라다", meaning: "渴望、願望、希望", ex_kr: "새해 복 많이 받으시길 바랍니다.", ex_zh: "祝你新年快樂。" },
            { id: 1206, word: "느리다", meaning: "慢", ex_kr: "거북이는 아주 느려요.", ex_zh: "烏龜行動非常緩慢。" },
            { id: 1207, word: "대부분", meaning: "大部分", ex_kr: "학생들 대부분이 숙제를 해왔어요.", ex_zh: "大部分學生都完成了作業。" },
            { id: 1208, word: "새해", meaning: "新年", ex_kr: "새해 복 많이 받으세요.", ex_zh: "新年快樂" },
            { id: 1209, word: "짐", meaning: "貨物、負擔、行李、貨物", ex_kr: "여행 가방에 짐을 쌌어요.", ex_zh: "我收拾好了行李。" },
            { id: 1210, word: "자료", meaning: "材料、數據", ex_kr: "회의에 필요한 자료를 준비했어요.", ex_zh: "我準備好了會議所需的資料。" },
            { id: 1211, word: "사자", meaning: "獅子", ex_kr: "사자는 동물의 왕입니다.", ex_zh: "獅子是百獸之王。" },
            { id: 1212, word: "국물", meaning: "湯、高湯", ex_kr: "라면 국물이 시원해요.", ex_zh: "拉麵湯底清爽可口。" },
            { id: 1213, word: "신기하다", meaning: "令人驚嘆、美妙絕倫、令人驚嘆", ex_kr: "마술은 정말 신기해요.", ex_zh: "魔術真是太迷人了。" },
            { id: 1214, word: "제대로", meaning: "恰當地、適當地", ex_kr: "밥을 제대로 못 먹었어요.", ex_zh: "我吃不下飯。" },
            { id: 1215, word: "현금", meaning: "現金", ex_kr: "현금으로 계산하면 할인을 해 줘요.", ex_zh: "如果用現金支付，他們會給折扣。" },
            { id: 1216, word: "프로그램", meaning: "程式", ex_kr: "저는 그 텔레비전 프로그램을 좋아해요.", ex_zh: "我喜歡那個電視節目。" },
            { id: 1217, word: "조카", meaning: "姪子、姪女", ex_kr: "이번 주말에 조카 돌잔치에 가요.", ex_zh: "我這週末要去參加我姪子的周歲生日派對。" },
            { id: 1218, word: "장학금", meaning: "獎學金", ex_kr: "열심히 공부해서 장학금을 받았어요.", ex_zh: "我努力學習，獲得了獎學金。" },
            { id: 1219, word: "무게", meaning: "重量", ex_kr: "이 상자의 무게가 얼마나 돼요?", ex_zh: "這個箱子有多重？" },
            { id: 1220, word: "분명히", meaning: "顯然、絕對的", ex_kr: "제가 분명히 말했잖아요.", ex_zh: "我已經說得很清楚了。" },
            { id: 1221, word: "식다", meaning: "降溫、變冷", ex_kr: "커피가 식기 전에 마시세요.", ex_zh: "趁咖啡還沒涼就喝掉。" },
            { id: 1222, word: "완전히", meaning: "完全地、徹底地、全然地", ex_kr: "저는 그 사실을 완전히 잊고 있었어요.", ex_zh: "我完全忘記了這件事。" },
            { id: 1223, word: "지루하다", meaning: "無聊", ex_kr: "수업이 너무 지루해서 졸았어요.", ex_zh: "這堂課太無聊了，我竟然睡著了。" },
            { id: 1224, word: "메모", meaning: "備忘錄、便條", ex_kr: "중요한 내용은 메모해 두세요.", ex_zh: "請記下要點。" },
            { id: 1225, word: "찾아오다", meaning: "去見某人；取回某物", ex_kr: "친구가 저를 찾아왔어요.", ex_zh: "一位朋友來看我。" },
            { id: 1226, word: "악기", meaning: "樂器", ex_kr: "어떤 악기를 연주할 수 있어요?", ex_zh: "你會演奏哪些樂器？" },
            { id: 1227, word: "남", meaning: "別人", ex_kr: "남에게 피해를 주면 안 돼요.", ex_zh: "你不得傷害他人。" },
            { id: 1228, word: "빼다", meaning: "取出、提取；減去；移除", ex_kr: "주머니에서 손을 빼세요.", ex_zh: "把手從口袋拿出來。" },
            { id: 1229, word: "놀이", meaning: "玩耍、遊戲、消遣", ex_kr: "윷놀이는 한국의 전통 놀이입니다.", ex_zh: "Yutnori 是一種韓國傳統遊戲。" },
            { id: 1230, word: "환영하다", meaning: "歡迎", ex_kr: "한국에 오신 것을 환영합니다.", ex_zh: "歡迎來到韓國。" },
            { id: 1231, word: "주차하다", meaning: "停車", ex_kr: "여기에 주차하면 안 돼요.", ex_zh: "這裡不能停車。" },
            { id: 1232, word: "여성", meaning: "女性", ex_kr: "이 옷은 젊은 여성들에게 인기가 많아요.", ex_zh: "這套服裝在年輕女性中非常受歡迎。" },
            { id: 1233, word: "기회", meaning: "機會", ex_kr: "좋은 기회를 놓치지 마세요.", ex_zh: "不要錯過這個絕佳機會。" },
            { id: 1234, word: "행동", meaning: "行為、動作", ex_kr: "그의 행동을 이해할 수 없어요.", ex_zh: "我無法理解他的行為。" },
            { id: 1235, word: "검사하다", meaning: "檢查、檢驗、巡視", ex_kr: "병원에서 건강 검사를 받았어요.", ex_zh: "我去醫院做了身體檢查。" },
            { id: 1236, word: "양파", meaning: "洋蔥", ex_kr: "양파를 썰 때 눈이 매워요.", ex_zh: "切洋蔥時我的眼睛會刺痛。" },
            { id: 1237, word: "식품", meaning: "食品、雜貨", ex_kr: "이 마트에서는 다양한 식품을 팔아요.", ex_zh: "這家超市出售各種食品。" },
            { id: 1238, word: "관련하다", meaning: "與…有關、與…相連", ex_kr: "이 사건과 관련한 증거를 찾고 있어요.", ex_zh: "我正在尋找與此案相關的證據。" },
            { id: 1239, word: "없어지다", meaning: "失去、消失", ex_kr: "제 지갑이 없어졌어요.", ex_zh: "我的錢包不見了。" },
            { id: 1240, word: "평일", meaning: "工作日", ex_kr: "평일에는 일하고 주말에는 쉬어요.", ex_zh: "我平日上班，週末休息。" },
            { id: 1241, word: "깊다", meaning: "深入", ex_kr: "이 호수는 물이 아주 깊어요.", ex_zh: "這個湖的水很深。" },
            { id: 1242, word: "마을", meaning: "村莊、城鎮", ex_kr: "저는 조용한 시골 마을에서 살고 싶어요.", ex_zh: "我想住在安靜的鄉村。" },
            { id: 1243, word: "마당", meaning: "院子、花園", ex_kr: "마당에 예쁜 꽃을 심었어요.", ex_zh: "我在院子裡種了漂亮的花。" },
            { id: 1244, word: "따라오다", meaning: "接下來、請跟隨", ex_kr: "저를 따라오세요.", ex_zh: "跟我來。" },
            { id: 1245, word: "고모", meaning: "姑姑", ex_kr: "고모가 맛있는 음식을 해 주셨어요.", ex_zh: "我姑姑做的飯菜很好吃。" },
            { id: 1246, word: "꿀", meaning: "蜂蜜", ex_kr: "따뜻한 물에 꿀을 타서 마셨어요.", ex_zh: "我把蜂蜜兌入溫水中喝了下去。" },
            { id: 1247, word: "열", meaning: "發燒、熱；行、線、隊列", ex_kr: "감기에 걸려서 열이 나요.", ex_zh: "我發燒了，因為我感冒了。" },
            { id: 1248, word: "흐르다", meaning: "流；溢出；消逝", ex_kr: "강물이 동쪽으로 흘러요.", ex_zh: "河流向東流。" },
            { id: 1249, word: "대구", meaning: "大邱", ex_kr: "대구는 여름에 아주 더워요.", ex_zh: "大邱的夏天非常炎熱。" },
            { id: 1250, word: "짧게", meaning: "簡要地", ex_kr: "머리를 짧게 잘랐어요.", ex_zh: "我把頭髮剪短了。" },
            { id: 1251, word: "예약하다", meaning: "預訂、請進行預訂", ex_kr: "호텔을 미리 예약했어요.", ex_zh: "我提前預訂了酒店。" },
            { id: 1252, word: "우선", meaning: "首先", ex_kr: "우선 손부터 씻으세요.", ex_zh: "首先，洗手。" },
            { id: 1253, word: "겁", meaning: "恐懼、驚嚇", ex_kr: "저는 겁이 많아서 무서운 영화를 못 봐요.", ex_zh: "我膽子很小，所以不敢看恐怖電影。" },
            { id: 1254, word: "모양", meaning: "形狀", ex_kr: "이 과자는 별 모양이에요.", ex_zh: "這塊餅乾是星形的。" },
            { id: 1255, word: "기간", meaning: "時期、期限", ex_kr: "시험 기간에는 도서관에 자리가 없어요.", ex_zh: "考試期間圖書館沒有座位。" },
            { id: 1256, word: "국내", meaning: "國內、國內", ex_kr: "저는 국내 여행을 좋아해요.", ex_zh: "我喜歡在國內旅行。" },
            { id: 1257, word: "익숙하다", meaning: "熟悉、習慣於某事", ex_kr: "저는 이제 한국 생활에 익숙해졌어요.", ex_zh: "我現在已經習慣了韓國的生活。" },
            { id: 1258, word: "딱", meaning: "確切地說、精確地", ex_kr: "이 옷이 저에게 딱 맞아요.", ex_zh: "這件衣服很合身。" },
            { id: 1259, word: "상황", meaning: "情況、事物現狀", ex_kr: "지금 상황이 좋지 않아요.", ex_zh: "目前情況不太好。" },
            { id: 1260, word: "향수", meaning: "香水、香氣；思鄉之情", ex_kr: "좋은 향수 냄새가 나요.", ex_zh: "聞起來像好聞的香水。" },
            { id: 1261, word: "녹차", meaning: "綠茶", ex_kr: "저는 식사 후에 녹차를 마셔요.", ex_zh: "我飯後喝綠茶。" },
            { id: 1262, word: "크게", meaning: "非常、高度", ex_kr: "크게 말해 주세요.", ex_zh: "請大聲說話。" },
