            { id: 2283, word: "향하다", meaning: "面對、向外看；走向、靠近", ex_kr: "비행기가 서울을 향해 이륙했어요.", ex_zh: "飛機起飛前往首爾。" },
            { id: 2284, word: "식후", meaning: "飯後", ex_kr: "식후 30분에 약을 드세요.", ex_zh: "請在飯後30分鐘服用此藥。" },
            { id: 2285, word: "적극적", meaning: "積極、活躍", ex_kr: "수업 시간에 적극적으로 참여하세요.", ex_zh: "請積極參與課堂討論。" },
            { id: 2286, word: "자막", meaning: "字幕；標題", ex_kr: "이 영화는 자막이 있어서 이해하기 쉬워요.", ex_zh: "這部電影很容易理解，因為它有字幕。" },
            { id: 2287, word: "속하다", meaning: "屬於", ex_kr: "고래는 포유류에 속해요.", ex_zh: "鯨魚屬於哺乳動物。" },
            { id: 2288, word: "끄덕이다", meaning: "點點頭", ex_kr: "그는 알겠다며 고개를 끄덕였어요.", ex_zh: "他點點頭，表示明白。" },
            { id: 2289, word: "드라이어", meaning: "烘乾機", ex_kr: "머리를 감고 드라이어로 말렸어요.", ex_zh: "我洗了頭髮，然後用吹風機吹乾了。" },
            { id: 2290, word: "살피다", meaning: "仔細看", ex_kr: "길을 건널 때는 좌우를 잘 살피세요.", ex_zh: "過馬路時要左右看。" },
            { id: 2291, word: "개인적", meaning: "個人的、個體的", ex_kr: "개인적인 질문은 삼가주세요.", ex_zh: "請不要詢問私人問題。" },
            { id: 2292, word: "월말", meaning: "月底", ex_kr: "월말이라서 업무가 바빠요.", ex_zh: "因為是月底了，所以我工作很忙。" },
            { id: 2293, word: "일반적", meaning: "一般的、通常的", ex_kr: "한국 사람들은 일반적으로 매운 음식을 잘 먹어요.", ex_zh: "韓國人普遍都很能吃辣。" },
            { id: 2294, word: "천둥", meaning: "雷", ex_kr: "천둥 소리에 깜짝 놀랐어요.", ex_zh: "我被雷聲嚇了一跳。" },
            { id: 2295, word: "개발하다", meaning: "發展", ex_kr: "새로운 소프트웨어를 개발하고 있어요.", ex_zh: "我正在開發新軟體。" },
            { id: 2296, word: "괴롭다", meaning: "令人痛苦的、令人難過的", ex_kr: "마음이 괴로워서 잠을 못 잤어요.", ex_zh: "我心煩意亂，睡不著。" },
            { id: 2297, word: "기도하다", meaning: "祈禱；嘗試", ex_kr: "교회에서 평화를 위해 기도했어요.", ex_zh: "我在教堂裡祈禱和平。" },
            { id: 2298, word: "시인", meaning: "詩人", ex_kr: "시인이 시를 낭송하고 있어요.", ex_zh: "詩人正在朗誦一首詩。" },
            { id: 2299, word: "장난치다", meaning: "開玩笑、戲弄、搜身、逗弄", ex_kr: "친구와 장난치다가 선생님께 혼났어요.", ex_zh: "我因為和朋友玩耍而被老師訓斥了。" },
            { id: 2300, word: "발생하다", meaning: "發生、出現、發生", ex_kr: "교통사고가 발생해서 길이 막혀요.", ex_zh: "道路因交通事故而封閉。" },
            { id: 2301, word: "눈치", meaning: "解讀(感知)氣氛或人們的表情", ex_kr: "그는 눈치가 빨라서 상황을 잘 파악해요.", ex_zh: "他思維敏捷，能很好地掌握情勢。" },
            { id: 2302, word: "뿌리다", meaning: "灑、噴、散", ex_kr: "샐러드에 소스를 뿌렸어요.", ex_zh: "我把醬汁淋在沙拉上。" },
            { id: 2303, word: "점차", meaning: "逐漸地、一點一點地", ex_kr: "날씨가 점차 추워지고 있어요.", ex_zh: "天氣逐漸轉涼。" },
            { id: 2304, word: "연애", meaning: "約會；愛情、浪漫", ex_kr: "그는 지금 연애 중이에요.", ex_zh: "他目前有女朋友。" },
            { id: 2305, word: "감히", meaning: "大膽地、無所畏懼地", ex_kr: "감히 선생님께 대들다니요.", ex_zh: "你竟敢頂撞老師？" },
            { id: 2306, word: "새끼", meaning: "幼小的動物；同伴", ex_kr: "강아지 새끼가 정말 귀여워요.", ex_zh: "這隻小狗真可愛。" },
            { id: 2307, word: "사물", meaning: "物體、事物、物質", ex_kr: "사물을 올바르게 바라보는 눈이 필요해요.", ex_zh: "你需要眼睛才能看清事物。" },
            { id: 2308, word: "형님", meaning: "男子的哥哥", ex_kr: "형님, 오랜만입니다.", ex_zh: "好久不見了，兄弟。" },
            { id: 2309, word: "한참", meaning: "一段時間", ex_kr: "한참 동안 기다렸어요.", ex_zh: "我等了很久。" },
            { id: 2310, word: "진지", meaning: "餐；位置、要塞", ex_kr: "할아버지, 진지 드세요.", ex_zh: "爺爺，請用餐。" },
            { id: 2311, word: "견디다", meaning: "承受、忍耐、容忍", ex_kr: "힘든 시간을 잘 견뎌냈어요.", ex_zh: "你很好地度過了難關。" },
            { id: 2312, word: "단계", meaning: "階段、步驟", ex_kr: "프로젝트가 마지막 단계에 있어요.", ex_zh: "項目已進入最後階段。" },
            { id: 2313, word: "계산기", meaning: "計算機", ex_kr: "복잡한 수학 문제는 계산기를 쓰세요.", ex_zh: "請使用計算器解決複雜的數學問題。" },
            { id: 2314, word: "쪽팔리다", meaning: "令人尷尬", ex_kr: "사람들 앞에서 넘어져서 쪽팔렸어요.", ex_zh: "我當著眾人的面跌倒了，我覺得很尷尬。" },
            { id: 2315, word: "가리다", meaning: "區分、辨別；覆蓋、隱藏、阻擋", ex_kr: "그는 음식을 가리지 않고 잘 먹어요.", ex_zh: "他食量很好，不挑食。" },
            { id: 2316, word: "안타깝다", meaning: "令人心碎、沮喪、遺憾", ex_kr: "그가 실패했다니 정말 안타깝네요.", ex_zh: "他失敗了，真是太可惜了。" },
            { id: 2317, word: "지치다", meaning: "筋疲力盡、精疲力竭", ex_kr: "하루 종일 일해서 지쳤어요.", ex_zh: "我工作了一整天，累壞了。" },
            { id: 2318, word: "종교", meaning: "宗教", ex_kr: "당신은 어떤 종교를 믿나요?", ex_zh: "你信仰什麼宗教？" },
            { id: 2319, word: "소문", meaning: "謠言、八卦", ex_kr: "그 소문은 사실이 아니에요.", ex_zh: "那個傳言不實。" },
            { id: 2320, word: "서운하다", meaning: "感到悲傷、受傷；感到後悔", ex_kr: "연락이 없어서 서운했어요.", ex_zh: "沒收到你的消息，我很失望。" },
            { id: 2321, word: "에너지", meaning: "活力", ex_kr: "아침을 먹어야 에너지가 생겨요.", ex_zh: "你需要吃早餐來補充能量。" },
            { id: 2322, word: "금", meaning: "金線", ex_kr: "이 반지는 순금으로 만들었어요.", ex_zh: "這枚戒指由純金製成。" },
            { id: 2323, word: "저리", meaning: "那樣、那個方向；低利率", ex_kr: "저리 비키세요.", ex_zh: "走開。" },
            { id: 2324, word: "뻔뻔하다", meaning: "厚顏無恥、厚顏無恥", ex_kr: "그는 거짓말을 하고도 뻔뻔하게 굴어요.", ex_zh: "他撒謊之後依然厚顏無恥。" },
            { id: 2325, word: "수많다", meaning: "數量眾多、多", ex_kr: "하늘에 수많은 별들이 떠 있어요.", ex_zh: "天空中漂浮著無數星星。" },
            { id: 2326, word: "매력적", meaning: "有魅力、迷人", ex_kr: "그 제안은 정말 매력적이에요.", ex_zh: "這個提議真的很有吸引力。" },
            { id: 2327, word: "마늘", meaning: "蒜", ex_kr: "한국 음식에는 마늘이 많이 들어가요.", ex_zh: "韓國料理大量使用大蒜。" },
            { id: 2328, word: "발달하다", meaning: "發展、成長", ex_kr: "아이들의 지능이 빠르게 발달하고 있어요.", ex_zh: "兒童智力發展迅速。" },
            { id: 2329, word: "혼나다", meaning: "被責罵、過得很艱難", ex_kr: "숙제를 안 해서 선생님께 혼났어요.", ex_zh: "我因為沒做作業被老師訓了一頓。" },
            { id: 2330, word: "그리", meaning: "所以、非常；就在那邊。", ex_kr: "그리 걱정하지 않아도 돼요.", ex_zh: "你不用太擔心。" },
            { id: 2331, word: "후추", meaning: "黑胡椒", ex_kr: "수프에 후추를 뿌려 드세요.", ex_zh: "吃湯前撒上胡椒粉。" },
            { id: 2332, word: "문서", meaning: "文件、紙張", ex_kr: "중요한 문서는 금고에 보관하세요.", ex_zh: "將重要文件存放在保險箱中。" },
            { id: 2333, word: "가득하다", meaning: "待填充", ex_kr: "컵에 물이 가득해요.", ex_zh: "杯子裡裝滿了水。" },
            { id: 2334, word: "형용사", meaning: "形容詞", ex_kr: "형용사는 명사를 수식합니다.", ex_zh: "形容詞修飾名詞。" },
            { id: 2335, word: "곡", meaning: "曲調、音樂、歌曲", ex_kr: "이 곡의 제목이 뭐예요?", ex_zh: "這首歌的歌名是什麼？" },
            { id: 2336, word: "몇몇", meaning: "一些、幾個", ex_kr: "몇몇 학생들은 아직 오지 않았어요.", ex_zh: "有些學生還沒到。" },
            { id: 2337, word: "우연히", meaning: "偶然地、意外地", ex_kr: "길에서 우연히 옛 친구를 만났어요.", ex_zh: "我在街上偶然遇到了一位老朋友。" },
            { id: 2338, word: "어둠", meaning: "黑暗", ex_kr: "어둠 속에서 불빛이 보였어요.", ex_zh: "我在黑暗中看到了一束光。" },
            { id: 2339, word: "외교", meaning: "外交", ex_kr: "두 나라 간의 외교 관계가 좋아졌어요.", ex_zh: "兩國的外交關係有所改善。" },
            { id: 2340, word: "팝송", meaning: "流行歌曲", ex_kr: "저는 한국 가요보다 팝송을 더 좋아해요.", ex_zh: "我更喜歡流行歌曲，而不是韓國歌曲。" },
            { id: 2341, word: "단지", meaning: "簡單來說、僅僅、就是；公寓大樓", ex_kr: "그는 단지 농담을 했을 뿐이에요.", ex_zh: "他只是在開玩笑。" },
            { id: 2342, word: "농촌", meaning: "農村", ex_kr: "농촌 인구가 줄어들고 있어요.", ex_zh: "農村人口正在減少。" },
            { id: 2343, word: "이익", meaning: "利潤、收益、優勢", ex_kr: "회사는 이익을 창출해야 합니다.", ex_zh: "公司必須獲利。" },
            { id: 2344, word: "연하다", meaning: "柔軟、輕盈、柔和", ex_kr: "이 고기는 아주 연해요.", ex_zh: "這肉質非常嫩。" },
            { id: 2345, word: "체육", meaning: "體育", ex_kr: "저는 체육 시간을 제일 좋아해요.", ex_zh: "我最喜歡體育課。" },
            { id: 2346, word: "수도", meaning: "首都；自來水(供水系統)", ex_kr: "한국의 수도는 서울입니다.", ex_zh: "韓國的首都是首爾。" },
            { id: 2347, word: "식물", meaning: "植物、植被", ex_kr: "베란다에서 식물을 키우고 있어요.", ex_zh: "我在陽台上種植植物。" },
            { id: 2348, word: "용서하다", meaning: "原諒", ex_kr: "제 실수를 용서해 주세요.", ex_zh: "請原諒我的錯誤。" },
            { id: 2349, word: "논문", meaning: "論文、研究論文", ex_kr: "졸업 논문을 쓰고 있어요.", ex_zh: "我正在撰寫畢業論文。" },
            { id: 2350, word: "싸움하다", meaning: "爭吵、打架", ex_kr: "동생과 장난감 때문에 싸움했어요.", ex_zh: "我和弟弟因為一個玩具打了起來。" },
            { id: 2351, word: "노동", meaning: "勞動", ex_kr: "노동의 대가를 받아야 해요.", ex_zh: "你的勞動必須得到報酬。" },
            { id: 2352, word: "명동", meaning: "明洞", ex_kr: "명동에는 관광객이 많아요.", ex_zh: "明洞有很多遊客。" },
            { id: 2353, word: "주민", meaning: "居民、居民", ex_kr: "주민들이 마을 회관에 모였어요.", ex_zh: "村民們聚集在村委會大廳。" },
            { id: 2354, word: "불리다", meaning: "被召喚、被邀請；充實自己", ex_kr: "그는 천재라고 불려요.", ex_zh: "他被譽為天才。" },
            { id: 2355, word: "온", meaning: "全部、整體、全然", ex_kr: "온 세상이 하얗게 변했어요.", ex_zh: "整個世界都變成了白色。" },
            { id: 2356, word: "가치", meaning: "價值、價值", ex_kr: "이 그림은 예술적 가치가 높아요.", ex_zh: "這幅畫具有很高的藝術價值。" },
            { id: 2357, word: "정상", meaning: "正常；頂部、山頂", ex_kr: "산 정상에 올라가서 야호를 외쳤어요.", ex_zh: "我爬到山頂，大喊“雅虎！”" },
            { id: 2358, word: "순수하다", meaning: "純潔、真誠", ex_kr: "아이들의 마음은 순수해요.", ex_zh: "孩子的心靈是純潔的。" },
            { id: 2359, word: "욕", meaning: "髒話、侮辱、辱罵", ex_kr: "친구에게 욕을 하면 안 돼요.", ex_zh: "你不應該對朋友說髒話。" },
            { id: 2360, word: "그만큼", meaning: "就此而言、程度上", ex_kr: "노력한 그만큼 결과가 나올 거예요.", ex_zh: "你的努力會有相對應的回報。" },
            { id: 2361, word: "찻잔", meaning: "茶碗", ex_kr: "예쁜 찻잔에 차를 마셨어요.", ex_zh: "我用漂亮的茶杯喝茶。" },
            { id: 2362, word: "포함하다", meaning: "包括、包含", ex_kr: "가격에 봉사료가 포함되어 있나요?", ex_zh: "價格包含服務費嗎？" },
            { id: 2363, word: "속이다", meaning: "欺騙、作弊、戲弄", ex_kr: "남을 속이는 것은 나쁜 짓이에요.", ex_zh: "欺騙他人是不好的。" },
            { id: 2364, word: "수필", meaning: "散文", ex_kr: "저는 소설보다 수필을 즐겨 읽어요.", ex_zh: "比起小說，我更喜歡讀散文。" },
            { id: 2365, word: "고모부", meaning: "父親的姊姊的丈夫", ex_kr: "고모부께서 선물을 주셨어요.", ex_zh: "我叔叔送了我一份禮物。" },
            { id: 2366, word: "불가능하다", meaning: "不可能", ex_kr: "그 일은 혼자 하기에 불가능해요.", ex_zh: "一個人是做不到的。" },
            { id: 2367, word: "선반", meaning: "架子", ex_kr: "책을 선반 위에 올려놓으세요.", ex_zh: "請把書放在書架上。" },
            { id: 2368, word: "검사", meaning: "檢察官、地方檢察官", ex_kr: "검사가 사건을 철저히 조사했어요.", ex_zh: "檢察官對案件進行了徹底調查。" },
            { id: 2369, word: "비우다", meaning: "清空、騰空", ex_kr: "쓰레기통을 비워 주세요.", ex_zh: "請清空垃圾桶。" },
            { id: 2370, word: "시리즈", meaning: "系列", ex_kr: "이 드라마 시리즈는 정말 재미있어요.", ex_zh: "這部電視劇真的很好看。" },
            { id: 2371, word: "분석하다", meaning: "分析", ex_kr: "데이터를 분석해서 결과를 보고하세요.", ex_zh: "分析數據並報告結果。" },
            { id: 2372, word: "조상", meaning: "祖先、先祖", ex_kr: "우리는 조상님들께 제사를 지냅니다.", ex_zh: "我們為祖先舉行祭祀儀式。" },
            { id: 2373, word: "쥐다", meaning: "抓握、緊握、抓住", ex_kr: "손에 땀을 쥐게 하는 경기였어요.", ex_zh: "這是一場扣人心弦的比賽。" },
            { id: 2374, word: "막차", meaning: "末班車/末班車", ex_kr: "서둘러서 막차를 탔어요.", ex_zh: "我趕緊趕上了末班車。" },
            { id: 2375, word: "벌어지다", meaning: "擴大；發生、突破", ex_kr: "두 사람 사이의 격차가 벌어졌어요.", ex_zh: "兩人之間的差距越來越大。" },
            { id: 2376, word: "주유소", meaning: "加油站", ex_kr: "주유소에서 기름을 넣었어요.", ex_zh: "我在加油站加滿了油。" },
            { id: 2377, word: "부동산", meaning: "房地產、房產", ex_kr: "부동산 가격이 오르고 있어요.", ex_zh: "房地產價格正在上漲。" },
            { id: 2378, word: "꼬리", meaning: "尾巴", ex_kr: "강아지가 꼬리를 흔들어요.", ex_zh: "小狗搖著尾巴。" },
            { id: 2379, word: "폭", meaning: "寬度、範圍", ex_kr: "도로의 폭이 넓어졌어요.", ex_zh: "道路變寬了。" },
            { id: 2380, word: "샴푸", meaning: "洗髮精", ex_kr: "샴푸가 다 떨어져서 새로 샀어요.", ex_zh: "我的洗髮精用完了，所以我買了一瓶新的。" },
            { id: 2381, word: "기능", meaning: "功能；技能", ex_kr: "이 휴대폰에는 새로운 기능이 많아요.", ex_zh: "這款手機有很多新功能。" },
            { id: 2382, word: "대체", meaning: "天哪、搞什麼鬼；替代", ex_kr: "대체 왜 그런 말을 했니?", ex_zh: "你到底為什麼會說出那樣的話？" },
            { id: 2383, word: "자세", meaning: "姿勢、位置", ex_kr: "바른 자세로 앉으세요.", ex_zh: "請保持良好的坐姿。" },
            { id: 2384, word: "울리다", meaning: "打鈴；使人哭泣", ex_kr: "전화벨이 울리고 있어요.", ex_zh: "電話響了。" },
            { id: 2385, word: "비교적", meaning: "相對而言、比較而言", ex_kr: "오늘 시험은 비교적 쉬웠어요.", ex_zh: "今天的考試比較簡單。" },
            { id: 2386, word: "마주보다", meaning: "彼此對視", ex_kr: "두 사람이 서로 마주 보고 앉았어요.", ex_zh: "兩人面對面坐著。" },
            { id: 2387, word: "문제점", meaning: "問題、缺點、問題所在", ex_kr: "이 계획의 문제점을 지적해 주세요.", ex_zh: "請指出這個方案存在的問題。" },
            { id: 2388, word: "몹시", meaning: "極其、非常、非常", ex_kr: "어제는 몹시 피곤했어요.", ex_zh: "我昨天很累。" },
            { id: 2389, word: "승무원", meaning: "機組人員、空服員", ex_kr: "승무원이 승객들에게 음료를 제공해요.", ex_zh: "空服員為乘客提供飲料。" },
            { id: 2390, word: "의지하다", meaning: "依賴、倚靠、依靠", ex_kr: "힘들 때 친구에게 의지했어요.", ex_zh: "我遇到困難時，我依靠了一位朋友。" },
            { id: 2391, word: "농사", meaning: "農業", ex_kr: "시골에서 농사를 짓고 살아요.", ex_zh: "我住在鄉下，經營著一個農場。" },
            { id: 2392, word: "강물", meaning: "河水", ex_kr: "강물이 바다로 흘러가요.", ex_zh: "河流流入大海。" },
            { id: 2393, word: "파리", meaning: "飛；巴黎", ex_kr: "음식에 파리가 앉았어요.", ex_zh: "一隻蒼蠅落在了食物上。" },
            { id: 2394, word: "세월", meaning: "歲月、光陰、時光", ex_kr: "세월이 정말 빠르게 흘러가네요.", ex_zh: "時間過得真快。" },
            { id: 2395, word: "볼", meaning: "臉頰；球", ex_kr: "아기의 볼이 빨개요.", ex_zh: "寶寶的臉頰紅撲撲的。" },
            { id: 2396, word: "정장", meaning: "正裝", ex_kr: "면접을 볼 때는 정장을 입으세요.", ex_zh: "面試時請穿西裝。" },
            { id: 2397, word: "꾸미다", meaning: "裝飾、製作；發明、準備", ex_kr: "크리스마스 트리를 예쁘게 꾸몄어요.", ex_zh: "我把聖誕樹裝飾得非常漂亮。" },
            { id: 2398, word: "상대방", meaning: "對方、對手、敵手", ex_kr: "대화할 때는 상대방의 눈을 보세요.", ex_zh: "說話時要看著對方的眼睛。" },
            { id: 2399, word: "밭", meaning: "田野、農場", ex_kr: "밭에서 고추를 따고 있어요.", ex_zh: "我正在田裡採辣椒。" },
            { id: 2400, word: "예술가", meaning: "藝術家", ex_kr: "그는 유명한 예술가입니다.", ex_zh: "他是一位著名藝術家。" },
            { id: 2401, word: "시선", meaning: "一個人的眼睛", ex_kr: "사람들의 시선이 그녀에게 쏠렸어요.", ex_zh: "人們的目光都集中在她身上。" },
            { id: 2402, word: "동의하다", meaning: "同意", ex_kr: "저는 당신의 의견에 동의합니다.", ex_zh: "我同意你的觀點。" },
            { id: 2403, word: "최초", meaning: "第一個", ex_kr: "인류 최초로 달에 착륙했어요.", ex_zh: "人類首次登上月球。" },
            { id: 2404, word: "기록하다", meaning: "記錄、寫下；登記", ex_kr: "회의 내용을 노트에 기록하세요.", ex_zh: "將會議內容記錄在會議筆記中。" },
            { id: 2405, word: "질투", meaning: "妒忌", ex_kr: "친구의 성공에 질투가 났어요.", ex_zh: "我嫉妒朋友的成功。" },
            { id: 2406, word: "숨기다", meaning: "隱藏、掩藏", ex_kr: "비상금을 책 속에 숨겼어요.", ex_zh: "我把應急錢藏在一本書裡。" },
            { id: 2407, word: "검색", meaning: "搜尋", ex_kr: "인터넷 검색을 통해 정보를 찾았어요.", ex_zh: "我透過網路搜尋找到了這些資訊。" },
            { id: 2408, word: "영원히", meaning: "永遠、永恆", ex_kr: "우리의 우정은 영원히 변치 않을 거야.", ex_zh: "我們的友誼永遠不會改變。" },
            { id: 2409, word: "즉", meaning: "也就是說、可以說", ex_kr: "그는 나의 가장 친한 친구, 즉 베스트 프렌드다.", ex_zh: "他是我最好的朋友。" },
            { id: 2410, word: "집안", meaning: "家、家庭、住所", ex_kr: "집안 행사가 있어서 일찍 퇴근해야 해요.", ex_zh: "我家裡有事，所以要提早下班。" },
            { id: 2411, word: "반복하다", meaning: "重複", ex_kr: "선생님이 설명을 반복하셨어요.", ex_zh: "老師重複了一遍解釋。" },
            { id: 2412, word: "총", meaning: "槍；總計、總體", ex_kr: "군인이 총을 들고 있어요.", ex_zh: "一名士兵手持槍枝。" },
            { id: 2413, word: "연기하다", meaning: "延遲、推遲、延後；行動", ex_kr: "비 때문에 경기를 연기했어요.", ex_zh: "比賽因下雨而延長。" },
            { id: 2414, word: "이리저리", meaning: "這裡那裡、這邊那邊", ex_kr: "길을 찾으러 이리저리 헤맸어요.", ex_zh: "我四處徘徊，試圖找到路。" },
            { id: 2415, word: "구멍", meaning: "洞", ex_kr: "양말에 구멍이 났어요.", ex_zh: "我的襪子破了個洞。" },
            { id: 2416, word: "차비", meaning: "交通費", ex_kr: "차비가 없어서 걸어왔어요.", ex_zh: "我沒錢買公車票，所以就走路去了。" },
            { id: 2417, word: "활용하다", meaning: "利用、投入實際使用", ex_kr: "자투리 시간을 잘 활용하세요.", ex_zh: "好好利用你的空閒時間。" },
            { id: 2418, word: "햇볕", meaning: "陽光、陽光", ex_kr: "햇볕이 따뜻해서 빨래가 잘 말라요.", ex_zh: "陽光溫暖，所以衣服很容易晾乾。" },
            { id: 2419, word: "우주", meaning: "宇宙", ex_kr: "우주는 끝없이 넓어요.", ex_zh: "宇宙浩瀚無垠。" },
            { id: 2420, word: "춘천", meaning: "春川", ex_kr: "춘천으로 닭갈비를 먹으러 갔어요.", ex_zh: "我去春川吃了辣炒雞排。" },
            { id: 2421, word: "번개", meaning: "閃電", ex_kr: "번개가 치고 천둥이 울렸어요.", ex_zh: "閃電劃破夜空，雷聲轟鳴。" },
            { id: 2422, word: "중요성", meaning: "重要性、意義", ex_kr: "건강의 중요성은 아무리 강조해도 지나치지 않아요.", ex_zh: "健康的重要性怎麼強調都不為過。" },
            { id: 2423, word: "일정하다", meaning: "固定的、恆定的、規律的", ex_kr: "실내 온도를 일정하게 유지하세요.", ex_zh: "保持室內溫度恆定。" },
            { id: 2424, word: "함부로", meaning: "不經思考、粗心大意", ex_kr: "남의 물건을 함부로 만지지 마세요.", ex_zh: "未經允許，請勿觸碰他人的物品。" },
            { id: 2425, word: "미역", meaning: "海藻、海芥菜", ex_kr: "생일날 미역국을 먹었어요.", ex_zh: "我生日那天吃了海帶湯。" },
            { id: 2426, word: "가꾸다", meaning: "生長、培育；照料", ex_kr: "정원을 아름답게 가꾸었어요.", ex_zh: "我把花園裝飾得很漂亮。" },
            { id: 2427, word: "교문", meaning: "校門口", ex_kr: "학생들이 교문을 통과하고 있어요.", ex_zh: "學生們正穿過校門。" },
            { id: 2428, word: "표시하다", meaning: "標記、指示；表達、顯示", ex_kr: "중요한 부분에 빨간색으로 표시하세요.", ex_zh: "用紅色標記重要部分。" },
            { id: 2429, word: "생년월일", meaning: "出生日期", ex_kr: "신청서에 생년월일을 적어주세요.", ex_zh: "請在申請表上填寫您的出生日期。" },
            { id: 2430, word: "신고하다", meaning: "申報、申報、通知", ex_kr: "분실물을 경찰서에 신고했어요.", ex_zh: "我已向警察局報案稱物品遺失。" },
            { id: 2431, word: "송이", meaning: "朵、串", ex_kr: "장미 꽃 한 송이를 샀어요.", ex_zh: "我買了一朵玫瑰。" },
            { id: 2432, word: "온돌방", meaning: "地暖房", ex_kr: "겨울에는 따뜻한 온돌방이 최고예요.", ex_zh: "冬天最舒服的就是溫暖的地暖房了。" },
            { id: 2433, word: "통일되다", meaning: "統一", ex_kr: "언젠가 남북이 통일되기를 바랍니다.", ex_zh: "我希望北韓和南韓有朝一日能夠團結起來。" },
            { id: 2434, word: "너무하다", meaning: "不合理、太多", ex_kr: "장난이 좀 너무하네요.", ex_zh: "這有點過分了。" },
            { id: 2435, word: "마치", meaning: "彷彿、彷彿", ex_kr: "그는 마치 아무 일도 없었던 것처럼 행동했어요.", ex_zh: "他裝作什麼都沒發生過一樣。" },
            { id: 2436, word: "의학", meaning: "醫學、醫學科學", ex_kr: "그는 의학을 공부하는 학생이에요.", ex_zh: "他是醫學生。" },
            { id: 2437, word: "절", meaning: "佛教寺廟；深深鞠躬；條款、詩句", ex_kr: "새해 아침에 부모님께 절을 올렸어요.", ex_zh: "元旦早晨，我向父母鞠躬。" },
            { id: 2438, word: "거품", meaning: "氣泡、泡沫", ex_kr: "비누 거품으로 손을 씻으세요.", ex_zh: "用肥皂搓出泡沫洗手。" },
            { id: 2439, word: "제법", meaning: "漂亮、相當、相當", ex_kr: "한국어 실력이 제법 늘었네요.", ex_zh: "你的韓語程度進步很多。" },
            { id: 2440, word: "선글라스", meaning: "太陽眼鏡", ex_kr: "햇빛이 강해서 선글라스를 썼어요.", ex_zh: "因為陽光很強，所以我戴了太陽眼鏡。" },
            { id: 2441, word: "감옥", meaning: "監獄", ex_kr: "범인은 감옥에 갇혔어요.", ex_zh: "罪犯已被監禁。" },
            { id: 2442, word: "채우다", meaning: "填充；鎖定、繫緊", ex_kr: "물통에 물을 가득 채웠어요.", ex_zh: "我把水瓶裝滿了水。" },
            { id: 2443, word: "잦다", meaning: "頻繁", ex_kr: "요즘 비가 잦네요.", ex_zh: "最近常下雨。" },
            { id: 2444, word: "헷갈리다", meaning: "令人困惑的、令人費解的；難以找到的", ex_kr: "길이 너무 복잡해서 헷갈려요.", ex_zh: "這條路太複雜了，令人困惑。" },
            { id: 2445, word: "감상하다", meaning: "享受、欣賞", ex_kr: "미술관에서 그림을 감상했어요.", ex_zh: "我很喜歡在美術館欣賞畫作。" },
            { id: 2446, word: "실망하다", meaning: "感到失望", ex_kr: "시험 결과에 실망하지 마세요.", ex_zh: "不要對檢測結果感到失望。" },
            { id: 2447, word: "대표적", meaning: "代表性的、典型的", ex_kr: "김치는 한국의 대표적인 음식입니다.", ex_zh: "泡菜是韓國的代表性食品。" },
            { id: 2448, word: "페이지", meaning: "頁", ex_kr: "교과서 50페이지를 펴세요.", ex_zh: "請翻到課本第50頁。" },
            { id: 2449, word: "한발", meaning: "一步", ex_kr: "한발 늦었네요.", ex_zh: "我晚了一步。" },
            { id: 2450, word: "캠퍼스", meaning: "校園", ex_kr: "대학 캠퍼스가 정말 아름다워요.", ex_zh: "大學校園真漂亮。" },
            { id: 2451, word: "성냥", meaning: "比賽", ex_kr: "성냥으로 촛불을 켰어요.", ex_zh: "我用火柴點燃了蠟燭。" },
            { id: 2452, word: "땅콩", meaning: "花生", ex_kr: "맥주 안주로 땅콩을 먹었어요.", ex_zh: "我喝啤酒時把花生當零食吃了。" },
            { id: 2453, word: "이동하다", meaning: "移動", ex_kr: "다음 장소로 이동하겠습니다.", ex_zh: "我們將前往下一個地點。" },
            { id: 2454, word: "날개", meaning: "翅膀", ex_kr: "새가 날개를 펴고 날아올랐어요.", ex_zh: "那隻鳥展開雙翼，翱翔天際。" },
            { id: 2455, word: "비하다", meaning: "相比", ex_kr: "작년에 비해서 올해는 비가 많이 왔어요.", ex_zh: "今年的雨水比去年多得多。" },
            { id: 2456, word: "오리", meaning: "鴨子", ex_kr: "호수에 오리가 떠다녀요.", ex_zh: "湖面上漂浮著鴨子。" },
            { id: 2457, word: "불완전하다", meaning: "不完整、不完美", ex_kr: "인간은 누구나 불완전한 존재입니다.", ex_zh: "每個人都是不完美的人。" },
            { id: 2458, word: "고속도로", meaning: "高速公路、公路", ex_kr: "고속도로가 막혀서 늦었어요.", ex_zh: "我遲到了，因為高速公路被堵住了。" },
            { id: 2459, word: "집사람", meaning: "妻子", ex_kr: "제 집사람을 소개하겠습니다.", ex_zh: "讓我來介紹一下我的妻子。" },
            { id: 2460, word: "응원하다", meaning: "歡呼、支持", ex_kr: "우리 팀을 열심히 응원했어요.", ex_zh: "我為我們的球隊賣力加油。" },
            { id: 2461, word: "생겨나다", meaning: "出現、發生", ex_kr: "새로운 습관이 생겨났어요.", ex_zh: "新習慣已養成。" },
            { id: 2462, word: "왼편", meaning: "左側", ex_kr: "왼편으로 돌아가세요.", ex_zh: "向左轉。" },
            { id: 2463, word: "농업", meaning: "農業", ex_kr: "농업은 식량을 생산하는 중요한 산업입니다.", ex_zh: "農業是生產食品的重要產業。" },
            { id: 2464, word: "불교", meaning: "佛教", ex_kr: "불교는 한국의 주요 종교 중 하나입니다.", ex_zh: "佛教是韓國的主要宗教之一。" },
            { id: 2465, word: "놀랍다", meaning: "令人驚訝的、驚豔的；精彩的、奇妙的", ex_kr: "그의 재능은 정말 놀라워요.", ex_zh: "他的才華真是令人驚嘆。" },
            { id: 2466, word: "노랑", meaning: "黃色的", ex_kr: "병아리는 노랑 색이에요.", ex_zh: "小雞是黃色的。" },
            { id: 2467, word: "오페라", meaning: "歌劇", ex_kr: "오페라 공연을 보러 갔어요.", ex_zh: "我去看了一場歌劇表演。" },
            { id: 2468, word: "심부름", meaning: "差事", ex_kr: "엄마 심부름으로 두부를 사러 갔어요.", ex_zh: "我替媽媽去買豆腐。" },
            { id: 2469, word: "복수", meaning: "復仇；複數", ex_kr: "그는 원수에게 복수를 다짐했어요.", ex_zh: "他發誓要向敵人復仇。" },
            { id: 2470, word: "종합", meaning: "合成、組合", ex_kr: "종합 검진을 받으러 병원에 갔어요.", ex_zh: "我去醫院做了一次全面的體檢。" },
            { id: 2471, word: "학위", meaning: "學位", ex_kr: "그는 박사 학위를 받았어요.", ex_zh: "他獲得了博士學位。" },
            { id: 2472, word: "귀고리", meaning: "耳環", ex_kr: "예쁜 귀고리를 선물 받았어요.", ex_zh: "我收到了一副漂亮的耳環作為禮物。" },
            { id: 2473, word: "틀림없다", meaning: "確定無疑；值得信賴", ex_kr: "그가 범인임에 틀림없어요.", ex_zh: "他一定是罪魁禍首。" },
            { id: 2474, word: "유난히", meaning: "異常地、例外地", ex_kr: "오늘따라 별이 유난히 밝아요.", ex_zh: "今天的星星異常明亮。" },
            { id: 2475, word: "시청자", meaning: "觀眾、電視觀眾", ex_kr: "이 드라마는 시청자들에게 인기가 많아요.", ex_zh: "這部劇很受觀眾歡迎。" },
            { id: 2476, word: "차지하다", meaning: "佔有、佔領", ex_kr: "우리 팀이 우승을 차지했어요.", ex_zh: "我們隊贏得了冠軍。" },
            { id: 2477, word: "예식장", meaning: "儀式廳、婚禮廳", ex_kr: "예식장을 예약했어요.", ex_zh: "我預訂了一個婚禮場地。" },
            { id: 2478, word: "달려가다", meaning: "跑、衝刺、奔跑", ex_kr: "약속 시간에 늦어서 급하게 달려갔어요.", ex_zh: "我赴約遲到了，所以趕緊趕了過去。" },
            { id: 2479, word: "사회적", meaning: "社會的", ex_kr: "사회적 문제를 해결하기 위해 노력해야 해요.", ex_zh: "我們必須努力解決社會問題。" },
            { id: 2480, word: "종", meaning: "物種；鈴鐺；奴隸、僕人", ex_kr: "12시가 되자 종이 울렸어요.", ex_zh: "中午十二點，鐘聲響了。" },
            { id: 2481, word: "눈병", meaning: "眼疾", ex_kr: "수영장에 다녀온 후 눈병이 났어요.", ex_zh: "我去游泳池後得了眼部感染。" },
            { id: 2482, word: "프로", meaning: "專業的", ex_kr: "그는 프로 골프 선수예요.", ex_zh: "他是一名職業高爾夫球手。" },
            { id: 2483, word: "우울하다", meaning: "憂鬱、沮喪、消沉", ex_kr: "비가 오니 기분이 우울해요.", ex_zh: "因為下雨，我感到很沮喪。" },
            { id: 2484, word: "딴", meaning: "其他、不同的", ex_kr: "딴 생각 하지 말고 공부하세요.", ex_zh: "別想別的，專心學習。" },
            { id: 2485, word: "간절하다", meaning: "認真、熱心", ex_kr: "합격을 간절히 바라고 있어요.", ex_zh: "我真希望自己能通過。" },
            { id: 2486, word: "다리다", meaning: "熨燙時、按壓", ex_kr: "구겨진 셔츠를 다렸어요.", ex_zh: "我熨燙了那件皺巴巴的襯衫。" },
            { id: 2487, word: "깨닫다", meaning: "意識到、認識到", ex_kr: "나중에야 내 실수를 깨달았어요.", ex_zh: "我後來才意識到自己的錯誤。" },
            { id: 2488, word: "요청", meaning: "請求、要求", ex_kr: "고객의 요청을 처리해 주세요.", ex_zh: "請處理客戶的請求。" },
            { id: 2489, word: "청소기", meaning: "吸塵器", ex_kr: "청소기로 바닥을 청소했어요.", ex_zh: "我用吸塵器清潔了地板。" },
            { id: 2490, word: "최소한", meaning: "至少", ex_kr: "최소한 하루에 30분은 운동하세요.", ex_zh: "每天至少運動30分鐘。" },
            { id: 2491, word: "이천", meaning: "利川", ex_kr: "이천은 도자기로 유명해요.", ex_zh: "利川以陶器聞名。" },
            { id: 2492, word: "그늘", meaning: "陰影", ex_kr: "나무 그늘 아래서 쉬었어요.", ex_zh: "我在樹蔭下休息。" },
            { id: 2493, word: "사은품", meaning: "免費贈品", ex_kr: "행사 기간이라 사은품을 받았어요.", ex_zh: "因為在正值活動期間，我收到了一份免費禮物。" },
            { id: 2494, word: "흥미", meaning: "興趣", ex_kr: "저는 역사에 흥미가 있어요.", ex_zh: "我對歷史很有興趣。" },
            { id: 2495, word: "지식", meaning: "知識、理解", ex_kr: "책을 통해 많은 지식을 얻었어요.", ex_zh: "我從書中獲得了許多知識。" },
            { id: 2496, word: "살리다", meaning: "挽救生命、節省；善加利用", ex_kr: "의사가 환자의 목숨을 살렸어요.", ex_zh: "醫生救了病人的命。" },
            { id: 2497, word: "병실", meaning: "病房、病房", ex_kr: "병실에 누워 있는 환자를 문병했어요.", ex_zh: "我去醫院探望了一位躺在病房裡的病人。" },
            { id: 2498, word: "가로등", meaning: "路燈、路燈", ex_kr: "밤길이 어두워서 가로등이 필요해요.", ex_zh: "夜間道路漆黑，所以需要路燈。" },
            { id: 2499, word: "커튼", meaning: "窗簾", ex_kr: "햇빛을 가리려고 커튼을 쳤어요.", ex_zh: "我拉上窗簾擋住陽光。" },
            { id: 2500, word: "다방", meaning: "茶室、咖啡館", ex_kr: "옛날에는 사람들이 다방에서 만났어요.", ex_zh: "過去，人們常在茶館聚會。" },
            { id: 2501, word: "인구", meaning: "人口", ex_kr: "서울의 인구는 매우 많아요.", ex_zh: "首爾人口非常龐大。" },
            { id: 2502, word: "법원", meaning: "法庭", ex_kr: "법원에서 재판이 열렸어요.", ex_zh: "法庭舉行了審判。" },
            { id: 2503, word: "해수욕장", meaning: "游泳海灘", ex_kr: "여름 휴가 때 해수욕장에 갔어요.", ex_zh: "暑假期間我去了海邊。" },
            { id: 2504, word: "대박", meaning: "大獎；好東西", ex_kr: "이번 시험 정말 대박 났어요!", ex_zh: "我這次考試考得非常好！" },
            { id: 2505, word: "원인", meaning: "原因、因素", ex_kr: "화재의 원인을 조사하고 있어요.", ex_zh: "我們正在調查火災原因。" },
            { id: 2506, word: "개성", meaning: "個性、獨特性", ex_kr: "각자의 개성을 존중해야 해요.", ex_zh: "我們必須尊重彼此的個性。" },
            { id: 2507, word: "노크하다", meaning: "敲門", ex_kr: "방에 들어가기 전에 노크하세요.", ex_zh: "請先敲門再進入房間。" },
            { id: 2508, word: "플랫폼", meaning: "平台", ex_kr: "기차가 플랫폼에 들어오고 있어요.", ex_zh: "列車正在進站。" },
            { id: 2509, word: "눈썹", meaning: "眉", ex_kr: "그는 눈썹이 짙어요.", ex_zh: "他眉毛很濃。" },
            { id: 2510, word: "이루어지다", meaning: "實現；形成、由…組成", ex_kr: "꿈이 이루어졌어요.", ex_zh: "我的夢想成真了。" },
            { id: 2511, word: "골목", meaning: "胡同", ex_kr: "좁은 골목길을 지나갔어요.", ex_zh: "我穿過一條狹窄的小巷。" },
            { id: 2512, word: "품목", meaning: "物品、商品", ex_kr: "세일 품목을 확인해 보세요.", ex_zh: "看看特價商品。" },
            { id: 2513, word: "도표", meaning: "圖表", ex_kr: "이 도표를 보면 변화를 쉽게 알 수 있어요.", ex_zh: "透過查看這張圖表，您可以輕鬆看出這些變化。" },
            { id: 2514, word: "독감", meaning: "流感", ex_kr: "독감 예방 주사를 맞았어요.", ex_zh: "我打了流感疫苗。" },
            { id: 2515, word: "고급", meaning: "高階、上流社會", ex_kr: "이 식당은 고급 요리를 전문으로 해요.", ex_zh: "這家餐廳專營高級餐飲。" },
            { id: 2516, word: "뿌리", meaning: "根", ex_kr: "이 나무는 뿌리가 깊어요.", ex_zh: "這棵樹根系很深。" },
            { id: 2517, word: "당하다", meaning: "經歷、遭遇、遭受", ex_kr: "사기를 당하지 않도록 조심하세요.", ex_zh: "小心別被騙。" },
            { id: 2518, word: "약도", meaning: "簡略地圖、草圖", ex_kr: "청첩장에 예식장 약도가 있어요.", ex_zh: "婚禮邀請函上附有婚禮場地地圖。" },
            { id: 2519, word: "풀리다", meaning: "問題解決、擺脫困境、獲得解脫", ex_kr: "문제가 술술 풀렸어요.", ex_zh: "問題已順利解決。" },
            { id: 2520, word: "챙기다", meaning: "收集、打包；照顧；不要忘記", ex_kr: "준비물을 잘 챙겼나요?", ex_zh: "你把需要的東西都打包好了嗎？" },
            { id: 2521, word: "책꽂이", meaning: "書架", ex_kr: "책꽂이에 책을 정리했어요.", ex_zh: "我整理了書架上的書。" },
            { id: 2522, word: "전학가다", meaning: "轉學", ex_kr: "친구는 다른 도시로 전학 갔어요.", ex_zh: "我的朋友調到另一個城市去了。" },
            { id: 2523, word: "부사", meaning: "副詞", ex_kr: "부사는 형용사나 동사를 수식해요.", ex_zh: "副詞修飾形容詞或動詞。" },
            { id: 2524, word: "건지다", meaning: "從水中取出；取回", ex_kr: "물에 빠진 물건을 건졌어요.", ex_zh: "我把掉進水裡的東西撈了出來。" },
            { id: 2525, word: "실제로", meaning: "事實上、實際上", ex_kr: "그 배우를 실제로 본 적이 있어요.", ex_zh: "我其實見過那位演員。" },
            { id: 2526, word: "핑크", meaning: "粉紅色的", ex_kr: "핑크색 드레스를 입었어요.", ex_zh: "我穿了一條粉色連身裙。" },
            { id: 2527, word: "진찰", meaning: "體檢", ex_kr: "의사 선생님께 진찰을 받았어요.", ex_zh: "我接受了醫生的體檢。" },
            { id: 2528, word: "그제", meaning: "前天", ex_kr: "그제 친구들과 저녁을 먹었어요.", ex_zh: "前天我和朋友們一起吃了晚餐。" },
            { id: 2529, word: "삼다", meaning: "收養、將某物用作", ex_kr: "그는 실패를 교훈으로 삼았어요.", ex_zh: "他把失敗當作一次教訓。" },
            { id: 2530, word: "바닷물", meaning: "海水", ex_kr: "바닷물은 짜요.", ex_zh: "海水是鹹的。" },
            { id: 2531, word: "드물다", meaning: "罕見", ex_kr: "이런 기회는 흔치 않고 드물어요.", ex_zh: "這樣的機會實屬難得。" },
            { id: 2532, word: "커다랗다", meaning: "非常大、巨大", ex_kr: "커다란 바위가 길을 막고 있어요.", ex_zh: "一塊巨石擋住了路。" },
            { id: 2533, word: "뮤지컬", meaning: "音樂", ex_kr: "주말에 유명한 뮤지컬을 봤어요.", ex_zh: "我周末看了一部著名的音樂劇。" },
            { id: 2534, word: "학자", meaning: "學者", ex_kr: "그는 존경받는 역사 학자입니다.", ex_zh: "他是一位受人尊敬的歷史學家。" },
            { id: 2535, word: "놀리다", meaning: "戲弄、捉弄、嘲笑；閒置、不用", ex_kr: "친구를 놀리면 안 돼요.", ex_zh: "你不應該戲弄你的朋友。" },
            { id: 2536, word: "옛날얘기", meaning: "民間故事、傳說", ex_kr: "할머니가 옛날얘기를 해주셨어요.", ex_zh: "我奶奶給我講了一個古老的故事。" },
            { id: 2537, word: "맞선", meaning: "相親、相親", ex_kr: "부모님의 권유로 맞선을 봤어요.", ex_zh: "在父母的建議下，我去參加了一次相親。" },
            { id: 2538, word: "털다", meaning: "拂去灰塵、撣去污垢；搶劫", ex_kr: "옷에 묻은 먼지를 털었어요.", ex_zh: "我撣了撣衣服上的灰塵。" },
            { id: 2539, word: "엄청", meaning: "非常非常", ex_kr: "오늘 날씨가 엄청 추워요.", ex_zh: "今天天氣非常冷。" },
            { id: 2540, word: "없애다", meaning: "移除、清除；浪費", ex_kr: "얼룩을 없애려고 세탁했어요.", ex_zh: "我把它洗掉了污漬。" },
            { id: 2541, word: "벌주다", meaning: "懲罰", ex_kr: "신은 죄인에게 벌을 줍니다.", ex_zh: "上帝會懲罰罪人。" },
            { id: 2542, word: "문병가다", meaning: "探望病人", ex_kr: "친구가 입원해서 문병 갔어요.", ex_zh: "我的朋友住院了，所以我去探望他。" },
            { id: 2543, word: "눈앞", meaning: "就在眼前、就在前方", ex_kr: "성공이 눈앞에 있어요.", ex_zh: "成功就在眼前。" },
            { id: 2544, word: "시험지", meaning: "試卷", ex_kr: "시험지를 제출하고 나왔어요.", ex_zh: "我交完考卷就離開了。" },
            { id: 2545, word: "소방서", meaning: "消防局", ex_kr: "불이 나면 소방서에 신고하세요.", ex_zh: "如果發生火災，請向消防局報告。" },
            { id: 2546, word: "동남아", meaning: "東南亞", ex_kr: "동남아로 여행을 떠나요.", ex_zh: "我們去東南亞旅行吧。" },
            { id: 2547, word: "액자", meaning: "鏡框", ex_kr: "가족 사진을 액자에 넣었어요.", ex_zh: "我把全家福照片放進了相框裡。" },
            { id: 2548, word: "빠져나가다", meaning: "逃脫、悄悄溜走", ex_kr: "교묘하게 위기를 빠져나갔어요.", ex_zh: "他巧妙地擺脫了危機。" },
            { id: 2549, word: "서투르다", meaning: "不熟悉、不熟練、不擅長", ex_kr: "저는 아직 한국어가 서툴러요.", ex_zh: "我的韓語仍然不好。" },
            { id: 2550, word: "미끄럽다", meaning: "滑溜溜的", ex_kr: "바닥이 젖어서 미끄러워요.", ex_zh: "地板濕滑。" },
            { id: 2551, word: "매진되다", meaning: "即將售罄", ex_kr: "표가 모두 매진되었어요.", ex_zh: "所有門票已售罄。" },
            { id: 2552, word: "음", meaning: "聲音、音調；陰", ex_kr: "피아노 음이 정말 아름다워요.", ex_zh: "鋼琴的聲音真好聽。" },
            { id: 2553, word: "런던", meaning: "倫敦", ex_kr: "런던은 영국의 수도입니다.", ex_zh: "倫敦是英國的首都。" },
            { id: 2554, word: "사모님", meaning: "老師的妻子、上司的妻子", ex_kr: "사장님 사모님께서 오셨어요.", ex_zh: "老闆和老闆娘到了。" },
            { id: 2555, word: "훈련", meaning: "訓練、練習", ex_kr: "군인들이 힘든 훈련을 받고 있어요.", ex_zh: "士兵們正在接受嚴格的訓練。" },
            { id: 2556, word: "분실물", meaning: "遺失物品、遺失物品", ex_kr: "지하철 분실물 센터에 갔어요.", ex_zh: "我去了地鐵失物招領處。" },
            { id: 2557, word: "지나치다", meaning: "過分；經過、走過", ex_kr: "지나친 음주는 건강에 해로워요.", ex_zh: "過量飲酒有害健康。" },
            { id: 2558, word: "신혼부부", meaning: "新婚夫婦", ex_kr: "신혼부부가 깨소금을 볶고 있네요.", ex_zh: "一對新婚夫婦正在烤芝麻。" },
            { id: 2559, word: "식혜", meaning: "甜米飲料", ex_kr: "찜질방에서 시원한 식혜를 마셨어요.", ex_zh: "我在桑拿浴室喝了冷的錫克耶。" },
            { id: 2560, word: "이태원", meaning: "梨泰院", ex_kr: "이태원에는 외국 식당이 많아요.", ex_zh: "梨泰院有很多外國餐廳。" },
            { id: 2561, word: "테이프", meaning: "磁帶", ex_kr: "박스를 테이프로 붙였어요.", ex_zh: "我用膠帶把盒子黏起來了。" },
            { id: 2562, word: "예상하다", meaning: "預測、預期、期望", ex_kr: "결과를 미리 예상하기 어려워요.", ex_zh: "很難提前預測結果。" },
            { id: 2563, word: "색연필", meaning: "色鉛筆", ex_kr: "색연필로 그림을 그렸어요.", ex_zh: "我用色鉛筆畫了一幅畫。" },
            { id: 2564, word: "바람나다", meaning: "秘密談戀愛", ex_kr: "남편이 바람난 것 같아요.", ex_zh: "我覺得我先生有外遇。" },
            { id: 2565, word: "아깝다", meaning: "珍貴的、有價值的；令人遺憾的、可憐的", ex_kr: "남은 음식을 버리기가 아까워요.", ex_zh: "把剩菜剩飯丟掉感覺很浪費。" },
            { id: 2566, word: "어차피", meaning: "總之、無論如何", ex_kr: "어차피 늦었으니 천천히 가자.", ex_zh: "反正時間也不早了，咱們慢慢來吧。" },
            { id: 2567, word: "옥상", meaning: "屋頂", ex_kr: "옥상에서 별을 보았어요.", ex_zh: "我在屋頂上看到了星星。" },
            { id: 2568, word: "캄캄하다", meaning: "漆黑一片、漆黑一片", ex_kr: "밖이 캄캄해서 아무것도 안 보여요.", ex_zh: "外面漆黑一片，我什麼也看不見。" },
            { id: 2569, word: "스케줄", meaning: "行程", ex_kr: "오늘 스케줄이 어떻게 되나요?", ex_zh: "你今天有什麼日程安排？" },
            { id: 2570, word: "주택", meaning: "房屋、住房", ex_kr: "그는 주택 단지에 살고 있어요.", ex_zh: "他住在居民小區。" },
            { id: 2571, word: "예외", meaning: "例外", ex_kr: "모든 규칙에는 예외가 있어요.", ex_zh: "凡事皆有例外。" },
            { id: 2572, word: "기적", meaning: "奇蹟；蒸汽哨", ex_kr: "기적이 일어났어요.", ex_zh: "奇蹟發生了。" },
            { id: 2573, word: "대학원생", meaning: "研究生", ex_kr: "그는 석사 과정을 밟고 있는 대학원생이에요.", ex_zh: "他是一名研究生，正在攻讀碩士學位。" },
            { id: 2574, word: "교장", meaning: "校長、校長", ex_kr: "교장 선생님께서 훈화 말씀을 하셨어요.", ex_zh: "校長發表了演說。" },
            { id: 2575, word: "통신", meaning: "溝通、通信", ex_kr: "태풍으로 통신이 두절되었어요.", ex_zh: "由於颱風，通訊中斷。" },
            { id: 2576, word: "깨우다", meaning: "叫醒某人", ex_kr: "아침 일찍 저를 좀 깨워 주세요.", ex_zh: "請早上早點叫醒我。" },
            { id: 2577, word: "리모콘", meaning: "遙控", ex_kr: "리모콘이 어디 있는지 모르겠어요.", ex_zh: "我不知道遙控器在哪裡。" },
            { id: 2578, word: "붕대", meaning: "繃帶、敷料", ex_kr: "상처 부위에 붕대를 감았어요.", ex_zh: "我用繃帶包紮了傷口。" },
            { id: 2579, word: "달리", meaning: "不同", ex_kr: "그는 남들과 달리 생각이 독창적이에요.", ex_zh: "與其他人不同，他的思維方式是原創的。" },
            { id: 2580, word: "파", meaning: "蔥", ex_kr: "라면에 파를 송송 썰어 넣었어요.", ex_zh: "我切了一些蔥花，加到拉麵裡。" },
            { id: 2581, word: "구체적", meaning: "具體、明確、特定", ex_kr: "구체적인 계획을 세우세요.", ex_zh: "制定具體計劃。" },
            { id: 2582, word: "부족", meaning: "部落；短缺、缺乏", ex_kr: "수면 부족으로 피곤해요.", ex_zh: "我睡眠不足，感覺很累。" },
            { id: 2583, word: "아이디어", meaning: "主意", ex_kr: "좋은 아이디어가 떠올랐어요.", ex_zh: "我想到一個好主意。" },
            { id: 2584, word: "게다가", meaning: "另外、除此之外…", ex_kr: "비가 오는데 게다가 우산도 없어요.", ex_zh: "下雨了，更糟的是，我還沒有傘。" },
            { id: 2585, word: "창고", meaning: "倉庫、存儲", ex_kr: "안 쓰는 물건은 창고에 넣어두세요.", ex_zh: "請將未使用的物品放入倉庫。" },
            { id: 2586, word: "무조건", meaning: "無條件的", ex_kr: "부모님은 저를 무조건 믿어주세요.", ex_zh: "我的父母，請無條件地信任我。" },
            { id: 2587, word: "멍청이", meaning: "愚蠢的人", ex_kr: "바보 멍청이처럼 굴지 마세요.", ex_zh: "別犯傻。" },
            { id: 2588, word: "어색하다", meaning: "感到尷尬、不知如何表達", ex_kr: "처음 만난 사람이라 어색했어요.", ex_zh: "因為這是我第一次見到這個人，所以氣氛很尷尬。" },
            { id: 2589, word: "솔직하다", meaning: "坦白說、誠實地說、直言不諱", ex_kr: "그는 성격이 솔직해요.", ex_zh: "他為人誠實。" },
            { id: 2590, word: "오죽", meaning: "確實、非常、如何", ex_kr: "오죽 답답했으면 그랬을까요.", ex_zh: "我很好奇他們當時該有多沮喪才會這麼做。" },
            { id: 2591, word: "의지", meaning: "意志、意願", ex_kr: "그는 의지가 강한 사람이에요.", ex_zh: "他是一個意志堅定的人。" },
            { id: 2592, word: "먹이다", meaning: "餵食、讓某人吃", ex_kr: "아이에게 밥을 먹였어요.", ex_zh: "我餵了孩子。" },
            { id: 2593, word: "어느새", meaning: "很快、迅速地", ex_kr: "어느새 겨울이 왔어요.", ex_zh: "不知不覺中，冬天就來了。" },
            { id: 2594, word: "쫓다", meaning: "追逐、追尋", ex_kr: "경찰이 도둑을 쫓고 있어요.", ex_zh: "警方正在追捕竊賊。" },
            { id: 2595, word: "손톱", meaning: "指甲", ex_kr: "손톱을 짧게 깎았어요.", ex_zh: "我把指甲剪短了。" },
            { id: 2596, word: "수다떨다", meaning: "閒聊", ex_kr: "친구들과 카페에서 수다 떨었어요.", ex_zh: "我在咖啡館和朋友聊天。" },
            { id: 2597, word: "고동색", meaning: "紅棕色", ex_kr: "고동색 구두를 신었어요.", ex_zh: "我穿了深棕色的鞋子。" },
            { id: 2598, word: "대학로", meaning: "大學路、學院街", ex_kr: "대학로에서 연극을 봤어요.", ex_zh: "我在大學路看了一場話劇。" },
            { id: 2599, word: "다만", meaning: "僅僅、僅僅是", ex_kr: "저는 다만 진실을 알고 싶을 뿐이에요.", ex_zh: "我只想知道真相。" },
            { id: 2600, word: "변기", meaning: "洗手間", ex_kr: "변기가 막혀서 뚫어야 해요.", ex_zh: "馬桶堵了，我得疏通一下。" },
            { id: 2601, word: "명성", meaning: "聲譽、名望", ex_kr: "그 식당은 명성에 비해 맛이 없어요.", ex_zh: "那家餐廳並沒有名氣那麼好。" },
            { id: 2602, word: "인물", meaning: "人、個體、性格", ex_kr: "그는 역사적으로 중요한 인물입니다.", ex_zh: "他是一位具有重要歷史意義的人物。" },
            { id: 2603, word: "비둘기", meaning: "鴿子", ex_kr: "공원에 비둘기가 모여 있어요.", ex_zh: "公園裡聚集著一群鴿子。" },
            { id: 2604, word: "예금", meaning: "存款、儲蓄", ex_kr: "은행에 돈을 예금했어요.", ex_zh: "我把錢存進銀行了。" },
            { id: 2605, word: "책방", meaning: "書店", ex_kr: "책방에서 소설책을 샀어요.", ex_zh: "我在書店買了一本小說。" },
            { id: 2606, word: "여왕", meaning: "女王", ex_kr: "영국 여왕이 서거했어요.", ex_zh: "英國女王逝世了。" },
            { id: 2607, word: "액션", meaning: "行動", ex_kr: "저는 액션 영화를 좋아해요.", ex_zh: "我喜歡動作片。" },
            { id: 2608, word: "관찰하다", meaning: "觀察、觀看", ex_kr: "아이들은 곤충을 관찰하는 것을 좋아해요.", ex_zh: "孩子喜歡觀察昆蟲。" },
            { id: 2609, word: "감소하다", meaning: "減少、下降", ex_kr: "출산율이 계속 감소하고 있어요.", ex_zh: "出生率持續下降。" },
            { id: 2610, word: "등록하다", meaning: "註冊、報名", ex_kr: "학원에 등록했어요.", ex_zh: "我在一所學院報了名。" },
            { id: 2611, word: "만족하다", meaning: "感到滿意、高興", ex_kr: "저는 현재 생활에 만족해요.", ex_zh: "我對目前的生活很滿意。" },
            { id: 2612, word: "임신하다", meaning: "懷孕", ex_kr: "그녀는 임신해서 배가 불렀어요.", ex_zh: "她懷孕了，肚子很大。" },
            { id: 2613, word: "까닭", meaning: "原因、起因、理由", ex_kr: "그가 화난 까닭을 모르겠어요.", ex_zh: "我不知道他為什麼生氣。" },
            { id: 2614, word: "발걸음", meaning: "步、步伐", ex_kr: "집으로 가는 발걸음이 가벼워요.", ex_zh: "回家的路上，我的腳步很輕。" },
            { id: 2615, word: "재벌", meaning: "企業集團、富豪", ex_kr: "그 드라마의 주인공은 재벌 2세예요.", ex_zh: "那部劇的主角是一位二代財閥。" },
            { id: 2616, word: "황금", meaning: "金子", ex_kr: "들판이 황금빛으로 물들었어요.", ex_zh: "田野變成了金色。" },
            { id: 2617, word: "기념일", meaning: "週年紀念日", ex_kr: "결혼 기념일을 축하해요.", ex_zh: "結婚週年快樂。" },
            { id: 2618, word: "고정시키다", meaning: "固定、緊固、使無法移動", ex_kr: "나사로 선반을 벽에 고정시켰어요.", ex_zh: "我用螺絲把架子固定在牆上。" },
            { id: 2619, word: "죄", meaning: "犯罪、罪孽、責備", ex_kr: "죄를 지으면 벌을 받아야 해요.", ex_zh: "如果你犯了罪，就必須受到懲罰。" },
            { id: 2620, word: "철", meaning: "鐵、鋼；季節；謹慎、明智的", ex_kr: "이 문은 철로 만들어졌어요.", ex_zh: "這扇門是鐵製的。" },
            { id: 2621, word: "지은이", meaning: "作家、作者", ex_kr: "이 책의 지은이가 누구예요?", ex_zh: "這本書的作者是誰？" },
            { id: 2622, word: "압력", meaning: "壓力", ex_kr: "압력 밥솥으로 밥을 하면 맛있어요.", ex_zh: "用壓力鍋煮出來的米飯味道鮮美。" },
            { id: 2623, word: "따라다니다", meaning: "跟蹤、追逐", ex_kr: "강아지가 졸졸 따라다녀요.", ex_zh: "小狗一直跟著我。" },
            { id: 2624, word: "자녀", meaning: "孩子們", ex_kr: "슬하에 자녀가 몇 명인가요?", ex_zh: "你有幾個孩子？" },
            { id: 2625, word: "개미", meaning: "螞蟻", ex_kr: "개미는 부지런한 곤충이에요.", ex_zh: "螞蟻是勤奮的昆蟲。" },
            { id: 2626, word: "교재", meaning: "教學材料", ex_kr: "수업 교재를 미리 준비하세요.", ex_zh: "請提前準備好課堂材料。" },
            { id: 2627, word: "다가가다", meaning: "接近、走近", ex_kr: "고양이에게 조심스럽게 다가갔어요.", ex_zh: "我小心翼翼地靠近了那隻貓。" },
            { id: 2628, word: "미끄럼", meaning: "滑動、滑動", ex_kr: "놀이터에서 미끄럼틀을 탔어요.", ex_zh: "我在遊樂場玩了滑梯。" },
            { id: 2629, word: "호기심", meaning: "好奇心", ex_kr: "아이들은 호기심이 많아요.", ex_zh: "孩子們都很好奇。" },
            { id: 2630, word: "독립", meaning: "獨立", ex_kr: "대한독립 만세!", ex_zh: "韓國獨立萬歲！" },
            { id: 2631, word: "선착순으로", meaning: "按到達順序", ex_kr: "선착순으로 선물을 드립니다.", ex_zh: "我們將以先到先得的方式贈送禮品。" },
            { id: 2632, word: "심리학", meaning: "心理學", ex_kr: "저는 대학에서 심리학을 공부하고 싶어요.", ex_zh: "我想在大學學習心理學。" },
            { id: 2633, word: "급행열차", meaning: "快車", ex_kr: "급행열차를 타면 더 빨리 갈 수 있어요.", ex_zh: "如果你搭乘特快列車，就能更快到達目的地。" },
            { id: 2634, word: "유감", meaning: "後悔", ex_kr: "그 일에 대해 유감스럽게 생각합니다.", ex_zh: "對此我深感抱歉。" },
            { id: 2635, word: "곤충", meaning: "昆蟲、蟲子", ex_kr: "숲에는 다양한 곤충이 살아요.", ex_zh: "森林裡生活著各種各樣的昆蟲。" },
            { id: 2636, word: "아프리카", meaning: "非洲", ex_kr: "아프리카 사파리 여행을 가고 싶어요.", ex_zh: "我想去非洲進行野生動物之旅。" },
            { id: 2637, word: "전경", meaning: "全景；正面圖", ex_kr: "산 정상에서 보는 전경이 멋져요.", ex_zh: "山頂的景色美極了。" },
            { id: 2638, word: "치우다", meaning: "整理、清理、移除", ex_kr: "책상을 깨끗이 치웠어요.", ex_zh: "我把桌子擦乾淨了。" },
            { id: 2639, word: "이어지다", meaning: "保持聯繫、繼續下去", ex_kr: "산책로가 공원까지 이어져 있어요.", ex_zh: "步道通往公園。" },
            { id: 2640, word: "티켓", meaning: "票", ex_kr: "콘서트 티켓을 예매했어요.", ex_zh: "我訂了演唱會門票。" },
            { id: 2641, word: "좀처럼", meaning: "不容易、不容易", ex_kr: "감기가 좀처럼 낫지 않네요.", ex_zh: "我的感冒一直沒好轉。" },
            { id: 2642, word: "때리다", meaning: "毆打、擊打、攻擊", ex_kr: "친구를 때리면 안 돼요.", ex_zh: "你不應該打你的朋友。" },
            { id: 2643, word: "마감", meaning: "最後期限", ex_kr: "마감 시간이 얼마 남지 않았어요.", ex_zh: "距離截止日期已經不多了。" },
            { id: 2644, word: "최종", meaning: "最後、最終的", ex_kr: "최종 합격자 명단이 발표되었어요.", ex_zh: "最終入選名單已公佈。" },
            { id: 2645, word: "대기하다", meaning: "待命、等候", ex_kr: "손님이 많아서 밖에서 대기해야 해요.", ex_zh: "顧客很多，所以你得在外面等。" },
            { id: 2646, word: "건너", meaning: "穿過", ex_kr: "강 건너 마을에 친구가 살아요.", ex_zh: "我的朋友住在河對岸的村子裡。" },
            { id: 2647, word: "관악산", meaning: "冠嶽山", ex_kr: "주말에 관악산으로 등산을 갔어요.", ex_zh: "我週末去冠嶽山健行了。" },
            { id: 2648, word: "구석", meaning: "角落", ex_kr: "방 구석에 먼지가 쌓였어요.", ex_zh: "房間角落裡積滿了灰塵。" },
            { id: 2649, word: "가사", meaning: "歌詞；家務、雜務", ex_kr: "이 노래 가사가 정말 좋아요.", ex_zh: "我非常喜歡這首歌的歌詞。" },
            { id: 2650, word: "상세", meaning: "細節、詳情", ex_kr: "상세 내용은 홈페이지를 참조하세요.", ex_zh: "詳情請見首頁。" },
            { id: 2651, word: "기후", meaning: "氣候", ex_kr: "기후 변화가 심각한 문제입니다.", ex_zh: "氣候變遷是一個嚴重的問題。" },
            { id: 2652, word: "작품", meaning: "藝術作品", ex_kr: "이것은 피카소의 작품입니다.", ex_zh: "這是畢卡索的作品。" },
            { id: 2653, word: "시합하다", meaning: "和對手對戰、進行一場比賽", ex_kr: "다른 학교와 축구 시합을 했어요.", ex_zh: "我們和另一所學校進行了一場足球比賽。" },
            { id: 2654, word: "보험", meaning: "保險", ex_kr: "자동차 보험에 가입했어요.", ex_zh: "我買了汽車保險。" },
            { id: 2655, word: "미용", meaning: "美容護理", ex_kr: "그녀는 미용에 관심이 많아요.", ex_zh: "她對美很有興趣。" },
            { id: 2656, word: "이발하다", meaning: "去理髮(男士)", ex_kr: "미용실에 가서 이발했어요.", ex_zh: "我去理髮店剪了頭髮。" },
            { id: 2657, word: "실외", meaning: "戶外", ex_kr: "실외에서는 마스크를 벗어도 돼요.", ex_zh: "在戶外可以拿取口罩。" },
            { id: 2658, word: "어휘", meaning: "詞彙", ex_kr: "외국어를 배울 때는 어휘력이 중요해요.", ex_zh: "詞彙量在學習外語時非常重要。" },
            { id: 2659, word: "약혼", meaning: "訂婚", ex_kr: "그들은 약혼 반지를 교환했어요.", ex_zh: "他們交換了訂婚戒指。" },
            { id: 2660, word: "그네", meaning: "搖擺", ex_kr: "놀이터에서 그네를 탔어요.", ex_zh: "我在遊樂場蕩了鞦韆。" },
            { id: 2661, word: "보장하다", meaning: "保證", ex_kr: "제품의 품질을 보장합니다.", ex_zh: "我們保證產品品質。" },
            { id: 2662, word: "민속촌", meaning: "民俗村", ex_kr: "민속촌에서 한국의 전통 문화를 체험했어요.", ex_zh: "我在民俗村體驗了韓國傳統文化。" },
            { id: 2663, word: "무대", meaning: "階段", ex_kr: "가수가 무대 위에서 노래하고 있어요.", ex_zh: "一位歌手在台上唱歌。" },
            { id: 2664, word: "네모", meaning: "方塊", ex_kr: "색종이를 네모 모양으로 접으세요.", ex_zh: "將彩色紙折成正方形。" },
            { id: 2665, word: "만년필", meaning: "鋼筆", ex_kr: "아버지께 만년필을 선물해 드렸어요.", ex_zh: "我送給父親一支鋼筆作為禮物。" },
            { id: 2666, word: "결말", meaning: "結尾、結束、結論", ex_kr: "영화의 결말이 너무 슬펐어요.", ex_zh: "電影的結局太令人難過了。" },
            { id: 2667, word: "희한하다", meaning: "奇怪的、奇特的、不尋常的、罕見的", ex_kr: "참 희한한 일이네요.", ex_zh: "這真是件奇怪的事。" },
            { id: 2668, word: "환대", meaning: "熱情好客、熱烈歡迎", ex_kr: "따뜻한 환대에 감사합니다.", ex_zh: "感謝你們的熱情款待。" },
            { id: 2669, word: "구좌", meaning: "帳戶", ex_kr: "은행 구좌를 개설했어요.", ex_zh: "我開了一個銀行帳戶。" },
            { id: 2670, word: "집집마다", meaning: "每棟房子", ex_kr: "명절에는 집집마다 웃음꽃이 피어요.", ex_zh: "節慶期間，家家戶戶都洋溢著歡聲笑語。" },
            { id: 2671, word: "객실", meaning: "房間；小木屋", ex_kr: "호텔 객실이 꽉 찼어요.", ex_zh: "酒店房間已滿。" },
            { id: 2672, word: "호주머니", meaning: "口袋", ex_kr: "호주머니에 손을 넣고 걸었어요.", ex_zh: "我雙手插在口袋裡走路。" },
            { id: 2673, word: "아리랑", meaning: "韓國傳統歌曲《阿里郎》", ex_kr: "아리랑은 한국의 대표적인 민요입니다.", ex_zh: "《阿里郎》是韓國的代表性民謠。" },
            { id: 2674, word: "영혼", meaning: "靈魂", ex_kr: "음악이 제 영혼을 위로해 줘요.", ex_zh: "音樂撫慰我的心。" },
            { id: 2675, word: "식", meaning: "形式、風格；儀式", ex_kr: "결혼식 날짜를 잡았어요.", ex_zh: "我們定好了婚期。" },
            { id: 2676, word: "여전하다", meaning: "保持不變、照常進行", ex_kr: "그의 유머 감각은 여전하네요.", ex_zh: "他的幽默感依舊如故。" },
            { id: 2677, word: "합계", meaning: "總和", ex_kr: "비용 합계가 얼마나 되나요?", ex_zh: "總費用是多少？" },
            { id: 2678, word: "언짢다", meaning: "感到沮喪、不高興", ex_kr: "그의 무례한 태도 때문에 언짢았어요.", ex_zh: "他態度粗魯，讓我很生氣。" },
            { id: 2679, word: "머무르다", meaning: "留下、繼續", ex_kr: "제주도에 일주일 동안 머무를 예정이에요.", ex_zh: "我打算在濟州島待一週。" },
            { id: 2680, word: "시제", meaning: "時態", ex_kr: "과거 시제를 사용해서 문장을 만드세요.", ex_zh: "用過去式造句。" },
            { id: 2681, word: "모험", meaning: "冒險", ex_kr: "새로운 모험을 떠날 준비가 되었나요?", ex_zh: "你準備好開啟一段新的冒險之旅了嗎？" },
            { id: 2682, word: "느끼하다", meaning: "油膩的、油膩的", ex_kr: "피자가 너무 느끼해서 콜라를 마셨어요.", ex_zh: "披薩太油膩了，所以我喝了可樂。" },
            { id: 2683, word: "홍콩", meaning: "香港", ex_kr: "홍콩의 야경은 유명해요.", ex_zh: "香港的夜景聞名遐邇。" },
            { id: 2684, word: "허전하다", meaning: "感到空虛、孤獨", ex_kr: "친구가 떠나니 마음이 허전해요.", ex_zh: "朋友離開後，我感到內心空虛。" },
            { id: 2685, word: "빗물", meaning: "雨水", ex_kr: "빗물이 창문을 타고 흘러내려요.", ex_zh: "雨水順著窗戶流下來。" },
            { id: 2686, word: "별것", meaning: "一些奇怪的事情", ex_kr: "별것 아닌 일에 화내지 마세요.", ex_zh: "不要為瑣事生氣。" },
            { id: 2687, word: "빈칸", meaning: "空白處、空白列", ex_kr: "빈칸에 알맞은 말을 쓰세요.", ex_zh: "請在空白處填寫適當的字詞。" },
            { id: 2688, word: "중고품", meaning: "二手商品", ex_kr: "중고품 시장에서 저렴하게 샀어요.", ex_zh: "我是在二手市場低價買的。" },
            { id: 2689, word: "독하다", meaning: "強勢的、有力的；懷有惡意的", ex_kr: "이 술은 너무 독해요.", ex_zh: "這酒勁兒太大了。" },
            { id: 2690, word: "잠기다", meaning: "沉入水中、下沉；被鎖住、扣緊", ex_kr: "문이 잠겨서 들어갈 수 없어요.", ex_zh: "門鎖了，我進不去。" },
            { id: 2691, word: "매점", meaning: "小吃攤、售貨亭、自助餐廳", ex_kr: "쉬는 시간에 매점에 갔어요.", ex_zh: "課間休息時我去了小吃店。" },
            { id: 2692, word: "토론", meaning: "討論、辯論", ex_kr: "찬반 토론을 진행하겠습니다.", ex_zh: "接下來我們將就其利弊展開辯論。" },
            { id: 2693, word: "돌잔치", meaning: "慶祝寶寶一歲生日", ex_kr: "조카의 돌잔치에 초대받았어요.", ex_zh: "我受邀參加了姪子的周歲生日派對。" },
            { id: 2694, word: "국기", meaning: "國旗", ex_kr: "태극기는 한국의 국기입니다.", ex_zh: "太極旗是韓國國旗。" },
            { id: 2695, word: "바치다", meaning: "奉獻、提供、給予", ex_kr: "그는 평생을 연구에 바쳤어요.", ex_zh: "他畢生致力於科學研究。" },
            { id: 2696, word: "과외", meaning: "私人課程、輔導", ex_kr: "수학 과외를 받고 있어요.", ex_zh: "我正在接受數學輔導。" },
            { id: 2697, word: "물가", meaning: "生活成本、物價；水邊", ex_kr: "요즘 물가가 너무 올랐어요.", ex_zh: "最近物價上漲得太厲害了。" },
            { id: 2698, word: "경고하다", meaning: "發出警告", ex_kr: "경찰이 속도 위반을 경고했어요.", ex_zh: "警察警告我不要超速。" },
            { id: 2699, word: "운", meaning: "運氣、財富、命運", ex_kr: "오늘은 운이 좋은 날이에요.", ex_zh: "今天真是個幸運日。" },
            { id: 2700, word: "다리미", meaning: "熨斗", ex_kr: "다리미가 뜨거우니 조심하세요.", ex_zh: "熨斗很燙，請小心。" },
            { id: 2701, word: "노동자", meaning: "工人、勞動者", ex_kr: "노동자의 권리를 보호해야 합니다.", ex_zh: "我們必須保護工人的權利。" },
            { id: 2702, word: "선택권", meaning: "選擇權", ex_kr: "저에게는 선택권이 없어요.", ex_zh: "我別無選擇。" },
            { id: 2703, word: "지원하다", meaning: "支持、回歸；申請、志工服務", ex_kr: "대기업 신입 사원 모집에 지원했어요.", ex_zh: "我申請了一家大型企業的新進員工職位。" },
            { id: 2704, word: "승용차", meaning: "搭乘用車", ex_kr: "승용차를 타고 출근해요.", ex_zh: "我開車上班。" },
            { id: 2705, word: "소아과", meaning: "兒科", ex_kr: "아기가 아파서 소아과에 갔어요.", ex_zh: "我帶寶寶去看兒科醫生，因為他生病了。" },
            { id: 2706, word: "온라인", meaning: "在線的", ex_kr: "온라인 쇼핑을 자주 해요.", ex_zh: "我經常網購。" },
            { id: 2707, word: "장비", meaning: "裝備、器材", ex_kr: "등산 장비를 챙겼어요.", ex_zh: "我收拾好了登山裝備。" },
            { id: 2708, word: "샌들", meaning: "涼鞋", ex_kr: "여름에는 샌들을 신는 게 시원해요.", ex_zh: "夏天穿涼鞋很涼爽。" },
            { id: 2709, word: "화산", meaning: "火山", ex_kr: "화산이 폭발했어요.", ex_zh: "火山爆發了。" },
            { id: 2710, word: "성장", meaning: "生長", ex_kr: "회사의 빠른 성장이 기대됩니다.", ex_zh: "我們期待公司快速發展。" },
            { id: 2711, word: "계획표", meaning: "書面日程安排、計劃", ex_kr: "방학 계획표를 짰어요.", ex_zh: "我制定了一份休假計畫。" },
            { id: 2712, word: "외투", meaning: "大衣", ex_kr: "외투를 벗어서 걸어두세요.", ex_zh: "請脫下外套掛起來。" },
            { id: 2713, word: "천장", meaning: "天花板", ex_kr: "천장에 전등을 달았어요.", ex_zh: "我在天花板上安裝了一盞燈。" },
            { id: 2714, word: "몫", meaning: "份額、部分", ex_kr: "각자의 몫을 다해야 합니다.", ex_zh: "每個人都必須盡自己的一份心力。" },
            { id: 2715, word: "논리", meaning: "邏輯", ex_kr: "그의 주장은 논리에 맞지 않아요.", ex_zh: "他的論點在邏輯上站不住腳。" },
            { id: 2716, word: "회전하다", meaning: "轉動、旋轉、旋轉", ex_kr: "지구는 태양 주위를 회전합니다.", ex_zh: "地球繞著太陽旋轉。" },
            { id: 2717, word: "주급", meaning: "每週工資(薪水)", ex_kr: "그는 주급으로 임금을 받아요.", ex_zh: "他每週領取工資。" },
            { id: 2718, word: "운반하다", meaning: "運輸、攜帶、運送", ex_kr: "이삿짐을 트럭으로 운반했어요.", ex_zh: "我用卡車運送了搬家紙箱。" },
            { id: 2719, word: "지옥", meaning: "地獄", ex_kr: "지옥 같은 훈련을 견뎌냈어요.", ex_zh: "我經歷了地獄般的訓練。" },
            { id: 2720, word: "형사", meaning: "偵探、刑事偵查", ex_kr: "형사가 범인을 잡으러 갔어요.", ex_zh: "偵探去抓捕罪犯。" },
            { id: 2721, word: "작동", meaning: "(設備)運行", ex_kr: "기계가 정상적으로 작동하고 있어요.", ex_zh: "機器運轉正常。" },
            { id: 2722, word: "빚내다", meaning: "借錢", ex_kr: "빚내서 집을 샀어요.", ex_zh: "我貸款買了一棟房子。" },
            { id: 2723, word: "원장", meaning: "導演", ex_kr: "원장 선생님과 상담했어요.", ex_zh: "我諮詢了導演。" },
            { id: 2724, word: "전원", meaning: "電源；所有成員、所有人", ex_kr: "컴퓨터 전원을 껐어요.", ex_zh: "我關掉了電腦。" },
            { id: 2725, word: "정직", meaning: "誠實；停職", ex_kr: "정직은 최선의 방책입니다.", ex_zh: "誠實是最好的策略。" },
            { id: 2726, word: "정각", meaning: "確切時間", ex_kr: "3시 정각에 만나요.", ex_zh: "我們三點整見面。" },
            { id: 2727, word: "비상", meaning: "緊急情況 -", ex_kr: "비상 사태가 발생했어요.", ex_zh: "發生緊急狀況。" },
            { id: 2728, word: "천국", meaning: "天堂、樂園", ex_kr: "여기가 바로 천국이네요.", ex_zh: "這裡簡直就是天堂。" },
            { id: 2729, word: "덕수궁", meaning: "德壽宮", ex_kr: "덕수궁 돌담길을 걸었어요.", ex_zh: "我沿著德壽宮的石牆小路漫步。" },
            { id: 2730, word: "면접", meaning: "面試", ex_kr: "내일 면접이 있어서 떨려요.", ex_zh: "我明天有面試，所以有點緊張。" },
            { id: 2731, word: "차라리", meaning: "更確切地說、最好", ex_kr: "그럴 바에는 차라리 포기하는 게 낫겠어요.", ex_zh: "既然如此，不如放棄。" },
            { id: 2732, word: "범인", meaning: "罪犯、罪魁禍首", ex_kr: "경찰이 범인을 체포했어요.", ex_zh: "警方逮捕了罪犯。" },
            { id: 2733, word: "야만적", meaning: "未開化的、野蠻的", ex_kr: "전쟁은 야만적인 행위입니다.", ex_zh: "戰爭是野蠻的行為。" },
            { id: 2734, word: "어마어마하다", meaning: "非常巨大、宏偉、壯麗", ex_kr: "피해 규모가 어마어마해요.", ex_zh: "損失規模龐大。" },
            { id: 2735, word: "당분간", meaning: "就目前而言、暫時如此", ex_kr: "당분간 술을 마시지 않을 거예요.", ex_zh: "我暫時不會喝酒了。" },
            { id: 2736, word: "감독", meaning: "監督；主管、主任", ex_kr: "봉준호는 유명한 영화 감독입니다.", ex_zh: "奉俊昊是一位著名電影導演。" },
            { id: 2737, word: "구독", meaning: "訂閱", ex_kr: "신문을 정기 구독하고 있어요.", ex_zh: "我定期訂閱報紙。" },
            { id: 2738, word: "빛나다", meaning: "閃耀、發光、明亮", ex_kr: "밤하늘에 별이 빛나고 있어요.", ex_zh: "夜空中繁星閃爍。" },
            { id: 2739, word: "비겁하다", meaning: "懦弱", ex_kr: "비겁하게 뒤로 숨지 마세요.", ex_zh: "不要做懦夫，躲在別人後面。" },
            { id: 2740, word: "용기", meaning: "勇氣；容器", ex_kr: "용기를 내서 고백했어요.", ex_zh: "我鼓起勇氣坦白了。" },
            { id: 2741, word: "사생활", meaning: "隱私、私生活", ex_kr: "연예인의 사생활을 보호해 줘야 해요.", ex_zh: "我們需要保護名人的隱私。" },
            { id: 2742, word: "사립학교", meaning: "私立學校", ex_kr: "사립학교 학비는 비싼 편이에요.", ex_zh: "私立學校學費比較貴。" },
            { id: 2743, word: "망설이다", meaning: "猶豫、遲疑", ex_kr: "망설이지 말고 도전하세요.", ex_zh: "不要猶豫，接受挑戰。" },
            { id: 2744, word: "제안하다", meaning: "提議、建議", ex_kr: "그에게 좋은 아이디어를 제안했어요.", ex_zh: "我給他提了個好建議。" },
            { id: 2745, word: "무너지다", meaning: "坍塌、塌陷", ex_kr: "지진으로 건물이 무너졌어요.", ex_zh: "由於地震，建築物倒塌了。" },
            { id: 2746, word: "움직임", meaning: "運動、動作", ex_kr: "수상한 움직임이 포착되었어요.", ex_zh: "偵測到可疑活動。" },
            { id: 2747, word: "악담하다", meaning: "進行言語辱罵、說人壞話", ex_kr: "남에게 악담하지 마세요.", ex_zh: "不要說別人的壞話。" },
            { id: 2748, word: "인삼차", meaning: "人參茶", ex_kr: "건강을 위해 인삼차를 마셨어요.", ex_zh: "我為了健康喝人參茶。" },
            { id: 2749, word: "쫓아가다", meaning: "追趕、追逐、跟上", ex_kr: "버스를 놓쳐서 택시로 쫓아갔어요.", ex_zh: "我錯過了公車，所以就搭計程車追了上去。" },
            { id: 2750, word: "국립", meaning: "國家的 -", ex_kr: "국립 박물관에 견학을 갔어요.", ex_zh: "我參加了一次去國家博物館的實地考察。" },
            { id: 2751, word: "매번", meaning: "每次、經常、總是", ex_kr: "매번 도와주셔서 감사합니다.", ex_zh: "感謝你每次的幫助。" },
            { id: 2752, word: "둘러보다", meaning: "環顧四周", ex_kr: "가게를 한 번 둘러보고 올게요.", ex_zh: "我逛完店就回來。" },
            { id: 2753, word: "세일", meaning: "銷售", ex_kr: "백화점 세일 기간에 옷을 샀어요.", ex_zh: "我在百貨公司打折的時候買了衣服。" },
            { id: 2754, word: "석양", meaning: "日落", ex_kr: "바다 위로 지는 석양이 아름다워요.", ex_zh: "海上的日落很美。" },
            { id: 2755, word: "어쩌다가", meaning: "偶然地；偶爾", ex_kr: "어쩌다가 이런 일이 생겼을까요?", ex_zh: "這是怎麼發生的？" },
            { id: 2756, word: "반년", meaning: "半年", ex_kr: "벌써 반년이 지났네요.", ex_zh: "已經過去半年了。" },
            { id: 2757, word: "다지다", meaning: "切碎、剁碎；變硬", ex_kr: "마늘을 잘게 다졌어요.", ex_zh: "我把大蒜切碎了。" },
            { id: 2758, word: "둥글다", meaning: "圓形、球形", ex_kr: "보름달이 둥글게 떴어요.", ex_zh: "滿月已圓。" },
            { id: 2759, word: "난리", meaning: "混亂、暴動、戰爭", ex_kr: "물건 세일한다고 난리가 났어요.", ex_zh: "由於產品銷售，引起了很大的轟動。" },
            { id: 2760, word: "접속", meaning: "訪問、連接", ex_kr: "인터넷 접속이 원활하지 않아요.", ex_zh: "網路連線不穩定。" },
            { id: 2761, word: "다듬다", meaning: "修剪；精煉", ex_kr: "미용실에서 머리를 다듬었어요.", ex_zh: "我在理髮店修剪了頭髮。" },
            { id: 2762, word: "간판", meaning: "商店招牌", ex_kr: "가게 간판이 눈에 잘 띄어요.", ex_zh: "商店招牌非常顯眼。" },
            { id: 2763, word: "단도", meaning: "匕首、短劍", ex_kr: "그는 품속에 단도를 숨기고 있었어요.", ex_zh: "他胸前藏著一把匕首。" },
            { id: 2764, word: "든든하다", meaning: "感到堅強、安心、放心", ex_kr: "아침을 먹으니 속이 든든해요.", ex_zh: "我吃完早餐後感覺很飽。" },
            { id: 2765, word: "협박하다", meaning: "威脅、恐嚇", ex_kr: "그는 돈을 내놓으라고 협박했어요.", ex_zh: "他威脅要交出這筆錢。" },
            { id: 2766, word: "파랑", meaning: "藍色的", ex_kr: "하늘이 파랑 색이에요.", ex_zh: "天空是藍色的。" },
            { id: 2767, word: "선거", meaning: "選舉", ex_kr: "내일은 대통령 선거일입니다.", ex_zh: "明天是總統選舉日。" },
            { id: 2768, word: "가루", meaning: "粉、麵粉、灰塵", ex_kr: "밀가루 반죽을 만들었어요.", ex_zh: "我揉了麵團。" },
            { id: 2769, word: "부담", meaning: "負擔", ex_kr: "비용 부담이 커서 포기했어요.", ex_zh: "我放棄了，因為成本太高了。" },
            { id: 2770, word: "음력", meaning: "農曆", ex_kr: "할머니 생신은 음력으로 쇠요.", ex_zh: "奶奶的生日是依照農曆慶祝的。" },
            { id: 2771, word: "잘나다", meaning: "優秀、聰明、傑出", ex_kr: "그는 자기가 잘난 줄 알아요.", ex_zh: "他覺得自己很了不起。" },
            { id: 2772, word: "숙녀", meaning: "女士", ex_kr: "신사 숙녀 여러분, 환영합니다.", ex_zh: "女士們、先生們，歡迎你。" },
            { id: 2773, word: "팽창", meaning: "擴張", ex_kr: "우주는 계속 팽창하고 있어요.", ex_zh: "宇宙在不斷膨脹。" },
            { id: 2774, word: "충돌", meaning: "碰撞、撞擊", ex_kr: "자동차가 가드레일과 충돌했어요.", ex_zh: "汽車撞上了護欄。" },
            { id: 2775, word: "비명", meaning: "尖叫", ex_kr: "놀라서 비명을 질렀어요.", ex_zh: "我驚叫了一聲。" },
            { id: 2776, word: "도대체", meaning: "在地球上、在全世界；總之", ex_kr: "도대체 무슨 말을 하는지 모르겠어요.", ex_zh: "我真的不明白你在說什麼。" },
            { id: 2777, word: "화재", meaning: "火災", ex_kr: "건조한 날씨 때문에 화재가 발생했어요.", ex_zh: "由於天氣乾燥，引發了火災。" },
            { id: 2778, word: "상상력", meaning: "想像力", ex_kr: "아이들의 상상력은 풍부해요.", ex_zh: "孩子的想像力非常豐富。" },
            { id: 2779, word: "유치원생", meaning: "幼兒園小朋友", ex_kr: "우리 아이는 유치원생이에요.", ex_zh: "我的孩子是幼兒園學生。" },
            { id: 2780, word: "해고하다", meaning: "解僱、解散", ex_kr: "회사는 경영 악화로 직원을 해고했어요.", ex_zh: "由於經營狀況惡化，公司裁員。" },
            { id: 2781, word: "뒷줄", meaning: "後排", ex_kr: "키가 커서 뒷줄에 섰어요.", ex_zh: "因為我個子高，所以我站在後排。" },
            { id: 2782, word: "결코", meaning: "絕不、絕無可能", ex_kr: "저는 결코 포기하지 않을 거예요.", ex_zh: "我永不放棄。" },
            { id: 2783, word: "변함없이", meaning: "一如既往", ex_kr: "그는 변함없이 성실해요.", ex_zh: "他始終真誠待人。" },
            { id: 2784, word: "매달다", meaning: "懸掛、懸吊", ex_kr: "천장에 모빌을 매달았어요.", ex_zh: "我在天花板上掛了一個移動裝飾物。" },
            { id: 2785, word: "연료", meaning: "燃料", ex_kr: "자동차 연료가 다 떨어졌어요.", ex_zh: "汽車沒油了。" },
            { id: 2786, word: "잔혹하다", meaning: "殘忍、冷酷、無情", ex_kr: "범인의 수법이 매우 잔혹했어요.", ex_zh: "作案者的手段非常殘忍。" },
            { id: 2787, word: "혹은", meaning: "或者", ex_kr: "커피 혹은 차를 드릴까요?", ex_zh: "您想喝咖啡還是茶？" },
            { id: 2788, word: "영원하다", meaning: "永恆", ex_kr: "사랑은 영원할까요?", ex_zh: "愛是永恆的嗎？" },
            { id: 2789, word: "도장", meaning: "印章；繪畫；跆拳道館", ex_kr: "계약서에 도장을 찍었어요.", ex_zh: "我蓋章了合約。" },
            { id: 2790, word: "재킷", meaning: "夾克", ex_kr: "날씨가 쌀쌀해서 재킷을 입었어요.", ex_zh: "天氣有點冷，所以我穿了外套。" },
            { id: 2791, word: "알약", meaning: "丸", ex_kr: "물과 함께 알약을 삼키세요.", ex_zh: "用水送服藥片。" },
            { id: 2792, word: "강연회", meaning: "演講", ex_kr: "유명 작가의 강연회에 참석했어요.", ex_zh: "我去聽了一位著名作家的講座。" },
            { id: 2793, word: "악명", meaning: "惡名昭彰、臭名昭著", ex_kr: "그는 잔인하기로 악명이 높아요.", ex_zh: "他以殘忍著稱。" },
            { id: 2794, word: "뻔하다", meaning: "顯而易見、清晰", ex_kr: "그 이야기는 결말이 뻔해요.", ex_zh: "故事的結局顯而易見。" },
            { id: 2795, word: "무사히", meaning: "安全", ex_kr: "여행을 무사히 마치고 돌아왔어요.", ex_zh: "我安全完成了旅程並回來了。" },
            { id: 2796, word: "수준", meaning: "水平、標準", ex_kr: "한국의 의료 수준은 세계적입니다.", ex_zh: "韓國的醫療水準達到世界一流水準。" },
            { id: 2797, word: "유지하다", meaning: "為了跟上、保持", ex_kr: "적정 체중을 유지하는 것이 중요해요.", ex_zh: "維持健康體重很重要。" },
            { id: 2798, word: "상당히", meaning: "相當、相當", ex_kr: "그 문제는 상당히 복잡해요.", ex_zh: "這個問題相當複雜。" },
            { id: 2799, word: "멋지다", meaning: "極好的、可愛的、美好的", ex_kr: "그는 정말 멋진 사람이에요.", ex_zh: "他真是個很酷的人。" },
            { id: 2800, word: "굴다", meaning: "表現、行動", ex_kr: "아이처럼 굴지 마세요.", ex_zh: "別像個孩子一樣。" },
            { id: 2801, word: "코미디", meaning: "喜劇", ex_kr: "코미디 프로그램을 보고 많이 웃었어요.", ex_zh: "我看喜劇節目時笑個不停。" },
            { id: 2802, word: "해산물", meaning: "海鮮、海鮮", ex_kr: "바닷가에서 신선한 해산물을 먹었어요.", ex_zh: "我在海邊吃了新鮮的海鮮。" },
            { id: 2803, word: "봉급", meaning: "薪資、工資", ex_kr: "월급날이라 봉급을 받았어요.", ex_zh: "那天是發薪日，所以我領到了薪水。" },
            { id: 2804, word: "일등", meaning: "第一名；第一名", ex_kr: "우리 반에서 제가 일등을 했어요.", ex_zh: "我考了班上第一名。" },
            { id: 2805, word: "권한", meaning: "權利、權力", ex_kr: "저에게는 그럴 권한이 없어요.", ex_zh: "我沒有權限這樣做。" },
            { id: 2806, word: "영광", meaning: "榮譽、榮耀", ex_kr: "이 상을 받게 되어 영광입니다.", ex_zh: "能夠獲得這個獎項，我感到非常榮幸。" },
            { id: 2807, word: "강력하다", meaning: "強大、有力", ex_kr: "태풍이 강력해서 피해가 컸어요.", ex_zh: "颱風威力巨大，因此造成的破壞也很嚴重。" },
            { id: 2808, word: "이모부", meaning: "母親的姊姊的丈夫", ex_kr: "이모부는 정말 유머러스하세요.", ex_zh: "我叔叔真的很幽默。" },
            { id: 2809, word: "무늬", meaning: "設計、圖案、圖形", ex_kr: "꽃무늬 원피스를 샀어요.", ex_zh: "我買了一條碎花連身裙。" },
            { id: 2810, word: "부츠", meaning: "靴子", ex_kr: "겨울에는 털 부츠가 따뜻해요.", ex_zh: "冬天穿毛靴很溫暖。" },
            { id: 2811, word: "저절로", meaning: "自行、自動", ex_kr: "문이 저절로 열렸어요.", ex_zh: "門自己開了。" },
            { id: 2812, word: "무술", meaning: "武術", ex_kr: "그는 태권도 같은 무술을 배웠어요.", ex_zh: "他學習了跆拳道等武術。" },
            { id: 2813, word: "손등", meaning: "手背", ex_kr: "손등에 상처가 났어요.", ex_zh: "我的手背被劃傷了。" },
            { id: 2814, word: "왕복", meaning: "往返", ex_kr: "왕복 비행기 표를 예매했어요.", ex_zh: "我訂了一張來回機票。" },
            { id: 2815, word: "굉장하다", meaning: "很棒、很偉大、很奇妙", ex_kr: "그의 실력은 정말 굉장해요.", ex_zh: "他的技術真是太棒了。" },
            { id: 2816, word: "오보", meaning: "虛假(不正確)報告", ex_kr: "그 뉴스는 오보였어요.", ex_zh: "那條新聞是假新聞。" },
            { id: 2817, word: "상점", meaning: "商店、店鋪", ex_kr: "기념품 상점에 들렀어요.", ex_zh: "我順道去了一家紀念品商店。" },
            { id: 2818, word: "두드리다", meaning: "敲擊；擊打", ex_kr: "어깨를 두드려 주었어요.", ex_zh: "我拍了拍他的肩膀。" },
            { id: 2819, word: "저렴하다", meaning: "便宜", ex_kr: "이 가게는 가격이 저렴해요.", ex_zh: "這家店價格實惠。" },
            { id: 2820, word: "괴롭히다", meaning: "騷擾、惹惱、使麻煩", ex_kr: "약한 친구를 괴롭히지 마세요.", ex_zh: "不要欺負弱小的朋友。" },
            { id: 2821, word: "갇히다", meaning: "被鎖起來、關起來、拘禁", ex_kr: "엘리베이터에 갇혔어요.", ex_zh: "我被困在電梯裡了。" },
            { id: 2822, word: "엄청나다", meaning: "巨大、龐大、驚人", ex_kr: "피해 규모가 엄청나요.", ex_zh: "損失規模龐大。" },
            { id: 2823, word: "미인", meaning: "美麗的女人", ex_kr: "그녀는 소문난 미인이에요.", ex_zh: "她是一位著名的美女。" },
            { id: 2824, word: "쏟아지다", meaning: "傾倒、灑出", ex_kr: "갑자기 비가 쏟아졌어요.", ex_zh: "突然下起了傾盆大雨。" },
            { id: 2825, word: "여관", meaning: "客棧", ex_kr: "여행지에서 낡은 여관에 묵었어요.", ex_zh: "旅行途中，我住進了一家老舊的客棧。" },
            { id: 2826, word: "참조하다", meaning: "指(某事)", ex_kr: "자세한 내용은 첨부 파일을 참조하세요.", ex_zh: "詳情請參閱附件。" },
            { id: 2827, word: "쌍", meaning: "一對", ex_kr: "양말 한 쌍을 잃어버렸어요.", ex_zh: "我丟了一雙襪子。" },
            { id: 2828, word: "회계", meaning: "會計", ex_kr: "그는 회사에서 회계 업무를 담당해요.", ex_zh: "他在公司負責會計工作。" },
            { id: 2829, word: "공유", meaning: "共享(資訊、文件)；公共所有權", ex_kr: "좋은 정보는 친구들과 공유하세요.", ex_zh: "與朋友分享有用的信息。" },
            { id: 2830, word: "소극장", meaning: "小劇場", ex_kr: "소극장에서 연극을 관람했어요.", ex_zh: "我在一家小劇場看了一場話劇。" },
            { id: 2831, word: "연보라", meaning: "淺紫色", ex_kr: "연보라색 스웨터를 입었어요.", ex_zh: "我穿了一件淺紫色毛衣。" },
            { id: 2832, word: "목사님", meaning: "牧師、傳道人", ex_kr: "일요일마다 목사님 설교를 들어요.", ex_zh: "我每個星期天都會聽牧師講道。" },
            { id: 2833, word: "화염", meaning: "火焰、烈焰", ex_kr: "건물이 화염에 휩싸였어요.", ex_zh: "整棟大樓都被火焰吞噬了。" },
            { id: 2834, word: "불규칙", meaning: "不規律的", ex_kr: "불규칙적인 식사는 건강에 좋지 않아요.", ex_zh: "飲食不規律對健康不利。" },
            { id: 2835, word: "해치다", meaning: "傷害、損害、破壞", ex_kr: "건강을 해치지 않도록 조심하세요.", ex_zh: "請注意不要損害您的健康。" },
            { id: 2836, word: "통", meaning: "完全不是、一點也不是；桶、罐、木桶", ex_kr: "요즘 그에게서 통 연락이 없어요.", ex_zh: "我最近完全沒收到他的消息。" },
            { id: 2837, word: "상대하다", meaning: "處理", ex_kr: "진상 손님을 상대하느라 피곤해요.", ex_zh: "我厭倦了應付難纏的顧客。" },
            { id: 2838, word: "껄끄럽다", meaning: "感到不舒服、不安、緊張", ex_kr: "그와 사이가 좀 껄끄러워요.", ex_zh: "我和他關係有點緊張。" },
            { id: 2839, word: "의류", meaning: "衣服、服飾", ex_kr: "백화점 의류 매장에서 쇼핑했어요.", ex_zh: "我在百貨公司的服裝區購物。" },
            { id: 2840, word: "빠져나오다", meaning: "逃脫、離開", ex_kr: "위험한 상황에서 무사히 빠져나왔어요.", ex_zh: "我安全脫離了危險情況。" },
            { id: 2841, word: "경호", meaning: "警衛", ex_kr: "대통령의 경호가 삼엄해요.", ex_zh: "總統的安保措施非常嚴密。" },
            { id: 2842, word: "유치장", meaning: "監獄、拘留所、看守所", ex_kr: "취객이 경찰서 유치장에 갇혔어요.", ex_zh: "一名醉酒者被關進了警察局的拘留室。" },
            { id: 2843, word: "노약자석", meaning: "殘障座位", ex_kr: "노약자석은 비워두는 게 좋아요.", ex_zh: "最好讓優先座位空著。" },
            { id: 2844, word: "경쟁사", meaning: "競爭對手、競爭對手公司", ex_kr: "경쟁사보다 더 좋은 제품을 만들어야 해요.", ex_zh: "我們需要生產出比競爭對手更好的產品。" },
            { id: 2845, word: "살인", meaning: "謀殺", ex_kr: "살인 사건의 범인이 잡혔어요.", ex_zh: "謀殺案的罪犯已被抓獲。" },
            { id: 2846, word: "자매", meaning: "姊妹", ex_kr: "그들은 사이좋은 자매예요.", ex_zh: "她們是關係親密的姊妹。" },
            { id: 2847, word: "볼링", meaning: "保齡球", ex_kr: "친구들과 볼링을 치러 갔어요.", ex_zh: "我和朋友們一起去打保齡球了。" },
            { id: 2848, word: "선약", meaning: "先前的訂婚", ex_kr: "선약이 있어서 못 가요.", ex_zh: "我去不了，因為我之前已經有約了。" },
            { id: 2849, word: "성별", meaning: "性別", ex_kr: "지원서에 성별을 표시하세요.", ex_zh: "請在申請表中註明您的性別。" },
            { id: 2850, word: "짬", meaning: "空閒時間", ex_kr: "짬을 내서 책을 읽어요.", ex_zh: "我會抽空讀書。" },
            { id: 2851, word: "오답", meaning: "錯誤答案、不正確的答案", ex_kr: "시험에서 오답 노트를 만들었어요.", ex_zh: "我為考試準備了一個錯題答案本。" },
            { id: 2852, word: "천재", meaning: "天才", ex_kr: "그는 수학 천재로 불려요.", ex_zh: "他被譽為數學天才。" },
            { id: 2853, word: "스치다", meaning: "輕拂、輕觸", ex_kr: "찬 바람이 얼굴을 스치고 지나갔어요.", ex_zh: "一陣寒風拂過我的臉龐。" },
            { id: 2854, word: "속초", meaning: "宗草", ex_kr: "속초 바다가 정말 예뻐요.", ex_zh: "束草的大海真美。" },
            { id: 2855, word: "진지하다", meaning: "認真、誠懇", ex_kr: "그는 매사에 진지한 사람이에요.", ex_zh: "他對待任何事都很認真。" },
            { id: 2856, word: "패스하다", meaning: "傳遞", ex_kr: "공을 나에게 패스해!", ex_zh: "把球傳給我！" },
            { id: 2857, word: "어지럽다", meaning: "感到頭暈目眩；感到混亂", ex_kr: "갑자기 일어났더니 머리가 어지러워요.", ex_zh: "我突然醒來，感覺頭暈。" },
            { id: 2858, word: "증거", meaning: "證據", ex_kr: "범행 현장에서 증거를 찾았어요.", ex_zh: "我在犯罪現場發現了證據。" },
            { id: 2859, word: "철저히", meaning: "徹底地、完全地", ex_kr: "이번 프로젝트는 철저히 준비해야 해요.", ex_zh: "我們需要為這個專案做好充分的準備。" },
            { id: 2860, word: "번지다", meaning: "傳播、奔跑", ex_kr: "잉크가 물에 번졌어요.", ex_zh: "墨水在水中擴散開來。" },
            { id: 2861, word: "주의하다", meaning: "注意、小心、謹慎", ex_kr: "길을 건널 때는 차를 주의하세요.", ex_zh: "過馬路時請注意來往車輛。" },
            { id: 2862, word: "의식", meaning: "意識；儀式、典禮", ex_kr: "환자가 의식을 되찾았어요.", ex_zh: "病人恢復了意識。" },
            { id: 2863, word: "온기", meaning: "溫暖", ex_kr: "방 안에 온기가 가득해요.", ex_zh: "房間裡充滿了溫暖。" },
            { id: 2864, word: "시스템", meaning: "系統", ex_kr: "컴퓨터 시스템에 문제가 생겼어요.", ex_zh: "電腦系統故障。" },
            { id: 2865, word: "수출", meaning: "出口", ex_kr: "한국은 자동차를 많이 수출해요.", ex_zh: "韓國出口大量汽車。" },
            { id: 2866, word: "수다", meaning: "閒聊、閒聊", ex_kr: "친구들과의 수다는 즐거워요.", ex_zh: "和朋友聊天很有趣。" },
            { id: 2867, word: "업무", meaning: "商業、職責", ex_kr: "오늘 업무가 너무 많아요.", ex_zh: "我今天工作太多了。" },
            { id: 2868, word: "청순하다", meaning: "純潔無辜", ex_kr: "그녀는 청순한 이미지를 가지고 있어요.", ex_zh: "她給人一種清純無辜的印象。" },
            { id: 2869, word: "실시하다", meaning: "實施、執行", ex_kr: "설문조사를 실시했어요.", ex_zh: "我們進行了一項調查。" },
            { id: 2870, word: "엉터리", meaning: "垃圾、胡說八道、虛假、欺騙", ex_kr: "그의 설명은 완전 엉터리였어요.", ex_zh: "他的解釋完全是胡說八道。" },
            { id: 2871, word: "파혼하다", meaning: "解除婚約", ex_kr: "그들은 결혼식을 앞두고 파혼했어요.", ex_zh: "他們在婚禮前解除了婚約。" },
            { id: 2872, word: "장례식", meaning: "葬禮", ex_kr: "친척의 장례식에 다녀왔어요.", ex_zh: "我去參加了一位親戚的葬禮。" },
            { id: 2873, word: "상투적", meaning: "傳統的、普通的", ex_kr: "그 영화는 줄거리가 너무 상투적이에요.", ex_zh: "那部電影的情節太老套了。" },
            { id: 2874, word: "승객", meaning: "乘客", ex_kr: "승객 여러분, 안전벨트를 매주세요.", ex_zh: "乘客們，請繫好安全帶。" },
            { id: 2875, word: "이어", meaning: "按順序", ex_kr: "개회식에 이어 축하 공연이 있겠습니다.", ex_zh: "開幕式結束後，將舉行慶祝演出。" },
            { id: 2876, word: "도자기", meaning: "陶瓷器皿、陶器", ex_kr: "박물관에서 고려청자 도자기를 보았어요.", ex_zh: "我在博物館看到了高麗青瓷。" },
            { id: 2877, word: "권유하다", meaning: "建議、推薦", ex_kr: "의사가 금연을 권유했어요.", ex_zh: "醫生建議我戒菸。" },
            { id: 2878, word: "꼬시다", meaning: "追逐(女)、搭訕(女孩)、勾搭", ex_kr: "그는 클럽에서 여자를 꼬시려고 했어요.", ex_zh: "他試圖在夜總會搭訕一名女子。" },
            { id: 2879, word: "극찬", meaning: "高度讚揚、恭維", ex_kr: "그 영화는 평론가들의 극찬을 받았어요.", ex_zh: "這部電影獲得了影評人的高度評價。" },
            { id: 2880, word: "동침", meaning: "同床共枕", ex_kr: "적과의 동침은 위험합니다.", ex_zh: "與敵人同眠是危險的。" },
            { id: 2881, word: "조회하다", meaning: "詢問、查找", ex_kr: "인터넷으로 계좌 잔액을 조회했어요.", ex_zh: "我在網路上查詢了我的帳戶餘額。" },
            { id: 2882, word: "달려들다", meaning: "攻擊時、跳向", ex_kr: "벌레가 불빛을 보고 달려들었어요.", ex_zh: "蟲子們看到了光，便蜂擁而至。" },
            { id: 2883, word: "일기예보", meaning: "天氣預報", ex_kr: "일기예보에서 내일 비가 온다고 했어요.", ex_zh: "天氣預報說明天會下雨。" },
            { id: 2884, word: "샘", meaning: "泉水、噴泉；嫉妒", ex_kr: "깊은 산속 옹달샘 누가 와서 먹나요.", ex_zh: "誰會到深山裡來喝泉水呢？" },
            { id: 2885, word: "넘어오다", meaning: "過來、穿過；跌倒、落下", ex_kr: "공이 우리 쪽으로 넘어왔어요.", ex_zh: "球傳到了我們這邊。" },
            { id: 2886, word: "근로자", meaning: "工人、勞動人民", ex_kr: "5월 1일은 근로자의 날입니다.", ex_zh: "5月1日是勞動節。" },
            { id: 2887, word: "온종일", meaning: "一整天、整整一天", ex_kr: "주말에 온종일 잠만 잤어요.", ex_zh: "我周末睡了一整天。" },
            { id: 2888, word: "핑계", meaning: "藉口、藉口", ex_kr: "핑계 대지 말고 사실대로 말하세요.", ex_zh: "別再找藉口了，說實話吧。" },
            { id: 2889, word: "규모", meaning: "規模、範圍", ex_kr: "축제의 규모가 점점 커지고 있어요.", ex_zh: "節日的規模越來越大。" },
            { id: 2890, word: "각오하다", meaning: "待定、做好準備", ex_kr: "어려움을 겪을 각오가 되어 있어요.", ex_zh: "我已做好面對困難的準備。" },
            { id: 2891, word: "불량하다", meaning: "貧窮、有缺陷", ex_kr: "이 제품은 상태가 불량해요.", ex_zh: "此產品狀況不佳。" },
            { id: 2892, word: "랭킹", meaning: "排行", ex_kr: "그 선수는 세계 랭킹 1위입니다.", ex_zh: "那位球員世界排名第一。" },
            { id: 2893, word: "망치", meaning: "槌", ex_kr: "망치로 못을 박았어요.", ex_zh: "我釘了一根釘子。" },
            { id: 2894, word: "미숙하다", meaning: "缺乏經驗、不熟練；未成熟、不成熟", ex_kr: "운전이 아직 미숙해요.", ex_zh: "我開車技術還是不好。" },
            { id: 2895, word: "소감", meaning: "想法、印象", ex_kr: "수상 소감을 말씀해 주세요.", ex_zh: "請分享一下你對勝利的看法。" },
            { id: 2896, word: "가위바위보", meaning: "石頭剪刀布", ex_kr: "가위바위보로 술래를 정하자.", ex_zh: "讓我們來玩石頭剪刀布來決定誰是捉人者吧。" },
            { id: 2897, word: "싱크대", meaning: "下沉", ex_kr: "싱크대에 설거지가 쌓여 있어요.", ex_zh: "水槽裡堆著一堆碗盤。" },
            { id: 2898, word: "억울하다", meaning: "遭受不公平待遇、感覺自己是受害者", ex_kr: "범인으로 몰려서 정말 억울해요.", ex_zh: "我感到非常委屈，因為我被誣陷為罪犯。" },
            { id: 2899, word: "증세", meaning: "症狀", ex_kr: "감기 증세가 심해졌어요.", ex_zh: "我的感冒症狀加重了。" },
            { id: 2900, word: "아예", meaning: "從一開始就用盡一切手段", ex_kr: "그는 술은 아예 입에도 대지 않아요.", ex_zh: "他滴酒不沾。" },
            { id: 2901, word: "동창회", meaning: "校友聚會、重聚", ex_kr: "연말에 고등학교 동창회에 갔어요.", ex_zh: "年底我去參加了高中同學會。" },
            { id: 2902, word: "연장하다", meaning: "延長、續簽", ex_kr: "비자 체류 기간을 연장했어요.", ex_zh: "我延長了簽證停留期限。" },
            { id: 2903, word: "장바구니", meaning: "購物籃", ex_kr: "마트에 갈 때 장바구니를 챙겨가세요.", ex_zh: "去超市購物時請自備購物袋。" },
            { id: 2904, word: "찌르다", meaning: "刺穿、刺入", ex_kr: "바늘로 손가락을 찔렀어요.", ex_zh: "我不小心被針刺破了手指。" },
            { id: 2905, word: "달구다", meaning: "加熱", ex_kr: "프라이팬을 뜨겁게 달구세요.", ex_zh: "將煎鍋加熱至非常熱。" },
            { id: 2906, word: "쓰다듬다", meaning: "撫摸、輕拍", ex_kr: "강아지의 머리를 쓰다듬어 주었어요.", ex_zh: "我摸了小狗的頭。" },
            { id: 2907, word: "근육", meaning: "肌肉", ex_kr: "운동을 해서 근육을 키웠어요.", ex_zh: "我透過鍛鍊鍛鍊了肌肉。" },
            { id: 2908, word: "받아들이다", meaning: "接受", ex_kr: "그는 자신의 패배를 받아들였어요.", ex_zh: "他接受了失敗。" },
            { id: 2909, word: "이성", meaning: "理性、邏輯；異性", ex_kr: "감정보다 이성에 따라 행동하세요.", ex_zh: "行事要遵循理性而非情緒。" },
            { id: 2910, word: "행운", meaning: "祝你好運、好運連連", ex_kr: "당신에게 행운이 있기를 빕니다.", ex_zh: "祝你好運。" },
            { id: 2911, word: "희생하다", meaning: "犧牲", ex_kr: "부모님은 자식을 위해 희생하셨어요.", ex_zh: "父母為子女做出了犧牲。" },
            { id: 2912, word: "품", meaning: "胸部、乳房；工作、勞動", ex_kr: "아기가 엄마 품에 안겨 있어요.", ex_zh: "嬰兒被母親抱在懷裡。" },
            { id: 2913, word: "존재하다", meaning: "存在、在場", ex_kr: "외계인이 존재한다고 믿나요?", ex_zh: "你相信外星人存在嗎？" },
            { id: 2914, word: "비추다", meaning: "照亮、發出光芒；反射、映照。", ex_kr: "거울에 얼굴을 비추어 보았어요.", ex_zh: "我看著鏡子裡的自己。" },
            { id: 2915, word: "승자", meaning: "優勝者", ex_kr: "역사는 승자의 기록입니다.", ex_zh: "歷史是由勝利者所寫的。" },
            { id: 2916, word: "혁명", meaning: "革命", ex_kr: "산업 혁명으로 세상이 바뀌었어요.", ex_zh: "工業革命改變了世界。" },
            { id: 2917, word: "현장", meaning: "實際地點、事發地點", ex_kr: "사고 현장에 경찰이 도착했어요.", ex_zh: "警方已抵達事故現場。" },
            { id: 2918, word: "상식", meaning: "常識；一般知識", ex_kr: "그것은 상식적으로 이해가 안 돼요.", ex_zh: "這在邏輯上說不通。" },
            { id: 2919, word: "갖추다", meaning: "做好準備", ex_kr: "이 호텔은 편의 시설을 잘 갖추고 있어요.", ex_zh: "這家飯店設施齊全。" },
            { id: 2920, word: "머릿속", meaning: "在頭腦裡、思想", ex_kr: "아이디어가 머릿속을 스쳐 지나갔어요.", ex_zh: "我腦中突然閃過一個念頭。" },
            { id: 2921, word: "경영", meaning: "(商業)管理、行政", ex_kr: "그는 대학에서 경영학을 전공했어요.", ex_zh: "他大學主修工商管理。" },
            { id: 2922, word: "숙어", meaning: "成語", ex_kr: "영어 단어와 숙어를 외웠어요.", ex_zh: "我背誦了英文單字和慣用語。" },
            { id: 2923, word: "하숙", meaning: "寄宿公寓", ex_kr: "대학 근처에서 하숙을 하고 있어요.", ex_zh: "我住在大學附近。" },
            { id: 2924, word: "창조하다", meaning: "創建", ex_kr: "신은 세상을 창조했습니다.", ex_zh: "上帝創造了世界。" },
            { id: 2925, word: "모친", meaning: "母親", ex_kr: "그의 모친은 선생님이셨어요.", ex_zh: "他的母親是一名教師。" },
            { id: 2926, word: "생산하다", meaning: "生產、製造", ex_kr: "이 공장에서는 자동차를 생산해요.", ex_zh: "這家工廠生產汽車。" },
            { id: 2927, word: "균형", meaning: "平衡", ex_kr: "일과 삶의 균형이 중요해요.", ex_zh: "工作與生活平衡很重要。" },
            { id: 2928, word: "연기자", meaning: "男演員、女演員", ex_kr: "그는 연기력이 뛰어난 연기자예요.", ex_zh: "他是一位演技精湛的演員。" },
            { id: 2929, word: "찾아내다", meaning: "發現、定位、提出", ex_kr: "드디어 해결책을 찾아냈어요.", ex_zh: "我終於找到解決方法了。" },
            { id: 2930, word: "기운", meaning: "精力、活力、力量", ex_kr: "밥을 먹었더니 기운이 나요.", ex_zh: "飯後覺得精力充沛。" },
            { id: 2931, word: "진정하다", meaning: "要真實、真誠、坦率；冷靜下來", ex_kr: "흥분하지 말고 진정하세요.", ex_zh: "別激動，請冷靜下來。" },
            { id: 2932, word: "자발적", meaning: "自願", ex_kr: "시민들의 자발적인 참여가 필요해요.", ex_zh: "需要公民的自願參與。" },
            { id: 2933, word: "부친", meaning: "父親", ex_kr: "부친께서 건강하시죠?", ex_zh: "你父親身體健康嗎？" },
            { id: 2934, word: "최신", meaning: "最新款", ex_kr: "최신 유행하는 노래를 들었어요.", ex_zh: "我聽了最近流行的歌曲。" },
            { id: 2935, word: "유산", meaning: "墮胎；繼承、遺產", ex_kr: "부모님께 많은 유산을 물려받았어요.", ex_zh: "我從父母那裡繼承了一大筆遺產。" },
            { id: 2936, word: "남몰래", meaning: "偷偷", ex_kr: "남몰래 선행을 베풀었어요.", ex_zh: "我暗中行善。" },
            { id: 2937, word: "딱딱하다", meaning: "堅硬、僵硬、緊實", ex_kr: "빵이 너무 딱딱해서 먹기 힘들어요.", ex_zh: "麵包太硬了，沒辦法吃。" },
            { id: 2938, word: "화제", meaning: "話題、談話內容", ex_kr: "그 뉴스는 장안의 화제가 되었어요.", ex_zh: "這則消息成了全城熱議的話題。" },
            { id: 2939, word: "대륙", meaning: "大陸", ex_kr: "아시아는 세계에서 가장 큰 대륙입니다.", ex_zh: "亞洲是世界上最大的洲。" },
            { id: 2940, word: "썰렁하다", meaning: "感到冷漠；不幽默、尷尬", ex_kr: "그의 농담에 분위기가 썰렁해졌어요.", ex_zh: "他的玩笑讓氣氛變得尷尬。" },
            { id: 2941, word: "악몽", meaning: "惡夢、惡夢", ex_kr: "어젯밤에 무서운 악몽을 꿨어요.", ex_zh: "我昨晚做了個可怕的惡夢。" },
            { id: 2942, word: "찬란하다", meaning: "容光煥發、光彩照人、美艷動人", ex_kr: "찬란한 햇살이 비치고 있어요.", ex_zh: "陽光燦爛。" },
            { id: 2943, word: "포옹하다", meaning: "擁抱、摟抱、依偎", ex_kr: "오랜만에 만난 친구와 포옹했어요.", ex_zh: "我擁抱了一位很久沒見過的朋友。" },
            { id: 2944, word: "건네다", meaning: "傳遞、交接、交付", ex_kr: "옆 사람에게 소금을 건네주세요.", ex_zh: "請把鹽遞給旁邊的人。" },
            { id: 2945, word: "폭력", meaning: "暴力、武力", ex_kr: "어떤 경우에도 폭력은 정당화될 수 없어요.", ex_zh: "在任何情況下，暴力都是絕對不能正當化的。" },
            { id: 2946, word: "코너", meaning: "角落", ex_kr: "슈퍼마켓 야채 코너에서 파를 샀어요.", ex_zh: "我在超市蔬菜區買了蔥。" },
            { id: 2947, word: "건설하다", meaning: "建造、構築", ex_kr: "도시에 새로운 다리를 건설했어요.", ex_zh: "我在城裡建了一座新橋。" },
            { id: 2948, word: "분야", meaning: "領域、區域", ex_kr: "그는 자신의 분야에서 최고 전문가예요.", ex_zh: "他是該領域的頂尖專家。" },
            { id: 2949, word: "애교", meaning: "魅力、禮貌", ex_kr: "그녀는 애교가 많아서 귀여워요.", ex_zh: "她很可愛，因為她非常熱情。" },
            { id: 2950, word: "활짝", meaning: "廣泛地、全面地、完全地", ex_kr: "꽃이 활짝 피었어요.", ex_zh: "花兒正盛開。" },
            { id: 2951, word: "배려", meaning: "考慮、尊重", ex_kr: "남을 배려하는 마음을 가집시다.", ex_zh: "讓我們為他人著想。" },
            { id: 2952, word: "두렵다", meaning: "感到害怕、恐懼、驚慌", ex_kr: "실패하는 것이 두려워요.", ex_zh: "我害怕失敗。" },
            { id: 2953, word: "떠맡다", meaning: "承擔、承擔、進行", ex_kr: "제가 그 일을 떠맡게 되었어요.", ex_zh: "我最終還是接受了那份工作。" },
            { id: 2954, word: "환하다", meaning: "聰明；熟悉", ex_kr: "방 안이 불을 켠 듯 환해요.", ex_zh: "房間很亮，就像燈都開著一樣。" },
            { id: 2955, word: "중식", meaning: "中餐；午餐", ex_kr: "오늘 점심은 중식을 먹었어요.", ex_zh: "我今天午餐吃了中餐。" },
            { id: 2956, word: "찜질방", meaning: "韓式乾蒸三溫暖、水療", ex_kr: "추운 날에는 찜질방이 최고예요.", ex_zh: "在寒冷的日子裡，蒸桑拿是最好的選擇。" },
            { id: 2957, word: "홀로", meaning: "獨自一人", ex_kr: "그는 홀로 여행을 떠났어요.", ex_zh: "他獨自一人去旅行了。" },
            { id: 2958, word: "은근히", meaning: "禮貌地、客氣地；悄悄地、內心地", ex_kr: "그는 은근히 고집이 세요.", ex_zh: "他其實內心很固執。" },
            { id: 2959, word: "말투", meaning: "說話方式、說話風格", ex_kr: "그는 말투가 좀 거칠어요.", ex_zh: "他說話方式粗魯。" },
            { id: 2960, word: "가정부", meaning: "管家", ex_kr: "가정부가 집안일을 도와줍니다.", ex_zh: "管家幫忙做家事。" },
            { id: 2961, word: "복권", meaning: "彩券；恢復資格", ex_kr: "복권에 당첨되면 좋겠어요.", ex_zh: "我希望我能中樂透。" },
            { id: 2962, word: "자", meaning: "尺子；信件；好的、來吧", ex_kr: "자로 길이를 쟀어요.", ex_zh: "我用尺量了長度。" },
            { id: 2963, word: "피해", meaning: "損害、傷害", ex_kr: "이번 태풍으로 큰 피해를 입었어요.", ex_zh: "我們因這場颱風遭受了重大損失。" },
            { id: 2964, word: "직관", meaning: "直覺", ex_kr: "때로는 직관을 따르는 게 좋아요.", ex_zh: "有時候，聽從直覺是明智之舉。" },
            { id: 2965, word: "공주", meaning: "公主；貢菊", ex_kr: "동화 속 공주님처럼 예쁘네요.", ex_zh: "你看起來就像童話故事裡的公主一樣漂亮。" },
            { id: 2966, word: "승인", meaning: "贊同", ex_kr: "상사의 승인을 받아야 해요.", ex_zh: "我需要得到老闆的批准。" },
            { id: 2967, word: "봉사", meaning: "服務；盲人", ex_kr: "주말마다 양로원에서 봉사 활동을 해요.", ex_zh: "我每個週末都去養老院做義工。" },
            { id: 2968, word: "혼내다", meaning: "訓斥、教訓；嚇唬", ex_kr: "거짓말한 아이를 혼냈어요.", ex_zh: "我斥責了說謊的孩子。" },
            { id: 2969, word: "굶다", meaning: "挨餓、不吃一頓飯", ex_kr: "다이어트 때문에 저녁을 굶었어요.", ex_zh: "我因為節食而沒吃晚餐。" },
            { id: 2970, word: "실업", meaning: "失業；工業、商業", ex_kr: "경제 위기로 실업률이 높아졌어요.", ex_zh: "由於經濟危機，失業率上升。" },
            { id: 2971, word: "피하다", meaning: "為了避免", ex_kr: "소나기를 피해서 처마 밑에 섰어요.", ex_zh: "我站在屋簷下躲避突如其來的陣雨。" },
            { id: 2972, word: "장면", meaning: "場景(電影等)", ex_kr: "영화의 마지막 장면이 기억에 남아요.", ex_zh: "電影的最後一幕令人難忘。" },
            { id: 2973, word: "긁다", meaning: "抓撓、刮擦", ex_kr: "모기 물린 곳을 긁지 마세요.", ex_zh: "不要抓撓蚊子叮咬的部位。" },
            { id: 2974, word: "서명하다", meaning: "簽名", ex_kr: "계약서 하단에 서명해 주세요.", ex_zh: "請在合約底部簽名。" },
            { id: 2975, word: "당황하다", meaning: "感到尷尬、慌亂、困惑", ex_kr: "갑작스러운 질문에 당황했어요.", ex_zh: "這突如其來的問題讓我有些慌張。" },
            { id: 2976, word: "기호", meaning: "品味、偏好；符號、象徵", ex_kr: "개인의 기호에 따라 선택하세요.", ex_zh: "請依個人喜好選擇。" },
            { id: 2977, word: "한마디", meaning: "一個字", ex_kr: "저도 한마디 거들게요.", ex_zh: "我也想補充一點。" },
            { id: 2978, word: "한심하다", meaning: "可悲的、可憐的", ex_kr: "매일 놀기만 하는 제 자신이 한심해요.", ex_zh: "我每天除了玩耍什麼都不做，我覺得自己很可悲。" },
            { id: 2979, word: "안심하다", meaning: "鬆一口氣、安心休息吧", ex_kr: "이제 안심하고 주무세요.", ex_zh: "安心睡覺吧。" },
            { id: 2980, word: "곤란하다", meaning: "難相處、棘手；尷尬、難堪", ex_kr: "부탁을 거절하기가 곤란해요.", ex_zh: "很難拒絕別人的要求。" },
            { id: 2981, word: "뇌물", meaning: "賄賂", ex_kr: "뇌물을 받는 것은 범죄입니다.", ex_zh: "收受賄賂是犯罪行為。" },
            { id: 2982, word: "곱다", meaning: "漂亮、可愛", ex_kr: "한복 색깔이 참 곱네요.", ex_zh: "韓服的顏色真美。" },
            { id: 2983, word: "비난하다", meaning: "批評、攻擊、指責", ex_kr: "다른 사람을 함부로 비난하지 마세요.", ex_zh: "不要隨意批評他人。" },
            { id: 2984, word: "용법", meaning: "用法、使用", ex_kr: "이 약의 용법을 잘 지키세요.", ex_zh: "請仔細按照說明書使用此藥。" },
            { id: 2985, word: "호흡", meaning: "呼吸", ex_kr: "호흡을 가다듬고 다시 시작해 보세요.", ex_zh: "深呼吸，重新開始。" },
            { id: 2986, word: "물결", meaning: "海浪", ex_kr: "잔잔한 호수에 물결이 일었어요.", ex_zh: "平靜的湖面上泛起了波浪。" },
            { id: 2987, word: "첫인상", meaning: "第一印象", ex_kr: "그 사람의 첫인상은 매우 좋았어요.", ex_zh: "我對那個人的第一印象非常好。" },
            { id: 2988, word: "빌다", meaning: "請求、懇求；許願、祈禱；道歉", ex_kr: "소원을 빌었어요.", ex_zh: "我許了個願。" },
            { id: 2989, word: "합치다", meaning: "合併、聯合、結合在一起", ex_kr: "힘을 합쳐서 문제를 해결합시다.", ex_zh: "讓我們攜手解決這個問題。" },
            { id: 2990, word: "댓글", meaning: "評論", ex_kr: "게시물에 댓글을 달았어요.", ex_zh: "我在貼文下留了言。" },
            { id: 2991, word: "이목", meaning: "注意力", ex_kr: "그 사건은 사람들의 이목을 집중시켰어요.", ex_zh: "那件事引起了人們的注意。" },
            { id: 2992, word: "추천하다", meaning: "推薦", ex_kr: "좋은 영화를 추천해 주세요.", ex_zh: "請推薦一部好電影。" },
            { id: 2993, word: "따스하다", meaning: "溫暖", ex_kr: "봄 햇살이 따스해요.", ex_zh: "春日的陽光溫暖宜人。" },
            { id: 2994, word: "동갑", meaning: "同年齡", ex_kr: "우리는 나이가 같은 동갑 친구예요.", ex_zh: "我們是同年紀的朋友。" },
            { id: 2995, word: "예고", meaning: "提前通知、警告", ex_kr: "예고 없이 방문해서 죄송합니다.", ex_zh: "很抱歉不事先通知就來訪。" },
            { id: 2996, word: "일거리", meaning: "工作、待辦事項、任務", ex_kr: "요즘 일거리가 없어서 걱정이에요.", ex_zh: "我很擔心，因為最近沒有工作。" },
            { id: 2997, word: "의외", meaning: "驚喜、意想不到的事", ex_kr: "결과가 의외로 좋았어요.", ex_zh: "結果出乎意料的好。" },
