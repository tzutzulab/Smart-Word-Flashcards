            { id: 3399, word: "지겹다", meaning: "乏味、無聊、枯燥", ex_kr: "똑같은 밥을 먹으려니 지겨워요.", ex_zh: "我吃膩了同樣的食物。" },
            { id: 3400, word: "줄거리", meaning: "大綱、概要、情節；莖、梗", ex_kr: "영화의 줄거리가 흥미로워요.", ex_zh: "這部電影的情節很有趣。" },
            { id: 3401, word: "치사하다", meaning: "小氣、斤斤計較、卑鄙；感謝某人、表達感激之情", ex_kr: "치사하게 그러지 마.", ex_zh: "別這麼斤斤計較。" },
            { id: 3402, word: "군중", meaning: "人群", ex_kr: "광장에 수많은 군중이 모였어요.", ex_zh: "廣場上聚集了大批人群。" },
            { id: 3403, word: "들려오다", meaning: "到達耳朵", ex_kr: "어디선가 음악 소리가 들려와요.", ex_zh: "我好像聽到某個地方傳來音樂聲。" },
            { id: 3404, word: "연구실", meaning: "辦公室；實驗室", ex_kr: "교수님은 연구실에 계십니다.", ex_zh: "教授在實驗室裡。" },
            { id: 3405, word: "직후", meaning: "緊接著", ex_kr: "사고 직후 경찰이 도착했어요.", ex_zh: "事故發生後，警察立即趕到現場。" },
            { id: 3406, word: "갈다", meaning: "更換、替換；磨利、研磨、拋光", ex_kr: "건전지를 새것으로 갈았어요.", ex_zh: "我更換了新電池。" },
            { id: 3407, word: "늑대", meaning: "狼", ex_kr: "늑대가 나타났어요.", ex_zh: "一隻狼出現了。" },
            { id: 3408, word: "야경", meaning: "夜景", ex_kr: "서울의 야경은 아름다워요.", ex_zh: "首爾的夜景很美。" },
            { id: 3409, word: "부하", meaning: "下屬", ex_kr: "부하 직원을 잘 챙겨주세요.", ex_zh: "請善待你的下屬。" },
            { id: 3410, word: "레몬", meaning: "檸檬", ex_kr: "레몬은 맛이 시어요.", ex_zh: "檸檬嘗起來是酸的。" },
            { id: 3411, word: "정열", meaning: "熱情、激情", ex_kr: "젊음의 정열을 불태우세요.", ex_zh: "燃盡青春的激情。" },
            { id: 3412, word: "기세", meaning: "精神、力量", ex_kr: "적의 기세가 무서워요.", ex_zh: "敵人的攻勢令人擔憂。" },
            { id: 3413, word: "엿듣다", meaning: "偷聽、無意中聽到", ex_kr: "문 뒤에서 이야기를 엿들었어요.", ex_zh: "我躲在門後聽到了他們的對話。" },
            { id: 3414, word: "차이점", meaning: "差異、區別點", ex_kr: "두 제품의 차이점이 무엇인가요?", ex_zh: "這兩種產品有什麼差別？" },
            { id: 3415, word: "목숨", meaning: "生活", ex_kr: "목숨을 걸고 싸웠어요.", ex_zh: "我曾拼死戰鬥。" },
            { id: 3416, word: "대개", meaning: "大多數情況下、一般", ex_kr: "저는 대개 7시에 일어납니다.", ex_zh: "我通常早上7點起床。" },
            { id: 3417, word: "연주하다", meaning: "演奏樂器、表演", ex_kr: "피아노를 연주할 수 있어요.", ex_zh: "我會彈鋼琴。" },
            { id: 3418, word: "위기", meaning: "危機", ex_kr: "위기를 기회로 바꾸세요.", ex_zh: "化危機為機會。" },
            { id: 3419, word: "국제적", meaning: "國際的", ex_kr: "그는 국제적인 스타가 되었어요.", ex_zh: "他成為了國際巨星。" },
            { id: 3420, word: "오직", meaning: "僅、僅", ex_kr: "오직 너만을 사랑해.", ex_zh: "我只愛你。" },
            { id: 3421, word: "박히다", meaning: "陷入、嵌入", ex_kr: "손가락에 가시가 박혔어요.", ex_zh: "我手指上紮了根刺。" },
            { id: 3422, word: "부침개", meaning: "蔬菜煎餅", ex_kr: "비 오는 날에는 부침개를 부쳐 먹어요.", ex_zh: "下雨天，我會做韓式煎餅吃。" },
            { id: 3423, word: "자살", meaning: "自殺", ex_kr: "자살은 예방할 수 있습니다.", ex_zh: "自殺是可以預防的。" },
            { id: 3424, word: "소독하다", meaning: "消毒、滅菌", ex_kr: "상처 부위를 소독했어요.", ex_zh: "我幫傷口消毒了。" },
            { id: 3425, word: "학비", meaning: "學校開支、學費", ex_kr: "학비 마련을 위해 아르바이트를 해요.", ex_zh: "我做兼職來支付學費。" },
            { id: 3426, word: "수갑", meaning: "手銬", ex_kr: "범인에게 수갑을 채웠어요.", ex_zh: "我給罪犯戴上了手銬。" },
            { id: 3427, word: "부채", meaning: "扇子、折扇；債務、負債", ex_kr: "부채질을 해서 더위를 식혔어요.", ex_zh: "我扇扇子讓自己涼快下來。" },
            { id: 3428, word: "겁쟁이", meaning: "懦夫", ex_kr: "그는 겁쟁이라서 못 할 거예요.", ex_zh: "他做不到，因為他是個懦夫。" },
            { id: 3429, word: "반사하다", meaning: "反映", ex_kr: "거울이 빛을 반사해요.", ex_zh: "鏡子會反射光線。" },
            { id: 3430, word: "까다롭다", meaning: "特別講究、挑剔、困難", ex_kr: "그는 식성이 까다로워요.", ex_zh: "他很挑食。" },
            { id: 3431, word: "적립하다", meaning: "儲蓄、積累", ex_kr: "포인트를 적립했어요.", ex_zh: "我獲得了積分。" },
            { id: 3432, word: "노름하다", meaning: "賭博", ex_kr: "노름으로 전 재산을 잃었어요.", ex_zh: "我賭博輸光了所有的錢。" },
            { id: 3433, word: "불리하다", meaning: "不利的、不合宜的", ex_kr: "상황이 우리에게 불리해요.", ex_zh: "形勢對我們不利。" },
            { id: 3434, word: "터널", meaning: "隧道", ex_kr: "긴 터널을 빠져나왔어요.", ex_zh: "我走出了長長的隧道。" },
            { id: 3435, word: "외치다", meaning: "大聲喊叫、吶喊、呼喊", ex_kr: "큰 소리로 이름을 외쳤어요.", ex_zh: "我大聲喊出了他的名字。" },
            { id: 3436, word: "헤어스타일", meaning: "髮型", ex_kr: "헤어스타일을 바꿨어요.", ex_zh: "我換了髮型。" },
            { id: 3437, word: "흉기", meaning: "致命武器", ex_kr: "범인은 흉기를 들고 있었어요.", ex_zh: "罪犯當時持有武器。" },
            { id: 3438, word: "꼬마", meaning: "孩子", ex_kr: "귀여운 꼬마가 인사해요.", ex_zh: "一個可愛的小孩跟你打招呼。" },
            { id: 3439, word: "대기실", meaning: "候診室", ex_kr: "대기실에서 기다려 주세요.", ex_zh: "請在候診室等候。" },
            { id: 3440, word: "찌푸리다", meaning: "皺眉、怒目而視；陰雲密布", ex_kr: "인상을 찌푸리지 마세요.", ex_zh: "請不要皺眉。" },
            { id: 3441, word: "불평", meaning: "抱怨", ex_kr: "불평만 하지 말고 행동하세요.", ex_zh: "不要光抱怨，要採取行動。" },
            { id: 3442, word: "기내식", meaning: "機上餐食", ex_kr: "기내식이 맛있었어요.", ex_zh: "機上餐點很美味。" },
            { id: 3443, word: "쓸데없다", meaning: "無用", ex_kr: "쓸데없는 걱정 하지 마세요.", ex_zh: "別杞人憂天。" },
            { id: 3444, word: "억지로", meaning: "違背意願、強行", ex_kr: "억지로 웃지 마세요.", ex_zh: "不要強顏歡笑。" },
            { id: 3445, word: "사다리", meaning: "梯子", ex_kr: "사다리를 타고 올라갔어요.", ex_zh: "我爬上了梯子。" },
            { id: 3446, word: "유언", meaning: "遺囑、遺願、臨終遺願", ex_kr: "아버지의 유언을 따르기로 했어요.", ex_zh: "我決定遵從父親的遺囑。" },
            { id: 3447, word: "확보하다", meaning: "確保、保證、擔保", ex_kr: "증거를 확보했어요.", ex_zh: "我已掌握證據。" },
            { id: 3448, word: "증명하다", meaning: "證明、示範、確認", ex_kr: "자신의 결백을 증명했어요.", ex_zh: "他證明了自己的清白。" },
            { id: 3449, word: "느닷없이", meaning: "突然地、急促地", ex_kr: "느닷없이 비가 쏟아졌어요.", ex_zh: "突然下起了傾盆大雨。" },
            { id: 3450, word: "가해자", meaning: "攻擊者、犯案者", ex_kr: "가해자는 처벌을 받아야 해요.", ex_zh: "肇事者必須受到懲罰。" },
            { id: 3451, word: "빚", meaning: "債務、貸款", ex_kr: "빚을 모두 갚았어요.", ex_zh: "我已經還清了所有債務。" },
            { id: 3452, word: "자정", meaning: "午夜", ex_kr: "자정이 넘어서 집에 들어왔어요.", ex_zh: "我午夜過後才到家。" },
            { id: 3453, word: "충고", meaning: "建議", ex_kr: "친구의 충고를 들었어요.", ex_zh: "我聽從了朋友的建議。" },
            { id: 3454, word: "워낙", meaning: "非常、天生", ex_kr: "그는 워낙 바쁜 사람이에요.", ex_zh: "他真是個大忙人。" },
            { id: 3455, word: "예방하다", meaning: "為了防止", ex_kr: "감기를 예방하기 위해 손을 씻어요.", ex_zh: "勤洗手可以預防感冒。" },
            { id: 3456, word: "어찌하다", meaning: "為了說明原因、做些什麼", ex_kr: "어찌할 바를 모르겠어요.", ex_zh: "我不知道該怎麼辦。" },
            { id: 3457, word: "회견", meaning: "面試", ex_kr: "대통령의 기자 회견이 있었어요.", ex_zh: "總統召開了記者會。" },
            { id: 3458, word: "눌리다", meaning: "被擠壓、被壓迫；被壓制", ex_kr: "무거운 짐에 눌려 있었어요.", ex_zh: "我當時肩負重擔。" },
            { id: 3459, word: "기대다", meaning: "倚靠、靠著", ex_kr: "벽에 기대지 마세요.", ex_zh: "不要靠牆。" },
            { id: 3460, word: "특이하다", meaning: "不尋常的、獨特的", ex_kr: "디자인이 아주 특이해요.", ex_zh: "這個設計非常獨特。" },
            { id: 3461, word: "상담하다", meaning: "諮詢；進行商務洽談", ex_kr: "전문가와 상담해 보세요.", ex_zh: "請諮詢專家。" },
            { id: 3462, word: "비타민", meaning: "維他命", ex_kr: "매일 비타민을 챙겨 먹어요.", ex_zh: "我每天都堅持服用維生素。" },
            { id: 3463, word: "데우다", meaning: "加熱、變暖", ex_kr: "우유를 따뜻하게 데웠어요.", ex_zh: "我把牛奶加熱了。" },
            { id: 3464, word: "진가", meaning: "真實價值、實際價值", ex_kr: "이제야 그의 진가를 알게 되었어요.", ex_zh: "我終於認清他的真正價值。" },
            { id: 3465, word: "미장원", meaning: "美容院、美髮店", ex_kr: "미장원에서 머리를 잘랐어요.", ex_zh: "我在理髮店剪了頭髮。" },
            { id: 3466, word: "처리하다", meaning: "處理、解決、照顧", ex_kr: "쓰레기를 잘 처리해야 해요.", ex_zh: "你需要妥善處理垃圾。" },
            { id: 3467, word: "제비", meaning: "玩家；很多；燕子", ex_kr: "제비가 집을 짓고 있어요.", ex_zh: "燕子正在築巢。" },
            { id: 3468, word: "북한", meaning: "北韓", ex_kr: "북한에 대해 공부하고 있어요.", ex_zh: "我正在研究朝鮮問題。" },
            { id: 3469, word: "소스", meaning: "醬", ex_kr: "샐러드에 소스를 뿌렸어요.", ex_zh: "我把醬汁淋在沙拉上。" },
            { id: 3470, word: "투자하다", meaning: "投資", ex_kr: "부동산에 투자했어요.", ex_zh: "我投資了房地產。" },
            { id: 3471, word: "눈싸움", meaning: "打雪仗；瞪眼比賽", ex_kr: "친구들과 눈싸움을 했어요.", ex_zh: "我和朋友們打雪仗。" },
            { id: 3472, word: "수수께끼", meaning: "謎題、謎語", ex_kr: "수수께끼를 풀어보세요.", ex_zh: "試著解開這個謎語。" },
            { id: 3473, word: "귀하", meaning: "先生、女士", ex_kr: "귀하의 무궁한 발전을 기원합니다.", ex_zh: "祝您繼續取得成功。" },
            { id: 3474, word: "영구히", meaning: "永遠地、永久地", ex_kr: "이 평화가 영구히 지속되기를 바랍니다.", ex_zh: "我希望這份和平能夠永遠持續下去。" },
            { id: 3475, word: "꼬다", meaning: "扭曲、交叉、纏繞", ex_kr: "다리를 꼬고 앉지 마세요.", ex_zh: "不要蹺二郎腿。" },
            { id: 3476, word: "제출하다", meaning: "提交、遞交、呈遞", ex_kr: "과제를 내일까지 제출하세요.", ex_zh: "請明天之前提交作業。" },
            { id: 3477, word: "최악", meaning: "最糟糕的", ex_kr: "최악의 상황은 피했어요.", ex_zh: "我避免了最糟糕的情況發生。" },
            { id: 3478, word: "미처", meaning: "就此而言", ex_kr: "거기까지는 미처 생각하지 못했어요.", ex_zh: "我沒想過那麼遠。" },
            { id: 3479, word: "대만", meaning: "台灣", ex_kr: "대만으로 여행을 갔어요.", ex_zh: "我去台灣旅行了。" },
            { id: 3480, word: "효자", meaning: "孝順的兒子", ex_kr: "그는 동네에서 소문난 효자예요.", ex_zh: "他是鄰裡間出了名的孝順兒子。" },
            { id: 3481, word: "무리", meaning: "不合理、過分；群體、人群", ex_kr: "무리한 부탁을 해서 미안해요.", ex_zh: "很抱歉提出了不合理的要求。" },
            { id: 3482, word: "반납하다", meaning: "歸還、歸還、交還", ex_kr: "도서관에 책을 반납했어요.", ex_zh: "我把書還給了圖書館。" },
            { id: 3483, word: "반도", meaning: "半島", ex_kr: "한반도는 아시아 대륙의 동쪽에 있어요.", ex_zh: "朝鮮半島位於亞洲大陸的東側。" },
            { id: 3484, word: "내복", meaning: "保暖內衣", ex_kr: "겨울에는 내복을 입으세요.", ex_zh: "冬天要穿保暖內衣。" },
            { id: 3485, word: "목적지", meaning: "目的地", ex_kr: "목적지에 거의 다 왔어요.", ex_zh: "我們快到目的地了。" },
            { id: 3486, word: "태연하다", meaning: "保持冷靜、沉著、淡定", ex_kr: "그는 거짓말을 하고도 태연했어요.", ex_zh: "即使說謊後，他依然保持鎮定。" },
            { id: 3487, word: "단층집", meaning: "單層住宅", ex_kr: "우리는 단층집에 살아요.", ex_zh: "我們住在一棟平房裡。" },
            { id: 3488, word: "구조", meaning: "結構、組織；救援", ex_kr: "건물의 구조가 복잡해요.", ex_zh: "建築結構複雜。" },
            { id: 3489, word: "거꾸로", meaning: "顛倒、裡外翻轉、向後", ex_kr: "옷을 거꾸로 입었어요.", ex_zh: "我把衣服穿反了。" },
            { id: 3490, word: "가구점", meaning: "家具店", ex_kr: "가구점에서 침대를 샀어요.", ex_zh: "我在家具店買了一張床。" },
            { id: 3491, word: "복용하다", meaning: "服用(一劑)藥物", ex_kr: "약을 하루에 세 번 복용하세요.", ex_zh: "一天服用三次。" },
            { id: 3492, word: "수익", meaning: "利潤、收益、收入", ex_kr: "큰 수익을 올렸어요.", ex_zh: "我賺了一大筆錢。" },
            { id: 3493, word: "보트", meaning: "船", ex_kr: "강에서 보트를 탔어요.", ex_zh: "我乘船遊覽了河。" },
            { id: 3494, word: "암기하다", meaning: "記住", ex_kr: "영어 단어를 암기했어요.", ex_zh: "我背誦了一些英文單字。" },
            { id: 3495, word: "진열하다", meaning: "展示、展覽", ex_kr: "상품을 진열장에 진열했어요.", ex_zh: "我把產品擺放在展示櫃裡。" },
            { id: 3496, word: "총장", meaning: "總理、秘書長", ex_kr: "대학 총장님이 연설을 하셨어요.", ex_zh: "大學校長發表了演說。" },
            { id: 3497, word: "새하얗다", meaning: "純白、雪白", ex_kr: "눈이 와서 세상이 새하얘요.", ex_zh: "下雪了，所以世界一片雪白。" },
            { id: 3498, word: "사표", meaning: "辭呈", ex_kr: "회사에 사표를 냈어요.", ex_zh: "我已向公司遞交辭呈。" },
            { id: 3499, word: "대사", meaning: "台詞、對話；大使", ex_kr: "대사를 다 외웠어요.", ex_zh: "我把所有台詞都背下來了。" },
            { id: 3500, word: "관계자", meaning: "相關各方、受影響人員", ex_kr: "관계자 외 출입 금지입니다.", ex_zh: "未經授權人員禁止入內。" },
            { id: 3501, word: "지극히", meaning: "非常、極度、完美", ex_kr: "그것은 지극히 개인적인 일입니다.", ex_zh: "這是極其私人的事情。" },
            { id: 3502, word: "마주치다", meaning: "會見、偶遇", ex_kr: "길에서 우연히 그와 마주쳤어요.", ex_zh: "我在街上偶然遇到了他。" },
            { id: 3503, word: "예감", meaning: "預感、不祥的預兆、直覺", ex_kr: "불길한 예감이 들어요.", ex_zh: "我感覺不太妙。" },
            { id: 3504, word: "무선", meaning: "無線、無線電", ex_kr: "무선 인터넷을 연결했어요.", ex_zh: "我已連接到無線網路。" },
            { id: 3505, word: "기본적", meaning: "基本的", ex_kr: "기본적인 규칙을 지킵시다.", ex_zh: "讓我們遵守基本規則。" },
            { id: 3506, word: "하이힐", meaning: "高跟禮服鞋", ex_kr: "하이힐을 신고 뛰기 힘들어요.", ex_zh: "穿著高跟鞋跑步很困難。" },
            { id: 3507, word: "첫눈", meaning: "初雪", ex_kr: "오늘 첫눈이 내렸어요.", ex_zh: "今天下了第一場雪。" },
            { id: 3508, word: "여배우", meaning: "演員", ex_kr: "그녀는 유명한 여배우입니다.", ex_zh: "她是一位著名女演員。" },
            { id: 3509, word: "차고", meaning: "車庫", ex_kr: "차고에 차를 주차했어요.", ex_zh: "我把車停進車庫了。" },
            { id: 3510, word: "교외", meaning: "郊區", ex_kr: "주말에 교외로 드라이브를 갔어요.", ex_zh: "週末我開車去了郊區。" },
            { id: 3511, word: "포근하다", meaning: "溫暖、溫和；柔軟、舒適", ex_kr: "이불이 정말 포근해요.", ex_zh: "這條毯子真舒服。" },
            { id: 3512, word: "약점", meaning: "弱點、薄弱點", ex_kr: "남의 약점을 잡지 마세요.", ex_zh: "不要利用他人的弱點。" },
            { id: 3513, word: "끌어내다", meaning: "取出、拿出、拖出來", ex_kr: "밖으로 끌어냈어요.", ex_zh: "我把它拖到了外面。" },
            { id: 3514, word: "소매", meaning: "袖套；零售", ex_kr: "소매를 걷어올렸어요.", ex_zh: "我捲起了袖子。" },
            { id: 3515, word: "이발소", meaning: "理髮店", ex_kr: "아버지는 이발소에 가셨어요.", ex_zh: "父親去了理髮店。" },
            { id: 3516, word: "횡설수설하다", meaning: "胡言亂語、胡言亂語、語無倫次", ex_kr: "술에 취해 횡설수설했어요.", ex_zh: "我當時喝醉了，說話語無倫次。" },
            { id: 3517, word: "들려주다", meaning: "讓聽(告訴、讀給…聽)", ex_kr: "재미있는 이야기를 들려주세요.", ex_zh: "請給我講個有趣的故事。" },
            { id: 3518, word: "흥분하다", meaning: "感到興奮、受到刺激", ex_kr: "너무 흥분하지 말고 진정하세요.", ex_zh: "別太激動，請冷靜下來。" },
            { id: 3519, word: "안과", meaning: "眼科醫院", ex_kr: "눈이 아파서 안과에 갔어요.", ex_zh: "我眼睛疼，所以去看眼科。" },
            { id: 3520, word: "창밖", meaning: "窗外", ex_kr: "창밖 풍경이 아름다워요.", ex_zh: "窗外的景色真美。" },
            { id: 3521, word: "모범", meaning: "模範", ex_kr: "그는 타의 모범이 되는 학생입니다.", ex_zh: "他是一名模範學生。" },
            { id: 3522, word: "간첩", meaning: "間諜、秘密特工", ex_kr: "간첩 혐의로 체포되었어요.", ex_zh: "我因間諜罪被捕。" },
            { id: 3523, word: "바래다", meaning: "褪色、失去顏色", ex_kr: "옷 색깔이 바랬어요.", ex_zh: "衣服的顏色褪色了。" },
            { id: 3524, word: "권총", meaning: "手槍、槍", ex_kr: "경찰이 권총을 겨누었어요.", ex_zh: "警察舉起了手槍。" },
            { id: 3525, word: "전차", meaning: "電車；坦克", ex_kr: "전차가 진격하고 있어요.", ex_zh: "坦克正在前進。" },
            { id: 3526, word: "멜론", meaning: "瓜", ex_kr: "멜론은 달고 시원해요.", ex_zh: "甜瓜香甜爽口。" },
            { id: 3527, word: "작곡", meaning: "音樂創作", ex_kr: "그는 노래를 작곡해요.", ex_zh: "他創作歌曲。" },
            { id: 3528, word: "팩스", meaning: "傳真", ex_kr: "팩스로 문서를 보냈어요.", ex_zh: "我透過傳真發送了文件。" },
            { id: 3529, word: "뚜렷하다", meaning: "獨特、清晰", ex_kr: "목표가 뚜렷해요.", ex_zh: "我的目標很明確。" },
            { id: 3530, word: "제작", meaning: "生產、製造", ex_kr: "영화 제작에 참여했어요.", ex_zh: "我參與了一部電影的製作。" },
            { id: 3531, word: "횟수", meaning: "次數", ex_kr: "운동 횟수를 늘리세요.", ex_zh: "增加重複次數。" },
            { id: 3532, word: "꼼꼼하다", meaning: "小心謹慎、一絲不苟", ex_kr: "그는 성격이 꼼꼼해요.", ex_zh: "他性格細緻嚴謹。" },
            { id: 3533, word: "죄책감", meaning: "內疚感、愧疚的良心", ex_kr: "죄책감을 느끼지 마세요.", ex_zh: "不要感到內疚。" },
            { id: 3534, word: "성향", meaning: "傾向、愛好", ex_kr: "정치적 성향이 달라요.", ex_zh: "他們的政治傾向不同。" },
            { id: 3535, word: "강의", meaning: "演講", ex_kr: "오늘 강의가 휴강되었어요.", ex_zh: "今天的課取消了。" },
            { id: 3536, word: "기술자", meaning: "技術員、工程師", ex_kr: "기술자를 불러서 수리했어요.", ex_zh: "我叫了技術人員來修理。" },
            { id: 3537, word: "결백하다", meaning: "保持無辜", ex_kr: "나는 결백합니다.", ex_zh: "我是無辜的。" },
            { id: 3538, word: "성당", meaning: "天主教", ex_kr: "일요일마다 성당에 가요.", ex_zh: "我每個星期天都會去教會。" },
            { id: 3539, word: "가만두다", meaning: "容忍、維持現狀", ex_kr: "너를 가만두지 않겠어.", ex_zh: "我不會讓你得逞的。" },
            { id: 3540, word: "공해", meaning: "污染", ex_kr: "자동차 매연은 공해의 주범입니다.", ex_zh: "汽車廢氣是造成污染的主要原因。" },
            { id: 3541, word: "재촉하다", meaning: "匆忙、趕路、推", ex_kr: "빨리 가자고 재촉했어요.", ex_zh: "我催促他們快點。" },
            { id: 3542, word: "맴돌다", meaning: "要畫圈、請懸停", ex_kr: "머릿속에서 노래가 맴돌아요.", ex_zh: "一首歌一直在我的腦子裡循環播放。" },
            { id: 3543, word: "유효하다", meaning: "有效", ex_kr: "이 티켓은 오늘만 유효합니다.", ex_zh: "此票僅限今日有效。" },
            { id: 3544, word: "최소", meaning: "最小的、最低的", ex_kr: "최소 30분은 걸려요.", ex_zh: "至少需要30分鐘。" },
            { id: 3545, word: "발매", meaning: "銷售", ex_kr: "새 앨범이 발매되었어요.", ex_zh: "新專輯已發行。" },
            { id: 3546, word: "황당하다", meaning: "荒謬的、可笑的、無稽的", ex_kr: "황당한 이야기를 들었어요.", ex_zh: "我聽到了一個荒誕的故事。" },
            { id: 3547, word: "훔치다", meaning: "偷竊、掠奪、竊取；擦拭、拖地", ex_kr: "남의 물건을 훔치면 안 돼요.", ex_zh: "你不應該偷竊別人的東西。" },
            { id: 3548, word: "판소리", meaning: "韓國傳統歌舞劇", ex_kr: "판소리 공연을 봤어요.", ex_zh: "我觀賞了一場盤索里表演。" },
            { id: 3549, word: "방면", meaning: "方向；途徑、方面", ex_kr: "서울 방면으로 가는 기차예요.", ex_zh: "這是一列開往首爾的列車。" },
            { id: 3550, word: "축복", meaning: "祝福", ex_kr: "두 사람의 앞날에 축복이 가득하기를 바랍니다.", ex_zh: "祝福你們二人未來幸福美滿。" },
            { id: 3551, word: "장부", meaning: "帳簿、帳簿、帳戶", ex_kr: "장부에 기록해 두세요.", ex_zh: "請將其記錄在帳簿中。" },
            { id: 3552, word: "농부", meaning: "農民、農夫", ex_kr: "농부가 밭을 갈고 있어요.", ex_zh: "一位農民正在耕地。" },
            { id: 3553, word: "순하다", meaning: "溫柔的、和善的、謙遜的", ex_kr: "이 화장품은 순해요.", ex_zh: "這款化妝品性質溫和。" },
            { id: 3554, word: "못되다", meaning: "壞的、卑鄙的、邪惡的；不足的、不夠的", ex_kr: "성격이 못됐어요.", ex_zh: "他性格很差。" },
            { id: 3555, word: "제자리", meaning: "正確的地方、原址", ex_kr: "물건을 제자리에 놓으세요.", ex_zh: "請將物品放回原位。" },
            { id: 3556, word: "이기적", meaning: "自私", ex_kr: "그는 너무 이기적이에요.", ex_zh: "他太自私了。" },
            { id: 3557, word: "내가다", meaning: "取出、帶走、移除", ex_kr: "그릇을 부엌으로 내가세요.", ex_zh: "請把碗盤拿到廚房去。" },
            { id: 3558, word: "조치", meaning: "行動、步驟、措施", ex_kr: "응급 조치를 취했어요.", ex_zh: "我採取了緊急措施。" },
            { id: 3559, word: "경솔하다", meaning: "粗心大意、魯莽", ex_kr: "경솔하게 행동하지 마세요.", ex_zh: "不要輕舉妄動。" },
            { id: 3560, word: "인연", meaning: "紐帶、聯繫；命運", ex_kr: "우리는 특별한 인연이 있나 봐요.", ex_zh: "我們之間似乎有一種特殊的連結。" },
            { id: 3561, word: "마술", meaning: "魔法", ex_kr: "마술 쇼를 봤어요.", ex_zh: "我看了一場魔術表演。" },
            { id: 3562, word: "도망치다", meaning: "逃跑、逃走", ex_kr: "범인이 도망쳤어요.", ex_zh: "罪犯逃跑了。" },
            { id: 3563, word: "미련하다", meaning: "愚蠢、傻氣", ex_kr: "미련하게 굴지 마세요.", ex_zh: "別犯傻。" },
            { id: 3564, word: "공격하다", meaning: "攻擊", ex_kr: "적군이 공격해 왔어요.", ex_zh: "敵人發動了攻擊。" },
            { id: 3565, word: "절반", meaning: "一半", ex_kr: "수익의 절반을 기부했어요.", ex_zh: "我捐出了利潤的一半。" },
            { id: 3566, word: "평범하다", meaning: "普通的、常見的", ex_kr: "저는 평범한 회사원입니다.", ex_zh: "我是一名普通的上班族。" },
            { id: 3567, word: "독", meaning: "毒藥；罐子", ex_kr: "독이 있는 버섯이에요.", ex_zh: "它是一種有毒的蘑菇。" },
            { id: 3568, word: "퇴장하다", meaning: "離開、出口", ex_kr: "선수들이 경기장에서 퇴장했어요.", ex_zh: "球員們離開了球場。" },
            { id: 3569, word: "파스", meaning: "止痛貼", ex_kr: "어깨에 파스를 붙였어요.", ex_zh: "我在肩膀上貼了一塊補丁。" },
            { id: 3570, word: "애원하다", meaning: "乞求、懇求、懇求", ex_kr: "살려달라고 애원했어요.", ex_zh: "我懇求他們饒我一命。" },
            { id: 3571, word: "수수료", meaning: "佣金、費用", ex_kr: "송금 수수료가 비싸요.", ex_zh: "匯款手續費很貴。" },
            { id: 3572, word: "증가하다", meaning: "增加、成長", ex_kr: "인구가 계속 증가하고 있어요.", ex_zh: "人口持續成長。" },
            { id: 3573, word: "거스르다", meaning: "逆流而上；做出改變", ex_kr: "부모님의 뜻을 거스르지 마세요.", ex_zh: "不要違背父母的意願。" },
            { id: 3574, word: "결론", meaning: "結論", ex_kr: "결론부터 말해 주세요.", ex_zh: "請先告訴我結論。" },
            { id: 3575, word: "급속히", meaning: "快速", ex_kr: "기술이 급속히 발전하고 있어요.", ex_zh: "科技發展日新月異。" },
            { id: 3576, word: "관사", meaning: "文章；官邸", ex_kr: "선생님은 관사에서 지내요.", ex_zh: "這位老師住在教師官邸。" },
            { id: 3577, word: "처녀", meaning: "未婚女性、少女", ex_kr: "시골 처녀가 서울로 올라왔어요.", ex_zh: "一個鄉下女孩來到首爾。" },
            { id: 3578, word: "기웃기웃", meaning: "偷窺、窺探", ex_kr: "수상한 사람이 집 주변을 기웃기웃해요.", ex_zh: "一個形跡可疑的人在房子附近徘徊。" },
            { id: 3579, word: "끔찍하다", meaning: "糟糕透了、可怕", ex_kr: "끔찍한 사고가 났어요.", ex_zh: "發生了一起可怕的意外。" },
            { id: 3580, word: "사투리", meaning: "方言", ex_kr: "그는 제주도 사투리를 써요.", ex_zh: "他會說濟州方言。" },
            { id: 3581, word: "억양", meaning: "語調、重音", ex_kr: "억양이 자연스러워요.", ex_zh: "語調自然。" },
            { id: 3582, word: "도둑질하다", meaning: "偷竊、搶劫", ex_kr: "배가 고파서 빵을 도둑질했어요.", ex_zh: "我偷麵包是因為我餓了。" },
            { id: 3583, word: "악수", meaning: "握手", ex_kr: "반갑게 악수를 했어요.", ex_zh: "我們熱情地握手。" },
            { id: 3584, word: "괴물", meaning: "怪物", ex_kr: "꿈에 괴물이 나타났어요.", ex_zh: "我夢裡出現了一個怪物。" },
            { id: 3585, word: "표준", meaning: "標準、規範、平均值", ex_kr: "이것이 세계 표준입니다.", ex_zh: "這是世界標準。" },
            { id: 3586, word: "급료", meaning: "薪水", ex_kr: "이번 달 급료를 받았어요.", ex_zh: "我這個月收到薪水了。" },
            { id: 3587, word: "털", meaning: "毛髮、毛、羽毛", ex_kr: "고양이 털 알레르기가 있어요.", ex_zh: "我對貓毛過敏。" },
            { id: 3588, word: "게", meaning: "螃蟹", ex_kr: "간장 게장을 먹었어요.", ex_zh: "我吃了醬油醃蟹。" },
            { id: 3589, word: "취향", meaning: "口味、喜好、偏好", ex_kr: "개인의 취향을 존중해 주세요.", ex_zh: "請尊重個人喜好。" },
            { id: 3590, word: "엎다", meaning: "翻轉", ex_kr: "밥상을 엎었어요.", ex_zh: "我把餐桌掀翻了。" },
            { id: 3591, word: "은행원", meaning: "櫃員、銀行職員", ex_kr: "은행원이 돈을 세고 있어요.", ex_zh: "銀行櫃員正在數錢。" },
            { id: 3592, word: "유치하다", meaning: "幼稚、不成熟；吸引、邀請", ex_kr: "그런 유치한 장난은 그만두세요.", ex_zh: "別再玩這種幼稚的遊戲了。" },
            { id: 3593, word: "반팔", meaning: "短袖襯衫", ex_kr: "여름에는 반팔 티셔츠를 입어요.", ex_zh: "夏天我穿短袖T卹。" },
            { id: 3594, word: "여리다", meaning: "溫柔的、柔軟的、細膩的", ex_kr: "그녀는 마음이 여려요.", ex_zh: "她心地善良。" },
            { id: 3595, word: "공개하다", meaning: "公開", ex_kr: "비밀을 공개했어요.", ex_zh: "我揭露了秘密。" },
            { id: 3596, word: "잠바", meaning: "夾克", ex_kr: "날씨가 추우니 잠바를 입으세요.", ex_zh: "天氣寒冷，請穿外套。" },
            { id: 3597, word: "답변", meaning: "回答", ex_kr: "빠른 답변 부탁드립니다.", ex_zh: "請盡快回覆。" },
            { id: 3598, word: "매체", meaning: "媒體", ex_kr: "대중 매체의 영향력은 큽니다.", ex_zh: "大眾傳播媒體的影響力非常顯著。" },
            { id: 3599, word: "할리우드", meaning: "好萊塢", ex_kr: "할리우드 영화를 좋아해요.", ex_zh: "我喜歡好萊塢電影。" },
            { id: 3600, word: "교대", meaning: "旋轉、移位、交替", ex_kr: "지금은 교대 시간입니다.", ex_zh: "現在是換班時間。" },
            { id: 3601, word: "오누이", meaning: "兄妹", ex_kr: "오누이가 정답게 놀고 있어요.", ex_zh: "兄妹倆正在親密地玩耍。" },
            { id: 3602, word: "거듭나다", meaning: "改過自新、重新開始。", ex_kr: "새 사람으로 거듭났어요.", ex_zh: "我獲得了新生。" },
            { id: 3603, word: "환상적", meaning: "極佳的", ex_kr: "경치가 정말 환상적이에요.", ex_zh: "景色真是太美了。" },
            { id: 3604, word: "유혹하다", meaning: "引誘、誘惑、勾引", ex_kr: "악마가 유혹했어요.", ex_zh: "魔鬼誘惑了我。" },
            { id: 3605, word: "세트", meaning: "一套", ex_kr: "햄버거 세트를 주문했어요.", ex_zh: "我點了一份漢堡套餐。" },
            { id: 3606, word: "짙다", meaning: "黑暗、深沉、濃稠", ex_kr: "안개가 짙게 끼었어요.", ex_zh: "霧很濃。" },
            { id: 3607, word: "엑스레이", meaning: "X光", ex_kr: "병원에서 엑스레이를 찍었어요.", ex_zh: "我在醫院拍了X光片。" },
            { id: 3608, word: "단골", meaning: "常客", ex_kr: "저는 이 가게 단골이에요.", ex_zh: "我是這家店的常客。" },
            { id: 3609, word: "어르신", meaning: "老年人、長者", ex_kr: "어르신께 자리를 양보하세요.", ex_zh: "請把座位讓給老人。" },
            { id: 3610, word: "밀리다", meaning: "延誤、落後、逾期", ex_kr: "일이 많이 밀렸어요.", ex_zh: "我積壓了很多工作。" },
            { id: 3611, word: "재수", meaning: "運氣、財富", ex_kr: "오늘 재수가 좋네요.", ex_zh: "我今天運氣很好。" },
            { id: 3612, word: "메달", meaning: "勳章", ex_kr: "올림픽에서 금메달을 땄어요.", ex_zh: "我在奧運會上獲得了一枚金牌。" },
            { id: 3613, word: "가르다", meaning: "分割、切開、劈開", ex_kr: "수박을 반으로 갈랐어요.", ex_zh: "我把西瓜切成了兩半。" },
            { id: 3614, word: "따다", meaning: "採摘；獲得", ex_kr: "사과를 땄어요.", ex_zh: "我摘了一個蘋果。" },
            { id: 3615, word: "우체부", meaning: "郵差", ex_kr: "우체부 아저씨가 편지를 가져왔어요.", ex_zh: "郵差送來了信。" },
            { id: 3616, word: "쓸쓸하다", meaning: "感到孤獨、淒涼", ex_kr: "가을은 왠지 쓸쓸해요.", ex_zh: "不知為何，秋天顯得有些孤單。" },
            { id: 3617, word: "매연", meaning: "廢氣", ex_kr: "도시의 매연이 심각해요.", ex_zh: "這座城市的空氣污染很嚴重。" },
            { id: 3618, word: "면허증", meaning: "許可證、權限", ex_kr: "운전 면허증을 땄어요.", ex_zh: "我拿到駕照了。" },
            { id: 3619, word: "사치품", meaning: "奢侈品", ex_kr: "사치품에 돈을 낭비하지 마세요.", ex_zh: "不要把錢浪費在奢侈品上。" },
            { id: 3620, word: "감격하다", meaning: "深受感動", ex_kr: "우승 소식에 감격했어요.", ex_zh: "聽到勝利的消息，我深受感動。" },
            { id: 3621, word: "을지로", meaning: "乙支路", ex_kr: "을지로 입구역에서 만나요.", ex_zh: "我們在乙支路站入口處見面。" },
            { id: 3622, word: "고독하다", meaning: "孤獨、獨處", ex_kr: "가을은 고독한 계절이에요.", ex_zh: "秋天是一個孤獨的季節。" },
            { id: 3623, word: "대체로", meaning: "一般來說、大部分", ex_kr: "날씨가 대체로 맑겠습니다.", ex_zh: "天氣晴朗。" },
            { id: 3624, word: "장사하다", meaning: "做生意、貿易", ex_kr: "시장에서 옷 장사를 해요.", ex_zh: "我在市場上賣衣服。" },
            { id: 3625, word: "달래다", meaning: "安撫、平靜下來", ex_kr: "우는 아이를 달랬어요.", ex_zh: "我安撫了哭泣的孩子。" },
            { id: 3626, word: "육박하다", meaning: "接近、靠近、逼近", ex_kr: "기온이 40도에 육박했어요.", ex_zh: "氣溫接近40度。" },
            { id: 3627, word: "장마철", meaning: "雨季", ex_kr: "장마철이라 비가 계속 와요.", ex_zh: "因為現在是雨季，所以一直下雨。" },
            { id: 3628, word: "현대인", meaning: "現代人", ex_kr: "현대인들은 스트레스를 많이 받아요.", ex_zh: "現代人承受著巨大的壓力。" },
            { id: 3629, word: "흑인", meaning: "黑人、非裔", ex_kr: "그는 최초의 흑인 대통령입니다.", ex_zh: "他是第一位黑人總統。" },
            { id: 3630, word: "습도", meaning: "濕度", ex_kr: "오늘은 습도가 높아요.", ex_zh: "今天濕度很高。" },
            { id: 3631, word: "눅눅하다", meaning: "潮濕的、悶熱的", ex_kr: "빨래가 눅눅해요.", ex_zh: "衣服是濕的。" },
            { id: 3632, word: "과연", meaning: "果然如此。", ex_kr: "과연 그가 성공할까요?", ex_zh: "他真的會成功嗎？" },
            { id: 3633, word: "내내", meaning: "從頭到尾、始終如一", ex_kr: "여름 내내 비가 왔어요.", ex_zh: "整個夏天都在下雨。" },
            { id: 3634, word: "몽땅", meaning: "全部", ex_kr: "돈을 몽땅 잃어버렸어요.", ex_zh: "我把錢全賠光了。" },
            { id: 3635, word: "지저분하다", meaning: "雜亂無章、凌亂不堪", ex_kr: "방이 너무 지저분해요.", ex_zh: "房間太亂了。" },
            { id: 3636, word: "다투다", meaning: "爭吵、辯論、掙扎", ex_kr: "사소한 일로 친구와 다투었어요.", ex_zh: "我和朋友因為一件小事發生了爭執。" },
            { id: 3637, word: "불행하다", meaning: "不快樂、不幸", ex_kr: "그는 불행한 어린 시절을 보냈어요.", ex_zh: "他童年並不幸福。" },
            { id: 3638, word: "신청곡", meaning: "點歌", ex_kr: "라디오에 신청곡을 보냈어요.", ex_zh: "我向電台發送了一首點歌請求。" },
            { id: 3639, word: "비롯하다", meaning: "包括", ex_kr: "서울을 비롯한 대도시에서 행사가 열립니다.", ex_zh: "活動在包括首爾在內的各大城市舉行。" },
            { id: 3640, word: "레이더", meaning: "雷達", ex_kr: "레이더에 비행기가 포착되었어요.", ex_zh: "雷達偵測到一架飛機。" },
            { id: 3641, word: "청취자", meaning: "聽眾", ex_kr: "청취자 여러분 안녕하십니까?", ex_zh: "各位聽眾朋友，大家好。" },
            { id: 3642, word: "세대", meaning: "世代", ex_kr: "세대 차이를 느껴요.", ex_zh: "我感覺到了代溝。" },
            { id: 3643, word: "불쾌하다", meaning: "令人不快、不舒服", ex_kr: "냄새가 나서 불쾌해요.", ex_zh: "氣味難聞。" },
            { id: 3644, word: "선명하다", meaning: "清晰、明確、銳利", ex_kr: "사진이 선명하게 잘 나왔어요.", ex_zh: "照片拍得很清晰。" },
            { id: 3645, word: "무모하다", meaning: "魯莽、輕率", ex_kr: "무모한 도전은 위험해요.", ex_zh: "魯莽的挑戰是危險的。" },
            { id: 3646, word: "명물", meaning: "專業", ex_kr: "이것은 이 지역의 명물입니다.", ex_zh: "這是當地特色菜。" },
            { id: 3647, word: "사납다", meaning: "狂野的、兇猛的、暴力的", ex_kr: "그 개는 매우 사나워요.", ex_zh: "那隻狗非常兇猛。" },
            { id: 3648, word: "무덥다", meaning: "悶熱、潮濕、悶熱", ex_kr: "날씨가 몹시 무덥네요.", ex_zh: "天氣極為炎熱。" },
            { id: 3649, word: "종로", meaning: "鐘路", ex_kr: "종로에서 친구를 만났어요.", ex_zh: "我在鐘路遇到了一個朋友。" },
            { id: 3650, word: "생물학", meaning: "生物學", ex_kr: "대학에서 생물학을 전공했어요.", ex_zh: "我大學主修生物學。" },
            { id: 3651, word: "실시간", meaning: "即時直播", ex_kr: "실시간으로 뉴스를 보고 있어요.", ex_zh: "我正在即時觀看新聞。" },
            { id: 3652, word: "흥정하다", meaning: "討價還價、就條款進行討價還價", ex_kr: "시장에서 가격을 흥정했어요.", ex_zh: "我在市場上討價還價。" },
            { id: 3653, word: "책임자", meaning: "負責人", ex_kr: "이곳의 책임자가 누구입니까?", ex_zh: "這裡誰負責？" },
            { id: 3654, word: "사인", meaning: "簽名、親筆簽名；死因", ex_kr: "여기에 사인을 해주세요.", ex_zh: "請在這裡簽名。" },
            { id: 3655, word: "횡재", meaning: "意外之財", ex_kr: "길에서 돈을 주워서 횡재했어요.", ex_zh: "我在街上撿到了錢，真是走了狗屎運。" },
            { id: 3656, word: "초밥", meaning: "壽司", ex_kr: "점심으로 초밥을 먹었어요.", ex_zh: "我午餐吃了壽司。" },
            { id: 3657, word: "별장", meaning: "度假屋、小屋", ex_kr: "여름에는 별장에서 지내요.", ex_zh: "夏天我會住在度假屋裡。" },
            { id: 3658, word: "건조하다", meaning: "乾燥", ex_kr: "피부가 건조해요.", ex_zh: "我的皮膚很乾。" },
            { id: 3659, word: "애절하다", meaning: "令人悲傷的、感人的、可憐的", ex_kr: "노랫소리가 애절해요.", ex_zh: "歌聲聽起來令人心碎。" },
            { id: 3660, word: "품질", meaning: "品質", ex_kr: "품질이 아주 우수해요.", ex_zh: "品質非常好。" },
            { id: 3661, word: "공평하다", meaning: "公平、公正、不偏不倚", ex_kr: "세상은 공평하지 않아요.", ex_zh: "世界並不公平。" },
            { id: 3662, word: "마룻바닥", meaning: "地板", ex_kr: "마룻바닥을 닦았어요.", ex_zh: "我擦了地板。" },
            { id: 3663, word: "탈의실", meaning: "更衣室", ex_kr: "탈의실에서 옷을 갈아입으세요.", ex_zh: "請在更衣室更換衣服。" },
            { id: 3664, word: "세차하다", meaning: "洗車", ex_kr: "주유소에서 세차했어요.", ex_zh: "我在加油站洗了車。" },
            { id: 3665, word: "카세트", meaning: "磁帶", ex_kr: "예전에는 카세트 테이프를 많이 들었어요.", ex_zh: "我以前常聽錄音帶。" },
            { id: 3666, word: "목록", meaning: "清單、目錄", ex_kr: "쇼핑 목록을 작성하세요.", ex_zh: "建立購物清單。" },
            { id: 3667, word: "신비하다", meaning: "神秘", ex_kr: "우주는 정말 신비해요.", ex_zh: "宇宙真是神秘莫測。" },
            { id: 3668, word: "부유하다", meaning: "變得富有、有錢", ex_kr: "그는 부유한 집안에서 태어났어요.", ex_zh: "他出生於一個富裕家庭。" },
            { id: 3669, word: "평가하다", meaning: "估算、評估、評價", ex_kr: "결과를 공정하게 평가해 주세요.", ex_zh: "請公正地評價結果。" },
            { id: 3670, word: "불꽃", meaning: "火花、火焰", ex_kr: "불꽃놀이를 구경했어요.", ex_zh: "我看了煙火。" },
            { id: 3671, word: "야간", meaning: "夜晚、夜晚", ex_kr: "야간 자율 학습을 했어요.", ex_zh: "我晚上自學。" },
            { id: 3672, word: "넘어서다", meaning: "超過、超越", ex_kr: "기대치를 넘어선 결과예요.", ex_zh: "結果超出預期。" },
            { id: 3673, word: "수정과", meaning: "柿乾潘趣酒", ex_kr: "식후에 수정과를 마셨어요.", ex_zh: "飯後我喝了水正果酒。" },
            { id: 3674, word: "은은하다", meaning: "模糊不清、微弱", ex_kr: "은은한 향기가 나요.", ex_zh: "它散發著淡淡的香味。" },
            { id: 3675, word: "불결하다", meaning: "骯髒的、不衛生的、污穢的", ex_kr: "화장실이 불결해요.", ex_zh: "洗手間很髒。" },
            { id: 3676, word: "자주색", meaning: "紫色、紫羅蘭色", ex_kr: "자주색 꽃이 피었어요.", ex_zh: "紫色的花朵盛開了。" },
            { id: 3677, word: "자동", meaning: "自動的", ex_kr: "문이 자동으로 열려요.", ex_zh: "門會自動打開。" },
            { id: 3678, word: "매", meaning: "鷹、隼；鞭子、桿", ex_kr: "하늘에 매가 날고 있어요.", ex_zh: "一隻鷹在天空中翱翔。" },
            { id: 3679, word: "우애", meaning: "兄弟之愛", ex_kr: "형제간의 우애가 깊어요.", ex_zh: "兄弟情誼深厚。" },
            { id: 3680, word: "기린", meaning: "長頸鹿", ex_kr: "동물원에서 기린을 봤어요.", ex_zh: "我在動物園看到了一隻長頸鹿。" },
            { id: 3681, word: "맏아들", meaning: "長子", ex_kr: "그는 우리 집 맏아들입니다.", ex_zh: "他是我們家的長子。" },
            { id: 3682, word: "유용하다", meaning: "有用、有幫助", ex_kr: "이 정보는 매우 유용해요.", ex_zh: "這些資訊非常有用。" },
            { id: 3683, word: "분류하다", meaning: "分類、歸類", ex_kr: "서류를 가나다순으로 분류했어요.", ex_zh: "我已按字母順序整理好文件。" },
            { id: 3684, word: "국제선", meaning: "國際航班", ex_kr: "국제선 터미널로 가야 해요.", ex_zh: "你必須去國際航廈。" },
            { id: 3685, word: "귀중하다", meaning: "珍貴的、有價值的", ex_kr: "이것은 저에게 귀중한 물건입니다.", ex_zh: "這對我來說是一件很珍貴的物品。" },
            { id: 3686, word: "따끈따끈하다", meaning: "炎熱、溫暖", ex_kr: "따끈따끈한 빵이 나왔어요.", ex_zh: "熱騰騰的麵包出爐了。" },
            { id: 3687, word: "통조림", meaning: "罐頭食品", ex_kr: "참치 통조림을 샀어요.", ex_zh: "我買了罐裝鮪魚。" },
            { id: 3688, word: "유머", meaning: "幽默", ex_kr: "그는 유머 감각이 뛰어나요.", ex_zh: "他很有幽默感。" },
            { id: 3689, word: "삶다", meaning: "煮沸、煮", ex_kr: "감자를 삶았어요.", ex_zh: "我煮了土豆。" },
            { id: 3690, word: "탑", meaning: "塔、寶塔", ex_kr: "높은 탑을 쌓았어요.", ex_zh: "我建造了一座高塔。" },
            { id: 3691, word: "향기", meaning: "香氣、香味", ex_kr: "꽃 향기가 좋아요.", ex_zh: "花香真好聞。" },
            { id: 3692, word: "피서", meaning: "夏季度假、暑假、休閒度假", ex_kr: "해운대로 피서를 갔어요.", ex_zh: "我暑假去了海雲台。" },
            { id: 3693, word: "국경", meaning: "邊界、邊界", ex_kr: "국경을 넘어서 다른 나라로 갔어요.", ex_zh: "我越過邊境，去了另一個國家。" },
            { id: 3694, word: "온천", meaning: "溫泉", ex_kr: "온천 여행을 가고 싶어요.", ex_zh: "我想去泡溫泉。" },
            { id: 3695, word: "파일", meaning: "文件", ex_kr: "파일을 저장하는 것을 잊었어요.", ex_zh: "我忘記保存文件了。" },
            { id: 3696, word: "항의", meaning: "抗議、投訴", ex_kr: "부당한 대우에 항의했어요.", ex_zh: "我抗議了這種不公平的待遇。" },
            { id: 3697, word: "영토", meaning: "領土、領域", ex_kr: "독도는 대한민국의 영토입니다.", ex_zh: "獨島是大韓民國的領土。" },
            { id: 3698, word: "내적", meaning: "內部的、內部的", ex_kr: "내적 갈등을 겪고 있어요.", ex_zh: "我正經歷內心的衝突。" },
            { id: 3699, word: "시력", meaning: "視力", ex_kr: "시력이 나빠져서 안경을 썼어요.", ex_zh: "我的視力變差了，所以我開始戴眼鏡。" },
            { id: 3700, word: "양심", meaning: "良心", ex_kr: "양심에 찔리지 않으세요?", ex_zh: "難道你不覺得良心不安嗎？" },
            { id: 3701, word: "자랑거리", meaning: "令人自豪的事", ex_kr: "이 아이는 우리 집 자랑거리예요.", ex_zh: "這個孩子是我們全家的驕傲。" },
            { id: 3702, word: "도서", meaning: "書籍、出版品", ex_kr: "도서관에 많은 도서가 있습니다.", ex_zh: "圖書館裡有很多書。" },
            { id: 3703, word: "하반기", meaning: "下半年", ex_kr: "하반기 계획을 세우고 있어요.", ex_zh: "我正在製定下半年的計畫。" },
            { id: 3704, word: "돌아다니다", meaning: "四處閒逛、漫遊", ex_kr: "하루 종일 시내를 돌아다녔어요.", ex_zh: "我一整天都在市中心閒逛。" },
            { id: 3705, word: "물질", meaning: "物質、實體、材料", ex_kr: "유해 물질이 검출되었어요.", ex_zh: "檢測到了有害物質。" },
            { id: 3706, word: "유괴하다", meaning: "綁架、劫持", ex_kr: "아이를 유괴하는 것은 큰 범죄입니다.", ex_zh: "綁架兒童是嚴重的犯罪行為。" },
            { id: 3707, word: "짝퉁", meaning: "假貨、仿製品", ex_kr: "이것은 명품이 아니라 짝퉁이에요.", ex_zh: "這不是奢侈品，是假貨。" },
            { id: 3708, word: "항구", meaning: "港口、海港", ex_kr: "배가 항구에 도착했어요.", ex_zh: "船抵達港口。" },
            { id: 3709, word: "처방", meaning: "處方", ex_kr: "의사의 처방이 필요해요.", ex_zh: "你需要醫生的處方。" },
            { id: 3710, word: "공상과학", meaning: "科幻小說", ex_kr: "공상과학 소설을 좋아해요.", ex_zh: "我喜歡科幻小說。" },
            { id: 3711, word: "일상", meaning: "日常生活", ex_kr: "바쁜 일상 속에서 여유를 찾으세요.", ex_zh: "在忙碌的日常生活中尋找片刻寧靜。" },
            { id: 3712, word: "부디", meaning: "請", ex_kr: "부디 건강하세요.", ex_zh: "請保重身體。" },
            { id: 3713, word: "바둑", meaning: "圍棋", ex_kr: "할아버지와 바둑을 두었어요.", ex_zh: "我和祖父一起下圍棋。" },
            { id: 3714, word: "폭발하다", meaning: "爆炸、爆裂、引爆、爆發", ex_kr: "가스통이 폭발했어요.", ex_zh: "瓦斯罐爆炸了。" },
            { id: 3715, word: "등신", meaning: "傻瓜、白痴", ex_kr: "그런 등신 같은 짓은 하지 마.", ex_zh: "別做這種蠢事。" },
            { id: 3716, word: "유료", meaning: "需要付款", ex_kr: "이 주차장은 유료입니다.", ex_zh: "這個停車場是收費的。" },
            { id: 3717, word: "재혼하다", meaning: "再婚、再結婚", ex_kr: "그녀는 작년에 재혼했어요.", ex_zh: "她去年再婚了。" },
            { id: 3718, word: "따님", meaning: "女兒", ex_kr: "따님이 정말 예쁘시네요.", ex_zh: "你女兒真漂亮。" },
            { id: 3719, word: "솜씨", meaning: "技能、能力", ex_kr: "요리 솜씨가 좋으시네요.", ex_zh: "你廚藝很棒。" },
            { id: 3720, word: "장인", meaning: "岳父；技藝精湛的工匠", ex_kr: "장인어른께 인사를 드렸어요.", ex_zh: "我向岳父問好。" },
            { id: 3721, word: "칠순", meaning: "七十歲", ex_kr: "할머니 칠순 잔치를 했어요.", ex_zh: "我為祖母舉辦了70歲生日派對。" },
            { id: 3722, word: "월세", meaning: "月租金", ex_kr: "매달 월세를 내야 해요.", ex_zh: "我必須支付月租。" },
            { id: 3723, word: "과장하다", meaning: "誇大其詞", ex_kr: "이야기를 너무 과장하지 마세요.", ex_zh: "不要過度誇大故事情節。" },
            { id: 3724, word: "수십", meaning: "十、幾十、十二", ex_kr: "수십 명의 사람들이 모였어요.", ex_zh: "數十人聚集在一起。" },
            { id: 3725, word: "장녀", meaning: "大女兒", ex_kr: "그녀는 그 집안의 장녀예요.", ex_zh: "她是家裡的長女。" },
            { id: 3726, word: "첩", meaning: "妾；書籍、專輯", ex_kr: "옛날에는 첩을 두기도 했어요.", ex_zh: "古代人們也蓄養妾室。" },
            { id: 3727, word: "안약", meaning: "眼藥水", ex_kr: "눈에 안약을 넣었어요.", ex_zh: "我往眼睛裡滴了眼藥水。" },
            { id: 3728, word: "상품권", meaning: "禮品券", ex_kr: "생일 선물로 상품권을 받았어요.", ex_zh: "我收到了一張禮品券作為生日禮物。" },
            { id: 3729, word: "충전하다", meaning: "通電、充電", ex_kr: "휴대폰을 충전해야 해요.", ex_zh: "我需要幫手機充電。" },
            { id: 3730, word: "시동", meaning: "(機器的)啟動", ex_kr: "자동차 시동이 안 걸려요.", ex_zh: "車子發動不了。" },
            { id: 3731, word: "문맥", meaning: "情境", ex_kr: "문맥을 잘 파악해야 해요.", ex_zh: "你需要充分理解上下文。" },
            { id: 3732, word: "부서지다", meaning: "崩潰、損壞、失序", ex_kr: "의자가 부서졌어요.", ex_zh: "椅子壞了。" },
            { id: 3733, word: "고요하다", meaning: "保持靜止、安靜、平靜、無聲、平和", ex_kr: "호수가 고요해요.", ex_zh: "湖面平靜。" },
            { id: 3734, word: "얌전하다", meaning: "溫柔、舉止得體、順從、謙遜", ex_kr: "고양이가 얌전하게 앉아 있어요.", ex_zh: "貓咪安靜地坐著。" },
            { id: 3735, word: "신형", meaning: "新型號、新風格", ex_kr: "신형 자동차를 구입했어요.", ex_zh: "我買了一輛新車。" },
            { id: 3736, word: "분량", meaning: "數量", ex_kr: "음식 분량이 너무 많아요.", ex_zh: "份量太大了。" },
            { id: 3737, word: "전주", meaning: "上週；全州", ex_kr: "전주에 비가 많이 왔어요.", ex_zh: "全州下了很多雨。" },
            { id: 3738, word: "육감", meaning: "第六感、直覺", ex_kr: "여자의 육감은 무서워요.", ex_zh: "女人的第六感很可怕。" },
            { id: 3739, word: "고려하다", meaning: "要考慮、要顧及", ex_kr: "여러 가지 상황을 고려해야 해요.", ex_zh: "你需要考慮各種情況。" },
            { id: 3740, word: "고용하다", meaning: "僱用、僱用", ex_kr: "직원을 새로 고용했어요.", ex_zh: "我僱用了一名新員工。" },
            { id: 3741, word: "중지하다", meaning: "停止、中止、暫停", ex_kr: "공사를 일시 중지했어요.", ex_zh: "我們暫時停止了施工。" },
            { id: 3742, word: "말끔히", meaning: "乾淨俐落", ex_kr: "빚을 말끔히 갚았어요.", ex_zh: "我已經還清了所有債務。" },
            { id: 3743, word: "째려보다", meaning: "用不友善的眼光看", ex_kr: "왜 저를 째려보세요?", ex_zh: "為什麼你一直瞪著我？" },
            { id: 3744, word: "업체", meaning: "企業、公司、機構", ex_kr: "협력 업체와 미팅이 있어요.", ex_zh: "我要和一家合作公司開會。" },
            { id: 3745, word: "백성", meaning: "人民、公眾", ex_kr: "왕은 백성을 사랑해야 합니다.", ex_zh: "國王必須愛他的子民。" },
            { id: 3746, word: "초급", meaning: "初級、入門", ex_kr: "한국어 초급 반에 등록했어요.", ex_zh: "我報名了韓語入門課程。" },
            { id: 3747, word: "여의도", meaning: "汝矣島", ex_kr: "여의도 공원에서 자전거를 탔어요.", ex_zh: "我在汝矣島公園騎腳踏車。" },
            { id: 3748, word: "들러리", meaning: "伴郎、伴娘", ex_kr: "결혼식에서 들러리를 섰어요.", ex_zh: "我曾在一場婚禮上擔任伴娘。" },
            { id: 3749, word: "관람하다", meaning: "觀看、瀏覽", ex_kr: "박물관을 관람했어요.", ex_zh: "我參觀了博物館。" },
            { id: 3750, word: "돌이키다", meaning: "回顧、反思；撤銷", ex_kr: "지나간 일을 돌이켜 봤어요.", ex_zh: "我回顧了過去。" },
            { id: 3751, word: "평균", meaning: "平均值、均值", ex_kr: "평균 점수가 올랐어요.", ex_zh: "平均分數上升了。" },
            { id: 3752, word: "데모", meaning: "示範", ex_kr: "거리에서 데모가 일어났어요.", ex_zh: "街頭爆發了示威遊行。" },
            { id: 3753, word: "용의자", meaning: "懷疑", ex_kr: "경찰이 용의자를 검거했어요.", ex_zh: "警方逮捕了嫌疑犯。" },
            { id: 3754, word: "둔하다", meaning: "遲鈍、遲緩、愚蠢", ex_kr: "감각이 둔해졌어요.", ex_zh: "我的感官變得遲鈍了。" },
            { id: 3755, word: "실천하다", meaning: "付諸實踐", ex_kr: "계획을 실천에 옮기세요.", ex_zh: "將計劃付諸實施。" },
            { id: 3756, word: "나르다", meaning: "攜帶、運輸", ex_kr: "짐을 트럭으로 날랐어요.", ex_zh: "我用卡車運送了行李。" },
            { id: 3757, word: "이데올로기", meaning: "思想", ex_kr: "이데올로기 갈등이 심해요.", ex_zh: "存在嚴重的意識形態衝突。" },
            { id: 3758, word: "간접화법", meaning: "間接引語", ex_kr: "간접화법으로 말했어요.", ex_zh: "我使用了間接引語。" },
            { id: 3759, word: "입찰", meaning: "投標、報價", ex_kr: "경쟁 입찰에 참여했어요.", ex_zh: "我參與了競標。" },
            { id: 3760, word: "이래", meaning: "自從", ex_kr: "개업 이래 가장 손님이 많아요.", ex_zh: "我們迎來了開業以來最多的顧客。" },
            { id: 3761, word: "이윽고", meaning: "最終、終於、最後", ex_kr: "이윽고 해가 떴어요.", ex_zh: "不久，太陽升起來了。" },
            { id: 3762, word: "파악하다", meaning: "掌握、理解、弄明白", ex_kr: "상황을 파악하는 중입니다.", ex_zh: "我正在評估情況。" },
            { id: 3763, word: "펴놓다", meaning: "展開、鋪開、保持開放", ex_kr: "지도를 책상 위에 펴놓았어요.", ex_zh: "我把地圖鋪在桌子上。" },
            { id: 3764, word: "빈틈", meaning: "縫隙、裂縫", ex_kr: "빈틈을 보이지 마세요.", ex_zh: "不要顯露出任何弱點。" },
            { id: 3765, word: "건장하다", meaning: "身材健壯、體格強壯", ex_kr: "그는 체격이 건장해요.", ex_zh: "他體格健壯。" },
            { id: 3766, word: "용납하다", meaning: "允許、準許、容忍", ex_kr: "그런 행동은 용납할 수 없어요.", ex_zh: "我無法容忍這種行為。" },
            { id: 3767, word: "한눈", meaning: "一瞥、一瞥", ex_kr: "한눈 팔지 말고 운전하세요.", ex_zh: "開車時不要分心。" },
            { id: 3768, word: "엔지니어", meaning: "工程師", ex_kr: "그는 컴퓨터 엔지니어입니다.", ex_zh: "他是一名電腦工程師。" },
            { id: 3769, word: "뺨맞다", meaning: "被打耳光", ex_kr: "길에서 뺨맞은 기분이에요.", ex_zh: "我感覺就像在大街上被人打了一巴掌。" },
            { id: 3770, word: "훈훈하다", meaning: "感覺舒適溫暖", ex_kr: "인심이 훈훈한 동네예요.", ex_zh: "這是一個充滿愛心的社區。" },
            { id: 3771, word: "눈부시다", meaning: "耀眼奪目、光芒四射、光彩奪目", ex_kr: "햇살이 너무 눈부셔요.", ex_zh: "陽光真刺眼。" },
            { id: 3772, word: "위엄", meaning: "尊嚴", ex_kr: "왕의 위엄이 느껴졌어요.", ex_zh: "我能感受到國王的威嚴。" },
            { id: 3773, word: "작성하다", meaning: "擬定、寫出、準備", ex_kr: "보고서를 작성했어요.", ex_zh: "我寫了一份報告。" },
            { id: 3774, word: "무례하다", meaning: "粗魯無禮", ex_kr: "그는 어른에게 무례하게 굴었어요.", ex_zh: "他對成年人很粗魯。" },
            { id: 3775, word: "종료", meaning: "結束、結論、終止", ex_kr: "프로그램이 종료되었습니다.", ex_zh: "節目已結束。" },
            { id: 3776, word: "방패", meaning: "盾", ex_kr: "방패로 공격을 막았어요.", ex_zh: "我用盾牌擋住了攻擊。" },
            { id: 3777, word: "압구정", meaning: "狎鷗亭", ex_kr: "압구정동에 쇼핑하러 갔어요.", ex_zh: "我去狎鷗亭洞購物了。" },
            { id: 3778, word: "전편", meaning: "整本書(電影、影集等)；原著(電影)", ex_kr: "시리즈 전편을 다 봤어요.", ex_zh: "我把整部劇都看完了。" },
            { id: 3779, word: "색칠하다", meaning: "著色、繪畫", ex_kr: "그림에 색칠을 했어요.", ex_zh: "我給這幅畫上了顏色。" },
            { id: 3780, word: "새집", meaning: "新房", ex_kr: "새집으로 이사했어요.", ex_zh: "我搬進新家了。" },
            { id: 3781, word: "혈압", meaning: "血壓", ex_kr: "혈압이 높아서 약을 먹어요.", ex_zh: "我血壓高，所以需要服用藥物。" },
            { id: 3782, word: "모음", meaning: "母音", ex_kr: "한국어에는 모음이 21개 있습니다.", ex_zh: "韓語共有21個元音。" },
            { id: 3783, word: "급식", meaning: "餐飲服務", ex_kr: "학교에서 급식을 먹어요.", ex_zh: "我吃學校午餐。" },
            { id: 3784, word: "험하다", meaning: "粗獷的、粗糙的、陰險的", ex_kr: "산길이 아주 험해요.", ex_zh: "山路非常崎嶇。" },
            { id: 3785, word: "빤히", meaning: "顯然、顯而易見；故意", ex_kr: "얼굴을 빤히 쳐다보지 마세요.", ex_zh: "不要盯著我的臉看。" },
            { id: 3786, word: "설화", meaning: "故事", ex_kr: "이것은 구미호 설화입니다.", ex_zh: "這是九尾狐狸的傳說。" },
            { id: 3787, word: "물러나다", meaning: "退一步、辭職", ex_kr: "자리에서 물러나겠습니다.", ex_zh: "我將辭去我的職務。" },
            { id: 3788, word: "얼룩", meaning: "污漬、斑點", ex_kr: "옷에 얼룩이 묻었어요.", ex_zh: "我的衣服上有污漬。" },
            { id: 3789, word: "분실하다", meaning: "輸", ex_kr: "지갑을 분실했어요.", ex_zh: "我把我的錢包弄丟了。" },
            { id: 3790, word: "최고급", meaning: "最高等級、頂級", ex_kr: "최고급 호텔에서 묵었어요.", ex_zh: "我入住了一家頂級飯店。" },
            { id: 3791, word: "처지", meaning: "位置、環境、處境", ex_kr: "남의 처지를 이해해 주세요.", ex_zh: "請體諒他人的處境。" },
            { id: 3792, word: "착각하다", meaning: "陷入幻覺、自欺欺人", ex_kr: "다른 사람으로 착각했어요.", ex_zh: "我把你認錯人了。" },
            { id: 3793, word: "선", meaning: "線；善良、美德；與未來的結婚伴侶見面", ex_kr: "선을 넘지 마세요.", ex_zh: "不要越線。" },
            { id: 3794, word: "편견", meaning: "偏見、成見", ex_kr: "편견을 버리세요.", ex_zh: "摒棄你的偏見。" },
            { id: 3795, word: "부정확", meaning: "不準確、不正確", ex_kr: "발음이 부정확해요.", ex_zh: "發音不準確。" },
            { id: 3796, word: "드러내다", meaning: "揭示、暴露、顯示", ex_kr: "본색을 드러냈어요.", ex_zh: "他露出了真面目。" },
            { id: 3797, word: "독특하다", meaning: "獨特的、別緻的、與眾不同的", ex_kr: "맛이 아주 독특해요.", ex_zh: "味道非常獨特。" },
            { id: 3798, word: "깨", meaning: "芝麻", ex_kr: "음식에 깨를 뿌렸어요.", ex_zh: "我在食物上撒了些芝麻。" },
            { id: 3799, word: "지적하다", meaning: "指出、指示", ex_kr: "잘못된 점을 지적해 주셨어요.", ex_zh: "你指出了錯誤。" },
            { id: 3800, word: "지혜", meaning: "智慧、機智", ex_kr: "삶의 지혜를 배웠어요.", ex_zh: "我領悟了人生的智慧。" },
            { id: 3801, word: "예비군", meaning: "預備役人員、預備役部隊", ex_kr: "예비군 훈련을 다녀왔어요.", ex_zh: "我去參加了預備役軍人訓練。" },
            { id: 3802, word: "해바라기", meaning: "向日葵", ex_kr: "해바라기는 해를 따라가요.", ex_zh: "向日葵追隨太陽。" },
            { id: 3803, word: "듬직하다", meaning: "可靠、值得信賴", ex_kr: "사위가 아주 듬직하네요.", ex_zh: "你的女婿非常可靠。" },
            { id: 3804, word: "작전", meaning: "行動、軍事行動", ex_kr: "작전을 개시합시다.", ex_zh: "讓我們開始行動。" },
            { id: 3805, word: "음성", meaning: "聲音；否定", ex_kr: "음성 메시지를 남겨주세요.", ex_zh: "請留言。" },
            { id: 3806, word: "식용유", meaning: "食用油", ex_kr: "팬에 식용유를 두르세요.", ex_zh: "將食用油倒入鍋中。" },
            { id: 3807, word: "유력하다", meaning: "有影響力、有領導力、有權力", ex_kr: "그가 유력한 우승 후보입니다.", ex_zh: "他是冠軍的有力競爭者。" },
            { id: 3808, word: "음절", meaning: "音節", ex_kr: "한국어는 음절 단위로 글자를 씁니다.", ex_zh: "韓文是用音節單位寫的。" },
            { id: 3809, word: "물끄러미", meaning: "一臉茫然", ex_kr: "창밖을 물끄러미 바라보았어요.", ex_zh: "我茫然地望著窗外。" },
            { id: 3810, word: "신청서", meaning: "申請表", ex_kr: "신청서를 작성해 주세요.", ex_zh: "請填寫申請表。" },
            { id: 3811, word: "위대하다", meaning: "偉大、宏偉", ex_kr: "한글은 위대한 문자입니다.", ex_zh: "Hangul是一個很棒的劇本。" },
            { id: 3812, word: "펭귄", meaning: "企鵝", ex_kr: "펭귄은 날지 못해요.", ex_zh: "企鵝不會飛。" },
            { id: 3813, word: "올바르다", meaning: "筆直、正直、正確", ex_kr: "올바른 자세로 앉으세요.", ex_zh: "請保持正確的坐姿。" },
            { id: 3814, word: "쏘다", meaning: "射擊、開火", ex_kr: "총을 쏘는 연습을 했어요.", ex_zh: "我練習了射擊。" },
            { id: 3815, word: "조미료", meaning: "調味料、佐料", ex_kr: "화학 조미료를 쓰지 않아요.", ex_zh: "我們不使用化學調味料。" },
            { id: 3816, word: "앞면", meaning: "正面", ex_kr: "동전의 앞면이 나왔어요.", ex_zh: "硬幣正面朝上。" },
            { id: 3817, word: "금품", meaning: "錢財和貴重物品", ex_kr: "금품을 도난당했어요.", ex_zh: "我的貴重物品被偷了。" },
            { id: 3818, word: "바래다주다", meaning: "看到有人在家", ex_kr: "여자 친구를 집에 바래다주었어요.", ex_zh: "我送女朋友回家。" },
            { id: 3819, word: "온전하다", meaning: "完整無缺", ex_kr: "건물이 온전하게 남아있어요.", ex_zh: "建築物完好無損。" },
            { id: 3820, word: "신속하다", meaning: "快速、及時、迅速", ex_kr: "신속한 배달 부탁드립니다.", ex_zh: "請盡快送達。" },
            { id: 3821, word: "해변", meaning: "海灘、海濱", ex_kr: "해변을 거닐었어요.", ex_zh: "我沿著海灘散步。" },
            { id: 3822, word: "요원", meaning: "代理人", ex_kr: "비밀 요원이 임무를 수행 중이에요.", ex_zh: "一名特工正在執行任務。" },
            { id: 3823, word: "극복하다", meaning: "克服", ex_kr: "어려움을 극복하고 성공했어요.", ex_zh: "我克服了困難，並且取得了成功。" },
            { id: 3824, word: "몸매", meaning: "一個人的身形", ex_kr: "운동을 해서 몸매를 가꾸세요.", ex_zh: "透過運動保持健康體形。" },
            { id: 3825, word: "자상하다", meaning: "細心、體貼、周到", ex_kr: "그는 매우 자상한 남편이에요.", ex_zh: "他是一位非常體貼的丈夫。" },
            { id: 3826, word: "악성", meaning: "壞的、惡毒的、惡性的", ex_kr: "악성 바이러스에 감염되었어요.", ex_zh: "我感染了惡意病毒。" },
            { id: 3827, word: "마지못해", meaning: "不情願地、勉強地", ex_kr: "마지못해 부탁을 들어주었어요.", ex_zh: "我勉強同意了這個請求。" },
            { id: 3828, word: "꼬박꼬박", meaning: "常", ex_kr: "저축을 꼬박꼬박 하고 있어요.", ex_zh: "我一直在努力存錢。" },
            { id: 3829, word: "북녘", meaning: "北", ex_kr: "북녘 하늘을 바라보았어요.", ex_zh: "我抬頭望向北方的天空。" },
            { id: 3830, word: "숙면", meaning: "深度睡眠、安穩睡眠", ex_kr: "숙면을 취하는 것이 중요해요.", ex_zh: "保證充足的睡眠非常重要。" },
            { id: 3831, word: "순진하다", meaning: "天真", ex_kr: "그녀는 너무 순진해서 잘 속아요.", ex_zh: "她太天真了，很容易受騙。" },
            { id: 3832, word: "포장마차", meaning: "路邊攤、小吃攤", ex_kr: "포장마차에서 떡볶이를 먹었어요.", ex_zh: "我在街邊小吃攤吃了炒年糕。" },
            { id: 3833, word: "장물", meaning: "贓物", ex_kr: "장물을 거래하는 것은 불법입니다.", ex_zh: "買賣贓物是違法的。" },
            { id: 3834, word: "연락선", meaning: "渡輪", ex_kr: "섬으로 가는 연락선을 탔어요.", ex_zh: "我搭渡輪去了島上。" },
            { id: 3835, word: "사직서", meaning: "辭職信", ex_kr: "부장님께 사직서를 제출했어요.", ex_zh: "我已向部門主管遞交了辭職信。" },
            { id: 3836, word: "시리다", meaning: "感到(身體部位)冰冷", ex_kr: "손이 시려요.", ex_zh: "我的手好冷。" },
            { id: 3837, word: "인턴", meaning: "實習生", ex_kr: "회사에서 인턴으로 일하고 있어요.", ex_zh: "我目前在一家公司當實習生。" },
            { id: 3838, word: "현관", meaning: "前門、入口、門廳", ex_kr: "현관에서 신발을 벗으세요.", ex_zh: "請在入口處脫鞋。" },
            { id: 3839, word: "전처", meaning: "前妻", ex_kr: "그는 전처와 연락하지 않아요.", ex_zh: "他沒有聯絡前妻。" },
            { id: 3840, word: "원기", meaning: "精力、活力", ex_kr: "원기를 회복해야 해요.", ex_zh: "我需要恢復體力。" },
            { id: 3841, word: "배신하다", meaning: "背叛", ex_kr: "믿었던 친구가 저를 배신했어요.", ex_zh: "我信任的朋友背叛了我。" },
            { id: 3842, word: "주전자", meaning: "壺", ex_kr: "주전자에 물을 끓이세요.", ex_zh: "用燒水壺燒開水。" },
            { id: 3843, word: "말대꾸하다", meaning: "反駁、頂撞", ex_kr: "어른에게 말대꾸하지 마세요.", ex_zh: "不要頂撞大人。" },
            { id: 3844, word: "잔뜩", meaning: "盡可能地、充分地", ex_kr: "잔뜩 긴장했어요.", ex_zh: "我當時真的很緊張。" },
            { id: 3845, word: "실연하다", meaning: "在愛情中失望、心碎；表明", ex_kr: "실연의 아픔을 겪었어요.", ex_zh: "我經歷過分手之痛。" },
            { id: 3846, word: "탈락하다", meaning: "退出、被淘汰", ex_kr: "예선에서 탈락했어요.", ex_zh: "我在預賽階段就被淘汰了。" },
            { id: 3847, word: "투명하다", meaning: "明確、透明", ex_kr: "물이 정말 투명해요.", ex_zh: "水質非常清澈。" },
            { id: 3848, word: "밥상", meaning: "餐桌", ex_kr: "온 가족이 밥상에 둘러앉았어요.", ex_zh: "全家人圍坐在餐桌旁。" },
            { id: 3849, word: "오븐", meaning: "烤箱", ex_kr: "오븐에 빵을 구웠어요.", ex_zh: "我在烤箱裡烤了麵包。" },
            { id: 3850, word: "소방관", meaning: "消防隊員", ex_kr: "소방관이 불을 끄고 있어요.", ex_zh: "一名消防員正在滅火。" },
            { id: 3851, word: "장식장", meaning: "展示櫃、櫥櫃", ex_kr: "장식장에 그릇을 진열했어요.", ex_zh: "我把餐具擺放在展示櫃裡。" },
            { id: 3852, word: "명상", meaning: "冥想", ex_kr: "아침마다 명상을 해요.", ex_zh: "我每天早上都會冥想。" },
            { id: 3853, word: "꿇다", meaning: "跪下", ex_kr: "무릎을 꿇고 사과했어요.", ex_zh: "我跪下來道歉。" },
            { id: 3854, word: "출연하다", meaning: "出演", ex_kr: "그는 유명한 영화에 출연했어요.", ex_zh: "他出演過一部著名電影。" },
            { id: 3855, word: "힘내다", meaning: "振作起來、打起精神", ex_kr: "조금만 더 힘내세요.", ex_zh: "再堅持一下。" },
            { id: 3856, word: "영업시간", meaning: "營業時間", ex_kr: "영업시간이 종료되었습니다.", ex_zh: "營業時間已結束。" },
            { id: 3857, word: "씩씩하다", meaning: "要勇敢、要男子氣概", ex_kr: "군인들이 씩씩하게 행진해요.", ex_zh: "士兵們英勇行進。" },
            { id: 3858, word: "야무지다", meaning: "堅強、熟練、精明", ex_kr: "아이가 참 야무지네요.", ex_zh: "這孩子真的很有能力。" },
            { id: 3859, word: "일과표", meaning: "每日日程安排", ex_kr: "일과표를 짰어요.", ex_zh: "我制定了每日計畫表。" },
            { id: 3860, word: "일출", meaning: "日出", ex_kr: "동해에서 일출을 봤어요.", ex_zh: "我在東海邊看到了日出。" },
            { id: 3861, word: "화장대", meaning: "梳妝台", ex_kr: "화장대 위에 화장품이 있어요.", ex_zh: "梳妝台上擺放著化妝品。" },
            { id: 3862, word: "고자질하다", meaning: "告密、出賣", ex_kr: "선생님께 고자질했어요.", ex_zh: "我向老師告狀了。" },
            { id: 3863, word: "강의실", meaning: "演講廳", ex_kr: "강의실에 학생들이 가득 찼어요.", ex_zh: "教室裡坐滿了學生。" },
            { id: 3864, word: "유행가", meaning: "流行歌曲", ex_kr: "거리에서 유행가가 흘러나와요.", ex_zh: "街頭正在播放流行歌曲。" },
            { id: 3865, word: "새치기하다", meaning: "插隊、插隊", ex_kr: "줄을 설 때 새치기하지 마세요.", ex_zh: "請勿插隊。" },
            { id: 3866, word: "터지다", meaning: "爆裂、爆炸", ex_kr: "풍선이 터졌어요.", ex_zh: "氣球爆了。" },
            { id: 3867, word: "화창하다", meaning: "陽光明媚", ex_kr: "봄날처럼 화창해요.", ex_zh: "今天陽光明媚，如同春日。" },
            { id: 3868, word: "시시하다", meaning: "乏味、無趣；瑣碎、微不足道", ex_kr: "영화가 너무 시시했어요.", ex_zh: "這部電影太無聊了。" },
            { id: 3869, word: "허리띠", meaning: "腰帶", ex_kr: "허리띠를 졸라맸어요.", ex_zh: "我係緊了皮帶。" },
            { id: 3870, word: "피해자", meaning: "受害者", ex_kr: "피해자에게 보상해야 합니다.", ex_zh: "你必須賠償受害者。" },
            { id: 3871, word: "추가하다", meaning: "新增、補充", ex_kr: "목록에 이름을 추가했어요.", ex_zh: "我向清單中添加了一個名字。" },
            { id: 3872, word: "대장", meaning: "領導者、指揮官、隊長；大腸", ex_kr: "그가 우리 팀의 대장입니다.", ex_zh: "他是我們隊的隊長。" },
            { id: 3873, word: "야단맞다", meaning: "被狠狠訓斥", ex_kr: "숙제를 안 해서 야단맞았어요.", ex_zh: "我因為沒做作業被訓了一頓。" },
            { id: 3874, word: "뺏다", meaning: "奪走、搶奪", ex_kr: "남의 것을 뺏으면 안 돼요.", ex_zh: "你不可拿走別人的東西。" },
            { id: 3875, word: "삽", meaning: "鏟", ex_kr: "삽으로 흙을 팠어요.", ex_zh: "我用鏟子挖了土。" },
            { id: 3876, word: "고아원", meaning: "孤兒院", ex_kr: "고아원에서 봉사활동을 했어요.", ex_zh: "我曾在孤兒院做過義工。" },
            { id: 3877, word: "구역", meaning: "區域、地帶、行政區", ex_kr: "이곳은 주차 금지 구역입니다.", ex_zh: "這裡是禁止停車區域。" },
            { id: 3878, word: "직전", meaning: "就在", ex_kr: "출발 직전에 도착했어요.", ex_zh: "我趕在起飛前到達。" },
            { id: 3879, word: "가버리다", meaning: "離開", ex_kr: "그는 뒤도 안 돌아보고 가버렸어요.", ex_zh: "他頭也不回地離開了。" },
            { id: 3880, word: "팔씨름하다", meaning: "掰手腕", ex_kr: "친구와 팔씨름해서 이겼어요.", ex_zh: "我贏了和朋友的掰手腕比賽。" },
            { id: 3881, word: "탄탄하다", meaning: "堅固、強勁、穩健", ex_kr: "기초가 탄탄해야 해요.", ex_zh: "你需要打下堅實的基礎。" },
            { id: 3882, word: "정오", meaning: "中午", ex_kr: "정오에 만나기로 했어요.", ex_zh: "我們約定中午見面。" },
            { id: 3883, word: "올바로", meaning: "誠實、正直、恰當地", ex_kr: "행동을 올바로 하세요.", ex_zh: "舉止得體。" },
            { id: 3884, word: "솥", meaning: "鍪", ex_kr: "솥에 밥을 지었어요.", ex_zh: "我用鍋子煮了米飯。" },
            { id: 3885, word: "다락", meaning: "閣樓", ex_kr: "다락에 짐을 올렸어요.", ex_zh: "我把行李放到閣樓裡了。" },
            { id: 3886, word: "싸늘하다", meaning: "涼爽、寒冷", ex_kr: "반응이 싸늘했어요.", ex_zh: "反應冷淡。" },
            { id: 3887, word: "뒤처지다", meaning: "被留下", ex_kr: "유행에 뒤처지기 싫어요.", ex_zh: "我不想落伍。" },
            { id: 3888, word: "통통하다", meaning: "豐滿、圓潤", ex_kr: "아기 볼이 통통해요.", ex_zh: "寶寶的臉頰肉嘟嘟的。" },
            { id: 3889, word: "파업", meaning: "罷工、退場", ex_kr: "노조가 파업을 선언했어요.", ex_zh: "工會宣布罷工。" },
            { id: 3890, word: "업다", meaning: "背在背上", ex_kr: "아이를 등에 업었어요.", ex_zh: "我背著孩子。" },
            { id: 3891, word: "불타다", meaning: "燃燒、著火", ex_kr: "집이 활활 불탔어요.", ex_zh: "房子燃起了熊熊大火。" },
            { id: 3892, word: "뒤돌아보다", meaning: "回顧過去", ex_kr: "길을 가다가 뒤돌아보았어요.", ex_zh: "我邊走邊回頭看了一眼。" },
            { id: 3893, word: "머물다", meaning: "留下、繼續", ex_kr: "그곳에 며칠 동안 머물렀어요.", ex_zh: "我在那裡待了幾天。" },
            { id: 3894, word: "썩다", meaning: "腐爛、變質", ex_kr: "이가 썩어서 치과에 갔어요.", ex_zh: "我去看牙醫是因為我的牙齒蛀了。" },
            { id: 3895, word: "외딴", meaning: "偏遠地區", ex_kr: "외딴 섬에 살고 있어요.", ex_zh: "我住在一個偏遠的島嶼。" },
            { id: 3896, word: "화랑", meaning: "美術館", ex_kr: "화랑에서 그림을 감상했어요.", ex_zh: "我在畫廊裡欣賞了畫作。" },
            { id: 3897, word: "안부", meaning: "關於某人的消息", ex_kr: "부모님께 안부 전해 주세요.", ex_zh: "請代我向我的父母問好。" },
            { id: 3898, word: "탈출하다", meaning: "逃脫", ex_kr: "비상구로 탈출하세요.", ex_zh: "從緊急出口逃生。" },
            { id: 3899, word: "사진기", meaning: "相機", ex_kr: "사진기로 추억을 남기세요.", ex_zh: "用相機記錄美好回憶。" },
            { id: 3900, word: "통제", meaning: "控制", ex_kr: "교통 통제가 이루어지고 있어요.", ex_zh: "交通管制措施已生效。" },
            { id: 3901, word: "회화", meaning: "對話；繪畫", ex_kr: "영어 회화 학원에 다녀요.", ex_zh: "我在英語會話培訓機構學習。" },
            { id: 3902, word: "또래", meaning: "同齡群體", ex_kr: "또래 친구들과 잘 어울려요.", ex_zh: "我和同齡人相處得很好。" },
            { id: 3903, word: "뾰족하다", meaning: "尖銳的、鋒利的", ex_kr: "연필심이 뾰족해요.", ex_zh: "鉛筆芯很尖。" },
            { id: 3904, word: "어리석다", meaning: "愚蠢的、笨的、傻的", ex_kr: "그런 어리석은 짓은 하지 마세요.", ex_zh: "別做這麼愚蠢的事。" },
            { id: 3905, word: "친숙하다", meaning: "熟悉", ex_kr: "이 멜로디는 매우 친숙해요.", ex_zh: "這首旋律非常熟悉。" },
            { id: 3906, word: "이별하다", meaning: "分開、分離", ex_kr: "연인과 이별했어요.", ex_zh: "我和戀人分手了。" },
            { id: 3907, word: "함정", meaning: "陷阱", ex_kr: "함정에 빠졌어요.", ex_zh: "我掉進陷阱了。" },
            { id: 3908, word: "하찮다", meaning: "瑣碎的、微不足道的、無關緊要的", ex_kr: "하찮은 일에 신경 쓰지 마세요.", ex_zh: "不要為瑣事煩惱。" },
            { id: 3909, word: "그리움", meaning: "渴望、嚮往", ex_kr: "고향에 대한 그리움이 커요.", ex_zh: "我非常想念我的家鄉。" },
            { id: 3910, word: "정열적", meaning: "熱情的", ex_kr: "그녀는 매우 정열적인 댄서예요.", ex_zh: "她是一位充滿熱情的舞者。" },
            { id: 3911, word: "표준어", meaning: "標準語言", ex_kr: "방송에서는 표준어를 사용해야 합니다.", ex_zh: "廣播中必須使用標準語言。" },
            { id: 3912, word: "급여", meaning: "薪資", ex_kr: "급여가 통장에 입금되었어요.", ex_zh: "我的薪水已經存入我的帳戶了。" },
            { id: 3913, word: "재다", meaning: "測量、計量", ex_kr: "키를 재보았어요.", ex_zh: "我量了量身高。" },
            { id: 3914, word: "동점", meaning: "平局、比數相同", ex_kr: "경기는 동점으로 끝났어요.", ex_zh: "比賽最終以平手收場。" },
            { id: 3915, word: "앞지르다", meaning: "超越、超過、領先", ex_kr: "앞차를 앞질렀어요.", ex_zh: "我超過了前面的車。" },
            { id: 3916, word: "고무", meaning: "橡皮", ex_kr: "고무 장갑을 끼고 설거지를 해요.", ex_zh: "我洗碗時會戴橡膠手套。" },
            { id: 3917, word: "문방구", meaning: "文具；文具店", ex_kr: "문방구에서 연필을 샀어요.", ex_zh: "我在文具店買了一支鉛筆。" },
            { id: 3918, word: "논", meaning: "稻田", ex_kr: "가을 들판의 논이 황금빛이에요.", ex_zh: "秋日稻田裡的稻田一片金黃。" },
            { id: 3919, word: "명심하다", meaning: "記住、切記", ex_kr: "제 말을 명심하세요.", ex_zh: "請記住我的話。" },
            { id: 3920, word: "응답", meaning: "回答、回應", ex_kr: "무전에 응답하라.", ex_zh: "回應無線電呼叫。" },
            { id: 3921, word: "사기꾼", meaning: "騙子、詐騙犯", ex_kr: "그는 희대의 사기꾼입니다.", ex_zh: "他是世紀大騙子。" },
            { id: 3922, word: "포위하다", meaning: "包圍、環繞", ex_kr: "경찰이 건물을 포위했어요.", ex_zh: "警方包圍了這棟大樓。" },
            { id: 3923, word: "계산원", meaning: "出納員", ex_kr: "계산원이 바코드를 찍고 있어요.", ex_zh: "收銀員正在掃描條碼。" },
            { id: 3924, word: "꼴불견", meaning: "難看", ex_kr: "술 취한 모습이 정말 꼴불견이에요.", ex_zh: "你喝醉的時候看起來很醜。" },
            { id: 3925, word: "정형외과", meaning: "骨科", ex_kr: "다리를 다쳐서 정형외과에 갔어요.", ex_zh: "我腿受傷了，所以我去了骨科診所。" },
            { id: 3926, word: "청구서", meaning: "帳單、發票", ex_kr: "요금 청구서가 날아왔어요.", ex_zh: "帳單寄到了。" },
            { id: 3927, word: "재계", meaning: "金融界、商界", ex_kr: "재계 인사들이 모였어요.", ex_zh: "商界領袖齊聚一堂。" },
            { id: 3928, word: "도저히", meaning: "完全不可能、絕對不可能", ex_kr: "도저히 이해할 수 없어요.", ex_zh: "我完全無法理解。" },
            { id: 3929, word: "교과목", meaning: "科目、課程", ex_kr: "가장 좋아하는 교과목이 뭐예요?", ex_zh: "你最喜歡的科目是什麼？" },
            { id: 3930, word: "봉사활동", meaning: "社區服務活動", ex_kr: "주말마다 봉사활동을 해요.", ex_zh: "我每個週末都做義工。" },
            { id: 3931, word: "옛일", meaning: "往事", ex_kr: "다 지난 옛일입니다.", ex_zh: "一切都已成為過去。" },
            { id: 3932, word: "차이다", meaning: "被踢；被甩", ex_kr: "여자 친구에게 차였어요.", ex_zh: "我被女朋友甩了。" },
            { id: 3933, word: "다람쥐", meaning: "松鼠", ex_kr: "나무 위에 다람쥐가 있어요.", ex_zh: "樹上有一隻松鼠。" },
            { id: 3934, word: "말짱하다", meaning: "完美無瑕、整潔俐落；完全沒問題", ex_kr: "술을 마셨는데 정신이 말짱해요.", ex_zh: "我喝了酒，但我現在非常清醒。" },
            { id: 3935, word: "김새다", meaning: "失去興趣、熱情、感到失望；掃興", ex_kr: "비밀을 미리 알아버려서 김샜어요.", ex_zh: "我事先知道了這個秘密，所以氣氛被破壞了。" },
            { id: 3936, word: "맹세하다", meaning: "發誓、宣誓", ex_kr: "다시는 거짓말을 하지 않겠다고 맹세해요.", ex_zh: "我發誓我以後再也不會說謊了。" },
            { id: 3937, word: "진실되다", meaning: "要真實、誠實、真誠、實在", ex_kr: "진실된 마음으로 사과하세요.", ex_zh: "真心誠意地道歉。" },
            { id: 3938, word: "감추다", meaning: "隱藏", ex_kr: "감정을 감추기 힘들어요.", ex_zh: "我很難掩飾自己的情緒。" },
            { id: 3939, word: "처자", meaning: "妻子和孩子；少女", ex_kr: "먹여 살릴 처자가 있어요.", ex_zh: "我還要養家。" },
            { id: 3940, word: "충전기", meaning: "充電器", ex_kr: "휴대폰 충전기를 빌려주세요.", ex_zh: "請借我一個手機充電器。" },
            { id: 3941, word: "공지하다", meaning: "宣布、通知", ex_kr: "변경 사항을 공지해 주세요.", ex_zh: "請公佈變更內容。" },
            { id: 3942, word: "교양", meaning: "精緻、優雅", ex_kr: "교양 과목을 수강했어요.", ex_zh: "我選修了一門人文課程。" },
            { id: 3943, word: "수줍다", meaning: "害羞", ex_kr: "그녀는 수줍게 웃었어요.", ex_zh: "她靦腆地笑了笑。" },
            { id: 3944, word: "얕다", meaning: "淺", ex_kr: "강물이 얕아서 건널 수 있어요.", ex_zh: "河水很淺，所以你可以過河。" },
            { id: 3945, word: "후보", meaning: "候選人、提名人", ex_kr: "대통령 후보가 연설을 해요.", ex_zh: "總統候選人發表演說。" },
            { id: 3946, word: "양초", meaning: "蠟燭", ex_kr: "정전이 되어서 양초를 켰어요.", ex_zh: "停電了，所以我點燃了一根蠟燭。" },
            { id: 3947, word: "높임말", meaning: "敬語(風格、用詞)", ex_kr: "어른에게는 높임말을 써야 해요.", ex_zh: "和長輩說話時要使用敬語。" },
            { id: 3948, word: "집단", meaning: "團體", ex_kr: "집단 행동을 자제해 주세요.", ex_zh: "請勿採取集體行動。" },
            { id: 3949, word: "배송", meaning: "運輸、配送", ex_kr: "배송 조회를 해보세요.", ex_zh: "請查詢配送狀態。" },
            { id: 3950, word: "파트너", meaning: "夥伴", ex_kr: "댄스 파트너를 구하고 있어요.", ex_zh: "我在找舞伴。" },
            { id: 3951, word: "숙이다", meaning: "下降、降低、彎曲", ex_kr: "고개를 숙여 인사했어요.", ex_zh: "我低頭致意。" },
            { id: 3952, word: "소심하다", meaning: "膽怯、害羞", ex_kr: "그는 소심해서 말을 잘 못해요.", ex_zh: "他個性膽小，所以不太會說話。" },
            { id: 3953, word: "먹이", meaning: "食物、飼料", ex_kr: "동물들에게 먹이를 주지 마세요.", ex_zh: "不要餵食動物。" },
            { id: 3954, word: "고집", meaning: "固執、堅持", ex_kr: "옹고집을 꺾을 수가 없어요.", ex_zh: "我無法改變他的固執。" },
            { id: 3955, word: "원칙", meaning: "原則、一般規則", ex_kr: "원칙을 지키는 것이 중요해요.", ex_zh: "堅持原則很重要。" },
            { id: 3956, word: "앞서", meaning: "之前、更早", ex_kr: "앞서 말한 내용을 기억하세요.", ex_zh: "請記住之前說過的話。" },
            { id: 3957, word: "연주회", meaning: "音樂會、獨奏會", ex_kr: "피아노 연주회에 초대받았어요.", ex_zh: "我受邀去聽了一場鋼琴獨奏會。" },
            { id: 3958, word: "되뇌다", meaning: "重複、例如(多次重複)", ex_kr: "같은 말을 계속 되뇌었어요.", ex_zh: "我一直重複著同樣的話。" },
            { id: 3959, word: "확대하다", meaning: "放大、放大", ex_kr: "사진을 확대해 보세요.", ex_zh: "放大照片。" },
            { id: 3960, word: "벽보", meaning: "海報", ex_kr: "선거 벽보가 붙어 있어요.", ex_zh: "選舉海報已經張貼了。" },
            { id: 3961, word: "녹음기", meaning: "錄音機", ex_kr: "녹음기로 목소리를 녹음했어요.", ex_zh: "我用錄音機錄下了自己的聲音。" },
            { id: 3962, word: "실컷", meaning: "達到自己滿意的程度、只要自己喜歡", ex_kr: "오늘은 실컷 놀아요.", ex_zh: "今天就讓我們盡情玩耍吧。" },
            { id: 3963, word: "잠수하다", meaning: "潛水、潛入水下", ex_kr: "바닷속으로 잠수했어요.", ex_zh: "我跳入了大海。" },
            { id: 3964, word: "영화제", meaning: "電影節", ex_kr: "부산 국제 영화제가 열려요.", ex_zh: "釜山國際電影節正在舉行。" },
            { id: 3965, word: "신입사원", meaning: "新入職員工", ex_kr: "신입사원 연수를 받았어요.", ex_zh: "我接受了新進員工訓練。" },
            { id: 3966, word: "아웃", meaning: "出去", ex_kr: "타자가 삼진 아웃 당했어요.", ex_zh: "擊球手被三振出局。" },
            { id: 3967, word: "교훈", meaning: "教訓、寓意", ex_kr: "이 이야기는 큰 교훈을 줍니다.", ex_zh: "這個故事蘊含著深刻的道理。" },
            { id: 3968, word: "해수", meaning: "海水", ex_kr: "해수 목욕이 피부에 좋대요.", ex_zh: "他們說海水浴對皮膚有好處。" },
            { id: 3969, word: "들키다", meaning: "被抓、被發現", ex_kr: "몰래 먹다가 들켰어요.", ex_zh: "我偷偷吃東西被抓到了。" },
            { id: 3970, word: "고사하다", meaning: "拒絕、罷休；枯萎", ex_kr: "초대를 정중히 고사했어요.", ex_zh: "我禮貌地拒絕了邀約。" },
            { id: 3971, word: "등장하다", meaning: "出現、露面", ex_kr: "무대에 가수가 등장했어요.", ex_zh: "一位歌手登台亮相。" },
            { id: 3972, word: "알몸", meaning: "裸體", ex_kr: "알몸으로 수영하면 안 돼요.", ex_zh: "你不應該裸泳。" },
            { id: 3973, word: "이롭다", meaning: "要有所作為、要做好事", ex_kr: "건강에 이로운 음식입니다.", ex_zh: "它是一種健康食品。" },
            { id: 3974, word: "연수", meaning: "培訓、學習", ex_kr: "해외 연수를 다녀왔어요.", ex_zh: "我去海外參加了訓練旅行。" },
            { id: 3975, word: "전시하다", meaning: "展出、展示", ex_kr: "박물관에 유물을 전시해요.", ex_zh: "我們在博物館展出文物。" },
            { id: 3976, word: "애완동물", meaning: "寵物", ex_kr: "아파트에서 애완동물을 키울 수 있나요?", ex_zh: "我可以在公寓裡養寵物嗎？" },
            { id: 3977, word: "팔꿈치", meaning: "彎頭", ex_kr: "팔꿈치를 다쳤어요.", ex_zh: "我的手肘受傷了。" },
            { id: 3978, word: "널리", meaning: "廣泛地、遍及各地", ex_kr: "이 소식을 널리 알리세요.", ex_zh: "請大家幫忙宣傳一下。" },
            { id: 3979, word: "손해", meaning: "損失、損害", ex_kr: "주식 투자로 큰 손해를 봤어요.", ex_zh: "我在股票投資中損失慘重。" },
            { id: 3980, word: "상견례", meaning: "(新郎新娘雙方家庭之間的)會面", ex_kr: "내일이 상견례 날이에요.", ex_zh: "明天是兩個家庭正式會面的日子。" },
            { id: 3981, word: "가곡", meaning: "歌曲", ex_kr: "아름다운 가곡을 불렀어요.", ex_zh: "我唱了一首優美的藝術歌曲。" },
            { id: 3982, word: "양쪽", meaning: "雙方", ex_kr: "양쪽 말을 다 들어봐야 해요.", ex_zh: "你必須聽取雙方的意見。" },
            { id: 3983, word: "솜", meaning: "棉布", ex_kr: "이 이불은 솜으로 만들었어요.", ex_zh: "這床被子是棉質的。" },
            { id: 3984, word: "한계", meaning: "極限、邊界", ex_kr: "인내심의 한계를 느껴요.", ex_zh: "我覺得我的耐心快要耗盡了。" },
            { id: 3985, word: "단위", meaning: "單位、度量", ex_kr: "화폐 단위가 무엇입니까?", ex_zh: "貨幣單位是什麼？" },
            { id: 3986, word: "신중하다", meaning: "謹慎、審慎、小心", ex_kr: "신중하게 결정하세요.", ex_zh: "請慎重決定。" },
            { id: 3987, word: "연속", meaning: "系列、連勝、延續", ex_kr: "3년 연속 우승을 차지했어요.", ex_zh: "我們連續三年獲勝。" },
            { id: 3988, word: "선전", meaning: "宣傳、廣告", ex_kr: "과장 선전에 속지 마세요.", ex_zh: "不要被誇大的廣告所蒙蔽。" },
            { id: 3989, word: "번갈다", meaning: "輪流", ex_kr: "운전을 번갈아 가면서 했어요.", ex_zh: "我們輪流開車。" },
            { id: 3990, word: "임시", meaning: "暫時的", ex_kr: "오늘은 임시 공휴일입니다.", ex_zh: "今天是臨時公共假日。" },
            { id: 3991, word: "저항하다", meaning: "抵抗", ex_kr: "적의 침입에 저항했어요.", ex_zh: "我們抵抗了敵人的入侵。" },
            { id: 3992, word: "녹화", meaning: "錄影", ex_kr: "방송을 녹화해 두었다.", ex_zh: "我錄下了廣播。" },
            { id: 3993, word: "세균", meaning: "細菌、病菌", ex_kr: "손에는 세균이 많아요.", ex_zh: "你手上有很多細菌。" },
            { id: 3994, word: "파괴하다", meaning: "摧毀、毀壞", ex_kr: "환경을 파괴하지 맙시다.", ex_zh: "我們不要破壞環境。" },
            { id: 3995, word: "모집하다", meaning: "招募、邀請", ex_kr: "신입 회원을 모집합니다.", ex_zh: "我們正在招募新成員。" },
            { id: 3996, word: "혼동하다", meaning: "使混亂、混淆", ex_kr: "공과 사를 혼동하지 마세요.", ex_zh: "不要將公共事務和私人事務混淆。" },
            { id: 3997, word: "연인", meaning: "親愛的、愛人", ex_kr: "두 사람은 연인 사이입니다.", ex_zh: "兩人是戀人。" },
            { id: 3998, word: "골탕먹다", meaning: "遭受重大損失、被欺騙", ex_kr: "친구의 장난에 골탕먹었다.", ex_zh: "我被朋友惡作劇了。" },
            { id: 3999, word: "이어폰", meaning: "耳機", ex_kr: "이어폰을 끼고 음악을 들었다.", ex_zh: "我戴上耳機，開始聽音樂。" },
            { id: 4000, word: "급히", meaning: "匆忙地、急忙地", ex_kr: "급히 서두르다가 넘어졌어요.", ex_zh: "我匆忙趕路時摔倒了。" },
            { id: 4001, word: "기자회견", meaning: "新聞發布會", ex_kr: "대통령이 기자회견을 열었다.", ex_zh: "總統召開了記者會。" },
            { id: 4002, word: "화장지", meaning: "面紙、衛生紙", ex_kr: "화장지 좀 주세요.", ex_zh: "請給我一些衛生紙。" },
            { id: 4003, word: "난로", meaning: "暖氣、爐灶", ex_kr: "난로 옆에 있어서 따뜻해요.", ex_zh: "因為挨著暖氣，所以很溫暖。" },
            { id: 4004, word: "뛰어나다", meaning: "傑出、優秀", ex_kr: "그녀는 뛰어난 재능을 가지고 있다.", ex_zh: "她才華橫溢。" },
            { id: 4005, word: "갈등", meaning: "衝突", ex_kr: "친구와 갈등을 겪고 있어요.", ex_zh: "我和朋友之間發生了衝突。" },
            { id: 4006, word: "초기", meaning: "早期、開始", ex_kr: "감기는 초기에 치료해야 해요.", ex_zh: "感冒初期就應該及時治療。" },
            { id: 4007, word: "탓", meaning: "原因、責備", ex_kr: "내 탓이 아니에요.", ex_zh: "這不是我的錯。" },
            { id: 4008, word: "군소리", meaning: "不必要的評論", ex_kr: "군소리 말고 빨리 해.", ex_zh: "別抱怨了，趕快去做。" },
            { id: 4009, word: "회복하다", meaning: "恢復、重新獲得、好轉", ex_kr: "환자가 건강을 회복했다.", ex_zh: "患者已恢復健康。" },
            { id: 4010, word: "이성적", meaning: "理性、合理", ex_kr: "감정보다 이성적으로 판단해라.", ex_zh: "要理性判斷，不要感情用事。" },
            { id: 4011, word: "끝장", meaning: "結束、結論、終止", ex_kr: "이제 우리 관계는 끝장이다.", ex_zh: "我們的關係結束了。" },
            { id: 4012, word: "이론", meaning: "理論", ex_kr: "그 이론은 실생활에 적용하기 어렵다.", ex_zh: "這種理論很難應用在現實生活上。" },
            { id: 4013, word: "한반도", meaning: "朝鮮半島", ex_kr: "한반도의 평화를 기원합니다.", ex_zh: "我祈禱朝鮮半島和平。" },
            { id: 4014, word: "사기", meaning: "欺詐、欺騙、騙局；士氣、鬥志", ex_kr: "그는 사기 혐의로 구속되었다.", ex_zh: "他因涉嫌詐騙被捕。" },
            { id: 4015, word: "잽싸다", meaning: "要快速、敏捷、靈活", ex_kr: "고양이가 잽싸게 도망갔다.", ex_zh: "貓咪迅速跑開了。" },
            { id: 4016, word: "흘러내리다", meaning: "向下流淌、涓涓細流", ex_kr: "눈물이 볼을 타고 흘러내렸다.", ex_zh: "淚水順著我的臉頰流了下來。" },
            { id: 4017, word: "어긋나다", meaning: "持相反意見、步調不一致；出錯", ex_kr: "예상이 완전히 어긋났다.", ex_zh: "這個預測完全錯誤。" },
            { id: 4018, word: "주의사항", meaning: "注意事項", ex_kr: "사용 전 주의사항을 읽어주세요.", ex_zh: "使用前請閱讀注意事項。" },
            { id: 4019, word: "풍부하다", meaning: "充足、豐盛", ex_kr: "이 과일은 비타민이 풍부하다.", ex_zh: "這種水果富含維生素。" },
            { id: 4020, word: "이륙하다", meaning: "起飛", ex_kr: "비행기가 막 이륙했다.", ex_zh: "飛機剛剛起飛。" },
            { id: 4021, word: "질색하다", meaning: "憎惡、厭惡", ex_kr: "나는 뱀이라면 질색한다.", ex_zh: "我極其討厭蛇。" },
            { id: 4022, word: "밋밋하다", meaning: "平淡的、乏味的", ex_kr: "이 음식은 맛이 좀 밋밋하다.", ex_zh: "這食物味道有點淡。" },
            { id: 4023, word: "웬만하다", meaning: "尚可接受、還不錯", ex_kr: "웬만하면 그냥 참으세요.", ex_zh: "如果可以的話，請耐心等待。" },
            { id: 4024, word: "인근", meaning: "附近", ex_kr: "사고 현장 인근에 경찰이 배치되었다.", ex_zh: "警方已在事故現場附近部署警力。" },
            { id: 4025, word: "맺다", meaning: "產生、生產；形成", ex_kr: "좋은 결실을 맺기를 바랍니다.", ex_zh: "祝你取得好成績。" },
            { id: 4026, word: "건배", meaning: "乾杯", ex_kr: "모두 잔을 들고 건배합시다.", ex_zh: "大家，讓我們舉杯慶祝吧！" },
            { id: 4027, word: "무지", meaning: "無知、愚蠢；非常、極其", ex_kr: "무지는 죄가 아니다.", ex_zh: "無知並非罪過。" },
            { id: 4028, word: "방울", meaning: "一滴液體；鈴鐺", ex_kr: "땀방울이 흘러내렸다.", ex_zh: "汗水順著臉頰滴落。" },
            { id: 4029, word: "멋대로", meaning: "隨心所欲、自私自利", ex_kr: "네 멋대로 하지 마.", ex_zh: "不要隨心所欲。" },
            { id: 4030, word: "먼지", meaning: "灰塵", ex_kr: "방에 먼지가 많다.", ex_zh: "房間裡有很多灰塵。" },
            { id: 4031, word: "그저", meaning: "無緣無故", ex_kr: "그는 그저 웃기만 했다.", ex_zh: "他只是笑了笑。" },
            { id: 4032, word: "데뷔하다", meaning: "首次亮相", ex_kr: "그는 가수로 데뷔했다.", ex_zh: "他以歌手身份出道。" },
            { id: 4033, word: "출렁거리다", meaning: "潑灑、濺灑、滾動", ex_kr: "배가 파도에 출렁거렸다.", ex_zh: "小船在波浪中搖晃。" },
            { id: 4034, word: "주정하다", meaning: "醉酒鬧事", ex_kr: "술 마시고 주정하지 마세요.", ex_zh: "不要喝醉後胡鬧。" },
            { id: 4035, word: "재난", meaning: "災難、浩劫", ex_kr: "자연 재난에 대비해야 한다.", ex_zh: "我們必須做好應對自然災害的準備。" },
            { id: 4036, word: "원수", meaning: "敵人", ex_kr: "부모님의 원수를 갚겠다.", ex_zh: "我一定會為父母報仇。" },
            { id: 4037, word: "부딪치다", meaning: "碰撞、撞上、相撞", ex_kr: "길을 걷다 전봇대에 부딪쳤다.", ex_zh: "我走在街上時撞到了一根電線桿。" },
            { id: 4038, word: "절망", meaning: "絕望、無望", ex_kr: "절망 속에서도 희망을 잃지 않았다.", ex_zh: "即使在絕望中，我也沒有失去希望。" },
            { id: 4039, word: "모질다", meaning: "嚴厲的、苛刻的、苛刻的", ex_kr: "모진 시련을 이겨냈다.", ex_zh: "克服了嚴峻的考驗。" },
            { id: 4040, word: "언론", meaning: "新聞界、媒體", ex_kr: "언론의 자유는 보장되어야 한다.", ex_zh: "必須保障新聞自由。" },
            { id: 4041, word: "크레파스", meaning: "蠟筆", ex_kr: "아이가 크레파스로 그림을 그린다.", ex_zh: "孩子用蠟筆畫畫。" },
            { id: 4042, word: "녀석", meaning: "夥計、同夥", ex_kr: "그 녀석 참 재미있는 친구네.", ex_zh: "那傢伙真是個很有趣的朋友。" },
            { id: 4043, word: "학과", meaning: "系、專業；", ex_kr: "어느 학과를 전공하세요?", ex_zh: "你主修哪個專業？" },
            { id: 4044, word: "암소", meaning: "乳牛", ex_kr: "목장에 암소가 풀을 뜯고 있다.", ex_zh: "一頭牛正在牧場吃草。" },
            { id: 4045, word: "관습", meaning: "習俗、慣例", ex_kr: "낡은 관습을 타파해야 한다.", ex_zh: "我們必須打破舊習俗。" },
            { id: 4046, word: "박다", meaning: "插入、錘擊、驅動", ex_kr: "벽에 못을 박았다.", ex_zh: "我把釘子釘進牆裡了。" },
            { id: 4047, word: "반응", meaning: "反應", ex_kr: "관객들의 반응이 뜨거웠다.", ex_zh: "觀眾反應熱烈。" },
            { id: 4048, word: "스킨십", meaning: "觸摸", ex_kr: "연인 사이에는 스킨십이 중요하다.", ex_zh: "身體上的親密關係對戀人來說很重要。" },
            { id: 4049, word: "교정하다", meaning: "校對；糾正", ex_kr: "발음을 교정했다.", ex_zh: "我糾正了我的發音。" },
            { id: 4050, word: "맨손", meaning: "赤手", ex_kr: "그는 맨손으로 성공했다.", ex_zh: "他徒手取得了成功。" },
            { id: 4051, word: "기절하다", meaning: "昏厥、暈倒", ex_kr: "너무 놀라서 기절할 뻔했다.", ex_zh: "我太驚訝了，差點暈過去。" },
            { id: 4052, word: "성형수술", meaning: "整型手術", ex_kr: "성형수술을 고민 중이다.", ex_zh: "我正在考慮做整形手術。" },
            { id: 4053, word: "정지하다", meaning: "停止、停下", ex_kr: "경찰의 신호에 차가 정지했다.", ex_zh: "汽車在警察信號燈前停了下來。" },
            { id: 4054, word: "암", meaning: "癌症", ex_kr: "그는 암 투병 중이다.", ex_zh: "他正在與癌症作鬥爭。" },
            { id: 4055, word: "혈액", meaning: "血", ex_kr: "혈액형이 어떻게 되세요?", ex_zh: "你的血型是？" },
            { id: 4056, word: "껍데기", meaning: "殼、皮", ex_kr: "조개 껍데기가 해변에 널려 있다.", ex_zh: "沙灘上散落著貝殼。" },
            { id: 4057, word: "법칙", meaning: "法律、規則", ex_kr: "자연의 법칙을 거스를 순 없다.", ex_zh: "你無法違背自然法則。" },
            { id: 4058, word: "육지", meaning: "土地", ex_kr: "배가 육지에 도착했다.", ex_zh: "船隻抵達陸地。" },
            { id: 4059, word: "결승", meaning: "決賽", ex_kr: "우리 팀이 결승에 진출했다.", ex_zh: "我們隊晉級決賽了。" },
            { id: 4060, word: "미끈미끈하다", meaning: "非常滑溜、非常光滑", ex_kr: "바닥이 기름 때문에 미끈미끈하다.", ex_zh: "地板上有油漬，所以很滑。" },
            { id: 4061, word: "감염", meaning: "感染", ex_kr: "바이러스 감염을 막기 위해 손을 씻자.", ex_zh: "讓我們勤洗手，預防病毒感染。" },
            { id: 4062, word: "밤새우다", meaning: "熬夜", ex_kr: "시험 공부하느라 밤새웠다.", ex_zh: "我熬夜複習考試。" },
            { id: 4063, word: "오싹하다", meaning: "打了個寒顫、感到一陣寒意", ex_kr: "무서운 이야기를 듣고 등이 오싹했다.", ex_zh: "聽了那個恐怖故事，我全身起了雞皮疙瘩。" },
            { id: 4064, word: "탐내다", meaning: "想要、渴望、垂涎", ex_kr: "남의 물건을 탐내지 마라.", ex_zh: "不要貪戀他人的財物。" },
            { id: 4065, word: "유리하다", meaning: "有利的、有優勢的", ex_kr: "상황이 우리에게 유리하다.", ex_zh: "形勢對我們有利。" },
            { id: 4066, word: "진학하다", meaning: "進入(更高層次的)學校", ex_kr: "그는 대학원에 진학했다.", ex_zh: "他後來繼續攻讀研究生。" },
            { id: 4067, word: "낭만", meaning: "浪漫", ex_kr: "가을 바다에는 낭만이 있다.", ex_zh: "秋日的大海充滿浪漫氣息。" },
            { id: 4068, word: "근시", meaning: "近視", ex_kr: "근시라서 안경을 쓴다.", ex_zh: "我戴眼鏡是因為我近視。" },
            { id: 4069, word: "조명하다", meaning: "照亮、突出", ex_kr: "이 사건을 집중 조명했다.", ex_zh: "這個案例受到了關注。" },
            { id: 4070, word: "아담하다", meaning: "整齊；嬌小", ex_kr: "집이 작고 아담하다.", ex_zh: "房子雖小但很溫馨。" },
            { id: 4071, word: "원점", meaning: "起點", ex_kr: "계획이 원점으로 돌아갔다.", ex_zh: "計劃又回到了原點。" },
            { id: 4072, word: "수명", meaning: "生命、壽命", ex_kr: "한국인의 평균 수명이 늘어났다.", ex_zh: "韓國人的平均壽命有所提高。" },
            { id: 4073, word: "휴식", meaning: "休息、放鬆", ex_kr: "충분한 휴식이 필요하다.", ex_zh: "需要充足的休息。" },
            { id: 4074, word: "사막", meaning: "沙漠", ex_kr: "사막에서 오아시스를 발견했다.", ex_zh: "我在沙漠中發現了一片綠洲。" },
            { id: 4075, word: "사연", meaning: "故事、情境", ex_kr: "그 노래에는 슬픈 사연이 있다.", ex_zh: "這首歌背後有著悲傷的故事。" },
            { id: 4076, word: "단조롭다", meaning: "單調乏味", ex_kr: "일상이 너무 단조롭다.", ex_zh: "日常生活太單調了。" },
            { id: 4077, word: "외향적", meaning: "外向的、開朗的", ex_kr: "제 성격은 외향적이에요.", ex_zh: "我性格外向。" },
            { id: 4078, word: "불어", meaning: "法語", ex_kr: "그녀는 불어를 유창하게 한다.", ex_zh: "她法語說得很流利。" },
            { id: 4079, word: "출신", meaning: "本地的、起源", ex_kr: "그는 부산 출신이다.", ex_zh: "他來自釜山。" },
