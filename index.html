<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧單字卡 - 學習中心</title>
    
    <link rel="preload" href="./icon.png" as="image">
    
    <!-- PWA 核心設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="智慧單字卡">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="icon" type="image/png" href="./icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            position: fixed; 
        }

        .app-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-width: 2px;
        }
        .app-card:active {
            transform: scale(0.97);
            background-color: #ffffff;
        }

        /* 仿拾光故事集的高級毛玻璃安裝提示框 */
        #installPrompt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            z-index: 100;
            display: none; 
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            animation: fadeInCenter 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInCenter {
            from { transform: translate(-50%, -45%); opacity: 0; }
            to { transform: translate(-50%, -50%); opacity: 1; }
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center">

    <!-- 安裝提示框 (更新為有趣文案與質感樣式) -->
    <div id="installPrompt">
        <div class="flex flex-col items-center space-y-5">
            <img src="./icon.png" class="w-20 h-20 rounded-2xl shadow-sm object-cover border border-gray-100" alt="App Icon">
            <div class="space-y-1">
                <h3 class="text-lg font-bold text-gray-800">隨身攜帶的詞彙庫</h3>
                <p class="text-xs text-gray-500 leading-relaxed">將「智慧單字卡」加入主畫面<br>讓學習成為一種生活儀式</p>
            </div>
            <div class="flex w-full space-x-3 pt-2">
                <button onclick="closePrompt()" class="flex-1 text-sm text-gray-400 font-medium py-3 rounded-xl hover:bg-gray-50 transition-colors">
                    下次再說
                </button>
                <button id="installBtn" class="flex-1 bg-[#475569] text-white text-sm font-bold py-3 rounded-xl shadow-sm active:bg-[#334155] transition-transform active:scale-95">
                    立即收藏
                </button>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto px-6 w-full flex flex-col items-center justify-center py-6">
        <header class="text-center mb-8">
            <div class="mb-4 inline-block">
                <img src="./icon.png" class="w-16 h-16 rounded-2xl shadow-md mx-auto" alt="Logo">
            </div>
            <h1 class="text-3xl font-bold text-gray-800 tracking-wider">智慧單字卡</h1>
        </header>

        <div class="flex flex-col space-y-3 w-full">
            <a href="./日文智慧單字卡(完整版).html" class="block">
                <div class="app-card bg-[#FFF1F2] border-[#FECDD3] rounded-2xl p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-3xl">🇯🇵</span>
                        <h2 class="text-lg font-bold text-gray-800">日文智慧單字卡</h2>
                    </div>
                    <div class="bg-[#F43F5E] text-white text-[11px] py-1.5 px-4 rounded-full font-bold">進入</div>
                </div>
            </a>

            <a href="./英文智慧單字卡(完整版).html" class="block">
                <div class="app-card bg-[#FEFCE8] border-[#FEF08A] rounded-2xl p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-3xl">🇺🇸</span>
                        <h2 class="text-lg font-bold text-gray-800">英文智慧單字卡</h2>
                    </div>
                    <div class="bg-[#FACC15] text-gray-800 text-[11px] py-1.5 px-4 rounded-full font-bold">進入</div>
                </div>
            </a>

            <a href="./西文智慧單字卡(完整版).html" class="block">
                <div class="app-card bg-[#F0FDFA] border-[#CCFBF1] rounded-2xl p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-3xl">🇪🇸</span>
                        <h2 class="text-lg font-bold text-gray-800">西文智慧單字卡</h2>
                    </div>
                    <div class="bg-[#14B8A6] text-white text-[11px] py-1.5 px-4 rounded-full font-bold">進入</div>
                </div>
            </a>

            <a href="./韓文智慧單字卡(完整版).html" class="block">
                <div class="app-card bg-[#F0F9FF] border-[#BAE6FD] rounded-2xl p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-3xl">🇰🇷</span>
                        <h2 class="text-lg font-bold text-gray-800">韓文智慧單字卡</h2>
                    </div>
                    <div class="bg-[#0EA5E9] text-white text-[11px] py-1.5 px-4 rounded-full font-bold">進入</div>
                </div>
            </a>

            <a href="./法文智慧單字卡(完整版).html" class="block">
                <div class="app-card bg-[#F5F3FF] border-[#DDD6FE] rounded-2xl p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-3xl">🇫🇷</span>
                        <h2 class="text-lg font-bold text-gray-800">法文智慧單字卡</h2>
                    </div>
                    <div class="bg-[#8B5CF6] text-white text-[11px] py-1.5 px-4 rounded-full font-bold">進入</div>
                </div>
            </a>
        </div>
    </main>

    <script>
        const isSecureContext = window.location.protocol === 'https:' || window.location.hostname === 'localhost';

        if ('serviceWorker' in navigator && isSecureContext) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.error('[PWA] SW 註冊失敗:', err);
                });
            });
        }

        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // 檢查本次會話是否已顯示過
            if (!sessionStorage.getItem('flashcardInstallShown')) {
                setTimeout(() => {
                    installPrompt.style.display = 'block';
                    sessionStorage.setItem('flashcardInstallShown', 'true');
                }, 1500);
            }
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            installPrompt.style.display = 'none';
        });

        function closePrompt() {
            installPrompt.style.display = 'none';
        }

        window.addEventListener('appinstalled', () => {
            installPrompt.style.display = 'none';
        });
    </script>
</body>
</html>
