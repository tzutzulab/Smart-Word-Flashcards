<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧單字卡 - 學習中心</title>
    
    <!-- 強制預載入圖示，解決 GitHub Pages 讀取延遲問題 -->
    <link rel="preload" href="./icon.png" as="image">
    
    <!-- PWA 核心設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="智慧單字卡">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- 使用相對路徑標註，確保子目錄讀取正常 -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="icon" type="image/png" href="./icon.png">
    
    <!-- 外部資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            /* 強制禁止捲動，固定畫面 */
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            /* 防止 iOS 橡皮筋回彈效果 */
            position: fixed; 
        }

        /* 語言卡片交互樣式 */
        .app-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-width: 2px;
        }
        .app-card:active {
            transform: scale(0.97);
            background-color: #ffffff;
        }

        /* 隱藏捲動條 (備用) */
        ::-webkit-scrollbar {
            display: none;
        }

        /* 安裝提示組件 - 已調整為半透明毛玻璃質感 */
        #installPrompt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 320px;
            background: rgba(168, 162, 158, 0.85); /* 暖灰色半透明 (無尾熊色調) */
            backdrop-filter: blur(12px); /* 毛玻璃效果 */
            -webkit-backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            z-index: 100;
            display: none; 
            border: 1px solid rgba(120, 113, 108, 0.4);
            text-align: center;
            animation: fadeInCenter 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInCenter {
            from { transform: translate(-50%, -40%); opacity: 0; }
            to { transform: translate(-50%, -50%); opacity: 1; }
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center">

    <!-- 系統原生安裝提示框 - 保持中央垂直佈局，細節透明度優化 -->
    <div id="installPrompt">
        <div class="flex flex-col items-center space-y-4">
            <!-- 第一行：ICON -->
            <img src="./icon.png" class="w-20 h-20 rounded-2xl shadow-lg object-cover border-2 border-stone-400/50" alt="App Icon" onerror="this.src='https://ui-avatars.com/api/?name=SW&background=78716c&color=fff'">
            
            <!-- 第二行：安裝標題 -->
            <div class="space-y-1">
                <h3 class="text-lg font-bold text-white drop-shadow-sm">安裝智慧單字卡</h3>
                <p class="text-xs text-stone-100/90">將 App 加入主畫面隨時學習</p>
            </div>
            
            <!-- 第三行：稍後與立即安裝按鈕 -->
            <div class="flex w-full space-x-3 pt-2">
                <button onclick="closePrompt()" class="flex-1 text-sm text-white font-medium py-3 rounded-xl border border-white/20 bg-white/10 active:bg-white/20 transition-colors">
                    稍後
                </button>
                <button id="installBtn" class="flex-1 bg-white text-stone-800 text-sm font-bold py-3 rounded-xl shadow-md active:bg-stone-100 transition-transform active:scale-95">
                    立即安裝
                </button>
            </div>
        </div>
    </div>

    <!-- 主選單內容：確保在中間且不捲動 -->
    <main class="max-w-md mx-auto px-6 w-full flex flex-col items-center justify-center py-6">
        <header class="text-center mb-8">
            <div class="mb-4 inline-block">
                <img src="./icon.png" class="w-16 h-16 rounded-2xl shadow-md mx-auto" alt="Logo" onerror="this.style.display='none'">
            </div>
            <h1 class="text-3xl font-bold text-gray-800 tracking-wider">智慧單字卡</h1>
            <p class="text-gray-500 text-sm mt-2 font-medium">個人語言學習中心</p>
        </header>

        <div class="flex flex-col space-y-3 w-full">
            <!-- 1. 日文 -->
            <a href="./日文智慧單字卡(完整版).html" class="block">
                <div class="app-card bg-[#FFF1F2] border-[#FECDD3] rounded-2xl p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-3xl">🇯🇵</span>
                        <h2 class="text-lg font-bold text-gray-800">日文智慧單字卡</h2>
                    </div>
                    <div class="bg-[#F43F5E] text-white text-[11px] py-1.5 px-4 rounded-full font-bold">進入</div>
                </div>
            </a>

            <!-- 2. 英文 -->
            <a href="./英文智慧單字卡(完整版).html" class="block">
                <div class="app-card bg-[#FEFCE8] border-[#FEF08A] rounded-2xl p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-3xl">🇺🇸</span>
                        <h2 class="text-lg font-bold text-gray-800">英文智慧單字卡</h2>
                    </div>
                    <div class="bg-[#FACC15] text-gray-800 text-[11px] py-1.5 px-4 rounded-full font-bold">進入</div>
                </div>
            </a>

            <!-- 3. 西文 -->
            <a href="./西文智慧單字卡(完整版).html" class="block">
                <div class="app-card bg-[#F0FDFA] border-[#CCFBF1] rounded-2xl p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-3xl">🇪🇸</span>
                        <h2 class="text-lg font-bold text-gray-800">西文智慧單字卡</h2>
                    </div>
                    <div class="bg-[#14B8A6] text-white text-[11px] py-1.5 px-4 rounded-full font-bold">進入</div>
                </div>
            </a>

            <!-- 4. 韓文 -->
            <a href="./韓文智慧單字卡(完整版).html" class="block">
                <div class="app-card bg-[#F0F9FF] border-[#BAE6FD] rounded-2xl p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-3xl">🇰🇷</span>
                        <h2 class="text-lg font-bold text-gray-800">韓文智慧單字卡</h2>
                    </div>
                    <div class="bg-[#0EA5E9] text-white text-[11px] py-1.5 px-4 rounded-full font-bold">進入</div>
                </div>
            </a>

            <!-- 5. 法文 -->
            <a href="./法文智慧單字卡(完整版).html" class="block">
                <div class="app-card bg-[#F5F3FF] border-[#DDD6FE] rounded-2xl p-4 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-3xl">🇫🇷</span>
                        <h2 class="text-lg font-bold text-gray-800">法文智慧單字卡</h2>
                    </div>
                    <div class="bg-[#8B5CF6] text-white text-[11px] py-1.5 px-4 rounded-full font-bold">進入</div>
                </div>
            </a>
        </div>
        
        <footer class="mt-8 text-gray-300 text-[10px] uppercase tracking-widest text-center">
            PWA Stable Edition v1.6
        </footer>
    </main>

    <script>
        /**
         * 環境檢查：Service Worker 不支援 blob: 或沙盒協議。
         * 如果在預覽環境下，將跳過註冊以避免錯誤，佈署到 HTTPS 域名後將自動恢復正常。
         */
        const isSupportedProtocol = window.location.protocol === 'https:' || window.location.hostname === 'localhost';

        // 註冊 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                if (!isSupportedProtocol) {
                    console.log('%c[PWA]%c 偵測到沙盒預覽環境，跳過 SW 註冊以避免協議錯誤。', 'color: #fff; background: #f59e0b; padding: 2px 5px; border-radius: 3px;', '');
                    return;
                }

                navigator.serviceWorker.register('./sw.js')
                .then(reg => {
                    console.log('%c[PWA]%c SW 註冊成功:', 'color: #fff; background: #0ea5e9; padding: 2px 5px; border-radius: 3px;', '', reg.scope);
                })
                .catch(err => {
                    console.error('[PWA] SW 註冊失敗:', err);
                });
            });
        }

        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installBtn = document.getElementById('installBtn');

        // 監聽原生安裝事件
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('%c[PWA]%c 偵測到安裝條件已達成', 'color: #fff; background: #22c55e; padding: 2px 5px; border-radius: 3px;', '');
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => {
                installPrompt.style.display = 'block';
            }, 1000);
        });

        // 安裝按鈕邏輯
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`使用者安裝選擇: ${outcome}`);
            deferredPrompt = null;
            installPrompt.style.display = 'none';
        });

        function closePrompt() {
            installPrompt.style.display = 'none';
        }

        window.addEventListener('appinstalled', () => {
            console.log('App 已成功安裝於設備');
            installPrompt.style.display = 'none';
        });

        // 偵錯輔助：檢查資源可用性
        fetch('./icon.png', { method: 'HEAD' })
            .then(() => console.log('%c[Debug]%c 資源 icon.png 在目前環境可存取', 'color: #fff; background: #8b5cf6; padding: 2px 5px; border-radius: 3px;', ''))
            .catch(() => console.warn('[Debug] 資源 icon.png 在目前環境不可直接存取，這在預覽環境是正常的。'));
    </script>
</body>
</html>
