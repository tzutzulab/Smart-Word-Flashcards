            { id: 1023, word: "cochon", meaning: "豬", ex_kr: "Le fermier élève des cochons.", ex_zh: "這位農民養豬。" },
            { id: 1024, word: "maudit", meaning: "被詛咒的", ex_kr: "Aidez-moi à quitter cet endroit maudit.", ex_zh: "救救我，讓我離開這個鬼地方。" },
            { id: 1025, word: "poussière", meaning: "灰塵", ex_kr: "J'ai nettoyé la poussière du vieux livre.", ex_zh: "我擦掉了舊書上的灰塵。" },
            { id: 1026, word: "printemps", meaning: "春天", ex_kr: "C'est le printemps que je préfère.", ex_zh: "春天是我最喜歡的季節。" },
            { id: 1027, word: "interroger", meaning: "問題", ex_kr: "La police a interrogé le témoin.", ex_zh: "警方訊問了證人。" },
            { id: 1028, word: "briser", meaning: "休息", ex_kr: "Il a brisé la fenêtre en jouant au basket.", ex_zh: "他打籃球的時候把窗戶打破了。" },
            { id: 1029, word: "sauvage", meaning: "野蠻的", ex_kr: "Les ours sont des animaux sauvages.", ex_zh: "熊是野生動物。" },

        ];

        let srsData = {};
        try {
            srsData = JSON.parse(localStorage.getItem('fr_srs_v1') || "{}");
        } catch(e) { srsData = {}; }

        let quotaState = {
            lastDate: "", dailyQueue: [], newBatchIds: [], reviewBatchIds: [], 
            sessionDoneIds: [], sessionMistakeIds: [], reappearTimes: {}
        };
        try {
            const savedQuota = localStorage.getItem('fr_quota_v1');
            if (savedQuota) quotaState = Object.assign(quotaState, JSON.parse(savedQuota));
        } catch(e) {}

        let dueWords = [], previewIndex = 0, currentSubTab = 'new';
        let filteredVocab = [];
        let displayCount = 30;
        const BATCH_SIZE = 30;
        let sessionInitialized = false;

        function isNewWord(id) {
            if (!srsData[id] || !srsData[id].firstDiscoveryDate) return true;
            const discovery = new Date(srsData[id].firstDiscoveryDate).toLocaleDateString();
            return discovery === new Date().toLocaleDateString();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function checkAndResetQuota() {
            const today = new Date().toLocaleDateString();
            const now = Date.now();
            
            if (quotaState.lastDate !== today) {
                const unlearned = initialVocab.filter(v => !srsData[v.id]);
                const news = shuffleArray([...unlearned]).slice(0, DAILY_NEW_LIMIT);
                
                news.forEach(v => { 
                    if (!srsData[v.id]) srsData[v.id] = { firstDiscoveryDate: now, nextReview: 0, interval: 0 }; 
                });

                quotaState = { 
                    lastDate: today, 
                    dailyQueue: [], 
                    newBatchIds: news.map(v => v.id), 
                    reviewBatchIds: [], 
                    sessionDoneIds: [], 
                    sessionMistakeIds: [], 
                    reappearTimes: {} 
                };
                sessionInitialized = false;
            }

            if (!sessionInitialized) {
                const allDueReviews = initialVocab.filter(v => 
                    srsData[v.id] && 
                    !isNewWord(v.id) && 
                    srsData[v.id].nextReview <= now
                ).map(v => v.id);

                quotaState.reviewBatchIds = shuffleArray([...allDueReviews]).slice(0, DAILY_REVIEW_LIMIT);
                sessionInitialized = true;
            }

            const activeNewIds = quotaState.newBatchIds.filter(id => !quotaState.sessionDoneIds.includes(id));
            const activeReviews = quotaState.reviewBatchIds.filter(id => !quotaState.sessionDoneIds.includes(id));
            
            quotaState.dailyQueue = shuffleArray([...activeNewIds, ...activeReviews]);

            localStorage.setItem('fr_srs_v1', JSON.stringify(srsData));
            localStorage.setItem('fr_quota_v1', JSON.stringify(quotaState));
        }

        function speak(text, rate = 1.0) {
            if (!text || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'fr-FR';
            msg.rate = rate;
            window.speechSynthesis.speak(msg);
        }

        function getPreviewCurrentData() {
            const sourceIds = currentSubTab === 'new' ? quotaState.newBatchIds : quotaState.reviewBatchIds;
            if (!sourceIds || sourceIds.length === 0) return null;
            return initialVocab.find(v => v.id === sourceIds[previewIndex]);
        }

        function updatePreviewUI(autoSpeak = true) {
            const cardContainer = document.getElementById('preview-card');
            const cardInner = document.getElementById('preview-card-inner');
            if(!cardContainer || !cardInner) return;

            cardInner.classList.add('no-transition');
            cardContainer.classList.remove('is-flipped');
            void cardInner.offsetWidth; 
            
            const data = getPreviewCurrentData();
            const sourceIds = currentSubTab === 'new' ? quotaState.newBatchIds : quotaState.reviewBatchIds;
            
            if (!sourceIds || sourceIds.length === 0 || !data) {
                document.getElementById('preview-word-kr').innerText = "目前無單字";
                document.getElementById('preview-progress-text').innerText = "0 / 0";
                document.getElementById('preview-back-content').classList.add('hidden');
            } else {
                document.getElementById('preview-back-content').classList.remove('hidden');
                const isDone = quotaState.sessionDoneIds.includes(data.id);
                document.getElementById('preview-word-kr').innerText = data.word;
                document.getElementById('preview-word-kr-back').innerText = data.word;
                document.getElementById('preview-word-zh').innerText = data.meaning;
                document.getElementById('preview-ex-kr').innerText = data.ex_kr;
                document.getElementById('preview-ex-zh').innerText = data.ex_zh;
                document.getElementById('preview-progress-text').innerText = `${previewIndex + 1} / ${sourceIds.length}`;
                cardContainer.style.opacity = isDone ? "0.75" : "1";
                document.getElementById('preview-tag').innerText = isDone ? "COMPLETED" : "PREVIEW";
                
                if (autoSpeak) speak(data.word);
            }

            setTimeout(() => {
                cardInner.classList.remove('no-transition');
            }, 10);
        }

        function handleVote(isSuccess) {
            if (!dueWords[0]) return;
            const id = dueWords[0].id;
            const now = Date.now();
            const isNew = isNewWord(id);
            let message = "";

            if (isSuccess) {
                if (isNew) {
                    srsData[id].interval = 1;
                    srsData[id].nextReview = now + DAY_MS;
                    message = "24小時後複習";
                } else {
                    srsData[id].interval = Math.max(1, (srsData[id].interval || 1) * MULTIPLIER);
                    srsData[id].nextReview = now + (srsData[id].interval * DAY_MS);
                    message = "複習完成";
                }
                
                if (!quotaState.sessionDoneIds.includes(id)) {
                    quotaState.sessionDoneIds.push(id);
                }
                delete quotaState.reappearTimes[id];
                quotaState.dailyQueue = quotaState.dailyQueue.filter(qid => qid !== id);
            } else {
                if (isNew) {
                    if (!quotaState.sessionMistakeIds.includes(id)) quotaState.sessionMistakeIds.push(id);
                    const reappTime = now + HOUR_MS;
                    quotaState.reappearTimes[id] = reappTime;
                    srsData[id].nextReview = reappTime;
                    quotaState.dailyQueue.push(quotaState.dailyQueue.shift());
                    message = "一小時後補考";
                } else {
                    srsData[id].interval = 1;
                    srsData[id].nextReview = now + DAY_MS;
                    message = "24小時後重新複習";
                    quotaState.dailyQueue = quotaState.dailyQueue.filter(qid => qid !== id);
                    if (!quotaState.sessionDoneIds.includes(id)) quotaState.sessionDoneIds.push(id);
                }
            }
            localStorage.setItem('fr_srs_v1', JSON.stringify(srsData));
            localStorage.setItem('fr_quota_v1', JSON.stringify(quotaState));
            renderLearn();
            showToast(message);
        }

        function renderLearn() {
            const now = Date.now();
            const availableQueue = quotaState.dailyQueue.filter(id => {
                const rt = quotaState.reappearTimes[id] || 0;
                return now >= rt;
            });

            const cardContainer = document.getElementById('flashcard');
            const cardInner = document.getElementById('flashcard-inner');
            const limitUI = document.getElementById('limit-reached-ui');
            if(!cardContainer || !cardInner) return;

            cardInner.classList.add('no-transition');
            cardContainer.classList.remove('is-flipped');
            void cardInner.offsetWidth; 

            const remainingReviews = quotaState.dailyQueue.filter(id => quotaState.reviewBatchIds.includes(id)).length;
            const remainingNews = quotaState.dailyQueue.filter(id => quotaState.newBatchIds.includes(id)).length;
            document.getElementById('review-progress').innerText = remainingReviews;
            document.getElementById('new-progress').innerText = remainingNews;

            if (availableQueue.length > 0) {
                cardContainer.classList.remove('hidden');
                limitUI.classList.add('hidden');
                const data = initialVocab.find(v => v.id === availableQueue[0]);
                dueWords = [data];
                document.getElementById('word-kr').innerText = data.word;
                document.getElementById('word-zh').innerText = data.meaning;
                const isNew = isNewWord(data.id);
                document.getElementById('card-tag').innerText = isNew ? 'New' : 'Reviewing';
                document.getElementById('card-tag').className = `absolute top-6 left-6 text-xs font-mono font-bold px-2 py-1 rounded uppercase ${isNew ? 'bg-violet-100 text-violet-800' : 'bg-violet-100 text-violet-800'}`;
                
                speak(data.word);
            } else {
                cardContainer.classList.add('hidden');
                limitUI.classList.remove('hidden');
                const pTag = document.querySelector('#limit-reached-ui p');
                if (quotaState.dailyQueue.length > 0) {
                    pTag.innerText = "單字冷卻中，請稍後再試。";
                } else {
                    pTag.innerText = "本次會話已完成！";
                }
            }

            setTimeout(() => {
                cardInner.classList.remove('no-transition');
            }, 10);
        }

        function formatTimeDiff(targetMs) {
            const diff = targetMs - Date.now();
            if (diff <= 0) return "Due";
            const days = Math.floor(diff / DAY_MS);
            const hours = Math.floor((diff % DAY_MS) / HOUR_MS);
            if (days > 0) return `${days}d ${hours}hr`;
            const mins = Math.floor((diff % HOUR_MS) / 60000);
            return hours > 0 ? `${hours}hr ${mins}m` : `${mins}m`;
        }

        function renderList(append = false) {
            const container = document.getElementById('vocab-list-container');
            if (!container) return;
            if (!append) {
                container.innerHTML = '';
                displayCount = BATCH_SIZE;
                filteredVocab.sort((a, b) => (srsData[a.id]?.nextReview || Infinity) - (srsData[b.id]?.nextReview || Infinity));
            }
            filteredVocab.slice(append ? displayCount - BATCH_SIZE : 0, displayCount).forEach(v => {
                const srs = srsData[v.id];
                const div = document.createElement('div');
                div.className = 'bg-white p-5 rounded-2xl shadow-sm border border-violet-50 transition-all cursor-pointer active:bg-violet-50';
                let srsStatusText = "New", srsColorClass = "text-gray-400 text-xs"; 
                if (srs && srs.nextReview > 0) { 
                    srsStatusText = formatTimeDiff(srs.nextReview); 
                    srsColorClass = srsStatusText === "Due" ? "text-violet-500 font-bold" : "text-violet-600 font-bold";
                }
                div.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-1">
                                <span class="text-xl font-bold text-gray-800">${v.word}</span>
                                <button class="p-3 text-violet-500 voice-list-btn voice-btn-z" data-word="${v.word}">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z"/></svg>
                                </button>
                            </div>
                            <p class="text-sm text-gray-400 font-medium">${v.meaning}</p>
                        </div>
                        <div class="flex items-center space-x-3">
                            <span class="uppercase tracking-tighter text-[10px] ${srsColorClass}">${srsStatusText}</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-300 rotate-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M19 9l-7 7-7-7\" /></svg>
                        </div>
                    </div>
                    <div class="details-content mt-4 pt-4 border-t border-violet-50 space-y-3">
                        <div><p class="text-xs text-violet-600 font-bold mb-1 uppercase tracking-tighter">法文例句</p><p class="text-sm text-gray-700 font-medium leading-relaxed">${v.ex_kr}</p></div>
                        <div><p class="text-xs text-violet-500 font-bold mb-1 uppercase tracking-tighter">例句翻譯</p><p class="text-xs text-gray-500">${v.ex_zh}</p></div>
                    </div>
                `;
                div.onclick = (e) => e.target.closest('.voice-list-btn') ? (e.stopPropagation(), speak(e.target.closest('.voice-list-btn').dataset.word)) : div.classList.toggle('is-open');
                container.appendChild(div);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        window.onload = () => {
            checkAndResetQuota();
            filteredVocab = [...initialVocab];
            updatePreviewUI(false); 

            const tabs = { today: 'view-today', learn: 'view-learn', list: 'view-list' };
            Object.keys(tabs).forEach(key => {
                const btn = document.getElementById(`tab-${key}-btn`);
                if(!btn) return;
                btn.onclick = function() {
                    Object.values(tabs).forEach(v => document.getElementById(v).classList.add('hidden'));
                    document.getElementById(tabs[key]).classList.remove('hidden');
                    document.querySelectorAll('nav button').forEach(b => b.classList.replace('tab-active', 'text-gray-400'));
                    this.classList.replace('text-gray-400', 'tab-active');
                    
                    if(key === 'learn') {
                        checkAndResetQuota(); 
                        renderLearn();
                    } else if(key === 'list') {
                        renderList();
                    } else if(key === 'today') {
                        checkAndResetQuota();
                        updatePreviewUI(true);
                    }
                };
            });

            document.getElementById('subtab-new-btn').onclick = function() {
                currentSubTab = 'new'; previewIndex = 0;
                this.className = 'flex-1 py-2 text-xs font-bold rounded-lg transition-all subtab-active';
                document.getElementById('subtab-rev-btn').className = 'flex-1 py-2 text-xs font-bold rounded-lg transition-all text-violet-600';
                updatePreviewUI();
            };
            document.getElementById('subtab-rev-btn').onclick = function() {
                currentSubTab = 'rev'; previewIndex = 0;
                this.className = 'flex-1 py-2 text-xs font-bold rounded-lg transition-all subtab-active';
                document.getElementById('subtab-new-btn').className = 'flex-1 py-2 text-xs font-bold rounded-lg transition-all text-violet-600';
                updatePreviewUI();
            };

            document.getElementById('vocab-search').oninput = (e) => {
                const val = e.target.value.toLowerCase();
                filteredVocab = initialVocab.filter(v => v.word.toLowerCase().includes(val) || v.meaning.toLowerCase().includes(val));
                renderList();
            };

            const observer = new IntersectionObserver((entries) => { 
                if (entries[0].isIntersecting && displayCount < filteredVocab.length) { 
                    displayCount += BATCH_SIZE; renderList(true); 
                } 
            });
            observer.observe(document.getElementById('list-end-trigger'));

            document.getElementById('preview-next-btn').onclick = () => {
                const sourceIds = currentSubTab === 'new' ? quotaState.newBatchIds : quotaState.reviewBatchIds;
                if (!sourceIds || sourceIds.length === 0) return;
                previewIndex = (previewIndex + 1) % sourceIds.length;
                updatePreviewUI();
            };
            document.getElementById('preview-prev-btn').onclick = () => {
                const sourceIds = currentSubTab === 'new' ? quotaState.newBatchIds : quotaState.reviewBatchIds;
                if (!sourceIds || sourceIds.length === 0) return;
                previewIndex = (previewIndex - 1 + sourceIds.length) % sourceIds.length;
                updatePreviewUI();
            };

            document.getElementById('preview-card').onclick = e => {
                if (e.target.closest('.voice-btn-z')) return;
                const data = getPreviewCurrentData();
                if (!data) return;
                const cardContainer = e.currentTarget;
                const isFlipped = cardContainer.classList.toggle('is-flipped');
                if (isFlipped) { setTimeout(() => speak(data.ex_kr, 1.0), 100); } else { speak(data.word, 1.0); }
            };

            document.getElementById('preview-voice-back-word-10').onclick = e => { e.stopPropagation(); speak(getPreviewCurrentData()?.word, 1.0); };
            document.getElementById('preview-voice-ex-10').onclick = e => { e.stopPropagation(); speak(getPreviewCurrentData()?.ex_kr, 1.0); };
            document.getElementById('preview-voice-ex-06').onclick = e => { e.stopPropagation(); speak(getPreviewCurrentData()?.ex_kr, 0.6); };

            document.getElementById('flashcard').onclick = e => {
                if (e.target.closest('.voice-btn-z') || e.target.closest('button')) return;
                e.currentTarget.classList.toggle('is-flipped');
            };

            document.getElementById('learn-voice-btn-10').onclick = e => { e.stopPropagation(); if (dueWords.length > 0) speak(dueWords[0].word, 1.0); };
            
            document.getElementById('success-btn').onclick = e => { e.stopPropagation(); handleVote(true); };
            document.getElementById('fail-btn').onclick = e => { e.stopPropagation(); handleVote(false); };
            document.getElementById('reset-data-btn').onclick = () => confirm("確定要重置所有紀錄嗎？") && (localStorage.clear() || location.reload());
        };
    </script>
</body>
</html>
